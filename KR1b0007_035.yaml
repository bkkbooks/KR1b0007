body:
  text: 尚書全解卷三十五宋林之竒撰立政周書周公作立政立政周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準茲惟后矣謀面用丕訓德則乃宅人茲乃三宅無義民桀德惟乃弗作往任是惟暴德罔後亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓周公作無逸立政其意一也蓋當成王之即政而天下既已太平垂衣拱手不動聲色而遂享此治安之效周公懼其驕怠之心易生也故作無逸以戒之又懼其姦佞之臣易以乘間而進也故作立政以戒之無逸之篇蓋言夫修德之不可以逸也立政之篇蓋言任用之不可以非其人也夫當天下之治安上恬下嬉海宇無事雖逸固不可以縱然常人之情往往以為一日之逸未遽亂也雖佞固不可以用然常人之情往往以為一人之佞未遽危也而周公則曰不然無逸之篇言無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆蓋謂雖一日之逸而萬世之禍所自萌此篇言左右常伯常任準人綴衣虎賁休兹知恤鮮哉繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間之蓋謂雖一人之佞而羣邪之黨所自基皆所以遏其源而塞其端使成王戰戰兢兢之心不可以須臾弛也詩曰濟濟多士文王以寧則周之初可謂多士矣周公之作君奭自成湯至于武丁稱其臣之賢者不過一二人耳至于文王則有若虢叔閎夭太顛散宜生南宫適而武王以其四人誕受天命以有天下然太公周公召公畢公之徒猶不與焉孔子稱周有八士而太顛閎夭猶不與焉足見其賢才之多矣及成王之繼統周公為師召公為保二公在王之左右而為賢才之主於內則天下之賢莫不因之以進想夫朝廷之上小大前後莫匪正人端士也而此篇猶以用人為戒者蓋成王中才之主雖周公攝政選用賢能以遺之為之羽翼然其既聽政以躬攬萬機之務則一進一退而邪正兩途自此而分此周公所以諄諄以用人為戒也在易陰陽之運未嘗不相為消長盈虛五陰一陽為復陽在下也自復漸進而為夬則陽多而陰少陰聽於陽故也自夬又進而為乾則無復有陰乾雖無陰而姤之一陰生矣五陽一陰為姤隂在下也自姤漸進而為剝則隂多而陽少陽聽於隂故也自剝又進而為坤則無復有陽坤雖無陽而復之一陽生矣君子小人之進退亦然當成王之世君子彚征無復有一小人間於其間此正乾之無隂也周公懼夫小人以巧言令色乘其驕怠之心以肆其惑則乾將變而為姤故以是而戒成王也泰之為卦君子道長小人道消之卦也而其上六卦之終則以城復于隍為戒正周公之意也先儒曰周公既致政成王恐其怠忽故以君臣立政為戒又曰言用臣當共立政故以名篇意謂立政必藉於得人故此篇之義以用人為主而以立政命篇之名薛博士林子和之言皆然夫得人而後可以立政誠有此理而謂史官之名篇其本意在於此則不可蓋五十八篇之命名不可以皆有其義也余嘗屢辨之矣先儒以拜手稽首告嗣天子王矣為周公告王之言咸戒于王為周公盡以告王王氏之言亦然其說於經意無相聨屬不如蘇氏曰周公率羣臣進戒于王贊之曰羣臣皆再拜稽首告天子今王矣不可以幼沖自待而陳少南之說尤為詳明曰周公若曰而下帥羣臣之辭也用咸戒于王曰而下羣臣進戒之辭也周公曰而下周公因羣臣進戒而歎之也此說蓋本於王肅荀子曰治國有道人主有職人主者以官人為能者也匹夫者以自能為能者也夫有天下必自為之而後可則勞苦眊悴莫甚焉自為之者役夫之道也論德使能而官施之者聖王之道也蓋王天下者無他職業惟用人而已故周公帥羣臣而贊之使皆拜手稽首以致敬盡禮於其王謂王之嗣世而為天子今既王矣非如前日之幼沖而周公攝之也周公攝政則王天下之職業其責在於周公成王即政則王天下之職業其責在於成王可謂任重負艱矣羣臣當有以戒之也羣臣因周公之言而皆進戒於王則謂王之左右大而常伯常任準人小而綴衣虎賁皆不可以非其人羣臣知夫王天下者之職業惟在於此故也常伯常任準人說者不同先儒謂伯訓長常所長事三公也常任者常所委任六卿也準人平法之人獄官也王氏則謂常伯庶官之長在位者也常任任事之臣在職者也準人非伯所任而吾取以為準者也薛博士因王氏之言則以為常伯三公三孤之類常任六卿之類準人師氏保氏之類林子和又以為常伯冢宰之類常任六卿之屬準人三公三孤之職其說皆不如蘇氏蘇氏曰牧民之長曰常伯任事之公卿曰常任守法之有司曰準人蓋下文所謂宅乃事即此常任也宅乃牧即此常伯也宅乃準即此準人也此以為伯而下文以為牧則以伯為牧民之長冝矣王氏以伯為庶官之長而下文之牧則以為庶官之率以牧訓率無是理也先儒雖以牧為牧民九州之伯然其意不以此三者合於下文之三者又非也故知蘇說為勝伯既牧民之長而曰左右者蓋周官之設官有三公有九卿有牧伯顧命曰太保奭芮伯彤伯畢公衛侯毛公此雖六卿而無非牧民之長蓋以牧伯而兼公卿故也此所以在王左右者惟牧民之長任事之公卿以至凡守法之有司無不得其人則朝廷之上皆正人矣然宫禁之內侍衛之臣亦不可以非其人也故曰綴衣虎賁綴衣掌衣服者虎賁即周官虎賁氏也夫常伯常任準人所以與天子圖回萬機者固不可以不得人然其朝見也有時至於綴衣虎賁朝夕與王處焉苟非其人則王德以之而蠧雖外得其人何補焉如齊威王時即墨之大夫賢而左右日毁之阿之大夫不肖而左右日譽之蓋䙝近者非其人則毁譽亂真矣唐明皇常引鑑不樂左右曰自韓休入朝陛下無一日歡何自戚戚不逐去之以韓休之峭直而左右欲逐去之則褻近者可不謹所擇哉伊尹曰任官惟賢才左右惟其人文武之時小大之臣咸懷忠良侍御僕從罔匪正人伊尹所謂左右文武侍御僕從即此綴衣虎賁之類也觀幽王之時卿士司徒師氏內史既非其人而膳夫趣馬亦非其人此其所以亂亡則人主不可不留意此羣臣咸戒之意也休陳少南以為休美之時是也周公因羣臣進戒逐嗟歎而言曰當此盈成之世休美之時而惟此常伯以下知憂之者鮮矣周公之言此者其意正與無逸同恐其恃治安而忽之也知人則哲臯陶以為惟帝其難之常伯以下周公以為知恤鮮哉乃知人主之職事其所謂難者莫難於此也惟其難如此遂以禹湯之所以得桀紂之所以失而發明之也古之人所謂有道之君惟夏禹者其王室之所以大強者乃在於求賢俊以尊事上帝而已天下有至強之勢不在於山川之險不在於甲兵之鋭不在於人民之衆惟在於賢才之多而已能求賢才而用之則其勢無敵矣豈不大競乎室王室也有室猶言有天下也先儒以為卿大夫室家迂矣籲呼也故籲俊有求賢之意孟子曰為天下得人者謂之仁以仁奉天天心其享之矣故禹之尊上帝湯之丕釐上帝之耿命文武之敬事上帝皆本於得人也九德之行臯陶所言九德寬而栗至強而義是也有九德之行者乃可以宅乃事宅乃牧宅乃準故也惟禹以籲俊為心故其臣亦以薦揚為務迪知其人致誠于九德之行者乃敢以告教其君曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹為后矣則其教告之言也蓋知人之道視其所以觀其所由察其所安然後其賢否不能逃忱恂于九德之行誠心安於此而非僞也故必迪知其有是而後敢告教其君苟不察其躬行者為何如而惟其以言語文采遂以為有此九德之行則聲音笑貌可以為之矣迪知者驗之於實迹而知之也其告教其君也則拜手稽首以致敬盡禮言今既為君矣不可不謹也惟其宅任事之公卿宅牧民之長宅守法之有司皆得其人則實惟為君之道矣宅謂居其位也周公率羣臣進戒而贊之曰拜手稽首告嗣天子王矣此正夏之臣所以告教其君之遺意也面用猶所謂見賢焉而後用之也其臣既以是告教矣故禹則謀見用其臣之大順于德者則可以居此三宅之位而稱其任也惟其臣必迪知之而後告教其君君必面用而後宅人上下不苟如此則小人安得以乘其間而進哉此篇之言三宅三俊者先儒以三宅為五宅三居之宅以三俊為正直剛柔之三德王氏則以為三宅謂有常伯常任準人之位三俊有常伯常任準人之才王氏所分不甚明白書既有五流五宅三居則以三宅為去罪人先儒之說為勝然以正直剛柔為三俊則非也三者事也牧也準也此三者皆以俊才宅之故曰三俊蘇氏雖從先儒以三宅為三居又曰事也牧也準也為三宅所以宅三俊是又以此三宅三俊分為二也其言曰迪知忱恂于九德之行是九德為三俊也臯陶之九德則箕子三德之詳者也并三為一則九德為三俊明矣此又蹈先儒之失蓋三宅當從先儒而三俊當從王氏王氏既以三宅為常伯常任準人之位則兹三宅無義民說不行故以此句下屬於桀紂此說又曲既宅此三俊矣則夫民之不義而蹈于罪者不可不去之也故以三宅而宅五流焉蓋稂莠不去而禾不滋故也三宅却當從王氏之說有逺者有近者有逺近之中者非謂四裔九州之外中國之外也至桀之德則不能為往日大禹所以任人之道故其安任者惟暴虐不仁之人此其所以絶而無後也桀既以任非其人而自絶于天及成湯之德升聞于天大治上帝之明命以集于厥躬蓋亦如禹之所以尊上帝惟能舉賢才以用之而已是以代桀而有天下大治者帝命之明湯有以自取之故謂湯之大治也湯之受天命乃以用三宅之法以去無義之民能使各就其居處當其罪故克即宅其有俊德可以宅乃事宅乃牧宅乃準者因而任之能使各就其俊德任當其才故亦見即也蘇氏曰殷先去凶而後用賢夏先用賢而後去凶各從當時之宜要之二者相資而成也是也唐孔氏曰夏先言得賢見其須賢之切成湯文武先言去惡又見其惡宜速去或先或後所以互相見耳不如蘇氏云嚴者正其衣冠尊其瞻視儼然人望而畏之也夫成湯之嚴威儼恪而天下大法之者惟其能用三宅以去凶知三俊以任賢故其效如此又一說此篇之言三宅三俊先儒以三宅為五宅三居之宅以三俊為正直剛柔之三德據經文初無流放罪人之意但言常伯常任準人之職所係甚重不可以非其人耳而其言曰宅乃事宅乃牧宅乃準則三宅也者蓋指任牧準之三者而言而三俊者則是有可以居此三宅之才者也亦不必泥於正直剛柔之三德故王氏曰三宅謂有常任常伯準人之位者三俊謂有常任常伯準人之才者此說比諸家為優而蘇氏亦云此三宅所以宅三俊蓋經之本義如此言蘇氏雖以三宅為所以宅三俊而其於三宅無義民則又以為五宅三居之宅是以此篇之三宅分為二說而其說則以謂人之有疾也食而不藥則不可藥而不食亦不可三宅三俊如藥食之交相養所以宅三俊及所以宅五流者皆曰三宅此說迂曲甚矣據三宅無義民只當從王氏說既三宅無義民則任是官者皆暴德之人所以至於罔後也蓋以三俊而居三宅之位則是所用者義民非三俊而用之是無義民也無義民則不能為往昔大禹所以任三宅三俊之道故其所任者惟暴虐不仁之人是以至於殄絶有夏之祀而無後也桀既任非其人而自絶于天及成湯之德升聞于天大治上帝之明命以集于厥躬蓋亦如禹之所以尊上帝惟能舉賢才以用之而已是以代桀而有天下大治者帝命之明湯有以自取之故謂湯之大治也湯之丕釐帝命以致天下之治安推原其本莫非三宅三俊之故是以繼之曰乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊此數句亦當從王氏之說克即者言湯所用皆能就其事所稱皆能就其才嚴惟丕式者言其於三宅三俊之所言所行思之而不敢慢式之而不敢忽也夫如此故能用三宅三俊此說皆是蓋既曰用三有宅克即宅曰三有俊克即俊而又繼之以嚴惟丕式克用三宅三俊者以見其好賢樂善之誠心有加而無已也夫如是故近在都邑之中則和協輯睦熙熙然得其所逺在四方之外則勸其德而大法之以為矜式無非用賢之效也子曰無為而治者其舜也歟夫何為哉恭已正南面而已嚴者恭已之謂也協于厥邑丕式見德則無為而治矣見德者曉然知上之人其德如是也至紂之德則不然矣自強為惡其在朝廷者無非不仁也進用刑罰而有暴虐之德者與之同治其國而百姓莫不苦其殘害衆習不善而有逸豫之德者則與之同治其政而庶政莫不砥於廢墜此豈湯之所以丕釐景命之道乎故天監代殷而欽罰之使我周撫有華夏用湯所以大治景命之道而受命于天以奄甸萬姓也欽罰者王肅謂須暇五年是矣甸先儒曰治也王氏曰井牧其地什伍其民皆通受德先儒以為紂字夫桀德受德一也桀德則曰桀之為德而受德則以為其字何其自相異同如此據受德亦如桀德也抑嘗觀周召之告戒王未嘗不以禹湯之所以得桀紂之所以失反覆而陳之蓋詩曰殷鑒不逺在夏后之世殷鑒在夏則周鑒在殷矣能以行事為戒豈逺乎哉周召欲成王克紹文武之大業必言其不可如桀紂廢墜禹湯之遺緒也不獨戒成王為然其戒殷之多士多方之諸侯亦莫不然孔子曰周監於二代蓋謂是也亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯立政任人準夫牧作三事虎賁綴衣趣馬小尹左右攜僕百司庶府大都小伯藝人表臣百司太史尹伯庶常吉士司徒司馬司空亞旅夷微盧蒸三亳阪尹文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于兹亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基唐孔氏曰桀之昏亂開成湯紂之不善開文武蓋禍亂之作天之所以開聖人也不有廢也君何以興故桀以任非其人而自絶于天湯則伐桀而有天下紂以任非其人而自絶于天文武則伐紂而有天下何者有廢必有興也然湯與文武之所以興者豈徒然哉韓信謂漢髙祖曰項王名雖為霸實失天下心今大王誠能反其道任天下武勇何不誅以天下城邑封功臣何不服湯與文武之所以興者以其能反桀紂之道故耳桀以任是暴德而罔後故湯則三有宅克即宅三有俊克即俊所以反桀之道也紂以任暴德逸德之人而帝欽罰之故文武則克知三有宅心灼見三有俊心所以反紂之道也既能反其道則其所以享天心而受帝祉者豈不與之異哉冝其天命之不庸釋也王氏以三宅已授之以位己任之以事故不可以不知其心若三有俊則灼見之足矣其意謂三俊未至於三宅之己在位灼見未至於克知之為詳先儒之分三宅三俊異於王氏故唐孔氏因之則曰賢者難識故特言灼見言其知之審也而陳少南又曰君子小人之心一也小人之心曰克知君子之心曰灼見者蓋小人之心甚難知也一則以君子為難知故克知為略於灼見一則以小人為難知故灼見略於克知豫竊謂君子小人之難知也無有難易而克知灼見亦無有詳略也蓋君子小人之道雖若白黑之不同而其疑似之間相去不能以髮苟其毁譽亂真好惡失正則白黑易位矣世有以小人為君子者以其不知小人之心也使知小人之心則惟恐其不退亦有以君子為小人者以其不知君子之心也使知君子之心則惟恐其不進觀論語之書其論君子小人多矣如君子和而不同小人同而不和驕泰比周皆以君子小人之行事其相反如此則君子小人之心其異甚矣惟知人者視其所以察其所安使其善惡有不能逃則於小人豈不克知其心而於君子豈不灼見其心乎此知人則哲舜之所以為難也惟文武克知小人之心故以三有宅而去之灼見君子之心故以三有俊而進之去小人而進君子此其所以敬事上帝之道也敬事上帝則上帝之所眷顧以有天下故立民長伯也立民長伯先儒謂建諸侯是也王博士曰五國以為屬屬有長二百一十國以為州州有伯立之長以治其屬立之伯以治其州凡以為民而已亦是也蓋文武既有以當天之心故天命之以有天下則封建諸侯而天子端拱於上也此所以立民長伯先儒論立民長伯則是而於敬事上帝以為郊祀則非也夫文武之敬事上帝即禹之尊事上帝湯之丕釐景命蓋言事天之道莫大於得賢而乃以為郊祀之禮不亦迂乎自此以下皆言文武之朝內外小大莫不得人也任人即常任也準夫即準人也牧即常伯也言文武之立政則以此三俊而作三事蓋此三俊其宅是職也莫不各有其事故謂之三事先儒以為天地人之三事誤矣虎賁而下則其小臣也趣馬養馬之官周官凡頒良馬乘馬一師四圉三乘為皂皂一趣馬駑馬麗馬一圉八麗一師八師一趣馬掌贊正良馬而齊其飲食簡其六節即下士也小尹王氏曰小官之正也左右攜僕者蘇氏曰執持器物者百司王氏曰若司裘司服之類庶府王氏曰泉府玉府之類凡此小臣無不得其人也王氏以大都而下為都邑之官司徒而下為諸侯之官其說甚善周官曰乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔乃施法于官府而建其正立其二設其考陳其殷置其輔自庶府而上則所謂官府之臣也大都而下則都鄙之臣司徒而下則邦國之臣也大都小伯所謂建其長也藝人而下則其伍其兩其殷也大都小伯者陳少南曰猶言小大都伯也都邑之衆各有伯常長故以小大二言該之周官曰以小都之田任縣地以大都之田任疆地注小都卿之采邑大都公之采邑王子弟所食邑也藝人凡有技藝者表臣可以為表正者百司都邑之內有所司者上言有司而此又言之則知此為都邑之官明矣太史林子和曰即庶史之大者是也尹伯者都邑之內凡正官之長也庶常陳少南曰凡有常事之人也自庶常以上無非吉士也司徒司馬司空諸侯之三卿也亞其二也旅其衆士也亞所謂伍也旅所謂殷也先儒謂言三卿者武王未伐紂時其意謂武王尚為諸侯故言三卿其說不如王氏而蘇氏又曰六卿獨數其三不及冢宰宗伯司寇者周公以師兼冢宰周公謂蘇忿生為蘇公見蘇公以公兼司寇也而宗伯則召公兼之歟其說之鑿又甚於先儒今所不取微盧見於牧誓蓋西南夷也蒸衆也三亳者皇甫謐曰三處之地皆名為亳蒙為北亳榖熟為南亳偃師為西亳阪險也言夷微盧之衆及三亳之地與夫凡阪險之地為之尹者無不得人也蓋自王朝而後都邑自都邑而後邦國自邦國而後蠻夷其內外之序如此故既言諸侯之官矣則繼之以典掌夷狄之官亦得其人也若夫三亳之尹及阪地之尹此又在王朝都邑邦國之官之外者故特舉之於末也鄭康成則以三亳阪尹共為一事云湯舊都之民服文王者分為三邑其長居險故言阪尹東城臯南轘轅西降谷而唐孔氏以為古書亡滅既無要證未知誰得此言最為近厚唐姚崇嘗曰今止得十使猶患未盡得人況天下三百餘州縣多數倍安得刺史縣令皆稱其職乎崇以十使猶患不得其人而文武之臣大而至於任人小而至於攜僕內而至於王朝外而至於典掌蠻夷莫不得賢則知天下未嘗無賢特無以作之耳乃謂不可以盡得人天下豈有此理哉無乃厚誣天下之人乎然普天之下如此其廣百官之位如此其衆也焉得人人而擇之苟非其執要於上則推之以用人安能人人稱其職乎故文王能宅心則乃立此常事常事既立則夫司牧人者皆能俊而有德也人君以一身之微而應天下之變情僞紛然如瞰回流孰知其為君子孰知其為小人惟宅心則毁譽不可得而汨好惡不可得而搖而常事立矣常事立此俊德之所以在官也季布曰陛下以一人譽召臣以一人毁棄臣臣恐天下有識者聞之有以窺陛下以譽而進之又以毁而退之則常事安得而立哉此無他不能宅心故也惟不能宅心而常事不立故有始於用賢而卒於用佞如唐髙宗明皇德宗憲宗者則俊安能以得志哉荀子曰王道治近不治逺治明不治幽治一不治二既能治近又務治逺既能治明又能見幽既能當一又欲正百是過者也是猶立直木而求其影之枉也不能治近又務治逺不能察明又務見幽不能當一又務正百是悖者也是猶立枉木而求其影之直也夫人君之所以不能宅心者惟其務兼乎庶言庶獄庶慎故也既欲宅心又欲兼乎庶言庶獄庶慎此正荀子之所譏也以一人之身而代百官之所為則日將不暇給不惟庶言庶獄庶愼荒墜而失其序又且失乎宅心之要矣惟以宅心為要者則雖不兼乎庶言庶獄庶慎而此三者各得其條理何者天運於上而四時寒暑自有司之者何必身兼之哉故夫文王之宅心則不兼庶言庶獄庶慎惟以有司之牧夫為急蓋能以有司之牧夫為急則是訓之以賢之可用而訓之以凶之可去用賢去凶則人主之職舉矣所以宅心者此也所知者知此而已庶獄庶慎非文王之所敢知也蘇氏曰庶言有司所下教令也庶獄獄訟也庶慎國之禁戒儲備也蓋此皆有司之事故惟擇有司則其事集矣違去也惟文王之宅心也如此故武王雖率循文王撫安天下之功以不敢廢其義德而其率循文王經綸天下之謀蓋從其容德而已容德即宅心是也義德者伐商是也丕顯哉文王謨所謂容德也丕承哉武王烈所謂義德也言武王雖率循文王之伐功是不替其義德而其經綸天下則惟循文王所以宅心而不兼庶言庶獄庶慎之容德也惟武王之所率者文王之容德則成王之於文王當如何哉武王以此而遂能集文王之大統以並受此大基業則成王亦當以此而持盈守成以保有社稷也嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間之自一話一言我則末惟成德之彥以乂我受民嗚呼豫旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈嗚呼繼自今後王立政其惟克用常人周公若曰太史司寇蘇公式敬爾由獄以長我王國兹式有慎以列用中罰自古國家之隆替興亡不在乎勢之難易而惟在乎賢能之用否桀紂繼世而立貴為天子富有天下則其保有社稷以守前人之基業其勢為易然以不用賢之故遂至於亡國喪家覆宗絶祀雖欲為匹夫而不可得禹為司空湯與文武為諸侯則夫光有神器奄四海而君之其勢為難然以用賢之故遂能克當天心以王天下若探囊中物也今成王以幼沖之年然為王矣所履之位與禹湯文武桀紂同也所御之權亦與禹湯文武桀紂同也禹湯文武之與桀紂其相去不啻千萬里之逺而其原則在於用人之當否王其為禹湯文武乎其為桀紂乎隆替興亡之端蓋兆於此王其無以為幼沖而不之恤也蓋自周公之未歸政也舉直錯枉彰善疸惡以之而維持天下者其責歸之周公王雖端居禁中無用無為可也今既即政而王矣其可不念哉故前既歷叙禹湯文武之所以興桀紂之所以亡者自此而下則戒成王也王氏曰言其繼上帝則曰天子言其繼先王則曰孺子周公之視成王尊則君親則兄之子此非也前言嗣天子王矣者周公率羣臣進戒而贊之言也贊羣臣之言不得不曰天子非有尊親之辨也若順也順者謂其順於道非為其順於君也夫君子之用於朝必使之棄其所習逆其所順強其所劣捐其所能於君為逆矣而於道則順也小人之用於朝阿合諛佞以求媚於上於君為順矣而於道則逆也書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道逆于汝心雖逆而非逆也乃所謂順也遜于汝志雖順而非順也乃所謂逆也蓋正直之言難入而諂諛之說易合故於君子之所順者必灼知之而後能信任之也受民者王氏曰王者之得民上則受之天下則受之先王也惟文武用人之效如此今王既即政繼自今日已往其所以立政立事者惟在于準人牧夫之得其人而已而其所以用之者又在於灼知其所順則君子得志而小人不得掩蔽君之聰明此所以大能使治以相助我所受之民庶獄庶慎各得其條理而無不和也相我受民和我庶獄庶慎此用君子之效也既用君子而享其效則不可以使小人間之也蓋君子小人之道不同若氷炭之不相入不可以共事然一薰一蕕十年尚猶有臭衆小人用事有一君子未能有濟衆君子用事有一小人其為害也必矣蓋君子不得志則奉身而退不肯枉已以求進小人不得志則乘罅抵巇以誘其君期於必進而後已故古者雖其俊乂濟濟號為多士而乃始治而終亂始於用賢而終於用佞者惟其以小人間之故也昔齊威公問管仲曰吾欲使酒腐於爵肉腐於俎得無害霸乎管仲曰此固非其善者然不害霸也公曰何如而害霸曰不能知人害霸也知而不能用害霸也用而不能任害霸也任而不能信害霸也既信而又使小人參之害霸也仲之此言不獨霸道然也我其克灼知厥若知之也丕乃俾亂相我受民和我庶獄庶慎用之任之信之也時則勿有間之不使小人參之也相者猶謂左右有民輔之翼之前於三有宅曰克知三有俊曰灼見而此於準人牧人又曰灼知乃知前所謂克知灼見者無有詳略也末終也夫所以用君子而以小人間之者惟其忘之故也故周公之戒成王自一話一言之間我則終思成德之美士以治我所受之民蓋雖造次顛沛之間而未嘗一出言忘之也其求賢之切如此則小人安得以間之哉夫古之人君急於求賢俊乂如林固足以致治矣而其心猶恐乎山澤之間有埋光鏟采而不肯仕者必欲無一賢之或遺而後已則一話一言之間其終思之也必矣前曰相我受民此曰乂我受民此則史家之駁文不必辨也周公又嗟歎曰豫之所以告成王謂既王天下不可以不擇人者乃我受衆人之美言故悉以告不敢自有之也觀羣臣進戒之言曰王左右常伯常任準人綴衣虎賁周公遂因之曰嗚呼休兹知恤鮮哉則其受人之徽言以咸告其略可見矣夫以周公之聖而其告王之言必歸之他人此其謙德也晉梁山崩壅遏河三日不流晉君召伯尊而問焉伯尊來遇輦者伯尊下車而問焉輦者曰君親縞素帥羣臣而哭之既而祠焉斯流矣伯尊至君問之取輦者之言以告而不歸之輦者孔子聞之曰伯尊其無績乎攘善也亦異乎周公矣文子文孫者王氏曰守成則無所用武曰文子文孫者謂成王也成王武王之文子文王之文孫也是矣言成王既為文王之孫武王之子則繼自今以往庶獄庶慎不可以有誤也惟正是乂之而已先儒以正是為正是之道王氏則謂正一而不可變是變而不可常守正所以立本從是所以趨時楊龜山辨之以為是與則具是依是違之是同而陳少南之說尤為簡易可用曰惟正是乂之者伸前末惟成德之彥以乂我受民之言也乂民之術非他也正仰此成德之美士也蓋欲獄慎之無誤非得人不可周公之陳文王之事則謂罔攸兼于庶言庶獄庶慎而其告成王又欲其無誤者罔攸兼所以勿誤也唐太宗問張元素以政對曰自古未有如隋亂者得非君自專法日亂乎且萬乘之尊身決庶務日斷十事五不中中者信善有如不中者何一日萬機積其失不亡何待若尚賢者能使有司善知則髙居深拱誰敢犯之以是觀之欲獄慎之勿誤必罔兼之而後可也蓋所謂勿誤即所謂和我庶獄庶慎也自古商人此又伸言其事也唐孔氏曰上陳禹湯文武此覆上文惟言湯與文王者言有詳略無别意也則克宅之者即所謂宅乃事宅乃牧宅乃準也克由繹之者又從而紬繹其所行之事也使之宅其職而不紬繹其所行之事則小人得以矯僞而欺君矣能如此乃可以使乂我受民也國則罔有立政此又伸言桀紂之事也言桀紂之國所以不能立政者惟用憸人之不順於德者使其君無顯名在於其世也詩曰樂只君子德音不已得君子而復有令譽故用憸人則無顯名矣不順于德則非所謂丕訓德也憸人小人也惟桀紂以用憸人而無顯名故成王繼自今以往凡所以立政者勿用憸人惟用吉士使之勱相我國家也勱勉也勱相言勉力以輔其君猶所謂勱翼也今文子文孫孺子王矣以下此又申言之丁寧委曲期成王之心明白而不疑也此篇初言常伯常任準人既而言宅乃事宅乃牧宅乃準既而言任人準人牧夫雖其序不同而三者並存也既而特言準人牧夫既而又特言牧夫或特言有司牧夫初言庶言庶獄庶慎既而特言庶獄庶慎既而又特言庶獄此正上言禹湯文武而下惟言商與文王唐孔氏所謂言有詳略無别意者是也正如大誥或言邦君尹氏庶事御事或言邦君庶事御事或言邦君御事其或言或不言者豈其有在有不在乎而說者於言準人牧夫則以立事為常任言庶獄庶慎則以是訓用違為庶言夫立事者即立政也安得以為常任之官而以是訓用違為庶言其鑿尤甚至其特言庶獄牧夫則又曰獄者政之終牧者官之長官舉其長政舉其終則無不舉矣此皆強為之說也其克詰爾戎兵者為國有本末得人以立政則其本立矣然後可以制服天下也昔裴度嘗言於唐以為逆豎搆亂震驚山東姦臣作朋撓敗國政陛下欲掃蕩幽鎮先宜肅清朝廷何者為患有小大議事有先後河朔逆賊秪亂山東禁闥姦臣必亂天下是則河朔患小禁闥患大以此觀之則詰戎兵必在於用人之後也詰治也詰戎兵者所謂除戎器也言其治此戎器以升行禹之舊迹各以其方而行于天下至于四海之表無有不服者此皆其用人之成效也蓋夫四海之表所以無敢不服者固不在於戎兵然戎兵不可不誥蓋除戎器戒不虞之道也若夫晉武帝之去武備唐蕭俯之鎖兵則昧夫詰戎兵之道而唐太宗漢武帝窮兵於萬里之外疲弊中國以求四夷之來臣則又失夫詰戎兵之本意矣耿光言其光明之德也夫用人立政而至於海表賔服則足以顯文王之明德亦足以揚武王之大業也覲見也見其耿光則其德顯矣能如是則成王之為文子文孫之道盡矣周公又終戒成王言自今以往其立政也必用有常之人焉蓋惟君子而後有常若夫小人則乍賢乍佞其未得志則痛自矯飾以欺世俗而盜名既得志則其真情見矣故惟求其有常之人而用之則小人不得以濫退也此篇或曰俊德或曰彥或曰吉士或曰常人雖則不同皆君子之美稱也而說者謂常人不如吉士吉士不如彥彥不如俊德思其上不可得則思其次亦鑿也太史官名也周公呼太史而告之曰昔蘇公之為司寇敬於用獄以長我王國長我王國所謂其寧惟永也今此亦當於用獄之法而慎之以其列而用輕重之中者也左傳曰昔周克商使諸侯撫封蘇忿生以溫為司寇是蘇公者武王之司寇也列者蘇氏曰前後相比猶今之言例也其惟克用常人以上此篇之義足矣而繼之以此者意者上言庶獄而使遂取此以繼其後乎不可得而見也王氏謂立政之意始於知恤而終於用中罰者蓋知人而官使之上下小大各任其職不迪者糾之以法政之所以立也王氏此言蓋為新法地爾自司寇蘇公以下雖則數言而吕刑一篇之意盡於此矣如禹謨云德為善政政在養民水火金木土榖惟修正德利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壞而箕子洪範一篇之旨亦備見於此大抵聖人之言約而言之則雖數語而不為不足推而演之則雖百言而不為贅此後世能言之士所以莫能加也尚書全解卷三十五
