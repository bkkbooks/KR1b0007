body:
  text: 尚書全解卷十一宋林之竒撰禹貢夏書九州攸同周禮職方氏辨九州之國使同貫利蓋必先辨之於其始然後可以同之於其終不有以辨之則亦無自而同之也禹貢所載冀州既載壺口以下列敘九州之疆界治水之曲折與夫田賦貢篚所入之多寡所輸之逺邇其所以辨之者纎悉盡矣自九州攸同以下又所以同之也蓋有以辨之則廣谷大川異制民生其間異俗五味異和器械異制衣服異宜各得其所而不相雜亂故有以同之則車同軌書同文行同倫各要其所歸而不見其為異此先王疆理天下之大要也故序言别九州隨山濬川任土作貢此蓋所以緫結治水制貢之意於其始此則曰九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海㑹同六府孔修庶土交正底慎財賦咸則三壤成賦中邦是又所以緫結其治水制貢本未之意於其終也序言别此言同雖所從言之異其實先别而後同也四隩既宅孔氏曰四方之宅皆可居唐孔氏以謂室隅為隩隩是内也人之造宅為居至其隩内遂以隩表宅案爾雅曰室西南隅之奥以隩為室隅當讀曰奥不得讀為隩矣隩既為室隅矣而又曰既宅則其文亦為重復案詩淇澳音於六切王氏曰隩隈也孫大夫曰隈水曲中也又曰崖内為隩李廵曰崖内近水為隩則是淇澳者是淇水之隈曲處也此隩當與淇澳同蓋當洪水為患崖内近水之民猶不得安其居至於懐襄之難既平水由地中行然後四方之民居崖内水曲者皆得安其居在水涯者猶得安其居則居平原曠野者蓋可知矣九山刋旅九川滌源九澤既陂九山刋旅謂九州名山皆槎木通道而旅祭矣九川滌源謂九州之川皆已滌除泉源而無壅塞矣九澤既陂謂九州之澤既巳陂障無所泛溢矣其所謂九山九川九澤皆是泛指九州之山川澤而言之也於山曰刋旅於川曰滌源於澤曰既陂各言其所施功之實也唐孔氏云上文諸州有言山川澤者皆舉大綱而言之所言不盡故於此復更緫而言之此説是也太史公有導九山九川之文説者因此遂謂所刋旅者自岍及岐至於敷淺源之九山也所滌源者自弱水至於洛之九川也既以岍岐以下為九山弱水以下為九川於是遂以雷夏大野彭蠡雲夢滎波菏孟豬為九澤太史公雖無九澤之明文徃徃其意亦將以是為九澤此皆牽强附㑹非經之本意也施博士雖有適然可合之數然求其意則無必然可信之理然則九山九川九澤皆以九州而為言矣此説是也四海㑹同六府孔修庶土交正底慎財賦咸則三壤成賦中邦此又重述其制貢之事也洪水汎濫於天下四方道路皆遏絶而不通至於禹治九州之功畢每州之末皆載其逹於河之道如江不通淮則曰㳂于江海逹于淮泗沱潛漢不通洛則曰逾于洛至于南河或航海或陸運而皆以逹河為至至於是則北自碣石西自西傾南東盡海之地皆有通於帝都之道此四海之所以㑹同也六府孔修即大禹謨所謂水火金木土榖惟修是也孔修甚修也四海㑹同則有輸貢賦之道矣六府孔修則有輸貢賦之物矣於是繼之以庶土交正底慎財賦咸則三壤成賦中邦也漢孔氏曰交俱也衆土俱得其正謂壤墳壚所慎者貨財貢賦言取之有節皆法壤田上中下大較三品成九州之賦據孔氏之意蓋以謂中邦者指九州而言之也由孔氏為此説諸儒因之遂皆以中邦為諸夏謂土貢及於四夷而田賦則止中夏而已蘇氏王氏張諌議之説皆然然而以中邦為九州則與上文四海㑹同文勢不相貫又未足以見禹貢重敘成賦中邦之意不如顔師古之説為善顔師古以謂庶土各以所出交易有無而不失正致慎貨財以供賦貢皆隨其土地田上中下之三品成其賦於京師也中邦京師也案孟子曰舜避堯之子於南河之南然後之中國踐天子位焉自河南而之冀都則以謂之中國是中邦指京師而言之也顔師古以中邦為中國意亦類此蓋成賦於京師則與上文四海㑹同六府孔修庶土交正底慎財賦之意相屬矣九州之下所敘九等之賦但言其多寡相較之差而巳未言其所以充賦之物也故此既言四海㑹同六府孔修矣於是遂言其所充之物謂九州之内所制之賦使之各以其土地所出之正物轉相交易懋遷有無化居以之充其所入之賦若後世之支移折變也雖交易其所出之物以充賦然數之多寡實以田之三壤為凖三壤即九州之内所謂上上上中上下中上中中中下下上下中下下是也蓋賦本出於田故其支移折變則隨其田賦多寡之數而致之於京師也如下文五服所敘其輸禾藳粟米於都城者為甸服五百里之地而巳五百里之外則逺不能致使其亦輸租秸粟米於都城如畿内之五百里則其費大矣故禹惟以其田賦所入之數定其多寡而其輸於京師則得以支移折變而致之如此則其力簡其費省且有懋易有無之利及於斯民其為公私之利大矣本朝都汴京亦取漕運之利江淮歳漕六百萬石楚泗以上㳂流置轉般倉其張官置吏舟船廪庾之費歳以百萬計議者以轉般為煩擾更置直逹法而其弊愈甚其費愈多又為江淮舟船數十郡之害夫以汴都之距江淮蓋甚近也而歳漕江淮之米於汴都其弊猶如此况冀州逺在九州之北而荆楊之壤逹於帝都者或須航海或須陸運苟使之輸其田賦所出之本物則其費為如何邪故使得以支移折變而致之則荆楊之地如金錫竹箭之類皆得以懋遷有無而充賦也錫土姓錫土姓者於是始可以疆天下封建諸侯而成五服也左氏傳曰天子建國因生以賜姓胙之土而命之氏蓋胙之土即所謂錫土是也命之氏即所謂錫姓是也如契封於啇賜姓子氏稷封於邰賜姓姬氏必在於此時以稷契觀之則其他諸侯皆然陳博士曰當洪水未平之初有國者亦皆有土有宗者亦皆有姓至是則錫之徧矣是也祗台徳先不距朕行當洪水未平之時懐山襄陵浩浩滔天下民昬墊其政教之所施蓋自有壅遏而不得行者至於川澤既平貢賦既修疆天下以封建諸侯而錫土姓則治既定矣功既成矣天下復何為哉惟欽我徳以為先則下之人無有距違我之行者此所謂恭已以正南面也施博士曰祗台徳先不距朕行何羡預於治水之事而於此言之者當洪水未平之時四方諸侯其於㑹同之禮有廢而不講者則其於祗上之徳亦闕如也然則徳雖出於上之所為而能使之祗台不距者禹預有功焉故舜稱之曰廸朕徳時乃功惟敘其意亦合於此善哉此説也五百里甸服前所言者九州之山澤川浸與夫田賦貢篚之詳纎悉盡之而其所以疆界天下以為京師諸夏夷狄之别者猶未之見也於是遂言五服逺近之制周官職方氏辨九州之國使同貫利自東南曰揚州至其榖宜五種既列序九州之詳乃繼之曰辨九服之邦國自方千里曰王畿以下遂言其所以為九服者此蓋倣禹貢書而為之也然其所記載則有不同者此篇自甸服至於荒服每面二千五百里四面相距為方五千里職方氏方千里為王畿王畿之外為九服每服亦以五百里為率并王畿而數之則有萬里之數故諸儒疑焉或以謂周公斥大境土其地倍施於堯禹之世此蓋未嘗深考此二書之所載徒見其所序者皆以五百里為言遂從而為之説耳禹之五服與職方氏之九服所謂五百里者職方氏則自其兩面相方而數之惟禹之王畿在五服之内而自其四面而數之故禹之五服自畿服至於荒服每二千五百里四面相距為方五千里至於職方氏王畿不在九服之内而以二面相方而數之故九服之内有方千里之王畿王畿之外每面二百五十里二面相方為五百里之侯服侯服之外每面二百五十里二面相方為方五百里之甸服故自王畿之外至於藩服每面二千七百五十里四面相距各為五千五百里其所以増於禹貢者但有五百里耳安得萬里之數邪漢地理志云漢之境土東西九千三百二十里南北萬三千三百六十八里則是漢之輿地不啻萬里故言周之九服有萬里者徃徃推此以為據唐孔氏云漢之山川不出禹貢之域山川載地古今必同而得里數異者堯與周漢其地一也尚書所言據虚空鳥路方直而計之漢書所言乃謂著他人跡屈曲而量之所以其數不同也唐孔氏此説其謂堯與周漢其地一也此誠確論若以虚空鳥路方直而計里數則古無此理以某觀之山川不出禹貢分域而得有里數倍加者古今之尺不同耳王制曰古者以周尺八尺為歩今以周尺六尺四寸為歩古者百畆當今東田百四十六畆三十歩古者百里當今百二十一里六十歩四尺一寸二分蓋古今歩尺長短盈縮隨世不同故其里數廣狹亦異此王制所載但是自周初至於戰國數百年間而其所差已如此竊謂職方氏之九服所謂五千里者即禹貢五服所謂五千里漢之山川除武帝開闢四夷所載武威酒泉南海蒼梧數十郡之外其他州郡皆禹貢五服之地禹之聲教東漸于海西被于流沙朔南暨聲教訖于四海是其要荒之所暨則皆巳至於極邊之地縱使後世人君能於禹貢五服之外開拓邊境其所得者不過磽确不毛之地得之無所益失之無所損者周公曰其克詰爾戎兵以陟禹之迹方行天下至於海表罔有不服所貴乎詰戎兵者不過陟禹之迹而巳其或甘心於禹迹之外以開拓邊境増廣分域者是皆出於好大喜功而為之也故王者之疆理天下將欲制為京師諸夏夷狄之辨者當以禹貢之書為正孔氏曰規方千里之地謂之甸服去王城面五百里蓋禹貢之甸服在於五服之内自王城之外每面五百里之地為甸服也甸田也主為天子治田也王制曰天子之田方千里公侯方百里伯七十里子男五十里此服之内主為天子治田而輸之於上故以甸服為名百里賦納緫至五百里米可見其治田所輸之事也百里賦納緫二百里納銍三百里納秸服此所敘五服先提其里數與其名於上然後列其每服之内逺近差等於其下甸服分而為五其實即上文所謂五百里甸服非於甸服之外又有此五百里也先儒徒見經文之重複故賈逵馬融以為甸服之外百里至五百里特有此數去王城千里其侯綏要荒服各五百里是面三千里相距為六千里夫經於侯綏要荒之下皆有細數而謂甸服特有此數故不可也鄭康成又謂五服之别五百里是堯之舊制及禹於每服之間更増五百里而别至於五千里相距為方萬里此其説不惟道里之逺近與經不合然記載之體亦有所不便者甸服之外五百里所輸者果何物邪侯服之百里采二百里男邦三百里諸侯各有所建矣彼侯服之外五百里所建者果何國邪則是知其説之不通也惟孔氏於百里賦納緫之下注曰甸服内之百里於百里采之下注曰侯服内之百里此則是經之本意也甸服五百里之地皆為天子治田輸之於王城者也然地有逺近則其所輸之物亦有精粗輕重之異也近者粗逺者精近者重逺者輕各量其力之所任而為之差也謂之賦納緫者以見其所輸者皆田内所出之賦也所出賦同惟其所納之物固有不同而巳距王城之百里其地最近故使之納緫者藳與穟併納之也二百里則稍逺矣故納銍銍者刈禾鐵也謂刈禾穟而納之不輸其藳也三百里則愈逺矣故納秸秸藳也納秸易於納穟蓋逺則彌輕也雖納秸為彌輕然計其所直則四百里猶且納粟而三百里乃能納藳秸比於納粟則太優矣故唐孔氏以謂藳粟别納非是徒納藳也據經文但曰納秸安知其為與粟兼納乎考之經文緫銍粟米下皆無服字而此獨有服字則知納藳雖優其所相補除者當必在此顔師古曰秸藳也服者言有役則服之王氏曰納秸而服輸将之事也以正在五百里之中便於畿内移用故其利薄於粟米以正在五百里之中便於移用又使之服輸将之事則其利之所出足以補其財之所入財之所入足以優其力之所出矣此説為盡唐孔氏謂於此言服明上下服皆並有所納之役也則失其㫖矣四百里粟五百里米四百里五百里則尤逺矣故納粟米蓋愈逺則愈輕也薛氏曰曰粟焉曰米焉則為輕矣夫禹之取於民者不過什一之法耳令其所納之物有如此之不同漢孔氏以精者少粗者多唐孔氏曰直納粟米為少禾藳俱送為多其於税皆當什一但所納有精粗逺輕而近重耳此説皆是也上文九州皆言田賦此之所載但及夫五百里之甸服者鄭氏曰侯綏等所出賦税各入本國則亦必有納緫銍之差此但據天子立文耳薛氏曰畿内天子之居其所頼以養天子者在此千里之民而已故所賦所納備言於此蓋餘服則賦各歸其國故禹貢略之義或然也觀經文於賦納銍之上特加一賦字則凡賦之出於田者皆可以觸類而通之矣故自侯服以下但言建國逺近之制而不及所輸之物其辭不費使讀之者自以意曉又述作之體也五百里侯服百里采二百里男邦三百里諸侯此蓋甸服之外五百里則建侯服以封親賢使各守其人民社稷以為天子之藩衛也近王畿百里則建卿大夫所食之采地又其外百里則建諸男之邦又其外之三百里則皆諸侯也必先采地與男邦乃及諸侯者先小而後大小者近而大者逺也所必如此者王氏曰欲王畿不為大國所迫而小國易獲京師之助此説為善輸賦税則逺者輕而近者重建侯邦則逺者大而近者小逺近大小輕重莫不有法於其間而疆理天下之制盡於此矣二百里納銍三百里納秸服四百里粟五百里米皆為天子治田者也故以甸名之百里采二百里男邦三百里諸侯皆封建親賢為王室藩衛者也故以侯名之其服名如是則制服之差等亦如是此其所以為善疆理者也若周之九服則不能如是矣方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服甸服乃在侯服之外采服又逺於男服其制度必不能與其名相稱考之周制采服在王畿之内而公邑之地謂之邦甸亦在王畿之外侯邦與男邦雜建於天下之間無復逺近之别則是周時所謂九服之名始借夫是名以為逺近之别矣其制度實未嘗與之相稱也由是觀之疆理天下雖出於洪水既平一時之事然考其制度實萬世所不可企及之功也嗚呼美哉禹功明徳逺矣五百里綏服三百里揆文教二百里奮武衛先王之疆理天下尤謹於華夷之辨其所以畫郊圻而固封守者尤極其嚴王畿之外既封建諸侯之國使之小大相維强弱相比以為王室之輔矣而其外之三百里則接於邊陲蓋其外則要荒之服也故於此設為綏服以為内外之辨此服之内所建之國所立之制凡欲撫安邊境衛中國而已故其名曰綏服此綏服五百里亦分為二節其内之三百里接於甸侯者則揆文教其外之二百里接於要荒者則奮武衛揆文教者揆中國之教也或問揚子雲曰八荒之地禮也樂也孰是曰殷之以中國或曰孰為中國曰五政之所加七賦之所養中於天地者為中國過此以徃人也哉聖人之治天下也礙諸以禮樂無則禽異則貉吳秘注云礙止也止以為凖此篇於綏服三百里謂之揆文教其實奮其威武守衛中國不純以中國文明之治也左氏傳曰成王選建明徳以藩屏周封伯禽於少皡之墟封康叔於商墟皆啓以商政疆以周索封唐叔於夏墟啓以夏政疆以戎索蓋魯衛之地在於文教所揆之内故疆以周索至於晋之分地界於太原晉陽之間迫近戎狄故疆以戎索索法也謂疆理其土地以治戎之法即此所謂奮武衛也薛氏曰今之邊徼右軍旅而略文徳與此同意此説是也蓋先王之所頼以守衛中國惟在此二百里之地而已此二百里之地不失武備則中國之内可以奠枕無虞而夷狄之民安於邊鄙之外不至有卒然不可制之患蓋夷狄之於中國本不敢有侵侮窺伺之意惟中國失其所以為武備者則狼子野心於是始敢肆其貪惏之志如漢魏而降夷狄之内附者皆得以入居中國障塞之内是以至於西晋則有劉元海石勒之變石晋以幽涿檀十六州之地貽契丹盡失中國之障塞故至於末帝而有邪律徳光之變自古遭夷狄之患未有如晋之酷者然此二國亦皆有以致之然也一則使夷狄入居中國之障塞一則貽中國之障塞於夷狄譬猶決圈檻而縱虎狼彼安得而不噬人者哉是知疆理天下以綏服二百里為奮武衛之地以為華夷之辨此真萬代不可易之法也五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流東坡曰夷狄不可以中國之治治也譬若禽獸然求其大治必至大亂是以君子以不治治之則乃所以深治之也自綏服之外皆是夷狄之地中國禮樂正朔之所不及禹雖畫為五服其實外之而不治之以中國之治也顧其命此服之名則可以見矣綏服之外五百里其名曰要謂之要者姑但羈縻之而巳矣唐孔氏曰要服之名曰要見其踈逺之也要服外五百里其名曰荒謂之荒則比之要又簡略矣漢班超為西域都䕶甚得夷狄心超被召還任尚代之尚謂超曰君侯在外國三十餘年而某猥承君後宜有以誨之超曰塞外吏士本非孝子順孫蠻夷懐鳥獸之心難養易敗宜蕩佚簡易寛小過緫大綱而已禹名境外之服謂之要荒正超所謂蕩佚簡易之意也要服三百里謂之夷荒服三百里謂之蠻蓋此乃徼外蠻夷之地也禮記曲禮曰其在西戎北狄東夷南蠻雖大曰子王制曰東方曰夷南方曰蠻西方曰戎北方曰狄此蓋以四者相對而言之則有此四方之名若但舉其一二字而為言則四者皆可以通稱夷不必是東方曰夷蠻不必是南方曰蠻如經云蠻夷猾夏又曰蠻夷率服此又以蠻夷而屬之於要荒之服則是唐虞之世蓋以蠻夷為境外種之緫稱亦如或曰戎狄或曰戎夷皆泛而言之非指其所居之方也要二百里蔡先儒只作蔡字讀案左氏傳定四年殺管叔而蔡蔡叔杜元凱注蔡放也陸徳明音素逹反此云二百里蔡當亦是放罪人於此宜從左氏作蔡字讀荒服二百里流流罪人於此猶經所謂流共工是也薛氏曰先王之於罪人以其不可以中國畜之也故流放焉夷狄之而巳矣此論為善然而要服之三百里夷其外二百里是亦夷也而謂之蔡荒服之三百里蠻其外之二百里是亦蠻也而謂之流者蓋其外之二百里其地為最逺中國之人有惡積罪大而先王不忍殺之者則投之於最逺之地於要荒二服取其最逺者言之以見流放罪人於此若其為蠻夷之地則蒙上之文而可見也據此論蓋五服之名與其每服之内逺近詳略皆是當時疆理天下之寔迹也故於侯服則言其建國小大之制至於要荒則言其蠻夷逺近之辨與夫流放輕重之差皆所以紀其寔也而孔氏論此又不求於疆理天下之制而乃於字上生義附㑹繳繞最為難通於侯服云侯侯也斥侯服而事於百里采為供王事而已於二百里男邦云男任也任王者之事於三百里諸侯云同為王者斥侯於五百里要服云要束以文教於三百里夷云守平常之教於二百里蔡云蔡法也法三百里而差簡於三百里蠻云以文徳來之不制以法二百里流云流移也言正教隨其俗凡此等説今皆不取東漸于海西被于流沙朔南暨聲教訖于四海此言九州疆界之所抵以見其聲教之所暨也考之上文海岱惟青州海岱及淮惟徐州言青徐之境東海也故曰東漸于海雍州之弱水既西弱水至于合黎餘波入于流沙是雍州之界抵於流沙揚州曰淮海惟揚州則是揚州之界抵於南海冀州夾右碣石入于河河之入海在碣石之右則冀州之界抵於北海故曰朔南暨聲教訖于四海朔南不言其所至者連下文而互見也聲教者言文徳之所及也薛氏曰聲謂風聲教謂教化振於此而逺者效焉故謂之教曰漸曰被曰暨者皆言其境界之所及特變其文爾非有淺深詳略之不同而説者乃謂東方之民仁而易化故言漸漸者浸而深也西方之民信而難變故言被被者被乎其外而已南方之民詐而多忒北方之民勇而善悍故言暨此虚説也夫禹之聲教其所及者蓋無所不深也今言東方之民為易化故言漸漸者浸而深而西方則善執而難變南方則詐而多忒北方則勇而善悍故但被之暨之信斯言也則是禹之聲教所及之深者惟東方之民而巳豈非以文害辭以辭害意哉下文既曰訖于四海則是四方皆至於海矣而西獨言被于流沙者蓋水之西流至此而極不見其所歸未可以正名其為海也故王制曰西不盡流沙東不盡東海亦惟以東海對流沙也某於導弱水至於合黎餘波入于流沙巳詳言之矣此篇既言九州山川分域又及夫五服疆理内外之辨末乃言九州境界之所抵先後彼此互相發明至纎至悉可謂無餘藴矣某嘗以斯言考其疆理天下之制而參以王制之所載則誠有可疑於其間王制曰自恒山至於南河千里而近冀州自河南至於江千里而近豫州自江至於衡山千里而遥荆州自東河至於西河千里而近亦冀州自東河至於東海千里而遥徐州自西河至於流沙千里而遥雍州西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之内斷長補短方三千里則是九州之地方三千里也五服之制王城之外每面五百里為甸服又其外五百里為侯服又其外五百里為綏服自甸服至綏服每面一千五百里四面相距為方三千里此九州之地也以天下之輿地分為五服則是自甸服至綏服九州之内也要荒二服則在九州之外此五服之制也然以九州四面之所距而考之則不能無疑焉自恒山至於河南千里東河至於西河千里此蓋畿内之千里即甸服也自東河至於東海千里自西河至於流沙千里此千里之地建五百里之侯服又建五百里之綏服而東海流沙之外則為要荒服今夫經之所載至於南北則有盈縮焉以北考之冀州之北距於恒山則巳接於邊陲矣其何以容五百里之侯服又何以容五百里之綏服又何以容五百里之甸服邪以南考之自南河至於江千里則已建侯服綏服矣自江至於衡山千里則要荒二服蓋巳在九州之内而自衡山至於南海蓋又将有千里之地五服之制至衡山則已盡矣而揚州之境南距於海者猶未之盡也以南言之則太贏以北言之則太縮此寔某之所深考而未知其説也大禹之功萬世永頼與天地同垂於不朽其書之傳所以為法於萬世則其制度不容如是之差意其必有所乗除相補以為疆理天下之定制某淺陋未足以知此請闕之禹錫𤣥圭告厥成功此有兩説孔氏曰禹功盡加於四海故堯錫𤣥圭以彰顯之王氏曰禹錫𤣥圭於堯以告成功也此兩説皆未敢以為然堯錫圭於禹而謂禹錫𤣥圭其文為倒置矣臣以圭而錫君載籍恐無此理以某所見此是禹以𤣥圭告成功於天耳周官典瑞云四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望祼圭有瓉以祀先王圭璧以祀日月古者交於神明必用圭璧如周公之禱於三王亦曰植璧秉珪禹之治水至於九州攸同四隩既宅地平天成六府三事允治於是錫𤣥圭而告成功也然而必用𤣥圭者蓋天色𤣥因天事天猶蒼璧然也其曰錫者與師錫帝曰納錫大龜同古者下錫上亦可謂之錫也尚書全解卷十一
