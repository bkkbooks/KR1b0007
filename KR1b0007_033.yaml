body:
  text: 尚書全解卷三十三宋林之竒撰君奭周書召公為保周公為師相成王為左右召公不説周公作君奭君奭周公若曰君奭弗弔天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出于不祥嗚呼君已曰時我我亦不敢寧于上帝命弗永逺念天威越我民罔尤違惟人在我後嗣子孫大弗克恭上下遏佚前人光在家不知天命不易天難諶乃其墜命弗克經歷嗣前人恭明德在今豫小子旦非克有正迪惟前人光施于我沖子又曰天不可信我道惟寧王德延天不庸釋于文王受命周官曰立太師太傅太保兹惟三公師保者三公之官也三公之官皆所以教導天子而其名不同文王世子曰師也者教之以事而喻諸德者也保也者謹其身以輔翼之而歸諸道者也賈誼曰保保其身體傅傅之德義師道之教訓此皆緣名以生義案周官之載六卿自冢宰而下所掌之職不同而三公則同曰論道經邦變理隂陽而已不分别其職蓋三公皆王者之師既同以經邦論道為職豈可從而區别哉唐孔氏曰經傳皆言武王之時太公為太師此言周公為師蓋太公薨命周公代之其時太傅蓋畢公為之案詩曰維師尚父毛氏曰師太師也左傳僖二十六年昔周公太公股肱周室夾輔成王成王勞之而賜之盟載在盟府太師職之襄十四年昔伯舅太公股肱周室師保萬民世胙太師以表東海唐孔氏所據經傳言太公為師正謂此也太公既為太師而召公為太保則周公必為太傅故賈誼曰召公為太保周公為太傅太公為太師而傅亦曰道者導天子以道者也常立於前是周公也充者充天子之志者也常立於左是太公也弼者拂天子之過者也常立於右是召公也丞者丞天子之遺忘者也常立於後是史佚也意謂太公立左召公立右禮所謂師保周公立前史佚立後所謂太傅在前少傅在後是亦以周公為傅也案金縢篇言二公欲為王穆卜而周公不可及成王即位管蔡流言周公東征而二公因風雷之變導王以啓金縢則武王之世及成王之初所謂三公者惟周召太公耳太公為師召公為保周公為傅雖無所經見意或然也太公既薨故周公自太傅代之為師鄭康成注禮記曰齊太公受封留為太師死葬於周唐孔氏之説亦與此同史記謂太公當武王平商之後即東就國非也左傳既有周公太公夾輔成王之言而謂武王之世已東就國可乎意者太公雖受封於齊而入為太師若衛武公入相於周鄭桓公為周司徒之類故當武王之有疾成王之啓金縢太公咸在也其謂畢公代周公為太傅者以顧命知之也顧命曰乃同召太保奭芮伯彤伯畢公衛侯毛公奭稱太保而畢毛稱公則當時之三公也康王稱畢公為父師則畢公於三公蓋太師也自陜而東周公主之而康王之誥諸侯畢公率東方諸侯入應門右周公之薨畢公代之為太師可見矣周公之薨畢公既代之為師則其自太傅而為太師畢公代之為傅亦可以逆推唐孔氏之説意或出此召公為保畢公為師意者毛公其太傅歟此正猶左氏傳記載晉國三軍之將佐雖其首尾不備見於傅然以前後參考可以知某人者必某人代之也然則周公之於三公蓋自傅而後為師召公之為太保自武王至於康王其職任未嘗移也相成王為左右者言周召以師保而為成王左右之相説命曰王置諸其左右命之曰朝夕納誨以輔台德周召之為左右相是亦陳善閉邪以輔成人主之德也惟周召既為左右相故因命以為二伯分總天下之諸侯王制曰八伯各以其屬屬於天子之老二人分天下以為左右曰二伯是也公羊曰自陜以東者周公主之自陜以西者召公主之正謂此也公羊此文合於書太保率西方諸侯畢公率東方諸侯之言但其論天子三公既已分陜東西為其二矣又以一相處乎內以足其數此則不可夫三公者師傅保之謂也天子雖有三公而其分總諸侯者則命其二焉非是分陜者皆不居於京師而惟其一處於內且公羊謂周召既出而分陜則其在人主之左右者果誰乎蓋其不知師傅保之為三公故其説乖戾至此召公自武王時已居太保之位至於成王即政之後將欲與周公謝事告老召公之意謂吾二人者輔翼成王使之見正事聞正言行正道以成其德王既聽政故可以歸也而猶以師保為王左右之相此其所以不恱故周公作此篇言已不得不留輔成王兼留召公共政蘇氏曰周公何以不歸也察成王之德未可以舍而去也周公齊百官以輔王而王之所用悉其私人受教於王者此其德豈能離師友而弗反也哉此説是矣然不獨此也殷之餘民染紂之化草竊姦宄無所不為至康王之世而其餘風猶未殄雖武庚之變志不克逞而其心猶冀天下之有變以僥幸萬一苟一舉措之失宜則彼將乘間而起矣此周公所以長慮却顧而以為不可告歸也史記曰成王既幼周公攝政當國踐祚召公疑之作君奭而唐孔氏又謂召公以周公嘗行王政今復在臣位其意不恱漢孫寶亦曰周公上聖召公大賢尚猶有不相恱是皆以召公不知周公之心程伊川二蘇兄弟王氏破之詳矣然諸家之説猶有異同者伊川曰看此一篇是周公留召公之意是也然謂召公初升為太保與周公並列其心不安故不恱則非也召公與周公為三公武王之世已然矣豈至是初升哉王氏謂成王非有過人之聰明而出於文武之後人習至治之時為難繼故召公於其親政之始有不恱也案此篇之言皆是周公以天命之難諶懼成王之弗克負荷以忝前人之成憲故已雖致政而不敢告歸若王氏之説召公既以成王親政為憂矣周公當言成王之德可以光大文武之緒乃能解召公之憂不當又以是為言矣小蘇謂不恱其歸政考之篇中亦無所見今周公但陳商代之臣皆世德耆艾以保乂王家并及虢叔閎夭之徒亦皆事周數世既昭文王受有殷命又昭武王咸劉厥敵意謂吾二人者皆周之元老無去之之義所以皆不得不留也唐孔氏曰三公之次先師後保此先言保者篇之所作主為召公不恱故先言召公不以官位為次也夫先言保而後言師此亦如酒誥先圻父而後農父皆其一時之言不可以為之説也此篇序正與湯誓大誥同所作之故惟見於序而於篇首未嘗及之世皆以序為出於孔子之手如此等序使其無所傳記孔子生於數百載之下何由逆知其故乎故某以為必是歷代史官遞相傳授以為書之總目孔子因而次第之也奭召公名也曰君奭者尊之之稱君陳君牙皆尊之故曰君也尊之為君正如棄謂之后稷曰后曰君一也周公呼召公之名而告之言殷紂以自絶於天之故故不為所弔恤而降喪亡於殷殷既亡而周以世世修德之故天監代殷莫若周是以我周遂受天命以有天下也先儒讀弔字音的非也周雖受天命代殷以有天下然其歷祚之長短在於不可測度之間故我所不敢知其基業將永信于休乎若其果輔我之誠乎或其終出于不祥乎皆不敢知也不敢知者疑之之辭以為必有不可也以為必無不可也雖天之吉凶禍福若影響然未嘗有毫釐之差然不可知其所以然之故故周公謂不敢知召公則已嘗曰是在我而已若能祗懼天命不敢荒寧則必將永孚于休永孚于休雖不敢知而其不敢荒寧于上帝命則可得而知也苟不能長逺念天威之可畏及教化我民使無尤過違闕則必將終出于不祥終出于不祥雖不敢知而其弗念天威及我民則可得而知也蓋永孚于休終出不祥在天而不敢寧于帝命弗念天威及我民則在人在天者不可必在人者可必故繼之以惟人先儒以惟人屬於下文而以罔尤違為絶句故王氏因之曰前既言在天者今此言在人者故曰惟人也不如蘇氏以惟人為絶句其意為勝君已曰時我指召誥所陳之言召誥言敬德則祈天永命不敬德則早墜厥命命之修短不在天而在人故周公告召公多援召誥之言而為之反覆辨明曉人者當如是也後嗣子孫謂成王也惟其吉凶禍福不在天而在人其在成王今苟不能恭嗣天地而遏絶放佚前人光明之德蓋其在於深宫之中安於富貴謂天命可以長享而不知其不易有德則興無德則亡命之不可信如此今既失德則將墜其命弗能經歷久逺以享有天下繼嗣前人而恭奉其明德也我之所以不去蓋為是也在今我小子之留輔成王非能自以為有所正以格君心之非也但欲蹈行前人光明之德以施於成王幼沖之人則可以弼成王德以永享天命矣周公又以謂天命不可信我之道王惟以寧王之德施之則可以延長使天不用舍文王所受之命以命他人也蓋天雖以文王之有德故命之作周苟嗣王之失德則天將釋之其不可信如此則我之不去惟欲以延周家之命而已夫留輔成王以延周家之命使之享卜年卜世之永此大節也功成名遂奉身而退此小亷也召公之欲告歸蓋欲盡為臣之義周公之所慮者逺故不以小亷而妨大節此篇之所為作也公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤率惟兹有陳保乂有殷故殷禮陟配天多歷年所天惟純佑命則商實百姓王人罔不秉德明恤小臣屏侯甸矧咸奔走惟兹惟德稱用乂厥辟故一人有事于四方若卜筮罔不是孚公曰君奭天夀平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦公曰君奭在昔上帝割申勸寧王之德其集大命於厥躬惟文王尚克修和我有夏亦惟有若虢叔有若閎天有若散宜生有若泰顛有若南宫括又曰無能往來兹迪彜教文王蔑德降于國人亦惟純佑秉德迪知天威乃惟時昭文王迪見冒聞于上帝惟時受有殷命哉武王惟兹四人尚迪有祿後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱德中才之主可與為善亦可與為惡輔之得其人則至於堯舜不難也輔之非其人則至於桀紂不難也周成王中才之主也當幼沖之年即天子之位管蔡流言而王有疑周公之心及其感風雷之變然後遇災而懼深知周公之忠豈非可與為善亦可與為惡乎故雖周召為之輔翼或推或挽使之所言者正言所行者正行無有竒邪之習其德既成則可以保盈成之業而永享天命然周公之齊百工以輔王而王之所用悉其私人受教於王者自此而積之則朋黨之禍將不可得而遏故惟己聽政以剸裁萬幾之務苟非周召在其左右將順其美而正救其惡則其舉措之間或有以召天下之禍不可以天命眷我周家為甚固而可以長保也故周公歷言天命之不可信恐成王之弗克負荷將欲輔成王德以延周家之命則吾二人不可以一日而去朝廷也是以又言商代之臣與夫我周文武之朝其臣皆與國同其休戚黃髮耆艾無有厭斁以明吾二人之當留也保衡即伊尹也於成湯則言伊尹於太甲則言保衡者陳少南曰在成湯則言伊尹而不言保衡至太甲書則曰嗣王不惠于阿衡是阿衡始見于太甲之時矣此説是也鄭康成謂伊尹在湯曰阿衡至太甲改曰保衡非也故唐孔氏破之以為太甲云嗣王不惠于阿衡則太甲亦曰阿衡也保衡阿衡一也太甲即位始以是而尊伊尹焉伊陟伊尹之子也逸篇序曰伊陟相太戊是也臣扈臣名也蘇氏曰湯既克夏欲遷夏社作臣扈之篇湯享國十三年又七年而太甲立太甲享國三十三年又更四帝乃至太戊而臣扈猶在豈非夀百餘嵗哉而陳少南謂湯十三年太甲三十三年沃丁二十九年太庚二十五年小甲十七年雍已十二年然後太戊立自湯勝夏以至太戊立凡一百有三十年矣臣扈在湯勝夏之初年已不知其年若干閲一百有三十又相太戊若干年而能格于上帝乎是必有二臣而名同者也此二説不同而唐孔氏已有此兩説曰湯初已有臣扈已為大臣不得至今仍在與伊尹之子同時立功豈二人名同故兩字一誤也案春秋范武子光輔五君或臣扈事湯而又事太戊案章子平編年通載所記商家太甲以後數君在位之年正與陳少南同而司馬遷史記殷本紀其君在位所歷之年未嘗載也蓋世代遼逺不可得而見則臣扈之或為一人或為二人但其世以是為稱亦不可知如詩有家父刺幽王而春秋桓公八年又書天王使家父來聘莊元年有單伯而文十四年又書單伯如齊左氏傳桓三年晉有梁宏而僖三十三年又有梁宏此皆歷年之多其為一人為二人不可得而知惟宣十二年楚有屈蕩而襄二十五年又有屈蕩杜元凱方以為二人蓋襄二十五年傳曰屈建為令尹屈蕩為莫敖宣十二年之屈蕩正屈建之祖父而此屈蕩與建並列故可以知其為二人也巫咸即逸篇序曰伊陟贊于巫咸是也祖乙者河亶甲之子太戊之孫史記曰祖乙立殷復興所謂圯于耿者巫賢先儒以為巫咸之子此言在昔成湯既受天之命伐夏以有九有之師時則有伊尹之臣為之佐而格于皇天説命曰昔先正保衡佑我烈祖格于皇天正此是也至太甲之立則伊尹尚為之佐唐孔氏曰伊尹之下言格于皇天保衡之下不言格于皇天從可知也是也太戊之立則有伊陟臣扈為之佐亦格于上帝唐孔氏曰皇天之與上帝俱是天也變其文耳蓋天即帝也帝即天也豈有二哉夫天之蒼蒼在上不可得而名言但自其形體而言則謂之天自其主宰而言則謂之帝書之言天而又言帝者是錯綜其文不欲重言之耳既於伊尹曰格于皇天不可又於伊陟臣扈曰格于皇天故變文言上帝也王氏多以天為道帝為德謂道至矣則格于皇天德至矣則格于上帝而説者又於伊尹一人之身而分道與德其鑿甚矣巫咸為太戊之佐則能治王家祖乙之時則有巫賢武丁之時則有甘盤皆其世臣也唐孔氏曰巫咸巫賢甘盤蓋功劣于彼三人故無格天之言是也陳先儒以為陳列不若蘇氏以為久言此商家之臣率皆惟此輔佐之久以治安有殷故有殷之君以禮終而配天享國久長多歷年所也登遐曰陟所謂惟新陟王是也禮陟猶言得正而斃也惟周公既留召公共政故至成王寢疾被冕服憑玉几以命羣臣屬纊之際其言不昧此非以禮陟乎惟此六臣輔政之久故天惟純一佑命于有殷純者言其命不二也則商家之百官族姓及王人之微者實皆秉德以明恤國家之事至于小臣之在藩屏侯甸者皆得其人況夫奔走執事之人皆得其人可知惟此以德舉而用保乂其君蓋大臣者小臣之倡率也大臣輔政之久以保乂有殷故此諸臣無小無大無內無外皆能乂厥辟以此之故故其一人有事于四方則莫不信之若卜筮焉其應之如響也蓋久則天天則神故不言而信不怒而威此所以若卜筮罔不是孚此治道之大成也平格指上六臣也言其平治天下以格于天也上惟言伊尹陟臣扈格天此言平格蓋舉此三人則後三人亦在其中矣言天夀此平格之臣使保乂有殷天夀平格猶所謂愸遺一老也有殷之嗣王紂無平格之臣故天滅之其威可畏今汝召公能長念此以留輔成王則天命堅固而不二其有以治明我新造之邦也武王即位天下未集而崩成主之立方及七年故曰新造邦也召公自周家肇造之初已為太保及其輔翼成王分陜而治始終凡數十年以至受顧命相康王率西方諸侯以朝升降拜揖訓告丁寧蓋猶康強而未艾也方是時當百餘歲矣而其精力若此正所謂天夀平格乃周公告召公以永念之效也割先儒以為割斷其義其説不明白王氏以為降割于殷蓋由於以寧王為文王故以為降割于殷寧王武王也某於大誥已言之矣蘇氏曰天降割喪文王申勸武王之德而集大命當從此説割與天降割于我家不少延之割同言天既以文王之德而命之作周文王既死復命武王故曰申也勸武王之德猶所謂天誘其衷也惟文王之能修治和協此中夏則以有虢叔閎夭散宜生太顛南宫括五人為之佐也此五人蓋文王疏附先後奔走禦侮之臣故又曰文王若無此五人往來以𨗳達文王有常之教則無有德下及於國人蓋德雖本於文王而其博施於民則以五臣之力也此五人之在文王亦如商之純佑亦如商之秉德又𨗳達之使知天威之可畏乃惟是五人昭顯文王之德𨗳達之而使顯見覆冒于天下既顯見覆冒于天下則民必誦而歌舞之天聽自我民聽故聞于上遂代殷以受天命也在武王之世則五人者其一死矣故惟此四人尚迪有祿死者曰不祿此四人猶及于武王之世故曰尚迪有祿先儒以虢叔先死不若康成以為不知誰死為得闕疑之義虢叔者王季之子也文王之弟左氏曰虢仲虢叔王季之穆也此四人後與武王大奉天威盡誅其敵謂伐紂也此四人昭武王之德亦如文王之迪見冒聞天下大盡稱頌武王之德也於商曰天惟純佑命則商實百姓王人罔不秉德明恤小臣屏侯甸矧咸奔走惟兹惟德稱用乂厥辟故於文王但曰亦惟純佑秉德于文王曰迪見冒聞于上帝故於武王但曰惟冒正猶舜之巡狩于南曰如岱禮於西曰如初於北曰如西禮則自柴望而下皆行之也禹之攝政言率百官若帝之初則自在璿璣玉衡以下皆舉之也此史家敘事省要之體春秋有前目後凡之例亦以此也文武之時其佐命元功多矣獨舉虢叔以下五人餘皆不及豈此五人逮事王季而遂及文武之時邪伊尹之事成湯自為諸侯以至有天下湯崩又事太甲伊陟乃伊尹之子臣扈非湯之舊臣則亦殷家之世臣巫咸巫賢又世為大臣甘盤小乙之舊臣以遺武丁者虢叔以下必其逮事王季以及文武之時此皆世臣舊德與國同休戚耆艾黃髮無有厭斁者也孟子曰所謂故國者有世臣之謂也有世臣則其為社稷之鎮其效可勝言哉惟其所言者皆世臣舊德故武丁之世不及傅説文武之世不及太公也周公之所以留召公共政者蓋以吾二人之在朝廷正如六臣之在殷五臣之在文武也又豈可以舍之而去乎今在豫小子旦若遊大川豫往暨汝奭其濟小子同未在位誕無我責收罔朂不及耇造德不降我則鳴鳥不聞矧曰其有能格公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷公曰前人敷乃心乃悉命汝作汝民極曰汝明朂偶王在亶乘兹大命惟文王德丕承無疆之恤公曰君告汝朕允保奭其汝克敬以豫監于殷喪大否肆念我天威豫不允惟若兹誥豫惟曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬德明我俊民在讓後人于丕時嗚呼篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾公曰君豫不惠若兹多誥豫惟用閔于天越民公曰嗚呼君惟乃知民德亦罔不能厥初惟其終祇若兹往敬用治周公既言商家之六臣我周文武之五臣皆輔政數世與國同其休戚商以六臣之故歷數有永綿延不絶內外之臣莫非忠良而其發政施教于天下無不信服而感化周以五臣之故仁恩惠澤浸潤于民必自百里而興遂膺天命以撫方夏天下莫不稱頌其德而不忘世臣舊德之有益于國也如此故我二人不可以不留留則為社稷之利不留則為社稷之憂雖功成名遂奉身而去其為一身進退之節固當明白然國家安危長短之原實自此而分尤所當念自此而下皆周公言其當留之義也遊者涉水也詩曰就其淺矣泳之遊之莊子曰善遊者數能又曰見一丈夫遊之皆涉水也大川固難于遊泳之也必求其所以濟遊而不濟未有不沒者也故周公言在今我小子當王家艱難之業負重責大若遊於大川之中自今以往我當同汝召公左右輔翼以濟成王使免於難同於成王未即政之時則可以免於大責也未在位指成王未即位之前成王之未即政周公共政以弼豫一人使無失德今既即政而召公欲告歸故周公留之而欲其同來在位也罔朂不及蓋恐成王恃其盈成之業驕怠懈弛不能自勉而於治道有所不及是以欲收之孟子曰人有雞犬放則知求之有放心而不知求收者教之誨之防間其心而不使至於放也耇造者李博士曰蓋老成之謂也是也耇造德言老成而有德也鳴鳥謂鳳也禮運曰麟鳳龜龍謂之四靈説文曰鳳神鳥也天老曰鳳之象也鴻前麟後蛇頭魚尾鸛顙鴛腮龍文龜背燕頷雞喙五色備舉出於東方君子之國翺翔四海之外過崑崙飲砥柱濯羽弱水暮宿丹穴見則天下大寧安揚子亦曰君子在治若鳳在亂若鳳治則見亂則隱鳳在治世之祥也不聞鳳之鳴則非治世矣孔子曰鳳鳥不至吾已矣夫孔子之意謂天下有道聖人在上則鳳鳥至河圖出以表國家之禎祥傷己不逢太平之時故有此言也以孔子之言觀之則公謂我則鳴鳥不聞亦是託此以言我之不能致太平也蘇氏曰周家以鸑鷟鳴於岐山為文王受命之符我與汝奭皆文王舊臣同聞鳴鳥者也天如不欲我終王業則當時必不使我與汝同聞鳴鳥其説為曲不可從也言我之所以留輔成王者蓋將收成王不勉不及之心而防間之以終其德汝奭乃老成有德之人苟不降意留輔天子我則將不能致太平而聞鳥之鳴況能如伊尹陟臣扈之格于皇天上帝乎必不能也召公其可以不留哉周公又嗟歎呼召公而告之曰君今其當監視於此其所以當監觀于此者蓋我周受天命卜世三十卜年八百子子孫孫方興而未艾其休固為無窮然而有德則祈天永命不德則早墜厥命其保守之艱亦不為小不可以休之無窮為足恃也我所以告君以留者乃謀所以寬我之憂蓋周公之憂惟恐其成王之弗克負荷今既在王左右朝夕納誨以輔其德則可以解周公之憂惟有以解周公之憂則不致成王之迷而失道矣後人指成王也下言前人謂武王則後人之為成王必矣我受命無疆惟休亦大惟艱此亦指召誥所陳之言也敷乃心正盤庚所謂今豫其敷心腹腎腸歷告爾百姓于朕志是也蘇氏謂周公與召公同受武王顧命輔成王故周公曰前人敷其腹心以命汝位三公以為民極此説勝於諸家當從之曰昔武王命二公之言也言汝之明勉以配王在于誠信以乘此天之大命惟念文王之德以輔其君則可以大承其無窮之憂君臣相與警戒以保天命也意謂武王之所以命吾二人者如此則我家無窮之憂正吾二人所當任其責其可以舍而去乎偶配也臣者君之配猶隂者陽之配也乘大命者王氏曰乘者以乘車而喻為彼所載而行是也詩曰其車既載不輸爾載蓋亦以乘車喻治天下乘天之大命者得其道則永保天命不得其道則天命中絶正猶乘車者有輸爾載不輸爾載之殊故惟在於誠而已周公又言我之告汝者皆我之誠心汝當克敬以留輔成王以我鑒視於殷惟其以主荒怠自恣謂天命可以長保而不之懼故喪亡而至於大否否者閉而亂也大往而小來上下不交而天下無邦大否則其亂甚矣天之於商其眷佑之心亦如我周然其喪大否如此故我念天威之不可不畏其不去者惟欲延周家之命而已我不誠惟若是告汝也我惟曰王業之成在我二人而已汝其有以合於我以留輔成王也襄成也左傳曰雨不克襄事杜元凱曰成也汝召公之言曰王業之成是故在我二人然天方佑我周家休祥益至我二人若以寵利居成功則深恐其不勝禍自此萌矣召公之所以不恱而求去者正慮此也漢疏廣曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石功成名立如此不去懼有後悔此正召公弗戡之意周公謂汝之所以求去者恐其妨賢者路也但能敬德明揚天下賢俊之人而進之他日讓此俊人于冒大之時何為不可而必於今自告歸哉又嗟歎而言我二人厚輔於君故能至今日之休我二人若皆成文王之功業而不怠以終之則其休益為無窮其德覆冒之廣至於海隅出日之地當無不為我之役使也爾雅曰距齊州以南戴日以為丹穴北戴斗極為空桐東至日所出為太平西至日所入為太蒙海隅出日言其甚逺也蘇氏曰惠猶言願也我豈願若此多誥于此哉蓋有不得已已我惟哀閔夫天命之不永及民之不得其所也蓋使成王逸豫之心一萌于中則上無以奉天下無以撫民天命將自此而斷棄而民有受其禍者此周公之所閔也蓋天休滋至惟時二人弗戡則召公之憂而豫用閔于天越民則周公之憂召公之憂者一時之計周公之憂者天下社稷之計故召公雖以為當去而周公以為大義當留也周公又言汝君奭亦知乎凡民之德無不能有其初鮮克有終而已欲其有終則汝當致敬如此所言自今以往惟敬以治天下則終始如一矣傳曰行百里者半九十言末路之難也成王未即政之前周召宅三公之官以為王之輔佐啓沃訓迪固已納王於善矣是其初非不謹也苟以王既聽政遽舍而去如王之舉措失宜以忝文武之基緒則前功盡廢雖王之罪亦吾二人不能終輔成王之過也嘗觀唐之君多有始而無終髙宗用長孫無忌褚遂良則治用許敬宗李義府則亂明皇用姚宋則治用李林甫楊國忠則亂德宗用崔祐甫則治用盧杞則亂憲宗用杜黃裳裴度則治用皇甫鎛程異則亂蓋此數君者中才之主可與為善亦可與為惡故一人之身而治亂之勢前後相反使成王之初雖能致至治以繼文武之業苟不克終則亦何足道哉故周公之留召公也惟欲謹終如始而已王氏曰此誥或曰君奭或曰保奭或曰君者主王而言則曰君奭主公事而言則曰君而已主保事而言則曰保奭也王氏喜為鑿説一至於此信如此言則康誥之篇或曰朕其弟小子封或曰小子或曰封或曰小子封或曰汝封或曰汝亦皆有説也無逸君奭皆周公所作方其為成王言則謂商周之治無不在其君之憂勤及其為召公言則謂商周之治無不在其臣之輔相言各有所當也大抵正主御邪臣不可以致治正臣事邪主亦不可以致治惟有是君又有是臣君臣之懿則其治如響觀舜臯陶之賡歌可見矣蔡仲之命周書蔡叔既沒王命蔡仲踐諸侯位作蔡仲之命蔡仲之命惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡王若曰小子胡惟爾率德改行克慎厥猷肆豫命爾侯于東土往即乃封敬哉爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彝訓無若爾考之違王命皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治為惡不同同歸于亂爾其戒哉慎厥初惟厥終終以不困不惟厥終終以困窮懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則豫一人汝嘉王曰嗚呼小子胡汝往哉無荒棄朕命當成王即位之初周公攝政蔡叔與管叔流言於國以毁周公遂挾武庚以叛周公東征而罪人斯得蔡叔則遷之逺方而囚之雖免于死而終身不赦及其沒也王乃以周公言其子蔡仲有賢德之故因其父之故邦而封之使踐諸侯之位遂作册書以命之此篇之所為作也明堂位曰踐天子之位注云踐猶履也正與此踐諸侯位之踐同踐位猶春秋之言即位也書序本自為一篇如司馬遷之史記班固之漢書每篇皆撮其大者敘以數句亦自為一篇不以冠於諸篇之首及孔安國以其序所以為作者之意昭然義見宜相附近故引之各冠其篇首如君奭之篇首初不言其所以作之之意則引序而冠之使後人便於稽考可也如此篇其發首自惟周公位冢宰正百工以下其載所以為作者之意可謂至詳矣而序復曰蔡叔既沒王命蔡仲踐諸侯位則無乃贅乎以是知孔氏之冠序于篇首蓋有得有失也史記曰武王同母兄弟十人長曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰霍叔處武王克殷封功臣昆弟於是封叔鮮於管叔度於蔡二人相紂子武庚祿父治殷餘民封叔處于霍又曰武王以殷餘民封紂子武庚為武庚未集恐其有賊心乃令其弟管叔蔡叔傅相武庚以和其民是皆以監殷者惟管蔡而已然大誥之序即有三監之言而此篇載周公之於管叔蔡叔霍叔以其罪之輕重而刑罰之有等差則知當時傅相武庚霍叔亦與焉史記失其傳耳當武王之即世成王在亮隂之中周公位居冢宰之官以正百官百官總已以聽焉三叔乃流言于國謂周公將以成王之幼沖奪其位而自有之遂挾武庚以叛其實蓄不軌之心而以是藉口也周公乃率兵以親討管叔則致法而殺之於殷之故都蔡叔則遷而囚繫之于郭鄰之地惟與之從車七乘霍叔則黜之為民三年之內不得與諸侯齒列既三年則復其舊封夫君薨百官總已以聽于冢宰三年古之人皆然周公之位冢宰正百工而羣叔乃流言者蓋成王幼沖而周公以聖德而為之輔自殷家兄死弟及之禮而言則周公宜繼武王為天子今既攝天子之政殷人不能無疑于公故三叔易以其言扇動之以唱亂也管叔于兄弟之次周公之兄也管叔監殷于外而周公攝政於內豈能無不平之心哉故流言以叛而殷人莫不響應蓋以武庚常有興復之志而管叔與之同惡相濟也以是知管叔為首而蔡叔霍叔和之霍叔之罪又輕于蔡叔惟管叔之罪為大故殺之而絶其後無茅土之封蔡叔之罪比管叔為小故廢之終身而既沒之後以其子嗣封霍叔之罪比蔡叔又為小故廢之三年而已由是觀之則周公之誅管叔豈得已哉使其罪猶有可生之路必不致辟也此言致辟則知金縢所謂我之弗辟其訓法明甚益知鄭康成以為避非也囚唐孔氏謂制其出入不得輒行是也如漢遷淮南王長于蜀唐遷廬陵王于房州皆是制其出入與蔡叔同故謂之囚也郭鄰先儒以為中國之外地名蘇氏則曰郭虢也五家為鄰左氏傳曰王于是乎殺管叔而蔡蔡叔以車七乘徒七十人既有徒七十人不得但云五家也當且從先儒之説書以為車七乘而史記乃以為十乘亦非也不齒與王制終身不齒同時言三年不齒則是三年之外又湔拭其罪而封之也必矣蔡叔雖囚而其子蔡仲能常敬其德周公則以為己之卿士叔既卒方薦之於王而命之建國於蔡以封為諸侯也卿士周公之臣周禮曰乃施則于都鄙而建其長立其兩注云長謂公卿王大夫王子弟食采邑者兩謂兩卿蔡仲之為周公卿士蓋采邑之卿也若左氏傳曰萇𢎞事劉文公注曰為之屬大夫正所謂卿士也史記乃以為周公以為魯卿士魯國治唐孔氏已辨之矣公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣文子不以其家臣而與之並列故孔子稱其文今周公亦以己之卿士而薦之為諸侯蓋周公之賞罰未嘗容心于其間蔡叔之罪不可赦也則遷之於逺不以其弟之故而私之蔡仲之賢不可棄也則薦之於王不以其蔡叔之故而惡之此其所以為周公也蘇氏曰蔡叔未卒仲無君國之禮蒯聵在而輒立衛是以亂孔子將為政於衛必以正名為先而周公封蔡仲必在叔卒之後也此説甚當蓋仲之封也襲其父之舊而其國號曰蔡則是以叔為始封之君豈可以叔尚無恙而侯之哉然蘇氏謂仲為卿士無囚父用子之理蓋釋之矣此則不可得而見蓋經只言囚郭鄰無釋之之言未敢以為然也胡者仲之名也仲其字也其曰蔡仲正猶春秋之稱蔡叔蔡季也成王言惟爾胡循祖之德改父之行以克謹其道其克慎於所行者如此則可以君國故我為册書命爾為東土之諸侯爾就所封之國當敬之也漢孔氏謂叔之所封圻內之蔡仲之所封淮汝之間圻內之蔡名已滅故取其名以名新國意謂東土者淮汝之間在王室之東故也案史記注引世本云蔡叔居上蔡宋忠云胡徙居新蔡平侯徙下蔡然漢地理志汝南上蔡縣注云故蔡國周武王叔度所封度放成王封其子胡十八世從新蔡新蔡縣注云平侯自蔡徙此後二世徙下蔡杜元凱左傳注與夫陸氏纂例其説正與地理志合平侯徙下蔡即春秋哀二年蔡遷于州來是也獨漢孔氏以為叔度封于圻內之蔡宋忠以為蔡仲居新蔡世代遼逺是非不可得而知以蔡叔為封于圻內而出監殷亦可以為封于淮汝之間而又監殷亦可乃周公封魯而入為太師之比管叔之國説者云滎陽京縣東北管城霍叔之國説者云平陽永安縣東北霍太山則以蔡叔為封于淮汝之間則此二者之比也周公雖封魯而圻內以周地為采邑説者云扶風雍縣東北周地召公雖封燕而圻內以召地為采邑説者云扶風雍縣東南召亭則以蔡叔為封於圻內之蔡則此二者之比也鄭之始封亦在圻內説者云京兆鄭縣其後遷于濟洛河潁之間説者云河南新鄭則是取圻內之地以名新國此亦漢孔氏所言蔡國之比蓋不知此數者孰為是也夫蔡叔所以流言以叛而取拘囚之禍者惟其不忠不孝而已蓋忠孝一道也臣子一心也未有忠而不孝者亦未有孝而不忠者也諸侯以富貴不離其身保其社稷以保其人民為孝蔡叔以成王之叔父周公之介弟身為諸侯而自取罪戾囚於逺方非孝也然挾殷之餘孽以間王室豈得為忠乎是忠孝兩失之矣蔡仲欲掩蓋其愆尤則惟在於此二者也使蔡仲能盡忠孝之道則天下將稱之曰蔡叔幸哉有子如此則豈不能蓋前人之愆哉爾乃邁迹自身王氏曰蔡叔違王命無所因故曰自身也是也惟蔡叔既以違王命而廢則汝之行善迹當自汝身而始汝能克勤無怠以勉強於道則可以垂法於汝之後世則汝當率循文王之常訓奉以周旋不敢失墜不可以若爾父之違廢王命以間王室當以是為深戒也詩曰伐柯伐柯其則不逺蔡仲既以文王為祖則其彝訓不可不從以蔡叔為父則其違王命不可不改其則亦豈逺哉上既稱其能率祖之德改父之行則此二者蔡仲蓋優為之矣而又以此告之者蓋丁寧訓告至于再三所以堅其為善之意也上天之豫奪雖無私親然有德則輔之無德則斷棄其命也民之從違雖無常心然有惠則懷之無惠則適彼樂國也夫諸侯之廢置雖自於天子之權然其封之也非天子之私恩也蓋以天與之人與之故不得不封也其廢之也非天子之私怒也蓋以天棄之人棄之故不得不廢也成王之意謂爾之所以侯于東土者蓋其德足以感天惠足以得民故我因而命之苟汝一旦自絶于天結怨于民則我豈能私于汝哉汝無以富貴為可長保而不戒也為善不同同歸于治為惡不同同歸于亂李博士曰治以善而致善雖不一苟在所可欲焉皆足以致治何必同哉此戒仲以無一善之不可為也亂以惡而致惡雖不一苟在所可惡焉皆足以致亂何必同哉此戒仲以無一惡之不可去也此説盡之矣汝不可以不戒汝既率德改行克謹厥猷是能謹其初矣汝無以既列為諸侯志願已畢為可以無事于謹也又當思其始終始如是終又如是始終如一則其德日日以新豈至於困哉苟不能思其終則其德止於是非徒不足以日新又併與其故者而忘之此其所以困窮則汝當以為戒也汝欲謹其終則亦盡其諸侯之職而已勉汝之功績戰戰兢兢以長保其富貴壤地相接而為四鄰之國則與之結好而和睦王室則為之蕃翰以敵王所愾為職兄弟同姓之邦則尤為之和協而無鬩于牆之釁林然在下之小民則思所以康濟之使得其所凡此皆思其終之道也率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則豫一人汝嘉王曰嗚呼小子胡汝往哉無荒棄朕命此則以流言為深戒也率自中與率性之謂道之率同耳之德為聰而聰則用之以聽目之德為明而明則用之以視是聰明在已而視聽用以應物也故當循其所謂大本之中順性命之理而行之則其聰明出于自然而無有私意小智撓乎其間豈至于變亂舊章哉苟任一己之聰明不能行其所無事則其變亂前世之舊也必矣又當審所視聽以察邪正是非苟視聽不審則利口巧言得以惑之遂將溺于偏側之言信之以為當然以其改其常度而無所恤也不以己之聰明而亂舊章則其處己也審不以人之側言而改厥度則其應物也明而所以處己者必自于率中所以應物者必自于詳乃視聽使蔡叔能以率中而處己詳乃視聽而應物則豈肯以管蔡之言為然而與之相挻為亂以流言于國哉汝能以此為戒則我一人喜之矣又戒之曰汝之往就封也當以我之命日夜服膺而不失不可廢棄也昔晉王儀為文帝所斬其子裒痛父非命未嘗西向而坐示不臣朝廷也蔡叔為周公所囚而蔡仲乃為周公之卿士豈蔡仲忘其父之禍而不顧哉蓋文帝之殺王儀以私忿也故其子可以不臣朝廷周公之囚蔡叔以公義也蔡仲豈得以為怨哉使周公有恨於蔡叔必不録用其子矣惟囚其父封其子其公如此則蔡仲者當率德改行以蓋前人之愆不得以為怨也昔諸葛孔明廢廖立李平及孔明卒立流涕平致死以孔明猶能行法而人不怨况周公乎使以蔡仲為不當臣於周公則禹亦不當臣於舜也舜之罪也殛鯀其舉也興禹惟其公也何獨於周公而疑之哉然周公之於蔡仲諄諄告戒欲其無若爾考之違王命舜不以鯀之方命圯族而戒禹者禹大聖人無所俟於告戒故耳成王東伐淮夷遂踐奄作成玉政成王既踐奄將遷其君於蒲姑周公告召公作將蒲姑尚書全解卷三十三
