body:
  text: 尚書全觧卷二十六宋林之竒撰旅獒周書西旅獻獒太保作旅獒旅獒書之序本自為一篇至漢孔氏以為書序序所以為作者之意昭然義見宜相附近故引之各冠其篇首然如大誥湯誥之類其篇首所叙述直載其誓告之語則以序冠之固可以見此誓此誥為此事而作也如此篇首既言惟克商遂通道于九夷八蠻西旅底貢厥獒太保乃作旅獒用訓于王其所以作此篇之意既備於此矣而序又言西旅獻獒太保作旅獒無乃失於贅乎故某嘗謂引序以冠於篇首如湯誥大誥之類則得之如此篇之類則失之也西旅西方之國也獒犬名也西方之旅國聞武王之威徳有慕義之意於是獻獒以表其誠而武王受之太保召公深慮武王之志漸怠而好戰喜功之心由是而生故進諫於王以為不當受也漢孔氏於西旅獻獒以為西戎逺國貢大犬則是以旅為國名也至於太保作旅獒則曰召公陳戒則是又以旅為陳也夫旅之為字一也上則以為國名下則以為陳立言之法不應頓異蘇氏引左氏傳曰庭實旅百則旅固有訓陳之類然而旅獒之旅字上有西旅之文則非可以訓陳也蓋書之名篇惟蕞取篇中之字以為是簡編之别而此篇有西旅底貢厥獒之語故以旅獒二字名篇如詩云惟鵲有巢則以鵲巢名篇也如必以旅獒為陳其道義則於旅獒之上不當加作字今既曰作旅獒安得以旅訓陳也惟克商遂通道于九夷八蠻西旅底貢厥獒太保乃作旅獒用訓于王九夷八蠻蓋緫言蠻夷之國也曰九曰八者言非一也明堂位稱九夷八蠻六戎五狄周官職方氏稱四夷八蠻五戎六狄爾雅稱九夷八狄七戎六蠻而此又稱九夷八蠻蓋其或曰九夷或曰四夷或曰八蠻或曰六蠻雖然不同然但知其為九四八六而已其所以爲九四八六之名則不可得而知也以是知蠻夷戎狄之以數言者但言其非一而已雖别而言之東方曰夷南方曰蠻西方曰戎北方曰狄至於合而言之則自雕題左衽之邦皆可以蠻夷戎狄稱也如必居此方然後得此名則舜典曰蠻夷率服則是惇徳允元而難任人者止可以服東南而不可以服西北矣此因西旅獻獒而言不應舍西之戎與南之蠻也武王既克商之後威徳廣被凡在九州之外自西自東自南自北莫不梯山航海而至惟恐其後此所以言通道于九夷八蠻也其曰通道者蓋蠻夷來王則其道自通矣非有意於開四夷而斥大其境土也如有意通道于蠻夷則是秦皇漢武之窮兵黷武而已豈所以為武王哉當其通道于蠻夷之域而與中國接於是西方之夷有旅國者致貢其獒焉以其獒為貢者漢孔氏曰犬髙四尺爲獒以大為異此説不然夫西旅獻之武王受之太保諄諄而陳之必其有珍異而可玩者不但以大爲異也案許愼曰犬知人心而可使者曰獒春秋公羊傳曰晉靈公将殺趙盾盾躇階而走靈公有周狗謂之獒呼獒而屬之獒亦躇階而從之祁彌明逆而踆之絶其頷趙盾曰君之獒不若臣之獒也何休註曰周狗可以比周之狗所指如意左氏傳亦謂公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何爲則獒之爲犬蓋猛而善搏人進退指揮能如人意異夫常犬者也故太保謂盛徳不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力蓋苟為受西旅之獒以自防則其心不能無狎侮於人狎侮者禍亂之所由生也觀晉靈公則可以見矣夫獻獒者西旅而已而篇首遂言通道于九夷八蠻蓋人臣之諫其君必救之於其始始之不救其末将有不可勝救者武王才通道于外域而遽受旅獒之獻四夷聞之則将爭以珍竒進而人主之欲寖廣矣此所以諫于王而作此篇也太保者召公也不曰召公而曰太保者此正如太甲之篇不言嗣王不惠于尹而言不惠于阿衡蓋立言之法明太保阿衡之任當如是也受寄託之任而不能使嗣王克終厥徳則非所以爲阿衡居保傅之官而不能格君心之非則非所以爲太保其曰用訓于王則是此篇雖以旅獒為名其實訓體也然則典謨訓誥誓命之文者豈可以拘於篇名而求之邪曰嗚呼明王愼德四夷咸賔無有逺邇畢獻方物惟服食器用王乃昭德之致于異姓之邦無替厥服分寳玉于伯叔之國時庸展親人不易物惟德其物嗚呼者嗟歎之辭也太保将陳古先哲王所以待夷狄之道故重其事而嗟歎以言之也古者帝王之於夷狄聽其自來而信其自去惟愼徳於此而四夷聞之相與賔服殆将有不期然而然者惇徳允元而蠻夷率服無怠無荒而四夷來王明王愼德而四夷咸賔式固爾猶而淮夷率服凡此皆帝王御夷狄之上䇿也四夷慕盛德而咸賔則無逺無邇盡獻其方土所重之物其所獻者惟取其可以供吾之服食器用者若乃奢侈之物可以供耳目之玩好者則不當獻也雖獻之亦不當受也唐孔氏曰𤣥纁絺紵供服也橘柚菁茅供食也羽毛齒革瑶琨篠簜供器用也則是以器用爲一或以爲羽毛齒革瑶琨篠簜器也牛馬犬龜之類用也竊以此説爲長犬用物也荀子曰北海有走獸吠犬焉中國得而畜使之犬之可畜者惟取其善吠而已獒知人心而可使則是犬之竒異而不常有也貢犬可也貢獒不可也此既因獻獒而言則以用爲牛馬犬龜之類其説爲當王乃昭德之致于異姓之邦無替厥服分寳玉于伯叔之國時庸展親者言王者既不以一己之私欲責四方之貢獻惟受其所當獻者猶不以供一己之私欲也觀其所以頒之於諸侯異姓之邦者必以四夷所貢之物使其所知四夷所以貢其方物者以吾之愼德有以致之也以其德之所以致之者而賜之是昭德之致也賜異姓之邦而必昭德之致者俾之受此物則知吾之德逺覃于方外其孰敢廢厥職事而無戴上之誠也故曰無替厥服其同姓伯父叔父之國則以寳玉分之分之以寳玉者是用信其親親之道也故曰時庸展親王氏曰親之矣而不以所寳分之則人孰知親親之信也此説是也唐孔氏曰昭德之致于異姓之邦如分陳以肅愼之矢分寳玉于伯叔之國若分魯以夏后氏之璜異姓之邦則欲其無替厥服同姓之邦則時庸展親此蓋親踈之隆殺也夫明王之于四夷所貢之方物不苟受也惟服食器用不責彼之所難得不求我之所無用也不責彼之所難得而其所獻者皆其易得之物也不求我之所無用則其所受者皆有用之物也責彼之易得求我之有用而吾尤無所利焉必以昭德之致于異姓之邦展親于同姓之國凡此皆聖人不貪之寳也夫獒之爲物知人心而可使則是西旅之所難得而中國之所不常用既不可昭德之致于異姓之邦又不可展親于同姓之國而徒受之秪所以為耳目之玩好而已此太保所以不得不諫也人不易物惟德其物言物一也未當改易惟有德則其物爲足貴苟為無德則何以物為哉先王通四夷而受其貢獻惟欲昭德之致于異姓之邦而展親于同姓如此則其物也可寳於萬世故曰惟德其物如分陳肅愼氏之矢魯夏后氏之璜世世子孫守而不失蓋先王以德而致之先君以德而受之故也如其不然是亦璜與矢而已何足貴哉德盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力不役耳目百度惟貞玩人喪德玩物喪志志以道寜言以道接不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸不育于國不寳逺物則逺人格所寳惟賢則邇人安既言物以德而後貴而獒之為物適所以喪德於是遂言其所以喪德者而曰德盛不狎侮至罔以盡其力孟子曰夫人必自侮然後人侮之苟盛德之至則動容周旋莫不中禮尚何狎侮之有既不狎侮是不自侮也則何人侮之有此君子所以爲之竭其謀慮小人所以爲之致其筋力如其肆為無禮以䙝慢於人則人皆忌而疾之尚何盡心盡力之有哉論語之稱君子小人有二君子和而不同小人同而不和以其德而言之也君子學道則愛人小人學道則易使以其位而言之也此所言者亦以其位之貴賤而言之耳君子勞心以治人故狎侮君子則無以盡人心小人則勞力以治於人故狎侮小人則無以盡其力盡其力者蒙上人字而異其辭非有異義也夫狎侮者豈必輕易暴慢之行見於動作之間而後為狎侮哉苟有其心則是狎侮之矣獒既如人而可使而武王受之以防其身則是武王於其臣民已有狎侮之心矣狎侮其臣則無以盡君子之心狎侮其民則無以盡小人之力如此而欲圖四海使天下為一家中國為一人者未之有也而其為釁實自一獒啓之則其爲喪德之禍豈小也哉是則欲正其德而脩其身而不狎侮小人者豈有它哉惟不役耳目而已耳不役於聲目不役於色則玩好不可得而惑中心至正湛然無營此百度所以惟正也苟為役耳目於玩好之末則有玩人玩物之行矣故曰玩人喪德玩物喪志玩人者以人而為玩也恃獒之所指如意而有輕忽於人之心是玩人也玩人則狎侮矣志者在己之志也以道而寜之則聲色貨利舉不能蠱惑之矣言者它人之言也以道而接之則辭受取舍之際各得其當矣夫道也者不可須臾離也可離非道也故以之處己則可以寜其志以之待人則可以接其言夫豈須臾之可離哉伊尹曰有言逆于汝心必求諸道有言遜于汝志必求諸非道蓋内焉欲寜己之志外焉欲接人之言皆不可以違於道也西旅之獻獒其所以求獻之者必有甘言遜辭以遜武王之志求納者也然而以非道求之則知西旅之獻者乃所謂玩人喪徳玩物喪志也太保作書以戒使之不受西旅之獒是所以逆武王之志也然而以道求之則知太保之戒乃所謂愼德而四夷咸賔也蓋苟一之於道則寜己之志接人之言皆得其當矣不作無益害有益至民乃足此蓋申上文惟服食器用之義也其所注意在於不貴異物賤用物而曰不作無益害有益者因而及之也作無益者如晉平公築臺妨於農收之類是也築無益之臺則妨有益之農矣農功何自而成乎漢文帝欲作露臺召匠計之直百金曰百金中人十家之産也吾奉先帝宫室尚恐羞之何以臺爲可謂能不作無益害有益也不貴異物賤用物者即此獻獒是也以獒異於常犬而貴之則犬之有用者必賤之矣民将爭以異物為可貴則何由而足乎犬馬非其土性不畜此又所以申言不貴異物賤用物之義也犬可以禦盗馬可以致逺此皆有用之物也然先王之於方物無小無大無髙無下各欲順其性而不傷其生雖有用之物非其土性則不畜之矣若夫珍禽竒獸則皆異物也其可育之於國乎漢文帝時有獻千里馬者詔曰鸞旗在前屬車在後吉行五十里師行三十里朕乗千里馬獨先安之光武時異國有獻名馬者日行千里詔以馬駕鼓車光武之不貴千里馬其志可尚也然以之駕鼓車則雖非其土性而猶畜之也雖不以為竒獸而猶育之也至於文帝還之則不肯畜之矣故竊嘗以謂不作無益害有益功乃成不貴異物賤用物民乃足三代帝王莫不以是為愼德之本自三代而降則能充此言而行之者漢文帝其人也珍禽竒獸者兼言之也犬馬之異者皆在其中矣犬之知人心而可使馬之日行千里皆竒獸也令以西旅之獒而畜之於中國則是非其土性而畜之矣以其知人心可使而愛之則是於竒獸而育之矣唐孔氏於犬馬非其土性不畜謂此篇為戒止於此句矣太保為旅獒而作戒自明王愼德以下反覆數十言無非為此而𤼵而曰為戒者止於此句豈不泥哉不寳逺物則不責彼之所難得而求我之所無用此逺人之所以格也所寳惟賢則善政善教有以福斯民此邇人之所以安也夫賢者之與逺物其所寳者若持衡焉此首重則彼尾輕也以逺物為寳則必有輕賢之心矣以賢為寳則其於逺物弗之貴矣虞公以垂棘之璧屈産之乗為寳故其視宫之竒若路人然齊王以四賢為寳故其視徑寸之珠如糞土也則人君之所寳者可不戒哉武王當西旅之獻獒則是寳逺物也使其心於逺物受而不却則太保之諫亦将見拒矣安在其所寳惟賢乎夫其受之也固欲以懐逺人然而既以逺物為寳則欲懐之而逺人且将弗格如此則征伐之師長驅於沙漠之地而邇人受其禍矣原其所以至此則以不能用賢故也使其得賢者而用之言聽諫從則必不受無名之獻此逺人之所以慕義而長為之藩臣也王氏曰以不寳逺物故犬馬非其土性不畜以所寳惟賢故珍禽竒獸不育于國此則強生分别今所不取嗚呼夙夜罔或不勤不矜細行終累大德為山九仞功虧一簣允迪兹生民保厥居惟乃世王太保拳拳之意既盡於此矣故又嗟歎而重申其義也言明王之愼德其於蚤夜之間兢兢業業無所不勤也其所以無所不勤者以不矜細行終累大德故也夫苟以細行為無益於德而弗謹之則日積一日其為大德之累也必矣譬如為山者必至於九仞然後可以謂之山苟一簣之功尚虧則不足以為山矣德無不備乃可謂之聖人苟一行之或虧則不足以為聖人矣八尺曰仞簣者盛土之器也夫世豈有為山者哉蓋假設以見其意耳孔子言譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也蓋推本於此言也太保之言有及於為山九仞功虧一簣者蓋武王之心必自以為威德之盛矣雖納一獒未足以為損也太保則謂損盛德者惟在夫此而已矣此其進諫之本心也允廸者言信能蹈行此言則生民有以安其居而國之子孫将世世王天下而無窮矣太保既以是而訓王矣自時厥後凡四夷之所獻中國之所受一如太保之訓觀肅愼氏楛矢之類則可以見矣所謂允迪兹者也周之子孫卜世三十卜年七百信乎其世王也夫却一獒之獻亦細事耳而世王之兆實見於此則知夫人君之所以祈天永命以為社稷無疆之休者蓋不在大也箕子曰彼為象箸必為玉杯玉杯不已必思逺方珍異之物而御之矣蓋紂之所以亡者原於此亦豈在大乎此太保之於終篇所以言不矜細行終累大德而欲享世王之功也則太保之愛君豈不至哉范内翰曰聖王能從諫於未然賢王能改過於己然忠臣之事上君也亦諫其未然事中君也多諫其已然太保因旅獒而作訓武王虚己而納之是皆從諫於未然之時也漢武帝聦明英銳蓋不世出然其甘心四夷嗜慾無極覩犀布瑇瑁則建朱崖七郡感枸醬竹杖則開牂柯越嶲聞天馬蒲萄則通大宛安息至其末年海内虛耗户口減半盗賊蜂起幾亡其國者非他無忠臣以救之於始故也觀此則太保所謂允迪兹生民保厥居惟乃世王實至忠之訓巢伯來朝芮伯作旅巢命金縢周書武王有疾周公作金縢金縢既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉珪乃告大王王季文王史乃冊祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身予仁若考能多才多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寳命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害予小子新命于三王惟永終是圖兹攸俟能念予一人公歸乃納冊于金縢之匱中王翼日乃瘳武王既克商而有天下法度未盡得其條理商民之附於周者猶未固也而武王遽有疾焉周公恐其不可救藥則成王将以㓜孫嗣位已以冢宰攝政能無危乎故作冊書以告于太王王季文王請以其身代武王之死而藏其書于金縢之中史敘其事而作此篇也此篇首載周公築壇以代死於三王既卜而吉則武王遂瘳又載武王即世而羣叔流言周公雖避于東都而成王猶有疑之之心及其感風雷之變而啓金縢之書然後知周公之心果忠于王室迎之於東以歸則此篇主於記事而作出於史官之手而其序乃曰周公作金縢與夫周公作無逸周公作立政之言曽無少異者蓋書序之體固有某篇雖非某人之所作而所載之本末皆其人之事迹語言則雖謂其人作之可也如太甲三篇首載太甲不惠于阿衡伊尹作書以啓迪之而王罔念聞乃放之于桐宫及其喪制既闋克終允德乃奉之以歸于亳又作書以堅其意既而又申誥之其歴時也不為不久而尹所以丁寜告戒之意亦不一而足史官記載其始末無所遺以作此三篇而其序亦曰伊尹作太甲三篇正與此同某嘗觀書序之作其體不一往往雜出於衆人之手者謂此也既克商二年者即伐紂之明年也王有疾而弗豫則其病革矣周公所謂遘厲虐疾是也王之疾既革二公所以欲質之龜冊而决其吉凶曰穆卜者敬也以君父之疾而卜之神靈非致其敬安能有所感哉二公者太公召公也太公召公欲卜以决武王之吉凶而當是時也周公已有請命代死之志周公之所以代武王之死豈挾詐而為謂足以要天下之譽哉蓋其深思逺慮懼夫武王既喪則周之社稷蓋岌岌矣而已亦無所逃其禍也故寜使身之不保猶愈於社稷之危也是出於中心之誠而為此禱于神明之請雖其同時而為三公如太公召公亦不使之知故託辭以告之曰未可以戚我先王漢孔氏曰戚近也未可以死近我先王其意以謂死則與先王相近若生則人神道隔是為逺矣其說迃曲不如鄭康成以戚為憂其訓為長康成雖以戚為憂而又以周公既内知武王有九齡之命又有文王曰吾與爾三之期今必瘳不以此終故止二公之卜云未可以憂怖我先王信如此言則是周公自知必不至於代王以死而挾詐為之矣不如潘博士說曰孔子荅孟武伯問孝曰父母唯其疾之憂蓋子有疾必貽父母之憂故為王穆卜則戚我先王必矣此説是也周公既以未可戚我先王之辭而却二公之言卜故自以請命之功為已任而設為壇墠之禮也壇封土也墠除地也為三壇同墠蓋将以告於三王故大除地為墠而於除地之中為三壇也禮天子立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠墠壇有禱焉祭之無禱乃止周公禱武王之疾於壇墠禮也然不於去祧之壇墠而設為三壇同墠以禱太王王季文王者此蓋禮之變也既云公乃自以為功則是周公不為武王禱而為身禱也為身而禱則於國之廟祧壇墠無所與焉禮士大夫去國為壇位向國而哭者為無廟也宗子在他國庶子無爵而居者望墓為壇以祭者為不可以入廟也古之有事于祖考當夫無廟與夫不可以入廟則為壇以祭周公壇墠以告于三王亦若是也使其為武王而禱則太王王季文王蓋有廟焉而壇墠非所宜設也既有三壇矣乃於三壇之南設一壇也将告于三王故其壇北面而周公立其上也周公立壇之上則植璧秉珪告于太王王季文王之神以請代武王之死漢孔氏曰璧以敬神植置也置於三王之坐周公秉桓圭以為贅案下文曰爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪則圭璧似皆以祈神非周公執桓圭以為贅也使其執圭以為贄則其歸俟爾命不當言屏璧與圭雲漢之詩曰圭璧既卒寜莫我聽周禮典瑞曰四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望祼圭有瓉以肆先王以祼賔客圭璧以祀日月星辰則古者禱祠兼用圭璧周公之告于三王也則史為竹簡書其祝辭執而讀之其辭則下文是也元孫謂武王也某者謂武王名也周公之禱也蓋用武王名及史官記載則諱其名而代以某字左氏傳申繻曰周人以諱事神名終将諱之名之諱也蓋始於周自周以前不諱名也故武丁太甲盤庚皆以名其篇若其號諡然至周始以號諡易其名而諱之然惟斥其名則有所諱若此篇不曰元孫𤼵而曰元孫某不曰以旦代𤼵之身而曰以旦代某之身也至於其他文字用𤼵字則無所諱若噫嘻春夏祈榖于上帝之詩而曰駿𤼵爾私蓋不諱𤼵字也至於末世然後其諱寖廣故有以國廢名以官廢職以山川廢主以器幣廢禮之說非古之制也武王既遇危癘暴虐之重疾是将淪於死矣苟爾三王有丕子之責于天必欲償其責而使武王之不可以復生則不如以旦代其身也自太王王季而言之曰元孫自文王而言之則曰丕子其實一也元長也丕大也皆謂武王以長子繼世而有天下也周公所以欲以其身代武王之死者蓋以其仁若考而又能多才多藝可以事鬼神而武之多才多藝以事鬼神則不若已也是元孫之死不若旦之死也元孫雖不若旦之多才多藝以事鬼神而其受命于帝庭以有天下敷布其德以佑助四方之民用能定爾三王之子孫于下土或為天子或為諸侯使四方之民莫不敬而畏之則是旦之生不若元孫之生此所以欲以旦代某之身也予仁若考先儒謂仁能順父以若訓順不如薛氏之說為長薛氏曰若如也與不若旦之若同義蓋惟其仁如父故可以事鬼神也周公既自謂其仁若考又自謂其多才多藝可以事鬼神而謂武王之多才多藝以事鬼神則不若旦者正猶武帝之稱汲黯曰使黯任職居官亡以瘉人至其輔少主守成雖自謂賁育不能奪也然雖拙於任職居官而能輔少主守成故可以託六尺之孤武王雖短於多才多藝事鬼神而能敷佑四方故可以王天下如之何遘厲虐疾而遂至於不可救哉此所以欲以身代之也雖然亦非短於多才多藝不能事鬼神也但周公方為武王而禱欲以身代其死則其辭不得不爾也嗚呼者又嗟歎而言之也言武王既可以敷佑四方以奠國家九鼎之業蓋其已膺上天之命矣今爾三王當有以輔之無使其天之降寳命於此而廢墜也寳命不墜則武王享其大禄以為社稷宗廟之主而三王之神靈亦将格矣周公既言武王之才藝不可以事鬼神於幽冥之間惟可以上膺皇天之命以定我國家之子孫下撫四方之民以成太平之功其死也則将墜天之降寳命其生也則先王亦有所依歸其利害明白灼然可見矣夫三王在天之靈雖幽明殊塗而其心豈異於人哉然而不可言語接也故曰今我即命于元龜以决其吉凶焉即命猶所謂聽命也爾之許我謂許我代武王之死也我則當以此璧與珪而歸以俟三王之命将以此死而事神也爾不許我則武王不免於死我将屏藏其珪璧不得以此而事神矣既以許不許而决於三王於是乃以龜之三兆卜之而三龜皆吉故曰一習吉習與習坎之習同三龜既皆相因矣則又以占書而考之於是啓其鎖籥觀其所藏之占書亦吉也周官太卜曰掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體百有二十其頌皆千有二百頌即春秋所謂繇而此所謂書也故既占則必視其書公視其兆則曰如此兆體王必無害也王之無害則是新受三王之命而許我武王之考厥終命為可圖也我既以璧與珪而歸俟爾命則於此當俟其能念武王假之命以終其德而已當代其死也予一人指武王也公於是自墠壇之所而歸祝史乃納其禱死之冊於金縢之匱縢緘也藏冊書之匱以金緘之欲人之不𤼵也周公請代武王之死其心忠矣然必緘而藏其書者非是周公欲藏此書以為他日之觀也蓋古者卜龜既畢必納其冊書於匱從而緘之異日将有大卜則復啓焉不然則否此故事也周公卜于三王啓籥見書者始啓金縢之匱也公既歸則祝史以故事納其冊於匱中緘而藏之爾案周官占人凡卜筮則繫幣以比其命鄭康成曰既卜筮史必書其命龜之事及兆於冊繫其禮神之幣而合藏焉書曰王與大夫盡弁以啓金縢之書乃得周公所自以為功代武王之説是命龜書此言深得金縢之㫖蓋其冊書以故事而藏之非特為金縢以藏其冊也公自墠壇歸之明日而武王遂已瘳矣夫請代武王之死者周公之本心也王瘳而周公不死此則天也非人之所能為也蓋天之於人雖若茫昧不可測知而其禍福之應如影之隨形嚮之應聲未有動於此而不應於彼者髙宗恭默思道而夢帝賚之良弼周公代武王之死三龜習吉而王翼日乃瘳皆其至誠洞逹神明故其應也如此之速應非自外也夫死生鬼神之際聖人之所難言也禮記檀弓孔子曰之生而致死之不仁而不可為也之死而致生之不知而不可為也是故竹不成用瓦不成味味當作沬木不成斲琴瑟張而不平笙竽備而不和有鍾磬而無簨虡蓋古人之所以事死者務所以神明之而不以為斷然必有所居處動作於幽冥之間與其平日之事無以異也今周公之所以禱於三王者夷考其辭則是鬼神之居於地下亦如其未死之前不幾於巫覡里巷之見乎哉在易繫曰原始反終故知死生之説精氣為物游魂為變是故知鬼神之情狀此蓋聖人之分也聖人之德貫天地通神明能盡人之情於昭昭之際則有以盡鬼神之情於冥冥之間是以其辭委曲詳盡如此而不為過其或未能事人而欲事鬼未知生而欲知死者則不足以當乎此矣是説也某於盤庚嘗論之矣武王既喪管叔及其羣弟乃流言於國曰公将不利於孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得于後公乃為詩以貽王名之曰鴟鴞王亦未敢誚公秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以啓金縢之書乃得周公所自以為功代武王之説二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予冲人弗及知今天動威以彰周公之德惟朕小子其新逆我國家禮亦宜之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之嵗則大熟周公既禱于三王請以其身代武王之死其至誠洞逹神明龜既習吉而王之疾頓愈自此以上皆史官叙述其請死而藏其書於金縢之始末為已備矣夫周公之心以社稷宗廟之安危自任乃為已而禱其誠心所𤼵出於悃愊豈蘄人之知已哉故夫祝史與夫百執事之人親覩祝冊灼龜之事者則戒之使勿泄而召公太公雖與之比肩事主以秉國之鈞又亦匿之而不與之言自非成王因風雷之變将卜以視其休祥而得金縢之書則周公之心孰得而知之哉故自此而下又叙其攝政而遭變仗大義以滅親雖兄弟之大倫有所不顧其誠心所感而風雷為之變成王之疑自此釋矣然後金縢之事顯然著見於天下後世故雖自周公居東二年以下其事迹皆在大誥之後然而實與周公請死之事相為終始故於此載之如左傳之所載因陳完奔齊而言成子之得政因北宫文子之入聘而言鄭之得人杜元凱所謂得終言之者此篇亦然也武王同母弟十人長曰伯邑考次曰武王次曰管叔鮮次曰周公旦次曰蔡叔度次曰霍叔處武王克商大建親賢以藩屏王室周公以聖德留輔相朝廷而管叔蔡叔就封於外相紂之子武庚以治商餘民武王既喪周公以成王㓜沖遂攝政當國管叔乃與其弟蔡叔霍叔使羣不逞之人流傳其言於天下曰周公将為孺子之不利奪其位而自有之孺子指成王也當是時成王之年纔十餘嵗則可以孺子言之也而文王世子之篇乃曰武王九十三乃終則成王生時武王蓋年八十餘矣左傳又曰邘晉應韓武之穆也此數國者皆武王之子成王之弟豈武王八十已後頓生此數國邪此理必不然矣夫君薨百官緫已以聽冡宰三年古之人皆然也周公以冢宰攝政而乃有流言之變者蓋商人尊尊兄死則弟及武王崩成王㓜冲周公以聖德聞於天下自商禮言之周公當立也今立成王而周公相之為殷人者固不能釋然而無疑矣管叔之次於周公為兄周公為相於朝管叔固已有不平之氣故當其攝政則唱羣弟以流言於國曰公将不利於孺子遂挾武庚以叛而殷人靡然從之者惟其疑故也蓋自武王有疾而周公之憂固已及此矣周公禱於三王也不以為武王禱而為已禱焉彼誠以為武王喪殷人未附於周已以冢宰攝政處可疑之勢天下有變則必将有以予為口實者而成王之㓜冲其明未足以有察周之社稷蓋岌岌然矣故為是而禱也漢孔氏曰二叔以周公大聖有欲立之勢遂生流言誠哉是言也當周公之東征二公皆嘗居周公之位貳朝廷之號令矣如下文曰二公及王乃問諸史與百執事又曰二公命邦人凡大木所偃盡起而築之則二公之權柄蓋不减於周公而流言不及之者蓋其所處者非可疑之勢故也夫武王之崩周家之得天下未久也而殷之餘孽與周之讎親相扇而起周之存亡蓋未可知而當時也周公實專朝廷之權其責不歸之周公将誰尸之乎故周公告二公曰我不以法而治此叛黨則将無以告我先王故其兄弟之親有所不敢避也我無以告我先王亦穆公所謂先君若問與夷其将何辭以對也周公既以此言告二公於是遂率兵而東征其居東至於二年然後武庚三叔咸服其辜故曰罪人斯得也周公以殷人之叛恐其禍之延於天下遽起而征之而其得罪人至二年之久則其東征也雖曰為社稷宗廟之計而重傷天倫則誠有黽勉不得已之意焉武王之伐紂周公之誅管蔡其心一也蓋紂君也武王以臣而伐之管叔兄也周公以弟而討之雖其終也不得不伐而皆有彷徨不忍之心此聖人忠厚也當成王㓜冲履至尊之勢周公以叔父之尊秉其政事其德之逺著天下之所畏服自常人言之誠以為使周公而有私心一二年而天下可移矣故管叔因其可疑之迹而造此無根之言成王之明未足以察其情偽安得而不疑哉周公不俟成王之覺悟遽往而征之蓋機不可失一日縱敵數世之患也故雖遭流言之謗而益以其身任天下之重曽不自沮而為身之謀也夫人謂已有奪宗之謀已惡其謗而親以兵誅之則近乎挾私忿以快其志矣自非深知周公者誰無疑之之心是使成王益疑矣成王益疑故周公居東而未還作為鴟鴞之詩以遺王其詩曰鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔斯言鳥有巢呼鴟鴞而告之曰汝既取我子矣無毁我之居室我之於子非不愛也寜亡其子而不可以亡其室以見其惜巢之甚也是以公之東征其心惟思王室之不安亦如鳥之惜巢也其下章皆言其作室之艱難以喻周室積累之勤故不得避小嫌以自全觀鴟鴞之詩周公之言非不反覆明白而成王猶疑之曖昧而不决故有䧟公之志然未敢𤼵也其所以有陷公之志者蓋以成王猶未肯以鴟鴞而信周公之志果如是也辟法也鄭氏以辟為避其說以謂羣叔流言周公避居東都及遭風雷之變啓金縢之書迎公來反及攝政方始東征信如此說則此篇自嵗則大熟以上其事皆在大誥之前矣成王疑之周公出避其説亦不可至於罪人斯得其説不行故又從而為之説曰周公居東都其黨屬亦皆奔亡至明年乃為成王所得而誅之公作鴟鴞之詩救其臣屬請勿奪其官位土地夫周公之黨有何罪而謂之罪人足見其説之陋歐陽詩本義已破其説矣周公雖作鴟鴞之詩成王猶未肯以其言而信其心然則周公之心非金縢則不可得而見而金縢之書自二公以下皆所不知自非天誘其𠂻則成王之疑将何時而釋乎成王之疑不釋則國之存亡未可知也然而周之文武膺上天之休命其社稷無疆之傳蓋未艾也周公之德既足以當上天之意此所以有雷風之變以顯周公之德而剖成王之疑也當是時也秋嵗雖大熟百榖未成未可刈穫而天忽雷雹大作又繼之以風其禾盡偃於田畆之中雖大木皆拔焉以天變之來周人大懼王不勝其憂也於是與諸大夫盡服其皮弁以啓金縢之書蓋将啓緘而卜是風雷之為何祥也啓緘之際猶未卜也而得往昔周公請代武王之死所納之冊于金縢之匱中蓋因卜而得其書是偶而得之矣非天誘其衷而何諸史與百執事皆昔之從周公以卜者今王将卜焉故復為卜而俱至使其非為卜而俱至則不應皆在也二公皆至既覩其事而不知其由也故從而問之諸史與百執事同辭而對曰信乎公之有是事也又嗟歎以告王曰昔公命我勿得泄其言今王既有問不敢不以實對之昔者周公雖作鴟鴞之詩以貽王而王猶未知周公之心既得此言然後知周公之心其所以忠於王室者至矣蓋禱鬼神於幽隠人所不可測知之際而其言亦若此此其所以悟也故王執書以泣曰其勿穆卜蓋我之啓書也以卜風雷之祥今見周公之志若是是天以此而警予矣故可以勿復卜之矣以其得書而止卜乃知其為卜而啓緘非為周公而啓也蓋周公之藏書于金縢也徒以是事不得不藏非預知天時有風雷之變而嗣王之必将啓緘以卜之也成王之啓書于金縢也亦以其将卜之不得不啓非素知公有請死之冊将取而觀之也啓緘而遂知周公之心此豈人力之所能為哉言二公及王乃問諸史與百執事則是二公先以此𤼵問而王遂繼之也意曰周公之心二公非不知之第以成王尚疑非空言之所能釋既得此書則可觧之矣故倡王而問之昔漢髙帝嘗疑蕭何受賈人金王衛尉對曰相國守闗中闗中摇足則闗西非陛下有也相國不以此時為利乃利賈人之金乎文帝嘗疑周勃反薄昭曰絳侯綰皇帝璽将兵於北軍不以此時反今居一小邑顧欲反邪其事遂皆得釋夫蕭何周勃挾不世之功而居可疑之地非空言所能游説也非得夫昔之所不為以證於其所行舉重以明輕則何以觧髙帝文帝之惑哉蓋曉人者當如是也二公既得金縢之書遂知周公之疑可以觧故倡王而問之意者亦出於此彼周公尚欲以其身代父之死况肯奪其嗣子之位乎王既使勿卜矣於是遂言曰昔公竭其勤勞於王家至欲以身代先君之死其至誠於社稷也如此而我以㓜冲之資乃不及知是我之罪也此成王自反之言也伐柯九罭之詩周大夫刺朝廷之不知今為此言則既已知之矣其所以知之者則以上天動雷電之威以顯周公之聖徳也周公始以成之疑猶居于東未還故成王既歎其忠則謂今小子其當自新而逆之以歸我國家所以褒崇之禮又當得其宜也惟以逆公為我國家之禮所宜故於是還公於東都比其至也則郊勞而親逆之故曰王出郊先儒以郊為玉幣謝天誤矣成王既出郊於是天為之反風起禾以見周公之宜還而明成王之得禮也天乃降雨以止風風止則禾起二公乃命邦人凡禾之為木所仆而不能自立者則為之起而築之加人功焉此嵗之所以大熟也漢孔氏曰木有偃拔起而立之築為築木非也築者築禾也漢董仲舒論天人相與之際甚可畏也國家将有失道之敗天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至使成王不能自新以逆周公則其災豈止於雷風而已哉其始也疑周公天大雷電以風其終也逆周公則天乃雨反風天人之際可畏如此然非周公之忠載於金縢則不能因天變以悟成王非天有雷風之變則不能警成王以逆周公故曰天不人不因人不天不成也夫禱于三王欲以身代武王之死周公為之不疑至於子路請禱夫子之疾而夫子不許者蓋父有疾子禱焉君有疾臣禱焉師有疾弟子禱焉此皆出於至誠惻怛不忍之心而非有為為之也子路以其意自禱可也宣言之而請於夫子則不可也胡不觀之周公乎前命二公曰未可以戚我先王下則命諸史與執事勿敢言自非天有雷風之變成王因啓金縢之書而得其說則周公請命之事終無以見於天下後世然則周公之禱也豈欲人之知邪子路未禱而先請於夫子亦異乎周公矣尚書全觧卷二十六
