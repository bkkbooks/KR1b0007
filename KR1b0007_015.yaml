body:
  text: 尚書全解卷十五宋林之竒撰湯誥商書此則周官士師所謂用之於㑹同之誥也古者天子始受命奄宅四海則諸侯皆率其職以奉朝㑹于天子之都所以正始也如舜禹之受禪既告祭天地百神然後輯五瑞覲四嶽羣牧班瑞於羣后康王既受顧命出在應門太保畢公各率其方之諸侯皆奉圭兼幣致其壤奠此常禮也湯武既從征伐得天下其反國也諸侯皆率職來朝致禮於君此亦禮之常也此篇主於記載其所告諸侯之言而因叙其事故其所叙為略然而可以互見也武成曰王來自商至於豐乃偃武修文歸馬於華山之陽放牛於桃林之野示天下弗服丁未祀於周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成既生魄庶邦冡君暨百工受命於周武王於是為之稱其先世積德纍功與大其所弔民伐罪之意也其叙事則詳而其所以告諸侯之言則首尾不甚備者蓋武成之篇主於敘事之故也至此篇言王歸自克夏至於亳誕告萬方而復綴之以所告諸侯之言首尾甚備而其敘事則略以此篇主於記載其言故也古者左史記言右史記事記言者則言詳而事略記事者則事詳而言略其體自有不同於其間此二篇雖記載之體不同而其辭則皆是始攝大位而告諸侯以正始也湯既黜夏命復歸于亳作湯誥黜廢也黜夏之命不使復膺天統也湯之勝夏也則黜夏命而廢之武王之勝商也武成之篇不曰黜商命及其殺武庚封微子於宋然後曰武王既黜殷命者蓋湯之伐桀桀遂棄國而去竄於南巢湯既因而不追以全君臣之義矣故於是黜夏之命而不復為之立後使居其所都之國也武王牧野之戰前徒倒戈而紂見殺既違武王之本意也矣故封箕子武庚於殷故都使嗣其宗廟因而不改亦所以存君臣之義也及武庚作亂自絶於周然後黜殷之命而其立微子代殷後則居之於宋不復使居殷之故地也若此之類皆聖人之處事仁之至義之盡也亳者湯之都也湯之亳文王之豐鎬皆王業之所基也故既除桀紂之暴則不復都夏商之故地也而必歸於亳與豐鎬本其王業之所自興故也孟子曰湯以七十里文王以百里七十里則亳也百里則豐鎬也商周之子孫世世守之得之則興失之則廢非其地之險固如秦人殽函之都有金城千里山河百二之勢也惟其民心之所愛戴者尤深且固故以為商周根本之地也湯歸於亳諸侯則皆朝以見新君不可以無告也史官録之故為此篇王歸自克夏至于亳誕告萬方王曰嗟爾萬方有衆明聽豫一人誥王歸自克夏至於亳猶所謂王來自商至於豐誕告萬方者誕告萬方諸侯也經惟言誕告萬方所以知為諸侯也蓋萬方之民非可以皆至於天子之庭而以武成庶邦冡君暨百工受命於周之文而考之則知其為萬方之諸侯也必矣嗚呼爾萬方有衆明聽豫一人之誥禮曰天子自稱曰豫一人魯哀公誄仲尼曰昊天不弔不憖遺一老俾屏豫一人以在位子貢曰稱豫一人非名也是知非天子不可以稱豫一人湯於是踐天子之位矣故對萬方有衆稱豫一人以誥之使之明聽其言也夫湯誓之作在於未克夏之前而亦稱曰爾尚輔豫一人者某嘗疑此篇與泰誓之篇稱豫一人者皆是史官記録其書之時增加潤色之辭學者當以意逆志惟皇上帝降衷于下民若有恆性克綏厥猷惟后自惟皇上帝至於賁若草木兆民允殖是告衆以所為應天順人伐夏弔民之舉也自俾豫一人至於尚克時忱乃亦有終是告之以戒慎恐懼保邦安民之意也詳考此篇所告首尾本末與仲虺之誥相為表裏湯之此言蓋發於仲虺者也仲虺之誥始言天命人心之不可違終言慎終如始欽崇天道永保天命之意至於湯歸於亳其所以告萬方者終始之意殆不越此蓋仲虺之言所謂起豫者也故張諌議曰湯既勝桀以有天下而慙德多焉故仲虺作誥於前以明夫天之所以命湯為君者凡以民之有欲而俾乂之也是故其書但言民有欲而非其君以乂之則亂惟天生聰明時乂湯又自誥於其後以明天之所以命豫為君者凡以有道而俾綏之也故其為誥至言上帝降衷於下民若有常性克綏厥猷惟后夫乂民之欲以政事也未足以盡為君之道惟因民之常性而安其所謂道則有教存焉而君道於是乎至矣是以二誥之辭相為終始然後湯之慙德可以已宜其所誥者必要其所至也此言可謂盡之矣皇大也上帝天也衷者善之本於固有者也詩曰天生蒸民有物有則降衷於下民即所謂有物有則也惟民之衷本於上天之所命則是民之性無有不善矣然天雖能降衷下民不能使民保其固有之常性而勿失故為之君而付之以教命之任師曠曰天生民而立之君使司牧之勿使失性謂之勿使失性者是所謂勿使失其所降衷也民既有降衷之性至於順其固有之常性以安其所謂道者是乃君之任也故曰若有常性克綏厥猷惟后既曰若有常性又曰克綏厥猷惟后者蓋率性之謂道然順其性則能安其道矣不能順其性則悖理而傷道安能綏厥猷哉古先聖王所以為教化之本未嘗不本諸此堯授舜舜授禹三聖人相授之際而其言曰天之歷數在汝躬允執厥中四海困窮天祿永終蓋能允執厥中則能若有常性以綏厥猷矣不然則四海困窮天祿永終矣桀紂是也故湯欲言桀之暴虐其民以亡天下則以此言為先者蓋推本乎上天所謂立君以乂民之意是亦仲虺之意夏王滅德作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祇此言桀之罪自絶於天結怨於民也夏王滅其已之德放僻邪侈喪其良心不復存則是在已者既不能保其中矣其何以若常性綏厥猷哉如此則無不忍之心而肆為威刑以敷虐于萬方百姓百姓被其凶害如荼之苦如毒之螫不可堪忍也言及萬方百姓者蓋其作虐者廣而怨之者衆也自古無道之君未有不用刑威以毒民者若苗作五虐之刑紂為炮烙之刑皆所以虐者廣而怨之者衆遂亡其國桀之虐民雖不詳見於經意其亦如苗之五刑紂之炮烙秦之參夷是也屈原曰人窮則反本故勞苦倦極則未嘗不呼天疾疢慘怛未嘗不呼父母桀之虐政加於民民既苦於虐政無所告訴窮而反本則惟稱寃於天地鬼神以冀其拯己也故曰爾萬方百姓罹其凶害弗忍荼毒並告無辜於上下神祇夫天之愛民也甚矣東海殺一孝婦天為之大旱况萬邦百姓並告無辜於上下神祇則上下神祇安得不赫然震怒而降之禍乎故繼之曰天道福善禍淫降災於夏以彰厥罪天道福善禍淫降災于夏以彰厥罪肆台小子將大命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏此蓋言天之常道於有善者則福之淫則禍之桀既虐民如此故天於是降其災異不祥之事以彰其獲罪於天也董仲舒曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至天既降災於夏以譴告警懼於桀而桀不知自省則是傷敗之徵於是乎成矣既下其災異之事以彰厥罪矣故我小子將天所命之威以致天誅而不敢赦也故曰肆台小子將天命明威不敢赦將天命者所以助夫天之福善也將天威者所以助夫天之禍淫也夫上天之載無聲無臭焉知其所謂命威而將之也孟子曰天不言以行與事示之而已矣天之降災於夏以彰厥罪是亦以事示之矣故湯以是而知天命所在遂行天討於桀以奉天之意非天諄諄然而命之也既奉天明威於是用𤣥牡以昭告於上天神后請罪有夏𤣥牡者黑色之牡也神后者后土皇地祇也告於上天神后者蓋禱於天地神祇因其民之所告無辜者以為斯民請加罪於有夏也正義曰商尚白牡用白今言𤣥牡夏尚黑於時未變夏禮故不用白也若先儒說𤣥牡往往從此說某竊謂此云𤣥牡者但是一時所用祭告於天地之牲不須必因其色以求其義湯用𤣥牡則以為未變夏禮如魯頌曰白牡騂剛豈以未變商禮乎此正所謂相馬而辨𤣥黃者也先儒往往因此遂有五德更生之說引此為證以為出於聖人之經而所以改易服色為帝王之急務若蘇內翰之明逹猶以此為信其說以謂禹治水得天下故從水而尚黑商人以兵得天下故從金而尚白周文有流火之祥故從火而尚赤其鑿甚矣蘇公嘗有言曰邪說之移人雖豪傑之士有不能免此正目睫之論也聿求元聖與之勠力以與爾有衆請命既用𤣥牡以告上天神后請罪有夏猶懼其不濟也於是遂求元聖與之盡力以為爾有衆請命於天蓋湯之伐桀實資伊尹之功也孟子曰伊尹思天下之民匹夫匹婦有不被其澤者若已推而納諸溝中其自任以天下之重也如此故就湯而說之以伐夏救民也是湯之伐夏救民之謀蓋出於伊尹也故湯誓曰伊尹相湯伐桀升自陑遂與桀戰於鳴條之野蓋推本其謀之所自出也故其告萬方也亦推本而言之曰聿求元聖與之戮力元聖即伊尹也上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖湯既與伊尹盡力以為萬方有衆請命於天矣於是上天孚信其請眷佑下民故鳴條之戰桀知其罪退伏逺屏竄逐於南巢也湯以桀為罪人武王以紂為獨夫蓋其得罪於天人則不復有人君之道故也既上天孚佑成湯與伊尹之請而罪人黜伏以此見天之福善禍淫其應如響無所僭差也賁若草木兆民允殖孔氏曰賁飾也言天下惡除煥然咸飾若草木同華民信樂生其說迂回隱晦不若王氏蘇氏之說為善王氏曰草木者天之所生民之所殖也非天所生則民不能殖非民所殖則天不能成湯之受命也天與之人立之故曰天命弗僭賁若草木兆民允殖觀民之所立則知天之所與矣蘇氏曰天命有信視民所與則殖之所不與則蹶之若草木然民所殖則生不殖則死此二說皆善蓋謂我之所以受命者本因民之所殖也然王氏不解賁字之義薛氏增廣其說謂賁若者方興而未就也蘇氏曰賁飾也其理甚明炳若丹青此二說皆鑿某嘗思此二句其言若草木兆民允殖則文義足矣雖不加賁字亦無害也加賁字則其說穿鑿而難通賁字當讀為譬字譬若草木也然變易經文以就已意某嘗尤之矣尤而效之不敢為也當闕之俾豫一人輯寧爾邦家兹朕未知獲戾于上下栗栗危懼若將隕于深淵此則言其雖應天順人拯斯民於塗炭之中然而自負其稱兵犯上之慚仰愧俯怍而不敢自寧也天生民而立之君蓋以其降衷於民而斯民不能以自保故使之若有常性以綏厥猷則其任可謂重矣桀以不能若其性綏其猷故人怨於下天怒於上湯因天人之怨怒以誅伐之至於罪人黜伏矣則夫所以若民之常性以綏其猷者其任遂歸於湯矣故懼其德之弗克負荷而懷不自安之意若將無以容其身者故以謂天既降罪於桀而使我一人輯安爾邦家我亦豈能自保其不獲戾於上下言上則懼其得罪於天下則懼其得罪於民也惟其未知獲罪於上下故惴惴然懷危懼若將隕墜於深淵之中言其既得踐天子位而其心則以獲戻於天人為憂而不以位為樂也蓋古者聖人雖甚盛德未嘗敢忘自警之意戰戰兢兢如臨深淵如履薄氷皆出於其中心之誠然惟其恐懼修省如此兹其所以為全德也湯之伐桀其慮所終稽所敝猶懼來世之亂臣賊子以為口實則其當時始履天下之籍而朝諸侯寧無慙乎故其栗栗危懼者自然之理也而漢孔氏曰謙以來衆心唐孔氏亦以謂湯之伐桀上應天心下符人事本無罪而云未知得罪與否者謙以來衆心也其意蓋以湯本無祇懼之意特其即位之初託為此言以冀衆悅耳如此則聖人之所為與夫王莽遭翟義兵起抱孺子朝羣臣告禱郊廟者無以異也王氏又曰湯始伐桀商人皆咎湯不恤我衆然湯升自陑告以必往至於孥戮示衆無所疑難也及夫天下已定乃曰栗栗危懼若將隕於深淵蓋有為之初衆人危疑則果斷之以濟功無事之後衆人豫怠警戒所以居業其異於衆人也逺矣此其所以為湯也若夫事未濟則從而懼事已濟則喜而怠則是衆人也豈足以制衆人哉王氏此說徒以其為新法之地而已學者遂信之以成湯之意果如是豈不誤歟子路問於孔子曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也湯雖伐罪弔民然驅馳於鋒鏑之下豈得恝然全無恐懼之意及無事而後懼哉以為有事之時不可以懼則武王於泰誓曰豫小子夙夜祇懼是不應懼而後懼矣子之所慎齊戰疾聖人之於事無所不慎而猶所慎於此三者今謂有事則不當懼豈非邪說簧鼓惑人主之聽以逞其私乎禹曰豫臨兆民懍乎若朽索之御六馬豈計夫有事之與無事乎故湯之惴惴危懼非至是而後有也自其興師於亳之時已懼其不克濟矣而至於踐天位臨兆民則尤不遑寧者也凡我造邦無從匪彝無即慆淫各守爾典以承天休惟其臨兆民之危懼如此故明告所為造邦與之更始之意使之曉然知上之德意志慮也謂凡我之立此邦家惟欲使爾萬邦無從匪彝無事慢遊各守汝之典常以共承天之休美如此而已蓋無從匪彝無即慆淫則能得其常性以安其道而保夫天之降衷矣故能承天之休也桀之所亡者惟不能是故也秦人自商鞅以來以嚴刑峻法督責天下棄灰於道者誅步過六尺者不赦刑人相望於道斯民愁歎不保朝夕故漢髙帝入關即召諸縣豪傑曰父老苦秦苛法久矣誹謗者族偶語者棄市吾與諸侯約先入關者王之吾當王關中與父老約法三章殺人者死傷人及盜抵罪餘悉除去秦法吏民皆案堵如故凡吾所以來為父兄除害非有所侵暴毋恐且吾所以軍灞上待諸侯至而定要束耳某嘗謂髙祖此言可與湯誓之書並傳於不朽蓋其用意一也桀之所以結怨於民者惟其滅德作威以敷虐於爾萬方百姓俾之罹其凶害弗忍荼毒爾故湯既得天下則謂我之造邦非復有嚴刑峻法如桀之世也汝萬方有衆但能無從匪彝無即慆淫則能各守爾典以承天休矣此正髙祖約法三章之意孝經曰示之以好惡而民知禁此之謂也爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心言汝苟能無從匪彝無即慆淫各守爾典以承天休是有其善矣故當度德定位量材授職與爾共天位治天職食天祿弗敢掩蔽爾之善也周書曰夏迪簡在王庭有服在百僚是湯之於夏苟有善者無不用之罪當朕躬言我之躬苟有罪亦不敢自赦其所以然者以天之惠迪吉從逆凶無所僭差善不可得而蔽豫之有罪亦不可得而赦之也其爾萬方有罪在豫一人豫一人有罪無以爾萬方所以謂罪在朕躬非必是在已一身有可指之罪然後可罪也蓋天之降衷於下民而以夫若常性綏厥猷者付之於一人故為君者必使天下之人皆不失其降衷之常性以安厥猷然後無負於上天之撫字民之有罪是為君者教之不至所以自棄於愚不肖之地而莫能反非民之罪也乃君之罪也此其所以罪當朕躬也蓋民有罪君當之耳故繼曰罪當朕躬弗敢自赦而又言其所以當朕躬之罪而曰其爾萬方有罪在豫一人豫一人有罪無以爾萬方言民有罪則是君有以致之君有罪則是君之自取也民何與焉夫以一人之身臨涖四海之廣而天下之人匹夫匹婦之有罪戾者皆歸之於其身失匹夫匹婦之意則上負上天之所寄托以逆夫上帝之心而危敗禍亂繼之矣故斯民之欲無罪者惟自修飭於一身則可矣而君之欲免於罪戾必使舉天下之人皆無罪然後為能盡君之職而無負於上天之所任論至於此則其獲戾於上下亦其難哉兹其所以栗栗危懼若將隕於深淵也嗚呼尚克時忱乃亦有終湯之所以誥多方而其兢兢業業之意盡於此矣於是嗟歎其難而總結之曰爾邦有衆能信此言則我之社稷庶幾能祈天永命以有終也曰乃亦有終者不能自必之辭也昔定公問於孔子曰一言而可以興邦有諸孔子曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎蓋有天下者欲綿社稷無疆之休惟在知夫為君之難而兢兢業業不忘戒懼常若危亡之在於朝夕者故國家至於永保如或以為君為易則將偃然自肆不復以危亡為念而自以為泰山之安此其所以敗亡乘之而不自知也湯之誥萬邦以謂罪當朕躬弗敢自赦其爾萬方有罪在豫一人豫一人有罪無以爾萬方其真知為君之難如此於是栗栗然危懼若將隕於深淵商之社稷所以傳祚六百年賢聖之君六七作其源蓋出於此後之有天下者尚監兹哉咎單作明居伊訓訓亦書之一體有諄諄警戒之意古人之所以遺後世祖宗之所以誨其子孫臣下之所以規諌其君者皆有此名說命曰學於古訓乃有獲吕刑曰若古有訓此古人之訓也五子之歌曰皇祖有訓又曰訓有之𦙍征曰聖有謨訓此祖宗之訓也伊訓髙宗之訓此人臣之訓也其所以為訓雖不同其諄諄警戒之意則一故皆以訓為名人臣之訓其書之見於篇名者惟伊訓髙宗之訓二篇此亦出於偶然耳若其他忠臣良弼所以陳其嘉謀於上如伊尹傅說周公之所陳者無非訓也先儒泥於篇名故有正與攝之說其意以謂篇名以訓者此其正也不命名以訓而得訓之體者此其攝也故曰訓十六篇正二攝十四夫正之與攝乃尊卑優劣之稱若以伊訓為正咸有一德為攝均為伊尹之言也皆是戒太甲也果何自而分尊卑優劣乎某竊以謂訓者不必拘於篇名凡以一言一話之出於人主之意主於格君心之非以成其德者皆為訓之體也成湯既沒太甲元年伊尹作伊訓肆命徂后伊訓孟子曰湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑太史公曰湯崩太子太丁未立而卒乃立太丁之弟外丙外丙即位二年崩立外丙之弟仲壬仲壬即位四年崩伊尹乃立太丁之子太甲則是湯之後立外丙仲壬二世而後太甲立然而考於序文則類夫太甲承湯之後無有外丙仲壬之二世者故漢孔氏以謂太甲太丁子湯孫也太丁未立而卒及湯崩而太甲立稱元年此亦無所依據特順序文而為此說耳故蘇氏以謂太史公接世本成湯之後二帝七年而後太甲立其迹明甚不可不信而孔安國獨據經臆度以為成湯沒而太甲立且於是歲改元年學者因謂太史公為妄初無二帝而太史公妄增之豈有此理哉序云成湯既沒太甲元年者非謂湯之崩在太甲元年蓋伊尹稱湯以訓太甲故孔子序書亦以湯為首殷道親親兄死弟及若湯崩舍外丙仲壬而立太丁之子則殷道非親親矣以此知太史公之不妄也審如蘇氏此言則當從孟子所謂外丙二年仲壬四年之言矣而程氏又以謂湯崩太子太丁未立而死外丙方二歲仲壬方四歲故立太甲則是以二年四年為年齒之年不以為即位之年數也此與漢孔氏同而某嘗竊謂當從蘇氏之說蓋殷人之傳世兄死則弟及至於周則父子相傳公儀仲子之喪檀弓免焉仲子舍其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子於門右曰仲子舍其孫而立其子何也子服伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫殷周之道其不同也如此微子舍其孫腯而立弟衍者用殷禮也外丙仲壬太丁之弟也以殷禮言之有外丙仲壬則不應舍之而立太甲也故蘇氏之說為可信此篇乃太甲初立之日伊尹為祠於先王而奉之以祗見厥祖明言烈祖之成德以訓於王故序云成湯既沒太甲元年蓋推本其所以作訓之意也夫書序其所以作篇之意而已其所以作之之意與尋常史家記迹其體自有不同苟於書序之言而必以史官記載之體而求之成湯既沒太甲元年以為湯沒而太甲立若盤庚五遷不以意而逆志則是五遷皆在於盤庚之世故當以蘇氏孟子之言為正篇內曰元祀而序則曰元年者殷曰祀周曰年此序疑出於周世之所纂定故以年稱之亦如太甲之篇曰惟元祀十有二月朔伊尹以冕服奉嗣王歸於亳而其序則曰三年復歸於亳皆是周人之辭也蓋殷人之所謂祀至周人稱之則皆以謂年說命曰王宅憂亮隂三祀而子張問於孔子髙宗亮隂三年不言蓋世代既殊則其所稱說亦異也太甲始立伊尹奉之以見於先王之廟於是言其乃祖成湯之所以創業垂統貽厥孫謀者以告之此篇之所以有作也惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冢宰易曰天地革而四時成湯武革命順乎天而應乎人蓋改易正朔之日實肇於湯武之世由其以征伐而得天下故變易前代之正朔以示革命而且與天下更始也夏以建寅為正則以建寅之月為正月建卯為二月以至建子為十一月建丑為十二月至商革夏政以建丑為正則以建丑之月為正月建寅為二月至於建亥為十一月建子為十二月周革商政以建子為正則以建子之月為正月建丑為二月以至建戌為十一月建亥為十二月由正月之名既易則十二月之名亦從而易矣惟元祀者太甲即位之元年也十有二月者商之十二月乃夏之十一月蓋建子之月也案下篇曰惟三祀十有二月朔伊尹以冕服奉嗣王歸於亳太甲以三年十有二月朔方釋喪而服冕服則仲壬之崩當在元年十有一月故得至於三年十有二月為二十五月而即吉也此猶是仲壬之末年也而乃稱太甲之元年者蓋殷之制惟以即位之年稱元年不待踰年也若周之制則踰年乃得稱之故有一年不二君之說蓋其歷代之制度不同不可以一概論也蘇氏徒見春秋之所載天子諸侯皆以踰年然後稱元故以此為例謂經曰惟元祀至祗見厥祖者蓋太甲立之明年正月也正月而謂之十二月何也殷之正月則夏之十二月也殷雖以建丑為正猶以夏正數月亦猶周公作豳詩於成王之世而云七月流火九月授衣皆夏正也史記秦始皇三十一年十二月更名臘曰嘉平夫臘必建丑之月也秦以十月為正則臘當用三月而云十二月以是知古者雖改正朔猶以夏正而數月也此說蓋不然夫謂之改正朔則是已改其正月豈餘月不改者哉在周之時其論隂陽寒暑之節序容或有夏時為言者如七月之詩與夫四月惟夏六月徂暑之類是也至於史官記載其當時之事則未有不以其當時所用之正朔而數月者春秋書王正月則周之正月也其他月名則皆以周正數之非復由夏之舊以春秋觀之則商之正朔蓋可知矣秦以十二月更名臘曰嘉平蓋是漢武帝太初元年既改用夏正史官追正其月名耳在秦史則必以三月書之矣今漢書自髙祖之年以後至於武帝太初元年以前歲首皆書冬十月此皆史官以夏正追正其月名矣其未改夏正也則必以冬十月為正月矣以是知蘇氏之說若有可信實不然也漢孔氏既謂湯沒而太甲立前是太甲即位之初實居湯之喪也故於此則曰湯崩逾月太甲即位奠殯而告此說考之於禮而不合夫古者喪在殯其祭皆名為奠及既葬也虞祔卒哭始謂之祭蓋於是始以鬼神而事之也故祭以有主有尸而奠以陳器而已祠而謂之奠無是理也抑又有所不然者使太甲果是居湯之喪則其宅憂也必在湯之殯宫矣既有湯之殯宫其所以從事於喪禮者有小殯之奠有大殯之奠有朔奠有朝奠有夕奠有薦新之奠未嘗不在於湯之殯宫也豈至此而後祗見厥祖邪以是知漢孔氏之言徒泥經文而於禮有所不合不足以為據也蓋以經文考之太甲居仲壬之喪於內既逾月矣伊尹於是祭於成湯之廟奉嗣王祗見厥祖蓋將明言烈祖之成德以訓之使之知成湯付託之重一羣后而與諸侯正始此蓋禮之變而以義起之也康王既受顧命麻冕以朝諸侯於應門之內亦禮之變也此二者若不許以一時之權而以禮疑之則太甲不當越紼以祭於成湯之廟而康王亦不當釋喪服服麻冕也侯甸羣后咸在者諸侯皆從太甲在成湯之廟也子和曰侯甸於五服為尤近故皆在當是時諸侯之逺者未必能至義或然也蓋天子七月而葬同軌畢至此方踰月則諸侯之逺者容或有所未至也薛氏曰百官總已以聽冢宰者王宅憂不言攝國事者冢宰而已故百官總已惟冢宰之是聽也冢宰以典則佐王治邦國都鄙官府以其德義信服於百僚至是有變乃攝國事而下不惑也漢自吕太后專制而是禮喪矣此言得之伊尹乃明言烈祖之成德以訓於王曰嗚呼古有夏先后方懋厥德罔有天災山川鬼神亦莫不寧暨鳥獸魚鱉咸若伊尹既奉太甲以見成湯之廟矣於是明言其功德之祖成湯所以艱難創業垂統之德以訓告之其言即下文所陳是也嗚呼者歎辭也言夏之子孫弗率其祖宗之德以至於滅亡故嗟歎而言之以致其告戒之意詩曰殷鍳不逺在夏后之世言商之所宜鍳者莫近於夏故首以夏之滅亡而告之也古有夏先后者言自桀以前上至於啓凡繼禹而有天下者皆是也亦猶周公每言商之先后則曰自成湯至於帝乙也蓋言夏之先后聖賢相繼以有天下方且勉行其德兢兢業業不敢自寧上合於天故無有天災也至於山川鬼神亦皆安居以及鳥獸魚鱉之微亦各遂其性此其所謂罔有天災也夫人君之德苟不能上合於天而天降之災焉則山川鬼神將不安其居為妖為厲鳥獸魚鱉之不順其性而將為怪為孽矣劉向曰和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也山川鬼神亦莫不寧暨鳥獸魚鱉咸若則可以謂和氣致祥矣此夏之所以安也于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳此遂言桀不率先祖之德業皇天於是降災以彰厥罪故山川鬼神不安其居而或崩或竭或出而為響鳥獸魚鱉不順其性而其變異百怪如春秋經之所書與夫洪範五行傳之所載是所謂乖氣致異也變異形於下則是天意怒於上矣故雖承其祖宗奕世積纍之業而卒於為天所棄也天之所棄必假手於人以誅之桀既得罪於天必假手於我商有天命之成湯使之伐夏救民以為天吏也造攻自鳴條朕哉自亳者漢孔氏曰造哉皆始也於是始攻桀伐無道由我始修德於亳此說未通據孟子論伊尹就湯而說之以伐夏救民而卒舉其言曰天誅造攻自牧宫朕哉自亳趙臺卿釋之以謂桀造作可攻之罪從牧宫故曰天誅造攻自牧宫謂遂順天而誅也趙氏此說比孔氏為優故王氏曰鳴條夏所宅也亳商所宅也桀有可伐之罪然後湯與伊尹謀於亳而往伐之所以起兵戎者夏也故曰造攻自鳴條既有可誅之罪湯遂自亳而往攻之故曰朕哉自亳周書曰我不爾動自乃邑亦與此同義王氏此言亦趙岐之意也蓋言桀有可攻之罪故我得而攻之攻之者湯造攻者在桀也孟子曰國必自伐然後人伐之此亦必然之理也伊尹之所以言此者其意蓋謂夏之有天下傳十餘世綿六百年方且為上天之所眷佑至於山川鬼神亦莫不寧暨鳥獸魚鱉咸若宜若不可得而動者而為一桀之所不率則其顛覆之緒不旋踵而至況我商家肇造未久苟使太甲不能以夏之顛覆為監遂至於弗率繼成湯之德有可攻之者至矣故伊尹既言有夏之所以失天下之易於其前又陳其湯所以得天下之難於其後以致其警戒之意惟我商王布昭聖武代虐以寬兆民允懷今王嗣厥德罔不在初此則言湯伐桀時之事也聖武猶所謂神武也蓋聖人之義德也楊龜山曰湯之伐虐以寬苟不明昭其聖武則夏之民必以為厲已故布昭聖武然後兆民允懷與世之黷武異矣此說為善夫兵凶器也戰危事也爭逆德也此實天下至不說之事也成湯用之布昭聖武於天下東面而征西夷怨南面而征北狄怨曰奚獨後豫攸徂之民室家相慶曰徯豫后后來其蘇謂之蘇者豈有他哉惟其代虐以寬故也苟非代虐以寬而徒為布昭其武焉則雖如秦始皇之譎詐項羽之勢力徒促其亡而已蓋非代虐以寬則如水益深如火益熱而民叛之矣湯之布昭聖武本於代虐政故雖用其不祥之事而民信而懷之若大旱之望雲霓者由其寬仁之德洽於人心故也既言湯以寬仁之德洽夫民心之甚遂以懷兆民而有天下太甲既嗣其位不可不戒慎恐懼於其即位之初以繼其志而述其事也蓋朝廷者天下之本也人君者朝廷之本也始即位者人君之本也於時即位為能致其慮焉則其終無所不慎矣始之不慎終雖悔之何及焉故繼之曰今王嗣厥德罔不在初者言所以端本清源之道端在夫此時也召公曰王乃初服嗚呼若生子罔不在厥初生召公其所以望成王者是亦伊尹之意也立愛惟親立敬惟長始于家邦終于四海既告之以慎厥初以嗣成湯之德矣於此又告以人君治天下本末先後之序也有子曰君子務本本立而道生孝悌也者其為人之本歟王者之治天下將欲仁覆天下豈必人人而愛之人人而敬之哉惟盡吾孝悌之心親其親長其長舉斯心而加諸彼而天下平矣親其親以及他人之親愛立於此雖不人人而愛之而將無所不愛矣長其長以及他人之長敬立於此雖不人人而敬之而將無所不敬矣故愛敬立於親長則始於邦家而終也自西自東自南自北無所不及或問孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政蓋愛於親敬於長政之所出必本於此窮而在下為匹夫則施之於家不為有餘逹而在上為天子則施之四海而不為不足此實治天下國家之至德要道言近而㫖逺守約而施博雖湯之布昭聖武代虐以寬兆民允懷者亦惟此而已故伊尹之訓必欲以是為先也嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦兹惟艱哉敷求哲人俾輔于爾後嗣制官刑警于有位曰敢有恆舞于宫酣歌于室時謂巫風敢有殉于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士此言湯以從諫檢身遂有天下而亦以此遺後世子孫使保其盈成之業也湯之盤銘曰苟日新日日新又日新惟其德貴日新故所以成就其德者必擴之以極其大放之而極其逺無所不用其至雖其聰明勇智出於天賜而其所以孜孜焉取人以為善者不敢一日廢也夫以湯大聖之德猶且戒懼修省不敢自寧也如此而况太甲以中材之主處富貴易盈之勢當晏安無事之時苟不上念前世之艱難下資羣臣之輔助豈能免於顛覆哉故伊尹為之歷言乃祖成湯所以成就其德與夫所以遺後世子孫者皆在於是蓋將以杜絶其不善之意於前禁於未發以遏其驕奢淫佚之心也嗚呼者歎辭也言之不足故嗟歎之也上既言立愛惟親至終於四海於是繼之以先王修人紀之實也人紀者人道之紀也自愛敬而推之至於家邦四海也三綱五常之道皆本於此聖人之所以為聖人者惟其能盡人倫之道而已能盡人倫之道故能成位乎天地之兩間而三才之道備博厚配地髙明配天悠久無疆而聖人之能事畢矣伊尹將言湯之所以能成其大業聖德而有天下於是推本其所以致此者而言之曰始於修人紀蓋其立愛之始於親立敬之始於長也自從諫弗咈至檢身若不及此又言其所以修人紀之實也從諫弗咈者言有過則改從善如流不逆人之言也先民時若者謂凡有所動皆順古人之行而不自專也先民古賢人也召誥曰相古先民有夏詩曰自古在昔先民有作唐孔氏曰逺古先賢人亦是民內之一人故以民言之居上克明言湯之居上則能明於御下所謂有君民之大德也為下克忠言湯之為下則能忠於事上所謂有事君之小心也夫有君民之大德有事君之小心此文王之所以為至德也而湯亦然以是知文王終身事紂而不敢伐湯事桀而終伐之迹雖不同其心則一也與人不求備檢身若不及以至於有萬邦兹惟艱哉敷求哲人俾輔於爾後嗣制官刑警於有位曰敢有恆舞於宫酣歌於室時謂巫風敢有殉于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一於身國必亡臣下不匡其刑墨具訓於蒙士此又言其責已重以周待人輕以約也范忠宣公有言曰人雖至愚責人必詳雖有聰明恕已猶略苟能以責人之心責己以恕己之心恕人則兩得之矣蓋常人之情惟責人之詳故不能取諸人以為善惟恕已之略故不能舍己以從人如此則驕吝之心日積而在己之德喪矣成湯則不然與人不求備則是以恕己之心而恕人其待人也略矣檢身若不及則是以責人之心責己其責已也詳矣責己之詳待人之略故其驕吝兩忘而物我之私不萌於胸中此所以修身應物兩得之矣詩曰湯降不遲聖敬日躋昭格遲遲上帝是祗帝命式于九圍遲遲施於人者然也不遲施於己者然也惟湯之所以肇修人紀者其備如此則是立愛立敬之道於斯盡矣愛敬之心既盡其舉斯心以加諸彼則東面而征西夷怨南面而征北狄怨曰奚獨後豫攸徂之民室家相慶曰徯我后后來其蘇此皆孝敬之所致也自孝敬而推之至於奄有萬邦之衆苟其心術之間毫釐有所未盡則天下之人必有不服者今也天下之民至於望之若大旱之望雲霓惟恐其不得為君則是湯之心無所不盡也然湯之所以能盡其孝敬者豈有他哉由其肇修人紀至從諫弗咈先民時若至檢身若不及此數者無所不用其至故即其所成就者而推本其所終于四海者如此其不易也惟湯之檢身從諫肇修人紀以有天下故其所以望於後世子孫者亦在於此是以廣求賢者之人制於有位俾輔弼于爾有後亦欲其繩愆紏繆以成就其子孫之德也林子和曰敷者言求之非一方也孟子曰湯執中立賢無方亦此言也是惟敷求哲人則賢者各以其類進左右前後罔非正人朝夕納誨於上以格其心之非如此則不善之心無自而入矣雖則敷求哲人俾輔于爾後嗣而猶恐所用之人或有持祿固位不以諫諍迪其君為事者於是制官刑以警戒之曰敢有恆舞于宫而無節者敢有常歌于室而酣酒者此二者皆謂之巫風言常歌常舞若巫覡然也敢有徇于貨與色而無厭者敢有盤于遊與畋而不知止者此四者皆謂之淫風言其淫過無度也敢有侮聖言而不欽逆忠直而不順耆年之德則踈而逺之頑愚之童則親而比之此四者皆謂之亂風言其好人之所惡惡人之所好則名實亂矣蓋上有所為而下化之者則謂之風如變風是也上有恆舞酣歌之愆則下有巫風矣上有貨色遊畋之愆則下有淫風矣上有侮聖言逆忠直逺耆德比頑童之愆則下有亂風矣愆形於上風動於下危亡禍亂之所自出也故曰惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡言此十者而有一焉有家者必喪其家有國者必亡其國不必兼備此十者而後至於喪也亦猶禹訓言內作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡蓋古之祖宗所以垂訓於子孫者未嘗不極其警戒之義惟三風十愆能致喪家亡國之禍如此苟人臣親見其君有如此之愆不能匡而正之則黥其面涅以墨刑所以懲其不能格君心之非而逢其惡也漢昌邑王以淫亂廢其羣臣坐無輔導之益陷王於惡誅者二百餘人惟王吉龔遂以數諌諍免是亦臣下不匡其刑墨之遺意也蘇氏曰或曰墨之為刑蓋亦重矣臣下不匡而陷入重辟無乃過乎曰國家置臣屬所以匡其主也宜匡而不匡則有亡國喪家之道視其主淪於喪亡而莫之救其可貸乎直諌而逢彼之怒則有死之道不諌而處於無過之地則足以保福祿自非大忠有志之士則孰能舍福祿而趨死地乎然則主於重刑蓋使其進諌則未必死退而不諌則陷於辟雖其中不欲諌蓋亦不得不諌也夫三風十愆制官刑也所以戒諸侯而伊尹用以訓太甲者為諸侯卿大夫而犯此已不足以守其宗廟保其祿位則為天下主者其可以守土宇而為民之父母乎然則伊尹所以訓之可謂微而婉矣薛氏曰此言甚善蓋伊尹所以匡太甲以格其非心者辭不迫切而意已獨至也具訓於蒙士者先儒之說不如王氏蘇氏王氏曰蒙士蒙童之士也為蒙童則如此訓之矣至於出為臣屬而不能正其君上則刑墨矣蘇氏曰蒙童也士自童幼則以此訓之也二說皆是酒誥曰文王誥教小子有正有事無彝酒蓋自其為小子固以此而教之矣故知夫禁而後教則捍格為難勝也伊尹之言此者亦欲太甲之慎厥初也嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃伊尹於是又嗟歎以謂嗣王當祗敬厥身而念爾祖也其所以當敬其身而念爾祖者蓋以成湯所垂之聖謨洋洋而美善所以告教於子孫之嘉言又甚明也蓋先王肇修人紀至俾輔於爾後嗣此所謂聖謨洋洋也謨者謀之已成可以為萬世法者也自制官刑警於有位以至於嗣王祗厥身念哉此啓迪訓誥之嘉言也謨之洋洋言之孔彰如此子孫安可棄而不念哉此伊尹所以諄諄明言烈祖之成德以訓之也既致其所以欽若成湯訓謨之意於是又言天命之不常治安之不可保惟其孜孜為善則天將降之百祥而治安可以長享苟為不善則天將降之百殃而禍亂隨之矣爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗此又言所以保天命而承治安之業者得之至難而失之至易也漢孔氏曰修德無小則天下胥慶苟為不德無大必墜失宗廟此伊尹至忠之訓孔氏之意蓋以謂人君之德必極其大然後可以使萬邦惟慶至於不德之墜厥宗者則不在大也此所以為至忠之訓而唐孔氏之解殊失其㫖其說謂為善無小言小善萬邦惟慶况大善乎為惡無大言小惡猶墜厥宗况大惡乎此經二字辭反而意同也夫經言罔小則是大矣言罔大則是小矣故漢孔氏謂修德無小不德無大是乃經之本義也安得謂辭反而意同乎以是知正義之說不惟失經之㫖又失先儒之㫖矣此不可以不辨也本朝元豐中李常寧以進士對䇿為第一其言曰天下之大社稷之重百年成之而不足一日毁敗之而有餘某嘗三復斯言以謂得夫伊尹所以訓太甲之意雖朝董公孫之䇿皆不及此蓋有國有家者成之至難而壞之甚易大禹肇造有夏基於唐虞之世胼胝手足櫛沐風雨粒蒸民乂萬邦然後受禪於舜而有天下其成之難也如此而太康以十旬之遊畋而亂之周之王業自后稷開基歷太王王季積德纍功凡十餘世然後文武受命翦商而有天下其得之亦可謂難矣而幽王以褒姒之一笑而滅之信乎百年成之為不足一日壞之為有餘也伊訓一篇之文反復終始皆明此理而篇末之言尤為切至蓋必如湯之肇修人紀從諌弗咈至檢身若不及然後可以為德之大而使萬邦惟慶矣至於三風十愆有一于身則覆宗絶祀及之矣是不德墜厥宗果不在大也孔氏以謂此伊尹至忠之訓豈不信哉唐栁玭有言曰成立之難如登天廢墜之易如燎毛又曰實德懿行人未必信纎瑕微纇十手率指此言皆足以發明伊尹之遺意也肆命徂后尚書全解卷十五
