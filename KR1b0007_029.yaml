body:
  text: 尚書全解卷二十九宋林之竒撰酒誥周書酒誥王若曰明大命于妹邦乃穆考文王史記殷本記曰紂好色淫樂嬖於婦人愛妲己大聚樂戲於沙丘以酒為池縣肉為林使男女裸相逐於其間為長夜飲百姓怨望而諸侯有畔者列女傳曰紂好酒淫樂不離妲己為長夜飲妲己好之百姓怨望而諸侯有畔者妲己曰罰輕誅薄威不立耳紂乃重刑辟為炮烙之法妲己乃笑則知紂之所以肆志於民上而恣其淫欲百姓離散而無復有愛上之誠諸侯擕二而無復有尊王之義者惟其為長夜之飲故也則商之禍豈不自於酒乎五子之歌引皇祖之訓曰內作色荒外作禽荒酣酒嗜音峻宇雕牆有一於此未或不亡晏子之告齊景公有曰從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡先王無流連之樂荒亡之行紂為長夜之飲可謂酣酒矣可謂樂酒無厭矣安得而不亡哉紂既沉湎于酒則其臣其民皆翕然而化之習以成俗武王之誓師曰淫酗肆虐臣下化之是也案傳記所載紂醉而忘其日辰甲子問左右皆不知問於箕子箕子曰為天下主而一國失日天下其危矣一國皆不知而吾獨知之吾其危矣亦辭以醉而不知以是觀之則紂之時君臣上下無非沈湎之人也紂既以是覆宗絶祀矣而其餘習猶存成王既以殷之餘民封康叔于衛則將使敷仁義之教以革貪頑之俗殷之俗其所以不美者以酒為之禍故耳將遏其禍源以反正此酒誥之所以作也蓋此三篇之作雖主於誥康叔而其誥之也正當夫新作大邑而四方和㑹之時蓋欲斯民傾耳而聽作其善心以改過遷善也然此三篇雖皆所以誥康叔而史官之命名則惟取此字以為簡冊之别耳不可以一例拘也上篇既以康叔加康字於誥字之上以志其篇使此篇亦以康叔之故而以康叔名之則何以為簡冊之别哉惟此篇之所言者殷民嗜酒之俗不可以不革故以酒誥名其篇也或取其所告之人或取其所述之事皆其一時史官之㫖而已矣非有他義也妹邦者漢孔氏曰妹地名紂所都朝歌以北是某案鄘國風桑中詩曰沫之鄉矣沫之北矣沫之東矣此所謂妹即詩之所謂沫也唐孔氏曰妹為紂都故名妹邦後三分殷畿則紂都屬鄘紂都朝歌即妹也則妹與朝歌一也成王既以遺民封康叔則康叔之所都者正紂之故都沫邦也沫邦之人莫不染紂之化沈湎于酒故周公之誥康叔則使之明施教命於此沫之國而戒之也穆考者文王於廟次為穆也古者宗廟之制自太祖而下一昭一穆父為昭子為穆昭與昭齒穆與穆齒周以后稷為太祖自不窋始為昭傳而至於文王則當為穆也左傳曰太伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文王之昭也蓋虢仲虢叔文王之弟也王季為昭故虢仲虢叔與文王同為穆也文王既為穆矣故十六國與武王同為昭也是知穆考者蓋推其世次而稱之也王氏謂誥毖誥教以敬事故曰穆考夫以穆為敬則與康誥之稱丕顯考同而詩又有穆穆文王之語其說亦通然不若先儒以為昭穆之穆為不費辭也至於王氏又曰言文王克明顯民曰丕顯考言文王誥毖誥教臣民以酒則曰穆考此則鑿矣肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒惟天降命肇我民惟元祀天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜文王誥教小子有正有事無彝酒越庶國飲惟祀德將無醉惟曰我民迪小子惟土物愛厥心臧聰聽祖考之彝訓越小大德小子惟一妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒庶士有正越庶伯君子其爾典聽朕教爾大克羞耉惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中德爾尚克羞饋祀爾乃自介用逸兹乃允惟王正事之臣兹亦惟天若元德永不忘在王家言文王始有國在於西土也周自后稷始封於邰公劉遷於邠太王遷於岐則其國於西也舊矣而以為肇國在西土者漢孔氏曰西土岐周之政其意謂文王治岐後遷於豐故以肇國為岐周之政而薛氏之言尤為明白曰文王自大王王季有西土之國則其誥毖臣民如此也庶邦者諸侯也庶士者衆士也少正者官之副二也正為官之長少正則副之矣周官曰建其正立其二設其考陳其殷置其輔此言庶士周官之所謂殷也此言少正周官之所謂二也御事者凡治事之臣也言文王之始有國則誥戒諸侯衆士以至於官之副二及凡治事之臣朝夕之間每諄諄而誥戒之曰唯祭祀則可飲此酒也誥毖者誥之而使戒愼不忘也文王諸侯耳庶士而下皆其在朝之臣也誥之可也而亦及於庶邦者唐孔氏謂文王為西伯又三分有二諸侯故得告戒庶國也此說是也文王所以朝夕之間諄諄告戒非祭祀則不可飲酒者蓋以天之降命於我始使為酒者惟以大祀故也非大祀而用之則非天之所以降命之本意矣唐孔氏曰世本云儀狄造酒夏禹之臣又云杜康造酒則人自意所為言天下教命者以天非人不因人為者亦天所使故凡造立則必本之天此說是也蓋天以是而命人人則斟酌而裁成之故先王設為酒正之官掌酒之政令以式法授酒材以辨其五齊三酒之名於祭祀共之以實八尊凡以奉天之命而已當夫仲冬之月百榖順成則命夫大酋秫稻必齊麴糵必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸其所以順時令以致其謹者夫豈為口腹之故哉良以交神明於幽冥之中故內盡其志外盡其物無所不致其謹也惟天之降命也始使人造為酒醴以奉祭祀苟能專心致意於報本反始而不以奉其口腹之欲則神之聽之錫汝以百福矣苟為淫酒荒亂移夫所以事鬼神者以為一己之奉則天降威以罰之也為民而至於大亂以喪其德放僻邪侈無所不為者無非以酒為行也為諸侯而有邦無小無大皆底於滅亡以覆宗絶祀者無非以酒為罪也以酒為行者言其嗜酒而以是為所行之行也為民而至於喪德為君而至於喪邦未有不由於酒者則自庶邦以至御事其可不愼之哉酒者人之所為也而以為天之降命民以酒為行而喪德君以酒為辜而喪邦皆其自作之孽也而以為天之降威者蓋古人之於其事之成敗未有不歸於天蓋以為非人力所能致者其曰天降命亦猶之曰天降喪亂天降滔德也蓋昊天曰明及爾出王昊天曰旦及爾游衍天雖髙髙而在上而人之起居動作未有不與之俱者則人之所為孰非天之所為哉惟酒之禍至於如此其極故文王誥教小子有正有事無彛酒也小子民之子孫也有正者有官長以治之有事者各有其事也陳少南曰有官則不敢飲有事則不敢飲如此則常乎酒者無有也此說是也孔子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已蓋使斯民終日無所用其心則非僻之心入矣故博奕雖為藝之賤亦愈於無所用心也是以欲使之不耽乎酒非使人各有其事則不可然民不能皆趨事而服勤也又在乎有正以督之此文王告教其民之道也有事者即下文所謂藝黍稷逺服賈是也夫無常酒者非不飲也蓋不可非所當飲而飲之故於庶國之飲者惟因祀賜胙而已因祀賜胙而飲之則其所飲者不以為常矣雖其所當飲苟飲之而醉則與夫不當飲而飲者其為酣之惡一也故惟以德將之則豈至於醉而亂哉詩曰其未醉止威儀抑抑曰既醉止威儀怭怭夫未醉之初與既醉之後其威儀之在身若二人之所為則豈可不以德將之哉故惟在於使民迪遵其小子父詔其子兄詔其弟惟天地所生之物無不愛焉則其心善矣漢文帝之詔曰度田非益寡而計民未加益以口量地其於古似為有餘而食之甚不足者無乃為酒醪以糜榖者多與夫糜費五榖以供淫湎之欲則於土物不愛矣大亂喪德職此之由心何自而臧乎若有愛物之心則不為物所誘以失其天性此心之所由臧也惟民當以是而迪其子孫使不以酒之故自暴自棄其身以及其親為小子者當以祖考之心為心聰聽其彛訓曉喻而佩服之則於小德大德率皆惟亦一矣夫其未醉之時其威儀如此既醉之時其威儀如彼則其德二三矣故無彛酒者德之無所不一也越小大德者言其德無不一也自此以上既言文王之宅西土外而庶邦內而小子皆諄諄然而告教之惟恐其流而為淫湎之行也自此以下則使康叔遵文王之舊以率其臣民也言汝妹土之民當竭其股肱之力相承不絶以為此純一之德播種黍稷奔走服勞以事其父兄及其田畝既畢則以農隙之時始牽車牛逺行服賈以其贏餘孝養其父母其居閭里則竭力耕耘其在道路則盡心於貿易乃以為其親而已故其父母莫不慶善則自洗潔以厚致用酒也周官以九職任萬民一曰三農生九榖六曰商賈阜通貨財今此既藝黍稷而又遠服賈則其民無遺力矣夫天之命民以為酒者蓋使其奉祭祀而致其孝而已今致用酒以養父母是亦孝也觀七月之詩既言其終歲勤動而有于耜舉趾之勤則為之言其間暇逸樂以盡其孝敬者而曰為此春酒以介眉壽蓋古人所以敦厚風俗而作其和順之心者正在於此則以是而飲酒豈為過哉庶士有正者言其有正而統之也庶伯君子者伯長也君子謂長之賢者既言妹土之民當盡其為民之事然後可以飲則爾庶士有正庶伯君子亦當盡其為臣之事則以之飲酒可以無愧矣爾當常聽朕教隱之於心而不忘大能進德以至耉老之年則惟君使爾得以飲食醉飽也蓋先王飬老之禮執爵而酬執醬而饋凡以致其醉飽耳爾之進德豈惟一身之醉飽而已哉卿大夫以守其宗廟為孝士以守其祭祀為孝故大惟曰汝能永自觀省造次顛沛未嘗暫忘作而稽於中德未嘗過差則爾庶幾能饋祀於祖考爾乃自助而用逸也如此則信為王治事之臣天亦順汝之大德而眷祐之永不忘在王家矣夫民之喪德君之喪邦皆以酒為之禍故天降威則克永觀省作稽中德者天安得而不若之乎蓋天之難諶而禍福吉凶之報如影響然未嘗有毫釐之差也何以知天之若之也不忘於王家是若之也庶士有正庶伯君子皆康叔之臣也而已為王正事之臣又以王家為言者亦猶北門之詩言王事適我鴇羽之詩言王事靡盬也此篇之所言者既以民之喪德君之喪邦皆酒為之禍惟其愛土物以一其德此文王之所以告戒其臣民者既而又使妹土之民自洗腆致用酒其臣飲食醉飽者豈惟禁之而又開之邪蓋飲酒者人情所不能免也先王豈惡之哉所惡於飲酒者為其無德以將之也使其有德以將之耕耨服賈以致其孝飬自永觀省以稽中德則其飲酒也夫何不可哉此固先王之宜樂也且人亦有言以禮飲酒者始乎治卒乎亂苟縱飲而莫之禁則人孰不曰吾有德以將之邪此酒誥之所以丁寧切至懼其至於淫泆於非彛用燕喪威儀以陷於紂之餘習也亦猶好貨不可為也如其居者有積倉行者有裹糧則何嫌於好貨好色不可為也如其內無怨女外無曠夫則何嫌於好色蓋咈人情之所不欲而强之則難為力順人情之所欲為而導之則易為功衛之遺民習於淫湎之化故以飲食醉飽自洗腆致用酒而誥之蓋謂汝苟能以德而將之矣我豈強禁之哉此成王周公之所以為善教也王曰封我西土棐徂邦君御事小子尚克用文王教不腆於酒故我至于今克受殷之命王曰封我聞惟曰在昔殷先哲王迪畏天顯小民經德秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲越在外服侯甸男衛邦伯越在內服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎於酒不惟不敢亦不暇惟助成王德顯越尹人祗辟我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫泆于非彛用燕喪威儀民罔不䀌傷心惟荒腆于酒不惟自息乃逸厥心疾很不克畏死辜在商邑越殷國滅無罹弗惟德馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜先王之所以享天休命綿綿延延以為社稷無疆之慶者豈惟修之於身動容周旋莫不中禮而無有沈湎淫泆之過哉蓋其訓誥之所啓迪教化之所漸被若內若外若小若大無不翕然而從之此治道之所以大成而天命之所以永享也我文王之在西土其於邦君庶士少正御事之臣則以祀兹酒而誥毖之其於小子則以無彛酒而告教之凡以輔之而納之於善也蓋民受衷於天以生莫不有自然之性所以陷溺其良心者惟其因物有遷而已故必有以輔之而後知自返也此所棐徂之棐輔也正猶孟子所謂輔之翼之也徂往也往日之邦君及治事之臣以至民之子孫皆謂文王之世也自成王之時而視文王則為往日矣文王以道輔翼往日之邦君御事小子皆庶幾能聼用其教惟祭祀之禮方用之而燕飲不厚於酒風俗淳一人人有士君子之行此天所以眷顧有周俾代殷而受命奄有天下以至於今日也夫文克受殷之命其事可謂大矣而推本其由則自善教美化有以輔翼衆國及其臣民不腆於酒成王之意蓋謂汝康叔既已分茅錫土以君殷之餘民將欲祈天永命社稷血食子子孫孫繼繼承承與我周家相為終始者亦惟在此而已汝苟能優游漸摩使以訓迪其臣民深耕逺賈而後有洗腆用酒之慶作稽中德而後有飲食醉飽之效平居無事未嘗留意於酣樂之娛則不惟可以丕變舊俗擴然一新也汝遂可以克享天心不為天命之所斷棄可以永為周之藩臣也古之教者禁於未發謂之豫方其未成人而教固已行矣發而後禁則將扞格而難勝雖以刑驅之而猶不從也成湯制官刑警於有位曰三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓於蒙士穆王訓夏贖刑有曰伯父伯兄仲叔季弟之所宜知而亦以告於幼子童孫三代風俗所以純一忠厚者惟其輔翼而教飬之者有此具也文王之教其民有正有事使之無彛酒自其為小子之時故雖小子而尚克用教矣此所以入之深而無不信也既言文王之所以教其民者汝康叔當率而行之矣然自周以前其近者莫如殷賢聖之君六七作當時君臣之間胥訓告胥教誨以交修其職君以是道率其臣臣以是道而輔其君故兢兢業業惟恐有一日之怠以為其德之纍其肯有酣酒為哉惟其後嗣弗率先王之教故家遺俗流風善政無有存焉而文王又能誥教其民以作其善心此所以致大邦殷之命而周代之也使其能率乃祖之攸行不敢少廢則周安得而有之哉故成王之於康叔謂汝乃文王之子今之所法不在文王乎居紂之故都今之所當監不在紂乎紂之所以亡者惟其不能因先王之道而已是以先言殷先哲王之君臣各盡其道而後言紂淫泆也上篇之誥既使之祗遹乃文考而又使之往敷求殷先哲王用保乂民此言殷先哲王於文王之下亦是意也迪道也殷先哲王之道在於畏天顯小民而已天有顯道吉凶善惡各以其類應不可不畏也小民難保愚夫愚婦一能勝豫亦不可不畏也畏天顯則必為上天之所眷顧畏小民則必為天下之所歸向蓋既有以畏之矣則其戰戰兢兢之心若將隕于深淵此殷先哲王之所以治天下之道也伊尹曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德天之佑之民之歸之蓋畏之之效如此惟其不以天道為逺而可欺不以小民為愚而可忽而皆致其畏懼之心此所以經德秉哲也經德者誠之之謂也經德則其臣也如天地之無不持載秉哲者明之謂也秉哲則其民也如日月之無不照臨凡此皆畏天顯小民之所致也惟所持者智故能上明於天之道下察於民之情而罔或不畏也故以殷先哲王言之夫經德秉哲以畏天顯小民兹固殷先哲王之道然商家之有天下自成湯受命至於帝乙其所以成王業以繼承而不絶者蓋尤在於畏敬其相也君畏敬其相則臣亦將畏其君故凡治事之臣其所以輔君者皆盡其恭而不敢自為暇逸況敢聚飲乎夫人之所以聚飲者惟其暇逸而無所用心故耳今也於暇逸尚有所不敢則其不敢燕飲可知矣此方言殷先哲王體貌其臣以率之使之趨事赴功而無彛酒之失故以其畏相為王業之成也古者人君之待其輔相也相見於天子天子為之離度起立在道為之下輿有病親問不幸而死親弔待之如此其厚可以為畏相乎未也如明皇之待姚崇每見便殿必為之興去輒臨軒以送是亦待之之厚也然未若太宗之於魏徵也徵上冢還奏曰向聞陛下有關南之行既辦而止何也太宗曰畏卿遂停耳徵嘗上疏言得失帝曰朕今聞過矣有違此言當何施顔面與公相見哉惟其有尊德樂道之心而不敢妄動過舉以負其臣然後為畏相也惟君之畏相既不在于體貌則臣之以恭而輔君亦豈在於擎拳曲跽而後為恭哉王博士曰孟子曰責難於君謂之恭厥棐有恭則知責難矣此說是也景子嘗以孟子不肯造朝為未見所以敬王孟子曰齊人無以仁義與王言者豈以仁義為不美也其心曰是何足以言仁義也云爾則不敬莫大乎是我非堯舜之道不敢以陳於王前故齊人莫如我敬王也觀孟子之所以敬王則知御事之恭固在此而不在彼然若我而不先之彼焉得而後之若我而不有之彼焉得而鬻之君使臣以禮則臣事君以忠君不畏相而欲臣之恭者未之能惟御事之臣思夫責難以致其恭則將朝夕自飭而不恤其私而况于崇飲乎如羲和之湎淫鄭伯有之嗜酒為窟室而夜飲酒擊鐘焉朝至未已其崇飲如此則豈有意於責難哉是知輔君以恭者必無暇於崇飲也御事謂凡治事之臣也王氏以為相唐孔氏以為公卿其意蓋以上言畏相而下言御事厥棐有恭此君臣報施之義故以為相與公卿也書之稱御事多矣牧誓之言御事則在有邦冢君之下司徒之上大誥之言御事則在庶士之下顧命之言御事則在百尹之下以是知御事者蓋總言也非指定其人而稱之也帝乙紂之父也經傳所謂帝乙殊有可疑者左傳曰宋祖帝乙鄭祖厲王猶上祖也以帝乙比厲王且以證僖公之不當攝則帝乙者蓋商之僻王也至易泰卦六五則云帝乙歸妹以祉元吉夫泰之六五非常之吉也而以帝乙當之此豈以成王畏相言之而多方多士之篇又皆以謂自成湯至于帝乙罔不明德至於與成湯並稱豈曰僻王也哉上之則與成湯並為明主下之則與幽厲俱為不肖必以書易之言為信而傳記所載帝乙之德未有明文史記又以謂帝乙立殷益衰此其最難折衷者也言自成湯至于帝乙則是湯之傳世三十有一無不盡其畏相之誠以成王業惟帝乙即世而紂嗣位則不能率乃祖考之成憲遂砥滅亡而蘇氏乃特以成湯太甲太戊祖乙盤庚武丁帝乙七王為言亦非也上言御事厥棐有恭既總言其在朝治事之臣所以責難于君者以報其上矣故此又歷陳而縷述之以見其無不致恭以輔其君也外服指侯甸男衛也侯甸男衛分土列爵于王畿之外為外服則夫設官分職于王朝之內者為內服也康誥曰侯甸男邦采衛唐孔氏曰言邦見其國君焉伯王氏以為長是也蓋與庶伯君子之伯同㫖此外服之君及其臣也百僚總言內服之臣也庶尹而下則又分而别之矣庶尹庶官之長也與顧命伯同惟亞官之副二也宗工尊官也惟服者言內之百僚自庶尹而下皆服事其大臣者也百官族姓之居於里者則禮所謂致仕而春秋傳所謂老也言逺而在外之諸侯近而在內之百僚與夫退居之臣無有一人敢沈湎于酒以隳其職業不惟不敢而已彼其夙夜匪懈如恐不及亦有所不暇也其不敢不暇者惟在于致其贊襄之力以助成王德使明于正人敬法之道也欲正人者不可以不敬法上不守法則其如正人何助成王德顯越尹人祗辟即所謂厥棐有恭也而原其所以致此則以畏相之故也畏相則敬法矣敬法而後可以正人此其臣之所以恭也臣之恭固君之畏相有以率之然其所以能畏相以率其臣者則以正人敬法之道亦自資於臣有以助德也而亦不敢湎于酒者蓋飲食醉飽則可而湎于酒則不可也况其既已里居則君所賴于乞言以成其福祿以助成王德正在於此使其有淫湎之行則其言豈可以啓沃于上哉不敢者有畏心也非無是心也但畏而不敢縱耳至於不暇則豈有是心哉雖誘之使為亦弗為之耳觀此則可以見商家之臣內外大小無非忠良造次顛沛無非法度相與勉勵以報國愛君之誠而惟恐其片瑕微纍有愧於其上夫豈無自而然哉紂之立也曽不思夫乃考所以創業垂統以遺之者在於畏相而乃肆為荒湎以唱其臣則臣安得不靡然而從之哉故成王又以所聞紂之不善而告之也在今後嗣王謂紂嗣帝乙之後也紂自為酣飲以自適其情故萬幾之務不得其條理此其命令所以罔顯于民言不能明明德于天下也此蓋作怨之道而紂但安于怨無所改易孟子所謂安其危而利其菑樂其所以亡者保其怨之謂也惟安于怨而罔有悛心故大為恣縱以淫佚于非彛以是燕樂之故而喪其威儀夫君子之威儀容止可觀進退可度以臨其民畏而愛之則而象之喪其威儀則民無則焉安得不衋然而痛其將亡哉酒池肉林使男女祼相逐於其間其非彛如此則威儀安在哉民衋然而痛其將亡則胥怨之矣而紂方安于怨自以為有命在天故其淫湎于酒以為是淫泆之行不思所以止息之也厥心疾很不克畏死者言紂之為酒所使也世固有平居無事規行矩步不敢少失一旦至於好勇鬭狠放僻邪侈靡所不為亡其身以及其親而不自知者無他酒使然也况以紂暴虐之質則其荒湎于酒色其心安得不忿疾狠戾雖死不畏也不克畏死則何恤于下民之怨謗乎故惟為天下逋逃主萃聚其罪人於都邑之下以同惡相濟此逋逃之人方且狎昵於紂竊其爵位以快一時之欲殷國之滅其誰憂之哉罹憂也詩曰逢此百罹是也紂保於怨而其罪人不以其滅亡為憂君臣之苟安一至于此弗惟德馨香祀登聞于天誕惟民怨庶群自酒腥聞在上故天降喪于殷罔愛于殷惟逸者言紂之祭祀無有德之馨香可以登聞于天惟民怨其與群臣荒湎于酒其腥德達于天聽然焉故天降喪亂于殷家而無有愛惜不忍之意惟其以逸故也胡博士曰馨香人所樂好腥臊人所厭惡德有吉有凶其發聞亦然傳曰國之將興其君齊明忠正精潔惠和其德足以昭馨香神享而民聽國之將亡其君淫泆其政腥臊民神怨恫無所依懷蓋善惡之實積於此則其發有不可掩者焉是故古者先王之祀也奉牲以告則知民力之普存奉盛以告則知民時之不害奉酒醴以告則知上下之不違以此致祀則其德可謂馨香矣以此登聞天降之福矣今紂之不務明德以薦馨香而發聞惟腥此天所以降喪于殷也此說為善天非虐惟民自速辜言殷之絶祀非天之虐也皆商之民自召其罪也蓋紂聚夫不仁之人肆于民上而民以無辜籲天天矜于民不得不從之豈虐也哉方牧野之戰紂死於亂兵而其一時逋逃之衆殺戮殆盡至於血流漂杵民今而後得反之也故不言殷而言民蓋并與其同惡者言之耳胡博士曰商之興非天之私也惟天佑于一德商之喪非天虐之也惟民自速辜此說亦盡讒鼎之銘曰昧旦丕顯後世猶怠况日不悛其能久乎自湯以來畏敬其相而其臣以恭應之以此示其後世紂猶身為酣飲以唱之而庶羣自酒焉彼孫權之開基也不思所以垂法于子孫而與羣臣臨釣臺飲酒必欲醉墮其中乃止其酣身已自如此則孫皓之沈酣肆虐乃其所也豈非權有以唱之哉成王誥康叔既以文王與夫殷先哲王所以毖酒之效丁寧而戒敕之而又必以紂之酣身之禍繼之者孔子曰三人行必有我師焉擇其善者而從之其不善者而改之文王與夫殷先哲王固康叔之師也而紂亦康叔之師也以其善而思齊以其不善而自省則孰非吾師乎此成王之意也王曰封豫不惟若茲多誥古人有言曰人無于水監當于民監今惟殷墜厥命我其可不大監撫于時豫惟曰汝劼毖殷獻臣侯甸男衛矧太史友內史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農夫若保宏父定辟矧汝剛制于酒厥或誥曰羣飲汝勿佚盡執拘以歸于周豫其殺又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺王曰封汝典聽朕毖勿辨乃司民湎于酒曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎他在乎加之意而已成王既多聞于先世成敗之迹自湯至于帝乙其戒慎恐懼君臣相正不湎于酒以成夫莫大之業者如此紂之淫泆非彛庶羣自酒以自速其辜者如彼我豈惟務諄諄反覆以是而多誥于汝哉蓋將尊其所聞而行其所知以其善而思齊惟恐其毫釐之差以其惡而自省惟恐其微疵細過之不盡去不但使汝法其善而監其不善也故繼之曰古人有言曰人無于水監當于民監蓋古人有此言成王引之以告康叔也荀子曰水靜則明燭鬚眉則水可以為監形也形之妍醜監于水固可以見之至于政之醇疵豈水之所能監哉必監於民而後見也世之人徒知以水為監所見者顔貌而已何所補哉而不知以民為監其有益於己者大矣故古人戒之曰人無於水監當於民監也與孟子言指不若人則知惡之心不若人則不知惡言雖反而立意則同今殷既以庶羣自酒之故而墜其命矣亦以我不可不大監之以撫安斯民於當時也蓋殷先哲王之所以享天下者得其民也得其民者無他畏相而已紂之所以失天下者失其民也失其民無他酣酒而已既當以民為監則前世嘗以是得民者必思有以遵之嘗以是失民者必思有以改之我非惟言之而已也畏相以率其羣臣使之協心同德以毗豫一人亦於殷先哲王之世而後已成王既以此自勉矣則為康叔者當如何哉故自此以下皆戒康叔以畏敬其臣使之自盡以報汝也康誥曰爽惟天其罰殛我此篇曰我其可不大監撫于時皆是成王自以其身為之準繩俾之觀而善也嘗考此篇所紀載紂之惡監大抵與詩之蕩相類誕惟厥縱淫泆于非彛則蕩所謂如蜩如螳如沸如羮是也不惟自息乃逸則所謂既愆爾止靡明靡晦式號式呼俾盡作夜是也厥心疾很不克畏死則所謂內奰于中國覃及鬼方是也辜在商邑越殷國滅無罹則所謂曽是彊禦曽是掊克曽是在位曽是在服天降慆德女興是力天非虐惟民自速辜則所謂匪上帝不時殷不用舊是也既已紀載其惡矣則欲視以為監以警其心故曰古人有言曰人無于水監當于民監今惟殷墜厥命我其可不大監撫于時此亦蕩詩于末章言殷鑒不逺在夏后之世之意也蓋蕩之詩託言殷商之惡以刺厲王故其言與酒誥相表裏文王之所以誥毖誥教其臣民者亦惟鑒于紂之故蕩曰文王曰咨咨汝殷商文王既鑒之矣成王當如之何成王既鑒之矣康叔當如之何劼周也毖慎也自殷獻臣至宏父汝皆當畏慎之而其畏慎之不可以不固也慎厥終惟其始是固也殷獻臣謂之賢臣嘗在於商者今則仕于康叔也周公以孟侯呼康叔則是為諸侯之長故其所劼毖者及于侯甸男衛也大史內史皆官名也周官大史掌邦之六典法則內史掌王之八柄之法不知衛之所建者其職果如何也周官大史下大夫二人內史中大夫一人不知衛之所建者其命當如何也曰大史友內史友蘇氏謂當時二賢臣封所友者是也蓋下總言獻臣百宗工而獨於其上舉此二官以友繫之則當時有此二友之典是官也王氏謂獻臣百宗工則有貴于太史內史者其為康叔所從可知也非也獻臣百宗工謂賢臣之為百宗工者上既言殷獻臣則此獻臣其未嘗仕于商者乃周臣也宗工大臣也以百言之見其多也服休先儒曰服行美道服采曰服事治民然其意以爾事為汝之身事則知服休服采皆康叔修之於身非其臣也據此文勢在百宗工之下圻父之上不應於其中間間以康叔之身事也不如王氏之說以為其臣其說曰服休者以德為事服采者以事為事是也然其以爾事為人君必有所友必有所事蓋盛德之士有不可友者此服采為康叔所事則未必然既曰盛德之士有不可友則以德為事者事之可也以事為事豈亦事之乎此蓋泛言爾之所與共事有此二者也先儒曰圻父司馬農父司徒宏父司空此三者雖無所經見然惟圻父見於詩其詩曰圻父豫王之爪牙胡轉豫于恤靡所止居圻父帥爪牙之士以出戰而敗則其為司馬可知也圻父司馬則農父之為司徒宏父之為司空亦可以意見之蓋古者天子六卿諸侯三卿武王牧野之戰其時未有天下故其誓者司徒司馬司空而已梓材之篇亦舉此三卿惟康叔之有三卿故雖無所經見當從先儒之說司馬掌封圻甲兵故曰圻父司徒掌教稼穡樹藝故曰農父宏父者唐孔氏曰以營造為廣大國家之父不如王氏曰闢地以居民也先儒以若疇繫於圻父言君所順疇薄違繫於農父言迫回萬民若保繫於宏父言當順安之唯司徒則陳其所任之職而二者則謂君之順之非其類也蘇氏雖皆以為所任之職而於若疇曰何冦敵亦牽强不通不如王氏以若疇為汝之儔匹而於其下先舉其官名而後陳其所任之職也蓋君之與臣若股肱元首一體相須故皆三卿皆其儔匹也薄違者當從先儒之訓而用王氏之義言司馬之迫逐違命者也農夫若保言司徒教民稼穡以順安之也王氏曰若國保民亦非也宏父定辟言司空闢地居民而定其法也汝於殷之賢臣及其所統侯甸男衛之諸侯既固慎之矣况於所友之二史友其賢臣之為百宗工者其可不畏而慎之乎此亦固當慎矣况於爾之儔匹位三卿者其可不畏而慎之乎至於三卿則若小若大若彼若此若內若外無所不慎也殷先哲王以畏相之故其臣皆化其上勉勵以輔君不敢湎于酒汝之劼毖者既已若此則自殷獻臣至於三卿亦皆將宿道向方朝夕不懈以承其上况汝又剛制于酒乎蓋劼毖以率之彼固必不敢為淫湎之行苟又剛制于酒則其心益將有所畏而不敢犯也既有以率之而又有以制之然其越禮踰禁荒淫無度者不可不治也故其或有人告汝康叔曰今有羣聚而飲汝當度設方略勿令逃佚盡執拘以歸于周而殺之蓋我西土邦君御事小子克用文王教不湎于酒則周之羣臣已率教者也已率教而至于崇飲冝刑戮之所加故殺之也至于殷紂所迪之諸臣其百工有湎于酒蓋其化紂之惡未能以遽革故勿用法以殺之姑亦教之而已孔子曰不教而殺謂之虐不戒視成謂之暴文王之於庶士御事朝夕之間諄諄而誥毖之者非不至也今乃有不率教而羣飲則其殺之也安得謂虐之暴之哉殷之諸臣習紂之惡庶羣自酒苟不有以教之則其湎于酒者乃其所也一旦遽用法以殺之非暴虐而何故必教之而後可也古者誥告通用湯誥大誥皆是㑹同諸侯而勑戒之也然人臣獻言以啓迪其上者亦謂之誥仲虺作誥是也人臣與其儕類共談者亦謂之誥微子作誥父師少師是也故此以羣飲之不可不懲而言於上者亦曰誥焉羣飲而誅蓋若羲和湎淫之類夫其無故而衆飲則其奸宄之謀將由是而生故誅之也𦙍侯之征羲和而誓師之言曰殱厥渠魁脅從罔治則羲和之湎淫蓋與其黨類同焉不獨自為之也是謂之羣飲也下文又惟殷之迪諸臣則羣飲而誅者其為周人可知也有斯明享即康誥所謂享明乃服命也言汝康叔既有此明與享矣則其教非不至也而乃不用我之教辭惟我一人之言曽不之恤不自蠲潔其事而有淫湎之過則是教之而不率者終不可以入于善故亦同于羣飲之人而殺之也夫冦攘姦宄則罔不憝不孝不友則閔之而敬典裕民羣飲則誅之而殷之迪諸臣也以湎于酒則姑亦教之此皆先王忠厚之化不尚刑罰以斬齊天下也然至於有斯明享而乃猶不用教辭則亦同于殺則夫既敬典以裕之矣而猶泯亂于民彛者亦所不赦也先儒并王氏以為康叔不用教辭則同於見殺蘇氏又以為若我不知恤此則陷民于死同于我殺之皆非也汝典聽朕毖言我之所以教汝慎于酒者汝當常聽之也成王之誥康叔既告以文王朝夕教戒其臣民漸漬厭飫不湎于酒以享天之休命告以殷先哲王戒慎恐懼君臣相畏不湎于酒以成王天下之業又告以殷紂淫泆非彛庶群自酒自速其辜其善可法其惡可鑒故欲其劼毖羣臣以率之剛制于酒以禁之羣飲則誅之不用教辭亦殺之無非使之慎于酒者也司民即上文自殷獻臣至于宏父是也王氏曰汝司民有湎于酒則以政治之勿為之辨釋以為無罪也蘇氏曰當闕建一司以察淫湎若以泛責羣吏而不辨其司禁必不行矣其說迂回不如先儒曰勿使汝主民之吏湎于酒其辭不費但不知辨之訓使何出耳太康以酒亡紂以酒亡幽王厲王皆以酒亡三代之禍皆由此而致則酒之為禍慘矣故禹惡㫖酒孔子於不為酒困謙而不敢居况不為禹孔子者乎成王誥康叔反覆數百言而終以莫辨乃司民湎于酒蓋使司民而湎于酒則民之休戚必不蒂芥于胸次斯民不得安居而樂業則何以保有國家也哉而晉之士大夫乃以酣飲為清髙如阮籍劉伶胡母輔之畢卓之徒其淫縱荒湎無所不至想夫紂之庶羣自酒亦不是過也周公成王以是為戒而晉人以為清髙紂以是亡而晉安能以久存哉詩曰人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又晉之士大夫至于散髮盜樽其不敬爾儀如此欲天命之不替可乎哉以是知阮籍之徒其與八王五胡皆晉之所由以亡也梓材周書梓材王曰封以厥庶民暨厥臣達大家以厥臣達王惟邦君汝若恆越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歷人宥肆亦見厥君事戕敗人宥王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若茲監罔攸辟此篇蓋管蔡武庚既誅而其餘黨惡同亂之人猶有存者成王欲使康叔匿瑕含垢一切不問以德懷之無所用刑也其篇名以梓材者漢孔氏曰告康叔以為政之道亦如梓人之治材此非也此篇引喻以告康叔者有三稽田也作室家也作梓材也苟其名篇之義有取於此不應舍其二而取其一也史記衛世家曰為梓材示君子可法則故謂之梓材以命之雖其以梓材取譬之意不與孔氏同而謂名篇之義有取於梓材其失一也唐孔氏因漢孔氏之言而曰雖三者同喻田在于外室總于家猶非指事之器故取梓材以為功也此蓋為先儒解紛耳審如此言則書之名篇不應其破碎穿鑿至于此甚也豫嘗因梓材之名篇然後知書之篇名徒以志簡編之别非有他義也使有其義則何以三者同喻舍其二而獨取其一哉酒誥之所陳者首尾數百言無非以酒為戒也而以酒誥名篇梓材之所陳者其大指在于匿瑕含垢以安反側若作特其篇中之一義耳而以梓材名篇此皆出于史官偶然一時之意而已矣奚必欲以義而求之哉以厥庶民暨厥臣達大家者謂殷人也以厥臣達王謂周人也左傳曰分康叔以殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏康叔之封雖以殷餘民而使司牧之然其朝廷之上列爵仕官以為衛之臣者豈皆殷人哉蓋有周人焉有殷人焉考之酒誥既命康叔于殷之獻臣不可不劼毖之也又繼之以矧太史友內史友越獻臣百宗工此則周臣之未嘗仕于商者亦不可不劼毖之焉故其剛制于酒也周人不率教而羣飲者則殺之諸臣染紂之化而湎于酒者姑教之而不殺也則康叔之臣其兼用殷周也明矣大家者天子建國諸侯立家故魯三桓謂之三家其曰大家猶孟子之所謂巨室也既言大家矣則其上之言暨厥臣者自大家之外皆是也無所不通謂之達自古天下之患常起于上下之情不通上之情莫不願通于下下之情莫不願通于上然而上下之情常蔽塞而不通者無以達之也故成王之誥康叔汝能以殷之庶民暨其臣之情而達之於大家而又能以周之臣之情而達之于上如此則自天子至于庶民其好惡喜怒莫不曉然而可知上下交通而無間此則邦君之任也故曰惟邦君康叔之臣雖兼用殷周而其民皆殷之餘也故於殷人則曰以厥庶民暨厥臣而於周人則但曰以厥臣故也漢孔氏以為用言當用其衆人之賢者與其小臣之良者以通達卿大夫及都家之政於國信用其臣以通王教于民王氏曰以其臣達王事於大家以其臣民達大家之事於國人夫以其為用賢良固非經之本意而謂達大家之政於國達王教於民或謂達王事於大家達大家之事於國人皆贅說也惟邦君之職在於通上下之情故繼之曰汝若恆越曰我有師師若恆者所以通上下之情也王氏以若恆為若有恆性經但曰若恆不可援湯誥之言以為說也汝苟能順常不為變亂以駭國人之視聽則為之臣者於是曰我有師之可師也蓋臣之寬猛未有不視其君漢文以寬厚為之師故其流風篤厚刑罰大省武帝以嚴察為之師故其禁網寖密姦宄不勝君之所為其臣未有不效之也汝康叔苟能順常矣則孰不以為師哉汝若欲汝之三卿及庶官之正與其衆士曰我未嘗厲殺人則亦在君先有以敬勞斯民也其君先有以敬勞斯民則其臣不厲殺人矣敬勞者所以若恆也罔厲殺人則師之矣論語曰君子信而後勞其民未信則以為厲已也孟子曰滕有倉廩府庫則是厲民以自養也以論語之所謂厲已孟子之所謂厲民觀之則厲殺人者不以其罪而殺之也故謂之厲敬勞者唐孔氏曰即論語所謂先之勞之是也惟為君必先有以敬勞之而後其臣罔厲殺人故汝今往之國不可不盡其敬勞之道此言司馬即上篇之圻父也司徒即上篇之農父也司空即上篇之宏父也彼先圻父而後農父此先司徒而後司馬王氏曰先言圻父者制殷民羣飲以政為急故也此言敬勞與罔厲殺人故先司徒與酒誥異此蓋鑿說也諸侯之三卿司徒為上司馬次之司空又次之觀周官之篇天子六卿其先後之次如此則諸侯之卿亦然今酒誥乃序圻父於農父之上故王氏為之說竊謂酒誥之言正猶武成曰邦甸侯衛也周之九服甸服在侯服之外康誥曰侯甸男邦采衛是也而武成乃先甸而後侯此豈可以為之說乎况夫酒誥之言不專以政為急也肆往姦宄殺人歷人宥若今律文藏匿强盜過致資給者也言有往日之姦宄而殺人者逋亡逃匿其所過歷之家皆當宥之也肆亦見厥君事戕敗人宥若律所謂知情證逮者也言其因君事而毁傷人者亦皆宥之也蓋嘗武庚之誅其一時黨姦同惡之人莫不有反側不自安之心刻核太至則必有不肖之心應之矣今姦宄殺人歷人與夫見厥君事戕敗人者其罪可以引而納之于刑亦可推之而致於無罪是所謂疑獄者也故寧宥之而不殺使反側者聞之必將以我為不窮治其黨與則其心安矣昔漢之羣臣恐見疑過失及誅故相聚而偶語張良教髙祖取平生所憎羣臣所共知者封之則人人自堅故雍齒封侯而羣臣喜曰雍齒且侯吾屬無患矣歷人與夫見戕賊人者皆在所宥是亦封雍齒之意也所謂敬勞者孰有大於此者乎而王氏謂三卿尹旅見姦宄殺人歷人不肯以法治之反宥而縱之者亦見其君於以戕敗人為事者宥而不治者也其意蓋謂此等麗于刑之人皆當勿宥之康誥之言曰乃其速由文王作罰刑兹無赦不率大戛戒康叔以為不可殺而王氏則以為當殺此則戒康叔以為可宥而王氏則以為當勿宥王氏之心術大抵如此季康子問於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃夫殺無道以就有道夫子尚以不可况于不孝不友之可閔者與夫姦宄殺人歷人見厥君事戕敗人之可疑者可以殺之而不宥乎其徇私意以叛經㫖一至于此不可不察也周官太宰曰乃施典于邦國而建其牧立其監注曰監謂公侯伯子男各監一國書曰王啓監厥亂為民然則監者蓋指諸侯而言非三監之監也啓監云者正猶曰立其監也言王者建立諸侯使之各監一國其治主于為民而傳已說也明王奉若天道建邦設都立后王卿公承以大夫師長不為逸豫惟以亂民則啓監者非為民而何曰無胥戕無胥虐至于敬寡至于屬婦合由以容此則啓監而教之之辭也漢孔氏曰此為教民不如王氏之言曰王啓邦君其教之如此謂監之於民當視之如子矜憐撫恤無所不用其至不可以相為戕害暴虐也胥者謂君臣上下並為戕虐之政也民之鰥寡當用以敬之而不慢民之婦女當有以屬之而不忘至于敬其鰥寡屬其婦女則無有大小無有內外皆得其所矣是汝能和合之而用以寬容之道也用以寬容則如山藪之藏疾川澤之納汙不為察察之政以駭斯民矣王之所以使邦君及治事之臣則效於我其命之者何以哉不過使之引養引恬而已漢孔氏曰能長養安恬則以引訓長也王氏曰引養者引民而養之引恬者引民而恬之皆未若蘇氏之言尤為切當其言曰亂生於激事不小忍而求速決則釁故橫生靡所不至少引延之人靜而亂自衰使相容養以至于安是為引養引恬當武庚之唱亂以謀復商家殷之遺民必有蓄不軌之志與之相挻而為亂者既黜殷命而殺武庚矣則夫背逆之黨必思有以處之惟能蕩滌其瑕穢而與之維新則孰不喜于更生而有遷善逺罪之心哉苟以其嘗預于武庚之亂惟恐其舊態之不改將伺我之便以逞其志必思所以斬艾而芟夷之而後已則反側之徒孰不心計曰稱兵以犯順亦死生而待誅亦死等死耳與其束手以就戮孰若倡亂以僥幸于萬一哉東漢之末董卓以暴虐之資專擅朝政王允既與吕布謀誅之天下晏然其慮深矣卓將校總兵布於山東多涼州人允議罷其軍李傕等遣使求赦不許傕等懼不知所為賈翊說曰聞長安中議欲盡誅涼州人諸君不如相率而西為董公報讐卒之長安城潰允亦見殺則夫漢室之滅皆在允小不忍以激其亂也裴度平吳元濟以蔡牙卒侍帳下或謂反側未安未可去備度笑曰吾為彰義節度元惡已擒人皆吾人也衆咸泣夫既以叛逆之黨為吾人則孰肯自棄于惡哉此正引養引恬之道也自古王若兹監罔攸辟者言自古先王如此而啓監則無所用刑矣王允不肯赦涼州人其心蓋欲用刑矣而其禍如彼則何以殺為哉王氏曰自古者謂由先王之道自王者謂由今王之政其說為鑿先儒以為用古王之道優於王氏然不如蘇氏以為古我先王但以若為順言古我先王未有不順此監者則非矣若如也若兹猶言如此也先儒以罔攸辟曰無所復罪王氏曰無所致辟其意謂監能若此則無罪可致之辟矣其說非也先儒王氏於酒誥時同于殺其意亦若是謂康叔苟如上所云則同于見殺也夫先王之時君臣道合相親如父子相愛如兄弟歡欣戚睦而無間豈必以刑罰懼之而後為善哉惟夫軍旅之間誓戒之辭則不得不以責罰而敕厲也如湯誓曰豫則拏戮汝牧誓曰不迪有顯戮也况夫康叔以親賢而作藩於東土乃謂周公親以殺戮之言而恐之使之有所畏古人必不然也惟曰若稽田既勤敷菑惟其陳修為厥疆畎若作室家既勤垣墉惟其塗墍茨若作梓材既勤朴斫惟其塗丹雘今王惟曰先王既勤用明德懷為夾庶邦享作兄弟方來亦既用明德后式典集庶邦丕享皇天既付中國民越厥疆土于先王肆王惟德用和懌先後迷民用懌先王受命已若茲監惟曰欲至于萬年惟王子子孫孫永保民周公之誥康叔既欲其以優游寬大之道慰安殷之頑民揉其暴戾之心而作其愧恥之意若匿瑕含垢廓然無事以與之共享太平之慶矣然其意之所欲陳者非言之所能盡言既不足故託喻以見其意焉菑去草也爾雅曰一嵗曰菑孫炎曰菑始殺草也畎說文曰水小流也周禮匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之畎蓋其壟曰畎而畎上曰伐也塈說文曰仰塗也顔師古注漢書亦曰即今之仰泥也茨蓋覆也穀梁傳曰焚雍門之茨范寧注曰茨蓋也茅茨者亦謂之茅蓋屋也梓良木可以為器也定之方中所謂椅桐梓漆是也惟器用以梓木為良故古者木工謂之梓人考工記曰攻木之工輪輿弓廬匠車梓梓人為筍虡為飲器為侯而孟子亦曰梓匠輪輿也朴謂器之有質而未成也丹說文曰巴越之赤石也雘善丹也塗丹雘者塗以舟雘也言國君之為監以治民若農夫之考田而治之既已勤于敷治之而菑以殺草使狼莠不得以亂其苗矣則今惟當陳列修治以為其疆畔畎壟也左氏傳曰行無越思如農夫之有畔為其疆畎則百穀順成可以享有秋之利而不至于相越也若人之為室家既勤立垣墉而內外有限可以禦侵暴矣則今惟當塗塈而茨蓋之使上棟下宇而風雨攸除也若人之治梓材以為器既勤于斫削其朴以成其質則今惟當塗以丹雘而為之藻飾也當三叔之流言而挾武庚以間王室周公既已興師動衆仗大義以討之取其凶殘以行其天誅既類乎田之敷菑室之垣墉梓材之朴斫矣則康叔以殷之餘民即封於衛惟當建立紀綱修明典章以維持藩飾其國家也則豈不類於疆畎塗塈丹雘之功哉蘇氏曰田既敷菑室既垣墉器既朴斫則當因舊守成而潤色之則不當復有建立塗治也其言得之先儒以稽田喻教化以梓材喻禮義而于室家則無說夫周公以此三者取喻而乃獨區别其二則其言不類矣王氏曰王者之造始墾菑害除荒穢疆理天下而作為典則以授之諸侯猶敷菑垣墉朴斫之勤也諸侯嗣其功而致飭以終之陳修疆畎塗墍茨丹雘之比也王氏之意以稽田喻除荒穢室家喻疆理天下梓材喻作為典章區而分之既非經之本意而又謂王者造始而諸侯終之亦非其義也此蓋但以喻今當用德以治民引養引恬而民自安不當復如前日之用刑以摩切之也雖以三者設喻而其意則一正猶說命曰若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨皆是以喻髙宗必資傅說之納誨然後可以成其德也而說者亦從而分别之則過矣此三篇之作雖周公當攝政之日稱王命以告之而其實皆周公丁寧之辭故康誥曰朕其弟小子封此篇曰王啓監厥亂為民又曰今王惟曰先王既勤用明德又曰惟王子子孫孫永保民蓋當其誥之也不可以不正君臣之分故稱王若曰然辭意皆出於周公故以弟呼康叔又指王而言非是曰王者成王之自稱也王氏曰成王自言必稱王者以覲禮考之天子以正遇諸侯則稱王此誥正教康叔以諸侯之事故也其意以王為成王之自稱故為此說然考之於書王自稱有曰豫一人有曰台小子有曰豫小子未有自稱王者以王為成王之自稱非人情也春秋文公元年書天王使毛伯來錫公命或曰天王或曰天子故劉原父以為有臨天下之言焉有臨一國之言焉夫春秋以一字為褒貶則其有天王天子之殊稱而劉原父為之說識者尚以為鑿矣况于此篇乃其誥戒之辭而謂以政遇諸侯則其自稱必曰王恐無此理先王之制為諸侯列爵分土以碁布于天下蓋欲其夾輔王室而已故其春朝以圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政皆所以盡其藩臣之職以尊天子當其時驅馳於道路惟恐不及凡以夾輔之職所當然也然苟無以懷之而惟恃其威勢嚴刑峻令以恐喝諸侯則莫不解體孰肯來享於王庭以盡其夾輔之義哉觀小雅菀柳之序曰菀栁刺幽王也暴虐無親而刑罰不中諸侯皆不欲朝言王者之不可朝事也惟幽王之暴虐則諸侯皆無欲朝之志以其無以懷之故也故周公之告康叔謂今成王言我文武先王受命以來日夜憂勤惟用明德以懷庶邦為已夾輔也勤用明德則與暴虐無親而刑罰不中者不可同年而語矣此庶邦所以莫不來享而其來享也則和協輯睦若兄弟之親各以其方而來至於王庭也夾先儒音協近也懷為夾者言懷逺如近不如王氏只如字讀以為夾輔之夾為簡徑惟王之所以懷庶邦者在於用明德則庶邦之來享以述職于天子者亦將盡用明德也蓋我不有以唱之則彼惡得而應之天子用德于上以覆冒四海之內諸侯相觀而為善亦用明德于下以司牧其國家則寬大優游之政洋溢天下而忠厚長者之風自此丕變矣此我先王之所以受命以有天下也后謂今王也說文曰后繼體君也象人之形施令以告四方惟后為繼體之君故知此后指今王也惟先王之所以懷服庶邦使之小大相比以永享者其本在于用明德故今王繼體而立用此常道以集庶邦而庶邦亦將大享也蓋今王之集庶邦既用先王之常道則庶邦之來享安得不盡如先王之世哉皇天既付中國民越厥疆土于先王者言皇天盡以中國之民付之于先王而一民莫非其臣盡以中國之疆土付之于先王而尺地莫非其有凡以先王之勤用明德而已孟子曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣先王不尚刑罰而明明德于天下則可以得其心得其心則可以得其民得其民則可以得天下既以中國之民付之于先王則疆土孰非其有哉皇天之于先王其眷顧之也如此其至今王將欲撫綏中國之民奄有中國之疆土以繼先王之成績而永保皇天之休命惟當用明德以和懌先後迷民而已迷民謂殷之餘民先儒謂和恱先後天下迷愚之民先後謂教訓王氏曰民迷則悖欲使保乂之當先以和和然後惟王之聽惟王之聽然後可以先後之使不失道蘇氏曰民迷失道故先後之此數說者其論先後之義則同豫嘗聞陳瑩中諫議之說謂先迷民者紂之民也後迷民者武庚之民也蓋當紂之亂殷罔不小大好草竊姦宄而紂又為天下逋逃主萃淵藪則其民之迷可謂甚矣紂既滅而其餘民之尚存者當武庚之叛又皆蓄不軌之志與之相挻而為亂惟其前有紂而後有武庚此所以謂之先後迷民也竊謂此說為勝于諸家夫以紂之先後迷民其惡積罪大自他人觀之蓋將以為刑罰之所刺裁法令之所整齊而後可以遏其姦心非教化可得而漸摩也而周公之意則不然故謂今王惟用德以和懌之使之易直子諒之心油然而生則孰不遷善逺罪哉惟不忍鄙其民而用德以和懌之則是以先王之心為心今王以先王之心為心則皇王之眷顧付畀于今王亦將如其所以眷顧付畀于先王可以慰先王在天之靈矣故曰用懌先王受命言先王受命以傳子孫之意于此而得故懌也此篇蓋欲康叔匿瑕含垢不用刑罰以安反側之情故以成王之言告之謂先王用明德則當時諸侯皆感之而用明德今王既惟德用矣汝康叔之爵則諸侯也當如何哉故謂之曰已矣汝能若此而為監則其意亦曰欲其子子孫孫世有爵土雖萬年而不絶也汝以用明德之故世享爵土萬年而不絶則可以永為王家之夾輔汝既永為王家之夾輔則王家之子子孫孫亦將永保民以有天下萬年而不絶也孝經曰在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴也滿而不溢所以長守富也冨貴不離其身然後能保其社稷而和其人民蓋諸侯之孝也夫欲至于萬年者固諸侯之孝然所以長守冨貴者必有道也諸侯至于萬年獨非王之福乎故王可以永保民也蘇氏謂大誥康誥酒誥梓材學者見其書紛然若有殺伐之言因為之說曰康誥所戒大扺先言殺伐豫詳考四篇之文反覆丁寧以殺為戒專以不殺為德故周有天下八百餘年後之王者以不殺享國以好殺殃其身及其子孫者多矣天人之際有不可盡必者至于殺不殺之報一一如符契可必也而世主不以為監小人又或附㑹六經醖釀鐫鑿以勸之殺悲夫殆哉豫嘗謂此誠仁人之言也蓋自古小人將借邪說以逞其志者未有不以前世聖君賢相之事迹以為口實也故有蓄異志而伐其君者則必以湯武為口實逞私臆以廢其君者則必以伊霍為口實不獨此也言用兵者不言秦始皇而言高宗之伐鬼方言田獵者不言太康而言宣王之㑹東都蓋以始皇太康之事而說其君其君必不聽也始皇太康後世之所惡聞而羞稱故也以高宗宣王而說人主人主必將甘心焉此小人託六經以文姦言之常態也如使此四篇之文以殺罰為先則後之欲嚴刑峻罰以持天下者必將以此藉口則此四篇毋乃始作俑者乎蘇氏之言其有功于教化者此類也夫尚書全解卷二十九
