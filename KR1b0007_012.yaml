body:
  text: 尚書全解卷十二宋林之竒撰甘誓夏書啓與有扈戰于甘之野作甘誓甘誓古者將欲整齊其衆而用之則必有誓而尤嚴於軍旅故書有六體誓居其一焉大抵為誓師而作也周官士師之職以五戒先後刑罰一曰誓用之于軍旅軍旅之有誓蓋所以宣言其討罪之意謹其坐作進退之節而示之以賞刑之必信帝王之世所不能廢也故禹啓湯武皆有之甘者所誓之地故因以名篇亦猶牧誓費誓也啓者禹之子也有扈氏夏之同姓其地在漢之扶風鄠縣啓之與有扈戰其誓師也聲言其罪惟曰威侮五行怠棄三正初未嘗詳言其所以討之之故史記曰啓立有扈不服遂滅之亦但言其不服而已唐孔氏遂以謂自堯舜受禪相承啓獨見繼父以此不服此説亦但是以私意而臆度之其實未必然也案左氏昭二年趙孟曰虞有三苖夏有觀扈商有姺邳周有徐奄所謂觀扈即此有扈國也唐孔氏載楚語觀射父曰堯有丹朱舜有商均夏有觀扈周有管蔡以是為有扈恃親而不服啓之政今考之楚語觀射父之言但云夏有五觀不言觀扈唐孔氏蓋是誤以趙孟之言為觀射父之言此雖小誤亦不可以不正也有扈氏之罪經無明文然趙孟以比三苖徐奄則知有扈必是頑嚚不可教訓且恃險而不服者故啓率六師而征之其誓師之意與秦誓湯誓無以異故聖人録其書以為萬世法漢孔氏曰甘有扈郊名馬融曰甘有扈南郊唐孔氏以為啓之西行甘當在東郊融乃扶風人或當知其處也啓誓師於甘之野當是親征至其地也周希聖曰天子之兵常隱於六鄉四方有變専責於方伯方伯不能討則天子親征之啓與有扈戰於甘之野是天子親征之此説是也大戰于甘乃召六卿案大司馬法凡制軍萬二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿乃召六卿者王之六卿皆行也李子真曰此所謂六卿非自冢宰至於司空之六卿也周禮地官鄉大夫每鄉卿一人蓋王之六鄉别有此六卿平居無事則各掌其鄉之政教禁令屬於大司徒有事出征則率其鄉之萬二千五百人而為之將屬於大司馬所謂軍將皆命卿即此卿也若以王朝之六卿即當用兵之時大司馬主軍政冢宰而下無緣亦屬於司馬故凡戰而言六卿者皆六鄉之六卿也此論得之六卿皆行而誓師於甘之野則是天子親率六師而征之也天子親征六卿各率其鄉之師以從故其戰謂之大戰蓋舉國而伐之也扈之威強至於舉國而伐之是其勢將與京師抗衡而方伯連率之力所不能討啓之是行也社稷之安危蓋係於此矣然則其用兵者豈得已而不已者乎王曰嗟六事之人豫誓告汝李校書論唐虞言咨之義曰咨之為言其後變而為嗟甘誓曰嗟六事之人􅏷征曰嗟豫有衆湯誥曰嗟爾萬方有衆泰誓曰嗟我友邦冡君蓋嗟者即咨之義也其召之則曰六卿其誓之則曰六事鄭氏謂變六卿言六事之人者言軍吏下及士卒也下之戒左右與御是遍勑在軍之士步卒亦在其間故六事之人為總呼之辭其説是也嗟六事之人豫誓告汝蓋呼六事之人使皆聽豫之誓言也有扈氏威侮五行怠棄三正天用勦絶其命此則聲言有扈氏之罪也五行三正説者不同據有扈氏夏之同姓也其驕蹇跋扈而不可制廢尊尊之義失親親之恩啓之聲言其罪而曰威侮五行怠棄三正此義不必求之太深要之但言其廢三綱五常而為是昏迷耳威侮者専其威虐而侮慢之也怠棄者怠慢而廢棄之也味此言啓之致討於有扈之辭可謂簡而盡微而顯矣蘇氏曰王者各以五行之德王改正朔易服色自舜以前必以有子丑為正者有扈不用夏之正朔服色是叛也故曰威侮五行怠棄三正此其論五行三正誠為切近然商之世方有改正朔易服色之事自夏以前未嘗有也蘇氏之説某亦未敢以為然也有扈之威侮五行怠棄三正則獲罪於天而天絶之矣勦截也截絶謂殄滅之也天之殄滅有罪必假手於人啓為天子當命德討罪之任不敢赦也今豫惟恭行天之罰啓之為天子當命德討罪之任不敢赦也於是率六師而討之豈以快一時之私忿哉凡所以致天之所罰也沈同以孟子言燕可伐而伐之或問曰勸齊伐燕有諸曰未也沈同問燕可伐豫應之曰可彼然而伐之彼如曰孰可以伐之則將應之曰為天吏則可以伐之今以燕伐燕何為勸之哉蓋非天吏則不可以行天罰而為天吏則不可以不行天之罰故經載誓師之辭無不以行天之罰為言者蓋苟非行天罰而用兵則是志於殺人而已其何以為後世法乎左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命啓謂我命所以討有扈者所以恭天之命爾之衆士亦當恭我之命而無致失其坐作進退之節也古者車戰每車甲士三人步卒七十二人其三人一居左一居右一居中車中左右主擊刺而馭者在其中左傳宣十二年楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆攝叔曰吾聞致師者右入壘折馘執俘而還是車之左右各有其事而御者在中惟主馬之驅馳而已然此乃指凡常之兵車而言若將之兵車則御者在左勇力之士在右將居鼓下在其中央主擊鼓與軍人為節度也此所誓乃六事之人非専為主將而言故指凡常之兵車而戒之也攻治也在車左者不治其車左之事在車右者不治其車右之事與夫在車中者御馬而非其正皆不恭我之命者也蓋左右不治其事則足以致敗左右治其事而車中者馭之失其正則亦足以致敗左氏傳襄二十四年晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉二子使宛射犬御廣車而行已皆乘乘車將及楚師而後從之近不告而馳之皆取胄于櫜而胄入壘皆下搏人以投收禽挾囚弗待而出皆超乘抽弓而射既免若射犬之類所謂御非其馬之正也以是知左右乘車馬雖勇又在於御得其正也王氏曰左不攻于左右不攻于右誓徒也御非其馬之正誓車也此亦一説然三代以來皆用車戰春秋所載列國戰爭皆用車而每車必有左右與御此所誓者曰攻于左攻于右御非其馬之正與左氏所載相合不必分徒與車也夫古者車戰每車甲士三人步卒七十二人所謂步卒者坐作進退皆聽於車而已又何必於誓車之外又誓其徒耶用命賞于祖弗用命戮于社豫則孥戮汝左攻于左右攻于右馭得其馬之正是用命也故賞于祖以勸之其或不然則是不用命也故戮于社以威之蓋古者天子親征載其遷廟之主與其社主以行用命則賞于遷廟主之前不用命則戮于社主之前示不敢専也賞于祖戮于社蓋尊祖嚴社之義也案禮曰天子巡守以遷廟主行載于齊車又曰若無遷主則以幣帛皮圭告于祖禰遂奉以出載于齊車以行蓋自以其遷廟主行載于齊車其無遷主則以幣帛皮圭行固以致其尊祖之義耳於是而賞焉亦所以尊祖也左傳定四年君以軍行祓社釁鼓祝奉以從蓋自其以社主行而祓社釁鼓固已致其嚴社之義耳於是而戮焉亦所以嚴社也由其尊祖嚴社故刑賞於此分焉先儒從而分為隂陽仁義之説則鑿矣遷廟之主與社主皆在軍中於是而賞之戮之則是不待乎班師振旅而刑賞固已行矣豫則孥戮汝者此蓋言汝苟有不用命則非但戮及汝身將併與其孥子也謂戮及其妻子也此篇與湯誓皆有孥戮之言夫罪人以族與夫參夷之刑是乃商紂與秦所以亡者也帝王之世豈容有此雖漢孔氏以謂權以脅之使勿犯然啓湯既有是言則是當時實有此刑苟有不用命者必不免於孥戮蓋其所謂戮者非殺之之謂也左氏傳僖二十七年楚子之治兵於睽終朝而畢不戮一人夷之搜賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可以是知謂之戮者非是殺之但加恥辱焉雖加鞭撲亦謂之戮也孥戮者猶所謂其孥男子入罪隸女子入舂藁者是也夫從天子以征伐不庭而不用命則其孥之至於罪隸舂藁豈為過哉非罪人以族與夫參夷之比也又漢書王莽傳舉此言顔師古曰夏書甘誓之辭孥戮之以為孥也説書者以為孥子也戮及其子非也秦誓曰囚孥正士豈戮子之謂耶此一説理亦可通夫天生五材民並用之闕一不可誰能去兵兵之設久矣兵不可去則誓亦不可去也夫驅民於鋒鏑戰爭之下苟不先為之誓戒使知坐作進退之節其有不用命者遂從而殺之是罔民也焉有仁義用兵罔民而可為也吳王闔閭欲試孫子以兵法出宫中美人百八十人孫子為分二隊以王之寵姬二人為隊長皆令持戟曰前則視心左視左手右視右手後則視背約束既布則設斧鉞即三令五申之於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令五申而鼓左婦人復笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃斬二隊長以徇於是婦人左右前後跪起皆中凖繩規矩以為雖赴之水火可也向使孫子未嘗三令五申乃欲戮其不用命者以徇其餘則彼亦且有辭矣尚安得而用之哉由是知國而不用兵則已苟不得已而至於用兵則誓戒之言不可無也舜禹之所不能免也彼謂商人作誓而民始叛誥誓不及五帝是皆不逹夫時變之論也五子之歌夏書詩大序曰情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困蓋聲詩之作世之治亂政之乖和係焉文武成湯之詩所謂治世之音其政和也若幽厲平桓之詩所謂亂世之音其政乖也三百篇之作雖有喜怒美刺哀樂之不同其實皆所以正當時之得失而言未嘗不本於仁厚忠愛故可以動天地而感鬼神也雖其詳見於三百篇原其所由起實本於虞夏之世舜與臯陶賡歌言元首股肱資以成治其言安以樂蓋所謂治世之音也大康失邦昆弟五人須于洛汭五子咸怨述大禹之戒以作歌其言怨以怒蓋所謂亂世之音也此二聲歌雖載於書其實詩之淵源也學者於此當以學詩之義而考之經解曰溫柔敦厚詩之教也學者能以溫柔敦厚之言而取之於此篇之義則得之矣能求此篇之義則凡詩之美刺針戒者皆可觸類而長之矣太康失邦昆弟五人須于洛汭作五子之歌五子之歌太康啓之子也盤于遊畋不恤民事有窮后羿距之于河不得反國故曰太康失邦昆弟五人者亦啓之子仲康少康是其二也此五人皆賢須待太康於洛水之汭不得反國情發於中不能自已故作此歌爾雅曰昆兄也此五人皆太康之弟而言昆弟者唐孔氏曰昆弟五人自有長幼故稱昆弟蓋其五人自相稱謂非指太康而言若篇內言厥弟五人則是指太康而言之耳太康尸位以逸豫滅厥德黎民咸二乃盤遊無度孔氏曰尸主也主以尊位為逸豫不勤未盡其義薛氏曰尸如祭禮之尸居其位而不為也是故居其位而不能有所為曰尸太康尸位是也居其位而不敢有所為亦曰尸康王既尸天子是也此説善也蓋康王居憂百官總已以聽冢宰則康王得以亮隂居喪而無關及於萬幾之務故謂之尸天子而非其罪也至於太康非有他故而遊畋忘反放棄萬幾而莫之省是誠有棄其位之心也此言尸位與羲和尸厥官同蓋在其位而不為其事也以逸豫先儒以屬於上文曰太康尸位以逸豫故其説有謂主以尊位而逸豫不勤據太康尸位是居其位而不能為只當作絶句讀以逸豫則連下文曰以逸豫滅厥德猶所謂以蕩陵德也君而滅其德則民懷二心矣故黎民咸二民既二矣太康尚不知懼乃盤遊而無節度此足以見其荒淫而不知節也夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度古之明君非不為逸豫也與民同樂樂而有節則民聞車馬之音見其羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病歟何以能鼓樂田獵也及其不遊不豫也則有吾何以助之言蓋其遊豫則為民之所樂也如此今也太康以逸豫而滅其德黎民咸有二心而猶且肆為逸豫以謂不恤則是固已自棄其天下矣欲免於危亡得乎畋于有洛之表十旬弗反此則言其盤遊之實事也夏都冀州在大河之北洛在河之南太康遊畋舍其宗廟社稷渡河而去則畋于洛之南至於百日而猶不反有洛之表言其逺也十旬弗反言其久也古之為國者兢兢業業如臨深淵如履薄氷而猶懼乎肘腋之變蕭牆之禍或起於一二日之間今太康乃自肆於遊畋以言其逺則畋于有洛之表以言其久則至於十旬弗反是其在我者既有棄天下之心安得無后羿之變乎有窮后羿因民弗忍距于河案左氏傳襄四年有夏之方衰也后羿自鉏遷于窮石然則窮者有羿之國名也其曰有窮者如云有扈也后羿蓋羿是窮之君也唐孔氏引賈逵説文之言以謂羿帝嚳射官也羿之先祖世為先王射官故帝賜羿弓矢使司射淮南子曰堯時十日並出堯使羿射九日而落之楚辭羿焉彃日烏解羽此言雖不經要之帝嚳時有羿堯時亦有羿則羿是善射之號非復人之名字據先儒之意蓋謂凡善射者皆謂之羿此有窮之君亦善射故以羿目之非是名也此説為可信案孟子曰逢蒙學射於羿盡羿之道思天下惟羿為愈已於是殺羿此逢蒙所殺之羿蓋又别是一羿非有窮之羿也有窮之羿乃為寒浞所殺非見殺於逢蒙也以是知羿非有窮之君蓋是善射之稱也太康既自棄於天下畋于有洛之表十旬弗反故天下皆有叛之之心於是后羿因民之不忍而以兵距之于河故太康不得還也北風之詩曰北風其涼雨雪其雱惠而好我攜手同行其虛其邪既亟只且蓋人君虐用其民而民叛之苟誠有惠我者則將攜手而歸之不暇也民既不忍太康之虐政相與叛之而羿於是時以兵距太康于河則是因民有叛之之心而為民所歸也是羿者一時之湯武也然而卒不能成湯武之功也者以羿亦一太康也魏綘曰有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠尨圉而用寒浞寒浞行媚于內而施賂于外愚弄其民而虞羿于田樹之詐慝以取其國家外內咸服羿猶不悛將歸自田家衆殺而烹之則羿之所為與太康實無以異也亦猶秦之暴虐而項羽亦暴虐其何繼秦而有天下乎而適當下民之欲叛太康於虛邪之時故羿得以乘間投隙而用其謀雖與湯武同其實異也厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌此與上文不相接蓋太康之始出而遊畋也五子御其母以從至于洛之北則止而待之不與太康俱為遊畋之樂也榖梁子曰智者慮義者行仁者守有此三者然後可以出會夫會者所以講信修睦之禮也然猶必仁者守然後可以出今太康既棄其宗廟社稷遊畋于有洛之表而莫之恤矣然其弟五人皆賢使此五人之中有一人焉而為之守則雖有后羿之變猶可以不亡其所以至於顛沛傾覆而莫之救者以五弟皆從空國而無人故也夫已則棄宗廟社稷而莫之恤雖宗廟社稷之所得賴以存者又皆從而去使之居無所能為之地將欲赴國家之患而勢不可得施太康之愚暗於是為甚矣五子之至於是也宗廟社稷將敗壞而覆亡而無復安存之理母子兄弟將離散奔潰而不可保危亂之至無日矣此其所以咸怨也其怨也憂愁嗟嘆之不足於是情動於中聲成文而詩歌作焉蓋出於其中心之誠然慷慨感厲而不能自已也其作為詩歌則必推原其禍之所由起太康之所以逸豫盤遊至於喪國亡家者惟其荒棄大禹之戒故爾是以五子之歌終始反覆惟追咎其荒棄大禹之戒而不能守以致於是史官推原其意而序之曰述大禹之戒以作歌其可謂善明詩人之旨矣後世序詩者每篇皆有小序言其詩之所為作其原蓋出於此孟子曰君子創業垂統為可繼也若夫成功則天也蓋君子所創所守為可繼之道也者雖歷萬世猶可以前期而為之至於子孫之賢與不賢能繼不能繼則係乎所遭如何耳此雖一二世猶不可以逆料也禹之謨訓可以傳萬世然一傳而為啓啓賢能敬承繼禹之道故夏以之安再傳而為太康不能遵守禹之謨訓故夏以之亡然而作歌之五子皆啓之子也向使太康不為適子而此五人者有一人焉繼啓以君天下則必能念大禹之勤勞遵守其訓以永其傳矣今五子不得繼世以有天下而太康有天下則天也非人之所能為亦如微子不繼商而紂繼之此商之所以亡季札不君吳而僚君之此吳之所以亂也雖太康亡然仲康卒能肇位四海少康卒能祀夏配天其所以然者以能遵大禹之謨訓不敢失墜而已此無他以禹之創業垂統誠萬世可繼之道故也使禹之子孫皆得如啓如仲康如少康者為天下君則其傳也豈不至於萬世哉書序本自為一篇漢孔氏以謂書序序所為作者之意昭然義見冝相附近故引之各冠其篇首某竊嘗以謂孔氏引序以冠篇首若湯誓大誥初未嘗言其所作之意而引序以冠之曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓其下則曰格爾衆庶悉聽朕言大誥曰武王崩三監及淮夷叛周公相成王將黜殷作大誥其下則曰王若曰猷大誥爾多邦越爾御事此為得體蓋若此之類非引序以冠於篇首則安知是篇之何自而作乎至於此篇自太康尸位至書大禹之戒以作歌其序載此篇之作既詳且盡矣而復加之以序曰太康失邦至作五子之歌又如旅獒篇首云惟克商遂通道于九夷八蠻至用訓于王既詳且盡矣而加之以序曰西旅獻獒太保作旅獒若此之類則為贅矣亦如詩江有汜之序曰江有汜美媵也至嫡能悔過也其義亦既盡矣又繼之曰文王之時至嫡亦自悔也載馳之序曰載馳許穆夫人作也至傷不能救也其義既以盡矣又繼之曰衛懿公為狄人所滅國人分散至故作是詩也若此之類文義重復有前一段則可無後一段矣有後一假則可無前一段矣故孔氏引書序以冠篇首若康誥大誥之類則為得體若五子之歌旅獒之類則為贅是其所冠之序是非相半如前者不可以不論也其一曰皇祖有訓民可近不可下民惟邦本本固邦寧豫視天下愚夫愚婦一能勝豫唐孔氏云五子之歌五章每章各是一人之作而辭相連接自為終始必是五子相顧從輕至甚其一其二蓋是昆弟之次或是作歌之次不可知也詩歌之體一人之作則自為一篇若出於一人之言者蓋詩歌肇於虞夏之世其體如此舜之歌曰股肱喜哉元首起哉百工熙哉其義尤未足也臯陶乃賡歌曰元首明哉股肱良哉庶事康哉又繼之曰元首叢脞哉股肱惰哉萬事隳哉然後其義乃足此五子之作歌其始言皇祖之訓而不及夫失邦之怨末乃言國亡民叛雖悔之可追而不及夫謨訓之言史官總而序之曰五子咸怨述大禹之戒以作歌蓋五子之意終始先後互相發明然後其義乃備也雖其言不出於一人而其意則若出於一人者以其同也後世詩家有聫句體其原本此聨句者蓋其材有所不逮則不可得而強如唐人侯喜劉師服與軒轅彌明詠石鼎詩畢知竭力終莫能近蓋以其心之所至者有所不同則形於言者不得不異也民可近不可下至奈何不敬此一章言君之所以為君者恃民以安不可以不敬民也自民可近不可下至若朽索之馭六馬皆是禹之言所以垂訓於後世者也故曰皇祖有訓皇大也尊而親之故曰皇祖記曰祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟凡此所謂皇者皆尊而大之之辭也皇祖者猶言大祖也孔氏以皇為君則失之矣夫君之與民以其勢而言之則其尊卑之際如霄壤之不相侔以其情而言之則其相須以安猶心體之相須以生也苟君民之情不合而徒以尊卑之勢相較則將渙然而離矣是故君民之分以情則合而安以勢則離而危蓋以情則近之故日親以勢則下之故日踈此實治亂安危之所係也禹之謨訓首之以一言曰民可近不可下孔子謂一言興邦此之謂也所謂民可近不可下者以民乃邦之本故也孟子曰民為貴社稷次之君為輕蓋民心附則社稷固社稷固則君安矣故邦以民為本本既固則邦未有不寧者苟民心離則其本先撥雖強如秦富如隋亦無救於滅亡也以是知人君所以安廟堂之上享其無敵之貴無倫之富所恃者惟人心而已苟不以人心為恃而徒恃勢力以為安其勢力之所不至則匹夫匹婦之愚者亦足以勝之矣如漢武帝平日千乘萬騎導前擁後若不可得而侮者及其微行出獵求漿于逆旅媪媪曰無漿但有溺耳聚少年欲攻幸而得免以此見武帝平日儀衛之盛彼愚夫愚婦特畏其勢力而不敢侮耳釋其勢則侮者至矣此豈非愚夫愚婦一能勝豫乎是故為君苟失一愚夫一愚婦之心則怨之者不釋匹夫匹婦怨之不釋而衆怨於是乎生矣故天下之安必由匹夫匹婦之無所不被其澤而天下之危必起於匹夫匹婦之怨斫朝涉之脛匹夫之怨也刳剔孕婦匹婦之怨也而商由此而亡故為君者圖治亂於未兆使匹夫匹婦之怨無自而萌則本固而邦寧矣一人三失怨豈在明不見是圖豫臨兆民凛乎若朽索之馭六馬為人上者奈何不敬此言人君多失則致人怨矣其所以致匹夫匹婦之怨者亦不在於顯然過惡苟失於此者在毫釐之間必有怨之矣蓋人君之所據者天下之利勢也一嚬笑一舉措而生民之休戚利害係焉故損怨之道必在圖之於未見之初苟怨之既形而後圖之亦已晚矣惟匹夫匹婦之愚者足以勝豫而所以致匹夫匹婦之怨者又不在大則是人君之所處是誠天下至危之勢也凛危也豫臨兆民凛乎若朽索之馭六馬言危懼之甚也朽索易脆六馬易驚則輪折車敗矣古者車皆四馬惟天子之車則特駕六馬四馬則兩服兩驂六馬則兩驂之外又有兩騑説文曰騑驂旁馬蓋於服驂之旁又加兩馬則為六也陸農師曰天子之車盛則駕六常則駕四此説可信案漢書梁孝王傳孝王入朝天子使使持乘輿駟迎孝王於闕下臣瓉注曰稱乘輿駟則車馬皆往言駟不駕六馬天子副車駕駟馬據此言天子副車駕四則是盛則駕六如陸氏之説蓋可見矣此將言馬多則懼深以極其可畏故不曰四馬而言六馬也朽索之馭六馬本無此事但欲見其危之甚耳亦猶晉人作危語曰杖頭數米劒頭炊百歲老翁攀髙枝盲人騎馬臨深池亦無是事也惟以君而臨民其危如朽索之馭六馬則為人上其可不敬民哉君能敬民則本固邦寧而社稷永保矣漢孔氏曰能敬則不驕在上不驕則髙而不危此説是也惟禹之謨訓其所以垂示子孫者深切著明如此而太康奈何不知以是為戒至於失邦也其二曰訓有之內作色荒外作禽荒甘酒嗜音峻宇雕牆有一于此未或不亡此章又申言禹之所訓敬民之實也為人君者在乎以天下為憂而不以位為樂苟以天下為憂則兢兢業業一日二日萬幾自朝至於日昊不遑暇食舉天下聲色嗜好遊畋之樂曽不足以動其心此誠本固邦寧之要道也苟以位為樂則將窮天下之嗜欲以供其耳目口腹之娛曽不以生民之休戚為念此所以積匹夫匹婦之怨以至於危亡而不自知也故此章又所以申前章之義也前言皇祖有訓此蒙其文故但曰訓有之也迷亂曰荒色女色禽從禽內作色荒惑嬖寵也外作禽荒外耽遊畋也甘酒嗜音者言好此二者甘嗜之而無厭也峻宇者言髙大其室宇也雕牆者言飾繪其垣牆也凡此皆是咈百姓以從欲而足以致天下之怨故有一於此則未有不亡者昔衛懿公好鶴鶴有乘軒者及狄人伐衛國人授甲者皆曰使鶴鶴實有祿位豫焉能戰遂敗於滎澤為狄所滅夫衛懿公之所以亡者豈必兼此數者而後亡哉惟有好鶴之一事耳而其受禍已如此之慘矣而况太康之逸豫滅厥德盤遊無度畋于有洛之表十旬弗反則於是數者幾於兼備之矣欲其無亡得乎其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡此又言自陶唐以來保民兢慎故能享其安樂尊榮今則不然所以底於滅亡也陶唐者堯之氏也范宣子曰昔丐之祖自夏以上為陶唐氏在商為豕韋氏在周為唐杜氏蓋自夏前謂堯之氏為陶唐冀方帝都所在堯都平陽舜都蒲坂禹都安邑相去不盈二百里皆在冀州自堯始都冀方堯傳之舜舜傳之禹禹傳之啓此三聖一賢未嘗失道故歷三百餘年號為極治之世至於太康乃不能守而至於失厥道失厥道則亂其紀綱既亂其紀綱未有不底於滅亡者蓋自古國家所以至於滅亡必自失厥道也唐明皇開元之初用姚崇宋璟以致太平其治庶幾於正觀及其中年荒於女色窮天下之聲色玩好以供遊宴之娛於是李林甫楊國忠牛仙客輩起而用事盡變更髙祖太宗之法度禍亂之勢已成恬不自覺及一旦禍發幽陵長驅入關明皇倉卒西幸自長安至於咸陽不四十里間而其平日所恃以為天子之勢者一旦盡去矣於是晝無食夜無燈栖栖然乞憐於獻豆麥之人原其所以致此者無他惟其失厥道而已由是觀之五子之歌一章言民情之可畏天子之勢為不足恃二章言逸欲之為害三章言亂紀綱則底於滅亡此雖出於一時感激之意實為萬世有國家之明訓也其四曰明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有荒墜厥緒覆宗絶祀此章又申言所以失厥道而亂其紀綱之事也我之祖有明明之德故為萬邦之君言居於冀方奄萬邦而君之也有典有則貽厥子孫所謂創業垂統為可繼也曰典曰則者皆是其典章法度可以為萬世法者唐孔氏曰不為大異重言以備文耳關石和鈞王府則有此言其所制法度之器也太史公曰禹聲為律身為度左凖繩右規矩自古法度之器至禹而後明甚也其法度之制始於權權與物鈞而生衡衡運生規規員生矩矩方生繩繩直生凖凖正則平衡而鈞權矣是權衡者法度之所自出也五權之法二十四銖為兩十六兩為斤三十斤為鈞四鈞為石是斤與石又五權之最重也關通也和平也關通其石和平其鈞守此法度與天下共守之而不敢失也舉鈞石則五權可推舉權則度量凖繩規矩凡法度之在天下者皆可見也於石曰關於鈞曰和特變其文耳非有異義也猶月令曰日夜分則同度量鈞衡石角斗甬正權概曰同曰鈞曰角曰正亦但是變其文耳關石和鈞則物貨流通家給人足矣百姓足君孰與不足王府於是而富有也古之所謂理財之政不出於此至於後世然後剝膚槌髓之政興於是用聚斂之臣以為富國之術殊不知禹之所以能使王府富者惟在於關石和鈞而已夫禹之謨訓所以為垂統法度以明示於子孫者如此其詳而其子孫不能保守乃荒墜其已成之緒此其所以覆有夏之宗絶大禹之緒也孟子曰朝不信道工不信度君子犯義小人犯刑國之所存者幸也三章言今失厥道亂其紀綱則朝不信道矣此章言關石和鈞王府則有荒墜厥緒則工不信度矣朝不信道工不信度其能免於覆宗絶祀乎羿雖以兵距太康於河而廢之然而卒立仲康其後羿篡相而奪其位卒為寒浞所殺而代之少康竟以一旅而興天下是以有夏之宗卒不覆而大禹之祀卒不絶也然而此章言云爾者蓋自其時而觀之意其必至於滅亡而無復有興復之望亦猶正月之詩言赫赫宗周褒姒滅之蓋言其滅之之道也其五曰嗚呼曷歸豫懷之悲萬姓仇豫豫將疇依鬱陶乎豫心顔厚有忸怩弗愼厥德雖悔何追此章又結前義以致其情也嗚呼者嗟嘆之辭也歎其倀倀然無所歸也無所歸則死亡無日矣故豫懷之悲夫以匹夫匹婦之怨猶不可犯况以萬姓怨憤之情而仇於豫豫將誰依以免於禍乎鬱陶哀思也忸怩心慙也言我負此萬姓每憂積於中以慙顔之厚而心又忸怩也有又也孔氏曰慙愧於仁人賢士非也顔厚有忸怩但是慙於斯民而已既慙於斯民而顔厚有忸怩矣於是又斷之曰我則弗愼厥德於其始矣今雖忸怩而悔之何所及哉五章之義至是而足矣陳博士曰鬱陶則憂積於中忸怩則愧發於外夫所以曷歸者太康也而五子則曰嗚呼曷歸豫懷之悲虐民而民仇之者太康也而五子則曰萬姓仇豫豫將疇依所宜憂所宜愧皆在太康而五子任之以為已事者蓋仁人之於兄弟親愛之而已矣有邦則同其安榮失邦則同其危辱其危也可憂其辱也可愧五子之於太康可謂有仁人之心矣此言深得詩人之旨孔子曰詩可以怨蓋謂詩人之意溫柔敦厚而不怒其言和緩宛轉引咎自責而不深咎乎所怨之人仁人君子之心於此可見髙子曰小辨之怨小人之詩也孟子曰有人於此越人彎弓而射之則已談笑而道之無他疏之也其兄彎弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫髙叟之為詩也蓋幽王放太子宜臼而將殺之夫為子而將見殺於父人情之至痛也苟於是而不怨則是疏其父如路人也此小辨之所以不得不怨然而其怨也但曰民莫不榖我獨于罹何辜于天我罪伊何但引咎自責而已此其所以為仁人君子之怨也太康之邦宗將覆滅此五子之所以不能無怨然而其怨也不深尤太康乃若其身之親為不善以致之者非其仁愛之意充實於中而發見於外安能若是哉孔子於書取五子之歌於詩取小辨其意一也尚書全解卷十二
