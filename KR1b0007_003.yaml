body:
  text: 尚書全解卷三宋林之奇撰舜典虞書月正元日舜格于文祖詢于四嶽闢四門明四目達四聰月正即正月也李校書曰月朔或謂之朔月詩所謂朔月辛卯是也月吉或謂之吉月傳所謂吉月朝服而朝是也以此觀之則月正之為正月也必矣夫學者之於經惟本於求其意而已不必區區於物色牝牡之間如二典之所載皆史官變其文以成經緯苟得其大意足矣如必較量輕重而為之說則將不勝其鑿如舜典言舜受終則曰正月格于文祖則曰月正必欲從而為之說此王氏之所以有即是月而後有政之論也元日朔日也朔日而謂之元日猶人君即位之始年謂之元年也舜既終三年之喪於是始告廟既告於廟然後即於天子之位也自此而下皆紀舜詢訪羣臣之事也詢于四嶽者所謂謀于四嶽也闢四門明四目達四聰此其所以謀四嶽之事也唐孔氏云告廟既訖乃謀政治於四嶽之官所謀開四方之門大仕路致衆賢也明四方之目使為已逺視四方也逹四方之聰使為已逺聽四方也恐逺有所壅蔽令為已悉聞之此說甚善蓋四嶽之職主招延衆賢以待上之所求為天子之耳目也故天子求賢必咨訪詢問之如典所載者多矣此言詢于四嶽亦咨訪詢問而求賢也闢四門者蓋所以廣仕路也孟子曰義路也禮門也惟君子能由是路出入是門也惟其闢四方之門則天下之仕者皆願立於朝矣明四目逹四聰不言四明而言四目者皆史官錯綜其文以成義也咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服此則咨在外之十有二牧也周官曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯則是十二牧者在外主諸侯者也惟其在外故其咨之之辭曰食哉惟時柔逺能邇惇德允元而難任人此皆在外之辭也食哉惟時者民之粒食當使之各得其時也李校書曰稱惟時亮天功惟時有苖弗率皆以時訓是此食哉惟時亦應訓是而先儒乃謂當如敬授民時之時者句自此絶則訓字當異此蓋與直哉惟清同句體也此說甚善柔逺能邇者孔氏曰言當安逺乃能安近非也中庸曰君子之道譬如行逺必自邇臯陶曰邇可逺在兹是先邇而後逺也而孔氏謂當安逺乃能安近非也李校書曰能者耐也古者能耐同字能邇者居上以寬之謂也其意蓋以能邇為耐邇者若俗所謂忍耐得事恐亦不然耐能二字字通而義分以能之字為耐之字則可以能之義為耐之義則不可謂能邇為居上以寬者亦非也某竊謂下文言蠻夷率服而上文曰柔逺能邇則是逺邇雖皆當治苐欲柔逺者當先能治近也惇德允元而難任人此能邇之道也惇德允元者如武城之惇信明義蓋進德而用之也德者有德也元者善人也曰惇曰允厚之信之之謂也而難任人者退不肖而逺任人也任人佞人也佞人而謂任人者蓋其所包藏不可測知故也謂之難者遏絶之使不得進也進賢而用之退不肖而逺之則內治舉矣此蠻夷所以相率而來服也蓋自古蠻夷所以敢憑陵中國者皆由守土之臣不能用寬厚長者之道行優游寬大之政以忠信鎮服蠻夷邀功生事開邉鄙之隙者衆也兹舜命十有二牧其一言曰食哉惟時又其一言曰柔逺能邇又從而申之曰惇德允元而難任人蠻夷率服知所先務矣舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇稱舜曰者所以别堯也蓋自此而上稱帝曰者皆堯也自此而下稱帝曰者皆舜也舜既終堯三年之喪格于文祖然後即天子之位稱帝也書之所載其於名分之際最為謹嚴蓋懼其涉於疑似有以起後世異同之論也如舜之居攝疑其遂稱帝矣故於命禹作司空則稱舜者以見前此未嘗稱帝也如成王幼沖周公攝政則疑於遂稱王以令天下之人故作書者於多士則曰周公初于新邑洛用告商王士王若曰於多方則曰王來自奄至于宗周周公曰王若曰以見周公雖居攝凡有號令皆稱成王之命也其於命名定分之際謹嚴如此而後世猶謂舜南面而立堯率諸侯北面而朝之又謂周公負黼扆南面而朝諸侯於明堂之上此蓋未嘗深考書之所載而妄為之說也有能奮庸熙帝之載者謂有能奮起其功以廣堯之事見於己試之效者將使之宅百揆也蓋舜未即位凡在位者所以言事無非堯之事也薛云帝載猶云王事也此說未通謂帝載為王事則可舜自稱其事為帝載則不可既求其見於己試之效者故以熙堯之載言之使宅百揆者將使之居度百官之任猶後世之為宰相也唐孔氏云舜本以百揆攝位今既即政故求置其官此說是也蓋舜雖受堯之禪而其實尚居百揆之官但攝行天子之政代堯總領萬機之務耳而帝堯之在位蓋自若也堯崩三年之喪畢然後舜告于堯文祖之廟而即帝位舜即帝位方詢于四嶽求其可為百揆者以代已之位則是舜居百揆之位凡三十餘年而後禹代之蓋名分之際不統於一則雖堯之聖不能一朝居也亮采惠疇孔氏云信立其功順其事者誰乎此說未通謂疇咨為嗟誰則可謂惠疇為順其事者誰且與上亮采為一句則文勢不順據上文有能則是誰之義矣而下言誰其文亦不無重復王氏云亮采者明其事也惠疇者惠其疇也此說雖勝然以疇為惠其疇而引周易疇離祉為證以為百工者百揆之疇也百揆得人則百工皆疇離祉矣以疇離祉證疇之義而又以離祉為說迂回甚矣豫竊謂亮采者輔相之義與寅亮天工弼亮四世之亮同爾雅曰亮左右也以是知亮有輔相之義亮采者輔相朝廷之事疇如九疇之疇謂天下之事各以其類無不順也惠疇此蓋宰相之職也載事也采亦事也既曰熙載又曰亮采者蓋前之所言熙堯之事見於己試之效也後之所言者則將責之以將來之效以亮舜之事也僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉舜既求其熙帝之載見於己試之效者於是四嶽同辭薦禹曰伯禹作司空蓋禹於是時以司空居平水土之任已有成績矣故四嶽舉之將使舜自司空擢升百揆之任也薛氏以百揆為司空之職其說失之矣俞者然其所舉也既然其所舉於是稱美其平水土之功而勉之曰惟時懋哉懋勉也惟時懋哉謂惟勉行居是百揆蓋於是從四嶽之請而使之宅百揆也郊特牲曰拜服也稽首服之甚也禹拜稽首盡敬於君也讓于稷契暨臯陶所謂推賢遜能也稷官名也契臯陶皆稱其名而稷獨稱其官者唐孔氏曰出自禹意不必著義其說是也俞然其所推之賢也汝往哉不許其讓也聖人以公天下為心一有所廢置必與衆共之未嘗徇一已之私見舜之元德修於畎畝之中堯已聞之矣然必至於四嶽舉之然後妻以二女攝之以位協之以天人之望而後禪之則是其事若出於四嶽而非出於堯也舜既即位當時之人有大功者無出於禹之右則百揆之任非禹其孰宜之猶必詢于四嶽至於四嶽舉之然後稱其前功而命焉則其事亦若出於四嶽而非出於舜也非天下之至公其孰能與此帝曰棄黎民阻飢汝后稷播時百榖孟子曰禹既疏為九河瀹濟漯而注諸海決汝漢排淮泗而注之江然後中國可得而食也后稷教民稼穡樹藝五榖五榖熟而人民育人之有道也飽食暖衣逸居無教則近於禽獸聖人有憂之使契為司徒觀孟子之言則是稷之播百榖契之敷五教皆在禹平水土之後未即位之前而舜乃列於九官之次者舜特使禹宅百揆禹讓于稷契暨臯陶將使舜以百揆之任授之也舜既不許其讓而以百揆授禹矣而稷契臯陶之位皆已至無可遷者但稱美其前功申警之而已曰稷者時居稷官也棄稷也時居稷官故禹稱其官棄其名也故舜稱其名曽氏云棄者以誕置之隘巷寒冰平林為名也黎民阻飢者衆人之艱在於飢此蓋指洪水未平民方艱食之時言之也播時百榖以濟此蒸民者汝后稷之功也謂之后稷者蓋雖在朝為公卿而分土胙民為諸侯尊而君之故稱后稷蓋當是時稱后非獨后稷一人如吕刑所稱伯夷降典禹平水土皆可謂之后而後世亦稱夔為后夔又皆尊而君之之稱也百榖者所播非一種故曰百榖生民之詩曰藝之荏菽荏菽斾斾禾役穟穟麻麥幪幪瓜瓞唪唪又曰誕降嘉種維秬維秠維穈維芑惟后稷之粒食蒸民所播非一種故謂之百榖蓋舉其多而言之也帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬此亦謂洪水未平民未知教之時言之也意以為百姓所以不親於下者由五品之不順於上故也人倫明於上則小民親於下矣五品五典之教皆言人倫也自其可以為萬世常行之法而言之謂之五品自其設而為教言之則謂之五教其實一也但史官異其文耳左氏傳與孟子論五典皆本於舜典而其文不同左氏傳云舜舉八元使布五教於四方父義母慈兄友弟恭子孝而孟子曰使契為司徒教以人倫使父子有親君臣有義夫婦有别長幼有序朋友有信此二說皆本於舜典而其文則大同小異竊謂左傳之言不如孟子之說為盡中庸論天下之逹道五曰君臣也父子也昆弟也夫婦也朋友之交也蓋人倫之道盡於此五者契為司徒教天下以人倫而君臣之義夫婦之别朋友之信豈有忽而不教者哉當以孟子之言為證汝作司徒者言汝為司徒之職謹布五教於民其有不率教者又當寬以待之也詩云天生蒸民有物有則民之秉彞好是懿德秉彞之性人之所同有也其有至於喪其秉彞而亂人倫之性者未必其中心之誠然也良由教化有所未明習俗有所未成則其固有之性逐物而喪矣惟教化已明習俗已成將見復其固有之性矣故舜命契為司徒教之以五典其有不率教者不與賊冦姦宄之人同陷臯陶之刑又命寬以待之開其遷善逺罪之路而納之於君子長者之域也在寬者孟子所謂勞之來之匡之直之輔之翼之使自得之又從而振德之者也漢韓延壽為馮翊民有昆弟相與訟田延壽大傷之曰幸得備位為民表率不能宣明教化至令有骨肉爭訟此咎在馮翊因閉閣思過於是兩兄弟深自悔皆自髠肉袒謝願以田相移不敢復爭仇覽為蒲亭吏人有陳允獨與母居而母詣覽告允不孝覽曰前過舍見廬落頓整耕耘以時此非惡人當是教化有所未至覽因至允家與其母子飲因為陳人倫孝行譬以禍福允卒成孝子惟其待之以寬則五教可得而敷之夫契為司徒在禹平水土之後至舜之即帝位凡三十餘年矣而舜申命之言猶有在寬之語則其待之之厚也至矣堯舜之教民其優游不迫如此宜其垂拱坐視夫民之阜也帝曰臯陶蠻夷猾夏臯陶作士亦在舜未即位之前此亦申警之而已矣蠻夷猾夏王氏云在周大司馬之職當舜之時以士官兼之其意以謂舜之時不立大司馬之官其有蠻夷猾夏則使臯陶治之此說不然夫蠻夷侵亂邉境將用兵以禦之邪不用兵以禦之邪不用兵以執之則何以𨽻臯陶之刑如其用兵以士官為將帥古無是理唐虞稽古建官惟百典之所載惟有九官姑以見其得賢才而用之以共致無為之治爾非謂所命之官只此九人也甘誓大戰于甘乃召六卿在啓時有六卿則當舜之時安知其無司馬之職而必以為兼於士官乎然而舜告臯陶則曰蠻夷猾夏何也此非境外之蠻夷舜之世九州之內蓋有蠻夷與吾民錯居境內冀州揚州之島夷青州之萊夷徐州之淮夷梁州之和夷是也惟其與吾民雜居於境內而能肆為侵叛以為吾民之害於是使臯陶辨華夷內外之分以法繩治而時取其尤桀黠者而誅之爾漢光武受南單于降處之內地其後華夷無辨風俗雜揉駸駸以成東晋五胡之亂良由不能辨之於猾夏之初故也寇賊姦宄汝作士五刑有服五服三就五流有宅五宅三居寇賊姦宄乃吾民之犯法者也羣行攻劫曰寇殺人曰賊姦宄說者不同左氏傳以謂亂在外曰姦在內曰宄此說未知孰是要之姦宄亦是寇賊矣夫蠻夷猾夏冦賊姦宄此孟子所謂不待教而誅也故𨽻於臯陶之刑汝作士士理官也五刑墨劓剕宫大辟有服者服其罪也孟子所謂善戰者服上刑也五流謂五刑不忍加誅則制為五等以宥之有宅者安其居也蓋刑而當其罪則刑者服其罪流而當其罪則流者安其居也五服三就孔氏曰行刑當就三處大罪於原野大夫於朝士於市其說出於國語然經言五刑是五刑皆然也若以謂大罪於原野大夫於朝士於市則是皆於大辟之一刑矣墨劓剕宫必不然也孔氏以三就為朝市原野又以三居為大罪四裔次九州之外次千里之外此說尤為無據夫四凶流於四裔蓋在九州之內今謂大罪四裔次九州之外無是理也王氏云行刑者或就重或就輕或就輕重之中此之謂三就流者或居逺或居近或居逺近之中此之謂三居此說為善蓋教臯陶原情而定罪耳夫欲刑者之服其罪流者之安其居則必權人情之有宜輕者有宜重者有宜輕重之中者其流罪有宜居近者有宜居逺者有宜居逺近之中者皆酌之以人情而不背戾於法此所貴於惟明克允也惟明克允理官惟明故能允也允信於人也蓋欲刑者之服其罪流者之安其居非信於人不可欲信於人則在乎明足以察人情之是非而善權其輕重也孔子曰片言可以折獄者其由也與蓋惟信於人者為可以折獄非其明足以有察則安能片言而折之哉故片言折獄非惟明且允者有所不能也舜命契為司徒教以在寬命臯陶作士教之以一言曰明契與臯陶以是能其官未有出於一言之外其言可謂簡而當矣帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧謂誰能順我百工之事也馬氏云司空兼理百工之事蓋禹既由司空以宅百揆於是又求其可為司空以代禹者也周禮考工記曰國有六職百工居其一焉鄭氏云百工司空事官之屬司空掌營城郭建都邑立社稷宗廟造宫室車旗器械百工者唐虞以上謂之共工鄭氏此說亦未盡唐虞之世雖謂之共工然亦謂之司空伯禹作司空是也僉曰垂哉四嶽見垂能任百工之事也據上文言疇若豫工下文僉曰垂哉則是所詢者亦詢四嶽而僉曰者亦四嶽薦之也而不言咨四嶽者蓋史官經緯其語以成文以使文勢上下互相發明也垂有創物之巧精於百工之技藝故四嶽薦之使總領百工之事蓋其所制器歷代傳之以為寶故傳所謂垂之竹矢是也以一矢觀之有以見垂於百工技藝之事無不精以一垂觀之有以見舜之時百工有司莫不稱其職也舜曰俞者然其所舉也汝共工猶言汝后稷播時百榖謂使居是官也孔氏見文無作字遂云共謂共其職事審如此說則與堯典所稱者乃為異文無是理也據下文汝作秩宗古文亦無作字但云汝秩宗與此同垂拜稽首讓于殳斨暨伯與孔氏以殳斨伯與為二臣非也禹讓稷契臯陶三人也則曰讓于稷契暨臯陶伯夷讓于夔龍二人也則曰讓于夔龍此之所讓與禹正同然中加暨字則其為三人也無疑矣殳一也斨二也伯與三也帝曰俞者然其讓也雖然其所讓然殳斨伯與又未若垂之善於其職故使往諧其官也帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧此又求掌山澤之官自上下以其地言之自草木鳥獸以其物而言之孟子不違農時榖不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也榖與魚鱉不可勝食材木不可勝用是使民養生喪死無憾王道之始也舜既命稷以播百榖又求掌山澤之官蓋此二者誠足國用之本也僉曰益哉四嶽舉益謂可堪此職當禹治水之初舜使益掌火益烈山澤而焚之禽獸逃匿然後禹得而施其功則是益之職其掌上下草木鳥獸亦已久矣至此則復命之者蓋前此雖烈山澤驅禽獸是時禹居平水土之職益但為之佐耳至是方正其為虞之職也曽氏云案周禮云大山澤虞中士四人下士皆八人中山澤虞下士皆六人下山澤虞下士皆四人益之為虞豈一山一澤之虞蓋為衆虞之長也作朕虞猶云若豫工也或以益為臯陶之子是未必然據伯益即伯翳也其後為秦在春秋之時浸以強盛使伯益果臯陶之子則秦乃臯陶之後也而臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉使臯陶猶有後於秦則文仲之言不若是之甚也案史記云帝禹立而舉臯陶薦之且授政焉卒封臯陶之後於六或在許而後舉益任之政以是觀之則益與臯陶不得為一族也明矣讓于朱虎熊羆孔氏亦以為二臣據左傳載高辛氏之子有仲虎仲熊虎與熊既為二人則朱與羆亦當為二人矣朱博士云殳斨伯與三人也故言暨以别之朱虎熊羆四人也故不言暨此說為善禹讓于稷契臯陶伯夷讓于夔龍故舜或稱其前功而申戒之或使為典樂納言之職而垂益所舉數人則無所遷擢者唐虞稽古建官惟百其所命者不但此九官也然既然垂益之讓則於此數子亦必命之位但史文不備耳太史公謂舜以朱虎熊羆為益之佐理或然也然典之所不載不知太史公何從而得之耳帝曰咨四嶽有能典朕三禮僉曰伯夷舜於是又求典禮之官此即周官大宗伯之職也大宗伯掌建邦之天神人鬼地示之禮則此所謂三禮也典禮之職吉凶軍賔嘉之事雖無所不統然實以郊廟祭祀為主故但云典朕三禮蓋人君盡其孝敬以事天地祖宗則民德歸厚兹實禮之本也伯夷臣名其氏族則不可知先儒引鄭語云姜伯夷之後此說不可信且國語既以姜姓為四嶽之後矣而又以為伯夷之後其說自相戾韋昭遂謂即四嶽且經云咨四嶽有能典朕三禮僉曰伯夷豈四嶽以是自薦也揆之人情決不如此則伯夷之為姜姓雖先儒有所據而云亦未可信帝曰俞咨伯汝作秩宗秩宗當時禮官之名也國語曰使名姓之後能知四時之生犧牲之物玉帛之類采服之宜彞器之量次主之度屏攝之位壇場之所上下之神祗氏姓之所出而心率舊典者為之宗以其名姓之臣故謂之宗以其率舊典故謂之秩秩常也周以禮屬宗伯即此所謂宗也漢以禮官為太常即此所謂秩也夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉寅也直也清也此三者所以事郊廟交於鬼神之道也寅者敬而不慢直者正而不諂清者潔而不汙能夙夜盡此三者則神之德感矣孟子曰西子蒙不潔則人皆掩鼻而過之雖有惡人齊戒沐浴則可以事上帝齊沐者夙夜惟寅直哉惟清之謂也汝往哉往哉汝諧往欽哉是皆不許其讓而使之往踐其職也文雖少變意皆不殊必欲從而為之說則鑿矣帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言此則因伯夷之讓夔而使之典樂教胄子也胄子謂元子以下公卿大夫之子孫周官大司樂掌成均之法則治國之學政而合國之子弟即此職也古之仕者世祿不可以無教之人而襲父兄之位故必合胄子而教之唐虞三代之際仕於朝者非天子之族類則世臣巨室之家其超於耕稼側微者率不過數人耳豈其時世家之子弟皆賢而後世為不可及邪惟古之所以教胄子者有其具也然其教之必典樂之官何也古之教者非教以辭令文章也惟長善救失以成就其德耳惟將以成就其德故優而游之使自求之厭而飫之使自趨之自興於詩至成於樂此教之序也先王之作樂必本之情性稽之度數本之情性樂之所以生也稽之度數樂之所以成也蓋樂之設非聽於鏗鏘而已將使人導性情之中和而反之於正故必本之情性自直而溫至詩言志歌永言所謂本之情性也雖本於情性而形之於樂洪纎小大不可以無法故必稽之度數聲依永律和聲所謂稽之度數也學記曰學者必有失教者必知之知其心然後能救其失教也者長善救失者也自直而溫以下皆長善而救失之道也直者易失於不溫和寬者易失於不莊栗剛者易失於虐簡者易失於傲此教者之所當知也彼之能直能寬能剛能簡教者則長其善不溫者不栗者虐者傲者則救其失大司樂曰以樂德教國子中和祗庸孝友與此意同蓋其直能溫寬能栗剛能無虐簡能無傲則中和祗庸孝友矣直寬剛簡與臯陶言九德洪範言三德其大意則同其先後多寡之殊本無他義必欲為之說則鑿矣聲依永律和聲此言歌律之序也在心為志發言為詩故曰詩言志言之不足故嗟歎之嗟歎之不足故永歌之永長也永言長言也歌者人聲也上如抗下如墜曲如折止如稿木倨中矩勾中鈎纍纍然端如貫珠此皆人聲之發也人聲之發有洪纎小大則有宫商角徴羽之五聲焉聲之洪而濁者曰宫其次曰商聲之纎而清者曰羽其次曰徴其聲在洪纎清濁之中者曰角人之聲有此洪纎小大則樂器依之而作焉古者作樂升歌於堂然後樂奏是所謂聲依永也聲有洪纎小大苟無以為之準則大過於宫者或至於摦而不宫小過於羽者或至於窕而不成如此則樂不和矣故必以十二律而和之十二律以黃鍾為本黃鍾律長九寸三分損一下生林鍾林鍾長六寸三分益一上生太蔟太蔟長八寸此三律皆全寸而無餘分自太蔟生南吕以至無射生中吕其間九律皆有空積忽微蓋古人之作律也其意以為聲無形而樂有器器必有弊而聲不可以言傳懼夫器失而聲遂亡也乃多為之法以著之故始於聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為籥合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多寡之法而著之於量為之輕重之法而著之於權衡是三物者亦必有時而弊則又總其法而著之於數使其分寸籥合銖兩皆起於黃鍾然後律度量衡相為表裏使得律者可以制度量衡可以制律四者既同而元聲必至則樂和矣蓋律有常數數有常度而聲有洪纎咸取則於此此之謂律和聲八音克諧無相奪倫惟其以律和聲音兹所以八音克諧也八音金鍾鎛也石磬也絲琴瑟也竹管簫也匏笙也土塤也革鼓鼗也木柷敔也此八音者其聲名不同必以律和其聲然後洪纎小大各得其當苟有一音之不和於其間則樂之合奏必雜而不得諧和故曰無相奪倫蓋樂之合奏聽者不知其孰為金石孰為絲竹猶善和羮焉使食之者徒見其和之美不知其孰為鹽孰為梅神人以和樂既調矣奏之於郊廟則天地神祇祖考之所歆樂而神莫不和矣用之燕饗鄉射而臣民之心無不和矣幽而神明而人無有不和此韶樂所以為盡善盡美也夔曰於豫擊石拊石百獸率舞薛氏劉氏皆以為益稷脫簡重出蓋方命夔典樂而夔遽言其擊石拊石致百獸率舞之效非事辭之序也而益稷篇又有此文故二公疑其差誤以理觀之義或然也然筆削聖人之經以就已意此風亦不可長孔子曰多聞闕疑慎言其餘則寡尤此實治經之法也帝曰龍朕堲讒說殄行震驚朕師此亦因伯夷之讓而命龍以作納言也觀顔淵問為邦孔子曰行夏之時乘商之輅服周之冕樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆舜命九官至於使伯夷典禮后夔典樂則治道於是乎成矣而乃命龍以作納言其命之之辭則曰朕堲讒說殄行震驚朕師此正孔子答顔淵問為邦之意蓋自古已安已治矣而其所以至於危亂者未有不由於小人變白為黑以是為非者故治定功成之後尤宜以是為戒也堲疾也史記曰朕畏忌讒說殄行畏忌者堲之謂也讒說邪說也殄行殄絶君子之行也震驚朕師則其言僞辨瞽惑流俗也讒說殄行之為害其端甚微究其所終則必至於惑流俗之視聽至是而後堲之則無及矣如楊氏為我墨氏兼愛此其所謂邪說也為我則至於無君兼愛則至於無父則所謂殄行也楊墨之道不熄孔子之道不著是邪說誣民充塞仁義也仁義充塞則率獸而食人人將相食此所謂震驚朕師也命汝作納言夙夜出納朕命惟允蓋納言之職宣王之言而逹之於下傳下之言而逹之於上詩所謂出納王命王之喉舌也夫讒說之可畏也如此舜不弃於臯陶之刑而特以出納喉舌之官待之如此其寬者蓋讒說殄行之人必其小人之有才者也小人有才而疾之太甚弃之於刑辟絶其自新之路則刻核太至而彼有不肖之心矣故舜必以寬待之開其遷善逺罪之路而不至於小人之歸矣益稷曰庶頑讒說若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之此正納言之職也宣上之言而逹之於下所以教之也採下之言而納之於上所以驗其革與不革也至於教之不改而後加誅焉此舜待庶頑讒說之道也惟允者言出納王命必以信也春秋時秦與晉行成叔向命召行人子貟行人子朱曰朱也當御叔向曰秦晉不和也久矣今日之事幸而集晉國賴之不集三軍暴骨子貟道二國之言無私子常易之所謂道二國之言無私者允之謂也讒說殄行之人類多變詐不實將欲化之無他道惟在待之以誠而已商俗靡靡利口惟賢餘風未殄而康王以畢公能正色率下使之保釐東郊此有因四嶽之薦而用之者有不因四嶽之薦因人之讓而用之者有遷其舊職者有不遷其舊職者有讓而後受者有不讓而直受之者各因其實而已矣帝曰咨汝二十有二人欽哉惟時亮天功三載考績三考黜陟幽明庶績咸熙分北三苖自詢于四嶽至夙夜出納朕命惟允各隨其職而戒之至此又總而申勑之也正如堯典既已分命申命羲和四子各主一方之政矣而又總而申勑之曰咨汝羲暨和而下是也二十二人孔氏云禹垂益伯夷夔龍六人新命有職并四嶽十二牧凡二十二人其意蓋謂稷契臯陶皆申命故不復勑戒之此說不然夫稷契臯陶是申命四嶽十二牧豈非申命者哉而又勑戒之也稷契臯陶是申命此說不通故或者欲以四嶽為一人并九官十二牧為二十二人四嶽之非一人今論之詳矣朱氏謂二十二人四嶽九官十二牧也而但有二十有二人者其間或有兼官故耳此說為通周官有三公六卿有侯伯而顧命乃同召太保奭芮伯彤伯畢公衛侯毛公以人言之則六人而以職言之則不止於六人也蓋有以三公為六卿者有以侯伯入居公卿之位者故雖六人而實兼數職也此四嶽九官十二牧當有二十五人但言二十二人者蓋或有兼居嶽牧之任者或有在州牧之中而又居九官之列者世代遼絶皆不得而知也欽者使四嶽十二牧九官各敬其事也所以必在於敬其事者以其所亮者莫非天工也亮有輔相之義與亮采惠疇之亮同臯陶曰兢兢業業一日二日萬幾無曠庶官天工人其代之蓋所謂設官分職者凡以代天工而至四嶽九官十二牧莫非所以代天工者故以亮天工言之史記作惟是相天事尤為明白既以申勑九官十二牧遂以三載考其功而觀其職之稱否也至於三考黜退其幽升進其明而加賞罰焉若周官大宰嵗終則令百官府各正其治受其㑹聽其致事而詔王廢置三嵗則大計羣吏之治而誅賞之此即唐虞考績之法也然而其制已密不若唐虞之寬也考績之法既行故衆功於是皆興也夫以舜之明德端本於上禹皋陶稷契與其一時賢臣佐治於下而其衆功必待於考績而後興况德不如舜臣不如禹皋陶稷契則考績之法何可廢也而後世此法雖存徒為文具而無實效殊可惜也考績之法既行衆功皆興所未化者三苖而已三苖之國左洞庭右彭蠡蓋負固不服之國也前已竄其君於三危矣然不滅其國不更其嗣至是猶未從風舜未忍加誅也於是而為之分别善惡其惡之顯然者則黜退之其善者則留之唐孔氏云惡去善留使分背也是也蓋自古聖人所以化服強梗者其政常優游而不迫則雖甚強悍者亦將同心向化如周之遷殷頑民式化厥訓亦不過曰旌别淑慝表厥宅里彰善疸惡樹之風聲弗率訓典殊厥井疆俾克畏慕亦此分北三苖之意也而鄭氏以謂此即竄於西裔者復不從化故分北之此說不然禹貢曰三危既宅三苖丕叙則是所竄于三危者當洪水既平之時已丕叙矣蓋彼之所恃以負固而不服者三苖洞庭之險耳既已竄于三危矣果何恃而為亂哉舜生三十徴庸三十在位五十載此只當作一句讀蓋舜居於側微者三十年歷試二年居攝二十八年共為三十堯崩居三年之喪畢而後即帝位五十年而崩大禹謨朕宅帝位三十有三載孟子曰舜薦禹於天十有七年以三十有三載并十有七年是在位五十載也是舜崩之年蓋年百有一十二嵗爾書載舜之年數蓋如此而太史公曰舜生三十堯舉之五十攝行天子之事五十九而堯崩其說特異於經當以經之言為證陟方乃死孔氏云方道也舜即位五十年升道南方巡狩死於蒼梧之野而葬焉檀弓曰舜葬蒼梧之野蓋二妃未之從也於是漢儒遂有舜葬蒼梧之說至今蒼梧之地有舜廟冡存焉世以舜為真葬於蒼梧也孟子曰舜生於諸馮遷於負夏卒於鳴條孟子以謂卒於鳴條漢儒以謂卒蒼梧之野其說已不可知矣况揆之以理有所甚不可者夫堯老而舜攝則不復以庶政自關而舜實行巡狩之事舜既耄期倦于勤而使禹攝矣則巡狩之事禹實行之蒼梧在舜之時其地在要荒之外舜已禪位而使禹攝矣豈復巡狩於要荒之外而死死而葬於蒼梧之野以是禹率天下諸侯以㑹舜之葬於要荒無人之境此理之必不然者司馬溫公詩曰虞舜在倦勤薦禹為天子豈有復南巡迢迢渡湘水此說為得之陟方者猶云升遐也乃死謂升遐而死猶云帝乃殂落也韓退之謂乃死者以釋陟方為言耳夫作書者自釋其義無是理也而蘇東坡乃以謂為書傳章句之言此說亦未是揚子曰黃帝堯舜殂落而死與陟方乃死文勢正同豈亦詩書章句之言哉帝釐下土方設居方别生分類作汨作九共九篇稿飫自汨作至亳姑凡四十有六篇皆逸書也其書既逸則其序之義不可以強通而孔氏曰帝釐下土方設居方者言舜理四方諸侯各設其官居其方於别生分類云生姓也别其族姓分其類使相從於汨作云汨治作興也言治民之功始興於槀飫云稿勞飫賜也此皆是順序文而為之說未必得書之本意正如序詩之南陔孝子相戒以養也白華孝子潔白也華黍時和嵗豐宜黍稷也此亦但順詩名而為之說未必得詩之本意也而孔氏云凡此三篇之序亦既不見其經暗射無以可中而孔氏為傳復順其文為其傳耳是非不可得而知也此說甚善王氏解經善為鑿說凡義理所不通者必曲為鑿說以通之其間如占夢教射者常矣而於逸書未嘗措一辭皆闕而不論此又王氏之所長而為近世法者也二典皆虞書所作其言簡而盡奧而明而後世雖有作者無得而及之矣南豐曽舍人曰昔唐虞有神明之性有微妙之德使由之者不能知知之者不能名以為治天下之本號令之所布法度之所設其言既約其體至備以為治天下之具而為二典者推而明之所記者豈獨其迹哉併與其精微之意而傳之小大精粗無不盡也本末先後無不具也使通其說者如出乎其時求其㫖者如即乎其人方是時豈獨任職者皆天下之選哉其操簡執筆而隨之者亦皆聖人之徒也若曽舍人此言可謂善觀二典矣蓋虞之治非後世之所能及者而其史亦非後世之所能及也尚書全解卷三
