body:
  text: 尚書全解卷二十七宋林之竒撰大誥周書此篇乃管叔及其羣弟倡為無根之言挾殷之餘孽以紊王室周公將與天下共誅之而外之邦君與夫內之御事狥目前之安憚於勞苦不肯為之協謀同心討乎僭叛周公歷陳其所以征之之意蓋奉上天命而繼寧考之功雖欲已之而有不可已者其言丁寧反覆將以曉其未悟之情此大誥之所以作也篇名以大誥者漢孔氏曰陳大道以誥天下遂以名篇孔氏徒見篇首有猷大誥爾多邦之言以猷訓道故以大為陳大道也使猷之一字果如孔氏之訓以為道然經先言猷而後曰大誥爾多邦又安以大為陳大道乎又况猷之一字實非訓道也然則以大誥名篇者蓋以篇中有猷大誥爾多邦之言故攝取此二字以為簡編之别耳其曰誥者猶湯誥所謂誕告盤庚所謂歷告也泰誓之篇有大㑹于孟津之言而其書則誓體也故謂之泰誓此篇取於大誥爾多邦之言故謂之大誥非有他義也薛氏曰以新造之周而三監叛則其事大矣應天順人以征姦慝而寧區夏則其義大矣命之曰大誥其意蓋出於此其失又甚於孔氏矣武王崩三監及淮夷叛周公相成王將黜殷作大誥大誥漢孔氏曰三監管蔡商商蓋指武庚也漢地理志云周滅殷分其畿內為三國詩風邶鄘衛是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監孔氏之說正與此同然案孟子曰周公使管叔監殷管叔以殷叛謂之監殷則以武庚乃商紂之元子恐其痛社稷之隕滅時伺我家國之便以逞其志也故使管叔監之若以武庚預三監之數則武庚果何所監哉故知三監從鄭康成之說謂管蔡霍也蔡仲之命曰惟周公位冢宰正百官羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒以此觀之則康成之說信矣夫武王之封武庚而乃使三叔監之是乃有疑之之心矣疑之而遂封之者蓋武王之不得已也湯之伐桀桀舍其社稷竄于南巢湯於是置之而不問而夏之都邑無復桀之子孫故於湯誥之序曰湯既黜夏命也武王之伐紂也其心亦無以異於湯之於桀非有殺之之意也不幸而紂之前徒倒戈自相屠滅并及於紂此豈其本心哉故不得已而封其子於故都舊地以示天下及武庚既叛而自絶於周於是始有黜殷命之志焉故此篇曰周公相成王將黜殷也以周之所以建三監以監武庚者實出於武王之不得已而亦不敢保武庚之必不叛也武王使三叔監而三叔當王室之大變乃挾殷以叛淮土之夷亦與之同惡相濟以逞其志故周公於是相成王將滅殷之後而伐之也言三監及淮夷叛蓋謂其挾殷以叛也故繼之曰周公相成王將黜殷非殷預三監之數也周家之基業肇興於邠岐集勳於豐鎬化行於江漢之域故西南夷最先服而東夷之服也為最後庸蜀羌髳微盧彭濮人與於牧野之戰及既克商而通道九夷八蠻則西旅底貢厥獒是服於周者皆西夷與南夷彼東方之夷既周家聲教之所未及則其助於武庚之亂者蓋其勢然也方東夷之狼子野心未能慕義以奉周家之命而適有武庚之變焉安得不相挻以為肱髀之勢淮夷漢孔氏曰徐奄之屬然案閟宫之詩曰保有鳬繹遂荒徐宅至于海邦淮夷蠻貊春秋昭四年書楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申既有徐又有淮夷則淮夷與徐當各為種落不可以合而為一也逸書之序於成王政將蒲姑但言踐奄而周官之序乃言滅淮夷則奄似是淮夷之一種此言淮夷叛而多士則曰昔朕來自奄則淮夷之為奄可見矣王若曰猷大誥爾多邦越爾御事弗弔天降割于我家不少延洪惟我幼冲人嗣無疆大歷服弗造哲迪民康矧曰其有能格知天命已豫惟小子若涉淵水豫惟往求朕攸濟敷賁敷前人受命兹不忘大功當管蔡挾武庚以叛也周公攝政天下之事皆决於公則夫合邦君御事於朝而告之以黜殷之意者周公之任也然政雖總於周公而成王在上為天子號令雖由已出而必稱王命以告之此經所以稱王若曰而序則言周公相成王以相發明也鄭康成曰王周公也周公居攝命大事則權稱王此言實害教之大者唐孔氏既已辨之矣此篇曰王若曰猷大誥爾多邦微子之命曰王若曰猷殷王元子多士曰猷誥爾多士多方曰王若曰猷誥爾四國多方孔氏皆以猷訓道於此篇及多士多方則皆曰以道告之於微子之命則曰順道本而稱之此篇及多方先言猷而後言誥其曰以道誥之猶可為說至微子之命上言猷而下言殷王元子而以為順道本而稱之尤為無義鄭康成王子雍則皆移猷於告字之下王莽之作大誥改猷字為道亦在誥字之下其言大誥道諸侯王顔師古注曰言以大道告諸侯以下其說大抵牽强而費力某竊意所謂猷者皆發語之辭也堯典曰咨汝羲暨和舜典曰咨十有二牧甘誓曰嗟六事之人𦙍征曰嗟豫有衆曰咨曰嗟皆發語之辭蓋咨之為字至夏時變而為嗟此類是也猷字正與咨嗟同竊意至於周時其發語之辭且復變而為猷矣案爾雅猷之詁訓最為不一或曰言也或曰已也或曰可也或曰圖也豈但訓道而已哉此所以知其或為發語之辭也然既久逺雖意其為發語之辭然亦不敢指言其何訓也越及也御事治事之臣也將大誥多邦之君及御事之臣以黜殷之意故發語而告之也弗弔者當作相弔之弔讀言為天之所恤此篇曰弗弔天降割于我家不少延多士曰弗弔昊天大降喪于殷君奭曰弗弔天降喪于殷孔氏皆以弔訓至節南山之詩曰弗弔昊天亂靡有定鄭說亦然案春秋左傳成七年吳伐郯季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫引詩弗弔昊天以為證則弔之訓恤其亦尚矣又如魯弔宋災曰若之何不弔臧孫紇出奔邾曰敢告不弔王子朝告于諸侯曰天不弔周皆言其不為天所弔恤先儒之訓失其義矣周公之誥多方以謂我不為天之弔恤者以天降凶害于周家蓋武王遽喪而不少延其命也案史記武王有疾不豫羣臣懼太公召公繆卜周公於是乃自以為質欲代武王明日武王有瘳其後王崩徐廣據封禪書以謂武王克商二年天下未寧而崩此所以曰不少延也班孟堅據文王世子之言謂文王十五而生武王受命九年而崩後四年乃武王克殷之嵗年八十六後七年而崩其年數雖同然以理推則有未安者周公禱于三王雖武王翼日有瘳矣然意以是嵗崩也故此曰弗弔天降割于我家不少延使其克商七年而崩則亦可謂少延而天下既定於周矣武庚豈復有反鄙我周邦之望哉先儒以不少為絶句以延字屬於下句其曰不少者謂三監及淮夷並作難也據此篇之意先言周家新造而武王遽喪成王以幼冲之資纘承先業恐其弗克負荷栗栗危懼期以保前人之基緒而已而三叔武庚乃為此舉以覬所非望故自越兹蠢而下然後言三監及淮夷之作難所謂不少延者但言武王之即世也王氏蘇氏皆以延字屬上句讀蓋得之矣無疆大歷服正猶舜禹所謂在躬之厯數也言我周家膺天命而享其厯數綿綿延延無有窮已也武王既喪矣故大懼成王以幼冲之資而繼周家之厯數以配天作君其智識未逹尚不能造於知人之哲分别邪正遴簡賢能以迪民而使之安其居况其能至於知天命者乎孔子曰吾十有五而志于學三十而立四十而不惑五十而知天命自不惑而積之然後至於知天命弗迪哲則非不惑矣其於知天命之不能至蓋可知也既不能至於知天命則天之聰明明畏必不知所以順而憲之者其於履至尊之位繼無疆大厯之事不亦難乎故我小子之志兢兢業業惕然危懼惟恐其弗克負荷若涉深淵之中惟往求我之所以濟難之道也敷賁敷前人受命兹不忘大功此則言其所以往求朕攸濟以纘承文武之丕烈守之而不敢忘也然敷賁敷前人受命其說不明白如孔氏以賁為大則讀為扶云反與宏兹賁之賁同敷賁者言布行大道敷前人受命者布陳文武受命也然經但言敷賁又以為陳大道其說迂曲蘇氏林子晦則皆以賁為飾讀為被義反蘇氏謂我之所敷者以飾敷前人受命而不忘其功也林子晦謂敷賁者修明典章以敷施賁飾於天下也其與孔氏雖音訓不同而其義之不明白則一也惟王氏疑其有脫誤而不可知者宜闕之此為得體薛博士增廣王氏之說尤為詳備曰敷賁敷前人受命兹不忘大功殷小腆誕敢紀其叙天降威若兄考乃有友伐厥子民養其勸弗救越天棐忱爾時罔敢易法矧今天降戾于周邦凡此皆書義疑有脫誤不可知者學者闕焉王氏解經每不合於義者不旁引曲取以為之說至闕之此王氏之所長也鴟梟之詩周公所以貽于成王之言也大誥之書其所謂誥于多邦御事之言也金縢之冊則其所以禱于三王之言也此三者雖不同而其意則未嘗或異蓋皆以閔武王之既喪懼周室之將亡而奮不顧身以當社稷宗廟之憂責也鴟梟大誥之言成王非不之見也然而未之行者蓋其心惑於流言而未諒夫周公之心果如是也及其啓金縢之冊見其所以禱於冥冥之中與其所以宣言於昭昭之際者曽無少異然後信其果如鴟梟大誥之言而其心之忠於王室無復可疑者向微金縢之冊則成王之疑無自而釋矣而周公之心亦終無以見於天下後世矣豫不敢閉于天降威用寧王遺我大寶龜紹天明即命曰有大艱于西土西土人亦不靜越兹蠢殷小腆誕敢紀其叙天降威知我國有疵民不康曰豫復反鄙我周邦今蠢今翼日民獻有十夫豫翼以于敉寧武圖功我有大事休朕卜并吉肆豫告我友邦君越尹氏庶士御事曰豫得吉卜豫惟以爾庶邦于伐殷逋播臣爾庶邦君越庶士御事罔不反曰艱大民不靜亦惟在王宫邦君室越豫小子考翼不可征王害不違卜肆豫冲人永思艱曰嗚呼允蠢鰥寡哀哉豫造天役遺大投艱于朕身越豫冲人不卬自恤義爾邦君越爾多士尹氏御事綏豫曰無毖于恤不可不成乃寧考圖功已豫惟小子不敢替上帝命天休于寧王興我小邦周寧王惟卜用克綏受兹命今天其相民矧亦惟卜用嗚呼天明畏弼我丕丕基前既云天以大命佑我周家雖使武王自百里而興伐暴戡亂拯斯民於塗炭之中以奄有九有之衆然而不使之享國家長久使得以創業垂統措天下於泰山之安為萬世無窮之基而遽喪於克商之後以新造未集之國而幼冲之主實當是責故惴惴然唯恐患難之來乘間投隙肆其不軌以墮我祖宗傳受之大業矣於是遂言武庚之叛其征與不征實我國家社稷安危之所繫故上稽天心下順人意知其不可以不征也豫不敢閉于降威者言武王之喪是天下其威於我國家而我不敢閉拒之也傳曰君天也天可逃乎不敢閉者以其天命之不可逃也亦順受之而已矣此云天降威即上文所謂天降割也惟天威之不可拒當此之時欲審其吉凶以為避就之謀者亦不過質諸鬼神而已於是用我考寧王所遺我之大寶龜灼而卜之以觀吉凶之所在繼天之明而即其命也紹天明言龜可以繼天之明也蓋天之吉凶示人甚明然其道𤣥逺無紹介以傳其意惟卜之以龜則天之明曉然可見矣此所以即命也寧王即武王也序言武王崩三監及淮夷叛則此篇所稱考寧王寧考寧人皆是武王也先儒以寧王為文王殊失經意然以寧考為文王則亦不可此篇之辭雖出於周公而其辭則指成王為主曰豫冲人曰豫小子是也成王不可謂文王為考先儒已知其說之不通故於寧考則曰寧祖聖考以寧為寧祖以考為聖考是以寧字為一人考字為一人非立言之體也以寧云者謂武王去殘賊以安天下之民也曰寧王曰寧考曰寧人正如盤庚曰先后曰髙后曰先神后但變其文耳非有異義也寧王遺我大寶龜者蓋古者將欲决嫌疑定猶豫以通幽明之情使其應如響無有毫釐抄忽之差者而必有藉於靈龜故其得之也則珍而藏之以為國之寶俟有事而用之世世以是傳而不失也楚語曰龜足以憲臧否則寶之公羊傳曰寶者何龜青純何休注曰千載之龜青髯明于吉凶謂之寶世世保用之辭左傳吳王之弟蹶由曰國之守龜其何事不卜謂之守龜蓋世之所守以為寶故也者衛之昭兆臧氏之僂句皆所謂寶龜也故成王將卜龜以紹天之明而即命而其所用者乃武王所以遺之者也曰有大艱于西土西土人亦不靜此則龜所告之辭也周官太卜掌三兆之法其經兆之體皆百有二十其頌皆千有二百頌即春秋所謂繇也唐孔氏春秋正義曰兆頌舊有此辭非卜人始為之也則知頌者蓋古者卜筮之書既灼龜而得此兆體矣又以此兆體而玩其辭也晉獻公之卜而其辭曰專之渝攘公之羭莊公之卜而其辭曰如魚窺尾衡流而方羊裔焉此皆兆頌舊有此辭因卜而適得之耳然不知其辭出於何代也至於漢時亦有此書如漢文帝之占曰大橫庚庚余為天王夏后以光是也成王以武王既喪之故灼龜啓書以占周家之休咎而其繇辭曰有大艱于西土西土人亦不靜言將有大艱之事及於西土西土之人亦為之擾而不安也方是時三叔之流言未作武庚之叛未興而龜兆之言已云爾也中庸曰國家將與必有禎祥將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神是時周家將有不率厥典之人唇齒相依以危王室其為禍也大矣此所以見于卜龜而其辭云爾也故於今三監淮夷果蠢蠢然而動則龜之所告信其驗也自殷小腆而下則方言其越兹蠢之事以明龜之有知也殷小腆誕敢紀其敘者漢孔氏曰殷後小國腆腆然之祿父大敢紀其王業之敘而欲興復之蘇氏以腆為厚言殷小富厚乃敢紀其既亡之敘案左氏曰不腆弊邑則腆之字固當訓厚孔氏以為腆腆然固不如蘇氏以為殷小富厚然其說亦不明白蓋經既云殷小腆誕敢紀其叙必欲從而為之說則其言當如是云爾要之此兩句乃是成王既言卜辭然後以事應繼之其所言者必殷人背叛之事然其語則聱牙難通必欲字字而為之說則非多聞闕疑之義故當以意逆志而闕其辭之不可知者天降威知我國有疵民不康曰豫復反鄙我周邦言天降威于我國家武王既棄天下而繼有三叔流言之疵民將不安武庚知之故其言曰我將紹我湯之業而光復之殷既復則反以我周家為鄙矣武庚以叛亡之餘而有反鄙我周邦之言則其志不小矣縱之一日則有一日之患此所以不可不征也然其征之也必上得天心下得人心而後可以勝故成王於是又陳其得天人之應而有勝之之理也今蠢今翼日言當此武庚蠢動之明日民之賢者有十夫來助豫往征以撫安寧考武王所圖之功也民獻與益稷所謂黎獻同將興師動衆以討不逞之武庚而十夫以賢能之才為我左右之助則我所有之大事固為休矣及其灼龜以卜師之勝負則三龜又皆并吉民獻有十夫豫翼則得人心矣朕卜并吉則得天心矣天人俱應則我周家有必勝之理而武庚有必亡之勢如之何而不征也漢孔氏於豫不敢閉于天降威用則言我不敢閉絶天所下威用而不行將欲伐四國其於寧王遺我大寶龜紹天明即命則言武王遺我大寶龜疑則卜之以繼天明就命而行之言卜不可違夫孔氏以用字屬上句讀固為非矣而以其遺大寶龜為卜伐四國則是其意謂此所言朕卜并吉者即上文用大寶龜而卜也蓋孔氏既以天降割與天降威為四國之叛則安得不以遺大寶龜為征伐之事乎蘇氏雖以天降割為武王之喪至於天降威則亦以為三監叛也但於其有大艱于西土西土人亦不靜則以為龜所告之辭此則與孔氏異耳果如蘇氏之意則天降威為三監之叛所謂用大寶龜與夫朕卜并吉者其止一事而重言之乎抑其當時之再卜乎若此二者只一事而再言之則其卜兆之辭但曰有大艱于西土西土人亦不靜成王何從而知其吉乎若其始卜之其兆體之辭如此而其再卜則吉無乃瀆乎春秋左傳曰晉趙鞅率師伐齊大夫請卜之趙孟曰吾卜於此起兵事不再令卜不襲吉信也瀆龜之卜趙鞅尚不肯為而謂周公為之乎此其為說蓋由於以天降威為三監之叛故其抵牾必至於此殊不知用大寶龜者當武王之既喪而卜也朕卜并吉者卜伐武庚也成王當嬛嬛在疚之時而占國之災祥乃得此兆既而武庚作亂則不靜之言驗矣乃將征之而又以其勝負卜之於龜則得吉兆也如此則其義上下相屬方為明白周之興師也庶邦御事皆有難色獨此十夫者為之輔翼而遂以為我有大事休者蓋十夫為之助則得民之心矣晉楚之兵遇於桑隧趙同趙括欲戰知莊子范文子韓獻子皆不欲於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子之佐十一人其不欲者三人而已欲戰者可謂衆矣武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎周公既得十夫之助則雖邦君御事皆以為未可而民之心自可見矣此正欒武子之意也漢周亞夫伐楚得劇孟若一敵國夫劇孟者特一游俠之雄耳亞夫得之尚賴之為重况此十人謂之民獻則其得之而以卜人之心豈不可哉此十夫者周公得之而其喜如此則其人必非瑣瑣者惜其名氏不見於後世揚雄曰昔者齊魯有大臣史失其名其於十夫亦云惟其十夫豫翼以得人之助朕卜并吉以得天之助故今我告爾邦君諸侯之相親友者與尹氏之官以至衆士御事之臣曰我既卜之於龜而得吉矣我當與爾衆邦仗義興兵以伐殷之逋亡播蕩之臣武庚也尹氏與牧誓之師氏同洪範所謂師尹惟日是也爾庶邦君至於御事之臣今乃無不以言復曰今將帥以伐殷其勢難而其事大不可以輕動也西土之人所以不靜者雖武庚之叛天下為之騷動不寧而其源則在於王之宫邦君之室則不可以不自反也故我小子當成其敬以修己而已未可征也王何不違卜而必欲從之乎害與害浣害否之害同王莽曰豫害敢不於祖宗安人圖功而終顔師古曰害讀曰曷正此類也漢孔氏曰王室有害固宜從卜王氏曰王其咎之害在於不違卜也皆誤矣爾庶邦御事之言既如此故我冲人長以此艱難而思乃發嘆曰四國之叛而我征之信蠢動天下使其無妻之鰥無夫之寡不得安居而樂業是誠可哀也我非忍於此也蓋以我繼世以有天下為天之所役使而天之所遺我者大所投我者艱謂其眇然以幼冲之資而負祖宗之託以嬛嬛在疚之初而當變故之興我當赫然發憤討平僭叛以繫固周家之業非我之自恤也爾庶邦君而下當以義而安我曰無拘於所憂之可畏縮而不之决也惟當張皇六師往而滅殷以成武王所圖之功蓋武王既克商而有天下矣今乃使之遺孽絶而復續豈不喪武王所圖之功乎爾之所以安我之義當如此今乃欲舍武庚而不治豈義也哉蓋邦君御事既以亦惟在王宫邦君室咎成王又以考翼而勉成王故成王自責以為我以一身而負艱難之責則其毒民以興師者豈為一己之故哉我之興師既非狥一己之私憂凡欲聿追來孝以光大前人也則爾羣臣其可以狥私意臆之見而不念天下之大謀與我合謀同心共底安平乎故成王以此而責之也夫以周家新造而管蔡以叔父之尊挾殷之餘孽以間王室此固天下之所共怒者也爾邦君者列周之爵分周之土以為周之藩而尹士庶士御事又皆食周之祿任周之職以效其才能則武庚之亂宜其協一心以與天下共誅之也今乃倡為不可征之言者蓋其志苟目前之安而不慮身後之患謂武庚之叛有以服其心則自可不動干戈而平之矣何必老師費財交鋒接刃而後為得計哉昔湯伐夏以救民亳之民以為夏罪其如台故咎湯以為不恤我衆舍我穡事而割正夏夫湯之兵為應天順人而舉也今亳人徒以桀滅德作威以敷虐于萬方而亳邑未被其禍故憚於行役戰鬬之事而出此言也庶邦御事之不肯致討于武庚其意亦若是而已矣殊不知自古有天下之禍常起於一隅而其蔓延之久則遍於天下祭仲曰無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎今管蔡以叔父之親武庚以殷家之裔又與淮夷同惡相濟使其一旦滋蔓羣方響應雖竭天下之力亦未如之何也已矣漢景帝之時吳楚七國作亂於山東其聲焰甚熾惟漢遣周亞夫將三十六將軍之兵倍道而進故一鼓而滅之不然不獨關東非漢有也自關以西亦將有纍卵之危矣晉武帝既死惠帝以昏童而即祚當是時八王以肺腑之親更相屠滅戎羯乘之中夏鼎沸歷數百年而後定管蔡武庚之亂而又挾淮夷以為重此其為變蓋不减於八王與五胡也使成王信邦君御事之言置而不問惟欲考翼以服之未必無晉之禍故豫謂當武王之喪而卜之以龜也其繇辭已曰有大艱于西土西土人亦不靜管蔡喪亂於東土則西土之人宜無所預也而龜辭以為西土之人亦為之不靜者蓋天下之勢然也晉八王五胡之事蓋可見矣西土人亦不靜則寧考之圖功將敗壞而不立矣雖成王所以處已者固未嘗不敬然管蔡商奄之頑愚非文教之所能遽服故欲成寧考之圖功則不可以不征也成王既謂欲成寧考之圖功則管蔡商奄在所必征不可以邦君御事之所不欲而遂置之也况天之吉卜又不可以有違苟違卜而不征則吉將轉而為凶雖欲考翼以終寧王之功豈可得哉故我之所以不違者是乃所以成寧考之圖功也如之何而謂我不違卜為非哉故我小子不敢廢上帝之命而違卜其所以不敢廢上帝命者則以上帝專美文王之德使之自百里邦而興遂有天下亦惟卜之用而不敢替也故能受天命以傳於我小子視武王誓師之言曰朕夢協朕卜襲于休祥戎商必克則是武王之所以克商者惟以不違卜故也使其違卜則獲罪於天而無所禱矣故曰豫不順天厥罪惟鈞以武王之聖德尚不敢廢上帝之命而况小子乎武王之克商既獲仁人又加之夢卜之協其天人之應不期而同所以遂克商而有天下今十夫豫翼則是天助我民矣况又卜之吉哉天人之應亦如武王之世則我之征武庚不獨成寧考之功亦所以述寧考之事也洪範之稽疑汝則從龜從筮從卿士從庶民從是之謂大同至於謀及卿士庶民之或從或違而龜筮並從則亦不失其為吉蓋以定天下之業斷天下之疑惟卜筮之信故也成王之伐武庚雖邦君庶士御事有異言然周公之心既以不疑而卜筮又吉是亦洪範之所謂吉也况又十夫之豫翼以十夫為主則卿士大夫蓋不盡逆也何為而不可征哉此所以亦惟卜之用也嗚呼天明畏弼我丕丕基此又嗟嘆而申言之也言天道無私甚明而可畏今以吉卜而畀我則欲我討平僭叛以光大周室是天之意其於國家之積纍基業欲弼而成之也天既弼我之基業而我乃不從卜以征是我自棄其基業矣則天之明畏必將移其禍以延于我邦矣如此則非天之棄周乃周之自棄也然則如之何而不可征哉邦君庶士御事之人其不知天命如此周公之所以諄諄反覆而告之也王曰爾惟舊人爾丕克逺省爾知寧王若勤哉天閟毖我成功所豫不敢不極卒寧王圖事肆豫大化誘我友邦君天棐忱辭其考我民豫曷其不于前寧人圖功攸終天亦惟用勤毖我民若有疾豫曷敢不于前寧人攸受休畢王曰若昔朕其逝朕言艱日思若考作室既底法厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫厥考翼其肯曰豫有後弗棄基肆豫曷敢不越卬敉寧王大命若兄考乃有友伐厥子民養其勸弗救王曰嗚呼肆哉爾庶邦君越爾御事爽邦由哲亦惟十人迪知上帝命當周之初基其所以固結民心而維持社稷者未久也武王遽棄羣臣而傳於童孺之成王焉大位姦之窺也幼主邪之伺也則當時已有岌岌之勢矣而况管蔡以兄弟之親而肆其無根之言武庚以殷商之孽而懷其克復之志淮夷以介鱗之種而逞其吞噬之心三惡相濟興兵而西民心一搖則周之社稷其存亡蓋未可知也如是則豈武王之所望於後人以建立綱紀而鞏固基業之本志哉龜繇之辭謂西土之大而亦將不靜其言非不驗也而邦君御事乃懷其臆見謂西土之所以不靜者惟在夫王宫邦君室有以致之耳苟自反而考翼則所謂大艱者不足慮也何事興干戈然後能勝之哉殊不知武庚挾管蔡淮夷以叛其志不細也如縱之而不誅則猶養疽囊焉不知將潰而發也御事邦君既不肯從周公以征而狥其私見以苟一時之安使周公驅之以勢脅之以威夫誰敢有異議哉然而周公之心則不忍劫其不服之心而彊使之以事其所以告喻之者反覆宛轉欲以曉其未悟之情使其釋然而醒然後與之東討不義故自弼我丕丕基以上所以陳述其東征之事蓋將從吉卜以服上天之命而繼武王之成績非我之好大喜功而為是舉也其言詳而明嚴而盡固無餘藴矣然周公之心猶以為未也又從而告喻之凡言王曰者皆語之更端也蓋所以曉譬未悟者不得不然此古人忠厚之心也爾惟舊人者言爾邦君御事皆舊有位之人事武王者也周家之業自后稷公劉以來至於太王王季文王積德纍功以肇造區夏武王繼之又能兢兢業業夙夜匪懈以致其勤然後克商而有天下爾既先世之舊人當大能逺省前事豈不知寧王若是之勤哉而今也有武庚之變苟舍而不治則寧王之勤勞以遺後人者將無所繼而卜世三十卜年八百之歷於我而殄絶矣蓋武庚之叛是天之閉塞以使我毖愼蓋欲其操心危而慮患深養其德慧術智於疢疾之中此正我戡定禍亂以成功之所也我其敢不極盡而使無遺力以終寧王所圖之事乎盡力以終其所圖之事則寧王之勤勞以遺我後人者乃為有所待也爾既知天胡不為我而扇為此異論哉故我今諄諄然反覆論難使汝之心信然以為如此故曰肆豫大化誘我友邦君也孟子曰有如時雨化之者顔子曰夫子循循然善誘人化誘者有優游不迫之意盤庚曰盤庚斆于民此篇云肆豫大化誘我友邦君曰斆曰化誘皆先王忠厚之道也天棐忱辭言空言無實者不足以感天之所以輔我惟以我有至誠之辭非矯僞飾以誣天也然天不言胡為而知天之輔我哉惟考之於民而已十夫以民獻而來助於是則民助之矣民助之則天助之也蓋可見矣天既輔我豫何敢不討平僭叛以安周室使前寧人所圖之功於是而有所終乎武庚之亂非天棄周而復商也蓋以此而勤勞毖愼我民使其憂畏之心未嘗暫替若人有疾則其謹起居節飲食嘗藥石以去斯疾者其心當如何也則我何敢不奉順天意以從吉卜使于前寧人所受之美命於此而有終乎卒寧王圖事于前寧人圖功攸終者蓋欲紹隆基業以繼前人之成績也于前寧人攸受休畢者蓋欲永膺歷數以繼武王之美命也唐孔氏曰三者文辭略同義不甚異大意推言當終文王之業須征逆亂之賊丁寧以勸民耳此說是也但不當以寧王為文王耳或者於此之類皆必從而為之說錙銖而較之皆鑿說也王曰若昔朕其逝孔氏曰順古道我其往東征矣王氏亦曰順古之道以朕其往而征之也然上文但言前人之烈待我而後成不可不順天命以征之初無有順古道之事則與上文不接蘇氏曰如我本意則昔者已往矣所以至今者以言艱而日思也此說是也蓋當武庚之亂周公遂欲舉天下之兵以征之其所以遲遲而未行則以邦君御事之言謂其艱大而不可輕動我以此言隱之於心而日日在念也雖以艱大之言而日思之然上考天心下稽人事則其勢蓋所必征不可以其艱大而不以身當其責也故以作室耕事而喻焉人之作室其父已審其向背定其髙下而致法矣其子乃不肯為之堂基况肯締構一屋乎人之耕田其父既已反土而菑其子乃不肯為之播種况肯俟成熟而穫之乎夫作室耕田非是父既底法而其堂架必委之於子父既菑田而其播種必委之於子蓋設為此論故也武王初基而遽即世猶父之底法菑而未能成效也今武庚之亂我尚不能討而滅之以安社稷於幾危其敢望周家之世世享祚而不絶乎厥考翼其肯曰豫有後弗棄基蓋父之底法菑田是欽其事也父欽其事而子無以繼之則其父豈肯曰我之有後弗棄基業乎必自以為不幸而無後也武王克商而成王不能殄滅商之遺孽則武王在天之靈當以為如何哉故我今不敢不於我之身持循寧王之大命而平定凶逆以定國家之基業也王氏曰於我者不敢以諉後人也武庚之叛在成王即位之初周公攝政之日則夫平定凶逆以奠國家之基業者正成王周公之責也使其不以此自任則豈足以為武王之子乎爾邦君御事之不肯從我以征無乃為不足以堪前人所付託之重乎故成王以此而自勉也若兄考乃有友伐厥子民養其勸弗救漢孔氏曰若兄弟父子之家乃有朋友來伐其子民養其勸弗救者以子惡故以此四國將誅而無救者罪大故也蘇氏之說與此亦不甚相逺夫古人之取譬雖假設言亦必近於人情父之底法而子不肯堂父之菑田而子弗肯播蓋子之弗祗厥父事而弗負荷則其至於此者蓋有之矣未有父子兄弟之家至於朋友伐其子而不之救者夫兄弟䦧于牆外禦其侮同室之人鬭被髮纓冠而往救可也蓋其情之所在有不期然而然者豈以不救為是乎孔氏之說為不近人情矣而諸家之說大抵迂曲惟王氏闕之為得於是又嗟嘆而言曰肆哉漢孔氏以歎今伐四國必克之故以告諸侯及臣下治事者孔氏之意以肆訓今故為此言爾雅曰肆今也則肆之訓今固有此理然經但言肆傳遂以為今可也又以為今伐四國必克之豈肆之一字而道理如此其多其說蔓衍不足取也王氏以肆為涉危難而無所毖蘇氏以肆為過亦皆迂曲不如顔師古之說王莽之作大誥亦曰嗚呼肆哉而師古曰肆勸也勸令陳力蓋當武庚之叛邦君御事與國同其休戚者固宜投𬒮而起赴功趨事以致其協贊之力今既有異議而不肯從我以征則其心必遷延齟齬而不陳力矣故嗟嘆而欲其陳力以戡難也其所以告諭邦君御事之衆而勸之陳力者則以爽邦由哲故也爽與用爽厥師同蓋當夫朝廷有大議論國有大利害彼以為是此以為非彼以為否此以為可互相矛盾紛紜交錯而不决焉非有大過人之智足以决斷定大計則安能使邦之爽明而無疑謀哉此爽邦所以由哲人也武庚之亂神人之所共怒周公相成王固有必征之意而邦君御事乃以為不可周公成王亦以此之故為之遲回而不决既此十人惠然而來而皆以為可征則我得其左右之助而國論自此定矣則夫十人者蓋哲人也十人之所以為哲人者以其能迪知上帝之命故也故天之眷顧於我周家其情蓋未艾也既使之克商而有天下矣雖然遺孽乘間而起而天之心未庸釋也彼天之於人君其去就從違之間不容毫釐之差順之則吉逆之則凶吉凶相承殆反覆手耳自非迪知天命者不能奉而順之也天之於周既示吉卜矣而邦君御事乃懷其臆見循其私欲以為不可征欲王違卜而不用是不能知上帝之命也惟此十人知天命之固如此遂奮不顧身以來助其謀則成王之心自此判矣安得而不爽哉既爽邦由哲則爾邦君御事不可以不陳力也越天棐忱爾時罔敢易法矧今天降戾于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易豫永念曰天惟喪殷若穡夫豫曷敢不終朕畝天亦惟休于前寧人豫曷其極卜敢弗于從漢孔氏曰於天輔誠汝天下是知無敢易天法况今天下罪于周使四國叛乎蓋始既言越棐忱爾時周敢易法矧今天降戾于周邦則孔氏從而訓釋之不得不如此云云也其意謂天所輔者惟至誠不欺之人故天下無敢變易法度以自絶于天今四國之叛是易法也然王氏以此為不可知而闕之蓋亦謹疑之義也大艱人謂三監也三監以兄弟手足之親挾武庚之叛間釁王室以是大近相伐於其室家之中室家之人至於有相吞滅之志而不利於國家則於大義不可以不征也蓋三叔雖周公之兄弟然既挾武庚以叛則是周公之讎矣正猶石厚助州吁不軌之謀則石碏當舉大義以滅之而爾邦君御事反以為不可征是爾不知天命之不易也天之命無常可謂難矣今有吉卜而不用則安知其不為凶乎此其不易也爾不知天命之不易則邦無自而爽安可不從我以征哉唐孔氏曰管蔡導武庚為亂此篇略於管蔡者猶難以伐弟為言故專說武庚罪耳此說雖是而未之盡也蓋三叔之於武庚讎也其於周公兄弟也今乃舍其兄弟而挾武庚以叛其惡播於天下矣邦君御事必知其為可誅不以兄弟而疑之也其所以為不可征者第以禍發於東土而西土無預焉故貪目前之安不肯從事於干戈欲成王考翼而彼自服也殊不知縱之而不誅則其禍必浸淫於西土其何以繼前人之業而舉上天之命乎故其兆之辭以為西土亦將不靜周公既舉此以告之矣又謂其誕鄰胥伐于厥室其可以貪日前之安而不討之哉故其所誥之辭略於管蔡也豫永念曰豫曷敢不終朕畝言管蔡之所以叛則以殷之遺孽猶有存者必以此藉口也故我之長念則謂天以紂之暴虐而改命我周其於殷人也若穡夫治田去其稂莠必芟夷藴崇之絶其本根勿使能植而後已今也有遺種焉則我何敢不如田畝之終而畢其事乎蓋武庚之叛不去則為不終朕畝矣武王之伐紂也其誓師曰除惡務本正如此終朕畝之謂也蓋紂不克則其本不除武庚不除則其本不終然武王既以務本為言周公既以終畝為言則其於殷蓋疾之甚矣至其滅紂則封武庚誅武庚則封微子者蓋武王之所欲誅者紂而已武庚何罪焉成王之所欲誅者武庚而已微子何罪焉蓋惡之止於其身者聖人之忠厚也與夫惡相而惡木邉之姓惡解而惡水中之蟹其遷怒也有間矣天以吉卜錫我周家使我周家仗大義以滅殷者亦惟休美于前寧人使長享天下也我今何以極卒寧王之圖功哉惟從吉卜則可矣故卜不敢不從也而邦君御事乃以不違卜為非何哉率寧人有指疆土矧今卜并吉肆朕誕以爾東征天命不僭卜陳惟若兹言天下之疆理莫非王者之土皆前人之指意者我但率循謹守之而已矣今三監之叛使欺王略固不可不征以奠其疆界况於卜龜而并吉則其勝之也必矣故今我大以爾邦君御事東向征之夫命之於天無有差忒卜之所陳既已若是可以無疑矣王氏曰武庚所擇以為商臣三叔周所任以商事者也其材似非庸人方主幼國疑之時相率而為亂非周公往征則國家安危存亡殆未可知然承文武之後賢人衆多而迪知上帝以决此議者十夫而已况後世之末流欲大有為者乃欲取同於汙俗之衆人乎王氏此言假之以為新法之地也故每於盤庚遷都周公東征以傅㑹其說而私言之以寓其意焉殊不知已之所為與盤庚周公之事相近而實不侔也盤庚之遷都將以奉上天之命而復先王之業也不遷則有墊溺之患周公之東征亦將以奉上天之命而終前人之功也不征則有割據之禍而當時邦伯師長邦君御事玩一時之安而不慮他日之憂故扇為異論以搖其上盤庚周公於此惟不忍以利驅而勢迫之故丁寧反覆至於再三必使之心悅誠服而後已非是誥之而不從則遂脅之以刑威而有所不恤也蓋必使其心皆信其所為而後與之共事使其誥之而不從而遂有所不恤則其與不誥也何以異哉故盤庚之遷周公之征雖其始也有異同之論而其既已誥之矣則莫不改心易慮惟上之是聽不獨民獻十夫以為可征也如王氏之說則是周公之東征决其議者十夫而已其餘無預也蘇氏曰盤庚大誥皆違衆自用者所以藉口蓋為王氏而發也微子之命周書成王既黜殷命殺武庚命微子啓代殷後作微子之命微子之命微子之篇曰詔王子出迪孔子曰微子去之則微子當紂之時蓋處可疑之地不可以諫而去商矣雖其去商然亦遁于荒野而已未適他國也及武王既克紂痛社稷之無主於是始抱祭器以歸周左氏傳曰許僖公見楚子面縳銜璧大夫衰絰士輿櫬楚子問諸逄伯對曰昔武王克商微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所史記宋世家亦曰武王克商微子啓乃持祭器造於軍門肉袒面縛左牽羊右把茅膝行而前以告武王乃釋微子復其位此二說皆謂微子雖去商而其歸周也乃在於武王克商之後但史記既謂其面縛而又稱其牽羊把茅此其為異同耳唐孔氏所以闢其失也微子既歸于周但以殷之封爵居其舊位而已左傳所謂復其所史記所謂復其位是也蘇氏曰武王將立殷後必以箕子為首微子次之而卒立武庚者必二子辭焉某竊以謂不然夫武庚之不肖固不如箕子微子使武王之命殷後擇其賢而立之則必以箕子微子先於武庚矣然其所以立武庚以為商之後者非二子之讓而後立之也以其勢不可以不立武庚也湯之放桀必建立夏之子孫以奉其祭祀然後更擇土地以封之而已桀之故都則不使其子孫因而都也故其自夏而歸之亳則已謂之黜夏命矣武王之伐紂其志亦欲如湯之放桀苟其自竄放遐荒之地而不復居庶人之上以罹其凶害則應天順人之義畢矣不幸殷人倒戈之師自相屠滅并及於紂武王之本志無以自明也於是使其子武庚因殷之故都奉其祭祀以致其不忍之心惟其因故都以立商後而致其不忍之心則當是時也武庚以紂之嫡子幸脫於倒戈之後舍武庚而不立尚誰立哉某竊謂武王之立商後蓋屬意於武庚矣非二子辭而不受然後及之也然則武王之立武庚蓋出於不得已也夫滅其父而立其子又使因其好草竊姦宄之徒而君之則其乘間而肆亂也必矣故命三叔以懿親而監之苟三叔不挾之以叛則武庚雖動得乎既不可動則必將享其富貴以終其身傳之子孫而未艾也如此則何由而黜其命乎故洪範之序但言勝殷而不曰黜殷命如湯誥之所言也惟武庚忘我國家之大造而與三叔同惡竊發周公既已東征而誅之矣則朝歌不復可以立商家之子孫雖不可不擇其賢子孫以為湯王之後然遂不封之於商丘矣則殷命自此而黜焉此序所以先言成王既黜殷命而殺武庚然後繼之曰命微子啓代殷後也啓微子之名也武王之擇殷後也微子以帝乙之長子紂之庶兄而又有賢德故以宋封之蓋武王之立商後則因其故都至成王之封微子則始國於宋樂記曰武王克殷既下車立殷之後於宋此說為誤矣唐孔氏曰微子初封於宋不知何爵此時因舊宋命之為公令為湯後此蓋順樂記之言而文致之耳未必有所據也其封微子也則為書以命之蓋陳其所以封之之意而勉以所當為之事後世之命官則必以制書蓋出於此然如說命畢命則不加之字而此則加之字者蓋說命畢命二字足以成文而此言微子命則非文辭之體故必加之字也微子者殷圻內之爵也既已封之宋則當曰宋公今不曰宋公之命而以微子之命名篇猶稱殷爵者箕子微子雖已歸於周而以商爵稱者蓋殷臣之客於周者也微子雖封於宋徒以武庚既死而無後不可使先王之祀自此而絶也乃若其志則未嘗有臣周之意也故雖爵為上公尹兹東夏而以殷爵圻內之封為稱號此其所以命篇曰微子之命至於後世子孫亦皆以微子稱之非有他爵諡也箕子之於朝鮮非就封也意其引遁而去不食周粟如伯夷之隱於首陽也武王訪而得之於朝鮮然後因而封之雖封於朝鮮而猶稱箕子也箕子既已遁矣則其代殷後者非微子而何惟二子雖歸於周而未嘗臣周此其所以與比干並稱而為仁也王若曰猷殷王元子惟稽古崇德象賢統承先王修其禮物作賔于王家與國咸休永世無窮猷者發語之辭也微子帝乙之長子也故謂之殷王元子殷王指帝乙也其母未立為后而生微子既立而生紂故以微子為庶而紂為嫡紂立而微子不立其實微子為長子又在所當立者也成王將封微子於宋故發語曰猷而以殷王元子呼之自此而下則言其所以封之之意也蓋微子箕子之於周不惟其身有不為臣之義而周家之於二子亦以賔禮待之不責其為臣也故武王訪洪範則曰嗚呼箕子成王命微子曰猷殷王元子皆尊之之辭也其曰猷殷王元子正洪範嗚呼箕子之類也王氏以元為善之長此蓋泥於易之言謂微子為紂之諸子故從而為之說耳其實微子者帝乙之首子當從史記之說也惟稽古崇德象賢此則總言其所以封之之意也林子和曰立微子以為殷後以周室言則為稽古本成湯而言之則曰崇德自微子而言則曰象賢此說是也前世帝王既以膺天之歷數以君臨萬國雖其後世絶滅不復履天下之籍亦必建之一邦使之宗廟世世血食者非特不忍絶人之祀亦所以存一代之制也中庸曰王天下有三重焉郊特牲曰天子存二代之後猶尊賢也尊賢不過二代此皆古之道也故成王稽而考之以立微子而代殷後也其代殷後者則以成湯之有德故也此之謂崇德其立微子者則以微子之賢克肖其祖也此之謂象賢蓋非成湯之盛德有奕世之餘慶則何以使其爵土之不絶非微子之賢則何以繼先人之緒而修其制度乎自統承先王至與國咸休永世無窮此則言其所以稽古者當如是也自嗚呼乃祖成湯至德垂後裔此則言湯之德不可不崇也自爾惟踐修厥猷至尹兹東夏此則言微子之賢不可不立也禮記大傳曰立權度量考文章改正朔易服色殊徽號異器械别衣服此其所謂與民變革者也夫三代之興既已受命矣則其一代之制如正朔服色之類莫不更張而一新之既已立一代之制矣然三王之道若循環終而復始前代之制豈可遂使之湮沒而不傳乎然必立二王之後使之各承其先王之統而修其一代之禮物禮物即服色正朔之類是也惟其立二王之後使之各承其先王之統而修一代之禮物其於天子蓋有不臣之義故作賔于王家也振鷺之詩曰我客戾止有客之詩曰有客有客皆言其為王家之賔也左氏傳曰宋先代之後也於周為客天子有事膰焉有喪拜焉有事而膰有喪而拜其賔之禮蓋若此之類也然其作賔也豈特一再傳而已哉蓋將與國皆美上下同享其慶以至於永世無窮也嗚呼乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寬除其邪虐功加于時德垂後裔爾惟踐修厥猷舊有令聞恪愼克孝肅恭神人豫嘉乃德曰篤不忘上帝時歆下民祗協庸建爾于上公尹兹東夏既言稽古以立先代之後其道當如此於是言湯之德存則有以澤斯民沒則有以裕後昆此其所以立其後而奉其祀也故嗟嘆而言曰爾之先祖成湯有齊聖廣淵之四德故為上天之所眷顧佑助大受其命以代桀而有天下也史記曰幼而徇齊裴絪曰齊速也左傳曰齊聖廣淵杜預曰齊中也蘇氏則以齊訓肅後世以齊為諡蓋出於此諡法曰整肅篤莊曰齊蘇氏所謂肅蓋謂此也淵深也湯既受天之命以伐夏救民故其撫綏斯民則以寬仁之德而桀之滅德作威以敷虐於萬方百姓者一朝而除矣夫兵凶器也戰危事也而湯之十一征乃使斯民望之若大旱之望雲霓也其未至也則曰胡為後我其已至也則曰徯我后后來其蘇蓋桀以邪虐湯以寬仁故斯民引領而望之湯以仁義之師拯民於塗炭則其除殘去暴之功加于一時而其德之盛餘慶所逮可以及其後世之苖裔故雖更紂之虐武庚之叛而成王卒立微子以代其後屢絶而復續也湯之德固可以庇覆于後人而使之有爵土然非微子之象賢亦何以無忝厥祖而為湯之子孫乎故遂言爾惟踐修厥猷蓋謂湯之道爾能踐而修之無所越焉踐與修身踐言之踐同謂履而行之也既能率由爾祖之道則其令聞之播於天下其來也舊矣非始於今日也既舊有令聞而又儼恪戒愼盡其孝道以肅恭神人此蓋指其抱祭器以歸周之事也夫微子不忍商家基緒之墜於是持其祭器以歸周使殷之先后復享其禋祀傳之子孫而不絶其可謂恪愼克孝肅恭神人矣故我一人謂汝之德實篤厚而不可忘也非特豫一人之嘉之也上帝亦嘉汝之德而無不歆享下民亦嘉汝之德而莫不敬和爾之德既合於豫一人又合於天又合於民則宜其列爵分土以九命之公而正兹東夏之民也宋在王室之東故謂之東夏王者之後稱公故曰建爾于上公也王氏曰微子為商後得郊故稱其上帝時歆上帝時歆然後許之郊宜矣此說是也王者之後得用郊天之禮禮記曰杞之郊也禹也宋之郊也契也是也微子之德既為上帝之所歆則其祀帝於郊也神其吐之乎欽哉往敷乃訓愼乃服命率由典常以蕃王室𢎞乃烈祖律乃有民永綏厥位毗豫一人世世享德萬邦作式俾我有周無斁嗚呼往哉惟休無替朕命自此而下則戒勑之辭言不可不敬其事言爾之往而就國當布汝之教訓以迪斯民也宋為二王之後則成湯之廟得用天子之禮樂而微子身為諸侯則惟當循上公九卿之禮此二者之間不可以毫釐差僭之故又戒之曰愼乃服命率由舊章蓋逼生於僭僭生於疑非疑無僭非僭無逼能愼之而以典常自守則安有僭逼之過哉如魯實侯爵乃以天子禮樂祀周公既不愼矣其後遂用於羣公之廟於是季氏僭八佾三家僭雍徹以至有二國逐君之禍蓋其源一開則其末流無所不至魯雖僭天子之禮樂以祀周公故其後則用之於羣公之廟又用之於三家之庭宋既用天子禮樂於成湯之廟則其於服命可不愼之哉成王之於宋其愼之如此則其於魯必不賜之以天子之禮樂也意者周室既衰而魯僭天子之禮遂設為此辭謂本成王之時伯禽受之非我之罪也唐孔氏嘗謂周禮所載公侯伯子男土地之制乃諸侯自以國土寬大皆違禮義乃除去本經妄為之說豫於魯用天子禮樂亦云既能愼其服命以率由典章以謹其侯度而無不盡其道矣故上則可以藩屏王室以維持其社稷逺則可以光大烈祖而發揮其道德下則可以整齊斯民而率循其法度如此則髙而不危滿而不溢永安于上公之位以輔我一人雖世世可以享其德以保其邦家至於萬邦之廣亦將以汝而為式則使我有周於宋永無厭斁之情矣蓋立二王之後欲其統承先王故勉之以洪乃烈祖欲其修其禮物勉之以愼乃服命欲其永世無窮故勉之以世世享德欲其作賔于王家與國咸休故勉之以俾我有周無斁有周無斁即有客之詩所謂在此無斁是也嗚呼者又嗟嘆以重其言也言我之所以命汝者其言丁寧反覆如此則爾之往即爾封惟無廢我所命汝之言服膺而勿失則其體莫大於此矣蘇氏曰方武庚叛後而封微子微子蓋處可疑之地而命之曰上帝時歆又曰洪乃烈祖又曰萬邦作式此三代之事非後世之所能及誠哉是言也唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾周公既得命禾旅天子之命作嘉禾尚書全解卷二十七
