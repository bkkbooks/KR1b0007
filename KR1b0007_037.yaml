body:
  text: 尚書全解卷三十七宋林之竒撰顧命周書成王將崩命召公畢公率諸侯相康王作顧命顧命惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉几乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾王制曰八州八伯五十六正一百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯蓋每州各擇一賢侯為之伯一州之諸侯咸屬焉總九州則又以天子之公二人為之伯九州之諸侯分屬焉所謂二伯也虞舜之時有四嶽又有十二州牧四嶽即方伯是也牧即州伯是也舜以羲和之四子分掌四方之諸侯則自羣牧而下各以其方分屬之周分天下為左右而屬於二伯此正虞氏之舊制也其異者虞以四人而周以二人耳成王之初二伯則周公召公為之周公既沒則畢公代之觀君奭序曰周公為師而康王之命畢公以父師呼之公羊曰自陜而東者周公主之而康王之誥諸侯畢公率東方諸侯入應門右則是畢公代周公為東方之伯亦代之為師也故當成王之將崩而康王之將立則命召公畢公率諸侯以相之焉范純夫內翰嘗曰夫有十金之産者必欲其子守之有一命之爵者必欲其子繼之此常人之情也而況天下之大祖業至重乎蓋將以天下大器祖宗積纍艱難之業傳之於其子則夫將死丁寧之言召公卿而下托以幼孤其事豈細也哉此顧命之篇所以作也序既言命召公畢公率諸侯相康王則諸侯蓋亦預於顧命觀下文記載太保奭傳顧命於康王之禮邦君亦麻冕蟻裳入即位則其預之也可見而其記載成王之命羣臣也特言三公六卿與夫師氏虎臣百尹御事蓋亦互見而已成王之命羣臣自太保至於御事而序特言召公畢公漢孔氏曰序以要言是也曰顧命者漢孔氏曰臨終之命曰顧命唐孔氏曰說文曰顧還視也鄭康成曰回首曰顧顧是將去之意言臨終死去回顧而為語也是也書五十八篇命篇之名皆撮取其篇中數字以為簡編之別惟顧命費誓則又特命焉此亦出於其當世史官一時之旨意而已惟四月成王崩年之四月也史記本紀帝王在位所歷之年未嘗記載漢志則以為成王三十年四月庚戌朔十五日甲子哉生魄其說謂成王即位之初周公攝政七年成王即政三十年共三十七年鄭康成又以此年為成王之二十八年章子平編年通載又曰成王在位四十七年歷世既久經無明文未知孰是哉生魄哉始也楊子曰月未望則哉魄於西既望則終魄於東蓋月之三日光始生於西而漸東滿既望則光稍虧於西而漸東盡明生則魄死明虧則魄生哉生魄則望之後也漢志以生魄為十五日先儒以為十六日案唐孔氏曰望之在月十六日為多大率十六日四分之三十五日四分之一耳竊謂生魄既在望之後不得以為十五日也漢志曰生魄望也故以為十五日耳漢志以甲子即哉生魄之日漢孔氏無說唐孔氏之意亦與漢志同觀經既於哉生魄之下言王不懌而乃言甲子則甲子生魄不得同一日蓋書之記日必先正朔望將言朔後之日必以死魄生明朏紀之將言望後之日必以望生魄紀之故也然亦有可疑者書所記朏望之類其後將言某日則必繼之曰越若干日此獨不言故漢志唐孔氏之說所以同為一日不懌者疾也有疾故不恱懌後世謂之不豫亦此意也天子之疾曰不懌不豫也崩曰登遐曰晏駕皆臣子不忍斥言之也洮盥也洗手謂之盥頮洗面也內則謂之靧王以哉生魄之日得疾至甲子則疾甚矣故命羣臣屬以太子也先儒曰王大發大命臨羣臣必齊戒沐浴今疾病故但洮頮蓋疾病不能以沐浴故也相相禮者鄭康成以為太僕蓋太僕掌王之服位掌擯相故也儒行所謂更僕者亦此也王疾不能興故但相者加之於王身也冕服衮冕之服王朝覲諸侯於廟則衮冕此既發大命故以朝諸侯之服被之也几所憑以為安司几筵凡大朝覲設左右玉几故此亦憑玉几以出命也論語曰疾君視之東首加朝服拖紳孔子不敢以䙝服見其君成王不敢以䙝服臨其臣君臣之禮豈可以疾而廢之哉自太保至於御事無一不召故曰同召也太保至於毛公則六卿也雖則六卿而又兼三公之官太保與畢公毛公也故二人以公稱之以其次第推之奭為冢宰芮伯為司徒彤伯為宗伯畢公為司馬衛侯為司寇毛公為司空左傳并史記皆謂康叔為司寇此衛侯既於次第為五是司寇也故其他可以類推之三公者召公為太保畢公為太師毛公為太傅召公既曰太保奭畢公之為師見於畢命則毛公為傅必矣芮國名世本曰芮伯姬姓是周之同姓也逸書序曰巢伯來朝芮伯作旅巢命此在武王之世成王之世既為司徒至厲王時則有芮伯作桑柔詩以刺王左傳所謂芮良夫也至桓王時有芮伯萬杜預謂芮在馮翊臨晉縣彤王肅云姒姓蓋六卿惟彤伯非周之同姓畢毛皆文王之子左傳曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也是畢公亦文王之子武王之弟名髙史記謂周畢公與周同姓武王之伐紂而髙封於畢則又不以為出於文王當以左傳為正杜預曰畢在長安縣西北其後有畢萬仕於晉又以食采於魏為魏氏毛公亦文王之子左傳有毛伯衛毛伯過毛伯得皆其後也左傳曰伯而此曰公伯其本爵也兼三公之官故曰公亦猶春秋有祭公又曰祭伯也衛侯乃康叔之子康伯左傳謂王孫牟繼其父為司寇猶鄭武公父子為周司徒也畢公太師而在太保之下故唐孔氏曰三公命數尊卑同也王就其中委賢者任之重者則在前耳蓋召公時為冢宰而畢公為司馬惟以職任為尊卑故耳乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事此蓋紀述一時所命之人而周家命官之意見於此者有四以六卿兼主三公之事一也諸侯入為公卿二也公卿皆同姓之邦三也三公九卿各以其職任為尊卑不以爵秩髙下四也師氏中大夫居虎門之左凡㑹同使其屬帥四夷之𨽻各以其兵服守王之門外故特與虎臣言於百尹之上虎臣即虎賁氏下大夫掌先後王及守王宫者也百尹百官之長御事謂凡治事之臣者成王之命羣臣相康王上自公卿下至御事同召之蓋與羣臣共立之也後世人君將托後嗣惟召大臣數人謂之顧命之臣如漢武帝則惟命霍光金日磾上官桀桑𢎞羊宣帝則惟命史髙蕭望之周堪其他不得與焉晉陶侃至以不與顧命之故怨朝廷不肯救蘇峻之亂皆非先王之意也召公以太保為冢宰蓋後世宰相之任故成王之命羣臣相康王則召公為首而後世人君將托後嗣則又特建大將軍一人位在宰相之上實專制朝政如漢武帝有丞相車千秋則乃以霍光為大將軍宣帝有丞相于定國則乃以史髙為大將軍皆非先王之意也漸進也幾危也言進大病而至於危殆也病日臻既彌留言病日至而彌甚留於身不去也左傳曰魏武子有嬖妾武子疾曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也蓋言疾病則甚於疾論語曰子疾病包氏曰疾甚曰病故此既言疾而又繼之以病也惟其疾病如此故懼夫死之將至不得以誓言敷告羣臣以繼嗣之事以此之故我所以詳審而訓命於汝也麗附也其訓命之辭則謂文王武王相繼而起其光明之德既重而盛又宣達之於天下也下武之序曰武王有聖德復受天命能昭先人之功文王有聲之序曰武王能廣文王之聲所謂重光也惟其重光故民莫不慕德而歸附之民之附周既已定矣乃陳教化以訓迪之使之漸仁摩義以歸於士君子之域既定民之所附而又陳教則可謂勞也肄勞也谷風曰既貽我肄亦勞也惟勞而不敢少有違焉蓋兢兢業業未嘗暫息故能通達啇家之否易危為安轉亂為治以集天之大命於我周家奄有天下也魚麗曰文武以天保以上治內采薇以下治外始於憂勤終於逸樂肄憂勤也集大命則逸樂矣在後之侗成王自謂也楊子曰倥侗顓蒙注曰倥侗無知蓋成王之謙辭成王繼文武之後則能致敬以迎天之威夫所以敬迓天威者不在乎他惟嗣守文武之大訓而不敢昏亂逾越則天福之矣蓋天既以文武之重光而眷顧之錫以無疆之命成王惟能守文武之訓光昭之率循之而不敢昏逾則天之威命蓋將方興而未艾日來而不窮我則敬迓之而已今天降疾病於我身已至於危殆不能興起不能覺悟故我以此言告汝汝當明於此言而無忽自今以往當為我元子之輔翼敬保之以大濟於艱難之中蓋以幼沖之年而當萬幾之務親政之始一嚬一笑安危之源自此而分可謂艱難矣當有以大濟之也釗康王名康王成王之長子故曰元子也其所以敬保之者惟休兵息民以安輯天下柔逺而略於外能邇而詳於內則庶邦無小無大舉安而胥勸無有乖爭悖逆之節矣夫人亦指康王也貢進也冒貢者不顧而進也非幾者林子和曰幾者動之微吉之先見非幾則危亂之兆也是也君有君之威儀其臣畏而愛之則而象之故能有其國家令閒長世故欲羣臣之所思者惟欲康王自治於威儀以為民則不可以之而冒進於危亂之兆也蓋威儀不謹則為危亂之兆矣紂幽王是也傳曰男子不沒於婦人之手以齊終也故死生之際昔人之所重平日之所以正心誠意者蓋於此而驗焉如魏顆曰疾病則亂當屬纊之際而其精神聵亂言語悖繆者常人皆然惟曽子曰吾何求哉得正而斃斯已矣故雖病革而必易簀不以將死而曠於禮又召門弟子啓其手足以為知免又告孟敬子以君子所貴乎道者三處死生之間而其安靜有守若此可謂大賢君子矣成王被冕服以見其羣臣是亦曾子之易簀也訓命羣臣以受遺託孤之言則亦曾子之所以告門弟子孟敬子者也此其所以為成周之令王欲觀曾子成王惟觀諸此而已矣兹既受命還出綴衣于庭越翼日乙丑王崩大保命仲桓南宫毛俾爰齊候吕伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗丁卯命作冊度越七日癸酉伯相命士須材狄設黼扆綴衣牖閒南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几唐孔氏曰發首至百尹御事叙王以病召臣為發言之端自王曰至冒貢于非幾是顧命之辭兹既受命還至立於側階言命後王崩欲宣王命布陳儀衛之事也自王麻冕以下叙康王受命之事蓋成王既以疾病危困之故並召羣臣屬以幼孤及王既崩乃輔翼嗣子而立之以成王之所以命羣臣者而傳之康王故布陳其儀衛以為國之光華亦以為備也綴衣幄帳也周禮注曰四合象宫室曰幄王所居之帳也曰綴衣者連綴為之也下文曰狄設黼扆綴衣是王之座必有黼扆綴衣則設於黼扆之上庭者路寢之庭也成王之命羣臣以受遺託孤之事在此綴衣之坐既畢則反於寢處故羣臣既受命而還則徹去幄帳置於路寢之庭將為死備也仲桓南宫毛二臣也齊侯吕伋太公之子丁公是時以列侯入為天子虎賁氏南門路寢之門也王宫鄉南故寢門曰南門翼室先儒曰明室路寢蓋以翼訓明如翼日之翼不如蘇氏曰路寢旁左右翼室也成王喪在路寢故子釗廬於翼室其說為善薛博士亦曰翼室夾室也天子之室有左右房成王以命羣臣之明日乙丑而崩則召公以冢宰攝政百官總已以聽焉故即以王崩之日命二臣於吕伋之處取二干戈而持之以統率百虎賁逆太子於路寢之外而入立之以為天子延之使入夾室當喪居憂為天下宗主也趙伯循曰公必薨於正寢以就公卿也大位姦之窺也危病邪之伺也若蔽於隱是使小人女子得行其志也故宗嗣素定之兵權散主之閨門嚴飾之小人女子不尸重任賢良受託鼎足交輔則篡弒之禍曷由而至哉當成王之崩康王之立以召公奭而總羣臣以齊候吕伋而典禁衛固得其人矣仲桓南宫毛以冢宰之命而後逆太子齊候又以冢宰之任而後授之兵衛則姦邪何自而萌哉成王以乙丑之日崩康王即以乙丑之日立雖緣臣民之心不可曠日無君亦所以杜絶姦邪窺伺之心也康王之為太子蓋有年矣天下所共知也雖太子之居有東宫焉及王不懌太子未有不在側者而其逆之乃在於南門之外者范純夫內翰曰當是時太子在內特出而迎之所以顯之於衆也然則古之立君者惟恐衆人之不覩而事之不顯也何則天子者天下之共主也故當與天下之人戴而君之未有竊取諸宫中而立之出於宦寺婦人之手而可以正天下者也顧命之書所以為萬世帝王之法也其言甚善蓋特出而迎之則非所謂蔽於隱者也觀東漢自孝殤以降國嗣之立非出於外戚則出於宦官唐自穆宗以來八世而為宦官立者七君蓋其本乃自於人君欲其身永享天祿惟恐不久故以繼嗣為不祥之事而深諱之一旦倉卒之際夜半禁中出半紙以某人為嗣則羣臣皆拱手而待命誰敢違者亦有雖有嫡嗣而不能以屬於大臣倉卒之際廢立紛然者觀諸此然後知顧命之書是誠萬世帝王之法者矣其逆之以二干戈百虎賁者所以衛太子也國有大變非常之事不可以不前備也左傳曰文公之入也無衛故有吕卻之難則逆太子其可以無備哉丁卯者乙丑之後二日也命者亦是太保之命也先儒以作冊者命史蓋以周禮內史掌冊命故也成王將崩之言特宣之於口未有冊書將傳之於康王故作冊以紀其言而授之也說文曰冊符命也諸侯進受於王也象其札一長一短中有二編之形如成王之命周公後康王之命畢公保釐東郊皆作冊是也此將以其父之命傳之其子故亦作冊也冊度者作冊自有法度也越七日自丁卯至癸酉為七也鄭康成謂癸酉為大斂之明日蓋以大夫以上殯斂皆以死日之來日數天子七日而殯於死日為八日故以癸酉為殯之明日唐孔氏則謂王崩九日始傳顧命不知其所由召公以方伯為太保冢宰以相天子故曰伯相須材者先儒曰命士致材木須待以供喪用即檀弓曰虞人致百祀之木可以為棺槨者斬之也狄者下士祭統曰翟樂吏之賤也喪大記曰狄人設階則翟者賤官喪事所使也扆者爾雅曰牖戶之間謂之扆郭景純曰窗東戶西也禮云斧扆者以其所在處名之蓋扆者屏風畫為斧文在於戶牖之閒故以為名焉爾雅曰斧謂之黼郭氏曰黼文象斧形因名云考工記曰白與黑謂之黼蓋以白黑畫斧形於扆也狄之設此亦是伯相命之也唐孔氏曰經於四坐之上言設黼扆綴衣則四坐皆設之也牖閒南向即戶牖之閒戶西牖東也牖說文曰穿壁以木為交窗也南向即所謂聖人南面而聽天下嚮明而治也此有四坐牖前南向其一也周禮司几筵凡大朝覲王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几即此坐是也牖前即所謂依前故先儒以此為見羣臣朝覲之坐如明堂位曰天子負斧依南面而立亦此也敷重者天子之席三重諸侯之席再重此敷重者皆敷三重也莞筵繅席次席是三也篾席即次席此特言其上者先儒以篾席為桃枝竹鄭康成周禮注以次席為桃枝席有次列成文故知二者也鄭氏之解此篾席則又以為析竹之次青者王肅則曰纎蒻蘋席也黼純者先儒謂以白繒黑繒為席之緣鄭氏周禮注則以白黑之線縫刺為黼文以緣之也華玉先儒以為彩色鄭氏則曰五色玉也仍几者因几也先儒曰因生時几不改作案周禮曰凡吉事變几凶事仍几鄭氏則曰吉事王祭宗廟裸於室饋食於堂繹於祊每事易几凶事謂凡奠几朝夕相因喪禮略則又不以為因生時几也以華玉飾仍几即所謂左右玉几也西序東向此又一坐也東序西向此又一坐也爾雅曰東西廂謂之序蓋堂之東西廂所以序别內外也西序故東向東序故西向敷重亦三重也牖閒南向之坐見於周禮甚明此三坐雖無所經見其制度亦必然也砥席先儒曰蒻平唐孔氏謂即蒲席王肅亦曰青蒲席鄭氏則以為竹席砥致也篾纎致席也綴雜彩也貝者水蟲其甲可以飾器物故古者以為貨寶爾雅曰餘蚳黃白文餘泉白黃文郭氏曰餘蚳以黃為質白為文點餘泉以白為質黃為文點今之紫貝以紫為質黑為文點所謂文者此也蓋以此貝為几之飾也豐席先儒以為莞案爾雅曰莞苻離其上蒚郭氏曰今西方人呼蒲為莞蒲用之為席又曰􅤴鼠莞郭氏曰亦莞屬也可以為席詩曰下莞上簟周禮亦有莞筵王肅亦以豐為莞惟鄭氏曰刮凍竹席蓋篾砥豐鄭氏皆以為竹故也唐孔氏曰凡此諸席非有明文可據各自以意說耳此言盡之畫純蓋以彩色畫帛以為席緣雕玉者爾雅曰玉謂之雕蓋以玉之雕刻為几之飾也先儒以西序東向之坐為旦夕聽事之坐東序西向之坐為養國老享羣臣之坐此二坐不若牖閒南向之坐為有所經見鄭康成王肅之說亦然蓋亦是相傳為說也唐孔氏則以燕禮西向養國老享羣臣與燕同旦夕聽事重於燕飲而西序在上故以為旦夕聽事之坐也西夾即西方房也天子之室有左右房房即室也說文曰房室在旁也以其夾中央之大室故曰夾室蓋此坐在西廂夾室之前亦南向筍先儒曰蒻竹案爾雅曰筍竹萌郭氏曰初生者說文曰竹胎蓋取筍之皮織以為席𤣥紛先儒以為黑綬案周禮亦曰紛純注曰紛如綬有文而狹者也說文曰黑而有赤色者為𤣥故以為黑綬蓋以此綬為席之緣也先儒以此坐為親屬私燕之坐亦無所經見唐孔氏以謂夾室是隱映之處又親屬輕於燕享故也惟為親屬私燕之坐故其席之緣則黑綬而已無有繢畫彩色之飾其几則髹漆而已無有貝玉之飾也此四坐皆先王平生之所有事者今將傳先王之顧命故設之以象其平生然必設四坐者孝子求神非一處不知神之所在於彼乎於此乎此則交於神明之義也越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序𦙍之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階自狄設黼扆以下皆是將傳顧命于康王故布陳其儀衛以將傳先王之命故設四坐之几席先王平生之所有事者而求之庶可以交於神明若夫器物則先王平生之所寶者車輅則先王平生之所乘者皆布而陳之以為國之光華蓋所以重顧命也周官天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之注曰陳之以華國也蓋先王之寶器皆藏於祖廟之中世世傳守之而不可失故其失與不失國家政刑之存亡皆於此見之春秋書竊寶玉大弓夫夏后氏之璜封父之繁弱成王賜之伯禽受之以為魯之分器而定公之世盜得而竊則其國之政刑可知矣故書以譏之也及其得之又書者蓋其重之也如此惟寶器既為國家之重鎮此所以當大祭大喪則陳之以華國也越及也及玉五重陳寶蓋總而言之其下復分別焉𢎞璧一琬琰二大玉三夷玉四天球五西序二重東序三重共五重寶則五玉之外赤刀以下皆為寶今皆陳之也赤刀寶刀也漢孔氏為赤刀削鄭氏則曰曲刃刀皆以意言鄭氏又謂武王誅紂時刀赤為飾亦不知何所據而言大訓漢孔氏謂虞書典謨王肅亦然鄭康成則曰禮法先王德教鄭氏之說不如孔氏然孔氏但以為虞書蘇東坡曰虞夏商之書其說似為勝𢎞璧大璧也璧說文曰瑞玉圜也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環璧瑗之類孔小者則為璧好孔也琬琰者周禮琬圭九寸而繅以象德琰圭九寸判規以除慝以易行鄭司農曰琬圭無鋒芒琰圭有鋒芒鄭康成曰琬猶圜也判半也凡圭剡上寸半琰圭剡半以上又半為瑑飾蓋圭上圓下方故凡剡上寸半者謂之圭惟琰則剡半以上至首而規又半以下為瑑飾故曰判規琬琰是二玉而乃為一重者唐孔氏曰其玉形質同故不别為重蓋皆九寸故也大玉漢孔氏無說鄭氏曰華山之球也夷玉孔氏但以夷訓常王肅則曰東夷之美玉鄭氏則曰東北之珣玗琪蓋以爾雅曰東方之美者有翳無閭之珣玗琪焉其意與王肅同說文亦然河圖八封也伏羲氏之王天下龍馬出河遂則其文以畫八卦謂之河圖繫辭曰河出圖洛出書聖人則之漢志亦曰伏羲繼天而王受河圖則而畫之八卦是也鄭氏則曰龍馬御甲赤文緑色甲似龜背袤廣八九尺上有列宿斗正之度帝王録紀興亡之數天球玉可以為磬者益稷曰戛擊鳴球是也說文亦曰球玉磬漢孔氏以為雍州所貢西房東房即東房夾室也𦙍國名仲康時有𦙍候𦙍國所為舞者之衣可以為寶故至今常寶之也大貝必大於餘貝故以為寶漢孔氏曰如車渠言其貝形曲如車之罔渠車罔也鼖鼓爾雅曰大鼓謂之鼖考工記曰長八尺說文曰八尺而兩面如琬圭琰圭皆王使之瑞節鼖鼓以鼓軍事皆常用之器今以為寶如此之類皆必有異也漢孔氏曰西房西夾坐東蓋西房即西夾西夾既陳親屬私燕之坐舞衣而下則陳於其坐之東西序有旦夕聽事之坐赤刀而下則陳於坐之北東序有養國老享羣臣之坐大玉而下則亦陳於其坐之北蓋席南向北向則以西方為上東向西向則以南方為上故也兊和垂皆古之巧人惟垂有所經見為舜之共工二人無傳焉其所制造弓戈竹矢皆可為後世寶垂之竹矢自舜之時傳至於周蓋千有餘歲矣如𦙍之舞衣兊之戈和之弓必亦前代之物但不知其何世所造蓋古者前代之物有創造精巧者必寶而傳之如魯有封父之繁弱晉有密須之鼓闕鞏之甲陳有肅愼氏之楛矢石砮皆以其創造精巧故分賜諸侯以為分器故世世寶之也漢孔氏曰東廂東房夾室蓋東夾無几席之位故但陳於夾室之前也周禮典輅掌王及后之五輅辨其名物與其用說若有大祭祀則出輅贊駕說大喪大賔客亦如之注曰亦出輅當陳之故此將傳先王之顧命則以四輅陳之于階孰也曲禮曰主人入門而右客入門而左主人就東階客就西階阼階者東階賔階者西階也說文亦曰阼主階也爾雅曰門側之堂謂之孰注夾門堂也說文曰孰門側堂也左孰之前則門內之西右孰之前則門內之東以曲禮之言可以見也靣猶向也賔階阼階之靣則南向自內而向外左孰右孰之前則北向既在門內故自外而向內蓋大輅在西階先輅在西孰是先輅與大輅相向綴輅在東階次輅在東孰是次輅與綴輅相向也周禮有五輅一曰玉輅以玉飾也二曰金輅以金飾也三曰象輅以象飾也四曰革輅鞔之以革而漆之無他飾五曰水輅不鞔以革漆之而已玉輅金輅象輅乘車也革輅兵車也木輅田車也漢孔氏以大輅為玉輅五輅之長故曰大輅也以綴輅為金輅蓋金輅為玉輅之次是綴玉輅之後也以先輅為象輅蓋象輅又是金輅之次而曰先者玉輅於五輅為大象輅於左右孰為先故也以次輅為木輅又次於先輅故也不云革輅而云木輅王肅馬融曰兵事非常故不陳之鄭氏則以綴次皆為副貮之車大輅玉輅綴輅則玉輅之副先輅金輅次輅則金輅之副不陳三輅首主於朝祀而已其說與孔氏異王氏則以先輅為木輅次輅為革輅象輅謂其行也貴者冝自近賤者冝逺之王乘玉輅綴之以金最逺者木故木輅謂之先輅木輅最為五輅之下而以為先故其說不免於鑿也二人雀辨以下唐孔氏曰執兵器立於門內堂階者所以備不虞亦為國家之威儀也畢門路寢門天子五門曰畢門曰庫門曰雉門曰應門曰路門畢最在外而路最在內康王之誥曰王出在應門之內既其出也方在應門之外則其未出也在路門之內必矣故知畢門為路寢門蓋其一名也此言畢門之內則知上文所陳四坐及器物車輅之所在皆路寢門之內也二人者唐孔氏曰在門者兩守門兩廂各一人故二人在階者兩廂各二人故四人戺漢孔氏曰堂亷曰戺賈誼曰陛九級上亷逺地則堂髙陛亡級亷近地則堂卑注曰亷側隅也乃知戺為堂之側蓋近堂而立也四人者唐孔氏曰兩廂各二人蓋一陛各兩人兩階故四人也東堂西堂者唐孔氏謂鄭𤣥曰序內半以前曰堂謂序內簷下自室壁至于堂簾中半以前總名為堂此當在東西廂近階而立以備升階之人也垂者說文曰逺邉也漢孔氏謂東西下階上唐孔氏曰堂上之逺地當于序外東廂西廂必有階上堂知立於東西堂之階上也側階謂堂北階之上唐孔氏曰北階則惟堂北一階而已側猶特也冕大夫之服辨士之服垂旒則曰冕辨則無旒雀辨與冕板皆廣八寸長尺六寸前圓後方一命大夫之冕亦無旒則與雀辨同而曰冕者一命大夫之冕雖無旒亦前低一寸二分故曰冕雀辨則前後平故不曰冕雀辨者色赤而微黑如雀頭也周禮曰凡兵事韋辨服故漢孔氏謂之雀韋辨以皮為之也綦者鄭氏曰青黑王肅曰赤黑漢孔氏亦謂鹿子之皮為之也惟辨為士服者皆立於堂下冕為大夫服故皆立於堂上此下兵器有七種惟戈之制見於考工記其它無所見漢孔氏曰惠三隅矛劉鉞屬戣瞿㦸屬鋭矛屬鄭氏曰惠狀蓋斜刃冝芟刈劉今鑱斧鉞大斧戣瞿今三鋒矛鋭矛屬皆以意自為之說王肅曰皆兵器之名唐孔氏曰古今兵器名異體殊此等形制皆不可得而知之也其言最為有體說文曰戈平頭㦸也鉞斧也戣兵也惠劉瞿無文至於鋭則以為鈗曰侍臣所執兵也從金允聲周書曰一人冕執鋭則知漢之時作鈗楊雄長楊賦有曰兖鋌瘢耆金鏃淫夷者數十萬人顔師古以兖為箭括張祕謂兖當作鋭字與鋌字相次又案今文尚書一人冕執鋭孔安國傳曰鋭矛屬也疑孔安國之時舊是鈗字後傳作鋭字說文鋭芒也亦與矛不類矣此兖字合作鋭此言有理意或然也王氏之解此篇以為所設之物所陳之器皆有其義以至或在左或在右或在東或在西或在房或在序皆義之所寓其說之鑿莫此為甚如果有其義則惠之立於畢門戈之夾兩階戺皆當有其義也王氏何為闕之哉王氏謂周之典籍缺矣其指有不可知者蓋可以傅會為之說則以為有其義不可以傅會為之說者則闕之也夫古者先王之制器物以行其禮儀豈茫茫然無有意指寓於其間哉如左傳曰清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞸鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旗旗昭其明也先王之意如此而已矣若謂在東則有取於仁在西則有取於義以至有為道之序有修德之序牽合破碎以求配於仁義道德必非先王之本意也王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位太保太史太宗皆麻冕􅊮裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王冊命曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三咤上宗曰饗太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受同祭嚌宅授宗人同拜王答拜太保降收諸侯出廟門俟古者告終易世之時必以禮正之故於其即世也則以禮正其終而於即位也則以禮正其始蓋其授受之始天下之根本繫焉其可輕哉春秋有書公薨于路寢是以禮正其終者也有書春王正月公即位是以禮正其始者也故書其正者以見其不能正者焉成王於大漸之時而同召百官被冕服憑玉几命羣臣以受遺託孤之事則其終正矣康王於是設四坐之几席陳其寶器布其車輅備其干戈之衛王與羣臣冕服以傳先王之命則其始終無不正此顧命之書所以為萬世法也麻冕者禮績麻三十升布以為冕升者八十縷也論語曰麻冕禮也今也純儉吾從衆則知自孔子以前冕皆用麻孔于之時始易之而用絲也周官王之吉服享先王則衮冕此既授先王以冊亦是禮之大者故唐孔氏謂其服必衮冕衮冕有九章一曰龍二曰山三曰華蟲四曰火五曰宗彝皆畫繢於衣六曰藻七曰粉米八曰黼九曰黻皆刺於裳則是衮冕之裳有四章特言黼者蓋黼是裳之一章唐孔氏謂有文故特言之與詩元衮及黼同意卿士漢孔氏以為公卿大夫案詩曰暴公為卿士左傳曰鄭武公莊公為平王卿士皆指執政而言而以為公卿大夫者其意為成王之託羣臣以幼孤公卿大夫與焉不應其傳顧命則獨其執政者與也蓋略舉卿士而已周官公之服衮冕侯伯之服鷩冕子男之服毳冕孤之服絺冕卿大夫之服元冕此卿士邦君之麻冕蓋亦各從其命服而已太保太史太宗之麻冕亦然太保三公太史下大夫太宗大宗伯卿亦從其命服也蟻裳者蟻色𤣥𤣥裳也彤裳漢孔氏曰彤纁也考工記鍾氏曰三入為纁爾雅亦曰一染謂之縓二染謂之緽三染謂之纁禮祭服皆𤣥衣纁裳漢孔氏之說則謂黼裳彤裳皆與常祭服無異惟蟻裳則非常祭之服蓋以卿士邦君非執事者不可全同於祭也蘇氏則謂三裳皆變也雖君臣皆吉服然皆有變其解蟻裳則謂與檀弓蟻結於四隅之文同從先儒之說則蟻裳不應獨異從蘇氏之說則彤裳不得為變歷世既逺禮文漸滅不可得而折𠂻也介圭大圭也考工記有大圭長三尺又有鎮圭尺有二寸而漢孔氏以此圭為尺二寸之圭者蓋三尺之圭天子服之尺二寸之圭天子守之此將奉之於康王以明其為天子故知是鎮圭也同爵名瑁者考工記曰天子執冒四寸以朝諸侯注曰名玉曰冒者蓋言德能覆蓋天下也唐孔氏曰諸侯即位天子賜之以命圭圭頭斜鋭其冒當下邪刻之其刻濶狹長短如圭頭諸侯來朝執圭以授天子天子以冒之刻處冒彼圭頭若小大相當則是本所賜其或不同則圭是僞作知諸侯信與不信故天子執冒所以冒諸侯之圭以合瑞信猶今之合符然此瑁惟冒圭耳不得冒璧璧亦稱瑞不知所以齊信未得而聞之蓋介圭以為天子之守而冒圭以合諸侯之信故當康王之受顧命則皆奉而進之也舜之始受禪輯五瑞既月而班之康王之始即位受同冒而諸侯奉圭蓋必亦如舜之輯而班之是皆合符以正之於其始也承亦奉也皆進之於王也上宗漢孔氏謂即宗伯鄭氏曰變其文者宗伯之長大宗伯一人與小宗伯二人也凡三人使其上二人也一人奉同一人奉冒如康成之說則是上宗已兼大宗伯小宗伯矣下言宗人漢孔氏以為小宗伯如康成之說必以宗人為小宗伯之最下者其位在三者也然小宗伯一也不可以其一為上宗以其一為宗人不如以上宗為大宗伯宗人為小宗伯方為明白上宗既為大宗伯則其奉同瑁蓋兼執之乎此亦不可得而見也書即冊命也自嗚呼疾大漸惟幾至冒貢于非幾皆載於此冊也御亦進也君當升自阼階康王之自賔階升者王自外而入傳命者自阼階升王未受命則當自賔階也入即位者邦君卿士不執事故但就其位而已鄭康成曰卿西靣諸侯北面唐孔氏又曰公亦北靣孤東面此其位也太保上宗由主階升者以將傳先王之命為王故也大史亦由此階而升也御王冊命者以冊命進於王也曰秉書則言其持之以升曰御王冊命則言其奉之以進曰書曰冊命駁文也皇后以下則太史進冊而陳此言也先儒則以此為冊書之辭非也豈成王將死丁寧之言而史輒易之乎故知史以成王之言著之於冊矣此則將奉冊而進之之辭也言此冊者乃成王當大漸之際親憑玊几道揚臨終之命以命汝嗣其教訓以臨涖天下為周邦之君汝之所以臨君周邦者惟率循大法不可少有紛更則可以燮和天下使無有暴慢鄙詐之風則夫文武之光訓布在方冊者可以對揚之而不替矣言成王之所以命羣臣以輔贊康王者其意如此而已皇后大君也指成王也王氏之言皆鑿也王則再拜以敬受之遂起而對曰以眇眇然微末之小子而負荷先王之大業其能治四方以敬畏天威乎蓋自恐其不能也既受命矣乃受上宗所奉之同瑁其受瑁也必授之人其受同也則以祭故三宿三祭三咤必三者與夫三辭三讓三揖三勞同不如是無以示其敬之之至也先儒以宿為進爵以咤為奠爵蓋謂進於神坐之前則以酒酹地而祭酹訖而奠爵焉蘇氏則以宿為奠爵以祭為祭先以咤為至齒而不飲即嚌也蓋謂既實爵矣則受而置之乃以祭先於是嚌之也其意以下文曰上宗曰饗唯嚌之則上宗乃贊王以饗其福也觀太保之酢言祭嚌即此祭與咤也蘇氏似為勝曰饗蓋所謂嘏也詩箋曰豫福曰嘏特牲少牢之禮尸嘏主人故此則上宗嘏王欲王之享之也如此則王之禮畢矣故太保則受其同下堂而易之蓋太保將酢祭不可即用王之爵故以異同異同者言别爵也盥以異同者易爵而洗也璋半圭也酢報祭也王已祭太保又報祭故曰酢與酬酢之酢同儀禮曰君執圭瓉太宗執璋瓉蓋璋瓉次於圭瓉此既報祭故持璋也太保將祭故拜將拜故以同授小宗伯王則答之太保既拜則又受同於宗人而祭既祭則嚌之嚌之亦所以饗其福也將受福不可以不拜故於所居之位以同授宗人而後拜王又答之君於臣無答拜此答之者以其傳先王之命也於是則酢祭之禮亦以畢故太保下堂而有司於此皆收徹之於是諸侯則出在廟門之外以持新王之誥命蓋王既受命則誥戒之即下篇是也廟門即寢門以其殯在焉故曰廟也觀顧命之書或者疑之以為召公不當出康王於外而逆之康王不當吉服以朝諸侯為此言者蓋不思耳夫天子為天下主固當與天下共之苟立之於次即以君天下則宦人女子得以乘間投隙而搖國本天下其誰知之蓋顧命之書萬世之明訓也成王之寢疾則慿几負扆親見羣臣自太保而下至百尹御事告以元子釗之冝承大統其崩也太保則顯逆之於寢門之外冊受末命復率諸侯而朝之蓋所以顯示萬姓杜絶姦萌史官詳而載之以為後世法使有國家授受之際皆得以是為法姦人孰得而窺之奉始皇之於扶蘇豈有異志惟不能顯示於天下李斯又不能顯而立之故趙高胡亥得以亂之論者不此之慮而謂其不當釋喪服以服衮冕此不知變之論也伊訓曰惟元祀十有二月乙丑伊尹以冕服奉嗣王祗見厥祖侯甸羣后咸在太甲之居喪也伊尹祭於成湯之廟奉之以祗見厥祖而朝羣后是亦與天下共之何獨召公康王哉古之人皆然特其文有詳略之不同何獨於此而疑之康王之誥周書康王既尸天子遂誥諸侯作康王之誥康王之誥王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣德答拜太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我高祖寡命王若曰庶邦侯甸男衛惟豫一人釗報誥昔君文武丕平富不務咎砥至齊信用昭明於天下則亦有熊羆之士不二心之臣保乂王家用端命於上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服於先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞羣公既皆聼命相揖趨出王釋冕反喪服成王之命羣臣以受遺託孤之事蓋懼夫康王以幼沖之資不克負荷欲羣臣輔翼贊襄以𢎞濟于艱難康王既受顧命矣則始居天子之位羣臣進戒於王而王申誥於諸侯與之正始而後居喪此篇之所以作也蓋成王之顧命欲康王之率循大卞以燮和天下此羣臣之所以進戒於王欲羣臣敬保元子釗𢎞濟於艱難此康王所以申誥於諸侯古者天子始受命以奄宅四海則諸侯各率其職奉朝會於天子之都以致禮於新君所以正始也舜禹之受禪既祭告於天地宗廟山川百神矣於是輯五瑞日覲四嶽羣牧班瑞於羣后湯之克夏武王之克商其反國也則庶邦冡君率職而受命王於是有以告戒之湯誥武成是也舜禹以揖遜而得天下湯武以征伐而得天下其始受命固不可以不正其始若夫康王繼世而立而其始亦不可不正賔稱奉圭兼幣曰一二臣衛敢執壤奠此即舜禹之輯五瑞日覲四嶽羣牧也王若曰庶邦侯甸男衛惟豫一人釗報誥此即湯誥之嗟爾萬方有衆武成之王若曰嗚呼羣后也成王以乙丑之日崩其傳命也以癸酉之日而邦君與焉不應諸侯聞康王之立而輻凑王都如此之速蘇氏謂成王之疾久矣此諸侯來問王疾者歟案顧命之序曰成王將崩命召公畢公率諸侯相康王則成王之大漸而託羣臣以幼孤諸侯蓋以預於受命矣謂之來問王疾可也然成王以四月始生魄之日得疾即以其月之乙丑日晏駕謂成王之疾為久不知何所據也尸天子者如祭祀之尸居其位而無所為也康王之宅憂也召公以冡宰攝政百官總已以聼焉惟百官聽於冡宰故康王可以居其位而無所為此所以曰尸天子也子張曰書云髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然夫古之人當諒隂之時三年不言而康王乃告諸侯者蓋康王之受顧命也其言曰眇眇豫末小子其能而亂四方以敬忌天威及其朝諸侯也又報誥於庶邦侯甸男衛蓋所以繼承大統而與天下正始故不得不有言自此之外則不復有言必至於三年而後始親萬幾發號施令也如太甲之嗣位伊尹祭于成湯之廟奉之以祗見于祖明言烈祖之成德以訓于王伊尹之訓王亦羣臣進戒康王之意也然當是時也侯甸羣后咸在則豈無告戒諸侯之言乎以康王觀之則可見矣以康王之誥名篇亦猶湯誥也湯誥二字足以成文康王誥三字非述作之體故加之字以足成之說命畢命則二字而微子之命蔡仲之命則加之字亦以其三字故也伏氏以此篇合於顧命共為一篇蓋王出在應門之外與諸侯出廟門俟其文正相接正如舜典之慎徽五典上接堯典之帝曰欽哉故伏生亦合而為一也然合之則無以足百篇之數且既有此二篇之序其可以合之故王鄭諸家又以自高祖寡命以上入於顧命以王若曰以下為康王之誥夫康王立於應門之內而諸侯各以其方入朝見新君以其土地所有之物為贄然後羣臣進戒於王而王則報誥之蓋因朝諸侯而誥之此一篇終始之義也而中析之可乎唐孔氏曰諸侯告王王報誥諸侯而使告報異篇失其義也此言盡之王之受顧命也在路門之內故其出也則在應門之外以路門之外即應門也太保西方之伯故率西方諸侯畢公東方之伯故率東方諸侯上篇末曰諸侯出廟門俟廟門亦路門也出路門即應門而此又言入應門則知諸侯之出廟門俟者但言其自廟門而出於外耳非俟於廟門之外也王氏曰東方冝由左而入右西方冝由右而入左以明人臣事君莫敢固有其所以自便此非也案曲禮曰主人入門而右客入門而左主人就東階客就西階惟主人之就東階而其入自門之右則東方之入應門右乃其所也惟客之就西階而其入自門之左則西方之入應門左亦其所也何必又為之說哉王之出在應門也南面而立故諸侯之入者東方之國則在門內之東廂西方之國則在門內之西廂皆北面而立焉乘四馬也乘黃者四馬皆黃也詩傳曰黃騂曰黃謂黃而雜赤者也大叔于田曰乘乘黃車攻曰四黃既駕駉曰有驪有黃有駜曰駜彼乘黃則黃色者是古人之所貴朱者朱其尾鬛也左傳曰宋公子地有白馬四向魋欲之公取而朱其尾鬛以與之即此朱是也王氏以黃為臣道以朱為君從人以變皆鑿說也賔即諸侯也周官大行人掌大賔之禮注曰大賔要服以納諸侯蓋諸侯入至于王都則有賔之道稱即奉也奉圭而又兼以幣獻蓋圭幣者人臣所以贄見天子也奉圭即輯五瑞是也諸侯各以其所執之圭奉之以授天子天子則以瑁圭冒之以合信也小行人曰合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故注曰用圭璋者二王之後也唐孔氏因之以帛即馬陳馬者是二王之後享王之物經既言乘黃朱而又言兼幣安得以幣為馬乎曰皆布乘黃朱謂諸侯皆陳其四馬於王之庭不獨二王之後也當從蘇氏之說謂馬所以先圭幣言諸侯之來朝各以其土地所有之物以為幣而贄見於王馬所以先圭幣也左傳襄公十九年公賄荀偃束錦加璧乘馬先吳夀夢之鼎杜元凱曰古之獻物必有所先今以璧馬為鼎之先故蘇氏謂馬所以先圭幣也先王之所以列爵分土以建邦國封諸侯者凡欲以為王室之衛敵王所愾而已故諸侯自以為臣衛言外臣之衛王室者也是時侯甸男邦衛咸在而曰一二臣衛此讓辭也奠贄曰壤奠者即以其土壤所出者以為贄蓋諸侯執以見王其曰敢執者亦其謙辭言不自安之意稽首首至地禮之至也諸侯以其幣致之於王故拜而送之王以其義既嗣先王之德繼世而為天子則與諸侯為賔主故答拜也君臣雖無答拜之禮既為賔主故不可以不答王既答拜則見諸侯之禮畢矣故羣臣進戒於王也太保冡宰芮伯司徒冡宰司徒最尊故皆進而與羣臣相揖蓋率之以進也前者率諸侯以朝于王而太保畢公為諸侯之伯故畢公與太保率之而入此則率羣臣以進戒於王而太保芮伯為羣臣之長故芮伯與太保進而揖之既揖之而進故再拜稽首將有以警戒於王不可以不敬也故下文曰敢敬告天子觀下文之報誥所以告庶邦此則進戒諸侯百官皆與焉羣臣之進戒則曰殷之貴為天子富有天下傳世三十歷年六百可謂大國矣惟以紂自絶於天之故故雖大邦而上天之所庸釋以改命我周我周之文武大能受天道而順之不以私意小智撓乎其間故能憂此西土之民取彼凶殘以救民於水火之中蓋言其應天順人也詩曰不識不知順帝之則此誕受羑若也先儒以羑為道王肅亦曰道也特言西土者本其所起之地也惟新陟王指成王也陟與陟方乃死之陟同曰新陟王猶後世曰大行皇帝也成王以賞罰之柄懷來天下賞一人而千萬人莫不勸刑一人而千萬人莫不畏蓋賞當其功而罰當其罪或賞或罰無有不協此其大功所以戡定而休命之無窮有以布遺我後之人也戡定言能定之也文武創業於前而成王持盈守成於後然後能享太平之治故其功之定在於成王之世成王既定其功以遺後之人則康王繼之當何如哉惟善守之則可矣故惟欲其張大六師之衆謹修武備使天下之有不庭者無所投其隙而逞其吞噬䖍劉之志則我祖文武所以受天之寡命不於今王之世而壞之也寡命言其難得也侯甸男衛五服之諸侯也采服在男之外衛之內既言男衛則采服可知矣伊訓曰侯甸羣后咸在侯甸近於王畿故聞太甲之繼世而來見其他道途遼逺未能遽至今則雖衛服之外亦已至矣但不知其何以咸在也羣臣先進戒於王王方從而告戒之故曰報誥曰釗者唐孔氏曰禮天子自稱曰豫一人不言名此自稱名者新即王位謙也孔子曰丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾蓋平富者所謂均無貧也惟先君文武大以平富之政推之於民則何怨咎之有哉蓋使其政之不均則必有怨之者矣天下而有一人得以僥幸而獨遂其私則亦必有一人而受其弊是不均者務為怨咎之方也齊信者言其有此二德也先儒以齊訓中左氏傳注亦訓中史記注則訓速諡法曰執心克莊曰齊則又訓莊砥至言致其至於此二德若大學所謂用其極也惟致其至則無不盡善盡美故能昭明于天下也時又有勇猛之士如熊如羆折衝禦侮以為社稷之衛忠直之臣無有二心殫謀竭慮惟知有公家之利而為之此所以能保乂王家如太山之安故能端命于上帝天遂順其道而付畀之以四方使為之君也蓋文武之道有以順天故天亦順之桀紂幽厲之所為皆逆天理故天亦逆之而不畀以命未有已則逆之而可以使天順之也文武既為四方之君故疆理天下建為諸侯以立王室之屏翰其意在我後之人蓋言為子孫計故建侯樹屏也端命言正當上天之命上帝皇天史之駁文此類多矣天子之於諸侯同姓曰伯父叔父異姓曰伯舅叔舅以大小而分伯叔此特言一二伯父唐孔氏曰舉同姓大國言之也胥暨相與也先公謂諸侯之祖父也諸侯之祖父嘗臣服于周之先王推忠協力以保乂王家今汝諸侯當相與而顧安之也顧謂顧念而不忘也蘇氏謂此言如盤庚告戒之意是也蓋使諸侯能盡忠於王室如其先公之於先王則爾先公在天之靈於是安矣爾之所以顧綏先公者汝雖分土列爵職居於外心當拳拳於王室蓋忠臣之心豈以內外而有間哉心苟忠矣則雖在外如在內如其不忠則雖自侍清光居天子之側其心何在或羣臣欲康王張皇六師故康王為之陳文武有熊罷之士不二心之臣乃能保乂王家汝諸侯苟心存王室則亦可以張皇六師以懲外侮也夫當是時也天下安靜瀛海無波上恬下嬉君臣無為可謂太平矣而必張皇六師者蓋易之既濟有曰君子以思患而預防之康王之時既濟之世也而患不可以不預防故必張皇六師而後可如晋武既平吳詔州郡悉去兵自以為晏然無意外之變既而胡蝗內食曽無藩籬之固以其不知張皇六師故也張皇六師非黷武也如唐太宗漢武帝從事四夷揚兵於萬里之外則為黷矣此但不忘武備而已也立政曰其克詰爾戎兵亦此意也鞠子稚子也康王自謂與母兮鞠我之鞠同言未離於鞠飬之間也汝諸侯其職所當順者當奉恤之而不敢忽忘戰戰兢兢每以為憂則可以輔翼我幼稚之人洪濟於艱難不以羞辱而遺於我也蓋我若不能保有大業以繼先王其為羞豈不大哉此乃諸侯之責不可不以是自勉也羣公既聼王之命畢則又相揖而趨出蓋其進也相揖故其退也亦然羣公既出故王釋去麻冕而服喪服觀康王之受命君臣皆以麻冕之服行禮者冕未釋也至此禮畢則當反喪服蓋居成王之喪喪服為正未釋冕者權一時之冝以與天下正始故其服喪服也則言反焉蘇氏以其冕服為失禮且以晋侯為證夫晉侯之不肯見諸侯之大夫蓋在既葬之後既葬之後則其釋冕也久矣故不可以吉服見此方在殯而冕未釋夫何不可哉尚書全解卷三十七
