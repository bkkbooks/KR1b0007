body:
  text: 尚書全解卷五宋林之竒撰皐陶謨虞書皐陶謨曰若稽古皐陶曰允迪厥徳謨明弼諧謨如器之有模立之於此萬世之所取正也謨有二或出於祖宗之謨所以循法於子孫如𦙍征曰聖有謨訓明徵定保伊訓曰聖謨洋洋是也或出於臣之謨所以告戒於君者大禹謨皐陶謨是也據皐陶謨一篇從首至尾皆是禹相與荅問之言而乃謂之謨者蓋雖與禹相荅問其實陳於帝舜之前此其所以謂之謨史記曰帝舜朝禹皐陶相與語帝前此說是也夫惟相語帝前故揚子雲曰皐陶以之為帝謨不曰為禹謨也曰若稽古皐陶曰允迪厥徳謨明弼諧者典謨皆稱若稽古而其辭則異典主於記載堯舜之事篇名曰典故於堯曰放勲欽明文思安安允恭克讓光被四表格于上下於舜曰重華協于帝濬哲文明温恭允塞此皆稱述堯舜之徳也謨主於記載禹皐陶之言后克艱厥后臣克艱厥臣而下皆禹之謨也允迪厥徳謨明弼諧而下皆皐陶之謨也名篇曰謨故即以其言屬於若稽古之下猶言其謨之如此也然而大禹謨又增文命敷于四海祗承于帝二句者此見禹成治水之功聲教訖于四海然後為帝陳謨也皐陶直言謨而已故不載陳謨之故而直述其言也薛氏以文命敷于四海為禹徳以允迪厥徳謨明弼諧為皐陶之徳至於下文禹曰俞如何其文無所屬則謂其間當有脱文此蓋未深考典謨命名之㫖而欲以其體合而為一其說之不通則委曲遷就而為己意蓋薛氏之於經遇其說之不通則多欲變易經文而就己意如洪範王省惟歲卿士惟月師尹惟日以下則欲屬於五紀於康誥惟三月哉生魄周公初基作新大邑于東國洛而下數句則欲屬於洛誥周公拜手稽首曰上皆徇私立義輕議聖人之經不知古人多聞闕疑慎言其餘予甞以為王氏於經失之泥泥則多鑿薛氏於經失之易易故多欲變易經文以就己意蓋矯枉過直者此古君子之通患也允迪厥徳謨明弼諧此臯陶之謨也先儒以謂人君當信蹈行古人之徳謀廣聦明以輔諧其政以謨明為謀廣聦明以弼諧為輔諧其政上二字加廣聦下二字加其政然後成文臯陶之言必不如是之迂也王氏曰迪道也允迪謂允當於道苟以允迪為允當於道而下又加厥徳二字豈不為贅哉要之此二説皆以人君之蹈行其徳故與下文齟齬而不合予甞聞之劉文昭信曰迪如啓迪之迪如冏命曰迪上以非先王之典是也言人臣欲以至誠啓迪人君之徳則其謨不可以不明謨不明則不能開陳道義以啓迪人主之徳謨明矣而欲弼人主之為則不可以不諧弼不諧則詆訐太甚非所謂優遊厭飫而入之也謨明弼諧則事君之義盡於此矣臯陶言此者將與禹推此道以事舜也禹曰俞如何臯陶曰都愼厥身修思永惇叙九族庶明勵翼邇可逺在兹禹於是然其言既然其言遂問謨明弼諧之道當如何也臯陶曰都者善其問也言人臣欲謨明弼諧以啓迪人主之徳則當使人君慎厥身修蓋古之欲明明徳於天下者物格而後知至知至而後意誠意誠而後心正心正而後身修身修而後家齊家齊而後國治國治而後天下平自天子至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而所薄者厚未之有也古之所以明明徳於天下始於格物致知正心誠意者凡欲以修身而已身既修矣則擴而充之至於家齊而後國治國治而後天下平無不可者然而修身者又不可不思為長乆之道動而世為天下道行而世為天下法言而世為天下則此其所謂思永也欲身修而思永當以何為先惇敘九族庶明勵翼此其所以當先惇厚也敘次也惇敘九族謂親親也庶明近臣也勵勉也翼輔也近臣皆勉勵以翼已謂尊賢也蓋親親者仁之本也尊賢者知之本也人君之治天下其極至於仁知不可勝用而其原則必本於親親尊賢之二者邇可逺在兹者謂修之於此而效見於彼者在此二者而已中庸論治天下有九經修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也自修身至於敬大臣體羣臣則其夲立矣自其本而推之無所施而不可堯舜之治天下禹臯陶稷契之陳謨於君其敘未甞不本於此禹拜昌言曰俞臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎驩兜何遷乎有苗何畏乎巧言令色孔壬禹拜昌言曰俞則其昌盛之言也故拜而然之孟子曰禹聞善言則拜蓋謂此也禹既然其言矣臯陶於是又推廣其義而欲盡乎邇可逺在兹之道者必在乎自尊賢之知而推之以盡夫知人之哲自親親之仁而推之以盡夫愛民之恵然後可也禹曰吁歎辭也將使舜敬重其言而行之故歎之也咸若時者猶言若兹惟帝其難之謂皐陶之言如此帝當難其言而行之也所以在於難其言而行之者蓋知人始於尊賢自尊賢而推之至於無所不知無所不知則能官人安民始於親親由親親而推之至於惠則無所不愛無所不愛故黎民懷之此盖所以推廣皐陶之言而發明其義也知人則哲能官人則盡乎知人之道而知不可勝用也安民則恵黎民懐之則盡乎安民之道而仁不可勝用也仁且知聖人之事備矣此其所以何憂乎驩兜何遷乎有苖何畏乎巧言令色孔壬也巧言令色孔壬謂共工也靜言庸違象恭故言巧言令色孔壬言甚佞也與嘉言孔彰之孔同舜既流共工放驩兜竄三苗矣而其戰戰兢兢之心惟恐又有如此之人復出而為惡故未甞敢忘憂畏之心禹則以謂苟能用皐陶此言而盡乎知人之哲安民之惠則不復憂畏如此之人矣共工驩兜其大姦大佞在朝廷之上故以憂畏言之三苖為諸侯在外故但曰遷而已蓋小人在朝廷之上者尤為可憂畏也不言何畏乎共工而言巧言令色孔壬者蓋言共工之所為如此其為可憂畏又甚於驩兜有苖也若但言何畏乎共工則未足以盡其義也自先儒王氏皆以惟帝其難之為指堯而言之獨張横渠以帝為舜所以必從張横渠之説者蓋禹不當謂堯為帝於大禹謨帝徳廣運已論之詳矣而又四凶之誅在舜歴試之時當堯之時雖知其大惡大姦然而未甞有可誅之罪故釋之而不誅非憂之畏之而不敢誅也苟以惟帝其難之為指堯而言則是禹之意以堯未能盡其知人安民之意故曰何憂乎驩兜何遷乎有苖何畏乎巧言令色孔壬審如是説則禹之言是所以貶堯非所以稱美之矣又與帝徳廣運異矣不如張横渠之言為善夫所謂四凶之為大姦大佞皆在所憂畏此但言驩兜共工有苖而不及於鯀蓋所謂子為父隱直在其中矣皐陶曰都亦行有九徳亦言其人有徳乃言曰載采采禹既以知人為難皐陶又為詳言知人之道以謂苟得其要則其為之亦不難也據龜山曰知人安民此皐陶謨一篇之體要也九徳而下至於庶績其凝皆知人之事也自天敘有典而下皆安民之道也非知人使九徳咸事而能安民者未之有也此説為是中庸曰取人以身言必已之有是徳然後可以求於人也故曰亦行有九徳謂用人之道必在履之於身先有是九徳然後可以求他人有徳然求他人有徳不可以信其空言而遂以為有徳也故必言其行事深切著明者乃可以信其徳故曰乃言曰載采采載行也采事也謂稱其人之有徳必言其人之所行某事以為驗也如四岳薦舜曰有鰥在下曰虞舜此所謂言其人有徳也而曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦此所謂載采采也蓋觀人之法苟不求之於躬行之際而徒信其言語文辭聲音笑貌之間則小人縁情飾偽得以僥倖而進惟取人之際必考其行實則小人無所容其間也禹曰何皐陶曰寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞彊而義彰厥有常吉哉禹於是問皐陶九徳之目皐陶以九徳之目而告之也自寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞彊而義人之徳不出於此九者易曰君子以成徳為行日可見之行也君子之徳必至於成然後為行徳而不至於成則德非其徳也寛而不栗柔而不立至於剛而不塞彊而不義皆非成德也徳之非成是皆有以賊其徳而徳不為我有惟寛而能栗柔而能立至於剛而能塞彊而能義然後謂之成徳德至於成然後可用也聖人備道而全美故其徳無所不盡自非聖人不能無所偏惟其有所偏故自古帝王於其一時之人才必有長養而成就之因其所偏而長其善救其失苟於九徳之中而有一徳之成則可謂之小成矣由此而積之至於九徳無所不備然後謂之大成故觀人之道必以此九徳而察其人材之成與未成也寛則易失之放縱故必能莊栗然後為成徳柔則易失之懦弱故必有以立志然後為成徳愿則易失於樸野則必成以恭亂者有濟亂之材如武王所謂亂臣十人是也易失於輕忽故當成之以敬順擾者多失於無斷故以果毅成之直者多失於不能容物故以温和成之簡者易失於略故必濟之以亷隅剛者多失於上氣而好爭故必濟之以塞實强則無所屈撓多不中節故成之必在合義上九字者人之性質所固有者下九字所以成其德也恭之與敬剛之與强其義亦相近此蓋隨冝立文唐孔氏䟽云恭在貌敬在心愿者遲鈍失於外儀故言恭以表貌亂者輕物内失於心故稱敬以顯情又曰剛是性也强是志也當官而行無所避忌剛也執已所是不為衆撓强也剛强相近此説是也皐陶言此者蓋謂苟能以此九徳觀其人才之成不成全不全則知人之道無復餘藴矣彰厥有常吉哉者言雖以此九徳觀夫人才之成不成又必其徳之有常者然後可以為徳一作一輟未足以為徳也且以一徳之常明之如霍光可謂有濟亂之才耳而其為人在漢武帝左右小心謹徳未甞有過是其能亂而敬而其出入殿門進止有常處郎僕射竊識視之不失尺寸者二十餘年此其亂而敬之有常者哉武帝以是知其可用故其末年托以遺孤卒能擁昭立宣不負社稷之寄彼於九徳之一能守有常武帝彰而用之其成效已如此况於九徳咸事則其效冝如何哉皐陶以是為知人之要信彰厥有常哉此徳惟一動罔不吉也有徵矣日宣三德夙夜浚明有家日嚴祗敬六德亮采有邦自日宣三徳而下此又言知人之道見於官人者則是其義也南豐曽舍人曰以天下之才為天下用則用天下而有餘以一己之才為天下用則為天下用而不足蓋為天子者奄有天下之廣必能盡用天下之才兼收並蓄罔有或遺然後能成天下之治故必用是九徳之人自寛而栗至强而義者無所不容無所不受蓋所謂丘陵積土以為髙江漢積水以為大大人合并以為公也惟其以是天下之才選為天下之用則雖天下之大不足治也至於諸侯則其地不若天子之廣其民不若天子之衆故於九德之中能用其六則足以保其社稷和其人民矣卿大夫之於諸侯又其小者故九德能用其三則可以保宗廟此言所處之勢有廣狹則所用之人亦有多寡也宣達也孔氏以浚明為須明行之以浚為須於義無所據案古文書浚明與濬哲字同用則知浚明者是亦宣達之意言卿大夫能日夜宣達三徳之人使之顯明足以保卿大夫之家日嚴祗敬者謂敬重其人也王氏以為貌嚴行祗心敬亦不必如此之分别也要之既曰嚴又曰祗又曰敬但謂好賢樂善之心有加而無己也言諸侯能敬重六徳之人與之共事則足以保其諸侯之邦亮采者輔其事也諸侯有民人焉有社稷焉故其於六德之人必與之共事至卿大夫則但宣達之而已言各有所當也據言三德六德但謂有九徳之中有三有六不必指定其徳以充三六之數鄭氏以謂三德自簡而廉以下六德自亂而敬以下信斯言也是直而温以上大夫之所不得有愿而恭以上諸侯之所不得用豈非誣也翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝此言天子官人之道也言為天子者必能於此九徳之人兼收並蓄合而受之既合而受之於是敷而施之職位之間使九徳之人咸事其事者蓋其所治者愈大則其所用者必盡天下之材也俊乂在官孔氏謂俊德治能之士並在官焉馬鄭云才能過千人為俊百人為乂要之但謂才無小太皆使之居官有職位也孟子曰晉平公之於亥唐也入云則入坐云則坐食云則食雖蔬食菜􅃵未甞不飽也蓋不敢不飽也然終於此而已弗與共天位也弗與治天職也弗與食天禄也士之尊賢者非王公之尊賢也蓋王公之尊賢必在與之共天位治天職食天禄也苟不與是則未足以盡其尊賢之意也皐陶論天子用人必在使九德咸事俊乂在官百僚師師百工惟時諸侯之用人必在夫亮采至於卿大夫但言宣達顯明而已蓋所處之勢然也俊乂既在官矣於是百官皆相師法而百工之事各得其時也孔氏云百官皆是言政無非既以時為是又以是為政無非此説為迂百僚百工皆指百官也師師指其人而言之故曰百僚惟時指其事而言之故曰百工其實一也撫于五辰言使百官各舉其職以順此五辰之時則衆工皆興也五辰之説張諫議論甚詳其説以謂本生於亥壯於卯成於未此三辰者皆木所終始也就其壯而言之則寅卯正木之辰而春之盛徳實在也火生於寅壯於午成於戌此三辰者皆火所終始也就其壯而言之則巳午正火之辰而夏之盛德實在也金生於巳壯於酉成於丑此三辰者皆金所終始也就其壯而言之則申酉正金之辰而秋之盛德實在也水生於申壯於子成於辰此三辰者皆水所終始也就其壯而言之則亥子正水之辰而冬之盛徳實在也土包載五行而寄王於四季則辰戌丑未皆土之辰焉蓋五行之時分而言之則為十二辰合而言之則為五辰其實一也蓋百官既得其職以撫順於五行之時五行既得其順矣則三光全而寒暑平五榖熟而草木茂此庶績所以其凝也凝成也自翕受敷施至於庶績其凝此天子官人本末先後之序也皐陶之論官人於天子曰翕受敷施固無可疑者其於諸侯局之以六大夫則限之以三此則學者以意逆志而得之不可泥其文於章句之間也薛氏曰古之知言者忘言而取意故言無不通後之學者膠於言而責其實故多疑多疑故多説天子用九諸侯用六大夫用三言不得不爾其實未必然也孔子曰天子有爭臣七人諸侯五人大夫三人使諸侯而有爭臣七人安待謂之僭天子故觀書者取其意而已矣此論善哉無教逸欲有邦兢兢業業一日二日萬㡬無曠庶官天工人其代之王氏曰天子當以勤儉率天下諸侯不當以逸欲敎有邦蓋天子逸欲於上則諸侯化之亦將肆其逸欲以盤樂怠傲於下使有邦者皆肆其逸欲則生民之受其禍可勝計哉而其源則自夫上之人以逸樂導之也誠使為天子者澹然無營清心寡欲舉天下之聲色貨利曽不足以動其心彼諸侯者其敢肆其逸欲於下哉故無敎逸欲有邦者此誠端本清源之道也兢兢戒愼也業業危懼也幾政也言當戒慎萬事之政也上文既言官人之道至於撫于五辰庶績其凝則是治定功成以常人之情當國家無事之時則易安於逸樂而無戒愼危懼之心此則危敗禍亂之所自萌也故戒之曰無敎逸欲有邦兢兢業業一日二日萬幾言一日二日之間而危亡禍亂之幾至於萬其可畏如此可不盡其戒慎危懼之意哉無曠庶官言非獨天子當兢兢業業於上又當勸勉羣臣之在官者使之各㳟爾位而無曠其職所以必欲無曠庶官者蓋凡設官分職其所治之事無非代天之事也使一官之或曠則廢天之職矣天子雖兢兢業業於上而百官有司廢天秩於下是亦危亂之道也故皐陶之陳謨勑戒既曰一日二日萬幾又曰無曠庶官天工人其代之其意蓋欲后克艱厥后臣克艱厥臣以盡乎君臣之道而共保無為之治也天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和衷哉天命有徳五服五章哉天討有罪五刑五用哉政事懋哉懋哉下文申結天工人其代之之義湯誥曰惟皇上帝降衷于下民若有恒性克綏厥猷惟后言民有物則之性好惡之情無非出於天之所以降衷者為君者惟能克綏厥猷而已人之生也其人倫之典天也故其彞倫有自然之敘矣人君勑之以為五典使父子有親君臣有義夫婦有别長幼有敘朋友有信五者各致其厚蓋所以助乎天之所敘也謂人之生交際之禮天已定其差等有自然之秩矣人君自己為五禮以吉禮事邦國之鬼神示以凶禮哀邦國之憂以賔禮親邦國以軍禮同邦國以嘉禮親萬民五者各得其常所以助夫天之所秩也勑有典自有禮必在夫君臣共致其寅畏㳟謹衷善之意然後可以施化故曰同寅協㳟和衷哉既曰寅又曰㳟又曰衷亦與所謂嚴祗敬同謂其寅畏之意有加而無已也蘇氏曰此二者道德事非君臣同其誠敬莫能致之若天命有德討有罪則政事也勉之而已天命有徳凡有徳則順乎天道順乎天道天之所命也人君於是制為五服以章之五服鄭博士曰自衮冕至於𤣥冕自九章至於一章是也天討有罪凡有罪者則悖乎天道悖乎天道則天之所討也人君於是制為五刑以用之五刑墨劓剕宫大辟是也天命有德討有罪施之於刑賞之間必在夫君臣共勉於政事然後可以勸懲天下故曰政事懋哉懋哉敘有典秩有禮則君臣同寅協㳟和衷以助夫天之所敘秩命有徳討有罪則君臣懋於政事以助夫天之所予奪君臣之間盡道如此則可謂能兢兢業業一日二日萬幾無曠庶官以代天工矣此皐陶諄諄為帝陳謨也典禮言勑我自我而命有德討有罪不言我者楊龜山曰典禮必自天子出故曰勑我曰自我若夫爵人于朝與衆共之刑人於市與衆弃之雖天子不得而私焉此説是也典曰五惇服曰五章刑曰五用而至於禮則獨曰有庸者王氏曰五典五服五刑之所施非一人之身若五禮則取於一人之身而楊龜山以其説為不然龜山之說曰禮雖有五而其用則非一如五禮上自天地社稷宗廟下至山林川澤以及四方百物皆有祭焉而其儀章器物各從其𩔖不可以數計吉凶軍賔嘉亦莫不然故曰有庸然馬融本則直作五庸與五惇五章五用無以異然世逺難以折中姑兩存之天聦明自我民聦明天明畏自我民明威達于上下敬哉有土古文書畏與威二字通用其義一也孔氏以上一句屬於天命有徳言因民而降之福民所歸者天必命之下一句屬於天討有罪言天明可畏亦因民成其畏民所叛者天必討之案吕刑云德威惟畏徳明惟明是明與畏字相對而言明者天之所彰也畏者天之所畏也孔氏既以明畏屬於天討有罪矣故遂以聦明屬於彰有徳豈天之彰有徳則用其聦明而討有罪則不用其聦明者乎此説不通而王氏張諫議則又以聦明主於典禮而言明畏主於命徳討罪而言夫明畏主於命徳討罪無可疑者而以聦明為主典禮則失之泥要之二句只一意蓋所以緫結上文而盡其義亦不必分説泰誓曰天視自我民視天聽自我民聽此正為命徳討罪而言也言天之聦明能鑒察善惡故其吉凶禍福之應未甞有豪釐之差為人君欲觀其聦明明畏無觀諸他觀之民而已天有聦明之道而其聞見則付之於民民之所聞天之聦也民之所見天之明也天有明畏之道而其好惡則付之於民民之所好天之明也民之所惡天之畏也蓋公天下之聞見好惡而襃貶則天之聦明明畏不外是矣是道也達乎上下者一理而已下焉民之所以好惡向背者此道也上焉天之所以吉凶禍福者亦此道也所以必在察乎民之意以察天之意此理而達於上下本無有二民之好惡向背則天之吉凶禍福應之如影響矣故有土者不可不敬如此敬於民則敬於天矣敬於天則民歸之矣皐陶曰朕言惠可底行禹曰俞乃言底可績皐陶曰予未有知思曰賛賛襄哉自允迪厥徳以下至敬哉有土皐陶之所以為帝陳謨盡於此矣不可以有加矣於是又申誥之曰朕言惠可底行謂我之言順於理可底而行其意蓋以謂我徒能言之耳至於行之則在乎舜與禹也禹曰俞者然其惠可底行之言既然其言而又謂汝之言不但見於空言而已亦可以致行其功蓋欲勉皐陶以共行其知人安民之言也皐陶曰予未有知思曰賛賛襄哉襄哉者言禹雖勉皐陶共行安民知人之言而皐陶猶辭讓不敢當也孔氏曰我未有所知未能思致於善徒亦賛奏上古行事而言之信如孔氏說則曰之一字遂為衍文蓋上下文勢已足雖不加曰字猶成文義也張横渠薛氏皆以曰當作日字下文予思日孜孜相𩔖此説比先儒為優雖治經者不當變易經字以就已意然而考之於經曰之與日大抵多相亂如洛誥曰今王即命日釋文一音作曰吕刑曰今爾罔不由慰日勤釋文一音作曰以是知日字曰字經文多相亂而此下文又有予思日孜孜與此思曰賛賛襄哉文勢正相𩔖故張横渠薛氏皆以為日此蓋有憑據而云非率意而為此説故可從也賛賛襄哉者孔氏以謂賛奏上古行事而言之薛氏曰日夜進進不已知進而不知退知上而不知下也蓋爾雅襄字惟有二訓其一訓除其一訓上既不可訓除而用爾雅訓故遂以訓上必曰賛賛上哉故其説不得不如此鄭氏雖知爾雅二訓不可從又以襄字訓暢言我未有所知所思徒賛明帝徳暢我忠言其説尤為無據惟王氏曰襄成也思一一賛襄以成禹之功也案春秋左氏傳定十五年葬定公雨不克襄事杜元凱曰襄成也王氏之訓蓋出諸此此説為善皐陶之意蓋以謂使我獨底可績則未能為禹之助以成其功而已尚書全解卷五
