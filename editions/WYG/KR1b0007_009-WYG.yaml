body:
  text: 尚書全解卷九宋林之竒撰禹貢夏書荆河惟豫州此州之界西南至于荆山荆山之南則荆州也北距河水河水之北則冀州也蓋豫在荆之東北冀州之南而以荆河為界以荆河之地而求之則豫州之界雖厯千載猶可考也如職方氏爾雅皆從正南為豫州是徒載其北境而已載其北境而遺其南境使後世果安所考信哉所以後世地理家之所志惟以禹貢為準如謂信安保定瀛冀深洺磁相西南盡河之地為禹貢冀州之界齊青淄灉密登萊及遼東之地為禹貢青州之界宿泗徐州沂淮陽盡海之地為禹貢徐州之界其他皆然蓋惟禹貢之九州則可以後世州郡如此配合而言之若職方氏爾雅則不可以若此矣伊洛瀍澗既入于河孔氏曰伊出陸渾山洛出上洛山澗出沔池山瀍出河南北山漢志云伊水出洪農盧氏縣東熊耳山洛水出洪農上洛縣冢嶺山瀍水出河南穀城縣濳亭北澗水出洪農新安縣酈道元水經曰伊水出筍渠山洛水出灌舉山瀍水出穀城北山澗水出白石山此數說不同據下流之水分派别道遭厯代陵谷變遷則容有不同而其源之所自出不容有異如經之所載江水出於岷山漢水出於嶓冢後世言江漢之源未嘗有異說也經文導洛自熊耳與岷山導江嶓冢導漾文勢先後不同則是洛非出熊耳但其導之自熊耳而始爾雅推此四水之源故不必求之諸儒異同之說雖有異同之說不足信矣此言伊洛瀍澗既入于河而下文言導洛自熊耳東北㑹于㵎瀍又東㑹于伊又東北入于河是伊㵎瀍入于洛而洛入于河也夫既於下文載導川之次矣而於此州言之者蓋後之所言者欲其脉絡相貫苟不於此言則無以知其在九州之界也惟彼此之相明故禹貢所載山川係於九州之分域者皆可以案其書而覆其地也據伊瀍㵎入于洛而洛入于河此言伊洛瀍㵎則以四水列稱者曽氏曰漢水入于江江入于海而荆州言江漢朝宗于海與此同意蓋其四水並流其源則異而水之小大相敵也滎波既豬滎波有二說漢孔氏曰滎澤波水巳成遏豬唐孔氏雖謂滎是澤名洪水之時此澤水大動成波浪此澤其時波水巳成遏豬不泛溢也據二孔之說則是滎波為一水也周官職方氏曰其川滎雒其浸波溠鄭氏云滎是沇水也出于東垣入于河溢為滎今之滎澤波讀為播禹貢曰滎波既豬觀鄭氏之說則是滎波為二水名顔師古曰滎沇水所出今之滎陽波亦水名一說滎水之波則師古蓋兼存此兩說然以理考之既職方氏豫州川浸有滎波之二名則是鄭氏為有所據但以其波為播則不可據古文書波自作從山從畨與嶓冢之嶓同意者鄭氏所傳本訛以波為播故其說如此夫既職方作其浸波溠而今文書又作滎波則是以為波字也無疑矣安得以為播邪爾雅云水自洛出為波曽氏引以為據謂滎自河溢波自洛出皆有以蓄之此說又善導菏澤被孟豬孔氏曰菏澤在胡陵孟豬澤名在菏東北水流溢覆被之闞駰曰不言入而言被者不常入也水盛乃覆被之此說皆是漢孔氏以在胡陵而唐孔氏則據漢地理志謂山陽郡有胡陵縣不言其縣有菏澤也案說文曰菏澤水在山陽胡陵禹貢浮于淮泗達于菏而漢志山陽胡陵云禹貢浮于淮泗通于河水在南雖其字作河然以說文之言考之當是指此澤與漢孔氏同然漢志於濟隂又云菏澤在定陶縣東又似指此澤而言此二說難以取信今且從孔氏作在山陽胡陵徐州浮于淮泗達于河案古文作菏字而說文並與之同意蓋謂浮于淮泗達于此澤也然禹貢九州之末皆載達于河之道不應於徐州獨指菏澤此當以今文書為證古者盟孟二字通用孟津亦謂之盟津孟豬亦謂之盟豬蓋通字也此經謂之孟豬漢志謂之盟豬職方氏謂之望諸史記謂之明都其實一也其澤在梁國雎陽縣東北近於菏澤菏澤水盛然後覆被孟豬亦猶弱水至于合黎餘波入于流沙也周禮職方氏青州澤藪曰望諸即此澤也蓋職方氏之青州在豫州之正東故得兼有孟豬之澤也厥土惟壤下土墳壚無塊曰壤冀州曰白壤雍州曰黃壤此州不言色者蓋其壤之色雜也墳土膏脉起也壚疏也顔師古云土之剛黒者顧氏云𤣥而疏者謂之壚言高地之土則曰壤下地之土則曰壚蓋其土有高下之不同故別而言之如青州曰厥土白墳海濵廣斥是也厥田惟中上厥賦錯上中其田則第四其賦則第二又雜出於第一蓋九州之賦言錯者有四如冀州則云厥賦惟上上錯揚州則云厥賦下上上錯豫州則云厥賦錯上中梁州則云厥賦下中三錯蓋當其制貢之時青徐雍荆所入之賦每得其常數惟此四州實有豐凶之年故其賦雜出於他等其所出於他等者蓋是總其九州所輸之賦彼此相形為此九等之差也冀州賦第一豫州賦第二苟冀州有凶荒水旱之歳其歳有所減除則反出於豫州之下則是豫當為第一冀為第二也揚州賦第七梁州賦第八苟揚州樂歳田疇墾闢有所豐衍而梁出於第七則揚故出第六矣如是歳凶之年有所蠲減出於第九則與兖州相形必有强弱於其間故揚州厥賦下上上錯梁州厥賦下中三錯而兖則曰作十有三載乃同是皆彼此相形為高下餘州雖無有錯出者然以意逆志則凶年饑歳必無取盈之理以是知九等之賦蓋以九州所出之大數相較而成非是制貢之時有此多寡盈縮之不同也厥貢漆枲絺紵職方氏云豫州其利漆枲則是漆枲之𩔖此州之所宜也故制以為貢絺葛之精者紵顔師古曰織紵以為布而貢皆不可得而知也周官載師漆林之征二十有五周官以為征而此則貢之者蓋禹之時豫州在於畿外故有貢也推此義則知冀州所以不言貢之意矣厥篚纎纊錫貢磬錯諸儒皆以纎纊為細綿然先儒蓋有以黒經白緯為纎者則纎纊之為二物亦未可知也治玉石曰錯文曰磬錯治磬之錯也揚子云有刀者礲諸有玉者錯諸不礲不錯焉攸用蓋作器者必賴此以為用也荆州之礪砥所以治刀也此州之錯所以治玉磬也謂之錫貢錫命而後貢非每歳之常貢也此州之磬錯與揚州之橘柚皆是待上之命而後貢然揚州先言橘柚而後言錫貢此州先言錫貢而後言磬錯者曽氏曰橘柚天所生也磬錯人所為也磬錯必待錫命使貢而後為之故先言錫貢也此說牽强不如施博士之說曰橘柚言包則與厥篚之文無嫌也故言錫貢在後磬錯則與厥篚之文嫌於相屬故言錫貢在先此立言之法也浮于洛達于河豫州去帝都甚近浮舟于洛則達于河達于河則達于帝都矣華陽黒水惟梁州孔氏謂東據華山之陽西距黒水謂東據華山之陽者當是跨而越之也此說不然河流導自積石至于龍門南至華隂東至于底柱是河入華山之隂始折而東也雍州言黒水西河惟雍州黒水之西蓋雍州之境梁州不應跨越華山而至于北也曽氏曰梁州雍州之西境皆至黒水惟華山之隂為雍州其陽為梁州則梁州之北雍州之南以華為畿而梁實在雍州之南此說雖是然其謂梁之北雍之南以華為畿則其說未盡據華山在雍梁之東若謂梁之東北雍之東南以華為畿則得之矣班孟堅曰周改禹徐梁合之於雍青顔師古云省徐州以合青州并梁州以合雍州蓋職方氏無梁州故班孟堅顔師古以為合於雍然職方氏於青州其山鎮曰沂山其川淮泗其浸沂沭則謂徐合於青無足疑者若夫雍州其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛梁州之川無一存者果何所據而謂梁合於雍乎荊州其川江漢據江漢之水發源于梁州由荆而東以入于揚州然後入于海今以江漢為荆之川則禹貢之梁州其無合於職方氏之荆州乎然而未敢以為必然姑闕之以俟後學岷嶓既藝岷嶓二山名岷山在漢蜀郡湔道西徼外江水之所從出也嶓冢山在隴西郡西縣漢水之所自出也江漢二水發源此州當其泛溢慓悍而未有所歸則其發源之山亦為水所浸灌而不得遂其播種之利今既疏導以入于海則岷嶓二山所出之水皆順流而東則此二山遂可以種藝矣沱濳既道爾雅曰水自河出為灉水經曰大河經富平城所在分裂以溉田圃北流入河以是知灉水既自河出復入于河也以灉觀之則知爾雅所謂水自江出為沱自漢出為濳必皆是江漢之水既決出而復入者荆州梁州之界江漢之所經皆有別出復入之水故此二州皆言沱濳當夫江漢之經流既以朝宗于海則其別出而復入者亦皆順其故道故荆梁二州皆有沱濳既道之文也江漢二水跨厯二州之界緜亘數千里然後入于海經於此州曰岷嶓既藝沱濳既道於荆州則曰江漢朝宗于海九江孔殷沱潛既道於揚州則曰彭蠡既豬三江既入震澤底定既以二水原委始終之所經隷於逐州之下矣而於下文又申結之曰嶓冢導漾東流為漢又東為滄浪之水過三澨至于大別南入于江東匯澤為彭蠡東為北江入于海岷山導江東別為沱又東至于灃過九江至于東陵東迆北㑹于匯東為中江入于海一經一緯互相發明則江漢二水首尾本末皆可得而見矣其文簡其事備非後世地理家之所可及也蔡蒙旅平孔氏謂蔡蒙為二山名唐孔氏亦謂蒙山在蜀郡青衣縣蔡山不知所在而鄭氏以謂蔡蒙二山皆在漢嘉縣據漢嘉縣即蜀郡青衣縣也順帝時始改為漢嘉縣志青衣縣但有蒙山無蔡山不知鄭氏何所據而知蔡山亦在漢嘉當姑闕之祭山曰旅論語曰季氏旅於泰山是也旅平者治功畢而旅祭也和夷厎績唐孔氏以和夷為平地之名不以為徼外之夷鄭氏以謂和川夷所居之地鄭氏之說為長曽本鄭氏說以謂自嚴道而西地名和川夷人居之今為羈縻州者三十有七則經所謂和夷者也蘇氏亦以和夷為西南夷名若此諸說皆可信今雅州猶有和鎮此即和夷之故地也厎績者致其功而可以種藝矣厥土青黎厥田惟下上厥賦下中三錯孔氏云色青黒而沃壤據孔氏之意蓋以黎字訓黒黎既訓黒而見此州獨不言土之性遂以沃壤二字而足其義據經但言青黎又安得有沃壤之義王肅曰青黒色黎小疏也既言青黒又以黎為小疏則是黎之一字而有二義矣亦近於孔氏焉顔師古曰黎者色青而細疏比於諸說為勝然以細疏而訓黎字未知顔師古果何所據爾厥田惟下上者田第七也厥賦下中三錯者賦第八雜出第七第九三等也故曰三錯曽氏曰梁州山多兖州揚州水多故其賦比九州為下等或然也厥貢璆鐵銀鏤砮磬此璆字與天球鳴球之字通用蓋玉磬也鏤剛鐵也可以鏤者鏤為剛鐵則上所謂鐵不必是剛蓋有此二種也銀貴於鐵此乃先言鐵而後言銀者曽氏云蜀郡卓氏皆以鐵冶富擬邦君蓋梁州之利􅀹在鐵故也砮石之可以矢鏃也與荆州所貢礪砥砮丹之砮同磬石磬也上文璆既以為玉磬則此為石磬可知矣徐州之貢泗濵浮磬此州既貢玉磬而豫州又貢磬錯以是觀之則知當時之樂器磬為最重其所以􅀹重於磬者豈非以其聲尚於角其聲在於清濁小大之間最為難和者哉夔曰於予擊石拊石百獸率舞庶尹允諧但言擊石拊石而不言金絲竹匏土革木者惟石聲最為難和故也是以制貢尤詳於此也熊羆狐狸織皮漢孔氏曰貢四獸之皮織金罽唐孔氏以毛為罽織毛而言皮者毛附於皮故以皮表毛爾據二孔之說則以織皮為一物蘇氏云以罽者曰織以裘者曰皮則是織皮為二物曽氏亦同於蘇氏之說而其說加詳焉曰地多山林獸之所走熊羆狐狸之皮製之可以為裘其毳毛織之可以為罽今當從蘇氏曽氏之說西傾因桓是來浮于潛逾于沔入于渭亂于河鄭氏云織皮西戎之國西傾雍州之山也雍戎二野之間人有事於京師者必道從此州而來桓是隴阪之名其道盤桓旋曲而上故名之曰桓今其民猶謂阪曲為桓也觀鄭氏之說則是以西傾屬於上織皮之文以桓為非水名酈道元破其說以謂馬融王肅皆云西治傾山惟因桓水言無他道也桓水出於西傾山更無別流所導者惟此水耳浮于濳漢而達江沔鄭氏之說殊乖禹貢因桓之義非浮潛入沔之文余考校諸書略總緝川流注㳂之緒麤陳所由西傾至于葭萌而入于西漢水即潛水也自西漢遡流而届于晉夀界阻漾枝津遂南厯泗上冘迤邐而接漢㳂北入漾此則浮于潛而逾沔矣厯漢川屬於襃水逾襄暨於衙嶺之南漢川合襃水灌於斜川屬於武功北達於渭水是皆水陸之相親川流之所經復不乖於禹貢入渭之宗實符禹貢亂河之文酈道元此說最為詳備至於蘇氏之說大抵𩔖此而其所援引尤為有據蘇氏曰西傾山名在隴西臨洮縣東南桓水出焉桓入潛潛入沔漢始出為漾東南流為沔至漢中東行為漢沔在梁州山南而渭在雍州山北沔無入渭之道然案前漢書武帝時人有上書欲通襃斜道以漕事下張湯問之云襃水通沔斜水通渭皆可以漕從南陽上沔入襃襃絶水至斜間百餘里以車轉從斜下渭如此漢中穀可致此則自沔入渭之道也然襃斜之間絶水百餘里故曰逾于沔蓋禹之時通渭襃為沔也蘇氏此說比於酈道元􅀹為有據蓋雍州之達于帝都則必自西傾因桓水而來浮潛而逾沔至渭陸行百餘里然後逾渭以亂于河亂者絶流而渡之也蓋自西傾因桓至亂于河皆是此州達于帝都之道而周希哲曰織皮言其服西傾言其地服織皮之服居西傾之地者必因桓水以通其來往言其織皮西傾亦猶言織皮崑崙析枝渠搜也此亦一說姑兩存之黒水西河惟雍州河自積石東北流至中國折而南至華隂又折而東至大伾又折而北至冀州帝都界於三河之間故王制曰自恒山至于南河千里而近自東河至于西河千里而近其曰東曰西曰南皆自冀州而言之也濟河惟兖州此東河也蓋在冀州之東荆河惟豫州此南河也蓋在冀州之南黒水西河惟雍州此西河也蓋在冀州之西雖自冀州而言之有此三河其實一也冀州之西接於雍州以河為境雖冀州之西河然其實雍州之東境也黒水厯雍州梁州之西入于南海此二州皆以黒水為境漢孔氏曰西距黒水東據龍門之河孔氏所謂據乃跨而越之也冀州之與雍州分河之東西不應言據唐孔氏曰計雍之境被荒服之外東不越河而西踰黒水王子雍曰西據黒水東距西河所言得其實也徧􅂤孔氏皆云西距黒水東據河必是誤也此說是也弱水既西唐柳子厚曰西海有水散渙而無力不能負芥投之則委靡墊没及底而後止其名曰弱水雍州之西有水幽險若漆不知其所出故曰黒水此二水皆在塞外當其淫溢泛濫也亦為雍州之害及禹之治水順其勢而導之塞外一則歸于南海一則歸于流沙然後雍之功可得而施之也夫地之勢西髙而東下故水之流也萬折必東然而亦有西流者雖不與衆水俱東亦其勢也東坡潛珍閣銘云悼此江之獨西歎好意之不陳則水之西流者固有之惟弱水之勢利於西流方其禹功未施則東流合於中國衆水而増其患害故禹將治中國水導之於塞外以其利於西也故決之使西以順其勢不使與衆水共為東流所謂行其無事也曽氏云弱水不能任物其受物皆沈置舟焉淺則膠深則溺蓋舟楫之害故禹導之使西則其水不由中國又歸其餘波于流沙所以絶之使其害不廣夫禹之於弱水所以導之使西者惟因其勢之不得不西使其勢可以東流而必使之西則是逆水之性非所謂行其所無事矣曽氏之說在所不取涇屬渭汭涇屬渭汭者蓋導渭而并及此數水也下文曰導渭自鳥䑕同穴東㑹于灃又東㑹于涇又東過漆沮入于河蓋此數水脉絡相通而渭水為大故并于渭而入于河也漢地理志云涇水出安定涇陽縣西岍頭山東南至馮翊陽陵縣入渭也蓋渭至陽陵而涇水自西北來入之屬及也言涇水至是及於渭也涇水濁渭水清以涇之濁合渭之清同入于河詩所謂涇以渭濁是也汭水北也涇之入渭蓋自西北入之故以汭為言猶所謂東過洛汭也然周官職方氏雍州其川涇汭鄭氏曰涇出涇陽汭在豳地詩大雅公劉曰芮鞫之即則是汭又為一名此亦一說今兩存之漆沮既從漆沮既從者唐孔氏云詩曰自土沮漆毛傳曰沮水漆水也則漆沮本為二水地理志云漆水出扶風漆縣西闞駰十三州志云漆水出漆縣西北沮水不知所出至於下文導渭東過漆沮入于河又云地理志云漆水出扶風漆縣依十三州記漆水在岐山東入渭則與漆沮不同耳此云㑹于涇又東過漆沮在涇水之東故孔氏以為洛水一名漆沮水經云沮水出北地直路縣東入洛水又云鄭渠在太上皇陵東南濯水入焉俗謂之漆水又謂之漆沮其水東流注於洛水志云出馮翊懐徳縣東南入渭以水土驗之與毛詩古公自土沮漆者別也彼漆即扶風漆水也彼沮則未聞此二說皆出於唐孔氏而違戾不同案經云漆沮有二此州曰漆沮既從下文曰東過漆沮其實一也而唐孔氏於前一說則以為即扶風之漆沮合夫自土沮漆之文而後文一說則以為漆沮即洛水與自土沮漆者異非扶風縣之漆水也此二說矛盾使學者安所適從以理觀之當從其後說據孔氏於此注云漆沮之水巳從入渭而下文東過漆沮注云漆沮二水名亦曰洛水出馮翊北是孔氏於二說初無異也詩云瞻彼洛矣維水泱泱孔氏謂漆沮一名洛水洛水即漆沮也與東都伊洛別蓋孔氏之意以謂豫之洛與雍之洛異蓋漆沮之別名也詩曰猗與漆沮潛有多魚即此漆沮水也與豳地之漆沮異矣蓋此漆沮即職方氏雍州所謂其浸渭洛也既從者既從而入于渭也灃水攸同地理志云灃水出扶風鄠縣東南北過上林苑入渭而張衡上林賦注云灃水出鄠縣南山谷灃水攸同亦同于渭也蓋渭自鳥鼠導之而東灃水自南而注之漆沮自北而注之然後入河此三水絡脉相連相顧而成之又曰屬曰從曰同者其實一也但變其文耳荆岐既旅雍州之地東距龍門之河當夫河流泛濫未折而東而雍州亦被其害及夫禹施功於冀州既載壺口治梁及岐矣壺口在冀州梁岐在雍州則此二山在於孟門龍門之間實河之所經河既順流而東則是治河之害既載於冀州矣故經序此州治水之迹惟弱水既西渭合衆水以歸于河則其功畢矣自荆岐既旅而下遂言平地川澤皆巳有成績也此荆山即北條之荆山在馮翊懐徳縣南非荆及衡陽惟荆州荆河惟豫州之荆也此荆既在雍州之界而蘇氏乃指以為荆河之荆誤矣岐即治梁及岐之岐也旅祭名言洪水既平可以旅祭矣終南惇物至于鳥䑕終南惇物鳥䑕者皆雍州之大山也九州之地西北多山東南多水雍州在西北故其山為最多揚州在東南故其水為最多觀此篇之所載可以見矣秦都長安在於雍州所謂百二之險者惟其山多故也地理志云扶風武功縣有太山古文以為終南華山古文以為惇物蓋此二山皆在扶風武功縣之東也酈道元以華山為惇物然禹貢自有太華酈氏之說非也鳥䑕山在隴西首陽縣西南言終南惇物至于鳥䑕不言其所治者孔氏曰三山空舉山名不言治意蒙上既旅之文此說是也原隰厎績至于豬野爾雅曰廣平曰原下濕曰隰則是凡廣平下濕之地皆有此原隰之名也然此曰原隰厎績至于豬野當是有所指而言之非泛指廣平下濕之地也鄭氏曰詩曰度其隰原即此原隰是也原隰蓋在豳地義或然也豬野地理志武威縣東北有休屠澤古文以為豬野水經曰沙水上承姑臧武威澤原隰厎績至于豬野言自原隰致功至于豬野之澤三危既宅三苗丕敘三危之山在鳥䑕之西南當岷山則在積石之西南也舜竄三苗之地三苗始竄蓋在洪水未平之前及洪水既平之後三危之地既可居則三苗之族於是始得其敘舜之竄三苗也蓋擇其惡之尤者投諸逺裔更立其近親使居三苗之國及洪水既平之後所竄之君既巳丕敘而居三苗之國者尚且頑不率教至于七十餘年而後服蓋有苗之君左洞庭右彭蠡負恃其險故每毎桀驁而不服於教命彼巳竄之君既無險可恃矣此其所以至于丕敘而其恃險者則其不率教如是之乆苟非舜之至仁盛徳能涵養之於七十載之久則三苗之滅亡也蓋旋踵矣左氏傳曰太岳三塗陽城太室荆山終南九州之險也是不一姓蓋恃其險以為國者未有不亡者也厥土惟黃壤厥田惟上上厥賦中下此州之土以色言之則黃以性言之則壤厥田惟上上田在九州中最為上等也凡天下之物得其常性者最為可貴土色本黃此州之土黃壤故其田為上上而非餘國之所及蘇東坡嘗與朱勃遜之㑹議或言洛人善接花歳出新枝菊品􅀹多遜之言曰菊以黃色為正餘皆鄙東坡曰昔叔向聞鬷蔑一言得其為人予於遜之亦云蓋天下之物惟得其本性則為可貴學者觀此可以有志於本矣然此州厥賦中下者賦第六也田上上而賦中下人功少也唐孔氏曰此州與荆州賦田升降皆較六等荆州升之極故云人功修此州降之極故云人功少其餘相較少者從此可知也王制曰凡居民量地以制邑度地以居民地邑民居必參相得也則民當相準而得有人功修人功少者記言初置邑者可以量之而州境闊逺民居先定新遭洪水存亡不同故地勢有美惡人功有多少治水之後即此為差在後隨人多少必得更立其等此非永定也此説是也然其謂此差與夫立其等則似制賦之時有此九等之差其説亦未為盡矣厥貢惟球琳琅玕浮于積石至于龍門西河㑹于渭汭爾雅曰西北之美者有崐崘墟之球琳琅玕焉蓋雍州之物産其可以充貢者惟有此而已球琳美玉琅玕石之似珠者也浮于積石至于龍門西河㑹于渭汭積石山在漢金城郡西南河從西來至于積石則北流千里而南乃厎于龍門西河蓋此州將欲至于帝都自積石至于西河皆浮舟以達也九州之末載通於帝都之道皆以達于河為至蓋帝都介于三河之間達于河則至于帝都矣雍州既曰浮于積石至龍門西河矣而又曰㑹于渭汭學者疑焉唐孔氏以謂從河入渭自渭北涯逆水西上言禹白帝訖從此而西上更入雍州界也諸州之末惟言還都之道此州事終言發都更去明諸州皆然也此說為迂諸儒之說皆不通以某之所見此州之達於帝都有二道浮于積石至于龍門西河者一道也自渭汭以達于河者又一道也渭汭之道亦厎于龍門西河故以㑹言之非是至于龍門西河矣乃始㑹于渭汭也織皮崐崘析支渠搜西戎即叙織皮亦猶梁州之織皮也崐崘析支渠搜顔師古以為三國唐孔氏以渠搜為二并崐崘析支為四國此二說不同當從顔氏之說漢朔方有渠搜縣禮三朝記曰北發渠搜南撫交趾以渠搜對交趾則渠搜為一國也明矣崐崘在臨羌西析支在河關西渠搜者水經曰河自朔方東轉經渠搜縣故城北則渠搜蓋近於朔方之地此三國者皆西戎之種故作書者既言崐崘析支渠搜於上遂以西戎即敘總括於下蓋此西戎之三國既以就功遂獻其織皮也而王子雍乃以西戎為西域與崐崘析支渠搜並列為四此說不然西邊之夷總名曰戎王制曰西方曰戎職方氏曰四夷八蠻七閩九貊五戎六狄以是知曰西戎者蓋西夷種族之總稱也漢之西域亦是總三十六國而言之不可與崐崘析支渠搜並列為四也言西戎即敘者以見禹之功非特於中國而其至仁厚澤亦且及於貊也蓋禹之治水惟務順其勢而利導之如弱水黒水既決之於塞外不使為中國患也然必順其勢而導之以歸於流沙南海此三國者水所經之國當夫弱水黒水既有所歸則此數國亦免於昬墊之患此蓋以四海為壑等視華夷之民不以中國之患遺之於夷狄記其功至於西戎即敘然後得見其為仁徳之大也漢光武在邯鄲時赤眉未平趙璆王子林說光武曰赤眉在河東若決河水灌之百萬之衆可使為魚光武不答蓋聖人之愛人無有彼疆此界之殊禹視西戎之民無以異於梁州之民光武視赤眉之衆無以異於漢之衆此天地之所以為大也梁州言織皮在於厥貢之下此州言織皮在於浮于積石至于龍門西河㑹于渭汭之下其文有先後之不同蘇氏以謂崐崘析支渠搜三國皆篚織皮但古語有顛倒詳略爾其文當在厥貢惟球琳琅玕之下其浮于積石至于龍門西河㑹于渭汭三句當在西戎即敘之下以記入河水道結雍州之末簡編脫誤不可不正某竊謂不然經之所敘有先後之不同者皆是據當時事實而言之也如九州備載山川澤浸與夫治水曲折皆在賦貢篚之上獨冀州厥賦厥田之下有恒衞既從大陸既作二句此亦是總當時事實而言之耳必如蘇氏之說則冀之恒衞既從大陸既作亦當屬於覃懷厎績至于衡漳之下矣某嘗謂蘇氏解經多失之易易故多變易經文以就巳意者若此𩔖之謂也尚書全解卷九
