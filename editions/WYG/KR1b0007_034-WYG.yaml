body:
  text: 尚書全解卷三十四宋林之竒撰多方周書惟五月丁亥王來自奄至于宗周周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知洪惟圖天之命弗永寅念于祀惟帝降格于夏有夏誕厥逸不肯慼言于民乃大滛昬不克終日勸于帝之廸乃爾攸聞厥圖帝之命不克開于民之麗乃大降罰崇亂有夏因甲于内亂不克靈承于旅罔丕惟進之㳟洪舒于民亦惟有夏之民叨懫日欽劓割夏邑天惟時求民主乃大降顯休命于成湯刑殄有夏惟天不畀純乃惟以爾多方之義民不克永于多享惟夏之㳟多士大不克明保享于民乃胥惟虐于民至于百為大不克開乃惟成湯克以爾多方簡代夏作民主愼厥麗乃勸厥民刑用勸以至于帝乙罔不明德愼罰亦克用勸要囚殄戮多罪亦克用勸開釋無辜亦克用勸今至于爾辟弗克以爾多方享天之命奄即淮夷也上篇逸書之序皆言踐奄則是成王之東伐淮夷所㓕者奄也而下篇周官之序遂言㓕淮夷以是知奄即淮夷之一種總而言之則謂之淮夷别其國名則曰奄考之春秋赤狄之有潞氏甲氏留吁舒之有舒蓼舒鳩正如淮夷之有奄也當成之初即位周公之攝政奄盖嘗與武庚三叔興兵以共爲唇齒而間王室矣觀大誥序言三監及淮夷叛而多士有曰昔朕來自奄予大降爾四國民命則知當時所謂淮夷叛者即奄也今成王既即政而奄又叛焉盖周自文武興於西土而化行於南故西夷最先服而東夷之服爲最後是以武王牧野之戰方與紂决勝負於行陣之間而西南夷之邦所謂庸蜀羗髳㣲盧彭濮者已皆作使而成王之即政天下已太平矣東夷之奄猶興兵以叛也當周公之攝政則奄之叛也周公征之及成王之即政則奄之叛也成王征之成王之征之也以其恃逺不賔故屢叛命既討平之則遷其君而居於蒲姑蒲姑齊地也使之宻邇中國以教化之故也既自奄而歸在於宗周之鎬京諸侯皆來朝㑹周公稱王命以誥庻邦之諸侯故作此篇盖當周公之攝也淮夷以武庚有興復之志三叔有流言之禍遂與之相搆以爲亂周公雖討平之而以殷之頑民遷於成周然當淮夷之再叛殷人不能無覬覦之心故作此篇以告之言桀紂之所以亡商周之所以興明天命之不可不畏汝當遷善逺罪毋懐反側以自速罪戾也盖此篇與多士之意同然多士之所誥者殷之頑民而此篇之所誥者併於多方諸侯唐孔氏曰自武王伐紂及成王即位新封建者甚少天下諸侯多是殷之舊國其心未服周家由是奄君重叛今因㓕奄新歸故告天下諸侯以興亡之戒欲令其無二心也語雖普告天下意在殷之舊國此説是也五月丁亥先儒以爲歸政明年之五月按多士之𤼵首曰惟三月先儒以爲致政明年之三月然周公既成洛邑而後歸政洛邑之營以攝政七年之三月而歸政在其十二月則以明年三月遷殷頑民於成周其年月有所考按此篇有曰今爾奔走臣我監五祀我監者即所謂監我士師工也周公歸政而後監我士師工既臣於我監五祀則非明年之五月矣世代遼遠不可得而考也先儒又言淮夷奄叛魯征淮夷作費誓王親征奄㓕其國則是以魯之征淮夷與成王踐奄同時此非也盖先儒既以周公歸政而命公之後封伯禽於魯故以魯征淮夷爲在歸政之明年按伯禽之封於魯久矣非在周公歸政之日也世家曰伯禽即位之後有管蔡等反淮夷徐戎亦並興伯禽率師伐之於費作費誓由此觀之則魯之征淮夷不與成王之踐奄同時先儒言之非也王來自奄至于宗周即序曰成王歸自奄在宗周也宗周鎬京也詩云赫赫宗周褒姒滅之皆指鎬京而言周公曰王若曰者周公以王命告也漢孔氏曰稱周公以别王自告唐孔氏曰王肅云周公攝政稱成王之命以告及還政稱王曰嫌自成王辭故加周公以明之然多士之篇王若曰之上不加周公曰者以彼上句云周公初于新邑洛用告知是周公故也此説皆是猷者𤼵語之辭先儒曰順大道告四方若字在曰之上猷字在曰之下而以若爲順以猷爲道言順大道其説鑿矣此盖將以告四國多方之諸侯故發語而有此言也殷侯尹民言殷之諸侯正民者唐孔氏所謂天下諸侯多是殷之舊國者也既言告爾四國多方而又特言殷侯尹民唐孔氏所謂語雖普告天下意在殷之舊國是也我惟大降爾命所謂成王既黜殷命也盖紂雖㓕而武庚尚封於殷之故都則殷命未降及武庚以叛見殺殷之故都無復湯之子孫是爲大降爾命也我之所以大降爾命者盖以武庚忘我周之大徳而逞其不軌之謀故不得已而誅之此乃爾之所親覩爾無不知之也意謂武庚之亡乃天之命爾當備知之矣於是以桀紂之所以失天下者委曲以訓之以見夫興廢存亡皆有天命而天之所以予奪者又皆係其君之如何耳不可以僥倖求也此惟圖天之命謂桀也言桀大惟謀天之命欲天之永顧于我夏家桀雖有圖天之志而不知所以圖天之道故不能長敬念祭祀之事嘗考之詩如曰邛盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庻無罪悔以迄于今盖先王之於祭祀内盡其誠外盡其物洋洋乎如鬼神之在其上在其左右故天錫之以福而萬世不絶三百篇之中其歌詠福壽之綿長未有不自於祭祀桀欲圖天之命而不敬念祭祀之事是却行而求及前人也桀雖不能敬念祀事而天猶降格而向之譴告警戒欲扶持而安全之桀則不知天戒之可畏大爲逸豫不肯爲憂民之言夫有憂民之言未必有憂民之心桀尚不肯爲憂民之言則無憂民之心可知矣乃大爲滛昏之行於天之道不能勸勉於終日之間欲其終日且不可得况於朞月乎况於終身乎廸道也天之道者道之大原出於天故也此皆爾之所聞盖武庚之事則爾殷侯見而知之故曰爾罔不知桀之事則爾殷侯聞而知之故曰乃爾攸聞也麗先儒作平聲讀施也謂所施政教不若只作如字讀薛氏曰麗與離麗也之麗同陳少南曰麗附也皆是也夫天視自我民視天聽自我民聽民之所附天未有不眷之也民之所去天未有不釋之也桀不明於民之所以附則其德無以得民心其何以得天之心乎乃欲圖帝之命其可哉盖有得天之道雖無求於天而福壽自至無得天之道則雖汲汲以圖之天豈可以圖而得哉而説者亦以圖天之命圖帝之命曰天曰帝從而爲之分别亦鑿也既不能明民之所以附故乃大降刑罰以斬艾其民是崇亂於有夏也崇亂者猶言長惡也甲始也言桀之亂自内而始也夫言天下之治者自身修而後家齊家齊而後國治國治而後天下平及其亂也亦然盖亦自身而及家自家而及國自國而及天下故其始在内也旅衆也舒惰也盤庚曰古我前后罔不惟民之承論語曰使民如承大祭民雖卑弱不可以不善承之也五子之歌曰皇祖有訓民可近不可下爲人上者奈何不敬禹之所以訓其子孫惟以民之所係者重不可不敬也桀不能善承於衆則其不遵祖訓甚矣桀之不能善承於衆則罔大進於㳟徳而惟大惰于臨民則其㳟德何以大進㳟德不大進則安能善承于衆乎惟是有夏之民饕餮者忿懫者加欽崇而尊用之與之劓割夏邑劓割者言其戕賊之政如劓割然也饕餮者則必厚賦重歛以傷民之財忿懫者則必嚴刑峻治以殘民之命此其所以爲劓割夏邑也盖桀之所以肆其虐政者非獨一人也其左右前後無非小人故其虐政浸滛於天下則斯民不自聊生必將並告無辜于上下神祗故天於是鑒萬方而求爲民主者也天之愛民甚矣必不使一人肆于民上棄天地之性以從其滛其時惟湯之一德可以享天心故天降明羙之命于湯使王天下而刑絶有夏使不得保其社稷也惟天不畀純言天之不與桀者大矣純與天惟純佑命事雖異而意則同天之所以不畀桀者盖桀不能以四方之義民長久以多享國祚也夫義民者用之則安富尊榮以享箕翼之壽桀雖有義民而不能用故亦不克享國惟夏所㳟敬之多士大不能明保享于民之道盖夏之多士貪饕忿懫豈能明此哉保享于民謂安民而以之享國長久也義民則明于保享之道饕懫是用則宜其不永矣此多士者惟相與爲虐以毒斯民凡百所爲大不能明故成湯以是時而興乃以天之多方簡求可以代夏者惟湯上當天意故代夏而作民主湯之所以能作民主者盖以湯謹其民之所附者以推之於民故民莫不胥勸既有以使民之附矣雖其民之䧟於刑者亦不以爲怨皆用勸也自成湯以後至於帝乙無不明德而謹罰而民亦皆用勸夫明德者固所以使民勸至於刑罰豈亦使之勸哉盖先王之於刑罰謹而行之出於不得已故刑一人而天下莫不洗心滌慮以遷於善故其刑罰之行察其要辭以其罪而殄戮之以其無辜而開赦之無有不勸者矣今至於爾君紂則不能率乃祖之所行故不能以爾多方而享天之命盖德之不修則雖有多方而不克享徳之修則雖七十里而可以王也惟紂之所以至於滅亡者無非自取之也爾多方其可以有他志哉無逸論中宗髙宗祖甲享國之永自是厥後立王生則逸不知稼穡之艱難亦罔弗克壽或十年或七八年或五六年或四三年其言商之賢君惟三宗而已則其餘無非辟王也多士則自成湯至於帝乙罔不明徳恤祀多方則曰自成湯至于帝乙罔不明德謹罰則是由紂以前無非賢王也盖與成王言則責其難不如三宗之享國不足稱也與商民言則樂道前王之善苟能克紹成湯之基緒而不至失墜者皆可稱也讀書者苟不以意逆志則是周公之言自相違背不足以爲萬世之訓矣嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷乃惟爾辟以爾多方大滛圖天之命屑有辭乃惟有夏圖厥政不集于享天降時䘮有邦間之乃惟爾商後王逸厥逸圖厥政不蠲烝天惟降時䘮惟聖罔念作狂惟狂克念作聖天惟五年湏暇之子孫誕作民主罔可念聽天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方今我曷敢多誥我惟大降爾四國民命爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熈天之命爾乃廸屢不靜爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜此篇陳桀紂之所以失天下商周之所以得天下以誥多方之諸侯意謂天之所奪非人力之所能支天之所予非人力之所能移而其所以或予或奪者又係其徳不德如何耳汝多方諸侯當謹於奉上以順天命不可以有他志也前既言桀之失德而天命湯以代夏作民主雖繼之以紂之弗克以爾多方享天之命而紂之所以墜厥命周之所以受厥命詳言其所以然之故使多方諸侯知天之棄商而不可復興則自此以下是也言天之䘮夏非天有意以用釋之也桀自取之耳其䘮殷也亦非天有意以用釋之也亦紂自取之耳盖謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以禍桀紂貴爲天子富有天下纂數百年之基緒而乃䘮國亡身覆宗絶祀者其於禍敗盖自己求之天但應之而已故天之所以釋有殷者乃以爾之君以此多方之衆而欲謀天之命使其永眷顧於我殷家綿綿延延歴千萬年而不絶而乃大有滛佚之行此豈可以謀天命哉夫既奄有多方之衆則是天命未改使其能懐戒謹之心以修厥德則雖不切切然以謀天命盖未艾也既大爲滛佚矣則雖欲以多方而圖天之命多方豈可以常有而天命豈可以圖而得哉大爲滛佚固不可以圖天之命而又屑屑有辭此又尤天之所怒也説文曰屑動作切切也言其動作屑屑然而皆爲之辭説以自解釋也王嘉曰動民以行不以言應天以實不以文下民細㣲猶不可詐况上天神明而可欺哉大滛者固非所以得天而屑有辭者又益禍而促亡也史記言紂資辯㨗疾智足以拒諫言足以飾非而武王數其罪亦曰謂已有天命謂敬不足行謂祭無益謂暴無傷祖伊以西伯戡黎之故奔告于紂紂則曰我生不有命在天則其屑有辭紂盖優爲之也雖則有辭自欺可也天其可欺乎桀之矯誣上天紂之屑有辭自古亂亡之君若出一轍也不集于享即上文不克永于多享大不克明保享于民言其享國之效於此不遂矣有夏之圖其政而乃不集于享則其政暴虐不足以得民心故也故天降是䘮亡以禍之然天之䘮亡也必假手於人故湯自有邦諸侯間而取之也夫社稷無常奉君臣無常位自古已然桀有天下而不知所以保天下之道則湯自一邦而間之何者天子諸侯無常位也然湯亦豈有意於間夏哉盖天之命爾前既言紂之失徳此復言之者將極陳紂之䘮亡以明周之當有天下故畧舉湯之代夏以明周之代殷亦然也商之後王紂不思帝乙以前明徳謹罰以克保成湯之基緒而不至失墜乃惟沈湎滛佚是務以逸於逸焉逸厥逸者甚言其逸若醇乎醇之謂也其圖厥政也則惟穢徳之彰聞而其不潔也久矣故天降是䘮亡以禍之紂之圖厥政而不潔是亦桀之圖厥政而不集于享天之所以皆降時䘮也蠲潔也烝久也毛氏傳曰烝寘也而鄭箋爲久古者聲寘塡塵同正儀曰傳訓烝寘也故轉寘爲久而釋詁曰塵久也乃作塵字故箋辨之古者寘塡塵三字音同可假借而用之故也天惟五年須暇之則其不蠲也久矣惟聖罔念作狂惟狂克念作聖此言天之所以須暇商之子孫也夫聖之與狂其相去不啻千萬里之逺而聖乃可以作狂狂乃可以作聖者特在念不念之間耳書曰思曰睿睿作聖孟子曰心之官則思思則得之不思則不得也以是知念不念之間聖狂之所以分也苟其質之聖矣自恃其聖而不之思則日復一日天命之性益就彫䘮其作狂也何有苟其質狂矣自耻其狂而思之日復一日天命之性忽然而復其作聖也何有惟不念耳如太甲之初立不明乎徳欲敗度縱敗禮以速戾于厥躬豈啻狂而已哉及伊尹放之於桐致之憂患之地而發其憤悱之思遂能處仁遷義爲商太宗周公作無逸之書以戒成王以之與文王並列爲廸哲之君囬視未放于桐之前相去豈不甚逺以太甲觀之則狂而克念者其作聖可必也故紂無道而天猶寛以待之至於五年罪惡貫盈不自悛革而後之䘮亡者欲其自狂而克念以作聖也則天之仁愛於紂欲扶持而安全之豈不至哉夫以紂之滛酗肆虐武王有應天順人之志而猶寛以待之冀其改過者武王忠厚之心也而以爲天者武王之所以爲天實使之也須待也暇寛也須暇者待之以寛也須暇之子孫謂湯之子孫盖指紂也五年者先儒謂服䘮三年還師二年蘇氏亦從此説夫觀兵之説予於㤗誓已辨之詳矣㤗誓序言惟十有一年武王伐殷盖武王即位之十一年若從先儒之説則是即位之五年克殷也此所謂五年正猶武成之所謂九年也武成之所謂九年者意者武王未崩之前九年盖亦以紂之惡可伐而不忍伐之故大統未集也此所謂五年者意者武王未克紂之前五年盖亦以紂之罪惡爲可伐而猶冀其改過故須暇之也由是觀之周之伐殷豈得已而不已哉晋武帝以孫皓滛暴有問罪之志其臣羊祜則曰孫皓暴虐已甚於今可不戰而克若皓不幸而没吳人更立令主雖有百萬之衆長江未可窺也王濬則曰孫皓荒滛宜速征伐若一旦皓死更立賢主則強敵也此言正春秋時晋伯宗所謂後之人或者將敬奉徳義以事神人而申固其命若之何待之也盖其意以區區之仁義不足以易吾之大計也晋武帝之心則惟恐吳之有賢主而我不得以逞其欲武王之心則惟恐紂之不能改過人之度量相逺一至於此不觀於晋武無以知武王之爲至徳也武王寛以待之五年矣而紂自以爲我大作民主矣何所慮哉故其言行無可念聽者誕作民主即所謂我生不有命在天也董仲舒曰晏然自以如日在天正此也紂既無可念聽故天求爾多方諸侯之賢者俾之代殷大動以威而開其能顧天者能顧天則命集之矣顧天與顧諟天之明命之顧同言其起居動作未嘗忘之若上帝之在其左右也大動以威者李博士曰天之釋商豈得已哉大動以威則非小變也是也開者天誘其衷也天求其能顧天者而爾多方諸侯無有一邦可以堪顧天之道者言皆不勝其任也其時惟我周王知民之爲貴而善承于衆不敢忽慢能堪於用徳以治天下可以爲天地社稷宗廟鬼神之主故天用教我周以用休而使膺受多福簡擇於多方而以殷之命與之爲多方之君也王博士曰天教周王以用休猶所謂天誘其衷也是也即上所謂開也桀之失徳也天監于萬方眷求一徳俾作神主而湯以一徳之故乃受天命以有九有之師紂之失徳也天求爾多方開厥顧天而武王以用徳之故乃畀殷命以尹爾多方由此觀之則湯武之事豈得已而不已哉盖適當天心之所眷顧故不得不以征伐爲己任也使桀紂能守其祖宗之基緒則我豈間而取之哉使多方之諸侯其徳有可以當天意者則天命必不捨彼而私於我也惟殷周之廢興皆有天命則我今豈敢惟務諄諄然以此多告汝哉我之大降管叔霍奄之四國民命而黜之者惟其自作孽而已爾當戒之何不以誠信之道優游雍容寛而行之於爾多方四國之所以至於降其命者惟其不信故也爾何不爲我周王之夾輔介助賛襄其君以至於治以享天之命今爾雖殷之諸侯而尚得以居爾之居畋爾之田是汝不失其舊物則我於爾非無恩也爾何不順王而廣天之命乎宅爾宅畋爾田謂多方諸侯奄有其舊之封彊食其舊之田畆也熈廣也今汝乃怙過不悛我所以順廸汝者屢矣而猶未能安靜以順上之命則以爾心未仁故也爾苟有仁心則能居易以俟命矣其有不靜乎爾乃不大宅於天之命而有覬覦反側之慮則是爾乃動作切切然以播摇天命是爾自作不常之事我將謀爾之信於正道故惟以言語教告汝使汝曉然知善之可爲而不善之不可爲教告之而不從則我惟要囚於汝以戰恐之使汝有畏而後遷善逺罪也至于再至于三則汝宜知過矣而乃猶不服我黜爾四國民命之事則是汝怙終而不順其上我則以大伐而殺汝也非我一人所持之徳不使爾康寧故使爾䧟於刑戮乃爾之自召其罪也夫多方之諸侯廸之之屢而猶不靜至於屑播天命使周不以教告而徐譬之遽納之于刑則是周之秉徳不康寧也苟教告而不從則要囚之要囚之而又不服此豈可置而不問哉故必至於大罰殛之而後已今爾多方諸侯苟能夾介周王而宅天之命則雖要囚猶可以免而况於大罰殛乎故以此言誘而進之使之有所愧亦有所畏而後無他慮也王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀越惟有胥伯小大多正爾罔不克臬自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事爾尚不忌于凶徳亦則以穆穆在乃位克䦧于乃邑謀介爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾廸簡在王庭尚爾事有服在大僚王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗大遠王命則惟爾多方探天之威我則致天之罰離逖爾土王曰我不惟多誥我惟祗告爾命又曰時惟爾初不克敬于和則無我怨自此以上皆是徧告爾多方之殷侯欲其安於天命而不可以懐反側之心以僥倖天下之有變自此以下又所以戒勑殷之遺多士也殷多士者即自衛之故都遷于成周以宻邇王室者觀此以下文言今爾奔走臣我監五祀則此所語正指殷之多士而乃曰告爾四方多士正如康誥之篇正告康叔而曰大誥侯甸男邦采衛也唐孔氏曰因告四方諸侯遂告成周之人徧使諸侯知之是也武王之㓕殷而封武庚於其故都也則使三叔監之三叔既挾武庚以叛而周以殷之多士遷于成周使宻邇王室適當周公之歸政故使周公爲之監焉所謂監我士師工是也我命周公監汝多士而汝多士奔走不倦以臣事於我所立之監者於今五年矣商曰祀周曰年成王之祀者以其誥殷多士故也先儒以五祀爲五年無過則還本土盖先儒以此篇之作在於成王即政之明年五月則未有五祀之期故其說不得不如此唐孔氏遂從而爲之說曰五年再閏天道有成故期以五年無過則得還本土以民性重遷設期以誘之其支離一至於此先儒於多士篇亦曰庶幾還有此本土又曰由洛修善得本土有幹有年夫周公既遷殷頑民而又欲使之還本土此事無所經見多士曰爾厥有幹有年于兹洛此篇曰乃此時洛邑尚永力畋爾田曰有年曰永力皆謂其能遷善逺罪則其子子孫孫永居洛邑而不絶不然則離逖爾土矣尚安得有年乎安得永力乎經以爲有年于兹洛洛邑永力則必無還本土之言先儒之說盖臆見也胥相也伯長也謂於汝多士之中爲之長者是相長也正亦衆官之長或小或大皆有其長故曰多正顧氏以相長事即小大衆正官之人是也爾之臣於我監既五年矣於惟有相長以爲小大之正者當爲多士之表率爾無不能守法也其有身而驕淫矜誇自作其不和者爾小大多正當有以和之也其於有家而乖争陵犯自作其不睦者爾小大多正亦當有以和之也爾邑者總謂成周之地所遷之頑民一邑之内也自作不和則失其所以修身之道爾室不睦則失其所以齊家之道而爲之長者又無以和之使其徳歸厚則爾邑何自而清明哉惟其不和不睦者有以和之使其易直子諒之心油然而生而鄙詐慢易之氣不可得而入則人人有士君子之行此爾邑之所以明也爾邑之明是爾之能勤於事也夫吉人爲善惟日不足凶人爲不善亦惟日不足而好善惡惡者天下之常情也則凶徳者盖人之所忌惡焉夫自作不和爾室不睦皆凶徳也爾能去其不睦之習而反之於善則不以凶徳而見忌故曰不忌于凶徳也爾之能勤於事則爾庻幾不以凶徳而見忌亦則以和而在位也穆穆和也和則無凶徳矣修身而身以和齊家而家以和夫何凶徳之有我能閱視爾邑而謀助於爾則自此洛邑庻幾永逺致力以享其土田之奉焉考之王制天子之田方千里公侯田百里伯七十里子男五十里至於天子之公卿大夫士以及諸侯之臣其土田皆有等差故此篇上言畋爾田謂諸侯之所有者也此言畋爾田謂多士之所有者也天惟畀矜爾者言爾能以和而在位則天當有以畀汝憐汝也天既畀矜於爾則我周亦當有大助爾大賚爾我周之所爲視天而已矣然天之畀矜我周之大賚者盖於汝多士廸而進之簡而釋之使在王廷庻幾有服行爾事而在於大僚者盖既廸之簡之故其才徳可以處大僚之任者則使之服行爾事也自古人君之革命建國與夫掃平僭叛者豈以其所用之人槩不足取哉盖亦擇其可用者而用之不以彼此而有分别也光武之平公孫述述將有才幹者皆擢用之曹操之滅袁氏多辟青冀幽并名士以爲椽屬其破荆州條品州人優劣皆擢而用之劉備之降劉璋董和等璋之所授用也呉懿等璋之姻親也彭義璋之所擯棄也劉巴宿昔之所忌恨也皆處顯任盡其器能盖用人之道惟其賢而用之彼之臣耶賢則用之吾之臣耶賢則用之周於殷之多士而未嘗廸簡之者不賢故也其賢則雖大僚亦將使之服行爾事而况其下乎故周以此誘之使之遷善也成王又謂爾多士苟不能更相勸勉以信用我之命爾亦則不能奉上矣夫我之所以命汝者優游饜飫丁寧委曲欲其心曉然知趨舍之塗豈欺汝哉爾以我之命爲信然而相率以蹈行之則奉上之道得矣不克勸忱我命則是不克享也爾不克享則凡民化之亦皆無奉上之心矣乃爾惟逸豫惟爲頗僻自暴自棄以歸於小人之域夫逸豫頗僻者豈天所以命之之意哉則是爾大廢王命而不能奉承之也大廢王命則天之威將加於汝汝之於天之威乃自取之也故曰探天之威夫天之於人也其災祥禍福豈有所擇哉在人者於己取之而已矣天之畀矜非天私子之也以爾多士之穆穆在位故也天之威非天偏疾之也以爾多士之大逺王命故也無不自已求之者也爾既有以取天之威則我奉天之罰而致之於汝離逖爾土而逺徙之矣夫以殷之多士預於武庚之亂以間王室武庚既誅則其黨姦同惡之人雖不可以盡誅亦當投諸四裔以禦魑魅然後爲絶後患周則不然不忍以不教之民而致天之罰故不徒不徙之逺方而乃遷之成周以自近焉既遷成周矣而猶不率教則必將使爾離逺於爾之本土而移之於遐裔也然其移之於逺也豈成周之私意哉有徳者天之所命人君則制爲五服以章之凡以助天而已有罪者天之所討人君則制爲五刑以用之亦以助天而已故爾多士之穆穆有位則天所畀矜周之介賚以助天之畀矜也大逺王命則天之所罰周之離逖以助天之罰也天之賞罰不假手於人則不成故也言豈惟譊譊然以多誥於汝哉我之所以命汝者皆致敬而告於爾我以敬告爾其可以不敬受哉又曰者陳少南曰承上文而言之也是也我之敬告爾以命者惟欲爾之和而已苟不能敬受則是爾之初已不能敬受于和之道離逖爾土之罰自此而降矣皆爾有以取之爾無我怨也殷於夏之遺士廸之簡之而列於百官周之於殷不然殷士以爲怨也而况於離爾土乎然我之予奪皆本於天天之予奪皆本於爾多士爾多士不可不自反也以爲怨則非也畢命曰昔周公毖殷頑民遷于洛邑宻邇王室式化厥訓多士暨此篇皆訓之之辭此其所以化也殷周俱征伐得天下殷既革夏邦家輯寧身致太平雖太甲昏庸伊尹放之于桐攝政三年而下不變及武王克商未幾周公相成王而管蔡挾武庚以叛殷人響應周公討而平之遷其頑民於成周使宻邇王室成王即政而奄又作亂殷人不無覬覦之心周公又作此篇以誥之者盖桀雖不道惟㓕徳作威以殘害于百姓湯舉大義而伐之東征西怨南征北怨攸徂之民室家相慶曰傒我后后來無罰惟桀之民困於虐政無與桀共惡者其望成湯若大旱之雲霓此所以身致太平至紂之罪則浮于桀矣觀畢命曰商俗靡靡利口惟賢餘風未殄惟利口之俗至于康王歴五十餘年而尚未殄以此見紂於其民不惟肆其威虐而其智術機巧又有以漸漬商民之心術使與之同惡相濟以毒萬方書之所載如乃惟四方之多罪逋逃以爲大夫卿士又曰爲天下逋逃主萃淵藪又曰紂有臣億萬至于牧野之戰所率以抗武王之師者其㑹如林紂雖㓕而其餘民甚衆既其心術丕變於紂之惡此其所以廸屢不靜歴數世而餘風未殄向非有多士多方之篇明言利害以曉譬之而又以周公君陳畢公爲之師長其爲患可勝言哉尚書全解卷三十四
