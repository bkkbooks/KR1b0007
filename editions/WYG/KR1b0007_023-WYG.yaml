body:
  text: 尚書全解卷二十三宋林之竒撰牧誓周書武王戎車三百兩虎賁三百人與受戰于牧野作牧誓牧誓武王以戊午之明日己未𤼵于孟津越四日癸亥周師陳于商郊明日甲子武王乃至將與受戰于牧野師既定矣於是杖黄鉞秉白旄而誓之以肅其進退擊刺之節而示之以弔伐弗迓克奔之意蓋其所誓者又在於泰誓三篇之外不可以無别也史官以其誓師于牧野遂以牧誓二字為篇名正與費誓同皆是指其所誓之地也戎車三百兩虎賁三百人此蓋周師陳于牧野之全數也史記孟子皆作三千人諸儒多以史記孟子之言為信而以此序為誤其意蓋以謂戎車三百兩不應但有虎賁三百人也某竊以為當從此序之所載古者虎賁之士必擇其驍勇有力之人為之朝夕在王之左右以為宿衛兵也周官虎賁氏掌先後王而趨以卒伍其屬有虎士八百人當周之盛時纔有虎士八百人則其伐殷之時而有三百人固其理也成王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外則是虎賁之士蓋其宿衛之官所以輔從乗輿者也牧野之戰而至有虎賁三百人已為盛矣則其文雖與戎車三百兩相接其實在戎車之外也非戎車所載之人也其戎車所載之人其歩卒則已在三百兩之中矣古者兵車一乗甲士三人歩卒七十二人言戎車三百兩則甲士與其歩卒皆可見其數矣而虎賁三百人則是王之爪牙勇力之士在王左右以為之輔衛其有三百人已為多矣安得尚以其少而以為有三千人邪以是知史記孟子之言誤矣漢孔氏曰一車歩卒七十二人凡二萬一千人據其數當有二萬一千六百人不言六百者蓋古者記載之辭惟緫其數而畧其小猶詩有三百六篇但言詩三百也據舉全數而云二萬一千人者此蓋出於漢孔氏之意從古文而云爾而今文孔氏注於二萬一千人之下乃加舉全數三字此蓋出於後世儒者之所箋注以𤼵明孔氏之意非其本文也而後世𫝊寫者誤以相屬遂以為先儒之語何不思之甚邪夫孔氏省六百字而乃加舉全數三字以釋其義此必無是理也唐孔氏又以謂司馬法六十四井為甸計有五百七十六夫共出長轂一乗甲士三人歩卒七十二人至於臨敵對戰布陣之間則依六卿之法五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍則一車七十二人者自計元科兵之數科兵既至臨時配割其車雖在其人分散前配車之人臨戰不得還屬本車當更以虎賁甲士配車而戰故有百人此蓋欲緣􅎖先儒異同之文而為之說爾是說未可輕從也二孔氏其意蓋以謂虎賁三百人者即兵車所載之長也此蓋謂嘗深考虎賁氏以為宿衛官徒以三百人數而配合之牧野之戰諸侯各以其師來㑹而此但言戎車三百兩虎賁三百人但舉周師之數而不及諸侯之師者蓋牧野之戰以周師為主故也而蘇氏曰春秋時晋與齊戰皆七八百乗武王能以三百乗克紂者其徳與政皆勝且諸侯之兵助之者衆也此說是也夫周師為主而纔有戎車三百兩虎賁三百人則是諸侯以兵來㑹者亦不多也武王能鳩合諸侯寡少之師以執紂如林之衆豈與之較其區區之力哉故作序者舉周師之全數而繼之曰與受戰于牧野以見其在徳不在力也時甲子昧爽王朝至于商郊牧野乃誓王左杖黄鉞右秉白旄以麾曰逖矣西土之人甲子者戊午後之甲子也先儒以歴推之蓋是周之一月四日此言日而不言時者上本泰誓之文也昧爽將明而未明之時也武王於甲子之日將明而未明之時蓋詰朝而至商郊之牧野蓋周師所次之地漢孔氏曰紂近郊三十里皇甫謐曰在朝歌七十里二者不同未知孰是師既陳於牧野牧野乃與紂戰將戰而誓必在於未戰時於是左杖黄鉞右秉白旄以麾蓋所以示其將戰也漢孔氏曰鉞以黄金􅎖斧左手杖鉞示無事於誅右手握旄示有事於教據先儒解經但存大體未嘗故為鑿說至於此說不免於鑿爾蓋杖鉞秉旄但是所執之物各從其便豈屑屑然寓意於其間哉孔氏之說既以鑿矣王氏之說抑又甚焉其說有曰鉞所以誅旄所以教黄者信也白者義也誅以信故黄鉞教以義故白旄無事於誅故左杖黄鉞有事於教故右秉白旄王氏之說經未嘗肯從先儒之說至於此說則從非徒從之又從而推廣之惟其喜鑿故也以其喜鑿故於君子陽陽之詩曰左執簧左執翿以為簧所以為聲翿所以為容將隐而無所事於聲容故在左也信如此說則簡兮之詩亦是賢者不遇而作而曰左手執籥為其無事於聲可也至於右手秉翟則為有事於容乎王氏於此則無說以其說之不通故也故蘇氏於此篇則併與先儒而譏之以謂黄鉞以金􅎖也軍中指麾白則見逺王無自用鉞之理以為儀耳故左杖黄鉞秉麾非右手不能故右秉白旄此事理之常本無異說而學者妄相附致張為議論皆非其實凡若此者不取蘇氏此說可謂盡之矣武王既左杖黄鉞右秉白旄於是誓之曰逖矣西土之人逖逺也稱其行役之逺以勞來其來也王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髣㣲盧彭濮人稱爾戈比爾干立爾矛予其誓王曰古人有言曰牝鷄無晨牝鷄之晨惟家之索今商王受惟婦言是用昬棄厥肆祀弗荅昬棄厥遺王父母弟不廸乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今予𤼵惟恭行天之罰友邦冢君謂同志之諸侯御事司徒司馬司空則是同與治事之三卿當是時周尚為諸侯未有天子六卿故其行也但有此三卿而已漢孔氏曰治事三卿司徒主民司馬主兵司空主土指誓戰者唐孔氏曰於時已稱王而有六師亦應已置六卿今呼治事惟三卿者司徒主民治徒庶之政令司馬主兵治軍旅之誓戒司空主土治壘壁以營軍是指誓軍者故不及太宰太宗司㓂也據二孔之意謂㤗誓之篇有王乃大廵六師之言故有此說某竊以為不然康叔封於衛蓋諸侯之大國也而酒誥曰圻父薄違農父若保宏父定辟圻父司馬也農父司徒也宏父司空也則是古者諸侯之國降殺於天子六卿之制者則有此三卿周既未為天子則其但有三卿復何疑哉王乃大廵六師蓋指諸侯之師而言之某嘗詳論之於㤗誓矣亞次也旅衆也周禮曰施法於官府乃建其政立其貳設其攷陳其殷置其輔亞即所謂立其貳也小司徒小司馬小司空是也旅即所謂陳其殷殷衆士也師氏若大誥所謂尹氏而洪範曰卿士惟月師尹惟日師尹蓋又在卿士之下也千夫長百夫長蓋主兵者漢孔氏云師帥卒帥也據司馬法百人為卒以卒師為百夫長誠是也二千五百人為師以師帥為千夫長則不可要之千夫長百夫長皆是主兵之人但不可以合司馬法所載之言也庸蜀羌髳微盧彭濮人皆西南夷也唐孔氏曰文王國在於西故西南夷先屬焉蘇氏曰楚饑庸與百濮伐之庸即上庸縣濮即百濮也又楚伐羅羅與盧戎兩軍之蓋南蠻之屬楚者羌即先零䍐开之屬彭今屬武陽縣髳微闕觀蘇氏此說則知此數國者蓋是西南極邊之蠻夷也漢孔氏以為在巴蜀未知是否文王國於岐而化行於江漢之域故此數國者蓋服屬於周而預於伐紂之役也既歴舉所善之人於是使之稱爾戈比爾干立爾矛蓋王既杖鉞秉旄以誓則使聼誓者稱戈比干立矛以聼誓而戰故其儀如此稱舉也戈㦸干楯也矛亦㦸之屬長二丈唐孔氏曰戈短人執以舉之故言稱楯則並以捍敵故言比矛長立之於地故言立此蓋随宜相配而為文也武王既使陳于牧野之人咸稱戈比干立矛以聼誓矣於是遂誓之以所以伐紂之意而舉古人之言曰牝雞無晨牝雞之晨惟家之索蓋此篇數紂之惡惟論其用婦人之言以亂天下者故舉古人之言以謂牝雞無鳴晨之理使牝雞而鳴晨則其反常而妖孽家有此不祥則將索然而盡亦猶婦人而與於政事是亦不祥而䘮國之道也今商王受乃不悟牝雞鳴晨之為不祥而其為國則惟婦言是用用婦人之言遂至於為其所蠱惑聦明既喪無所不昬於是神棄其所陳之祀而弗荅蘇氏曰祭所以報本也故謂之荅昬於親親故棄其遺王父母弟不廸蘇氏曰王父弟及母弟皆先王之遺𦙍遇之不以其道此二者皆有家之所甚重而紂皆昬棄之而不廸鬼神當欽而不欽九族當親而不親則是於所厚者薄故惟四方多罪逋逃之人崇之長之信之使之或為大夫或為卿士使得以在髙位而暴虐于百姓而姦宄于商邑於所薄者反厚焉夫既曰崇又曰信又曰使又曰長蓋言其好用小人也自古無道之主將肆其殘賊則必招納多罪逋逃與之同惡相濟楚靈王為章華臺納亡人以實之蓋不仁之君其所好尚皆如此然而納亡人以實之猶未至於登而用之而紂則使為大夫卿士而居於民上此其所以肆其暴虐姦宄以重失斯民之心也紂之罪惡至於此極而推原其本則惟在用婦人之言故武王舉以誓師以見其牝雞鳴晨之祸為至慘也惟其平日惟婦言是用天怒於上民怨於下則武王不可不應天順人以恭行天之罰於紂而興此牧野之師也今日之事不愆于六歩七歩乃止齊焉夫子朂哉不愆于四伐五伐六伐七伐乃止齊焉朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮此蓋肅其進退擊刺之節也在易師之初六師出以律否臧凶蓋雖帝王之師其出也不可以無紀律也牧野之戰蓋决於甲子之日故肅之以紀律使整齊其部伍擊刺不使之争利以徼一時之幸也故使其進戰者則不過於六歩七歩乃止而相齊焉夫子朂哉者言此事實汝將士之所當勉也前曰夫子朂哉後曰朂哉夫子反覆其文以致其諄諄告戒之意猶曰鄰哉臣哉臣哉鄰哉爾將士之所當朂者冝奮其桓桓威武之志如虎如貔如熊如羆于商郊虎貔熊羆皆猛獸言其桓桓當如此獸之猛也雖其猛如此然紂之衆士有能來奔於我者當勿迎擊之惟使降者役屬我西土而已蓋武王之戰於牧野志在為民除害而不在於殺人以逞其志故其誓衆也使之不愆于六歩七歩乃止齊焉不愆于四伐五伐六伐七伐乃止齊焉蓋不欲其嗜利以輕進也雖使尚桓桓如虎如貔如熊如羆于商郊而又戒之弗迓克奔以役西土蓋不欲其殺降以重傷也惟其告戒之素如此故其戰也則罔有敵于我師前徒倒戈攻於後以北蓋周師之持重徐進而如林之旅自相攻擊倒戈以攻紂而周師實不血刄也朂哉夫子蓋又勉之以終其義也爾苟不能勉之如前之所云則汝之身有戮矣其曰爾躬有戮非武王嗜於殺人蓋臨戰而誓師其言不得不爾也詳此篇武王數紂之罪惟婦言是用豈非武王意紂之必亡無出於此也思齊之詩論文王之所以聖曰思齊大任文王之母思媚周姜京室之婦大姒嗣徽音則百斯男惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦此為文王之所以聖則紂之昬棄肆祀弗荅昬棄厥遺王父母弟不廸以至於暴虐姦宄遍天下而亡其國者豈不起於惟婦言是用乎故婦言是用紂之所以亡也案列女傳曰紂之好酒滛樂而不離妲己之所喜者賞之所憎者誅之長夜之飲妲己好之百姓怨望而諸侯有叛者妲己曰罰輕誅薄威不立耳紂乃重刑辟為炮烙之刑妲己乃笑夫紂為暴虐之甚矣而妲己尚且以為罰輕炮烙之刑使人遭枉刑至痛於膏火之中而纔足以供其一笑則其為不道又在紂之上矣文王雖能官人而大姒猶佐之以求賢審官紂為無道而妲己猶勸其為炮烙之法詩人以太姒之於文王為天作之合予於妲己亦云武成周書此篇所載自徃伐至於伐商之後𤼵政施仁之事首尾俱載非必主於武而言其以武成名篇者蓋書之名篇各随其史官一時之宜或述其所作之人或取其所因之事或指其所居之地或掇篇中之字以為名其體各有不同要之徒取是字以為簡篇之别耳本無意義存於其間此篇有越三日柴望大告武成之言故史官編序之時掇取武成二字以志其篇亦猶梓材以篇中有梓材之語非有取梓材之意也學者之於此能行其所無事無以鑿求之則聞見博而智益明矣此篇如漢孔氏鄭氏之說皆不必如此說也武王伐殷往伐歸獸識其政事作武成武成此篇蓋是武王克商之後史官記載其本末於㤗誓牧誓之外則為此篇以見其一時應天順人之大槩自往伐之初至於歸獸之後其所施設政事皆識於此識字當作音誌蓋謂紀其事也此識其政事主於史官而言漢孔氏云記識商家政教善事以為法其說非也惟一月壬辰旁死魄越翼日癸巳王朝歩自周于征伐商惟一月者即㤗誓所謂一月蓋周之正月商之十二月也周之正朔未建故不可以云正月其時日為周史記不可以追用商之正朔故但云一月蓋權時之義也壬辰旁死魄者正月之首也漢律歴志曰死魄朔也生魄望也蓋魄者形也是月之輪郭無光之處沈内翰曰月本無光猶銀丸日耀之乃光月之初生日在其旁故光倒而所見纔如鈎月漸逺則斜而光稍滿其形如銀丸者所謂魄也日月合為朔之後始受日光故明生而魄漸死至望後則明死而魄漸生故歴象以明魄之生死而定朔望弦晦然後日之甲乙始可得而推也旁近也一日為始死魄則二日為近死魄此所記載在於癸巳之日至王朝歩自周于征伐商不直言癸巳之日于征伐商而先言惟一月壬辰旁死魄者為歴起也蓋歴家之推歩尤難於日月合朔日月合朔既定則千載之日可坐而致也苟為但言日而不言朔以取正於月之明晦則歴象不可得而推非記載之體也故古者將記日之甲乙必先以日月之晦朔為定春秋書日食者三十六而其定晦朔必以日食為凖故杜氏長歴以日食推行則其月之在晦在閏皆可考也此法雖詳於春秋其實書之源流也既載旁死魄之日壬辰以見周之克殷其月辛夘日月交㑹于星紀之次以起周之歴矣於是繋之以征伐商之日以紀事也故繼之曰越翼日癸巳則武王朝歩自周于征伐商蓋於是月始興師而自周癸巳日興師而戊午日渡孟津則是二十五日也甲子克殷殺受則是三十一日也以至於下文丁未庚戌皆可以即此而推也後世如漢唐律歴志以其歴法推考無所不合由其事繋日日繋月故其有數存焉可得以歴而考也厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服此處先後說者極多惟唐孔氏依漢孔氏先後為說而其先後失次者與夫簡編之疑有脫逸則論其端而使學者以意逆志而自得焉此為得體但惜其論之有所未至也某今於此篇不敢輕有去取劉元甫王介甫程伊川孫元忠數家之說始依唐孔氏之意案唐孔氏所次嵗月日以謂癸巳王朝歩自周于征伐商正月三日也其月二十八日戊午渡孟津二月辛酉朔甲子殺紂其年閏二月庚寅朔三月庚申朔四月己丑厥四月哉生明謂四月三日辛夘也丁未祀于周廟蓋四月十九日也越三日庚戌柴望二十二日也庚戌日柴望矣而下文乃曰既生魄庶邦冢君暨百工受命于周豈有二十二日後乃復有生魄之文乎唐孔氏曰丁未祀于周廟已是此月十九日矣此受命于周繼生魄言之則受命在祀廟之前故祀廟之時諸侯已奔走執事豈未受周命而已助周祭乎明其受命在祀廟前則是唐孔氏於此先後之一序已覺其非矣然而又曰史官失其時日先言告武成既訖然後却說受命故文在下耳此則雖覺其非而亦未知其為失先後之序也以某所見當是武王既歸于豐偃武脩文歸馬放牛示天下弗服矣則既生魄庶邦冢君暨百工受命于周王若曰嗚呼羣后以下皆繫於此既告羣后以后稷公劉太王王季文王之徳而後率之以祀于周廟以至於柴望大告武成於理為稱然此篇見存者止於如此其間文勢或有脫逸不全者亦未可知雖疑其先後之次如此亦未敢以為必然之論也厥四月者既克商之年四月也哉始也始生明亦是初三日也前載正月三日則云惟一月壬辰旁死魄越翼日癸巳此載四月三日云哉生明蓋魄死明生其實一也特史官變其文耳武王既克商矣於是四月三日始自商還至于豐則弔民伐罪其事畢矣於是偃武修文樂記云武王克殷渡河而西車甲衅而藏之府庫倒載干戈包以虎皮天下知武王之不復用兵也㪚軍而郊射左射貍首右射騶虞而貫革之射息也此則偃武修文之事也既偃武修文示天下不復用兵則負重致逺之牛馬無所復用矣故於是歸馬于華山之陽放牛于桃林之野示天下以無復服乗此等物以從事於干戈之事也華山之陽桃林之野皆近豐之地蓋牛馬既不用矣則不復羈紲穿絡而縱之無人之境以適其性耳二孔之說大不然聖人之治天下使萬物各遂其性山川鬼神亦莫不寧暨鳥獸魚鼈咸若此有夏先后所以懋厥徳而罔有天災也今以示天下弗服之故而縱牛馬於乏水草非所長飬之地非聖人所以仁萬物之意也蘇氏又云華山之陽有川焉其地至險絶可入而不可出桃林之野在華山東亦險絶歸牛馬於此示天下弗服也此亦過論矣夫苟縱而不留則足以見其所無用武之心矣豈必擇其可入不可出之地乎苟其入而可以出則天下遂將不信乎此殆求之過也丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成既生魄庶邦冢君暨百工受命于周王若曰嗚呼羣后惟先王建邦啟土公劉克篤前烈至于大王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懐其徳惟九年大統未集予小子其承厥志丁未祀于周廟至大告武成此文當屬於予小子其承厥志之下盖武王既歸馬放牛示天下不服乗則其王業於是乎成矣既生魄則十五日以後也武王既克殷有天下於是庶邦冢君及内之百執事咸來受新命于周猶舜之居攝則四方羣牧來覲既諸侯群臣來受新命于周於是武王為之述其先王積徳累功之艱難故已得以成此王業蓋將帥之以祀于周廟則先為言祖考之所以致此者故惟歴叙后稷至于文考積累之次序而已承其志蓋為將祀周廟而言也王於是嗟歎以告諸侯曰惟先王建邦啟土言周之王業自后稷在唐虞之際始封於邰啟此周邦之土也先王指后稷也國語有云昔我先王后稷后稷非王而稱先王者尊之之辭也契在商亦稱𤣥王皆尊稱也公劉后稷曽孫篤厚也后稷之烈至公劉而加厚焉大王后稷十二世孫能増修后稷公劉之業而周之王業始基於此王季且又能勤勞以成王家而文王承之功業於是大成惟其積累之功徳源流深長如此故大為天之所眷命而膺受其命以撫安四方諸夏於是時也大邦諸侯則畏其力而不敢陵小小邦於是懐其徳而得以自立彊者畏之而不敢侵小小者懐之而有以自立則是天下所賴以生存也天下所賴以生存則宜克紂伐殷以君天下而大統猶未集於其身故於武王不可不承其志以致伐也惟九年大統未集先儒因此說附㑹以斷虞苪之訟受命稱王之說謂文王於斷訟之年更稱元年至九年而崩武王終喪而觀兵於殷上承文王之年為十一年又二年而伐殷為十三年其為附㑹之說似若可信然而改元立號近起秦漢三代之世無有也惟後世之君於即位之年則稱元年耳豈有文王既即位四十餘年而更稱元年之理此說殆是漢儒因九年大統未集之文而生此辭其實非也然則九年大統未集何也蓋當文王未崩九年之前紂之惡貫盈而不可赦也文王知其勢必不得不伐於是時也已有伐紂之志矣然而猶有所不忍遲遲於九年之久文王既崩而紂之惡日甚則武王不可不承其志也所謂九年者徒謂周之王業當興於此時矣何改元稱王之有哉武王既告庶邦冢君以自后稷至于文王積徳累仁成此王業而已承其志以伐紂救民而有天下矣於是以丁未之日祀于周廟諸侯之受命于周者咸奔祭于廟大奔走執豆籩以供祭祀既告祭于廟又三日庚戌於是燔柴祭天望祀于山川以告武成亦猶舜既居攝以正月上日受終于文祖然後類于上帝禋于六宗望于山川徧于羣神也武王既克商有天下諸侯百工受命于周而其告戒之際惟叙述其先世積累之艱難而已承其志故唐孔氏與劉元甫皆疑此下更有脫簡蓋以湯誥考之則誠有詳畧之不同故謂武王既定天下當慇懃告戒不應但祖述其先世之勤勞而止也予嘗反覆繹㝷武王所以告諸侯之意此蓋既得天下將欲率諸侯祀于周廟追王其先世故其說如此案中庸曰武王未受命周公成文武之徳追王大王王季上祀先公以天子之禮蓋是武王既受命於是始追王其先世祀以天子之禮自惟先王建邦啟土以下蓋為追王張本而言之也丁未祀于周廟則於是行其追王之禮矣惟其追王而言故惟序述其先世積行累功之事唐孔氏疑其下有脫簡未必然也底商之罪告于皇天后土所過名山大川曰惟有道曽孫周王𤼵將有大正于商今商王受無道自底商之罪以下至於大賚于四海而萬姓恱服其文當在王朝歩自周于征伐商之下厥四月哉生明王來自商至于豐之上蓋其所序述皆是武王未歸周以前事簡編差舛乃以屬於予小子其承厥志之後而武王所以禱於天地山川之言遂與上文之稱述后稷以來積徳累功者相聨則類夫武王誦其所禱之辭以告庶邦冢君者故唐孔氏以謂自曰惟有道曽孫周王𤼵至無作神羞王自陳告之辭也且謂無作神羞以下惟告神其辭不結文又不成非述作之體且冢君百工初受周命王當有以戒之如湯誥之類宜應說其除害與民更始懲以為惡之祸勸以行道之福不得大聚百官惟誦禱辭而已欲征則慇懃誓衆既克則空誦禱辭聖人有作理必不爾竊謂神羞之下更合有言簡編脫落經失其本所以辭不次耳孔氏雖能疑其簡編斷絶經辭不次而遂信以禱神之辭為武王對庶邦冢君百工誦之殊不知追王之辭蓋盡於予小子其承厥志而底商之罪以下自是史家記述武王既徃伐商禱于上下神祇之辭簡編失次誤載於其承厥志之下耳故王氏劉氏程氏諸家以屬於王朝歩自周于征伐商之下蓋得之矣但王氏以乃反商政政由舊釋箕子囚以下屬於歸周之後則失其次夫釋箕子囚封比干墓式商容閭㪚財𤼵粟此蓋既克商之事豈至周而後有事於此邪故劉氏自㡳商之罪至萬姓恱服悉以加於厥四月哉生明王來自商至于豐之前此則勝於王氏所次逺甚程氏亦以釋囚封墓以下依劉氏所次而移乃反商政政由舊於列爵惟五之上謂自此以下方是政由舊亦各就其所見如此然武成既非今書亦未可以其見存之文為必然不易之論也武王既興義兵為天下除殘去賊其所以伐紂為此舉者蓋所以奉天地神祗之意而非所以狥一人之私欲也故其兵之既動則致商紂之所以獲罪於天地神祇之意以告皇天后土與夫師之所過名山大川名山華嶽大川河也自豐鎬而徃朝歌則必過華嶽渉河華與河在五嶽四凟之數故知其為名山大川也告于皇天后土則㤗誓所謂類于上帝宜于冢土也告于天地山川其禮不必同時而禱祠同故併而載之曰底商之罪告于皇天后土所過名山大川明其禱祠皆云爾非是以天地山川併為祭也㤗誓曰予小子受命文考類于上帝宜于冢土以爾有衆底天之罰武王之所以伐商而告于天地神祇者蓋受命于文考而非已之所敢專也故其禱辭必稱有道曽孫本其父祖言已乃有道之人曽孫也唐孔氏以武王自稱有道且謂聖人至公為民除害以紂為無道言有道以告神求助不得飾以謙辭此說不然鬼神害盈而福謙謂告神求助不得飾以謙辭豈有是理哉武王之誓師曰予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良此蓋武王之心也豈有自稱已之有道以求神之福其曰有道曽孫云者亦猶曰惟朕文考無罪也惟有道曽孫周王𤼵將有大正于商言已慿我文祖之有道將往大征商紂以大正其罪也當是時始興兵往代商未知克與不克而紂猶在上為天子遽稱周王𤼵此殆是史官増加潤色之辭非必其禱神之言本如此也孟子因咸丘蒙問舜南面而立堯率諸侯北面而朝之之說嘗舉孔子之言曰天無二日民無二王舜既為天子矣又率天下諸侯以為堯三年喪是二天子矣天下之不可以有二王也苟以武王稱周王𤼵而繼之以今商王無道則是二王矣孟子於武成取二三䇿則其所不取者必此類也武王所以本其文祖之有道以有大正于商者以商王受無道故也孟子曰桀紂之失天下者失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也民之歸仁也如氷之就下獸之走壙也故為淵敺魚者獺也為叢敺雀者鸇也為湯武􅇌民者桀紂也紂既無道而周有道則是紂􅇌其民而使其歸周矣雖欲不亡不可得也㤗誓數紂之罪其文諄􅃨反覆陳其不善之迹蓋將以曉衆庶未諭之情不得不然此禱于天地鬼神不必歴數其罪故其文簡而盡此所以不同也暴殄天物害虐烝民為天下逋逃主萃淵藪予小子既獲仁人敢祇承上帝以遏亂畧華夏蠻貃罔不率俾恭天成命肆予東征綏厥士女惟其士女篚厥𤣥黄昭我周王天休震動用附我大邑周惟爾有神尚克相予以濟兆民無作神羞㤗誓曰惟天地萬物父母惟人萬物之靈亶聦明作元后元后作民父母蓋天之生萬物惟人最靈人者萬物之主也於人中擇其聦明者而為之君君者人之主也主而暴其民則物亦不得其所矣紂以不仁暴虐之資居於民上而播其惡於衆暴殄天物而使天下萬物鳥獸草木皆失其性而其害虐於民尤甚言暴於天物則民亦在其中以人尤重於萬物故别言之與㤗誓之意同也暴殄天物害虐烝民則不仁甚矣故小人之為不仁者皆與之同惡相濟以肆其毒於四海所謂天下之惡皆歸焉者也是以為天下逋逃主萃淵藪蓋謂紂為衆惡之所歸重復言之甚之之辭猶曰是崇是長是信是使是以為大夫卿士也王氏曰歸之之謂主萃之之謂聚藏之之謂淵飬之之謂藪其說是也紂既為衆小人之所歸不獨赦其逋逃之罪又以為大夫卿士則是立其朝者無非小人也立朝皆小人則君子無容足之地故其仁人皆相率而歸周此稱仁人蓋指商之仁人其人則莫知其為誰也亦未知其㡬何人也孔氏以為太公周召之徒太公歸周在於文王之世非武王之所獲周召武王之懿親不可謂之獲獲者自外來之辭也王氏以為㣲子之徒武王以㣲子之來歸而知紂之可伐則是㣲子之亡其國畧無不忍之意烏得以為仁哉予故曰仁人必是自商而來而人則莫知其為誰也仁人既已歸周則是空國無君子立其朝者皆小人也小人得志君子相擕而去則民之棄殷可以卜之於此矣故謂予小子既獲仁人於是敢祇承上帝之命以遏絶商紂為亂之畧也仁人自商來者非欲必預伐紂之謀蓋武王以其獲仁人而又卜知商家之必亡而為上帝之所斷棄也武王既祇承上帝以代商而當時之民内而華夏外而蠻貊無不相率以為己使亦皆恭敬天之永命以助國家也蠻貊若庸蜀羌髳㣲盧彭濮人之類惟夷夏之人皆知敬天承命故予之興師自豐鎬西來以東征蓋所以慰安此士女之心也予既東征以安此士女之心於是士女喜恱我周師之興咸實𤣥黄之幣于筐篚之中以迎我師顯我國家之當王天下也𤣥黄但謂其時所執之幣有此色爾非有他義又薛氏之說亦随句取義非書之本意也士女之所以筐篚𤣥黄以昭我周王者豈人力之所能致哉蓋天之休羙有以震動此華夏蠻貊之衆而使之歸附我大邑周也民既附我大邑周故爾天地山川神祇庶㡬能相助予伐紂克商以拯斯民於昬墊之中無使敗衂為神之辱也武王禱神之辭蓋盡於此以左氏春秋傳荀偃禱河蒯聵禱其祖無作神羞之下皆更有語遂亦謂此下更有未盡之辭此蓋不通變之論未可以為然也既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財𤼵鉅橋之粟大賚于四海而萬姓恱服列爵惟五分土惟三武王既底商之罪以禱于天地山川神祇矣於是以戊午日渡河而北漢孔氏曰自河至朝歌出四百里五日而至赴敵宜速此說甚不然夫湯武仁義之師蓋為應天順人而起豈為詐謀竒計速於赴敵以出敵人之不意哉然自河至朝歌五日而至經實有明文意其所載時日必有誤也俟天休命者非是待天之有禎祥而後進兵蓋武王之將進而與紂戰以決生民之命於商周之勝負不敢以勝負自必也必待天之佑我國家而能勝之此謂俟天休命而已先儒以謂夜雨止畢陳蓋過論也武王既以癸亥之日陳于商郊紂遂以明日甲子之詰朝帥其多罪逋逃之人其多若林木之盛㑹于牧野是時周師未動而紂多罪逋逃之衆其徒之居於前者自相攻擊以走故反倒其戈以攻其在後者以致血流漂杵言殺人之多也雖殺人之多皆紂之師旅自相屠戮自周師而言之實未嘗血刄也周師未嘗血刄也而紂之衆自相屠戮滅亡豈武王實使之然哉蓋由其多罪逋逃之人同惡相濟其罪惡貫盈天道之所不容故使之至於此極也而孟子則以謂盡信書則不如無書吾於武成取二三䇿而已以至仁伐至不仁何其血之流杵也審如孟子之說則是血流漂杵之言蓋深疑之也予嘗深原孟子之意蓋恐學者𫝊之失真以謂武王牧野之戰其殺人誠如是之多故其後世嗜殺人之主必將指武王以為口實故為此拔本塞源之論此孟子所以有功於武王也然而血流漂杵之言則是紂之衆自相攻擊其血流之多蓋有此理後世未可以孟子之說疑之而遂謂無其事也武王之伐商紂之衆自相攻擊以至於此則其得天下可謂易矣故繼之以一戎衣而天下大定蓋言一著戎衣而天下遂定以見其取之之易也既克商而有天下於是與天下更始反商之虐政由湯之舊政蓋商家賢聖之君六七作其所𫝊之政莫非創業垂統為萬世可繼之道者惟紂不能率由舊章遂至於亡武王既反紂之虐政則其施於有政者豈可以他求惟取商家之舊政而用之則其政將不可勝用矣反商政政由舊即如下文所載是也箕子比干商容皆商之賢者紂惟不能用故遂亡其國武王既反紂之舊政則其所不用之賢者必致其禮待之意其為紂所囚於囹圄之中者則释之其見殺而既葬者則於是封其墓其存而去於閭閻之中者則過而式其閭非特此也紂之聚財於鹿臺積粟於鉅橋必為己私者則皆㪚而𤼵之以大賚於四海之困窮而無告者而萬姓恱服蓋釋箕子囚封比干墓式商容閭則君子賢其賢而親其親散鹿臺之財𤼵鉅橋之粟大賚於四海則小人樂其樂而利其利於此時若出於塗炭而登春臺之樂熈熈然安能不恱哉自釋箕子囚至於萬姓恱服皆是反商政未歸國之初也有此善政及民自此之後當繼之以厥四月哉生明王來自商乃偃武修文蓋於是始歸國櫜弓矢㪚馬牛與天下休息而孔氏本文以屬於歸周之後夫箕子之囚比干之墓商容之閭必在殷之國都而鹿臺鉅橋亦在近郊之地皆是既克之後豈得為既歸周已後之事乎既歸于周偃武修文與天下更始而又率庶邦冢君暨百工祀于周廟以追王其先世遂柴望大告武成矣則其所以施設者莫先於疆理天下以封建勲戚故繼之曰列爵惟五分土惟三案樂記曰武王既克商未下車而先封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳既下車而封夏后氏之後於杞封殷之後於宋蓋先封帝王之後然後及於功臣子弟以與㑹于牧野之諸侯犬牙相錯為王室之藩屏列爵惟五者謂封建諸侯列為五等之爵即公侯伯子男是也分土惟三者謂爵各有等而所分之地則有三等蓋公侯皆方百里伯七十里子男五十里是也周家封建之法蓋盡於此二言矣故王制孟子云封建諸侯其說皆本於此及周禮大司徒所載則與此不同其說曰諸公之地封疆五百里侯四百里伯三百里子二百里男一百里信如周禮之所載則是列爵惟五等而分土亦有五等與此篇所載異矣故唐孔氏以為周室既衰諸侯相併自以國土寛大並皆違禮乃除去本經妄為說爾此說甚好至鄭康成之徒必欲以此二書所載附㑹而為此說所以為武王時大國百里周公攘戎狄斥大封域増而廣之故大國實五百里或又謂公之地百里而已五百里者併與附庸言之此言迂陋不通之論二蘇兄弟皆詳辨其失而李直講以為大司徒所載諸公封疆五百里其食者半諸侯封疆方四百里諸伯之地三百里其食者三之一諸子之地二百里諸男之地一百里其食者四之一其曰五百里四百里以至百里者所謂列爵惟五也而其所謂其食者半其食者三之一其食者四之一即所謂分土惟三也此說雖善然尚有可疑者四百里其食者三之一則是所食者百三十三里有竒三百里其食者三之一則是所食者百里二百里其食者四之一則是所食者五十里百里者其食者四之一則是所食者二十五里是亦分土為五等不謂之三等也此亦難於折𠂻姑用之建官惟賢位事惟能重民五教惟食喪祭惇信明義崇徳報功垂拱而天下治此則為王朝公卿大夫也蓋居是官者莫不欲得賢人而任之然賢者之於事有能有不能因賢者之有是能則使之任是事治教禮刑政事莫不随其才而因任之而其人則皆天下之賢人也既外而封建諸侯得其尊卑小大之制而使賢能又皆得夫俊傑之才則民治於是乎舉矣故繼之以重民五教惟食喪祭蓋五典之教與食喪祭之三者民之最重者也曰惟食喪祭者如禹貢言羽毛齒革惟金三品齒革羽毛惟木皆因上之辭也惇信明義蓋謂大明信義揭示天下所以羙敎化移風俗也崇徳報功者猶湯之徳懋懋官功懋懋賞蓋有徳者則宜崇之以髙爵厚禄使之在髙位以致君澤民至於有功者則但報之以厚賞而不居之於位各適其當而已孟子曰人皆有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運於掌上武王興義兵稱干戈率天下諸侯以伐紂而天下之人從之而不少有疑於其間者蓋其惻隱之心充實於其中不忍天下之民䧟於塗炭而不能以自出故應天順人拯斯民於萬死之餘既克商而有天下則其所施設者無非不忍人之政自釋箕子之囚崇徳報功莫非不忍人之政也惟其不忍人之心根本於未得天下之初其不忍人之政著見於已得天下之後則其治天下可運於掌上此所以垂衣拱手而天下治也周之社稷所以能緜緜延延至於卜世三十卜年七百者其源流蓋如此尚書全解卷二十三
