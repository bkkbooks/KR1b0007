body:
  text: 尚書全解卷四十宋林之竒撰文侯之命周書平王錫晉文侯秬鬯圭瓉作文侯之命文侯之命王若曰父義和丕顯文武克愼明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懐在位嗚呼閔予小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆壽俊在厥服予則罔克曰惟祖惟父其伊恤朕躬嗚呼有績子一人永綏在位父義和汝克昭乃顯祖汝肈刑文武用㑹紹乃辟追孝于前文人汝多修扞我于艱若汝予嘉王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德書於吕刑之下有文侯之命費誓秦誓三篇予竊意周太史所藏典謨訓誥誓命之文才至吕刑而止自時厥後歴幽厲之亂簡編不接其間如宣中興建萬國會諸侯任賢使能南征北伐錫命韓侯申伯用張仲仲山甫其時大誥命多矣而無一篇見於書以是知書之所録殊未及宣王之世而宣王之書亦復失之於東遷之亂矣孔子旣取周太史所藏斷自堯典至於吕刑定為萬世之訓而於列國復得誓命三篇遂從而附益於其後案左傳鄭子産曰鄭書有之曰安定國家必大焉先晉司馬叔游曰鄭書有之惡直醜正寔繁有徒禮記大學舉楚書曰楚國無以為寶惟善以為寶是知春秋之世列國皆有書夫子蓋嘗徧觀列國之書於晉得文侯之命於魯得費誓於秦得秦誓附於帝王之末以傳不朽而已若以為夫子致意於此篇故特取之竊以為過矣案史記幽王嬖褒姒而廢申后逐太子冝臼冝臼奔申申侯與犬戎旣殺幽王晉文侯與鄭武公迎冝臼立之是為平王遷于東都而左傳亦曰我周之東遷晉鄭焉依蓋當是時犬戎方亂王室如綴旒而文侯於周有再造之功故平王於其將歸國也錫之秬鬯圭瓉以報其厚德焉秬黒黍鬯芳草也以黒黍釀酒和以鬱鬯圭瓉者以圭為瓉也記曰君執圭瓉祼尸太宗執璋瓉亞祼注曰圭瓉璋瓉祼器也以圭璋為柄酌鬱鬯曰祼則圭瓉者酌鬱鬯之物有秬鬯則有圭瓉矣序言秬鬯圭瓉而篇中特言秬鬯此亦互見其義以相備也平王之錫晉文侯旣有秬鬯又有弓矢車馬而序特言秬鬯五十八篇之序如此者多矣不可以從而為之說也王氏曰明所錫以秬鬯為盛則鑿矣江漢之詩曰釐爾圭瓉秬鬯一卣此宣王之賜召穆公也毛氏曰九命錫圭瓉秬鬯此賜文侯以秬鬯圭瓉蓋亦命之為侯伯也天子稱同姓曰伯父叔父異姓曰伯舅叔舅晉於周為同姓故以父稱之義和文侯字也左傳曰晉穆侯之夫人姜氏以條之役生太子命之曰仇仇即文侯名也蓋文侯名仇而字義和焉天子之於諸侯稱其名正也今稱其字蓋尊之而不敢名也漢髙祖曰運籌帷幄之中決勝千里之外吾不如子房至於韓信蕭何皆名之而特字稱子房蓋尊之也平王字稱文侯亦猶是也馬融王肅徒見義和非晉侯名遂謂父能以義和諸侯此鑿說也平王將稱美文侯之功故於是言文武之所以興惟以其有賢德之臣幽王之所以敗惟以其無賢德之臣我之遭家不造亦惟有賴於同姓之諸侯而文侯之功如此故呼父義和極其尊之稱而稱美之也我周文王武王之所以大顯于天下者以其明德能致其愼故也惟有明德故昭升于上而天心之所眷顧敷聞于下而民心之所歸慕民心即天心也民與之則天與之矣故惟是上帝以其天下之命集于文王俾代商也丕顯言文武而集厥命言文王者文王受命作周武王但承其志也先正蓋周召太顚閎夭畢公之流與君牙之言先正同文武之所以集大命于身者豈獨以一人之力所能致哉亦以其先正之臣能或左或右以明事其君也君有明德而臣又能昭事之君明臣良胥契於一堂之上故其於謀猷所以維持國家而敷宣政教者無小無大皆無不率從蔑有違背於道者故先祖安於在位焉先祖文武而下是也言先祖之位宅天下之尊貴兆民之所愛戴長守而不失者皆以其先正左右之臣故也惟先祖之安於在位本夫先正之力平王自閔其遭家不造而無文武之臣故嗟嘆而自傷也丕愆謂幽王之禍造為也言此丕愆乃天之所為也幽王不道見於小大雅詳矣則夫犬戎之禍乃自作孽也而以為造天丕愆此如詩言天方艱難天降喪亂之類平王自閔以幼沖之資而其嗣位適遭乎上天降禍于我周家王室中圯當是時也資用惠澤及于下民者絶矣言無有也如所謂喪亂蔑資曽莫惠我師者也資澤旣殄則民心去矣此夷狄之所乗閒而起以兵侵陵傷害我國家其禍甚大也賢者在朝則無敵於天下夷狄之醜而敢侵戎我國家則以凡我治事之臣無有老成及俊德者在其服位老成俊德無一在朝則治事之臣無非小人彼夷狄何所畏哉十月之交刺幽王之詩也其言曰皇父卿士番維司徒家伯冢宰仲允膳夫棸子内史蹶維趣馬維師氏則其罔或耆壽俊在厥服可知矣幽王所用莫非小人故當平王之嗣立則幽王之所以遺之者無有俊哲以與之與衰撥亂而平王又自謂已之不德無以克紹先烈朝旣無可用之士而已不能有為則所倚賴者惟同姓之諸侯在祖行者在父行者其當以我之身為已憂思有以輔贊而振起之苟有功於予一人則予一人得以承安於天子之位以保其社稷宗廟也文武有明德而其臣皆能昭事厥辟此其所以安於在位今平王旣已罔克而其御事又無有耆壽俊德則將欲安於在位以不墜先祖之基業舍諸侯其將焉託蓋平王之再造王室實自於晉鄭無非同姓之侯也故以此為言而又呼父義和以稱美其功也汝克昭乃顯祖言汝文侯能光服汝祖唐叔之德蓋子孫有大勲勞于王室則有以増光其祖也唐叔武王之子晉始封之君故曰顯祖汝所以能昭乃顯祖以汝當此艱難之際始以其身為天下倡刑憲于我文武之法度會同四方之諸侯立我為君以紹先烈而追孝于前文人前文人者前世守文之主蓋自成康而下皆是也汝能如是則是多修扞我于艱矣此予所以嘉汝功而將錫汝以備物盛禮也漢孔氏曰戰功曰多言汝之功多甚修矣其說迂曲不如蘇氏曰汝所修完扞衛我于艱難也為簡直而不煩文侯之所以能多修扞衞平王于艱難者惟始率諸侯以勤王室耳蓋周自文武成康之盛王政修明諸侯畏慕遲速進退惟其所命及幽王以舉熢火之故失信諸侯政當犬戎之難而諸侯莫有勤王之意今文侯能於熢火失信之後首舉義兵倡諸侯以尊王室立平王而天下定則其功豈小哉故平王稱其用會紹乃辟追孝于前文人以是為多修扞我于艱也文侯以晉國之師出定王室之難旣成功則以其師歸于晉故其命之歸國也則曰視爾師寧爾邦言此勤王之衆汝當善視而安集之也旣命以歸國則其行也必有備物盛禮焉其備物盛禮必稱其功故賚之秬鬯一卣使之有事于祖廟者以稱其昭乃顯祖肇刑文武追孝于前文人之功也賚之彤弓一彤矢百盧弓一盧矢百馬四匹使得以征伐諸侯者以稱其多修扞我于艱之功也物必副其功禮必稱其情此先王仁諸侯之意也卣中尊也未祭則盛秬鬯于卣旣祭則實于彞此初賜而未祭故以卣盛之一卣者以其昭乃顯祖故惟一卣使以此鬱鬯告于唐叔之室不及餘廟也若周公禋于文王武王則用二卣矣彤赤色盧黒色賜之弓矢使得征伐而有此二色之不同馬四匹為一乗有馬四匹則路車在焉詩所謂路車乗馬是也不言路車亦猶言秬鬯一卣不言圭瓉也凡此皆平王襃賞文侯之功備物盛禮而以誠意將之輕重隆殺適得其冝而可為後世法也其後文公敗楚于城濮獻俘于襄王王亦以是而賜文公故左傳曰鄭伯傅王用平禮也蓋言平王之禮其可傳於後世也如此司馬子長不之察徒見文公亦有是賜遂以此篇為襄王錫命文公之言蓋未嘗深考左氏而妄為之說也平王之所以襃賞文侯者旣備於此故又為之丁寧告戒使之愛民勤政克謹其終以保其戡定禍亂之功言今往歸晉國則當休兵息民以和輯其衆柔逺以略於外能邇以詳於内凡其小民之困窮無告者皆有以惠安之而無為康寧自逸之行如是則能簡恤爾都邑之衆克終其美以成汝之顯德蓋昭乃顯祖之功至於是而後大成也蘇氏曰簡謂簡閱其士恤謂惠恤其民是也蓋為治之道必至於吏稱其職民安其業然後可以享其成簡則吏稱其職恤其民安其業此致治之成績也故文侯之命以是終焉蘇氏論此篇以謂春秋傳曰厲王之禍諸侯釋位以簡王政宣王有志而後效官讀文侯之命知平王之無志也予竊以為不然夫子定書録文侯之命於文武成康之次蓋必有所深襃而甚許之者豈為其無志而録之哉詳考此篇慕文武之勤愼憫國家之殄瘁痛耆壽之彫喪知蕃翰之勤勞其襃之也無溢辭其錫之也無虛器而又勉之以愛民勤政以謹其終夫宣王之所以中興周室者亦不過於側身修行任賢使能能錫命諸侯復文武之境土以勞來還定安集其民而已今平王之言亦如此則其志亦豈小哉其所以不為宣王中興之業者惟其銳於始而息於中以至於終而澶漫不振也使其志每如命文侯之時則其所成就必不如是之卑也故欲知平王之可以為宣王舍文侯之命則無以見矣至於四十二年魯隱之元年使宰咺來歸惠公仲子之賵則其為辭命豈復前日之平王也哉平王之志於是已矣此春秋之所為作也費誓周書魯侯伯禽宅曲阜徐夷並興東郊不開作費誓費誓公曰嗟人無譁聽命徂兹淮夷徐戎並興善糓乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢寇攘踰垣牆竊馬牛誘臣妾汝則有常刑甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨榦甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑曲阜魯之所都左傳所謂少皡之墟者也魯之分地實禹貢徐州之境其地南抵于淮徐戎淮夷蓋東方戎夷之種落錯居于魯之境内者也周之王業肈基於西土而化行於江漢之域故西南夷最先服東土之人逖逺正化而染於紂之餘習故其服周為最緩而東夷亦最後服是以西南夷如庸蜀羌髳微盧彭濮會于牧野之戰而東夷如淮夷徐奄預于武庚之亂也惟東夷在周之初獨為驕悍而未服是以周之封建諸侯則以周公居魯太公居齊此二人者親賢之最者也而其分地乃介於戎夷之閒去周為甚逺則以控扼東夷故也周公留輔周室使其子伯禽受封於魯實與齊太公同時而之國相先後而報政彼東夷當紂之時中國無政嘗侵入職方之地肆為吞噬則其心必不利於齊魯之建國故伯禽之始居曲阜而淮夷徐戎並興者蓋與之爭魯也案史記齊世家太公封於營丘東就道宿行遲逆旅人曰客寢甚安殆非就國者也太公夜衣而行黎明至國萊侯來伐與之爭營丘營丘邊萊萊人夷也會紂之亂而周初定未能集逺方是以與太公爭國以太公之事觀之則知淮夷徐戎之於曲阜亦猶萊夷之於營丘也戎之與夷壤地相望蓋有唇齒掎角之勢服則俱服叛則俱叛常武之詩美宣王有常德以立武事其詩曰率彼淮浦省此徐土不留不處三事就緒閟宫之詩頌僖公能復周公之宇其詩曰保有鳬繹遂荒徐宅至于海邦淮夷蠻貊莫不率從言淮浦必言徐土言徐宅必言淮夷明此二者之憑陵中國嘗有並興之勢故也唐孔氏曰經稱淮夷徐戎序言徐夷略之也是也淮夷徐戎皆在曲阜之東故其並興而為寇則東郊為之不開東郊不開魯之計可謂危矣而伯禽能為戰守之備修器械築城堡積糗糧芻茭以待之號令明而賞罰信卒能使戎夷逺遁遂以立魯國之社稷輔成周家磐石之勢其成筭碩畫蓋可以為萬世法此費誓所以録於帝王誓誥之末也費地名論語曰顓臾固而近於費又曰顓臾昔先王以為東蒙主是費近於東蒙左傳定五年季桓子行東野及費子洩逆勞於郊是費近於東野惟其地近於東蒙東野則是魯東郊之地也誓師徒繕守備於此故以費誓名篇篇中本無費字而以命篇之名蓋顧命之類也嗟人無譁聽命者將使所誓之人静以待命也彼旣靜以待命於是為言所以徂征之故言我之所以為此役者以淮夷徐戎並起而為㓂故也彼旣並興而來則在我者不可不嚴為戰守之備而戰守之備最所當先者莫如器械之犀利蓋夷狄中國各有長技夷狄以野戰為勝中國以兵器為強漢晁錯論中國之長技謂勁弩長㦸射䟽及逺則匈奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官騶發矢道同的則匈奴之革笥木薦弗能支也下馬地鬭劔㦸相接去就相薄則匈奴之足弗能給也以是知中國之所以能取勝於夷狄者惟在於兵甲之堅利而已宣王惟能修車馬備器械故外攘夷狄以復文武之境土蓋以我所長乗彼所短未有不勝者也故伯禽將與淮夷徐戎戰必以是為先甲胄也干也弓矢也戈矛也鋒刃也此皆兵器之所常用而不可闕一者也曰糓曰敿曰備曰鍛曰礪皆謂修治之無敢不弔無敢不善則欲其無不精緻弔至也至即善也此皆隨冝相配成文非有深義於其閒不可以曲為之配合也淫大也淫舍牿牛馬漢孔氏以為大放舍牾牢之牛馬言軍所在必放牧也此說不然淮夷徐戎方且並興而為宼東郊為之不開不應放牧其所牿牢之牛馬於野使彼得以掠而取之也此舎當作舎止之舎蓋夷狄之侵擾邊境其志惟在於虜掠牛馬臣妾以肆其吞噬無厭之欲而已故伯禽之為守禦之計使東郊之民大舎止牿所蓄之牛馬拘繫其臣妾此實堅壁淸野之䇿將使之無所掠鹵以困之也擭穽皆捕獸之器擭以捕虎豹穿地為深坑又設機於上防其躍而出也穽以捕小獸亦穿地為深坑入必不能出但不設機耳男曰臣女曰妾必欲為堅壁清野之䇿使敵人無所掠鹵則不可不申嚴法令以約束其民自今惟淫舍牿牛馬以下皆所以約束之也夫欲牿牛馬必於窮山窮谷掠鹵所不至之地懼夫未舎牿之前有為擭穽以陷猛獸者或能為牛馬之害故使之杜塞其擭窒敜其穽無敢傷其所牿之牛馬旣已約束之矣而有不塞擭穽以傷其牿者則為犯法故常刑之所不赦也所牿之牛馬或有風佚所拘之臣妾或有逋逃則使失之者不得越所守以追逐而其得之者則謹而還之旣已約束之矣其得之而祗復則是有功者故商度而賚賞之則其失之而越逐者與夫得之而不復者則為犯法故常刑之所不赦也又當禁止宼攘之人使不得踰越垣牆以竊所牿之牛馬誘所拘之臣妾旣已約束之矣而有踰垣牆以竊而誘之者則為犯法故常刑之所不赦也約束旣如此之嚴而賞罰又如此之明則堅壁清野之策得行而牛馬臣妾無有暴露於外者彼淮夷徐戎旣無所掠鹵果何利於為宼哉峙儲峙也糗說文曰熬米麥也謂熬使熟又擣之以為粉也楨榦者皆築城之具楨當牆兩端者也榦當牆兩邊障土者也芻茭以飼牛馬說文曰芻刈草也茭乾芻也案周禮天子六軍則有六鄉六遂鄉在王國百里之内遂在百里之外以是而推則諸侯大國當有三鄉三遂此所謂三遂意若指魯之三軍者故說者多引此以為魯有三軍之證然而苟指魯之軍制言之謂之三郷三遂則可謂之三郊則不可禮記曰四郊多壘此卿大夫之辱也蓋國必有四郊郊外為遂有四郊則必有四遂此所謂遂非必是五縣之遂猶春秋言伐我北鄙南鄙非必是五鄼之鄙蓋泛指四郊之外遂為鄙也其曰三郊三遂者蓋淮夷徐戎並興為寇東郊為之不開則東郊者正其受敵之處也故伯禽使此郊之民修治其甲胄干戈之屬以為征討之計舎牿其牛馬拘繫其臣妾以為堅壁清野之備如此則可以戰可以守矣遂使之峙其糗糧將以甲戌之日徃征徐戎東郊之民旣將與之出征則使南西北三郊三遂之民峙其楨榦亦以甲戌日於東郊築城壘保障以固其守為不可動之勢而又給其供軍馬牛之芻茭蓋受敵之地則專意於攻守而調發徭役則取給於不受敵之地此所以别逺近均勞逸矣夫魯國之全力而制一方之侵軼也上言東郊則三郊三遂之為南西北也明矣其以甲戌之日征亦以甲戌之日築者夷狄之情方其侵擾邊境則不利於中國之有障塞也故我於増築城堡彼必為爭利之舉以擾之苟其先我而爭利則楨榦之功不可得而施也於是先徐戎未動使東郊之民以是日征之而三郊三遂之民亦以是日而築且征且築同時而舉彼方與征者鬭則不暇與築者爭矣此實應變出竒之長筭也旣其禦戎之筭有賴於此則是投機之會在於甲戌一日之間蓋不容穟也機不可失如此其有糗糧之不及芻茭之不多則人畜將乏食而無以征失其所以可征之機矣是軍法之當殺也故皆曰汝則有大刑大刑則非常刑之比也至於楨榦之不供而無以築是又失其所以可築之機矣築之不時則其征亦為妄動此其不供之刑蓋又重於乏軍食者故曰汝則有無餘刑非殺言刑至此而無餘矣不惟殺汝又將孥戮汝之妻子焉此又非大刑之比也夫刑非聖人之所忍言也今伯禽之誓旣言常刑又言大刑又言無餘刑非殺可謂忍於言用刑矣而夫子乃録其書於帝王之次者蓋平居無事之時人主不可以言用刑也至於用兵則不厭夫三令而五申之所以全民命而重戎事也孔子曰不敎而殺謂之虐不戒視成謂之暴慢令致期謂之賊將為戰守攻築之備苟不先為之誓戒及陷於罪遂從而刑之自民而言則為虐之暴之賊之自國而言則失戰守攻築之大計民之叛服國之安危係焉故甘誓湯誓泰誓費誓之言用刑夫子皆不以為過者以其為誓師而言也使其平居無事而輒以刑戮脅其民則是乃李斯商鞅之所以亡秦者也夫子何取焉秦誓周書秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓秦誓公曰嗟我士聽無譁予誓告汝羣言之首古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉我心之憂日月逾邁若弗云來惟古之謀人則曰未就予忌惟今之謀人姑將以為親雖則云然尚猷詢兹黄髪則罔所愆番番良士旅力旣愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之昧昧我思之如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彦聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉人之有技冒疾以惡之人之彦聖而違之俾不通是不能容以不能保我子孫黎民亦曰殆哉邦之杌隉曰由一人邦之榮懐亦尚一人之慶秦誓之所由作其略見於此序而其事迹之詳則載於左傳案僖三十年秦穆公以鄭之無禮於晉文公故與晉合兵而圍之晉軍函陵秦軍汜南旣而秦納燭之武之言私與鄭人盟而背晉使杞子戍之而還秦晉之不睦蓋自此始其後二年晉文公卒穆公因杞子掌鄭北門之管而欲濳師以襲之出於晉地殽陵之閒訪諸蹇叔蹇叔曰勞師以襲逺非所聞也公辭焉召孟明西乞白乙使出師於東門之外蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉必死是閒秦師及滑聞鄭人旣有備矣滅滑而還晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱必伐秦師遂發命襄公墨衰絰以從戎遂敗秦師于殽陵獲百里孟明西乞白乙以歸襄公之嫡母文嬴請三帥而歸之秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪秦誓之作實在此時漢王嘉曰秦穆公不從百里奚蹇叔之言以敗其師其悔過自責疾詿誤之臣思黄髪之言名垂於後世左氏所載穆公之將襲鄭但以為訪于蹇叔而已初未嘗及於百里奚也至公羊榖梁傳所載蹇叔事迹與左氏正同而其異者則以諫伐鄭而哭秦師者不惟蹇叔而百里奚實在焉王嘉之言蓋取諸公榖之傳而云也以是知左氏之不載百里奚者失其傳焉爾當以公榖為正夫穆公於汜南之役旣背晉而與晉不睦矣乃欲濳師於其險阻之地以出鄭人之不意則其進不足以襲鄭而退將為晉所襲者蓋必然之勢也故其時老成人之沈幾先物如蹇叔百里奚者則知其必敗惟其輕進小生銳於功名淺慮無謀如孟明西乞白乙則以為必勝穆公勇於前而不顧其後蹇叔之言逆於其心則不復求諸其道也徒以其拂己而怒之孟明西乞白乙之言遜於其志則不復求諸非道徒以其順己而喜之徇於喜怒之私而不慮夫成敗之所在果覆師於殽陵匹馬隻輪無反者此蓋旣徃之咎不可復追矣然而因殽師之不復還而能深自懲創不怨天不尤人惟責夫己之不審於聽謀且懼其無以為善後之計也故於是誓其衆而告之以自怨自艾之意此篇之所為作而夫子有取焉録其書於帝王誓命之末也嗟我士聽無譁謂凡爾衆士靜以聽命我將告汝以古人之言可以為羣言之首者其言則曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉蘇氏曰孔子曰人之言曰予無樂乎為君惟其言而莫予違也孔子蓋以為一言而喪邦者此言也民旣盡順我而不違我樂則樂矣不幾於游盤無度以亡其國如夏大康乎此言為善蓋常人之情莫不樂人之順己而惡人之拂己惟以人之若己為多盤則是人之責己者在常人之情蓋多不樂於此矣故自己而責人者未足為艱人以逆耳之言而責己己能受之如水之流而不以為忤此實常情之至難也今我之為此役也蹇叔百里奚之謀謀之其臧則具是違孟明西乞白乙之謀謀之不臧則具是依此蓋以若己為多盤而不能以受責如流為艱旣取禍敗於前矣而思有以轉禍為福易危為安則我心之憂惟恐日月逾邁難得易失若不復反雖欲悔之而無所及也是以深咎其聽言之不審謂我之始欲背鄭人汜南之盟也誠有所疑忌於鄭而不信之故欲潛師以襲之勇於利而不顧其害彼老成之人執古義而為我謀者如百里奚蹇叔可謂善矣我則以為未能成就我之所忌而違之其新進小生之昧於古義而指今事以為我謀如孟明西乞白乙之徒可謂不善矣我雖知其未必有成功而僥倖於萬一也故姑將以為親而從之是以自取殽陵之敗夫旣喪師之禍至於此極秦之社稷亦已危矣而尚未至於為敵國外患之所乗者蓋以襲鄭之役雖不從老成人之謀而其他為治之道尚能詢於黄髪而用之是以無所愆過兵雖敗而國不摇也案左氏傳僖十三年晉薦饑使乞糴于秦秦伯謂百里奚與諸乎對曰天災流行國家代有救災恤鄰道也行道有福於是㔻豹在秦請伐晉秦伯曰其君是惡其民何罪於是輸粟于晉夫㔻豹之請伐晉無以異於杞子之請襲鄭也百里奚欲與之粟無以異於蹇叔之以襲鄭為不可也穆公卒從百里奚而不從㔻豹則知其平日之謀國詢於黄髪而違新進小生之謀者亦多矣一昧於襲鄭之舉遂取敗衂故誠有悔於是而欲改過遷善卒用黄髪之言以為善後之計焉良士之番然而老者雖旅力旣已愆過我庶幾欲有此人而用之至於仡仡然壯勇之夫雖能射御而不有違失我庶幾踈而逺之不欲用此人也仡仡勇夫尚且不欲而況於截截利口捷給之善諞言者能變亂是非利害之實使君子囬心而易辭我何暇復多有之哉其所謂番番良士旅力旣愆者蓋指百里奚蹇叔之徒而言也而其仡仡勇夫與夫截截善諞言者則指孟明西乞白乙之徒也截截猶察察也諞說文曰便巧言也穆公之謀伐鄭也惟昧夫君子小人之際故於老成之言則違之於新進小生則從之是以覆師於殽陵及其旣敗而悔過昧昧焉以思之困於心衡於慮而後作也於是審知夫君子之所以為君子小人之所以為小人與治亂安危之所在以謂苟有一介之賤臣斷斷乎朴魯無它技而其心休休焉寛裕温柔而有所容於人之有技若已之所自有人之彦聖而其心好之不啻若自其口出是人也蓋質直樂善之人也吾昔日以為椎鈍而忽之今乃知其為君子君子之質直樂善是可以保我子孫黎民者也故自今以徃我欲容斯人於朝以為國家社稷之利其有心不休休然以有容而挾其技能以傲物於人之有技則冒蔽疾害以惡之人之彦聖則違而拒之使不得通於上是人也蓋忌克嫉害之人也吾昔日以為果銳而善之今乃知其小人小人之忌克嫉害是不可以保我子孫黎民者也故自今以徃我不欲容斯人於朝懼其將危我國家社稷而至於不可救也夫我之所以敗者良由廢弃老成人之言而樂用新進小生不明夫君子小人之心術故秦之為國遂至杌隉而不安旣國之杌隉由我一人聽謀之不審以是推之則知欲致邦之榮懐者亦庶幾惟在一人之有慶而已苟能用質直樂善之君子不用忌克嫉害之小人則是我一人無取杌隉之道旣無取杌隉之道則將轉禍而為福易敗而為成社稷無窮之休豈有旣邪嗚呼君子小人之情狀與夫治亂安危之機蓋盡於此矣斷斷猗無他技猗者語辭唐孔氏曰禮記大學引此作斷斷兮猗是兮之類懐安也論語曰君子之過如日月之食焉過也人皆見之更也人皆仰之穆公當大喪師之後其操心也危其慮患也深思得番番良士而用之惟恐仡仡之勇夫截截之諞言乗閒而進其心之憂日月逾邁若將弗克見者誦言其過而無所文飾於其閒則雖有過不足以為過矣故夫子善之而録其書以附益於帝王誓命之末其與之也可謂至矣然考之左氏傳則穆公雖有此言而終不能踐之者也秦誓之作在於殽師旣敗之後使其果能踐此言則固冝尊事百里奚蹇叔而用之退孟明之徒而逺之休兵息民而不報殽陵之師如是則豈惟霸諸侯而已哉雖王業亦可成也今則不然其所以尊事黄髪者蓋未之聞也方且不替孟明而更委之以政以遂其拜賜之言後二年復敗于彭衙而尚不悔明年又使孟明焚舟以戰出於萬死一生之計然後僅能勝晉于王官又明年晉復伐秦圍邧新城以報王官之役未及報晉而穆公遂死矣貪功弃民終其身而不改惡在其為悔過自訟邪其所以欲用旅力旣愆之良士與夫能容斷斷無他技之臣者殆為虛語耳然夫子志其言於書無少貶焉者蓋彼雖終不能踐其言而其一時悔過自艾之意誠合夫帝王之用心與其潔也不保其徃也其秦誓之謂乎尚書全解卷四十
