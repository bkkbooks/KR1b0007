body:
  text: 尚書全解卷二十二宋林之竒撰泰誓上周書泰誓三篇蓋是武王伐紂誓師之辭史官隨其先後而記之篇名以泰誓者漢孔氏曰大㑹以誓衆顧氏曰此㑹中之最大者故曰泰誓此二說一則以爲大㑹以誓衆一則以爲㑹中之最大者其意雖異然而以泰爲大則同此蓋武王誓師之言爲伐紂而作猶湯誓之伐桀而作也然而不謂之武誓而謂之泰誓者蓋出於史官一時之意篇首有大㑹於孟津之言遂以泰誓二字爲其簡編之别非有深意於其間故先儒之所解亦惟如是而已而王氏好爲鑿説徒見今之書不用大字而用泰字則爲之說曰受之時上下不交而天下無邦武王大㑹諸侯誓師伐以傾否故命之曰泰誓甚矣王氏之喜鑿也夫否泰之泰與太甚之太與大學之大此三字通用也故泰壇泰階泰伯雖經傳所載或有用否泰之泰字然其實與太甚之太大學之大無以異泰誓之爲言亦猶是也是以孟子左氏傳國語舉此篇名或作泰否字或作太甚之太字或作大學之大字明此三字音同義同故得以通用也王氏徒見作否泰字遂以上下不交而天下無邦武王大㑹諸侯誓師往伐以傾受之否爲說其說則新矣然而非書之意也泰誓則爲誓師以傾受之否使誥篇名偶用泰否字則當傾否而作誥矣蓋王氏欲盡廢先儒之詁訓悉斷以已意則其說必至於如此之陋也晁錯從伏生受書二十八篇其時未有泰誓也至於孔安國定壁中書增多五十五篇而泰誓始出然其書遭巫蠱事而不出也遂有張霸之徒僞書泰誓三篇與伏生二十八篇並傳諸儒皆以爲信故其篇内所載觀兵孟津白魚躍入王舟有火復于王屋流爲烏等語漢儒多用之而大史公史記周本紀亦載其僞書蓋莫以爲疑也至後漢馬融始疑之以爲泰誓後得案其文似若淺露又吾見書傳多矣所引泰誓而不在泰誓者甚多蓋霸等雖知剽竊經傳所舉泰誓之文以成此書然諸儒所引霸不能盡見也故融得以疑之雖實疑之然而古文之書猶未出也至於晉世古文書始出諸儒以泰誓正經比較國語禮記左傳荀孟諸書皆合由是僞泰誓廢矣晉之所出尚用古字至明皇天寳中始改用今字又篇名用泰否之泰未必是古文如此或意其出於唐天寳中一時之所定也惟十有一年武王伐殷先儒傳此篇之序有二可疑者而學者信之其一說曰自虞芮質厥成諸侯並附以爲受命之年至九年而文王卒武王三年服畢始伐殷學者信此言遂有受命稱王之說其一說曰武王伐紂觀兵孟津以卜諸侯之心諸侯僉同乃退而示弱至十有三年更與諸侯期而共伐紂學者信此言遂有觀兵示弱之說據諸儒所以有文王受命而稱王之說者徒以武成之篇曰惟九年大統未集而此序云十有一年遂謂居䘮三年然後足以成其數以伐紂之年爲文王受命十有一年也其所以有觀兵孟津之說者蓋以此序言十有一年而篇首言十有三年遂以十有一年爲觀兵之舉此二說雖依倣經文疑若可行然而揆之以理誠有所不可通者案無逸之書曰文王受命惟中身厥享國五十年先儒遂謂文王在位四十二年適有虞芮質厥成之事遂改元正始而更稱元年夫改元正始之說一君而有兩元年或三或四或至十餘此蓋出於漢文帝之稱後元景帝之稱中元而武帝更年號耳自此以前未嘗有改元之事惟始即位者則稱其即位之年爲元年自元年以後皆積累而數之徒欲以見其在位之久近耳非如後世以改元爲國家之大事也豈有文王在位四十二年矣更稱元年武王繼文王之世不以其即位之年爲元年而上冒先君之年者哉漢儒徒以其所見漢時有改元正始之事遂以文王質虞芮之訟爲改稱元年夫虞芮質厥成誠出於文王德化之所感然苟使以此表見於世曰此吾受命之年其無乃待文王之淺也案史記武王伐紂實以其即位之十一年非文王之年也此說與經文合據此序曰惟十有一年武王伐殷一月戊午師渡孟津則是伐殷在於武王之十一年也明矣史記之書又以爲據然而史記既以伐殷爲武王之十一年也而至於伯夷列傳又載其父死不葬爰及干戈之語此則自相違戾豈有即位十有一年而文王猶未葬也哉至觀兵之說先儒之論尤爲乖戾案此序言惟十有一年武王伐殷繼之曰一月戊午師渡孟津其文前後相屬則是一月戊午者十有一年之一月戊午也而先儒以十一年爲觀兵之年至十三年一月戊午始渡孟津以伐紂其於序文既已破碎而不相連屬矣况此泰誓三篇所載皆其渡孟津之時誓師之言初無觀兵誓師之語則序何以忽生此文據先儒之所以必爲此觀兵誓師者徒以上篇曰肆予小子𤼵以爾友邦冡君觀政于商遂以是爲觀兵之舉某竊以爲誤矣武王之意蓋謂當文王之世紂之罪已爲上天之所斷棄矣至我小子嗣位與爾友邦冢君觀紂之政兾其有遷善改過而紂殊無悛革之心其所謂觀者正如子貢曰以予觀於夫子蓋自此觀彼之辭也經文以爲觀政而先儒以爲觀兵必不可之說也然序云惟十有一年而篇首曰十有三年者何也案洪範篇首曰惟十有三祀王訪于箕子而史記又謂武王克商二年問箕子以天道則是洪範之作蓋克商二年之後洪範既爲十有三祀而作則伐商爲十有一年也審矣世儒徒以此篇首十有一年爲洪範十有三年所汨故傳者亦誤作十有三年矣其實一字誤作三字也史記雖以武王十有一年伐殷而又以謂武王九年祭文王于畢觀兵孟津蓋太史公未嘗見古文泰誓徒見世儒有觀兵二年之說遂從而爲之辭耳學者欲觀泰誓之序必知先儒二說之非然後序之意可以無疑矣一月戊午師渡孟津作泰誓三篇泰誓惟十有三年春大㑹于孟津一月戊午者十有一年之正月戊午也不謂之正月戊午而曰一月者唐孔氏曰武王以紂之十二月𤼵行正月四日殺紂既入商郊始改正朔以殷之正月爲周之二月其初𤼵時猶是殷之十二月未爲周之正月改正在後不可追名爲正月以其實是周之一月故史以一月名之此說是也顧氏以爲古文或云正月或云一月不與春秋正月同此雖亦一說然考之其他諸書未嘗有以正月爲一月者則顧氏之說未敢以爲然也紂都朝歌在河之北武王伐紂必自孟津濟河而北泰誓三篇皆其渡河之時誓師之辭也故史官追録其事故作泰誓三篇先儒謂皆以渡河而作上篇未次時作中篇既次乃作下篇明日乃作其意蓋以謂三篇之作皆在渡河之後然而據中篇曰惟戊午王次于河朔則是上篇之作當是未渡孟津時所誓既誓而後渡河已渡河矣至明日戊午乃始作中篇之誓也序云惟十有一年武王伐殷一月戊午師渡孟津而篇首言惟十有三年春大㑹于孟津是春者即序所謂一月戊午也故漢孔氏曰此周之孟春蓋古者改正朔則必以其所用之正月爲四時之首周以建子之月爲正故此以建子之月而爲春春秋書春王正月即此月也泰誓作時周之正朔猶未改也而得以用周之時數月者此蓋出於史記泰誓之時所追録之時月也漢武帝太初元年夏五月正厯以正月爲嵗首顔師古曰此謂建寅之月據未正厯以前用建亥之月爲嵗首而此之以正月爲嵗首史官追正其月名故今漢書自髙祖元年以下如秦正以建亥之月爲正者則皆改爲冬十月與此篇所載正同大㑹于孟津謂諸侯皆以其師來集于孟津將共濟師王曰嗟我友邦冢君越我御事庶士明聽誓諸侯與武王共伐紂者與之同志有友之義焉故謂之友邦冢君者大君也尊之稱也越及也謂友邦諸侯及我周御事之臣以至庶事之賤皆明聽我誓誥之言蓋將言我所以伐罪弔民之意也夫紂君也武王臣也以臣伐君天下之至逆也武王豈逆天下之大順而樂爲此慙德之舉哉蓋有不得已於其間也齊宣王問於孟子曰臣弑其君可乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也紂之爲君既失爲君之道神怒之民怨之則武王不得不應天順人以伐紂非敢加無禮於其君也蓋以紂失爲君之道而天下之人既不以之爲君矣則我雖欲不興師以伐之不可得也故將論其所以弔伐之意則必推言天之所以立君者將使之仁民而愛物今紂則不然此所以見絶乎天也惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母惟天地萬物父母謂天地之於萬物無所不生無所不育猶父母之於子無所不愛然雖無不愛而其生育也非自然而然以聽萬物之自遂則必有頼於位乎天地之兩間而最靈於萬物者以裁成而輔相之然後三才之道備而生育之功全故必擇夫誠有聰明之德充其所以靈於萬物者而爲之元后彼既有聰明之德又居元后之位則能審於人性之好惡以爲之父母然後斯民各得其所而至昆蟲草木之微亦無不遂其性者如此則裁成輔相之德於是爲至人道盡而三才之位定矣此蓋言天地之道相須爲用以成其化育也今紂之爲君則不能盡其所以君父母之德以至於荼毒天下之民而暴殄天下之物使斯民不得其所而萬物莫有遂其性者則是負上天之所寄托而獲罪於天矣武王將欲興兵以爲民除其害故先推言天地之所以立元后以爲民父母之意然後數紂之罪也今商王受弗敬上天降災下民沈湎冒色敢行暴虐罪人以族官人以世惟宫室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勲未集肆予小子𤼵以爾友邦冢君觀政于商惟受罔有悛心乃夷居弗事上帝神祇遺厥先宗廟弗祀犧牲粢盛既于凶盗乃曰吾有民有命㒺懲其侮祭統曰祭有餕者祭之末也古之君子曰尸亦餕鬼神之餘也可以觀政矣所謂觀政者蓋謂政之勤怠羙惡由餕可以觀之此言觀政亦猶是也蓋當文王之時紂爲不道惡積而不可掩罪大而不可解也爲皇天之所震怒而命我文考肅將天威以伐之矣既以伐紂之事命於文考而大勲猶未集則其所以伐紂而集文考之大勲者是乃武王之任也然其所以至於即位十一年之久而後往伐之者蓋予小子𤼵與汝有邦之諸侯尚且顧君臣之大分而猶有不忍之心尚有望於紂之幡然而改自怨自艾而歸於善者十餘年而觀紂之政昬暴日甚曽無悛革之心此其所以不得已而爲此孟津之舉也武王之心只如是而漢儒不之察乃以觀政轉而爲觀兵附㑹於序言十有一年篇首十有三年而爲周師再舉之說此說考之於經而不合揆之於理而不通然歴代諸儒往往多從而信之以爲誠然惟程氏之說曰觀兵之說必無此理如今日天命絶則紂今日便是獨夫豈容更留之三年今日天命未絶便是君也爲臣子敢以兵脅其君乎此言大可以規正漢儒之失而解後學之疑也故某推本此說而附益之以觀政之不可爲觀兵以信周師之實未嘗再舉也武王觀紂之政以兾其萬一之悔悟而紂㒺有悛心方且夷倨而居此夷字當與原壤夷俟之夷同言倨肆而無禮也惟其倨肆而無禮於是弗祀上帝與夫天帝神祇之在祀典者以至遺棄其先世之宗廟亦弗之祀既傲慢無禮而又弗顧於宗廟神祇之祀於是國家之所藏蓄犧牲粢盛以爲祭祀之備者皆盡于凶災盗賊無復存者如春秋所書鼷鼠食郊牛角御廩災之類所謂既于凶也如公索氏將祭而亡其牲之類皆所謂既于盗也至於此則紂之心亦可以自省矣方且偃然自肆於上以謂吾有民可賴以安蓋恃其有如林之旅也謂有命自天必不至於是蓋所謂已有天命也惟其所恃者如此故無有能懲其慢侮之心者此其㒺有悛心之實也夫紂之㒺有悛心其事可謂衆矣而必以犧牲粢盛既于凶盗爲言者蓋人之爲不善雖至於盤樂怠傲無所顧藉然其心苟知天地鬼神臨之在上質之在傍昭昭然不可欺者則猶或畏憚而有所不敢爲苟不復知天地鬼神矣則其爲惡何所不至哉故湯之於葛見其不祀而遺之以牛羊粢盛而未忍伐之也至於殺饋餉之童子知其心之不復悛革於是興師而伐紂之惡至於焚炙忠良刳剔孕婦可謂暴虐之甚然文王猶未忍伐而事之武王猶未忍伐而觀之至於犧牲粢盛既于凶盗而㒺懲其侮則知其㒺有悛心而率諸侯以伐之蓋紂之所以自絶於天地鬼神者至此而決矣故武王遂言其所以致討而卒其伐功之意也天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志前言紂之所以自絶於天地鬼神矣於是遂言已之致討以卒其伐功之意也天之佑助下民將欲使之各得其所而無流離陷溺之患則必作之君以治之作之師以敎之君師立然後斯民無有不得其所者蓋君師者所以代天而理民也故荀子曰禮有三本天地者生之本也先祖者類之本也君師者治之本也無天地惡生無先祖惡出無君師惡治三者偏亡焉無安人故禮上事天下事地尊先祖而隆君師是禮之三本也紂既夷其居弗祀上帝神祇遺厥先宗廟弗祀而又失其所以爲君師之道則是三本絶矣故武王既言遺棄其宗廟神祇之祀而又言其失君師之道以見其所以至於危亡者皆其所自取也上帝之所以立君師惟欲其相助上帝以寵愛綏安此四方之民而已天既命紂以寵綏四方之任而紂不能勝方且荼毒斯民故天改命文王爲之君師大勲未集而武王繼之則其所以相上帝以寵綏四方者在武王不敢不勉苟紂之有罪則伐之無罪則赦之不可踰越於我先王之志也王氏曰有罪不妄赦無罪不妄伐其志在乎克相上帝寵綏四方而已何敢越也孟子曰一人衡行於天下武王恥之蓋有罪於此而不能相上帝以伐之者武王之所恥也此說得之矣同力度德同德度義受有臣億萬惟億萬心予有臣三千惟一心商罪貫盈天命誅之予弗順天厥罪惟鈞予小子夙夜祇懼受命文考類于上帝冝于冢土以爾有衆厎天之罰天矜于民民之所欲天必從之爾尚弼予一人永清四海時哉弗可失既論紂之有罪不可以不討故下文又論其討之必克也同力度德同德度義蓋古人有此語武王舉之以證其伐紂必克之事也春秋左氏傳襄三十一年魯穆叔曰年鈞擇賢義鈞以卜昭二十六年王子朝曰年鈞以德德鈞以卜蓋亦是舉古人之言以證其所欲爲之事也其文勢正與此同武王舉此言者蓋謂凡勝負之義力同則有德者勝德同則有義者勝今我之伐紂其力其徳其義皆有勝之理紂當是時以言其力則億兆離心以言其德則爲天命之所誅故武王既言同力度德同德度義於是遂言我國家所以得是三者紂之所以失是三者以爲證也紂聚羣不逞之人爲天下逋逃主萃淵藪至於有億兆萬人然而人各有心皆懐離背之志我周有臣三千皆肩其一心以與上之人同其好惡㒺有二三也紂之臣億萬其力冝彊矣以其億萬心故雖彊而弱武王但有臣三千其勢弱於紂矣以其永肩一心故雖弱而彊商周之不敵既已明甚而況紂之惡貫積盈溢見絶於天人在所必誅而我文考之德爲上天之所命其於義不可不誅紂則我之所以爲此孟津之舉者不惟其力之必勝而其德與義亦皆紂之所不能敵也紂之罪至於貫盈而無悛革之心故天命我國家往誅之苟釋之而不誅則厥罪惟鈞某於湯誥夏王有罪予畏上帝不敢不正既詳論矣夫紂之所以㒺懲其侮者大抵恃其有民有命故也自武王觀之受有臣億萬惟億萬心則所謂有民不足恃也商罪貫盈天命誅之則其所謂有命者不足恃也天命己去人心已離而紂方且偃然自肆㒺有悛心無有懲其侮者武王纉文王之緒適當天人之所歸則其所處之勢固不得不應天順人以拯生民之命於塗炭之中故予小子夙夜祇懼勑天之命而不敢自寧於是受伐紂之命于文考之廟又且類于上帝冝于冢土以伐紂之事告于天地神祇而後行也王制曰天子將出類于上帝冝于社造于禰此言受命文考即是造于禰也冢土即社也周官肆師曰類造上帝鄭氏注曰類禮依郊廟而爲之蓋古者祭于昊天上帝則有郊祀之常禮苟非常祀而以其事告于天者則其禮依郊祀而爲之舜受堯之禪類乎上帝與此篇同是皆以事告于天而非郊祀之常禮也王制謂天子將出類于上帝是亦非常禮也是以其祭皆謂之類既以類上帝爲依郊祀而爲之則冝于冢土與王制冝于社其曰冝者亦當是非祭祀之常禮權其事冝以制其禮則謂之冝也紂既弗祀夷居以失天人之心故受命文考類于上帝冝于家土則所以昭荅于天地神明之心而遂與諸侯與夫御事庶士之衆渡此孟津而致天之罰於紂也晉師曠曰天之愛民甚矣豈其使一人肆於民上以縱其淫而棄天地之性必不然矣蓋天之所以立君者凡以爲民而已民欲以爲君天則必佑之民不欲以爲君天則必棄之紂之居於民上以縱其淫而棄天地之性爲己甚矣民之不欲以爲君亦已乆矣冝其爲天之所斷棄也故武王於此一篇之中尤致意焉篇首言惟天地萬物父母惟人萬物之靈亶聦明作元后元后作民父母言惟聦明之君有以代天理物然後人道盡而化育之功成於是遂數紂之罪以見其不足以爲父母矣既論不足以爲民父母者於是又論其天佑下民作之君作之師惟克相上帝寵綏四方蓋言紂既失君師之任而天遂以之命我國家則不可不克相上帝以寵綏四方也既言其不可不伐紂矣於是又言天矜于民民之所欲天必從之以見其伐之必克也其終始反覆之意大抵言天之立君而託以民紂不能副其所託而又暴虐之則其所以至於滅亡者皆其所自取非武王以私意而伐之也惟其所以伐紂者皆本之於天命而不敢赦則爾友邦冢君庶士御事庶幾助我一人掃除紂之暴虐以永清四海蓋紂以獨夫爲天下逋逃主以致四海之濁亂者誅一獨夫則惡之根本已除矣此所以能永清四海也時哉弗可失孔氏曰言今我伐紂正是天人同合之時不可違失此言是也大抵聖人不能爲時亦不能失時時非聖人之所能爲也能不失時而已孟子曰匹夫而有天下德必若舜禹而又有天子薦之者故仲尼不有天下繼世以有天下天之所廢必若桀紂者也故益伊尹周公不有天下此皆聖賢所以出處窮通之大致而孟子論之則皆謂莫之爲而爲者天也莫之致而至者命也夫莫之爲而爲莫之致而至蓋以其所遭者皆有不可失之時堯授舜以天下舜授禹以天下非輕以天下與人也天實與之矣堯舜不可失其所以與之之時也湯伐桀武王伐紂非利於取人之天下也天實奪之矣湯武不可以失其所取之時也取之與之皆天也非人之所能爲也故韓獻子曰文王率殷之叛國以事紂惟知時也蓋當文王之時紂雖爲不道猶有可存之理則文王率叛國以事之爲知時及武王之時紂之不道無復有可存之理則武王率叛國以伐之爲知時苟使文王先時而伐之武王後時而不伐則俱爲不知時矣禮運曰堯授舜舜授禹湯放桀武王伐紂時也此言蓋與孟子之言相爲表裏泰誓中周書漢律厯志曰周師初𤼵則殷之十一月戊子後三日得周正月辛卯朔明日壬辰至癸巳武王始𤼵戊午渡逾孟津孟津去周九百里師行三十里凡三十一日而渡以是考之則武王自宗周而來至於孟津其師行蓋已踰月矣於是渡河而北距商郊密邇故三日之間而三誓師焉上篇雖不明言所以誓師之日然以中篇曰惟戊午王次于河朔則知上篇當是上丁之日尚在河南未渡孟津之時所作既誓師而後渡河也中篇則是戊午日既渡而次舎於河之北所誓也至下篇曰時厥明王乃大廵六師明誓衆士則又是戊午之明日己未將啟行以趨商之郊既作此篇而後行也所以三日而三誓師者蓋三令五申之謹重其事而不敢忽也惟戊午王次于河朔羣后以師畢㑹王乃徇師而誓曰嗚呼西土有衆咸聼朕言戊午次于河朔至癸亥凡五日已陳于商郊則是其次也纔一宿耳明日而遂行也而春秋莊公三年書公次于滑左氏傳例曰凡師一宿爲舍再宿爲信過信爲次此說非是據武王之於河朔纔一宿耳而謂之次安在其爲過信爲次也哉左氏傳例拘泥不通大抵類此武王先次舍于河北蓋先諸侯而渡也諸侯之師既畢渡然後以其師來㑹武王於是廵行六師蓋所以慰安其渡河之勞也昔楚莊王圍蕭師多寒王廵三軍撫而勉之三軍之士皆如挾纊武王之徇師而誓是亦所以撫民而勉之也周都豐鎬其地在西當時從武王渡河者大抵皆西方之諸侯故其徇師而誓則嗟歎而呼之曰西土有衆咸聽朕命蓋申誥友邦冢君而示以其伐紂之意也我聞吉人爲善惟日不足凶人爲不善亦惟日不足今商王受力行無度播棄犁老昵比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢德彰聞此武王所聞古人之有是言也人莫不有好苟好之則必有投之而不已之意特顧其所好者如何耳所好者善則其爲善之心惟日以爲不足爲善而日不足則將爲吉人而動㒺不吉矣所好者不善則其爲不善之心亦惟日爲不足爲不善而日不足則將爲凶人而動罔不凶矣故孟子曰鷄鳴而起孳孳爲善者舜之徒也鷄鳴而起孳孳爲利者跖之徒也欲知舜與跖之分無他利與善之間耳蓋舜之徒與跖之徒其孳孳則同其爲善爲利之心則異其積善與利之心則其所成就者將至於爲舜爲跖由是觀之世之人苟能移其爲不善之心而爲善則其爲善亦將無所不至惟其自暴自棄安於爲不善而莫知其非耳由此觀之小人之爲不善其用心亦非不專精以其所習者無非驕奢淫逸之事此其所以用心逾勤而召禍愈速也故武王將極陳紂之惡至於穢德彰聞神怒民怨而不可救將推本其所以然者則將在於爲不善惟日不足而已既諭其理之如此於是陳其所以惟日不足之故而曰今商王受力行無度言其於無法度之事力行之而不怠也中庸曰力行近乎仁所貴乎力行以近仁者惟其有度故也苟於有度之事然後力行之而不怠則其執德也洪信道也篤矣今紂乃力行於非法度之事惟日不足此其所以窮極天下之惡至於危亡而不可救也自播棄黎老以下至於穢德彰聞此又其力行無度之事也黎老國之老成人也孫炎曰面黎色似浮垢也罪人者逋逃之小人也既力行無度之事於國之老成人則播而棄之至於逋逃之罪人則昵比而親之而又方且淫于色酗于酒肆爲暴虐之事其臣下習紂之惡亦皆安然爲殘忍於是分爲朋黨之家互相告訐以爲仇敵其在位之人皆以權勢相脅更相殄滅此其所以億萬臣而有億萬心也紂既淫肆酗虐而其臣下化之人皆朋家作仇脅權相滅於是淫刑濫罰横及無辜之民民之無辜者皆呼天告寃而穢惡之德彰聞于天而爲天之所棄然推原其所以至於此無他惟力行無度故也惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命惟受罪浮于桀剥䘮元良賊虐諫輔謂已有天命謂敬不足行謂祭無益謂暴無傷厥監惟不逺在彼夏王天其以予乂民朕夢協朕卜襲于休祥戎商必克受有億兆夷人離心離德予有亂臣十人同心同德雖有周親不如仁人紂既自絶于天而天棄之則武王受天之明命不可不應天順人而伐之於是遂言夏桀之罪未至於紂之惡而尚且爲湯之所伐此則以見紂之不可不伐也惟天惠民惟辟奉天言天之愛斯民而立之君使司牧之其所以立君者蓋欲使奉天所以愛民之道而已故人君之職惟在於愛民愛民者民懐之民懐之則天與之矣苟不能愛民則失其所以爲君之道而民叛之民叛之則天棄之矣古之人君自堯舜禹以來無非以愛民爲事天之實故能祈天永命而福祚無窮至於桀紂不克奉天而肆爲刑戮流毒下國天不忍斯民陷於無辜也於是佑命成湯使之降黜夏命代之爲君以惠斯民而承順上天之意非天偏私於成湯而偏疾於夏桀也桀不能愛民故天爲斯民而降黜之湯能愛民故天爲斯民而佑命之其或予或奪凡以惠斯民而已桀之罪既已如此況受之罪又過于桀其所以過於桀則下之所言是也剥䘮元良者孔氏曰剥傷害也元良善之長也其意蓋謂傷害善人也不如蘇氏之說曰剥落也䘮去也古者謂去國爲䘮元良微子也微子紂之同母兄以爲庶子而不得立者以其生於帝乙未即位之初以禮考之則與紂俱爲嫡子而微子長故成王稱之曰殷王元子此說是也賊虐諫輔爲比干也紂之所以剥䘮元良使之逃亡而不復追賊虐諫輔至於殺之而無所惜者蓋紂之意謂已有天命謂敬不足行謂祭無益謂暴無傷者此其所以慢神虐民而肆然無所忌憚也太史公曰紂資辯捷給聞見甚敏才力過人知足以拒諫言足以飾非矜人臣以能髙天下以聲此語不知太史公何所據而云然武王數其罪以謂言之如此則信乎如太史公之言也凡此皆紂之罪所以異于桀者蓋桀之所不爲而紂則爲之也世謂桀殺闗龍逢此未必然也武王以賊虐諫輔爲紂之罪浮于桀者使桀果殺關龍逢則是與紂同罪矣湯誥湯誓數桀之罪不過率遏衆力率割夏邑而已又不過曰滅德作威以敷虐于爾萬方百姓而已武王亦惟曰弗克若天流毒下國則是桀之所以亡者惟肆爲虐政以殘害斯民不至于紂之窮凶極惡而無所忌憚也桀猶不免於亡故天以其所以佑命成湯者而命我武以伐紂之事將使其奉天之罰而乂斯民也其者未足之辭也猶盤庚曰天其永我命于兹新邑蓋言之於未然之前者其辭當如此也所以知其以予乂民者以其朕夢協朕卜襲于休祥故知戎商之必克而有以承順上天之明命以乂斯民也戎大也與康誥言天乃大命文王殪戎殷同大明之詩曰爕伐大商其言大商即此所謂戎商也戎商必克言商雖大國我必克之朕夢協朕卜漢孔氏曰言我夢之與卜俱合於羙善此說非是既云朕夢協朕卜則是夢與卜合矣何須繼之以合於羙善國語單襄公曰泰誓曰朕夢協朕卜襲于休祥以三襲也韋昭曰言武王夢卜祥之合故遂克商有天下今當從此說所謂休祥者氣候之先見者髙祖入秦關范増使人望其氣皆爲龍成五色若此之類所謂休祥也中庸曰國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善惡必先知之故至誠如神動乎四體者夢也見乎蓍龜者卜也至於禎祥則此所謂休祥也紂之將亡周之將興其吉之先見至於夢卜休祥三者皆合於是知其必克之理也非惟其驗之於天時有必克之理至於考之人事亦莫不然受有億兆夷人離心離德予有亂臣十人同心同德雖有周親不如仁人此則以人事而知其必克也受爲逋逃主萃淵藪至於有億兆夷人夷人者言此億兆之人紂皆與之同惡相濟視若等夷也雖有億兆夷人然皆朋家作仇脅權相滅其實人各有心離心離德而不足恃也我之所與共事者惟治亂之臣十人雖但有十人皆與我同心同德以戡定禍亂故雖十人足以敵紂之億兆夷人也武王但言亂臣十人而不言其十人爲誰至孔子舉此語而曰才難不其然乎唐虞之際於斯爲盛有婦人焉九人而已雖以爲有婦人焉亦不言其婦人與九人者何人也至漢儒乃以婦人爲文母九人爲周公召公畢公太公榮公閎夭太顚散冝生南宫适此亦但是以意揆之未必然也至劉原甫又謂子無臣母之禮而以婦人爲邑姜夫謂子無臣母之理誠是也而以邑姜爲亂臣亦恐此理不然然則孔子所謂婦人者世既乆逺蓋不可必其爲何人矣而其十人者雖必是周召閎夭之徒然亦不可一一如漢儒取必其當時之九人以足其數蓋經無文闕其所疑可也既紂之億兆夷人離心離德我之亂臣十人同心同德則是億兆夷人之中雖有至親苟其心德之離必將叛之不如我之與亂臣十人皆仁人也仁人用則雖十人不患無億兆之附此正猶孟子曰寡助之至親戚叛之多助之至天下順之也周至也謂至親也此正如所謂親戚叛之但是假設之辭非有所指而言也而王氏則謂指微子而言謂微子之徒以紂爲無道而周有道故去紂而歸我此所以紂雖有至親而不如我之獲仁人也審如是則是周未興師而微子已歸周矣武王既得微子以爲獲仁人然後興師往伐紂如此則是微子預亡其國爲名教之罪人安得爲仁人乎微子之歸國蓋在周既伐商之後某於微子之篇已論之詳矣天視自我民視天聽自我民聽百姓有過在予一人今朕必往我武惟揚侵于之疆取彼凶殘我伐用張于湯有光朂哉夫子罔或無畏寧執非敵百姓懔懔若崩厥角嗚呼乃一德一心立定厥功惟克永世此蓋天之視聽惟視民之好惡而其吉凶禍福應如影響我當奉天之命以盡其惠民之道也以其身任爲君之責凡百姓之有過則是我一人之有罪蓋自任天下之責也湯誥曰其爾萬方有罪在予一人予一人有罪無以爾萬方蓋不如是則不足以爲天吏也既以其身任天下之責則伐紂之罪以拯斯民於塗炭之中者武王不敢不以此而自任也故我今必往而伐紂以揚我之威武往之商郊侵紂之疆取彼凶殘之人以張我之伐功苟能勝紂而安天下則於湯之功有光顯矣此又申結上文之義也受罪既浮于桀則武王伐之而于湯有光固其理也朂哉夫子者言此事乃爾將士之所當勉也㒺或無畏寧執非敵百姓懔懔若崩厥角者漢孔氏曰爾將士無敢有無畏之心寧執非敵之志伐之則必克矣民畏紂之虐危懼不安若崩摧其角無所容頭據孔氏之意蓋謂武王恐將士之輕敵則戒之以寧執非敵之心其所以寧執非敵之心者蓋以百姓畏紂懔懔然若崩厥角恐其或爲紂之用也蓋經文既言罔或無畏寧執非敵百姓懔懔若崩厥角則孔氏之說不得不然也武王既曉之以伐紂之意於是遂嗟歎而緫結之以告庶邦冢君以下謂我之亂臣十人既與我同心同德以伐紂矣則爾當一德一心以與我致討於紂立定厥功則爾與我國家將世世享無窮之福矣書本百篇遭秦火不存至漢稍稍復出伏生以口傳二十八篇孔壁續出二十五篇某嘗疑此二者必有所増損潤色於其間何以知之以孟子知之孟子之舉康誥曰殺越人于貨愍不畏死凡民罔不憝孟子之舉泰誓曰無畏寧爾也非敵百姓也若崩厥角稽首而今文泰誓曰罔或無畏寧執非敵百姓懔懔若崩厥角其字大抵相同而其文勢意㫖則大有不同者康誥伏生所傳之書也泰誓孔壁續出之書也故某以是二者異同之故而致疑焉蓋伏生齊人也齊人語多與潁川異晁錯受書之時伏生老不能正言使其女傳言敎晁錯晁錯所不知者十二三僅以其意屬讀而已孔壁中科斗文字孔氏得之其時科斗書廢已乆時人無能知者姑以𨽻體定其可知者爾則是此二者必有己之所不能曉者而以其意導合麤令成文耳學者生於千載之下當夫簡編訛脫之餘固不必以今之書爲信然而亦當信其可信者而闕其可疑者不可以漢儒所傳之書爲出於帝王之手而不敢畧致疑於其間也孟子生於戰國之時去帝王之世猶未逺而六經猶在尚且以謂盡信書不如無書蓋苟理之所不安則莫可信也況又燼於秦火爛於孔壁而增損潤色於漢儒之手乎泰誓下周書時厥明王乃大廵六師明誓衆士王曰嗚呼我西土君子此篇蓋戊午之明日己未將𤼵于孟津既誓師而後行也孟津之㑹友邦冢君各以其師濟河然後進而陳于商邦武王將帥之而行則必大廵六師明誓衆士告之所以伐紂弔民之意其曰六師史官之序述緫其多而言之蓋泛指諸侯之師也非謂周於此時已備六師之制也案周禮萬二千五百人爲軍王六軍大國三軍次國二軍小國一軍武王未克紂而有天下尚爲商之諸侯但有大國三軍之制耳此云六師蓋指孟津之㑹所合諸侯之師而言之亦猶棫樸之詩美文王能官人而其詩曰周王于邁六師及之此指文王出師之時所合諸侯之師也中篇曰惟戊午王次于河朔羣后以師畢㑹此篇曰時厥明王乃大廵六師明誓衆士辭雖不同其實三篇之誓皆是緫告友邦冢君以及御事庶士但史官變其文耳若謂中篇但告羣后下篇但告衆士則不可也武王既大廵六師明誓衆士於是嗟歎而呼之曰我西土君子蓋當是時友邦冢君及御事庶士之在孟津者皆西土之人也君子者統上下而言越王勾踐伐呉以其私卒君子六千人爲中軍則是士卒亦可以謂之君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民斮朝渉之脛剖賢人之心作威殺戮毒痡四海漢孔氏曰言天有明道其義類惟明王所冝法則唐孔氏遂舉孝經則天之明左傳以象天明以謂凡治民之事皆法天之道天有尊卑之序人有上下之節三正五常皆在於天有其明道此天之明道其義類惟明言明白可效王者所冝法則之據二孔之意蓋欲與下文狎侮五常之義相屬然而其說迂回費力此二句但謂天道之於人其吉凶禍福各以其類而至厥理甚明也禹之征有苖益賛于禹曰滿招損謙受益時乃天道湯之伐桀其誥多方曰天道福善禍淫與此言天道其意正同但其辭有詳畧爾惟天之道其禍福吉凶如影響之應形聲無所僭差而紂則狎侮五常荒怠弗敬自絶于天結怨于民此其所以爲天道之所斷棄也中庸曰天下有逹道五君臣也父子也兄弟也夫婦也朋友之交也此五者皆是人倫之常道故謂之五典亦謂之五常今紂於此五者狎侮而荒怠弗敬是失人倫之常道也孟子曰自暴者不可與有言也自棄者不可與有爲也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也此云狎侮五常即孟子所謂自暴也荒怠弗敬即孟子所謂自棄也此兩句相因而成文漢孔氏曰輕狎五常之敎侮慢而不行之大爲怠惰不敬天地鬼神以此兩句分爲兩意則失之據侮五常但謂其狎五常怠棄之而弗行爾惟其自暴自棄失人倫之常道則是失其本矣所以自絶于天結怨于民也周希聖曰天非絶紂而紂自絶于天民非怨紂而紂自結怨于民此說是也伊尹曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德與此言正相反使紂不自絶于天天其忍絶之乎使紂不結怨于民民其至於怨之乎此蓋言其所以致天人之怒者皆其所自取也自此以下又論其所以自絶結怨之實也天聦明自我民聦明天明畏自我民明威天之禍福吉凶大抵因民而已紂之結怨是乃其所以爲自絶也故武王將論其罪惡貫盈至于上帝弗順祝降時䘮則必先之以其暴虐于民以失四海之心者斮朝涉之脛謂冬月見朝涉水者謂其脛耐寒斮而視之剖賢人之心謂比干忠諫以其心異於人剖而視之此二者其暴虐之最甚者也故首以爲言蓋朝涉而寒者在人情之至可憫也而乃斮其脛賢人之忠諫國家所頼以存者而至於剖其心是可忍也孰不可忍也惟其忍於此作爲刑威以殺戮無辜其毒痡徧於四海之人也冝乎紂之亡無足怪者崇信姦回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作竒技淫巧以恱婦人上帝弗順祝降時䘮爾其孜孜奉予一人恭行天罰古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎崇信奸回之人而用之放黜師保之官而逺之屏棄前世之典刑囚奴國家之正士宗廟社稷之所頼以存者惟在老成人之與典刑耳今紂既崇信小人則於此二者皆棄之而莫之顧於郊社之禮則壞之而不修於宗廟之祀則廢之而不享故其所以孜孜惟日不足而爲之者則惟在於作竒技淫巧以恱婦人婦人妲己之類是也列女傳曰紂膏銅柱加炭火其下令有罪者行焉輒墮炭中妲己乃笑夫紂之欲妲己之恱至爲炮烙之刑以致其一笑則其所以爲奇技淫巧以恱之者冝無所不至矣紂之暴虐至於此極則失天下之心而民怨于下民怨于下則天怒于上於是上帝弗順祝降時喪使紂之必亡也時䘮猶所謂時日曷䘮祝斷也謂斷棄其命而降之殃罰使之䘮亡於此時也天既絶紂而祝降時䘮我國家適當天命之所歸則爾不可不孜孜然助予一人以恭行天之罰而致討于紂也古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎此又舉其所聞於古人之言爲之證也蓋民之叛服無常也撫之則戴之以爲后虐之則視之以爲讎一則以爲后一則以爲讎惟在於撫之虐之之間耳蓋天生民而立之君使司牧之以天下之大而統之於一人夫豈一人之力足以勝此億兆之勢哉恃人心以爲固爾故人君而能撫民則雖以一人而臨天下而有不可動之勢苟不能撫其民而虐之則失其所恃以爲固者而一人之勢孤一人之勢孤則是一人矣以一人而與億兆之人爲讎豈能一朝居焉故曰獨夫受洪惟作威乃汝世讎言紂作威而殺戮無辜以與一世之人爲讎則斯民無有戴之爲君矣是獨夫耳獨夫者失其所恃之勢與匹夫無異與匹夫無異而且與一世之人爲讎是自取滅亡之禍也齊宣王問於孟子曰湯放桀武王伐紂有諸孟子對曰於傳有之曰臣弑其君可乎曰賊人者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑其君也其言蓋出於此苟不能撫民而虐之則是讎也非后也舉天下之人而讎一獨夫豈爲弑君哉樹德務滋除惡務本肆予小子誕以爾衆士殄殱乃讎爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良此又從而爲之喻以見意也樹德若植嘉禾必以雨露灌溉之去惡如除蔓草必芟夷藴崇之絶其本根然後不至於滋蔓武王言此者蓋謂爾邦君庶士於我國家則當如樹德務滋必封植愈固然後斯民永享其利於殷也則當如除惡務本必去紂之虐然後其惡可得而絶故繼之曰肆予小子誕以爾衆士殄殱乃讎言尚與汝務本以除惡也爾衆士其尚迪果毅以登乃辟此則言汝衆士當務滋以樹我國家之有德也孟子論湯之伐葛曰爲其殺是童子而征之四海之内皆曰非富天下也爲匹夫匹婦復讎也湯之於葛但有匹夫匹婦之讎而猶且興兵以復之今也紂既洪惟作威毒逋四海以與一世之人爲讎武王豈得恝然無所惻怛於其心哉故我小子當與爾卿士殄殱乃讎蓋我能與汝去紂之惡則是撫汝而可以爲汝之君矣汝衆士當進其果毅以成汝之君蓋爲滅紂而勝之則將長爲汝之君而撫汝矣汝不可不一德一心以翊戴之也武王所以三令而五申諄􅃨告戒以致其所以弔民伐罪之意者可謂盡矣至是將欲趨紂之郊以決生民之命於商周之勝負則其所以用其衆士也不可無賞罰以懲勸之故遂戒之曰功多有厚賞不廸有顯戮蓋欲其衆之用命則必欲示之賞罰之必信也湯誓曰爾無不信朕不食言汝不從誓言予則孥戮汝罔有攸赦大抵行陣肅師謹重其事其言不得不出於此非誘之以重賞動之以嚴刑以冀其從已也既告之以賞刑之必信於是遂嗟歎而言其臨事而懼不敢自寧之意而已惟我文考之德也若日月之照臨在上近而西土逺而四方無所不被文考之德其光顯于天下也旣已如此則我有周誕受多方以有天下是我周家之於紂蓋有必勝之理矣所不可知者我小子之德如何耳使此行也而我遂克紂非我小子之能用武以卒伐功也以我文考無罪故我國家得以膺上天之休命而集其勲使此行也受克予則非朕文考之有罪乃我小子無良善之德故我國家所以應天順人者不克終而斯民復蹈於塗炭之中而莫之拯救此蓋其兢兢業業志不忘於夙夜故雖有必勝之理而反躬自責惟恐其不勝也此與湯之誥多方曰俾予一人輯寧爾邦家兹朕未知獲戾于上下慄慄危懼若將隕于深淵皆是聖人至誠畏懼之心充實於中則𤼵之於言自然如此無一毫詐僞於其間而先儒引此爲湯武假設以求衆心之辭此說大害義理孟子曰至誠而不動者未之有也不誠未有能動者也湯武以臣伐君皆本天人之證至於東征西怨簞食壺漿以迎王師者惟其至誠爲能動故也使其誓誥多方之言非出於中心之誠然者而設爲恐懼之辭以求衆心則不誠莫大焉旣不誠矣其何能動哉齊威公責楚曰爾貢包茅不入王祭不供無以縮酒寡人是徴昭王南征而不復寡人是問此則假設求衆心之辭蓋其心本不如是而徒以權譎濟一時之冝所以不能動人使之必信使威公之此言出於中心之至誠則其伐楚也將無異於周公之東征矣其功烈豈至如是之卑哉故論聖人之事以爲有所矯情而爲之者皆淺丈夫也尚書全解卷二十二
