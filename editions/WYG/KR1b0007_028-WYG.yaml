body:
  text: 尚書全觧卷二十八宋林之竒撰康誥周書成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材康誥史記管蔡世家曰武王既克殷平天下封功臣昆弟於是封叔鮮於管封叔度於蔡相紂子武庚禄父治殷餘民封叔旦於魯而相周爲周公封叔振鐸於曹封叔武於成封叔處於霍康叔封聃季載皆少未得封蓋自叔鮮而下皆是武王之弟武王既有天下則選建親賢以爲藩翰之勢其母弟之親惟康叔耼季以其年齒尚㓜未有分地餘皆建爲諸侯雖其禀凶醜之資如管叔蔡叔而其惡未暴於天下亦皆分茅列爵以爲諸侯且使監殷以制武庚之命武王之意既以武庚商之餘孽而以殷之故都授之懼其包藏禍心伺我國家之隙以逞其志故雖付之以舊地餘民而其權則管蔡叔之所專也管蔡當周公之攝政憤然有不平之心於是挾武庚作亂以間王室同惡相濟舉兵而西向周公既率邦君御事以征之居東二年管蔡及武庚咸服其辜於武庚則殺之而遂絶殷家之命而管叔者亂之首也故亦殺之蔡叔降於管叔而囚之郭鄰則殷之故都蓋已平定而無患矣然而前代之所建以爲萬乗之居其形勢雄於天下實中國之重地也則夫繼武庚之後而使之撫治之者不可不愼擇其人而况殷之餘民染紂之化草竊姦宄無所不爲而又重以武庚之猖獗則其桀鷔之俗尤難治也非親則不可付以重地非賢則不可委以頑民康叔以弟之懿親而大有賢徳於是以殷之餘民而封之於衛使撫有殷之故都而爲君也漢田肯言於髙祖曰蔡形勝之國也持㦸百萬秦得百二焉齊地方二千里持㦸百萬縣隔千里之外齊得十二焉此東西秦也非親子弟莫可使王齊者當周之時衛之形勢正猶漢之齊也故必康叔之親且賢然後可以任其責焉康叔者以周公之弟成王之叔父而建國於殷之故都且天子所頼以撫民而使之革心向化不可以無勑戒之辭此康誥酒誥梓材之所以作也金縢曰周公居東二年則罪人斯得是伐管蔡者周公也使康叔牧殷之餘民亦在周公攝政之日其篇中有曰周公咸勤乃洪大誥治則是反覆丁寜而誥康叔以治國之道者周公也然其事雖本於周公而成王在上爲天子一政一事莫非成王之所專也周公但攝之而已故序推本而言遂以成王冠之也書之序其體不一有每篇而一序有二篇而一序有三篇而一序者蓋古者史之記載皆以簡冊之所載不可以繁多也故其於一簡之所不能載者則或析而爲二或析而爲三愈多而愈分雖其篇帙之分而其書之所由作則一此所以有異篇而共序也其所以分之則或因所作之時或因其所陳之言如泰誓三篇上篇則将㑹於孟津之時所作也中篇則戊午次於河朔所作也下篇則戊午之明日大廵六師所作也惟其時有先後之不同故其文之繁多則因其時而分之此三篇之誥康叔蓋俱是四方之民五服之君咸造于洛邑周公慰勞而誥戒之時所作也其時既同則因其言之不同而分之康誥所言皆敬典愼罰之事酒誥所言則戒之無荒湎于酒以革殷之舊俗也梓材所言則戒之以匿瑕含垢一切下問而以德懐之之事也惟其所誥之言不同故因而分之以爲簡冊之别此皆出於史官一時之意而不可以一槩論也故如泰誓之命篇則以一名而有上中下者之别此三篇則每篇而命之名是亦其一時史官各隨其指意而然也康叔者漢孔氏曰康圻内國名封字叔意謂武王之弟名封字叔當夫管蔡未挾武庚以叛而成王未以殷之餘民而封之也則食采於圻内之康地焉周公既因㑹於洛而誥戒之史官遂序述其事而作此篇此篇有曰乃洪大誥治則此篇亦可以名大誥矣然周公之相成王而黜殷也其誥諭邦君御事以東征之意既以大誥名篇矣故此則以康叔言故擬取康之一字而以誥字繫之也惟三月哉生魄周公初基作新大邑于東國洛四方民大和㑹侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治案史記周公奉成王命興師東伐遂誅管叔放蔡叔收殷餘民以封康叔於衛七年三月周公往營成周洛邑則是康叔之封蓋在於營洛前數年也今此篇之序既言成王既伐蔡叔管叔以殷餘民封康叔作康誥而其篇首則先言惟三月哉生魄周公初基作新大邑于東國洛四方民大和㑹然後始載成王誥康叔之語則似是先營洛邑而後封康叔故説者疑焉蘇氏遂謂自惟三月哉生魄至乃洪大誥治皆洛誥之文當在洛誥周公拜手稽首之前其意蓋以封康叔之時决未營洛又此終篇初未及營洛之事故以爲簡編脱誤某嘗謂蘇氏之説經多失之易易則已意之有所未安者必改易經文以就之如此則經之本文其存者幾希非愼言闕疑之義也唐孔氏曰既三年滅三監七年始封康叔則於其間更遣人鎮守自不知名號耳夫使康叔之封果在於七年則是正營洛邑之嵗而於經文可以無疑矣然管蔡既挾武庚以叛周公誅其元惡矣而其餘民之尚在者又皆長惡不悛未漸漬於周之美化使其三年伐三監而七年始封康叔則數年之間所以鎮撫而訓導者可以無其人邪孔氏亦知其説之不通故有遣人鎭守之說然此事無所經據但意之而已則孔氏亦是順經意而爲之說不足信也惟王博士曰四國既誅商地始定然後封康叔康叔已封然後宅洛邑乃其事之序也此書先言周公初基作新大邑于東國洛然後繼之以誥康叔之事蓋封康叔在於卜洛之前而誥康叔在於營洛之際當其營治則四方之民與夫五服之君長莫不咸在王者将欲孚大命於諸侯必於臣民所㑹之時而誥之則其所施者廣而所警者衆此康叔之誥所以在乎營洛之時此說近人蓋康叔之封固在卜洛之前而其誥之也乃在於營洛之際序之言蓋推本而言之耳使其始封之初而即以此誥之則其書當爲命之體如㣲子之命蔡仲之命是也惟其丁寜而告之者不在於始封之初而在於營洛之際此所以不謂之命而謂之誥也蓋周公之營洛也将以殷之頑民遷而居之頑民之居於成周者周公既尹正之使之式化厥訓矣其所以丁寜而曉諭之者則有多士等篇頑民既遷居成周而其餘尚淹留於衛則以委康叔而任其司牧之職既以是而委之矣亦不可以無告戒之言也故於作新大邑之時殷之民或徙或否遂以是而誥康叔因以訓迪其餘民也此所以作誥在於營洛之際也惟三月者周公攝政七年之三月也哉生魄者謂明消而魄生三月之十六日也於三月之十六日周公始造基而作新大邑于東國之洛洛在王室之東故也周官大司徒曰以土圭之法測土深正日景以求地中夫地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉洛邑之地既爲天地之中故作新之而四方之民莫不和悦而來㑹也其列爵分土布於九服之國則侯甸男采衛五服之諸侯莫不咸在也周制爲九服王畿之外五百里曰侯又其外方五百里曰甸又其外方五百里曰男又其外方五百里曰采又其外方五百里曰衛衛服之外則蠻服矣衛服以内即禹貢之綏服蠻服以内即禹貢之要服華夷之境自此而分故其㑹於洛邑者惟此五者而已言此侯甸男邦采衛即召誥所謂侯甸男邦伯也特其言之詳略有不同耳亦猶大誥或曰友邦君越尹氏庶士御事或曰邦君庶士御事也五服皆邦也而獨於男之下言之者唐孔氏曰五服男居其中故舉中則五服皆有邦可知其說是也惟其四方之民皆大和㑹而五服之君皆與焉故其百官皆播率其民和恱而見士于周以服其役周公皆有以勤而勞之潘博士曰勤猶杕杜以勤歸之勤是也既勞之矣而又有以戒之故大誥之以治道雖大誥之以治道然其意蓋欲康叔盡其所職以撫綏新民而革其舊習使之莫不遷善逺罪而無自棄於小人之域故於營洛邑之時而遂以此誥之也先儒言因大封命大誥以治道其意以洪爲大封命以大爲大誥以治道謂因大封命以誥之亦不必如此分别要之洪大皆一意也經之言其義同而重􅃨言之者多矣豈可以一一從而爲之說邪王若曰孟侯朕其弟小子封惟乃丕顯考文王克明徳愼罰不敢侮鰥寡庸庸祗祗威威顯民用肈造我區夏越我一二邦以修我西土惟時怙冒聞于上帝帝休天乃大命文王殪戎殷誕受厥命越厥邦厥民惟時敘乃寡兄朂肆汝小子封在兹東土孟侯謂爲諸侯之長也孟長也魯仲孫氏出於公子慶父之後慶父於三桓爲長故仲孫氏或稱孟氏則知孟者長也諸侯之長蓋州伯也王制曰五國以爲屬屬有長十國以爲連連有帥三十國以爲卒卒有正二百一十國以爲州州有伯八州八伯各以其屬屬於天子之老二人分天下以爲左右曰二伯周之初時以周公召公分陜左右以爲二伯則知康叔爲諸侯之長蓋州伯也史記自康叔之子康伯至於昌伯六世皆以伯稱蓋謂是也至昌伯之子頃侯則不復爲之矣於是始稱侯也而史記乃謂昌伯厚賂周夷王夷王始命衛進爲侯而蘇黄門蓋以爲非矣朕其弟者康叔周公之弟成王之叔父故周公以爲汝乃我之弟也如蘇氏曰周公雖以王命命康叔而其實訓誥皆周公之言也故曰朕其弟此言是也封者康叔之名也言其職爲諸侯之長而於天屬之親則我之弟乃汝小子封也康叔既於周公爲弟故可以小子呼之使其訓誥非周公之言則成王豈可以小子而稱其叔父乎蓋此篇所誥皆周公之言但稱成王之命耳既呼其名而使之前故自此以下皆誥之之言也周公之誥康叔載於此篇首尾數百言多及於愼刑敬罪之事者案左氏傳曰周克商使諸侯撫封蘇忿生以温爲司冦則是武王克商之初爲司冦者蘇公也立政所稱司冦蘇公式敬爾由獄以長我王國是也史記管蔡世家云聃季康叔皆有馴行於是周公舉康叔爲周司冦聃季爲周司空以佐成王治皆有令名於天下而左傳亦曰武王之母弟八人康叔爲司冦則康叔在成王之世實以衛侯繼蘇公居司冦之位至於成王顧命之際召太保芮伯彤伯畢公衛侯毛公是時康伯嗣位尚居司冦之官歴事康王也竊謂周公以王命作康誥之時雖使即封於衛而亦并以司冦詰姦慝刑暴亂之事命之故其書有曰外事外庶子外正以外言者治殷頑民於衛者也以衛爲外則内事者司冦之事也惟其爲司冦之官故其言多及於愼刑敬罪之事然其誥之之始也必先世創業之艱難然後汝得以享其餘慶汝必在乎脩仁行義以無負於父兄付與之意然後有以輔翼王室以爲之藩翰也自惟乃丕顯考文王至在兹東土此蓋言文武以盛德大業上得天心下得民意以興我周邦遂使汝得以列爵分土而爲諸侯之長汝不可不思所以保而守之也丕顯考者言文王之徳大明也其曰丕顯考者正猶盤庚所謂先神后也天佑下民作之君作之師凡欲其脩德以子惠斯民而已其爲刑罰殺戮則誠有所不得已焉蓋以德者人之所同好也故我則明之使斯民莫不曉然而向化刑者人之所同惡也吾則愼之使斯民莫不難犯而易避董仲舒曰陽常居大夏而以生育長養爲事隂常居大冬則積於空虚不用之處如此見天之任徳而不任刑也天使陽出布施於上以成嵗功使隂人伏於下而時出佐陽明德者陽出布施於上之譬也愼罰者使隂入伏於下之譬也明德謹罰則文王愛民之心至矣然其愛民之心尤爲著明者則在於鰥寡無告之民未嘗有侮慢之心也孟子曰文王𤼵政施仁必先斯四者正謂此也夫論聖人之盛徳必稱其不廢困窮不侮鰥寡者蓋困窮鰥寡人情之所易忽也於人情所忽者而仁惠加焉猶不敢侮慢則其餘可知也亦猶論離婁之明而稱其察秋毫之未論易牙之知味而稱其辨淄澠之眞至於不敢侮鰥寡則其深仁厚澤所以覆被斯民者無以復加矣而又當分别善惡進賢退不肖而使民知所好惡也故繼之以庸庸祗祗威威顯民先王於黜陟刑賞之間何所容心哉因其可用者則吾從而用之因其可敬者則吾從而敬之因其可威者吾從而威之用之者所謂使能也敬之者所謂尊賢也威之與所謂惟辟作威之威同庸其所可庸祗其所可祗威其所可威則民皆知好惡之所在故文王以此而明示於民也惟其明德愼罰不敢侮鰥寡以盡其愛民之道而又進賢退不肖以盡其覿民之道故能肈造周室奄有區夏以爲天下之君雖其成效則履天子之圖籍以涖中國而撫四夷而其始則在於一二邦修之而已其修之者始於一二邦而其享之者必至於萬國蓋以德行仁者王王不待大故也豈必廣土衆民而後能有爲哉惟得其民則得天下矣蓋文王之德若日月之照臨雖光於四方而尤顯於西土故此西土岐周之民惟是怙恃冐被文王之德化歡聲洋溢稱頌而歌舞之故其道上聞於天天聽自我民聽民之歸我也如此則天之聞之也安得而不美之乎如是乃大命文王誅殷伐紂膺受景命以王天下也文王克成厥勲以新周邦而其大統猶未集於其身其所以卒其伐功革商而爲周越厥邦厥民皆得其敘者乃汝寡有之兄武王勉而行之也惟文武之積德累功以建立周家之社稷故爾小子封得以享其餘慶在兹東土列爲諸侯也夫人之愛其子孫是天下之通義也有得焉而思以與其子孫亦人情之所皆然也文武之造周其勤勞若此亦欲其子孫千億冝君冝王緜緜延延而不絶也康叔既享其餘慶分茅於衛以爲諸侯之長則必思謹其侯度以藩王室然後可以享之而無愧也故周公之誥康叔必先以文武造周之艱難而汝因得以列於諸侯爲之言也㣲子之命曰庸建爾于上公尹兹東夏蔡仲之命曰肆予命爾侯于東土君牙曰今命爾予翼作股肱心膂冏命曰今予命汝作大正正于羣僕侍御之臣此皆始命之辭故其篇皆命之體也而謂之命此篇之作非在於康叔始封之時而在於營洛之後故不謂之命而謂之誥蓋其言曰肆汝小子封在兹東土此乃既封於衛之辭與始命之辭異矣左氏春秋傳定四年衛子魚曰成王分康叔以大路少帛綪茷旃旌大吕殷民七族封畛土略自武父以南及圃田之北竟命以康誥而封於殷虚信斯言也則是康誥之作乃在於始封康叔之時不惟與此篇之言始終不合亦汨夫誥命之體矣王曰嗚呼封汝念哉今民将在祗遹乃文考紹聞衣徳言往敷求于殷先哲王用保乂民汝丕逺惟商耇成人宅心知訓别求聞由古先哲王用康保民𢎞于天若徳裕乃身不廢在王命夫文王之造周室豈一朝一夕之故哉蓋其積徳累功自百里而起明徳愼罰不敢侮鰥寡以致其不忍人之心而又能庸庸祗祗威威則賢人聚於朝而不仁者不得以播其惡於衆民之歸之也若水之就下故爲上天之所眷佑武王因之應天順人以有天下汝康叔於是得以懿親而爲東土之諸侯将使其知父兄之艱難則其享之也烏可以不念之哉然其所以念之者亦不在於他也既以文王之餘慶而享其福禄則其舉而措之以治斯民者亦惟文王是法而已詩曰伐柯伐柯其則不逺既享文王之餘慶則遵文王之道以施之於民其則亦豈逺哉故告之以今之治當在敬循汝考文王之舊繼其所聞而服其徳言所聞者即徳言也繼之則有以傳於後而不冺然又不可以徒繼之而已又當服其言於身而允蹈之也衣德言若說命所謂說乃言惟服是也祗遹文考而服膺其言則其於治民蓋不難矣然自文考以前亦豈無哲王哉去周之近者莫如殷自湯至於武丁賢聖之君六七作其立政立事盡善盡美流風善政亦猶有存者故不可不往而徧求之用之以安治斯民也既徧求殷先哲王所以安治斯民者而用之矣然當其先哲王之撫柔天下也朝廷之上公卿之位蓋必有老成人年彌髙而德彌邵其深謀逺慮以佐其君而圖回四海者汝當大逺而思之宅之於心而忖度之則知夫所以訓民之術矣夫惟殷之聖君聖臣規模在兹既已徧求而逺思則其學於古訓者不爲不至也然自殷以前自夏禹而下豈無善政其可舍之而不求哉則在於古先哲王之道又當别敷求而聞由之以安斯民也由者謂行之也孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士以友天下之善士爲未足又尚論古之人頌其詩讀其書不知其人可乎是以論其世也是尚友也夫以一鄉之善士爲未足又推之於一國以一國之士爲未足又推之於天下以天下之士爲未足又推之以尚論古人則尚友之心豈有既哉今成王之誥康叔既使之祗遹文考矣自文考推而上之又使之敷求殷先哲王及丕逺惟商耇成人自殷先哲王及商耇成人推而上之則使之别求聞由古先哲王此所以尚論古人之世者也然其於殷先哲王則曰往敷求於商耇成人則曰逺惟於古先哲王則曰别求於殷先哲王則曰保乂於古先哲王則曰康保此蓋經緯其文以成述作之體正如舜典記載舜之廵守於南廵則曰如岱禮於西廵則曰如初於北廵則曰如西禮不必求其義也而王氏諸家皆從而爲之說其言破碎附㑹不足取信然經之大意蓋不在是也如必以此等語爲各有其義則於先哲王曰殷於商耇成人曰商亦必有說矣既别求於古先王則其孳孳爲善不自任其聦明以瀹亂斯民者至矣盡矣而又繼之曰𢎞于天𢎞者廣而大之之謂也薛氏曰人各有天如火始然如泉始逹在廣而充之此說是也蓋康叔之治民固不可不取法於文考然文考必取法於殷先哲王及商耇成人故既祗遹文王則當敷求殷先哲王逺惟商耇成人也殷先哲王商耇成人必取法於古先哲王故既敷求殷先哲王逺惟商耇成人則當别求古先哲王也古先哲王必取法於天故别求古先哲王則當𢎞于天也至於𢎞于天則無以復加矣道之大原出於天故也召誥曰今冲子嗣則無遺壽耇曰其稽我古人之德矧曰其有能稽謀自天亦此意能𢎞于天則能順性命之理以成其德而可以裕乃身矣孟子曰君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻此皆若徳裕乃身之效也自祗遹文考引而伸之觸類而長之以至於𢎞于天於是存心養性之道蓋心廣體胖而民無有不被其澤如此則永綏厥位不見廢於王命矣王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民恫痛也瘝病也言康叔之治民不可以不敬當常如疾痛在汝之身也子之所愼齊戰疾人之疾痛在身者自非狂惑失志未有不致其愼者故兢兢戰戰惟恐不及汝之敬於治民其心當如此不可以須臾忘也人之常情天之髙髙而在上者固以爲可畏至於下民林林然而在下則其心必輕而忽之矣故戒之以天畏棐忱民情大可見小人難保言天難諶命靡常甚可畏也然有德則親之有道則享之誠意孚於此而天意應於彼蓋疾於枹鼓之應以其所輔者誠也民之情好安而惡危好治而惡亂固大可見矣然而撫之則后虐之則讎離合之間不容毫髪之差則小人豈不難保乎能保小民則天必輔之矣苟惟肆於民上以縱其滛而棄天地之性則民心未附其何以得天之心哉則民之可畏蓋與天之可畏無以異也故汝之往治之也則無以民爲可忽必盡汝之心以治其國毋懐燕安而肆其逸豫之情乃可以治斯民矣此所以爲不可不敬也我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民此蓋言汝之所以敬於治民不可使之有怨也故引其所聞於古人之言以戒之言致怨之道無小無大皆足以召亂惟其不可使之有怨而已無以爲大而後可畏無以爲小而不知恤五子之歌曰怨豈在明不見是圖言當圖所以逺怨之道而已當順而不順當勉而不勉皆致怨之道也蓋治其國者必順於人而勉於己不順於人則暴戾悖亂以咈百姓之心不勉於己則般樂怠傲以縱一已之欲怨安得而不聚哉此所以在乎惠其所當惠懋其所當懋也欲惠其惠懋其懋則汝小子惟當大我所以應保殷民之道應保者狥民之情而安之也晁錯曰人情莫不欲壽三王生而不傷人情莫不欲富三王厚而不困人情莫不欲安三王扶而不危如此之類皆所以應保之也王者之於民一視而同仁固無間於彼此雖殷之餘民皆吾之赤子也故其應保之心未嘗必替汝既爲君必當有以洪而大之洪而大之則所以治其國者盡於此矣又當助我宅天命以作新民也蓋康叔以衛侯爲司冦既爲王之六卿分職而治則王之宅天命以作新民其可不致其協賛之力哉惟其以𢎞王應保殷民與助王宅天命作新民分而爲二則成王得以司冦之職而告戒之蓋可見矣曰𢎞王應保殷民助王宅天命作新民皆以王言之者蓋此篇雖稱王命以誥其實周公之辭猶曰朕其弟小子封也王曰嗚呼封敬明乃罰惟康叔以列侯入仕於周厠於六卿之列則夫宅天命以作新斯民者固當有以助王矣而其分職也乃周官之司冦司冦之職掌邦禁以詰姦慝刑暴亂者也既爲司冦之官則不可不盡夫司冦之職故又嗟歎而戒勑之言汝之所以行其刑罰當致其敬明也蓋用刑之道惟敬故明王制曰刑者侀也侀者成也一成而不可變故君子盡心焉惟盡心而不苟則既致其敬矣既致其敬則其意論輕重之序謹測深淺之量豈有不明者哉王氏曰敬明乃罰者教康叔以作新民之道也民習舊俗小大好草竊姦宄卿士師師非度而一日欲作而新之其變詐強梗将無所不爲非有以懲之則不知所畏故當敬明乃罰也爲王氏之學者遂因其説以謂殷之頑民難以仁懐易以威服此言甚非先王之所以愛民之意夫秦自商鞅乃遺禮義棄仁恩并心於進取秦俗日敗蓋不減於殷之頑民也漢承秦後而蕭何曹參爲相以清靜寛厚爲天下率破觚爲圜斵雕爲樸號爲網漏吞舟之魚而黎民安乂作爲畫一之歌夫漢於秦之餘民尚不忍以刑罰而繩之孰謂周公而肯爲此乎彼蓋見此篇所言多及於敬刑愼罰之事求其説而不可得故爲此說耳人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺此則敬明乃罰之事也夫惟天下之罪戾别白而不可掩暴露而不可觧大罪則加之以大刑小罪則加之以小罰如權衡焉不可以毫釐差則夫所以敬而明之固爲易也惟其疑獄之難决者則不可以不加意也故周公以此戒之蘇氏以謂周公設爲甲乙二人皆犯死罪而議其輕重甲之罪小小於乙之謂也非其罪不至死也然其罪乃非眚災而惟終之乃惟自作不法而曰法固當爾如是當據法殺不可讞也乙之罪大然非終之者乃惟眚災適爾適爾者適㑹其如此也是眞可讞也此說是也然於既道極厥辜則以爲人之罪法重情輕盡道以責備則信有大罪矣而以常情恕之則不可殺然經言既道極厥辜即繼以時乃不可殺如蘇氏之說則當於其中間更加以常情恕之之意而後文義乃足也此蓋罪之小者既終之而自作不法而又以爲法當爾故不可不殺罪之大者非終而眚災適爾而又自以爲已之辜故不可殺若今之律所謂自首者原其情之類也既道極厥辜者蓋既自以爲有罪云耳此蓋所以原情而定罪也使用法者不原情而定罪則取必於一定之法則刑辟之及與不及惟繫於幸與不幸之間耳諸葛孔明之治蜀也服罪輸情者雖重必釋游辭巧飾者雖輕必戮自作不典式爾游辭巧飾之謂既道極厥辜服罪輸情之謂也虞書曰眚災肆赦怙終賊刑又曰宥過無大刑故無小亦此意也然辭簡而意足此篇自人有小罪至時乃不可殺意與虞書同而文則衍矣此渾渾噩噩之異也唐孔氏嘗引陳壽之言曰臯陶之謨略而雅周公之誥煩而悉何則臯陶與舜禹陳謨周公與羣下矢誓也其意亦或然乎而謂君奭康誥乃與召公康叔語其辭亦甚委悉抑亦當時設語好相煩復也此其評陳壽之失則是矣而以爲好煩復亦未悟夫渾渾噩噩之體自有詳略之不同也王曰嗚呼封有叙時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂如上文所言小罪而非眚者不可以幸免大罪而非終者不至於濫及或殺或否各有輕重之敘則是汝之大明於事而有以服民也蓋前告之以敬明乃罰故此以爲有其敘則是汝能明之也刑既明則民服矣故天下莫不曉然知上之好惡此所以相戒勑懋勉而莫不和平也既明於刑以納斯民於和平之域則汝之爲司冦也可謂盡其職矣然汝之用法必常有不忍人之心而後可蓋司冦之職掌建邦之六典以佐王刑邦國詰四方則其心往往易流而入於忍也然先王之所以建典刑之官其本意惟欲使天下亡一人之獄囹圄空虚刑措不用而已矣如舜之於九官播百榖者則必欲其百榖之豐敷五教之明典三禮者則欲其三禮之舉以至虞工之屬莫不皆然至於臯陶雖命之以明五刑而其意則在於刑期于無刑而已周公之誥康叔以敬明乃罰其意亦然也故既言乃大明服則又繼之以若有疾惟民其畢棄咎若保赤子惟民其康乂若有疾若保赤子皆出於中心之所誠然不期然而然者也大學曰康誥曰若保赤子心誠求之雖不中不逺矣孟子曰今人乍見孺子将入於井皆有􅇶惕惻隠之心非所以内交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也蓋人之有疾而欲去之有赤子而保之此豈可以僞爲也哉舉斯心以加諸彼則無往而不爲仁故若有疾則民莫不遷善逺罪而棄其過咎矣故曰惟民其畢棄咎若保赤子則民莫不安居樂業而各得其所矣故曰惟民其康乂既已棄咎既已康乂則孰有陷於罪而麗於刑此正先王之所以建刑官之本意也故雖命康叔以敬明乃罰而其意則惟欲康叔以是而存心也後之典獄者存心則不然矣故班孟堅曰今之獄吏上下相驅以刻爲明深者獲功名平者多害患諺曰鬻棺者欲嵗之疫非憎人欲殺之利在於人死故也今治獄吏欲陷害人亦猶此也此固獄吏之罪然亦上之人所以循名而責其實者不知使其以是而存心也非汝封刑人殺人無或刑人殺人非汝封又曰劓刵人無或劓刵人自此以上則其恤刑愼罰以不忍人之心爲心者可謂至矣故又戒之以愼法也孔氏以無或刑人殺人爲絶句非汝封則以屬於又曰爲下句非汝封刑人殺人漢孔氏曰言得刑殺罪人夫經之言曰非汝封刑人殺人孔氏以爲得刑殺罪人可乎王氏曰刑人殺人非汝所刑殺乃天討有罪汝無或妄刑殺人也則其言勝於先儒然其於非汝封又曰劓刵人則疑其當云又曰非汝封劓刵人此則改易經文以就已意非闕疑之義唐孔氏以又曰爲周公述康叔之自言其說亦迂回宛轉不甚平易惟蘇氏以非汝封爲絶句不以冠於又曰之上則其義明白矣其說曰刑人殺人者法也非汝意也雖非汝意然生殺必聽汝不可使在人也至於劓刵人則曰非汝獨生殺也劓刵亦如之其文略蓋因前之辭也此說可謂盡之矣蓋司冦之職掌邦禁以懲夫不軌之民然法者天子之所與天下共之也天子猶不可以上下其手况司冦乎是則刑人殺人非汝封之私意也然不任其私意者則其弊易至於廢弛厥職而他人或得以竊其權而用之矣汝既爲司冦之官豈可或移之他人哉劓截鼻也五刑之一刵說文曰斷耳也雖不在於五刑然亦劓之類比於刑人殺人皆輕刑也王曰外事汝陳時臬司師兹殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚外事者王氏曰人君以正德爲内事正法爲外事上所戒者正德之事於是戒之以正法之事以德與法而分内外既已非矣然自此以上是亦正法之事也安得爲至此後方言外事乎蘇氏亦以德爲内政爲外惟先儒以爲外事諸侯奉王之事其說似之矣而未之盡也蓋上所言者司冦之事内事也外事者衛侯之事也以衛侯入爲大司冦故兼内外之事言之左傳定四年衛祝鮀曰成王分康叔以大路少帛綪茷旃旌封於殷虚啓以商政疆以周索下言殷罰殷彞所謂啓以商政也則外事乃衛之事蓋灼然也周公前既以康叔爲司冦典刑之官故命以恤刑愼罰之事於是又謂不獨司冦之掌邦禁爲然也衛之刑禁亦當然爾汝陳時臬事者汝布陳是法以司牧其衆此殷家之刑罰先後輕重各有倫敘當守而用之也臬法也要獄辭也殷家之罰信有倫矣囚之要辭固麗於法矣然汝猶未必能得其情也當服而念之自五六日至於一旬又其久者則至於一時法固然矣罪亦然矣無可生之道矣乃可大斷其辭而加以刑罰也夫死者不可復生斷者不可復續一有不當悔之何及故不可不審也唐太宗問羣臣曰死者不可復生决囚雖三覆奏而頃刻之間何暇思慮自今宜二日五覆奏正得周公之遺意也王曰汝陳時臬事罰蔽殷彞用其義刑義殺勿庸以次汝封乃汝盡遜曰時敘惟曰未有遜事言汝陳是法事其罰之所斷則必以殷家之常法也既服念之久然後丕蔽其囚也必以殷彞言不可以逞一已之喜怒也前言殷罰有倫蓋言殷家之罰固有其倫也此言罰蔽殷彞則謂汝之斷罰必以殷之常法也言殷罰殷彞唐孔氏曰衛居殷墟又周承殷後刑書相因故兼用其有理者謂當時刑書或無正條而有殷故事可兼用者若今律無條求故書之比也用其義刑義殺言汝康叔以殷家之常法刑人殺人固當用其合宜者勿用以就汝封之心所欲也殷罰有倫罰蔽殷彞即上文所謂有敘也用其義刑義殺勿庸以次汝封即上文所謂非汝封刑人殺人也爲司冦於内既當如此而衛之刑用於外者亦當如是也汝之於刑罰既能深思熟慮合於天下公心而不以逞其私意則汝之所爲可謂盡順而有敘矣然而汝當曰我未有能順之事也夫苟無所不順而嘵嘵然以告人曰此我之能順其事也則與夫不順者其何以異哉蓋自言其順者適足以掩其美不言其順者則其所順之事亦豈頓然而減哉孔子曰如有周公之才之美使驕且吝其餘不足觀也已盡遜而有敘固爲美矣驕心一生則其美不足觀矣故周公告康叔以惟曰未有遜事乃所以保其美也舜稱禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功蓋矜則人與之爭能伐則人與之爭功自言其有遜事則必将有不遜之事矣已汝惟小子未其有若汝封之心朕心朕德惟乃知康叔以肺腑之親出則爲諸侯之長入則列六卿之位兼此二職以爲天子之佐而治殷之餘民周公既告以恤刑愼罰之事使之明於小大輕重之序乃可以無忝於司冦之所掌而衛之刑罰亦得其當又當謙恭自牧而不自以爲能則其所以丁寜告勑之者可謂盡矣然衛之民染紂之化風俗頽敗父子兄弟之倫悖亂而不順久矣此非刑罰之所可得而禁亦非嵗月之所可得而革也惟其待之以寛持之以久優游訓廸使之遷善逺罪復其所固有之性則刑罰不試而風俗丕變矣故自此以下又告之以先教化後刑罰漸摩浸漬以革衛之惡俗也已者起語之辭謂汝雖小子然未有若汝之心有志於善也成王既謂未有若汝封之心則康叔之心成王蓋深知之矣成王既知康叔之心而成王之心與夫所脩之德亦汝康叔之所深知也我知汝之心則我之所以告汝者皆汝之所能行也汝知我之心則汝之所聞於我者當以此爲可行也家語曰非其人而語之如㑹聾而鼓之是其人而語之如聚沙而雨之成王知康叔之心康叔又知成王之心則其告之也豈不如聚沙而雨之乎蘇氏曰将有以深告之故言我與汝相知如此此說是也既言我之與汝相知如此故遂從而誥之所以治殷頑民之道也凡民自得罪冦攘姦宄殺越人于貨暋不畏死罔弗憝王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彞大冺亂曰乃其速由文王作罰刑兹無赦不率大戛凡民自得罪者言其得罪於天下自已而招之而非上之人有以使之然也如所謂自作孽是也而其所謂罪者則冦攘姦宄靡所不爲又且殺人殞越人而自取其貨以爲已有且其自強於爲惡而不畏死也夫好生而惡死者天下之眞情也人惟畏死然後可以死懼之既不畏死矣則何所不至哉此其所以犯天下之所共怒而無不惡之也周公将告康叔以衛之風俗自棄於人倫而拂其天性之愛汝當適之以美教而不可遽齊以刑故先設此以爲言而以其輕重相較以𤼵明其意也故繼之曰元惡大憝矧惟不孝不友言冦攘姦宄之人是誠元惡也人固已大惡之矣况於不孝不友之人其惡爲尤大而人之惡之也當愈甚矣人之惡不孝不友者固當在於冦攘姦宄之上然冦攘姦宄之人則可以致之死而無憾而不孝不友者汝則當有以自責而未可以全罪於民也蓋凡民之自暴自棄陷於大惡干國憲而犯衆怒以至於愍不畏死是誠所謂無忌憚者也此誠教化之所不可加蓋其自得罪故也是誠可憝也可憝則可殺矣若乃爲人子而不能敬行其所以事父之事以失其父之心是子不子也爲人父而無惻隠􅇶惕之心以撫愛其子乃憎而疾之是父不父也爲人弟而不念天之明有此長㓜之分而不恭其兄是弟不弟爲人兄而不念父母之鞠子爲可哀而不友其弟是兄不兄也夫父慈而教然後盡父道子孝而恭然後盡子道兄愛而友然後盡兄道弟欽而順然後盡弟道故父雖不慈子不可以不孝兄雖不友弟不可以不恭父之於子兄之於弟各自盡其道不可以不孝不恭之故而愛友之心遂替也苟其爲父者曰子既不孝矣我何以慈爲哉其爲兄者曰弟既不恭矣我何以友爲哉子也弟也亦以是而存心則父子兄弟而俱失其道矣父子兄弟俱失其道雖悖天倫反人理若爲可憝然實可愍而不可憝也蓋非其自得罪故也夫父子兄弟之倫皆其所受於天命之性無有智愚賢不肖之别也而乃汨沒其所受於天者此豈無所自而然哉蓋上失其道教化不明不能使斯民復其本性以馴致於士君子之域則無乃我政之罪乎弔先儒以訓至今當讀爲弔閔之弔惟其我政之罪故可弔閔而不可憝是必引慝自咎冀其感悟而歸於忠厚爲可苟爲不於我政人以爲得罪彼天之與我民以常性而其冺亂至此曽不思其所以然之故乃曰吾當速用文王所作之罰刑以繩之罔有所赦民既不知夫自新之路而迫之於刑罰則其不肖之心浸滛日甚亦将終不循乎大常矣故曰不率大戛爾雅曰戛常也速由罰刑而無赦而民之不率蓋自若也則刑罰不足恃也審矣何以多殺爲哉孟子常引此篇殺越人于貨愍不畏死凡民罔不憝以爲是不待教而誅則夫不孝不慈不友不恭之人其必教之不改然後誅之而未可遽誅也昔舜之命臯陶作士冦攘姦宄則使之明五刑以治之至於百姓不親五品不遜則幾於禽獸舜不以與冦賊姦宄之人同棄於臯陶之刑而乃使契爲司徒敷五教以導之且以在寛爲戒誠以五品至於不遜者非斯民之辜也故周公使康叔於元惡則當憝之而至於不孝不友則閔之正舜之用心也孔子爲魯司冦有父子訟者夫子同狴執之三月不别其父請正夫子赦之季孫聞之不恱曰司冦欺予曩告予曰國家必以孝令今戮一不孝以教民孝不亦可乎而又赦之何哉冉有以告孔子喟然歎曰上失其道而殺其下非理也不教以孝而聽其獄是殺不辜亂其教煩其刑使民迷惑而陷焉又從而制之故刑雖煩而益不勝也夫以不孝不友不慈不悌之人固爲大惡矣苟爲不教而殺則是夫子之所謂不辜也而先儒乃以爲速由兹文王作罰刑謂周公使康叔案法而誅之王氏亦同此說信如此言則夫子赦父子之訟爲縱惡而季孫之言爲合於周公也故不如蘇氏之說爲勝也下文言父子兄弟之皆失其道而其上文特言不孝不友者蓋其文先言子之不祗服厥父事次及於兄又次及於弟然後及於兄之不友故其初但言不孝不友者舉上下以包之也矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂外庶子訓人者薛博士曰庶子者公族之官也周官諸子掌國子之倅燕義以謂天子之官有庶子之官文王世子謂庶子之正於公族者教之以孝悌睦友子愛明於父子之義長㓜之序然則庶子即諸子也天子謂之諸子諸侯謂之庶子其所掌則諸侯與天子之官同故燕義之所掌與周官無異也所謂訓人即如文王世子所言是也此其謂所掌與天子之官同則是矣至其以天子謂之諸子諸侯謂之庶子未必然也燕義既言天子之官有庶子之官則天子亦謂之庶子矣以外云者指衛而言也正長也正人謂衆官之長若周官宫正主宫中官之長司㑹主天下之大計之官之長是也越小臣諸節者謂正人之下諸小臣有符節者唐孔氏曰符節者非要行道之符節若爲官行文書而有符今之印是也康叔錫壌於王以君一國一國之化所自出也今苟不能宣明教化去汙染而與之惟新使斯民之不孝不慈不友不恭之人曠然大變以趨於禮義之域是汝正人之罪也汝正人若不引慝於己自以爲罪而乃不忍斯民之悖戾欲一旦舉而納之於刑固不足以使斯民知改過而率乎大戛矣况夫汝衛國之臣受爵禄於汝以助汝之訓廸黎民如庶子之官其職以訓人爲主以至夫衆官之長及諸小臣有符節之人是皆有位於朝者也乃當分别其善惡以立斯民之善譽不使其惡名之彰也然後可以無曠厥職苟爲不念此不用此而無以助其君則是病其君矣彼乃長於爲惡我亦将惡之也周公之所以言此者蓋爲不能訓導商之餘民去其不善而長其善遽以刑罰誅殺之非特康叔正人之得罪亦汝諸臣之罪也此主於教民而言故先言庶子於正人之上也汝若不能優游漸漬将之以久以驅民於善乃速用此義循而殺之則是汝爲君爲長而不能其家人及其小臣外正也率殺若所謂案法誅之是也小臣外正即上文所謂正人小臣諸節是也其曰外正亦猶外庶子云也夫天下之本在國國之本在家故易家人之彖曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣蓋使其一家之中父子有親兄弟有序舉斯心以加諸彼則天下之爲父子兄弟者定矣此其本末先後之序作於此者必有應於彼其機然也今衛之遺民其不孝不慈不友不恭陷於大惡而不能自反必以之施於家者未盡既不能齊其家又不能倡率其臣使小臣外正播敷教化以立民之善譽而其所恃以治民者惟有速由兹義率殺而已是汝惟肆爲威虐以整齊之放棄王之所以命汝者而不逹之於民乃汝康叔以非德而用之以治民也不能厥家人越小臣外正猶左氏傳所謂不能其大夫至於君祖母以及國人也孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格夫以德化民則民知善之可爲而不善之不可爲如水之寒火之熱故有恥有恥則雖驅之以爲不善亦不肯爲矣以刑齊民則民未必知不善之不可爲特强制之而已故無恥無恥則欺詐誕慢之心生凡可以苟免者無不爲也其犯上作亂何所不至哉今也率殺而無赦則爲非德乂民以非德則雖用文王之罰刑汝亦無以使民之率大戛矣汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌典先儒以訓常謂常事人之所輕故戒以無不能敬常王氏則曰周官以六典待邦國之治故爲諸侯當先敬典予竊以爲不然典者天叙之典即父子兄弟之常道也敬典者敬敷五教是也乃由裕民者在寛是也既不可以嚴刑峻罰以迫切之則無不敬典而用以裕民寛以誘之則易直子諒之心油然而生矣然爾之所以裕民者亦豈可他求哉惟文王之敬忌已潘博士曰敬則有所尊而能順其所爲忌則有所畏而能戒其所不爲此說是也夫成王之所以望於康叔者固欲其祗遹文考而率由其舊不愆不忘也使其於不孝不友之人而速由文王之罰刑是亦祗遹文考而非所以祗遹之矣惟其裕民而惟文王之敬忌則得其所以祗遹之道也蓋不敬忌於文王而以之裕民乃曰其速由文王作罰刑兹無赦是罔民也爾之所以裕民苟曰我惟有及於此無不至也則予一人安得而不恱哉夫成王謂正人之弗念不教而誅其民亦豈成王之所欲哉弗念弗庸既以爲憝矣故敬忌以裕民則我心悦懌成王之所好惡蓋在於此而其德皆康叔之所知則康叔之所擇術當如何哉此所以先言朕心朕德惟乃知而後告之以此也夫周誥商盤雖若詰曲聱牙而不可曉及反覆而考之則未嘗不錯綜經緯而有條理也學者不可不知王曰封爽惟民迪吉康我時其惟殷先哲王德用康乂民作求矧今民罔迪不適不迪則罔政在厥邦成王既以殷之遺俗染紂之化不孝不友大冺亂於民彞當於汝康叔政人得罪斯民苟陷溺其良心而不能自反於善則汝康叔固不可以逃其責矣何者斯民之所以至此者汝不知敬典以裕之故也然分土列爵以司牧殷之遺民者康叔也履至尊制六合溥天之下罔不率服雖殷之餘民亦皆歸於槖籥之中者成王也既以此爲康叔之罪成王獨無責乎哉故自此以下又皆成王以訓迪厥俗使之生其善心者而自任於己也昔孔距心爲齊平陸大夫而其民以凶年饑嵗之故老弱轉乎溝壑壮者散而之四方孟子既以失伍責之而距心自以爲罪矣他日孟子爲齊王誦之而齊王亦自以爲罪也蓋以平陸言之責固在於距心以齊國言之責豈不在於王乎故以衛國言之則康叔固當敬典以裕民以天下言之則成王獨可恝然不以爲意哉成王之告康叔謂我之所以朝思夕慮以康乂殷民未嘗有須臾廢其牧飬之宜一有不至則天降之罰我當順受而不敢怨也我既以此而自任矣爾康叔當如何哉爽惟民迪吉康者言惟民當迪導以吉康之道其理甚明也夫堯舜之民仁壽非其民自爾也迪之者以其道故也桀紂之民鄙夭非其民自爾也迪之者非其道故也夫殷之遺民不孝不友以大冺亂於民彝爲不吉孰甚焉如此則将陷於囹圄以危其身喪其家其爲不安孰甚焉然原夫殷民當其受天地之中以生良心未喪之前孰不知吉康之不可一日舍而凶危之不可一日就哉其所以至此者蓋上之人無以迪之耳苟能以其所固有之性而還以治之則其不去凶危而就吉康未之有也惟夫民之於吉康必在夫有以迪之而後能秉彞而好德故我其思殷之先世哲王之德所可用以安治斯民者作而求之也先儒以求爲求而等之王氏以爲作而求我所爲蘇氏以爲民所求皆非本義蓋求與好古敏以求之之求同作起也起而求商先哲王所以康乂民者而行之也王博士曰聖人不欲康乂天下之民則已如欲康乂天下之民而不知求先王之德未見其能至也詩云王配于京世德作求夫武王之所以配于京者以三后在天故也此作求之謂也蓋成王戒康叔惟文王之敬忌以裕民則其自處可知矣而此言我時其惟殷先哲王德用康乂民作求也此說為善此篇言汝雖小子乃服惟𢎞王應保殷民謂成王之於殷民固未嘗不加意拊循以盡其應保之政汝康叔當惟我之德意以𢎞之而已則夫求殷哲王德之康乂民者正成王之本心也矧今民罔迪不適者無以殷之民其不孝不友與肺腑俱生不可以革也未有迪之而不適者蓋上之化下下之從上如泥之在鈞惟甄者之所爲如金之在鎔惟冶者之所鑄豈有廸之而不適從者哉迪之於仁壽則仁壽廸之於鄙夭則鄙夭苟以爲自暴自棄不可變革而無以迪之則無政在於厥邦矣蓋邦之所以爲邦者以有政也無以迪民則何政之有故我之作求殷哲王之德舉而措之於天下者凡以邦之政不得不然也王曰封予惟不可不監告汝德之說于罰之行今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天先儒曰我惟不可不監視古人告汝施德之說于罰之所行欲其勤德謹刑此說是也蓋言我之所以丁寜而告汝者皆監於古所謂德之說也德者本也罰者其輔助也不本於德其何以行罰哉故罰之行必本於德之說也王氏曰民恱汝德乃以汝罰之行也有罪而不能罰則小人無所懲艾驕陵放横責望其上無己雖加以德未肯心說故于罰行然後說德也王氏既於乃其速由文王作罰刑無赦以爲此父子兄弟所以爲無可赦之道意謂殷俗之薄非罰不能齊整其民而使之遷善故其說不得不然也然觀王氏此言蓋其新法之行不附己者皆私斥逐故以此藉口耳我既不可不以德之說而諄諄然告之矣然今天下之民未底於静以復其天性蓋以其心未有所止戾也禮記曰能定然後能静苟其心未定則感於物而動矣其能靜乎惟其未定以主之於中故上之人雖有以迪之之屢丁寜曉譬至於再三而猶未喻也夫迪之之屢而民猶未同似爲民之罪也然天佑下民作之君作之師惟其克相上帝寵綏四方蓋天之於民固欲其各正性命保合大和以應其上然天之所以誘民者豈諄諄然而告之哉惟立之君師以司牧之君師能脩教於上以納斯民於士君子之域然後可以助夫上帝之寵綏四方而不曠乎天職也今乃使民不定其心以底於靜則雖迪屢而民之未同者乃其所也豈民之罪哉蓋我不能盡其君師之道以助乎上帝而已矣故明惟天之必罰殛我我既負天之所以委付於我者則其罰殛之蓋将順受之豈敢怨哉夫人之所以治其己者不可使其身有可指之罪無以罪之小爲無傷也小或積而成大無以罪之少爲無傷也少或累而爲多則夫戒愼恐懼之心當如何哉惟其㣲疵細過皆可以致患害而招爲殃也况夫積之而至於顯聞于天而天其罰殛之皆我自取之也豈敢怨哉成王之誥康叔固欲康叔負罪引慝無以斯民之冺亂民彞不可憝而當以爲可憫也既以民之不孝不友而歸罪於康叔矣則爲成王者宜如何哉此所以自謂其迪屢未同則天以致罰殛於我也蓋成王此言有成湯慄慄危懼若将隕于深淵之意湯之言曰罪當朕躬弗敢自赦成王之言曰爽惟天其罰殛我我其不怨此皆自任天下之重而不分過於其臣者也爲康叔者既知我之心與德矣則其聞是言也豈不深思熟慮求其所以敬與裕民之道以丕變舊俗哉王曰嗚呼封敬哉無作怨勿用非謀非彞蔽時忱丕則敏德用康乃心顧乃德逺乃猷裕乃以民寜不汝瑕殄敬哉者言我之所以告汝者汝無以爲陳言而不敬也爾當推不忍之心以治斯民無爲可怨之事也民之於君所頼以安其居而樂其生者也豈欲怨之哉惟君有以作怨則民怨之矣故戒以無作怨也若使康叔不裕民以文王之敬忌而惟以文王之罰刑用之則有以作怨矣非謀非善謀也非彞非故常也非善謀而從之非故常而行之則必至於敗事而作怨故戒以勿用也汝但斷之以至誠大法於敏德則怨何自而興哉蔽與一言以蔽之之蔽同言非謀非彝不可用而惟當蔽之以此也薛氏曰時忱者至誠之道也敏德者至健之德也惟至誠故能守惟至健故能爲此說是也蓋古之人所以大有爲於天下者惟誠與敏而已守之以誠而行之以敏則豈有不裕者乎汝當用此以安汝之心省汝之德逺汝之謀則可以裕民而民自寜矣我之所以分民而與之共治者惟欲其安寜而無危亡之患也今汝能裕民而使之寜則我不以汝爲瑕疵而殄絶之也王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命髙乃聽用康乂民王若曰往哉封勿替敬典聽朕告汝乃以殷民世享王氏曰小子從父兄奉令承教則拘出而爲人君則肆肆而罔念或至于殄享以天命無常故也王氏於大誥肆哉其說亦然皆牽強不足取大誥之言曰肆哉而後曰爾庶邦君越爾御事則其文勢以爲肆而不拘雖非其本義猶可爲說至此章曰肆汝小子封而亦爲肆而不拘豈可通哉肆今也成王之誥康叔反復詳盡開其爲此而禁其爲彼其言可無餘藴矣又告之以天命之無常戒謹之不可怠故言今小子封也夫天之福禄災祥至難諶也有德則興無德則亡如影響然無毫釐之差豈可以爲常有而不失哉汝無謂我既錫汝以爵分汝以土則衛國可長保也汝能敬典以裕民則子子孫孫繼世長久雖與周相爲終始可也其苟用非謀非彞以作怨於民則汝身之所不能保何有於後人故汝當念之無使我有以殄絶之也享明乃服命先儒曰享有國土嘗明汝所服行之命令是也髙乃聽者聽於古先也夫成王之告康叔自祗遹文考推而上之至於敷求殷先哲王及逺惟商耇成人自逺惟商耇成人推而上之至於别求聞由先哲王則其聽豈不髙乎用康乂民即上文所謂用康保民是也惟聽之髙則可以康乂民矣言汝往之國當敬典以裕民使民之有父子兄弟之愛則易直子諒之心油然而生當常行而勿廢也欲不廢其所以敬典之事也能聽朕告汝者服膺而不失則以殷民世世享國矣夫殷民者染紂之化陷於大惡其受衷於天者皆冺亂而不復存矣若不可以與之一朝居也然衆非元后何戴后非衆罔與守邦使其以殷民暴戾之故嚴刑峻法以冀其改雖刑者相望於道而不孝不友之人自若也其誰與守邦也哉惟其敬典於上以夫民之所固有者還以導之則殷民雖冺於民彞而其終也必将去其放辟邪侈之事以自反於善以之世享豈不可哉昔唐太宗嘗嘆曰今大亂之後其難治矣魏徴曰大亂易治譬如飢人之易食也封德彞曰不然三代之後澆詭日滋秦任刑法漢雜霸道皆欲治不能非能治不欲徴書生好虚論徒亂國家不可聽徴曰五帝三王不易民而教行帝道而帝行王道而王顧所行如何耳若人漸澆詭不復返朴今當爲鬼爲魅尚安得而化哉德彞不能對魏徴之心蓋以君子之道待天下而不以小人之道待天下謂天下無不可化之人惟在上之人所以化之者如何耳如德彞之言則是刑罰可以遏亂原而納之治也太宗從徴而不從德彞先教化而後刑罰是以四年而遂致太平成王之告康叔亦不欲鄙其民而寛以待之故其始終之間而以告之者惟曰欽典以裕民而已蓋不欽典則斯民不知父子兄弟之親而可愛欽典而不裕民則民不能優游饜飫而善心自生與不欽典何以異哉惟其欽典而裕民則其始也雖不孝不友天下之所共棄而其終也必将遷善逺罪陶陶然而不自知矣其與刑罰豈可同日而語哉嘗觀秦之末俗借父耰鋤慮有德色母取箕帚立而誶語抱哺其子與公併倨婦姑不相恱則反唇而相稽至於漢興遺俗益甚及文帝之世蓋秦滅者五六十年矣而殺父兄者猶相繼甚哉秦俗之似商俗也然漢之君臣特以簿書期㑹不報之閒以爲大故至於流俗失世敗壊因恬而不知怪故秦之舊俗迄不悛革歴千餘年而卒未有以復文武成康之舊惟成王以欽典裕民而告康叔推其言而行之則其丕變於忠厚豈難也哉不觀諸漢無以知成王之言爲當時之要務也尚書全觧卷二十八
