body:
  text: 尚書全解卷七宋林之竒撰禹貢夏書書有五十八篇其體有六曰典曰謨曰誥曰命曰訓曰誓此六者錯綜於五十八篇之中可以意會而不可以篇名求之先儒乃求之於篇名之間其堯典舜典則謂之典大禹謨皐陶謨則謂之謨至於訓誥誓命其說皆然苟以篇名求之則五十八篇之義不可以六體而盡也故又増而為十曰貢曰征曰歌曰範雖増此四者亦不足以盡書之名學者不達古人作書之意而欲篇名求之遂以一篇為一體固知先儒所謂貢歌征範増而為十蓋有不知而作之者不可從也禹貢一篇盖言禹之治水其本末先後之序無不詳備名雖曰貢其實典之體也學者知禹貢為典之體則謨訓誓誥命見於他篇皆可觸𩔖而長故堯典舜典大禹謨皐陶謨益稷禹貢皆是史官記載唐虞之際所行所言之事其事非有先後之異故自堯典至益稷皆虞史所䤸故謂之虞書禹貢者夏史所錄故謂之夏書亦如邶鄘衞之詩邶地所采者則謂之邶國風鄘地所采者則謂之鄘國風衞地所采者則謂之衞國風其間非有異也禹貢之篇夏史所錄故不得謂之虞書而孔氏乃謂此堯之時事乃在夏書之首禹之功以是顯此過論也使其不列於夏書之首而列於堯典舜典大禹皐陶謨之間則禹之功遂為不顯於世乎以此知孔氏之説為不然禹别九州此盖作序者言禹所以治水之事所厎之績其大槩如此也孫氏曰共工氏之霸九州也其子曰后土能平九州則自堯舜禹以前天下經界亦分為九遭洪水之時經界圮壊封圻湮沒禹於是正其經界使九州各復其舊如東南距濟西北距河是為兖州東北據海西距岱是為青州之類是皆髙山大川分別為九州之界也隨山濬川任土作貢漢孔氏曰刋其木深其流此説是也觀益稷所載謂予乗四載隨山刋木暨益奏庶鮮食此所謂隨山也予決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食此所謂濬川也既隨山濬川扵是人得平土而居之至於烝民乃粒萬邦作又故繼之任土作貢盖洪水既平故任土地之所宜而制為貢賦之差觀禹貢之所載者有貢有賦賦者自上稅下之名謂治田出穀也即此九州之田賦是也貢者自下獻上之稱獻其土地之所有以供天子服食器用之具如兖州而下厥貢篚之𩔖是也先王取民之制不過什一而已多乎什一則大桀小桀也少乎什一則大貉小貉也禹之取民既有田賦又有貢篚者鄭氏謂以所出之穀市其土地所生異物各獻其所有故謂之貢盖九州之内土地所生之物有可以供天子之服食器用必使之得以辨其多寡以充每嵗之常賦以是知所謂貢者其實乃在於九等田賦之内非扵田賦之外别有貢也孟子曰夏后氏五十而貢啇人七十而助周人百􅅿而徹其實皆什一也夫九州之貢雖有上下輕重之不同皆不過乎什一此所以為任土作貢也別而言之則有貢有賦有上下之差合而言之則貢者乃賦稅之緫稱不必漆絲鹽絺之𩔖然後謂之貢盖併與田賦之所出包篚之所入皆在其中矣此貢之一字與啇之助周之徹皆是其一代之制取民之緫名也觀禹貢篇雖載禹治水之事如是詳而堯舜禹之取於民者實存於此書是可以為法於天下可傳於後世故以禹貢為名也禹貢禹敷土隨山刋木案書之序皆言作某篇而禹貢獨不言作者唐孔氏曰以發首言禹句末名貢篇名足以顯矣然考諸篇凡序篇名足以顯者而又曰作某篇者多矣此説不通盖書之文尚簡嚴文不欲繁故上既言作而下不復言作亦猶仲虺既言仲虺作誥下文故不言作仲虺之誥微子既言微子作誥下文亦不言作微子與此同也禹敷土者禮記曰鯀鄣洪水而殛死洪範曰鯀湮洪水夫五行相勝之序土能治水故鯀執此以為治水之法故其施功也惟務以土而湮之障之夫洪水之勢浩浩滔天奔突漂悍乃欲以土而鄣之以與水爭勢於隄防之間適以激其怒而増其勢而至扵奔突漂悍也故至九載績用弗成若夫禹治水則不然以謂水性潤下惟使行其所無事則水得其性矣故其治水也惟務敷土而散之順其自然不與水爭勢於隄防之間而水得其性矣此所以有成功也史官言禹之治水而其初之一言曰禹敷土可得發明禹之意也隨山刋木者以除其障蔽驅其禽獸使避水者各安其居也奠髙山大川奠定也言九州之界未有所定禹既隨山刋木除其蔽障之後於是以其每州山之髙者川之大者畫為界甸以定九州之分域也王制曰廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜夫九州風俗之所以異者盖本廣谷大川異制也故禹之所定九州之經界以髙山大川為之準所以然者本其風俗之異也故濟河惟兖州専以大川為之界荆及衡陽惟荆州則專以髙山為之界荆河惟豫州華陽黒水惟梁州則兼以髙山大川矣於是自九州而下各别其九州之經界而言及治水之曲折與其田賦之髙下貢篚之多寡盖前目而後凡也孔氏曰髙山五岳大川四瀆定其差秩祀禮所視此説不然夫定其差秩祀禮所視此有司之常事耳而乃言於刋木之下冀州之上非序也則知孔氏之説為不然冀州冀州唐孔氏曰九州之次以地為先後以水性下流當從下而泄故治水皆從下為始冀州帝都於九州近北故首從冀起而東南次兖而東南次青而南次徐而南次揚從揚而西次荆從荆而北次豫從豫而西次梁從梁而北次雍雍地最髙故在後也自兖而下皆準地之形勢從下向髙從東向西青徐揚三州並為東偏雍州髙於豫州豫州髙於青徐雍豫之水從青徐而人海梁髙於荆荆髙於揚梁荆之水從揚而入海也兖州在冀州東南冀兖二州水各自東北入海也蘇氏之説曰堯之河水為患最甚江次之淮又次之河水冀兖為多而徐其下流被害亦甚禹都於冀故禹行自冀始此説皆未盡盖禹之治水其始也必決其懷襄之水然後導川澤之流而其所為先後之序具載於九州之後導岍及岐以下是也此之所載但記夫九州之經界與其田賦貢篚之詳若夫治水之先後不在於此也夫洪水之為害泛濫於天下其治之也必相視其水之大勢順其地之髙下漸而導之不可拘於經界之限也故自導岍及岐以至又東北入于河其首尾本末各有條理盖治水之勢未嘗不自上而導下自下而決之於海史官條列備言於經界之後論九州者但當觀其分疆定界與夫制田賦之多寡不必論其先後之序禹貢自兖州而下八州皆言經界而特冀州不言經界者別帝都也雖不言經界以餘州而準之則冀州經界實存於其間兖州言濟河自東河以東也豫州言荆河自南河以南也雍州言西河自西河以西也冀州之域三面距河自積石東北流入于中國則折而南流雍州在其西故曰西河至華隂則折而東流豫州在其南故曰南河至于大伾則又折西北流兖州在其東故曰東河以三州考之則冀州在東河之西南河之北西河之東王制曰自東河至于西河千里而近自常山至于南河千里而近此則冀州之境界也此篇雖不言冀州之經界而冀州境界亦可以互見餘州之間故禹貢之書所以獨出於千載之上非後世地理家之所能及也周官職方氏奠九州之經界正東曰青州正南曰荆州正西曰雍州正北曰并州皆是指周之王都所向之方而言之況以王都混同扵其間無所異曰河南曰豫州非特不能别王都之所在乃并與九州所止之方無所辨别也此則職方之差也既載壺口治梁及岐先儒皆以冀州既載為一句而漢孔氏以謂堯所都先施貢賦役載扵書至唐孔氏又謂計人多少賦功配役載於書籍然後徴而用之以治水也據經但有既載二字而諸儒遂加賦役載扵書之意案兖以下九州之名之下皆為絶句惟冀州之下有此既載二字而下文壺口二字又無所屬唐孔氏云於壺口之下言治者欲見上下皆治也其説亦陋此當從蘇氏之說以既載壺口為一句詩曰俶載南􅅿謂始有事於南􅅿也此亦始有事於壺口然後治梁及岐也故曰既載壺口治梁及岐禹貢山川地理歴三代春秋至于今且數千年其間地名既世代變易各有不同又其川瀆下流多所圮壞無復考據唐孔氏據漢先儒所載山川地理而附益之以班孟堅地理志所載其意盖以謂孔氏去漢初七八十年耳身為武帝博士必當具見圖籍其山川所在必是驗實而知班孟堅據漢山川必當得其大槩故正義則引以為據今姑依正文所載而旁採諸儒之説以正其義是非取舎尚在諸友博學多識而自擇焉某亦不敢自必也孔氏曰壺口在冀州梁岐在雍州漢地理志曰壺口在河東北屈縣東南梁山在左馮翊夏陽縣西北岐山在右扶風美陽縣西北盖壺口在河之内乃屬於冀州梁在河之外故屬扵雍州言冀州之水而及扵雍梁岐者曽氏曰吕不韋曰龍門未闢吕梁未鑿河出孟門之上大溢逆流名曰洪水大禹䟽通謂之孟門案地理志謂壺口在北屈之東南而酈道元謂孟門在北屈之西南則壺口孟門之東山也龍門在梁山北則梁山龍門之南山也以是言之其先河出孟門之上横流别出則知其東之壺口其南之梁山其西之岐山皆墊於水矣禹於壺口之西闢孟門而始事扵壺口於梁山之北闢龍門而終事扵梁山而其餘功又及岐山焉盖壺口梁岐一役也其施功皆同時不可分言於二州所以獨言於冀州者以雍州之山也既修太原至于岳陽孔氏曰髙平曰原今以為郡名故漢有太原郡岳陽者孔氏曰岳太岳在太原西南山南曰陽地理志岳陽者即太山之南也曽氏曰太原汾水之所自出岳者經之下文所謂太岳是也山南曰陽太岳之南汾水之所經也既修太原至于岳陽道汾水故也夫河過孟門龍門而汾水自東入焉汾不以道則河亦失所經也故既載壺口而修太原繼之夫壺口曰既載而太原曰既修者曽氏曰經始而治之之謂載因其舊而治之之謂修禮記曰禹能修鯀之功則修之為言因其舊而治之可知矣壺口昔未甞治也禹經始而治之故曰既載壺口太原則因鯀之功而治之故曰既修太原此説是也覃懷底績至于衡漳孔氏曰覃懷近河地名漳水横流入河覃懷致功至于衡漳地理志云河内郡有懷縣盖覃懷二字共為一地王肅云衡漳二水名而孔鄭諸儒亦謂漳水横流入河當從孔氏之説清漳水出上黨沾縣大谷東北至渤海阜城縣入河濁漳水出長子縣東至鄴縣入清漳盖此二水相合横流而入河也曽氏曰河自大伾折而北流漳水東流而注之地之形南北為縱東西為横河北流而漳東流則河縱而漳横矣禹自覃懷致功遂踰太行而北既得漳源而導之入河漳水合河下流如不以道則亦害於河流故也曽氏論禹貢山川地理援引書傳考究源流其説皆有依據比諸儒之説為最詳學者能取信於先儒之說則思過半矣禹治水先後之序既見於下文導山導水之次矣而扵逐州之下又各言其治水之曲折者盖下之所緫載者惟著其首尾本末之大槩欲其脉絡相應則其文不可以不詳故其文之所不備者則又於逐州之下言之欲使後世因逐州之所言究其水之所歸則亦㑹同於後之所緫載盖致詳於九州之間而持其大綱於後則衆流各有所歸矣故逐州言治水之曲折盖是欲聚一州之水於逐州之下使後世有所考據非謂先治一州之水使有所歸而後治一州也冀州在東河之西西河之東南河之北故其所治自壺口至于衡漳皆所以治河流之害與夫別流之入於河者為之決導使之順序蓋於下文導河積石以下載河流之大槩而其委曲則見於冀兖等州彼此相發而治水之功可以盡見厥土惟白壤厥賦惟上上錯什一之法天下之中正也而其為法盖本於堯舜之時孟子曰欲輕於堯舜之道者大貊小貊也欲重於堯舜之道者大桀小桀也以是知堯舜之道得乎輕重之中過乎此不可也不及乎此不可也是以為法皆得天下之中正而其定土田之肥磽與貢賦之髙下其逺近多寡強弱之差具存乎禹貢之書啇周取民之制皆損益此而已是知此篇所載田賦貢篚之制正孟子所謂堯舜之道重則為桀輕則為貊其為法得天下之中正可以為後世之所取則學者不可不盡心也周官大司徒辨十有二壤之物而知其種以教稼穡樹藝以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政盖將欲敎民樹藝與夫令地貢斂財賦必辨九州土壤之所宜土惟不同則所宜之穀亦不同如周官職方氏荆揚州宜稻冀雍則宜黍稷之類因其土地所宜而教之播種則其所収者必多也故禹於洪水既平之後將欲敎民粒食因而制田賦之差必先辨九州土壤所宜以利民也然欲辨土壤之所宜有二曰白曰黒之𩔖辨其色也曰墳曰壤之𩔖辨其性也先辨其色性之不同然後知其播種之所宜如周禮草人糞種騂剛用牛赤緹用羊墳壤用麋渇澤用鹿以是知土地之不同其播種之宜必先辨其土之色與性為如何不可以一槩觀也冀州者色別其土則白性別其土則壤所謂壤者漢孔氏云無塊曰壤顔師古注漢書曰太柔曰壤鄭氏注周禮曰壤和綏之貌其言雖不同其㫖則一也既物色其土宜則農事於是乎興故載九等田賦之差於其下孟子曰夏后氏五十而貢殷人七十而助周人百􅅿而徹其實皆什一也盖三代之取於民雖不出於什一之制而其取之之法又不同一夫受田五十􅅿而以五􅅿為稅就其五􅅿之中校數嵗之中以為常此夏后氏之貢法也一夫受田七十􅅿以七􅅿為公田借民力而耕公田隨其多寡而取之此啇之助法也一夫受田百􅅿畿内用夏之貢法稅民無公田邦國用啇之助法制公田不稅此周之徹法也三代取於民之法雖不同其數則不出於什一之數既不出於什一而乃有九等之差者盖九州之賦稅計其所入之緫數而多寡比較有此九等冀州之賦比九州為最多故為上上兖州之所入比九州為最少故為下下其餘七州率皆如此非是取於民之時有此九等之輕重也鄭氏云田賦之差一井上上出九夫稅下下出一夫稅通九州一井稅五夫唐孔氏破其說曰鄭氏箋云井稅一夫其田百􅅿若上上一井一夫則下下九井乃出一夫稅太少若下下井稅一夫則上上全入官矣豈容輕重頓至是乎孔氏之說甚善孔氏亦謂此九等所較無多諸州相準為等級耳此計大率所得非上科定也孔氏之說既得之矣而又論上上錯則亦謂一升一降不可常同冀州自出第二與豫州同時則無第一之賦豫州與冀州第一同時則無第二之賦此則又與前說違戾矣夫孔氏既謂諸州相準以為等級則是冀州雜出第二之時與豫州比較自有多寡非出於貢賦之時可以懸定也冀州之賦出於上上錯者盖冀州之賦較於九州為第一而雜出於第二唐孔氏曰多者為正少者為錯此州言上上錯者少在正下故先言上上而後言錯豫州言錯上中者少在正上故先言錯而後言上中揚州下上上錯不言錯下上上者以本設九等分三品而為之上中下下上本是異品故變文言下上上錯也梁州之下中三錯者梁州之賦凡有三等其出下中時多故以下中為正上有下上下有下下三等雜出故言三錯足明雜有下上下下可知也孔氏之説是也夫九州之賦疆理其地者牧其田以授農夫校數嵗之中以為常矣則是九州之賦自有常數而九等之差亦不可易也而又有錯出於他等之時者盖嵗有豐凶水旱之不同不可必取於每嵗之常賦必時有所蠲以利民是以其所入之緫數自有増損多寡之不同孟子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然將終歳勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑烏在其為民父母也孟子此言謂其有激而云將以救戰國暴虐之弊政則可若謂禹貢之法為不善則不可盖九州之賦既有每嵗之常數而又有雜出於他等之時則是其於凶年無取盈之理觀禹貢一篇然後知禹之貢法未甞有不善也禹之貢法既善矣意者後世之子孫不善用之惟取必於每嵗之常賦又無雜出於他等之時此夏法之所以為弊也本朝太宗既平河東制為和糴之法是時斗米十餘錢草東八錢民樂與官為市其後物貴而和糴不改遂為河東世世之患夫謂河東和糴為弊政則可若謂太宗和糴之法為不善則不可亦猶禹之貢法謂後世之子孫不善用之則可若謂禹之貢法為不善則不可此孟子之言不可不辨厥田惟中中此又以九州之田別其髙下以為九等也鄭氏謂著其髙下為九等王肅謂定其土地之肥瘠以為九等而唐孔氏則亦謂若從鄭說則髙處地瘠出物既少不得為上者若從王氏説則肥處地下水害所傷出物既少不得為上則當以漢孔氏之說為正謂髙下肥瘠共相參對以為九等矣於九州之土則以其色以其性言之至於其田分為九等之差者盖自其發生萬物而言之則緫謂之土故謂其色與性至於加人工而播種焉則謂之田然後可以九等髙下言之也夫田之髙下既分九等則其田賦亦當稱是而乃有異同者盖田有髙下逐􅅿所収之多寡而比較之然九州之間地有廣狹民有多寡則其賦稅所入之緫數自有不同不可以田之髙下而準之也荊州之田下中而賦則上下田賦相較所差者亦五等其田賦相較所以如是之遼絶者盖洪水既平之後民之蕩析離居未復其業必有偏聚之地闢地有先後人功有修否不可得而均也是以賦之所入與田之等級有如此之懸絶也其在禹之時則必有説也自今而求之則不可得而見也而曽彦和袁思正之徒皆曲為之說以臆度之未必得古人所以輕重之意也餘州先田後賦冀州賦之獨先於田者盖王畿千里之地天子之所以自治併與場圃園田漆林之𩔖而征之如周官載師之所載則非盡出於田賦也故以其文屬於厥土之下而餘州皆田之賦也故先田後賦此所以異於畿内也貢篚之制自兖州而下皆有之而冀州獨不言者鄭氏曰此州入穀不貢下云五百里甸服傳云為天子服治田是田入穀故不獻貢篚差異於餘州也鄭氏此說必不然盖將謂此州為治田出穀餘州獨非治田出穀乎非治田出穀則其所貢賦於上者果何物哉是知此説為不可用也嘗考冀州之所以不言貢篚者盖畿内之地天子之封内無所事於貢也蘇氏曰冀州畿内也田中中而賦上上理不應爾意其當時事有相補除者豈以其不貢而多賦邪此說是也恒衞既從大陸既作凡九州之載治水之曲折言於田賦之上者未定田賦而先有事於此者也言扵田賦之下者盖田賦既定之後而其功乃成也恒衞既從大陸既作者其功之成在扵冀州之物土宜定田賦之後故其文勢屬扵田賦之下不與覃懷厎績至于衡漳文勢相屬也恒水出恒山上曲陽縣東入滱水衞水出恒山靈壽縣東北入滹沱河大陸在鉅鹿縣北此其説皆出漢地理志也既從者從其故道也既作者水平而可耕作也曽氏云恒衞二水在帝都之北而且逺大陸地最卑而河所經故其成功在於禹貢田賦既定之後此說得之㠀夷皮服漢孔氏云海曲謂之㠀居㠀之夷還服其皮明水害除也此說不然夫茹毛飲血而衣皮夷狄之本性然也不必水害既平而後乃得其皮觀禹貢九州如冀州之㠀夷青州之莱夷徐州之淮夷梁州之和夷與雍州之織皮崐崘析支渠搜皆是逐州之間所近要荒之服也洪水既平之後任土作貢自綏服之内皆有每歳之常貢至於要荒之服則不責其必貢也亦不責其重貨也間有效誠於上者則使之惟輸其所有之物如蠙蛛織皮之𩔖是也㠀夷皮服者言水害既除海曲之夷獻其皮服也蘇氏扵揚州卉服云㠀夷所通至於此州之皮服則云水害既除得服皮服是以此二句分為兩説其自違戾如此夾右碣石入于河禹貢於逐州之末皆載其通於帝都之道孔氏曰禹治一州之水既畢遂還帝都白所治孔氏此說未敢以為必然案地理志碣石在右北平驪城縣西南則碣石者是負海之山也夾右碣石入于河盖遵海而入于河也冀州帝都所在禹治水功畢而還帝所豈須遵海入河然後能至哉揚州不言入于河者則是禹之欲至帝都必先由江以入海由海以入淮泗由淮泗以入于河竊意當時必不如是之迂回也鄭氏則謂治水既畢更復行之觀地肥瘠定貢賦上下若如鄭氏之說則又不當敘於田賦貢篚之下也王肅則以凡州之下說諸治水者功主於治水故詳記其所治之州往還所乗渉之水名據禹貢所載乃是達于河之道非有往来乗渉之事以是知此諸説皆不通而王氏又不以此句屬於逐州之下而乃以貫於次州之上其説􅀹為乖戾惟周希聖謂九州之末皆載其達于帝都之道盖天子之都必求其舟楫之所可至使夫諸侯之朝貢商賈之貿易雖其地甚逺而其輸甚易此説得之冀州所都盖在東河之西南河之北西河之東三面距河是其建邦設都之意實有取於轉輸之利朝貢之便也禹貢所載上言田賦貢篚之事而於下言其所以達於帝都之道其始未曲折莫不盡備而皆以達于河為至盖達于河則達于帝都故也然而青揚二州獨不言達于河者盖兖州之言浮于濟漯達于河矣故青州直云達于濟盖由濟漯以入于河也徐州言浮于淮泗達于河矣故揚州直云達于淮泗以入于河也既以九州之道達于河則其利於舟楫通於轉輸者無足疑也此云夾右碣石入于河者盖在冀州之北者逺於帝都之地或有舟楫轉輸則必遵海道以入于河然後至於帝都瀕河之地則徑自河以達扵帝都矣薛氏曰夾挾也自海入河逆流而西右顧碣石如在挾掖也本朝祖宗都于大梁盖所以取其轉輸之便自江淮閩蜀而来者則達于汴河自京西而來者則達于蔡河自山東而来者則達于五丈河凡欲至于京師者皆以達于河為至是亦得乎唐虞建邦設都之意也濟河惟兖州自兖州而下八州皆以其髙山大川定逐州之疆界序所謂別九州而篇首所謂奠髙山大川也鄭漁仲曰禹貢之書所以為萬代地理家成憲者以其地命州不以州命地也如兖州者當時所命之名後世安知其在南在北故曰濟河惟兖州以濟水河水之間為兖州也以荆山衡山之間為荆州故曰荆及衡陽惟荆州濟衡者萬代不泯之山川也使荆兖之名得附此山川雖後世更改移易為不沒矣觀漁仲此言所謂得禹貢之意盖由萬世而下求禹貢九州之分域皆可得而考者由其以山川之髙大者定逐州之界故也濟河惟兖州者孔氏謂東南據濟西北距河此兖州之界也孔氏於濟言據於河言距者唐孔氏曰據謂跨也距謂至也濟河之間相去路近兖州之境跨濟而過東南越西北至東河也其意以謂據者其地不止於是距者則止於是而已此說得之濟字今文書作從水從齊而古文書周禮職方氏班孟堅地理志皆作從水從案說文從水從字注云濟沇也東入海也而從水從齊字注云濟水出常山房子縣賛皇山東至癭陶入泜由此二字音同故後世遂以從水從齊字為兖州之濟其實字訛也今當從古文書作從水從􅙻者為證州名曰兖者古者疆理天下以為九州九州之疆理不可以無別也故州為一名以别之其命名之意盖出於一時之偶然其要欲辨九州之名耳不可必求其義也而李巡注爾雅皆從而為說以謂兩河間其氣清厥性相近故曰冀冀近也濟河間其氣專質體性信讓故曰兖兖信也餘州皆如此其說之是非盖未可知然而荆州之為荆原其意惟在於荆山為界故耳盖自荆山之外則豫州也而爾雅亦謂荊強也其氣燥剛禀性強梁以是觀之其為曲說蓋可見矣要之學者之於經其義理之是非真偽有以惑世者則雖豪釐錙銖之差不可不辨楊氏為我㧞一毛而利天下不為也墨氏兼愛摩頂放踵利天下而為之而孟子辨之以為其極至於無父無君此則儒者之所當言也至於物之名數古人假借以為別異此則不必辨也說者於十二律五音十千十二支之名從而為之說凡此皆穿鑿附㑹無補於學者不如不辨之為愈也九河既道此盖兖州治水之曲折也河自大陸而北分為九河以入于海九河之名則爾雅所謂徒駭一太史二馬頰三覆鬴四胡蘇五簡六絜七鈎盤八鬲津九是也曽氏曰自徒駭至於鬲津皆是複名先儒以簡絜為單名固不論矣爾雅所載但有八名其一不名者河之經流也先儒不知河之經流不為異名故分簡絜而為二漢許商曰徒駭是河本道東出分為八支審如許商所言則河自徒駭乃分為八審如曽氏之言則是九河其一為經流而其八者皆其支派也然據下文曰又北播為九河同為逆河入于海九者並列支派則其勢均也安得以其一為經流以其八為支派哉九河之地在漢平原郡以北漢許商曰徒駭胡蘇鬲津今在成平東光鬲縣界中唐孔氏云上言三河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也爾雅九河之次從北而南既知三河之處則其餘六者太史馬頰覆鬴在東光之北成平之南以簡絜鈎盤在東光之南鬲縣之北也理或然也孟子曰禹䟽九河瀹濟漯而注之海謂之䟽九河則是禹之前既有九河矣遭洪水湮塞禹但䟽而通之耳惟其疏而通之故謂之九河既道言九河皆已復其故道也雷夏既澤孔氏曰雷夏澤名周禮職方氏兖州其浸盧維鄭氏注云盧維當作雷雍引此雷夏既澤為證匏河經凛邱經雷澤其澤藪在濟隂城陽縣西北其陂東西二十里南北十五里即舜所漁也既澤陳博士云雷澤之水昔常散漫至是而聚也川欲其行而不可使之湮澤欲其聚而不可使之散或導之而行或聚之而止順地勢之自然而已故無容私焉宜導而不行宜澤而不聚其為害也無所相異河既道澤既陂然後二者各得其宜此說是也灉沮㑹同灉沮二水先儒並不著其水本末故孔氏曰二水㑹合同此澤盖謂同注于雷澤也案爾雅曰灉反入注云河流別出復還者說文云河灉水在宋據此二說則灉水乃出於河而還入於河非注於雷澤也沮水不見所出案地理志云沮水出常山元氏縣首受中邱西山窮泉谷東至堂陽入黄河然而常山非兖州之地曽氏云灉之下流與芒之雎水合灉濁而沮清合而為一經所謂沮即雎水也然沮之字從水其字音雎既音雎字不應與雎字相亂曽氏誤讀以沮字音雎故為此説據左氏傳哀六年楚莊王江漢雎漳楚之望也釋云雎七如反此可以與沮相亂然而又非與灉合流之水也以是知灉沮二水皆未可指定其處如先儒謂注于雷澤亦未可以為定論要之㑹同皆異出而合流也是無疑矣周希聖云㑹同朝宗皆諸侯見天子之禮故以為喻其論甚善桑土旣蠶是降丘宅土桑土旣􅁞盖謂宜桑之土於是始有桑以養􅁞也經曰飼􅁞勿用雨露濕桑盖蠶性惡濕也惟其惡濕故當洪水未平宜皆不得享夫􅁞桑之利及夫洪水既平矣於是􅁞桑之利始獲故曰桑土旣􅁞然而九州之民皆頼􅁞桑以為衣被而獨於兖州言之者盖兖州之貢絲與織尤宜扵此故於此州言之以見斯民之享其利也是降丘宅土丘山之小者兖州之地界於躋河之間平地多而山少當夫洪水滔天之時髙山則為水所包民之避水於山者其害為輕陵則襄而上之民之避水於陵者其害為重兖州既居下流平地多而山少則民之被水之害比之九州為最甚今則九河既道雷夏旣澤灉沮㑹同桑土旣􅁞於是丘陵之民乃始降而居平地盖居山之民降而宅土未足言也至於下流卑濕之地無所逃於湯湯之患者今降而宅土此􅀹可喜故於兖州獨言之厥土黒墳言此州之土以色别之則黒以性別之則墳墳者土膏脉起也左氏傳曰公祭之地地墳是知墳者起之稱也厥草惟繇厥木惟條繇茂也條長也九州惟此與徐揚二州言草木者孔氏曰三州偏宜草木也此說不然案九州之勢西北多山東南多水多山之地則於草木為宜皇矣詩曰帝省其山柞棫斯拔松栢斯兊以是知西北之地最宜於草木也至於東南之地沮洳卑濕則於樹藝誠非所宜竊謂此三州言草木者盖此三州比九州之勢最居下流其地卑濕沮洳遭洪水之患草木不得遂其性而生育其已久矣至是而或繇或條或夭或喬或漸包故於三州遂言之以見水土既平草木得遂其性非謂此三州偏宜草木也厥田惟中下厥賦貞厥田惟中下者田第六也厥賦貞先儒云貞正也州第九賦正與九相當蘇氏曰貞正也賦當隨田髙下此其正也其有不相當者盖必有故非其正也此州田中下賦亦中下皆第六故曰貞此二者不同當從先儒之說九州之賦相較而為上下之等雍州之賦出第六而兖州之賦不應又出於第六也先儒所以謂兖州第九賦正與九相當者盖參考九州獨無下下之賦故此州治水最在後畢州為第九成功其賦亦為第九此其説是盖洪水之害河為最甚而兖州又河之下流其被墊溺之患比於餘州最為慘酷故雖能獲播種之功而土曠人希又卑濕沮洳之患未盡去是以樹藝之利尚非所宜雖田在第六而其賦比於九州為最少也作十有三載乃同此謂兖州雖出第九之賦而猶至於十有三年然後乃有賦法與他州同説者多以十有三載為禹治水所歴之年故唐孔氏云鯀治水九載績用弗成然後堯命得舜舜乃舉禹治水三載功成盖其後於餘州之賦若此其久也他州十二年此州十三年馬融之說亦然曽氏舉髙堂隆之言曰禹治洪水前後歴年二十二載盖是以鯀之九載并此十三載而數之為二十二載也此說皆不然據此文承於厥賦貞之下而又曰作十有三載乃同則是專為兖州之賦而言也盖兖州之賦必待十有三載然後同於餘州非所謂此州治水至十有三載而後功成也若果謂此州治水必至十三年而成功則其文勢不應在扵桑土既􅁞是降丘宅土之下也厥貢漆絲厥篚織文浮于濟漯達于河兖州之地宜漆林又宜桑􅁞故貢此二物也有貢又有篚乃入貢之物盛於篚為貢也古者幣帛之屬皆盛於篚蘇氏引篚厥𤣥黄為證是也織文者錦繡之屬曽氏曰織文因織而有文者錦繡之屬不一故言織文以包之謂之織則繪畫組繡而有文者不與矣八州之貢有多有寡之不同揚州荆州之貢為最多兖州雍州之貢為最寡者各因其地之所有而不強之以所無也雖有或多或寡然皆得以其所入準其髙下以充每嵗之常貢是以有多寡而無輕重也浮于濟漯達于河顔師古曰以舟行水曰浮言泛舟于濟漯而後達于河也濟即下文導沇水東流為濟以下是也史記曰禹以河所從来者髙水湍悍難以行平地故穿為二渠引河水北載之髙地注曰其一出貝邱西南二折者也其一則漯川然二渠之事不見於經難以考證案漢書地理志曰漯水出東郡東武陽縣至樂安千乗縣入海觀此文則是漯水千乗所流然未必禹所穿之渠也唐孔氏曰自漯入濟自濟入河周希聖曰由濟而入漯由漯而入河然案經文不見濟漯相通之道此二說未敢以為然要之此二水不必相通苟濟亦可以入河則亦可以謂之浮于濟漯達于河矣達唐孔氏曰從水入水曰達達當謂從水入水不須舎舟而陸行也尚書全解卷七
