body:
  text: 尚書全解卷三十宋林之奇撰召誥周書成王在豐欲宅洛邑使召公先相宅作召誥召誥周自后稷在唐虞之際以播種百榖教民稼穡之故始封於邰生民之詩曰即有邰家室是也稷之子不窋當夏后政衰去稷不務以故失其官自邰出奔于戎狄之間公劉者不窋之孫也雖竄于戎狄之間能脩后稷之業勤恤愛民民咸歸之於是始立國于豳公劉詩曰豳居允荒是也太史公曰公劉子慶節立國于豳誤矣公劉雖立國于豳然其地西近戎北近狄故其十世孫太王嗣立狄人侵之太王不忍殘其民以自存於是去豳踰梁山而邑于岐山之下緜之詩曰至于岐下聿來胥宇是也文王之立初由居岐及其旣已克崇而有之於是自岐而遷于豐文王有聲之詩曰作邑于豐是也武王之立又自豐而遷于鎬文王有聲詩曰宅是鎬京是也邰卽漢之右扶風漦縣豳者漢之右扶風栒邑縣豳鄉是也岐者漢右扶風美陽縣岐山是也卽禹貢所謂導岍及岐其邑在岐山之下豐者漢右扶風霸縣鄷水是也卽禹貢所謂東㑹于灃其邑在鄷水之西鎬者漢長安西南有昆明池北鎬陂是也岐在邰之西北無百里豳又在岐西北四百里餘是公劉自邰而西徙于豳太王自豳而東徙于岐也豐在岐山東南二百餘里鎬去豐二十五里皆是自西而東也武王旣克殷遷九鼎于洛之郟鄏其意已欲宅洛矣史記周本紀載武王之言曰我南望三塗北望岳鄙顧詹有河粤詹雒伊毋逺天室營周居于雒邑而後去是宅洛者武王之本志也武王雖有宅雒之志然其克啇也天下未集而遽即世成王以幼沖嗣立而周公攝政管蔡武庚肆其不軌之謀以間王室周公方興師討叛左枝右梧之不暇宅雒之事未能為也至其攝政七年周公制禮作樂已致太平將歸政于成王故營洛邑以卒武王之志而後歸政也史記曰武王在豐使召公復營洛如武王之意周公復申卜視卒營築居九鼎焉左傳亦曰成王定鼎于郟鄏是其宅雒者以卒武王之志也周禮曰以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉然則武王有宅洛之意而周公成王成之者誠以洛為地中五服諸侯之朝覲貢賦道里為均故建以為都以居九鼎而㑹諸侯于此焉篇内有曰王來紹上帝自服于土中而車攻之詩羙宣王復會諸侯于東都而其詩謂之復古則自宣王之前其會諸侯蓋皆于此而萬乘之君則當在于鎬以宗廟社稷之所在而王業之所本故也不獨此也周之西土廹近邊徼故雖其前世積德累仁而常有夷狄之患太王以來至為之遷都去國以避之自豳而岐又自岐而之豐鎬皆自西而東周公猶以為未也又東營洛邑以逆為後世之備及犬戎之亂平王卒遷而居之雖其孱弱無以紹文武成康之緒而其所以遷者是亦周公之意也婁敬曰成王即位周公之屬傅相焉乃營成周居雒以為此天下中諸侯四方納貢獻道里均矣有德則易以王無德則易以亡夫人之愛其子孫天下之常情也先王之奄有天下以傳之子孫固冝緜緜延延於萬年而不絶惟其子孫之賢不肖厯祚之短長不可得而必然其創業垂統深根固蒂為不可㧞之勢以遺之者未嘗不盡也乃謂周公之心苟其無德則欲其易以亡必無此理當三監之難雖其元惡渠魁皆已殱夷而其黨姦同惡之人其頑梗未能遽革將使之密邇王室以馴服其心而洛之地距妹邦下逺則不難于遷居故其宅洛也瀍水之西則建以為都而居九鼎謂之郟鄏亦謂之東都亦謂之王城瀍水之東則以居殷頑民而遷之謂之成周漢地里志有曰河南郡河南縣注云故郟鄏地成王遷九鼎周公致太平營以為都是為王城至平王居之洛陽縣注云周公遷殷民是為成周春秋昭公三十二年晉合諸侯于狄泉以其地大成周之城居敬王蓋王城之與成周雖已營之而未之都也幽王有犬戎之禍平王始遷王城至敬王與王子朝爭國子朝之黨多居王城敬王始都成周成周之地自敬王以前未建以為都至敬王始居之此晉所以合諸侯而城之也王城成周雖皆洛之地然王城在西周城在東故子朝在王城謂之西王而敬王謂之東王也是則周自太王至敬王其遷都建國皆是自西而東也說者乃謂周公之營洛邑即自鎬還而居之此說太史公已辨之矣其言曰學者皆稱周伐紂以營洛邑其實不然武王營之成王使召公卜居九鼎焉而周復都豐鎬至犬戎敗幽王周乃東遷于雒邑則成王未嘗都雒也明矣周官曰歸于宗周畢命曰王朝歩自宗周宗周鎬京也豈得為成王都雒也哉說者又謂幽王之前蓋有自雒而遷于鎬故幽王之敗而平王東遷此事雖無所經見而周之遷徙皆自西而東蓋其勢然也未有自洛而遷于鎬者也成王當是時在于豐地欲居於洛邑以為東都使召公先往相其所居之居因卜而營之王與周公繼至召公乃于庶殷丕作之時取幣以錫周公因告王以厯年享國之長短無不自己求之者時周公欲成洛邑而後歸政于王王將總萬㡬而治天下故欲王戒愼恐懼以祈天永命此召誥所以作也清廟之詩曰周公旣成洛邑朝諸侯率以祀文王焉是時周公尚攝則宅洛者周公也而此序乃言成王焉正與康誥序言旣伐管叔蔡叔同義惟二月旣望越六日乙未王朝歩自周則至于豐惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥旣得卜則經營越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成若翼日乙卯周公朝至于洛則達觀于新邑營越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一越七日甲子周公乃朝用書命庶殷侯甸男邦伯厥旣命殷庶庶殷丕作後漢律歴志曰日月相推日舒月速當其同謂之合朔相與爲衡分天之中謂之望望者於月之半月當日衝日光照月光圓滿而相向當猶人之相望也漢志曰周公攝政七年二月乙亥朔庚寅望後六日得乙未故召誥曰惟二月旣望越六日乙未又其三月甲辰朔三日丙午召誥曰惟三月丙午朏月采篇曰三日曰朏此篇記成王之至豐以二月之乙未召公之至洛以三月之戊申而必先言二月旣望三月惟丙午朏者唐孔氏曰治歴者必先正朔望故史官因紀之將言望後之事必以望紀之將言朏後之事必以朏紀之猶今之人將言日必先言朔是也三月之朏丙午也於丙午之後戊申之日以越三日言之則知二月之乙未言越六日旣望之爲庚寅可知矣周謂宗周鎬京也成王以乙未之旦行自鎬京則至于豐以營洛之事告文王之廟示不敢専也鎬豐去二十五里故朝𤼵鎬京則可以至于豐不待淹日也文王都豐故豐有文王廟必至于豐而後使召公相宅則其為告文王廟必矣既告廟矣則使太保先周公而行徃洛水之傍而相視其可居之處也越若來者林子和薛博士皆以爲召公順周公之謀以來陳少南則以爲順王命以行使此諸家以越若來爲絶句則以若爲順周公與順王命猶可也今旣能依先儒以越若來三月惟丙午朏爲絶句則其說不通矣蓋即所謂哉生明月之三日也朏以紀歴耳而上曰越若來安得以爲順周公與王命哉此只當從先儒之說以二月之後依順而來次三月也戊申三月之五日也乙未二月之二十一日其月小盡故三月得甲辰朔五日爲戊申太保以戊申之旦至于洛蓋十四日而至也旣至洛矣即以其日卜之龜䇿以謀所居也周官太卜國大遷大師則貞龜盤庚之遷亳大王之遷岐衞文公之遷楚丘未嘗不卜也召公之卜也其至誠之所感召可以通天地神眀故其應也如響此其所以得吉卜也我卜河朔黎水我乃卜澗水東瀍水西我又卜瀍水東所謂宅卜也惟洛食所謂得吉卜也洪範曰謀及乃心謀及卿士謀及庶人謀及卜筮營洛之謀成王君臣旣有定議矣於是謀及卜筮也太王之遷岐聿來胥宇而後爰契我龜文公之遷楚丘望楚與堂而後卜云其吉皆此類也卜旣吉矣則人謀鬼謀無有差忒此所以經之營之而規度其朝市宗廟郊社之位於戊申之三日庚戌三月之七日太保乃以衆殷民治其位于洛水之北於庚戌之五日甲寅三月之十一日朝市宗廟郊社之位其規模皆成也禹貢導河東過洛汭而導洛東北入于河則洛汭爲洛水之北也可知禹貢曰導洛東北㑹于澗瀍則澗瀍皆在洛之北而王城在瀍之西成周在瀍之東雖澗在瀍之西而澗瀍皆在洛之北故位于洛汭也周公則以位成之明日三月之十二日其旦至于洛則徧觀新邑所營之位也方是時周公攝政營洛之事周公主之召公則與之相為先後而成之故卜宅攻位者召公也周公則達觀之而遂以命殷庶也若翼日者亦與越若來之若同位成而周公適觀之則將命庶殷諸侯以工役之事於是先告祭於天地社稷也越三日丁巳用牲于郊牛二告祭於天地也郊祭天之名也而用牛二者先儒以為后稷配故也不如王博士曰昊天有成命郊祀天地也蓋祭亦可以郊言之惟郊於天地故用牛二也丁巳者乙卯之三日三月十四日也越翼日戊午乃社于新邑牛一羊一豕一告祭于社稷也牛一羊一豕一用太牢也葉博士曰記曰社稷太牢古之祭未有社而不及稷者載芟春籍田而祈社稷良耜秋報社稷蓋祭社而稷從之其來尚矣此說是也旣告祭于天地社稷矣周公乃以戊午之七日三月之二十一日甲子之旦冊書以命衆殷民及侯甸男服之邦伯使興功也古者有大工役必以賦功屬役之事著于書規模旣定然後役興焉蘇氏引春秋傳士彌牟營成周計丈數揣髙卑度厚薄仭溝洫物土方議逺邇量事期計徒庸慮財用書餱糧以令役于諸侯屬役賦文書以授師而效諸劉子以此為書是也如宣公十一年楚令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平版榦稱畚築程土物議逺邇略基址具餱糧度有司事三旬而成不愆于素是亦用書之遺意也邦伯先儒謂即州牧也特言邦伯者王氏曰公以書命邦伯而邦伯以公命命諸侯也厥旣命殷庶庶殷丕作者言周公旣用書以命庶殷役之以土木之事而庶殷之民莫不大作趨事赴功惟恐不及也夫成王之民營洛蓋以殷民之頑將遷之以自近也今日召公率之以攻位而位成周公命之以書而丕作雖頑民之難化者猶然則其說以使民可知夫孰以爲厲已哉召公之經營洛邑自戊午距甲寅凡七日而後成周公繼至自乙卯達觀于新邑營距甲子凡十日而用書命殷庶庶殷大作周召之規模其敏如此緫而計之自成王之至豐乙未之日距甲子凡一月耳萬年之業成於一月之間此豈後世可得而及哉太保乃以庶邦冢君出取幣乃復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其柰何弗敬天旣遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德周之興也自武王以其聦明齊聖應天順人不忍斯民墜於塗炭之中親以干戈伐紂克商而後斯民有更生之望雖民心之歸於周者如水之就下獸之走壙然武王即位未幾而遽即世成王以幼沖嗣立而三叔挾武庚以間王室周之世蓋岌岌矣當是時安危存亡之機間不容髮幸而周公攝政旣引兵東征誅伐暴亂以靖四方而又制禮作樂建立法度粉澤王業七年之間政無不舉而事無不興民心之歸於周者日益固而不可解而周之根本蓋有泰山之安矣雖周公歸政而成王緫萬幾以臨羣臣可以無慮也然武王欲營洛邑以定九鼎之志未之成也周公不可以不成武王之志而後歸政焉故當攝政之七年大營洛邑以其一爲定九鼎㑹諸侯之地以其一爲遷殷頑之地如此則周公之規模計慮以恢我國家者盡於此矣可以歸政也召公之意以謂夾輔成王以措天下於太平者周公之功卜宅於洛以卒武王之志者亦周公之功故率諸侯致禮於周公而歸功焉然成王將自此發號施令以君臨萬國一號一令其得失善惡實治亂興衰之所繫不可以不愼也故因諸侯之咸在而遂誥王以天命之無常戒懼之不可怠也周公以工役之書命庶殷而庶殷之頑莫不丕作則周公之所以推其誠信以感斯民者至矣洛邑之成蓋不日也故召公於是率侯甸男服之衆國大君出取幣乃復入以鍚周公而致禮焉必以幣者所以將見其厚意也孟子曰㳟敬者幣之未將者也㳟敬而無實君子不可虚拘故古者賓主交際之禮雖有㳟敬之心必有幣以將之也拜手稽首旅王若公者先儒曰召公稱成王命以賜周公曰敢拜手稽首陳王所冝順周公之事蓋以若訓順也召公之所陳者謂成王將緫萬幾戒以天命之難諶戒懼之心不可須㬰離豈陳所宜順周公之事哉王氏曰陳成王欲宅洛之意順周公用書命庶殷邦伯之事則以此一句分而爲二其說又不如先儒惟蘇氏曰旅讀如庭實旅百之旅諸侯之幣旅王及公者尊周公也此說爲勝說者又謂營洛邑者召公相宅而攻位周公則達觀新邑營而用書以命之召公之至洛以三月之五日戊申周公之至洛以三月之十二日乙卯成王則惟在鎬京也然此篇旣言旅王則王亦在洛可知矣惟召公之至洛所以卜宅而攻位周公之至洛所以達觀而用書故記載其至之之日成王無事故不載其至之之日也說者又謂召公之作誥戒以誥庶殷及御事而已使王在洛而誥之則不宜斥王爲沖子又曰有王雖小又曰王乃初服君臣之分不應如是也此又不然周召居師保之官以夾輔成王其於成王不獨君臣之分也蓋有師保之禮焉故可以沖子言之洛誥篇周公以沖子呼成王召誥篇召公以沖子呼成王夫何不可哉召誥洛誥一體也周召蓋亦一體也誥告庶殷越自乃御事者先儒曰召公所陳戒王云我爲言誥以告汝庶殷之諸侯下自汝御事欲令君臣皆聽之其實指以戒王諸侯皆在託以爲言也此說是也大國即殷也元子指紂也殷自湯以來傳世三十有一奄有四海普天之下莫不臣服豈非大國乎紂者帝乙之適子故以元稱之元長也㣲子與紂俱帝乙之子㣲子之命旣以㣲子爲元子矣此又以紂爲元子者吕氏春秋云紂之母生㣲子尚爲妾已而爲妻後生紂紂父欲立啓爲太子太史據法而爭之曰有妻之子不可立妾之子故紂爲後自其長少之序言之故㣲子爲元子自其適庶之分而言之故以紂爲元子各有所當也此言天命之無常苟無其德雖紂之元子而有此大國元子則其分爲正大國則其勢爲强皇天上帝亦改其命而命有德者以代之也天旣以紂之無德而改其命當是時也惟周世世修德可以上當天意而膺其景命此武王所以自諸侯而爲天子成王繼武王而受命作君也王之受命蓋欲其子子孫孫緜緜延延席龜鼎之業雖千萬世而不絶則其休可謂無疆矣然其休無疆則其憂亦無疆也蓋有一日之休則亦有一日之恤有一歲之休則亦有一歲之恤有無疆之休則亦有無疆之恤無逸曰無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆一日之耽樂冝若無害也而天下後世之禍或萌于此故有無疆之恤乃能保其無疆之休也無疆惟休亦無疆惟恤正猶所謂一則以喜一則以懼也唐太宗時突厥請入朝帝謂侍臣曰向日突厥之彊憑陵中夏用是驕恣以失其民今自請入朝非困窮肯如是乎朕聞之且喜且懼何則突厥衰則邊境安故喜然朕或失道他日亦將如突厥能無懼乎又嘗謂侍臣曰朕有二喜一懼比年豐稔長安斗粟直三四錢一喜也北虜久服邊鄙無虞二喜也治安則驕侈易生驕侈則危亡立至此一懼也召公所謂無疆惟休亦無疆惟恤太宗其深知之矣蓋惟其懼于未然故所以卒無懼正觀之治豈無所自哉惟其無疆之恤乃能保無疆之休故嗟歎而言曰何其柰何不敬乎蓋欲其造次顛沛惟敬是行也有一言可以盡畏天之道者敬而已敬天之怒無敢戲豫敬天之渝無敢馳驅則天豈庸釋我哉敬之羣臣進戒嗣王之詩曰敬之敬之天惟顯思命不易哉凡以人君能敬以事天則天之眷顧於我無有窮已也使紂誠知敬之是行而行之則周安得而有之耶此召公所以戒王不可不敬也天旣遐終大邦殷之命者前旣略言天之改殷家之命矣此又詳言紂不能席先王之餘慶致其敬以畏天而使不仁者在髙位播其惡于衆此民之所以怨咨而天遂遐終其命也遐終者唐孔氏曰言其去而不復反也此殷家多有先哲王雖旣死矣而其精神在天故其餘慶有以庇覆其後世之王及其民皆得以服天命而不替先哲王所以享國者惟敬之故也殷先哲王雖在天而後王後民藉其餘慶以復天命者亦惟敬之故也酒誥曰在昔殷先哲王迪畏天顯小民惟兹殷先哲王之天顯之為可畏則其敬可知矣此所為精神在天而其餘慶有以保佑後人使不失其敬以服天命也殷家自湯至于武丁賢聖之君六七作故曰多先哲王也人之死也雖體魄則降魂氣在上然非哲王則不能在天也朱子𤼵内翰曰太史儒者不言鬼神而言有物何也曰人之死各反其根體魄隂也故降而在下魂氣陽也故升而在上升則無不之矣今也魄降而氣不化非物而何故聖人死曰神賢人之死曰鬼衆人死曰物聖人清明在躬氣志如神故五帝配上帝傅說上比列星賢人得其所歸衆人則知富貴生死而已其思慮不出于心腹之間祍席之上夸張于世自以為利焉物欲蔽之不能自反其初故謂之物以此觀之則精神之在天必哲王也觀盤庚之篇言髙后丕乃崇降罪疾又曰故有爽德自上其罰汝蓋以殷之先哲王在天故也厥終指紂也商家之祚至紂而終也故啇之君自帝乙以前皆能兢兢業業直内以敬而天命之所眷顧多士曰自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤是也惟紂其謂已有天命謂敬不足行而啇家之業自此終矣紂旣不敬以失天之意故其在位在職者無非小人也觀殷家之所謂賢人君子可以勱相國家者莫如三人故㣲子則遯于荒野箕子則佯狂而為之奴比干則直諫而遭剖心之禍則當世之所謂智者莫不藏於山澤之間也智者旣藏則其在位在職豈有利澤加於百姓哉惟病民而已蓋其四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐於百姓則是病於民者在也惟其在位在職者為民之病故民皆有離散之心夫人皆知保抱其子攜持其婦以哀痛乎天其意蓋謂我何罪于天而至此哉旣呼天矣於是往而出亡又見囚執也夫上下之勢聚則為君臣散則為仇讐有以得民之心則民相與歸之雖欲却而揮之不可得也無以得民之心則民相與叛之雖欲刼而留之不可得也紂旣聚羣不逞于朝以播其惡于衆旣失民心矣則民之徃而出亡乃其所也紂又從而囚執之此非徒不足以威民而使之畏乃重失民之心也天之心不忍斯民困于淫刑峻罰不自聊生亦惻然而哀之故監于下土有能勉力以行敬者則眷顧而命之以伐紂而有天下周之興自后稷公劉以來積德累功而文武之聖正當紂之世此天之所以眷命而作周也王旣繼文武而有天下則其於敬德也不可不疾惟恐不及也蓋使王之敬德於文武則福禄之來方興而未艾與天地相為長久使其不敬則亦是紂而已矣非文武在天之意也舜之告禹曰天之歴數在爾躬允執其中四海困窮天禄永終夫敬德者允執其中之謂也天之歴數無脩短允執其中則雖至於萬年可也苟四海困窮則天禄永終矣此正召公所以戒成王之意也相古先民有夏天迪從子保面稽天若今時旣墜厥命今相有殷天廸格保面稽天若今時旣墜厥命今沖子嗣則無遺壽耉曰其稽我古人之德矧曰其有能稽謀自天嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休前旣言紂以不敬之故不能席其先哲王之餘慶以服天命聚小人於朝俾之肆其暴虐以殘害於爾百姓天旣哀四方之民無辜而罹其凶害己勦絶其命而改命我周邦矣則周王固不可不以商為監而勉行敬德者然周之所繼者商也周固當以商為監商之所繼者夏也啇其可不以夏為監乎詩曰殷監不逺在夏后之世則周之監其在殷之世也明矣天以禹之聖德而眷命有夏復以桀之不敬而墜其命墜夏之命則商以敬德而伐之紂復以不敬而天墜其命周之伐殷正如殷之伐夏使王不能戰戰兢兢以盡其寅畏之誠而敬德不賛則天墜其命亦將如殷矣此所以又兼夏商以為言也相視也古先民有夏指禹也禹貴為天子而謂之先民者胡博士曰古者先昔曰先民言古先民者甚久之辭也言我視古先民有夏之君如禹者其所行之敬德未嘗以須臾廢故天道而從之視之如子而保之此夏之所以享天休命而君天下也天于有夏之君道而從之視之如子而保之則天之于我其仁愛也至矣而有夏之君又能面考天意而順之夫天意之所在惟敬德者則佑之也面考天意而順之不過勉行敬德以逹天之休而已今是桀不能行禹所以順天之道故天以墜其王天下之命也今復相視有殷之君如湯者其所行之敬德亦未嘗以須㬰廢故天道而保格之有殷之君亦能面考天意而順之今是紂不能行湯所以順天之道故天以墜其王天下之命也予惟相視夏殷之君其始也廸從子保迪格保非天私之也以其敬德故也其終也皆非其命惟天偏疾之也以其不敬德故也大抵天之降災祥惟視德之所在德則與否則亡如影響焉無有毫釐之差也當禹湯以其聖德克當天心冝其天意之眷顧不容釋也然使一日不敬德則命不可恃故禹湯未嘗以天命之所佑助而有驕怠其云為動作未嘗不順天也蓋使禹湯不知所以順天則其墜厥命不至於桀紂之世使桀紂而知敬德則天迪從子保格保將千萬年而不替也以是知天之於禹湯桀紂非有好惡於其間也唯視其敬德與不敬德而已矣有夏言古先民有夏有殷不言者蒙上文也蘇氏以從子為與子謂我觀夏殷之世天之迪夏也迪其與子而保安之其迪殷也迪其能用伊尹格天之臣而保安之其意謂堯以天下傳之舜舜以天下傳之禹皆不私其子而傳之賢至禹始以其子啓為可以托天下故傳之子所以迪夏則言從子也夫以從子為與子言迪其與子而保之雖非經之本義猶為可説也至於以格為用伊尹格天之臣此則不可夫經之言格之一字蘇氏旣以為格天又以格天為伊尹又以湯能用伊尹格天之臣其蔓衍附會一至於此則何說之不可為哉故此只當從王氏說夏言從子殷言格之至相備爾與夏言服天命殷言受天命同意此蓋史官經緯其文以成述作之體書之内如此類多矣不可以一一為之說也唐孔氏曰此說二代興亡其意同也於禹言從而子安之則天於湯亦子安之故於湯因上文直言格保此正王氏之意蓋格與惟帝降格于夏之格同天旣以紂之不敬厥德墜其命而改命周邦今成王以幼沖之資而繼武王之大業故其措天下於泰山之安以無忝乃祖考者冝如何哉惟於壽耉之人無所遺矣則可以保天之命也古之聖王尊禮黄髮屬任以政者蓋以其更歴天下之事練習為治之體故也昔鬻熊年九十餘見文王文王曰老矣熊曰君若使臣捕虎臣已老矣使臣坐而䇿國事臣年尚未也蓋非老成之人則不能深謀逺慮以輔成人主之德然年少未更事者於老成之人則狎侮之者多矣秦穆公賢君也其於蹇叔猶曰爾何知中壽爾墓之木拱矣而况於他人乎故成王沖子嗣位尤不可以遺壽耇者謂其欲以稽考古人之德故也古人嘗以是而興者吾必因之嘗以是而敗者吾必改之然非老成之人多識前言往行則我雖欲稽於古人其道無由故考稽古人之德者必有壽耇為吾之股肱心膂而後可稽古人之德固為善矣况能稽謀於天則其善又如何哉蓋道之大原出於天古人之所為亦惟法天而禹湯以敬徳之故而天迪從子保格保桀紂以不敬徳之故而旣墜厥命其善可法其惡可鑒稽古人之徳者不可不知也然幼沖之人何自而知之此所以必有賴於壽耇者也稽古人之徳固當以禹湯之遺範為吾之楷則然禹湯之所以成其德者亦惟面稽天若故也治天下必欲無一不合於禹湯斯可也然又能無一不合於天則其德無以加矣成王武王長子也故又嗟歎曰王雖幼冲乃元子也其大能以至諴感于小民則於今為羙欲感於小民則王當不敢後用顧畏民碞也先儒及王氏皆以民碞為僭言民有僭而不信者不可不省顧而畏愼之也其說不如蘇氏曰碞險也民猶水也水能載舟亦能覆舟物無險於民者矣惟民之從違無常而有險之道則王者顧之而不忘畏之而不忽所不當後而用之也蓋無先於此者矣先於此則可以諴于小民故也王之來此洛邑繼上帝之命而有事於此天地之中者蓋以周公之言其建為大邑於此其使成王自是以配皇天也言王來紹上帝則當是時成王在洛可知矣而說者以成王惟在豐鎬未嘗來也其悞亦明矣君前臣名故召公稱周公之言以為旦曰也欒鍼欒書之子也在君之前雖其父名亦稱之蓋以君臣之分不可以父子之私而廢之也况於周召乎天與帝一也苟言及覆燾髙眀之德者皆可指而稱之非有異義也故書之所記蓋多有連稱天與帝者此但變文而已益稷曰以昭事上帝天其申命用休洪範曰帝乃震怒不畀洪範九疇天乃鍚禹洪範九疇泰誓曰天祐下民作之君作之師惟其克相上帝康誥曰我西土惟時怙冒聞于上帝帝休天乃大命文王殪戎殷此篇曰王來紹上帝又曰其自時配皇天若此之類皆變文也紹上帝即配皇天也必欲從而為之說則鑿矣王氏曰帝天德而紹之者王王人道也皇天道也惟道為能建中惟建中為能配天道中天而宅之建中以配天道非特紹上帝而已來紹上帝者王之事也配皇天者皇之事也此鑿說也漢郊祀志曰其神嘗以夜東方來若雄雉其聲殷殷如野雞夜鳴顔師古曰上言雄雉下言野雞史駁文也書之先言帝而後言天者顔師古所謂駁文也夫天下之中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也故宅中土則可以祀天地而神歆之矣蓋欲配皇天則於上下之祀不可不愼愼於祀天地神祗然後可以治民也故周公謂作大邑於此以舉祭祀之典而後能配皇天又當於此土中致其治也洛誥曰王肈稱殷禮又曰稱秩元祀又曰夙夜毖祀即毖祀于上下也作邑之事今王旣有成命矣使召公相宅卜吉也則攻位而位成周公又達觀之而用書以命庶殷此王有成命也惟能於此治民則於今為美矣召公之戒成王大意謂天命之無常桀以不敬厥德而墜禹之命紂以不敬厥德而墜湯之命欲成王體夫禹湯所以順天之道以祈天永命而已旣而所言惟欲王之諴于小民又欲王之治民則皆以為今休者蓋天之聦眀雖無所不聞無所不見而其視聽則本於斯民民之所歸天未有不佑之也民之所棄天未有不禍之也成王之能諴于小民能治民則信為美矣所謂敬德無大於此天豈容釋之哉苟為不然誕慢矯詐以欺斯民般樂怠傲以困斯民則雖宅土中而祀于上下天命豈私之哉王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬德我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歴年我不敢知曰不其延惟不敬厥徳乃早墜厥命我不敢知曰有殷受天命惟有歴年我不敢知曰不其延惟不敬厥德乃早墜厥命今王嗣受厥命我亦惟兹二國命嗣若功王乃初服嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歴年知今我初服宅新邑肆惟王其疾敬德王其德之用祈天永命其惟王勿以小民淫用非彝亦敢殄戮用乂民若有功其惟王位在德元小民乃惟刑用于天下越王顯上下勤恤其曰我受天命丕若有夏歴年式勿替有殷歴年欲王以小民受天永命拜手稽首曰予小臣敢以王之讎民百君子越友民保受王威命眀德王末有成命王亦顯我非敢勤惟㳟奉幣用供王能祈天永命成王之營洛邑而遷殷頑民者蓋以其更紂武庚之亂其頑狠無恥之心未能以遽革故使之宻邇王室以馴致於善然其遷之也豈能空瀍水之西移其舊民而使殷民居之哉蓋使周民與殷民雜居故也惟周民與殷民雜居故有殷治事之臣亦有周治事之臣然殷之小大草竊姦宄驕淫矜夸靡所不為而周人以文武美教善化漸漬之日久莫不歸於士君子之域其善惡相反不啻若薰蕕白黒之殊其勢不能以同居也自非上之人有以迪之其能使之和叶而為一哉故召公旣欲王諴于小民又欲王治民則遂告以王先服殷御事比介于我有周御事也有周御事其於朝廷之教令如草之從風無事於服之也所當先者惟訓服殷家舊治事之臣除其暴虐而消其貪鄙使之親比介助我周家治事之臣和叶而為一則可以諴于小民亦可以治民矣欲服殷御事無他節性而已孟子曰性無有不善水無有不下殷之御事當成王之世天下之所謂惡人也周之御事天下之所謂善人也雖有羙惡之異然原夫殷御事所禀於天之性未喪之前與周之御事有以異哉惟上之人有以唱之遂陷溺其良心而不義之習遂與性成寖淫日久牢不可遏必有以節之而後可也節之者非强其所無也以其所固有之性還以治之去其不善而反之善也有以節之則臣民將遷善逺罪而不自知惟日其進於善也故曰惟日其邁董仲舒曰積善在身猶長日加益而人不知也惟日其邁正仲舒長日加益之譬也王氏曰當眀政刑以節之此不知道者之言湯誥曰惟皇上帝降衷于下民若有常性克綏厥猷惟后夫所貴乎后者因斯民有常性順以治之而已矣若眀其政刑為可以節性豈所謂若有常性哉其身正不令而行其身不正雖令不從欲節民之性惟王能敬德則殷之御事翕然而化矣故曰王敬作所不可不敬德王氏曰敬德者所以作所蘇氏曰作所者所作政事也此皆於所字强生義理其辭為費當從先儒之說謂其不可以不敬德王當敬作之也敬作猶言敬為即周官所謂作德也王旣當敬德則不可不以夏殷爲監也不可不以夏殷爲監者以夏殷之歴年脩短惟在敬德與不敬德故也其曰我不可不監于有夏亦不可不監于有殷孔子所謂周監于二代者其原蓋出於此有夏之服天命以王天下傳十有七王四百三十一年固多歴年也至桀嗣位而夏之天命於是而殄㓕則其不延長矣此非我之所敢知也惟敬德則多歴年所桀不敬厥德則早墜厥命此則我知之矣故不可不監于有夏也有殷之受天命以王天下傳二十有八王六百二十九年固多歴年也至紂嗣位而殷之天命於是而殄絶則其不延長矣此非我之所敢知也惟敬德則多歴年所紂不敬厥德則早墜厥命此則我知之矣故不可以不監于有殷也古人之於天命不以為必有不以為必無而每致於不可測知之域惟人事之脩於昭昭赫赫之間者則未嘗不盡言之也故召公於夏殷之有歴年及不其延皆曰我不敢知者疑之之辭也至於敬德則有歴年不敬德則墜厥命蓋無可疑者季路問事鬼神子曰未能事人焉能事鬼曰敢問死曰未知生焉知死鬼神與死夫子不之告也而告以事人知生蓋能事人則能事鬼矣知生則知死矣此正召公之意由是觀之夫子罕言命與不語怪神者非故匿而不言也不可以正言之也正言之則學者舎人事而求天命鬼神於難知之際為巫覡瞽史之事矣惟夏殷之受命其所以歴祚之長短不可得而知者惟其敬與不敬之異則今王繼此二代而受天命以王天下亦當思惟此二國長短之命以繼其功也繼其功則脩人事不責天命不過敬德而已夏以敬德而有歴年殷亦以敬德而有歴年皆其功效也成王旣嗣其命其可不嗣其功哉王惟敬德乃可以享天休命緜緜而不絶况今周公旣營洛邑乃歸政於成王正成王初聽政以有事於萬幾之務一號令之所發一賞罰之所施天下之民將拭目而視傾耳而聽實治亂安危之所自始故髙宗曰以台正于四方台恐德弗類兹故弗言㳟黙思道誠以聽政之初不可不愼也故召公謂王政之隆替蓋萌於初服之日若人之生子其善惡之習無不在於初生之日也習之善則為善人習之惡則為惡人矣孔子曰少成若天性習慣如自然古之人其所以薰陶美質而優入於聖域者惟其孩提之日教之有素也若孟母之擇鄰曽子之殺豚以食其子是矣苟初生之日習於善則是自貽哲命也蓋天以正性而命於人初無上智下愚之别其所以為上智下愚者於已取之而已矣故曰自貽哲命言人之秉哲者雖命於天而其所以能哲者乃自遺之也孟子曰自暴者不足與有言也自棄者不足與有為也惟下愚者自暴自棄則哲者豈非自貽乎然則王之於初服其治亂安危無非自取之也可不愼哉今天其命哲命吉凶命歴年者言天之於人或命之哲或命之以吉與凶或命之以歴年此三者豈人之所能為哉天實命之也然天命之以哲而不能使之必哲能命之以歴年而不能使之必歴年其所以哲所以吉所以歴年之長者非天也人也其所以不哲所以凶所以歴年不其延者非天也人也天非人不因人非天不成天始之而人終之也今天知我王初有事於萬幾而居新邑洛其命之哲與不哲吉與凶歴年與不歴年蓋决於此日則王之敬德其可緩哉正當惟此德之用造次必於是顚沛必於是以祈于天而永其命也祈非祈禱之祈也敬德者所以祈之也蓋敬德以祈之其諸異乎人之祈之與此所謂祈正與詩言自求多福之求同早墜厥命者非天實促之也在我者遏而絶之也祈天永命者非天實延之也在我者引而伸之也孟子曰禍福無不自己求之者此之謂也王旣惟德之用則推之以治天下國家豈以刑罰而繩斯民哉故王不當以此小民過用非常之故亦敢殄戮以治其民如殷俗之靡其淫用非彝也為日久矣然不教而殺之是果於殺戮也豈可以乂民乎當武庚之旣滅而殷之遺民有留居於衞者有遷於成周者然其染紂之化皆未之革必有以教之而後可故成王之告康叔旣謂不可以其民亂非彝而速用刑罰不可以其湎于酒而庸殺召公之告成王又謂不可以淫用非彝而敢殄戮此皆忠厚之心也非縱釋有罪也百姓有過在予一人故也王氏曰不敢慢小民而淫用非彝亦當敢於殄戮有罪以乂民也凡書之告戒以不殺之言者王氏皆以為使之殺也蘇氏破其說矣正猶治獄之吏持心近厚者惟求所以生之持心近薄者惟求所以殺之若有功其惟王位在德元小民乃惟刑用于天下越王顯先儒及王氏皆以若訓順惟蘇氏曰民之有過罪在我及其有功則王亦有德何也王之位民德之先倡也如此則法用於天下而王亦顯矣此說得之蓋民之於德不能自有功也必在上之人有以倡之而後小民效之則民皆有功矣民之有功獨非王之功乎故王顯也惟王之顯在於小民故當君臣之間盡其憂勤其言曰我周之受天命大於有夏歴年之長用勿廢有殷歴年之長夏殷歴年以能化小民之故欲王以此小民而祈天永命也蓋王惟德之用雖可以祈天永命然使小民尚淫用非彝而不足其上則天或絶之矣故必王敬厥德于上而小民儀刑于下上下好德如一則天豈用釋之哉孟子曰民為貴得乎邱民而為天子故祈天永命必在于小民也讎民殷之頑民也殷為讎民則友民者周民也讎民謂之百君子者君子之稱不一而足有德之稱君子和而不同之類是也有位之稱君子學道則愛人之類是也有凡人皆稱之者今之君子過則順之之類是也故此讎民而謂之君子正猶頑民而謂之多士也周民㴠濡累世之仁政同心同德以輔成文武之基業有大勲勞於王室而殷之餘民新從武庚三叔之亂舊染汙俗於我周家不無嫌貳使成王之心置親踈輕重于其間則亂之所由起也張子房曰所封皆平生故人所誅皆平生仇怨此屬恐見疑及誅故聚而謀反耳召公之心慮此故欲成王先服殷御事比介于我有周御事又拜手稽首而言曰我雖小臣敢以殷民及周民安受王之威命與眀德而奉行之則王終有成命而顯於天下也蓋謂王能一視殷周之民無有或讎或友之間則周之社稷其萬年永保矣我非敢以此爲勤也惟敬奉其幣帛用供於王欲王之能祈天命而已此太保召公愛君之心也詳考此篇其大意在於祈天永命而其所以祈天永命者敬德而已蓋敬德在人而永命在天脩其在人者而在天者自至如炊之必熟耕之必穫也苟其德之不建而晏然自以為天命之在我此則紂之謂已有天命也其亡不旋踵矣魯哀公問孔子曰國家存亡信有天命惟非人也孔子曰存亡禍福皆已而已天災地妖不能加也唐德宗謂自古興衰皆有天命今之厄運恐不在人陸贄曰天所視聽皆因於人非人事之外自有天命人事治而天降亂未之有也人事亂而天降康亦未之有也大抵臨亂之君莫不自以為有天命令皆覺悟天下安得危亡之事乎故召公於成王之初服即以此告之賢者之愛君必止亂於未形而閑邪于未然若其已然而後救之則衆人之所皆能也何頼于賢乎成王之成厥德蓋有自來也尚書全解卷三十
