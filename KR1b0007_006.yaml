body:
  text: 尚書全解卷六宋林之竒撰益稷虞書伏生之書以舜典合于堯典益稷合於皋陶謨至孔安國案壁中科斗書始釐而為二觀舜典慎徽五典而下正與堯典帝曰欽哉之文相接益稷帝曰來禹汝亦昌言而下實與臯陶謨思日贊贊襄哉之文相接則伏生之書合而為一者是也而孔氏必釐而為二者蓋古者簡冊以竹為之編次而成書所編之簡不可以多也故文之多者一篇之所不能容則釐而為二雖釐而為二苟文勢相接亦不害其為一也既已釐之則必為之篇名以别之於是有堯典舜典大禹謨臯陶謨益稷之目此但為簡冊之便耳非有義於其間也書序既有此二篇之目而孔壁之中舊文雖為一簡孔氏安得不釐而為二哉以是知伏生之合之也由是理而推之也孔氏之釐正也因其簡冊之舊也故簡冊之當從孔氏而以二篇之文相屬而讀之則當以伏生為正篇名益稷者蓋以篇首有暨益稷之文故借此二字以名其簡冊猶論語有顔淵微子孟子有公孫丑萬章等名篇也而唐孔氏則謂二人佐禹治水有功因以此二人名篇既美大禹亦所以彰此二人之功此則過論也益稷帝曰來禹汝亦昌言禹拜曰都帝豫何言子思日孜孜皋陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載隨山刋木暨益奏庶鮮食此文與皋陶陳謨同為一時之事其文當與上贊贊襄哉相屬帝曰來禹汝亦昌言益皋陶既已陳謨於帝於是呼禹使汝陳其盛德之言禹拜曰都帝豫何言豫思日孜孜禹既承命於是拜而歎美以謂皋陶之謨既已盡善矣豫復何言哉惟思日夜孜孜奉臣職而已皋陶曰吁歎辭也皋陶於是歎而問禹以豫思日孜孜之事為如何也楊子雲曰禹以功皋陶以謨當舜之時禹皋陶之事君各以其能自致其上皋陶陳謨而不敢自許其功禹成其功而不敢自許其謨故帝雖命禹以陳其盛德之言而禹乃謙遜不敢即承命而遂言之也其意蓋以謂皋陶之謨既已如此而我惟日夜孜孜猶且不逮其何以有加於皋陶故皋陶問其何如而禹但以孜孜奉臣職見於己試之效者以答之也周希聖曰坐而論道謂之三公作而行事謂之士大夫禹之謙遜以謂坐而論道者必皋陶而已特作而行之而已此說是也自此至蒸民乃粒萬邦作乂此實禹治水本末先後之序也洪水滔天浩浩懷山襄陵於是天下之民皆昏墊溺困於水災也四載說者不同孔氏曰水乘舟陸乘車泥乘輴山乘樏而史記及尸子慎子漢書溝洫志與此所載大同而小異水乘舟陸乘車諸說皆同泥乘輴史記作橇尸子作蕝愼子及溝洫志作毳山乘樏史記作檋溝洫志作梮然而名雖不同其實一也輴與橇蕝毳一物也樏與檋梮一物也輴以版為之其狀如箕用以擲行泥上樏以鐵為之其形似錐長半寸施之履下以上山不蹉跌也此數物者蓋治洪水之時以此乘之以為跋履山川踐行險阻之具也雖其制度不同不詳見於經然自漢以來其說如此必有所傳聞也或者以謂鯀九載績用弗成兖州之功十有三載乃同則以為禹治水實四年而成功故謂之四載世多喜此說蓋其文致附㑹亦似有可信者然而四載指治水而言謂之四載可也何以謂之乘四載乎又其年數反覆齟齬而不合蘇氏論之詳矣隨山刋木者蓋禹之治水自通障蔽始於禹貢之書先言禹敷土隨山刋木後言奠髙山大川孟子曰當堯之時天下猶未平洪水橫流泛濫於天下草木暢茂禽獸繁殖五穀不登禽獸逼人獸蹄鳥迹之道交於中國堯獨憂之舉舜而敷治焉舜使益掌火益烈山澤而焚之禽獸逃匿蓋禹治水之初必先烈山澤驅禽獸以通障塞障塞既通然後土功可得而施之暨益奏庶鮮食益是佐禹治水禹當夫水土未平民未粒食於是暨益教民以食魚鱉鳥獸之肉而充飽也奏進也奏庶鮮食進於民也鳥獸新殺曰鮮故曰鮮食豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂障塞既通矣然後可以施其治水之功使川澤之水各有所歸也史記以導弱水以下為九川蓋弱水也黑水也河也漢也江也沇也淮也渭也洛也通有九川然亦不必如此之泥要之謂九川者但謂九州之內凡有川澤皆疏導之使之各有所歸也距四海史記既以導弱水以下為九川故說者遂以導弱水入于流沙為西海黑水終入為南海後至于大陸以北播為九河入于海者為北海其餘六水所入為東海然海之量合受衆流若如此說則是西海所受者惟一弱水南海所受者惟一黑水無此理也若以決九川為九州之川澤無所不決而距四海為江水皆歸於海則無所不包矣濬畎澮距川謂川澤之水既有所歸於是疆理其地則為溝洫以宣泄平地之水使皆歸於川澤亦以為耕稼之漸也考工記曰匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之畎田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮自畎而之遂自遂而之溝自溝而之洫自洫而之澮自澮而之川自川而之海不言遂溝洫而曰畎澮者蓋舉小大以包其餘也決九川距四海濬畎澮距川則比其功役又倍於隨山刋木矣故所藉以為衆庶之食又非鮮食而足也故於鮮食之外又加艱食焉者薛氏謂草木之實凡施力艱難而得之者也古者凶年饑嵗五穀不熟民無所得食於是有拾橡栗仰食桑椹取給蒲螺以充飢者所得艱食即此類之謂也謂使民食鳥獸之肉又加之以草木根實之類以足之也艱食鮮食者則民無阻飢矣於是又勉之以阜通貨賄以給其資生之具懋遷有無遷有以之無也如魚鹽徙山林材木徙川澤是也化居者化易其所居積王肅云易居者不得空去使滿而去使滿而來其說是也既懋有無則民之所以資生之具無所不備然後可以興農事而使民享其粒食之利粒食者五穀之食也民既粒食則飢饉墊溺之患皆可以免矣舜使禹陳其盛德之言禹謙自牧不敢以陳謨自居雖不以陳謨自居惟述其治水之時本末先後之詳而警戒之意實存於其間蓋洪水之初浩浩懷襄下民昏墊而其終也蒸民乃粒萬邦作乂其間險阻艱難備嘗之矣豫之所以思日孜孜者蓋欲君臣之間相成警戒其兢兢業業常如洪水未平之時如此則國家之福永永無窮矣鮑叔牙謂齊威公曰願君無忘在莒時管仲無忘束縛於魯時寧戚無忘飯牛車下時大禹之思日孜孜其意如此皋陶曰俞師汝昌言禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉舜命禹以陳其盛德之言禹謙遜不敢自居惟述其治水之時本末先後之序以致其日孜孜之意而皋陶猶以為未也於是然其思日孜孜之言而皋陶謂之曰汝之昌言可師法所當為帝陳謨禹既不獲遜矣于是又陳謨以戒于舜曰都帝慎乃在位此雖勉徇皋陶之意而陳其實亦所以申結上文之義也蓋洪水之初懷山襄陵下民昏墊其終也至於蒸民乃粒萬邦作乂則其間險阻艱難備嘗之矣今也治定功成法度彰禮樂著垂拱而視天民之阜曽無可憂者然聖人不畏多難而畏無難洪水之時天下可謂多難矣而君臣相與焦心勞思以拯生民之飢溺既克有濟然人之常情安於無難必將忘其所可戒則驕奢淫泆之所自萌而危敗禍亂自此分矣故禹之陳謨蔽以一言曰帝慎乃在位蓋謂欲守此盈成之業綿綿社稷無疆之休者惟在慎之而已董仲舒曰堯舜以天下為憂而不以位為樂蓋為人君者苟以位為樂則將窮天下之欲以供耳目之娛故不能保厥位至於顛覆喪亡而不悟苟其居是位也兢兢業業如臨深淵如履薄氷以致其畏慎之意則其位之安如太山而四維尚誰得而奪之邪禹之言簡而盡若此可謂一言而興邦矣帝曰俞者然禹之言深喻其警戒之意孔子語顔回以克己復禮之目則告之曰非禮勿視非禮勿聽非禮勿言非禮勿動蓋謂欲克己復禮者當如此也禹之陳謨盡於慎乃在位之一言帝既虛心而聽之君臣之間不待問而辨也故又推明其義為帝盡言之蓋謂欲慎乃在位者其後先之序當如此也安汝止者言汝之所止不可以不安大學曰知止而後有定又曰詩云綿蠻黃鳥止于邱隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信蓋人之所止而不能安則將泛然而無所歸宿外物得以移之矣苟能安其所止則意誠心正舉天下之外物曽不足以動其心如是則寂然不動感而遂通天下之故矣此實慎乃在位之本也惟幾惟康其弼直言能安止矣又能盡此三者然後有以盡夫慎乃在位之道也惟幾者謂人君當戒愼萬事之微而不敢忽也惟康者言當安靜天下之民而不擾之也其弼直者謂輔弼之臣當得切直之臣而用之也自古太平無事之世上恬下熙四方無虞若可以無慮矣及其禍亂一起卒至陵夷敗壞而不可復收者其禍未嘗不出於三者為君者宴安鴆毒而不悟危亡之機禍之所自萌也好大喜功以擾斯民禍之所自萌也人主好佞於上羣臣致諛於下上下相狥不聞切直之言者亦禍之所自萌也苟能惟幾以成天下之務惟康以安天下之業又能使其弼直以通天下之情危敗禍亂無自而萌而慎乃在位之道盡於此矣惟動丕應徯志荀子曰德操然後能定能定然後能應自安汝止至其弼直可謂能定矣惟其能定故動而有為也則可以大應夫徯志之民此其所謂能應也徯志謂民之於君聽唱而應視儀而動徯上之志而樂從之者也惟為君者無以大慰斯民之望故有悍戾而不從苟能安汝止惟幾惟康其弼直則民固得所欲矣彼之徯志於我而我之發政施仁有以待應之孔氏曰徯待也帝先安所止動則天下大應之順命以待詩曰宜民宜人受祿于天惟動丕應徯志是冝於民人也民之所欲天必從之故有以昭受上帝之命天將命以休福受天之祜永永無窮矣蓋洪水滔天下民昏墊其終也以至於九州攸同萬邦作乂天命眷顧錫以休福何以至此苟於此能兢兢業業以慎乃在位如上之所云則固有以昭受上帝之意而天之命以休福至於億萬年而無易是天重命之也天與帝之稱雖異其實一也嘗考經之所載凡稱天稱帝者大抵皆是變其文以成美既曰格于皇天又曰格于上帝既曰帝乃震怒又曰天乃錫禹洪範九疇既曰惟帝不畀又曰惟天不畀凡若此之類甚多皆是史官錯綜其文以成義以昭受上帝天其申命用休但謂如此然後可以昭受上天天其申命以休福此但是不欲言以昭受上天天其申命用休故變其文曰上帝必欲從而為之說則鑿故詳考此章之義蓋謂欲慎乃在位者其靜而無事也則君臣盡道於廟堂之間其動而有為也則天人協應於幽明之際定之於此應之於彼蓋不期然而然者此禹所以諄諄反覆為帝申言之昔唐太宗問創業守文孰難房元齡曰草昧之初羣雄競逐攻破乃降戰勝乃克創業則難魏徴曰王者之興必乘衰亂反覆昏暴殆天授人與者既得天下則安於驕逸人欲靜徭役毒之世方弊掊克窮之國於此衰則守文為難帝曰元齡從我定天下冒萬死遇一生是創業之難魏徴與我安天下恐富貴則驕驕則怠怠則亡見守文之不易創業之不易既往矣守文之難當與公等慎之房元齡魏徴以其身之所歷而言之故於創業守文之難易俱有所偏若禹者親與益稷之徒跋履艱難踐越險阻以定洪水之難故其始之所言者無非所謂創業之難及其洪水既平帝方命之以陳其嘉猷嘉謨以為警戒故其終之所言者無非守文之難蓋其意亦以謂創業之難既往矣守文之難方將慎而圖之觀太宗之言則禹所陳之謨本末首尾不煩訓詁而可通矣夫禹之陳謨其意不出諸此而太宗乃與之合若太宗者亦豈可多得哉帝曰吁者禹之陳謨蓋盡於此矣帝於是歎其言而謂之曰慎乃在位之道亦非一人之所能為必資羣臣之助也臣哉鄰哉孔氏曰鄰近也言君臣道近相須相成此說未通據下文曰欽四鄰則其所指禹之僚屬左右前後所與協力以事君者臣哉者言必賴爾臣之助此蓋指禹而言之也鄰哉者言汝又當率其僚屬左右前後之人以為我之助也鄰哉臣哉言之不足又重言之也哉自古人多重言之如蚖哉蚖哉時哉時哉歸哉歸哉以此臣鄰二義反復言之以見致意之深也禹曰俞帝曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為自臣作朕股肱耳目以下此又申言資夫臣鄰之義也蓋人君當資羣臣之助猶手足耳目為之用也自左右有民以下所以解釋其義也王氏曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為言作股肱豫欲觀古人之象至於汝聽言作耳目此說是也蓋心居中虛以治五官心有所欲為亦不能獨成其功要必資手足耳目之助使手足耳目之職廢於外則心之思慮亦不能獨成故帝言此者必資夫羣臣之助也豫欲左右有民言我欲助我所有之民也此即孟子所謂放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之者也謂我欲左右有民以教育成就之汝當輔翼於我也宣力即孔子所謂陳力就列也豫欲宣力四方謂我欲宣布其力於四方汝當黽勉以為之蓋陳力就列人臣之職也故曰汝為至於左右有民則非人臣之事也易曰后以財成天地之道輔相天地之宜以左右民蓋天子之職也人臣但為之助而已故曰汝翼言各有所當也汝翼汝為申言作股肱之事也雖申言作股肱之事然而必欲以一句為股一句為肱如汝明之為目汝聽之為耳則不可要之汝為汝翼皆是手足之用也豫欲觀古人之象日月星辰山龍華蟲作㑹宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明觀視也豫欲觀古人之象謂我欲觀視古人法象作服之制於天下也易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤以是知上衣下裳之制創自黃帝堯舜特因之而已故謂之古人之象十二章說者不同當以鄭氏之說為正其說以謂華蟲雉也宗彞虎蜼也粉米白米也絺讀為薾紩也畫以為繪紩以為繡畫與紩皆有六日也月也星辰也山也龍也華蟲也此六章者畫以為繪施之於衣宗彝也藻也火也粉米也黼也黻也此六章者紩以為繡施之於裳此有虞氏之十二章也至周以日月星辰畫於旗冕服九章登龍於山登火於宗彞其九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞此五者繪之於衣次六曰藻次七曰粉次八曰黼次九曰黻此四者繡之於裳此周之九章也衮冕九章以龍為首龍首卷然故以衮為名鷩冕七章以華蟲為首華蟲即鷩雉也毳冕五章以虎蜼為首虎蜼毛淺毳是亂毛故以毳為名此成周增損有虞氏之服制也鄭氏此言皆有所據而云大勝孔氏之說蓋孔氏之失有二以日月星辰山龍華蟲作㑹宗彞為句而曰五采成此畫焉宗廟彞樽亦以山龍華蟲為飾據此經云豫欲觀古人之象而以五采彰施于五色作服汝明結之於後則是此言專為作服而云爾豈於其中雜入宗廟之彞樽者哉此其失一也又曰絺葛之精者凡葛非可繡之物自古未聞有以為裳唐孔氏云暑月則染絺為纁而繡之以為祭服豈暑月染葛為服而冬月則弃而不用邪此其失二也而又以華蟲為二物以粉米為二物其說考之制度皆齟齬而不合不若鄭氏之說為善以五采彰施于五色作服汝明鄭氏曰性曰采施曰色言以本性施於繒帛蓋繪以為衣繡以為裳皆雜施五采以為五色汝明者汝當明其小大尊卑之差等也案周禮司服云公之服自衮冕而下如孤之服士之服自皮辨而下如大夫之服自天子至於卿士其服皆有差等上得兼下下不得僭上以周禮觀之則知唐虞之制亦必有尊卑差等於其間作服汝明者恐其亂於上下之分故使之明尊卑等差以示之也夫自天子至于士宗廟宫室車服冕旒器用莫不有尊卑上下之差此但言作服者舉其一以包其餘若仲叔于奚有功於衛衛人賞之以邑辭請曲縣繁纓以朝許之仲尼謂之曰惜也不如多與之邑惟器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之不可止也已舜使禹作服以五采彰施于五色作服汝明其意蓋亦謂如此而已自先儒以來觀象以作服之等差所繪所繡之物雖有不同而論其所以觀象作服者則無有異義也至王氏始謂日月星辰山龍華蟲凡此德之屬夫陽者故在衣而作繪宗彞藻火粉米凡此德之屬夫隂者故絺繡在裳辨物則知善之為善知善之為善推而上之可以至於天道則聖人之能成矣介甫嘗有韓退之詩曰紛紛易盡百年身舉世無人識道真力去陳言誇末俗可憐無補費精神王氏於經其鑿如此則其無補費精神蓋又甚於韓退之矣故楊龜山力辨其非楊龜山既辨其非矣而其說又曰日月星辰天象也山地之屬也服之所以體天地也龍華蟲天産也故作繪而在上宗彞形而在下者藻火粉米地産也黼黻人為也故絺繡在下此則流而入王氏之說而不自知是皆目睫之論豫欲聞六律五聲八音在治忽以出納五言汝聽聲音之道與政通治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故聞六律五聲八音則可以察治忽也忽不治也豫欲聞六律五聲八音以察治亂又在乎出納五言舜命夔曰詩言志歌水言聲依永律和聲八音克諧無相奪倫神人以和蓋聲樂之所自生生於詩歌之發于志者有詩然後有歌有歌然後有樂詩歌和則聲樂用之而無所不和詩歌不和則聲樂亦不和矣季札嘗觀周樂歌邦國之詩則知其國之政若身親而見之故欲察治忽必在於出納五言出五言者為之詩歌播於聲音宣之於下若關雎葛覃之類上之風化故用之鄉人用之邦國此所謂宣之於下也納五言謂取下之言播於詩歌者以達於上若太師陳詩以觀民風是也舜之韶樂既和矣又使羣臣出納五言以在治忽於六律五聲八音之間所以盡善盡美如天之無不蓋地之無不載也汝聽言汝當聽其詩歌以察治忽也若汝明汝聽蓋所謂申結作耳目之義也五言即宫商角徴羽之言豫違汝弼汝無面從退有後言欽四鄰庶頑讒說若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之我之所言所行苟有違戾於道者汝當以禮義弼正於我汝無面從我之違退有後言謂我為不可弼也蓋禹之所論慎乃在位者必在其弼直舜則答之曰豫違汝弼汝無面從退有後言此蓋容受其弼直之言也舜大聖人也所言所行為法於天下傳於後世豈復有違於道義者哉而曰豫違汝弼禹亦大聖人也其事君盡忠亦可為萬世法豈復有面從而退有後言者哉而曰汝無面從退有後言蓋君臣之間相與警戒不得不爾惟其無是事而尤不忘警戒之心此其所以為大聖人也欽四鄰者言汝既弼我之違又當警汝左右前後所與比肩以事上者與之同心協力以輔台德也汝既能弼我之違又能欽四鄰以輔德矣其有不以輔弼為意曲從以順上之㫖者是庶頑讒說之人也若不在時者謂其所行不在於是雖其所行不在於是然未可以讒說殄行之故遽加之刑戮也則必盡其寬厚之道以待之此所以生其愧恥之心使之遷善悔過而不忍納之於小人之域矣侯以明之撻以記之書用識哉此三者皆所以生愧恥之心也侯以明之謂明侯射之禮以別賢否古之射者必設鵠王大射則供虎侯豹侯設其鵠諸侯射則供熊侯豹侯卿大夫射則供麋侯皆設其鵠古人之於射蓋所以觀其賢不肖其容體比於禮其節奏比於樂中者皆得與於祭其容體不比於禮其節奏不比於樂不中者不得與於祭賢否邪正皆見於射侯之間庶頑讒說之人而侯以明之者蓋使知其不正而反于正也撻以記之所謂夏楚二物收其威也蓋鞭撻於其小過使之記而不忘苟記而不忘則終身不犯矣書用識哉是以書其過於䇿而不忘此三者皆是不忍遽弃之於小人之域故為之啓其憤發其悱使之遷善改過之心油然而生與樂則生矣之生同欲並生哉蓋欲庶頑讒說之人並生其愧恥之心聖人所以待之既如此之盡則其間必有回心以向善者聖人無自而知之則使樂工納言而揚於上以觀其心其有格則承之庸之惟其長惡不悛怗終不善而終無遷善改過之望者然後納之於刑薛氏曰論語曰有恥且格格改過也承者薦也春秋傳曰奉承齊犧古者奉圭幣而薦之曰承格則承之庸之蓋謂其改過者則薦而用之此說是也自庶頑讒說至否則威之其略見於舜典其詳見於此此龍之職而乃以命禹總其事庶頑讒說必小人之有才者雖其邪佞最為可惡然苟使人君能以寬厚為心為之生其遷善之心至其一旦翻然而改未必不為一時豪傑之才惟上之人弃之於小人之域而刻核太至則彼以不肖之心應之矣自古有志之士惡小人欲盡去未有不為小人所中小人得志則國家之勢遂以陵遲而不能復振兩漢之末皆坐此也舜之言曰庶頑讒說則是其中非無小人也雖有小人而舜不與寇賊姦宄同弃於皋陶之刑方且設為一官為之納言則待之如此其盡故雖一時之小人莫不變心易慮歸乎大中至正之域善乎邵康節之言曰堯舜之世天下非無小人也是難其為小人也所謂難其為小人者謂雖有小人而染於聖人之教亦將變而為君子此唐虞之世所以比屋可封而自三代以下所不可企及之也禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉禹曰俞哉然帝之言也雖然帝之言又有以廣帝之意不以帝之言為然於是故曰俞哉與其他人曰俞者異也舜謂慎乃在位必資於羣臣之助汝當欽爾四鄰以共弼豫違其責望于禹者可謂大矣禹則以謂輔弼之責雖在於臣鄰然而帝當廣延天下之賢人使之居輔弼之任無以謂賢才止於此而已光者充也光天之下者猶言普天之下敷天之下也海隅者四海之隅也蒼生者謂蒼蒼然如草木之生也黎獻賢人在側陋獻賢也如大誥曰民獻有十夫豫翼論語曰文獻不足徴皆是賢之稱也謂之黎獻者孫氏曰士大夫而上冕辨在首則緇𤣥爵靺其色不同至於野人戴髮則但黎首而已黎首之民謂之黎民賢黎民則謂之黎獻此說是也凡此普天之下至于海隅之至遠蒼生之至微其萬邦之內賢而黎首者莫非帝王之臣帝當悉舉而用之也禹之意蓋言當時之賢人或有處於版築耕釣之微而未仕於帝朝者帝當旁搜博採而罔有或遺使之處輔弼之任以為天子之助也敷納以言明庶以功車服以庸誰敢不讓敢不敬應帝不時敷同日奏罔功既廣求天下之黎獻必在於敷奏以言使陳其嘉言嘉猷以啓沃於上既敷奏其言矣而又明其衆功以考其言事而責其實用謂之敷納謂之明庶皆是兼收並蓄罔有或遺之義矣謂言無所不納功無所不明也既敷奏其言明庶其功審知其可用矣於是旌之以車服廣求天下之黎獻而登用之也帝既廣求天下之賢才虛心以納其言責實以明其功而旌之以車服其好賢樂善之心有加而無已則在位之人誰敢不舉賢薦士以讓其所不如之人推賢讓能則庶官乃和矣故敢不敬應于帝以弼其人主之違以致其手足耳目之助帝苟不如是則好賢樂善之心替矣故逺近布同日進於無功苟逺近布同日進於無功則禹雖欲欽四鄰以致其輔弼之功亦不可得也唐武氏無道於用人無所難不惟人得薦士亦聽自舉其後開元賢臣叶贊幾致刑措者武后之所收也及德宗好察多忌士無賢不肖皆不得進國空無人以致奉天之禍故陸宣公論之以謂武氏以易得人陛下以精取士觀宣公之論若此則禹謂帝不時敷同日奏罔功者誠非過論也無若丹朱傲惟慢逰是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世此言堯子丹朱之所以失天下者以規舜也夫禹之陳謨謂帝當廣求天下之黎獻敷納以言明庶以功而又車服以庸其言可謂大矣而繼之以丹朱之慢逰傲虐以戒之者蓋自古太平無事之世賢者在位能者在職則其君未嘗無好賢樂善之心其所以至於好賢樂善之心替則讒諂日進而不自知者未嘗不始於一日之慢逰也唐明皇開元中用姚崇宋璟之徒以致太平庶幾正觀之治一旦惑於女色荒於遊田之樂不恤國事其一時賢人如張九齡之徒皆厄于一時而不得志其所用者為李林甫楊國忠牛仙客數人而已是明皇一人也自開元以前而觀之則好賢樂善之主也自天寶之末觀之則好賢樂善之心無毫釐存於胸中原其所以致此者蓋本于一日之慢逰也舜聖人也雖萬萬不至於此然而君臣相與警戒之道不得不爾蘇內翰曰禹戒舜曰無若丹朱傲惟慢逰是好舜豈有是哉周公之戒成王曰無若殷王受之迷亂酗于酒德哉成王豈有是哉周昌以漢髙為桀紂劉毅以晉武為桓靈當時人君皆不以為罪而書之史䇿以為美談此說是也蓋人臣之進言極其切直而無諱者此誠盛德之士漢溝洫志云堯禪舜朱處丹淵為諸侯朱是其名丹乃所封之國蓋堯之子也無若丹朱傲者丹朱之為不肖蔽以一言曰傲也惟慢遊是好以下又言其傲之實也言丹朱惟傲䙝之遊是好也罔晝夜額額者言傲戲而虐無晝夜也常欲肆惡無休息額額不休息之狀也古者小人之為惡者必傲傲者必虐終風且暴顧我則笑謔浪笑傲此州吁之所以亡也罔水行舟言丹朱習於無水行舟為能推於陸也論語曰羿善射奡蕩舟孔氏云奡多力也能陸地行舟此亦丹朱之類也陸地非可以行舟丹朱恃其力多推之於陸而行之古者謂多力者舉百鈞扛洪鼎揭華旗謂他人之所以不能舉我獨能舉之朋淫于家謂妻妾亂而無别也丹朱為堯之子當傳堯之天下惟其慢逰傲虐淫亂之故故堯不以天下授丹朱而授於舜此所以用殄厥世不得嗣堯之天下也豫創若時娶于塗山辛壬癸甲啓呱呱而泣豫弗子惟荒度土功此又言已之懲創於丹朱之惡起於一日之慢逰故不敢不黽勉以成事功也娶于塗山國之女也辛日娶妻甲日復往治水蓋其娶妻甫及四日遂往從治水之勞以拯生民之急也啓呱呱而泣孟子曰八年於外三過其門而不入言禹之治水嘗過其門聞啓之泣其聲呱呱然不暇子之惟荒度土功詩曰天作髙山太王荒之毛氏曰荒大也大度土功之事也晉重耳出奔及齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下𧖟妾在其上聞之以告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懷與安實敗名公子不可姜與子犯謀醉而遣之醒以戈逐子犯重耳之所以能成霸功者姜氏與有力焉蓋未有沈溺於妻子之愛而可以建大功立大節者禹拯生民之難思天下之溺由己之溺不暇顧其妻子至於沐雨櫛風股無脂脛無毛而不以為勞其志如此舉天下之聲色嗜好曽何足以易吾之此志哉弼成五服至于五千州十有二師洪水未平之前上古帝王之世已有其制矣洪水之後下民昏墊則五服之制於是圯壞而無别禹既平洪水至於九州攸同庶土交正於是輔成其五服之制以復其舊王肅曰五千里者直方之數謂每服之內為其小數定其差品各有所掌是禹輔成之力也至于五千者每服五百里五服二千五百里東西南北相距各為千里也州十有二師者孔鄭之說不同孔氏以謂一州用三萬人功九州二十七萬庸薛氏云大司馬法二千五百人為師此蓋兵制也禹之治水豈故用此師也哉以是知孔氏之說為不可用鄭氏云每州立十二諸侯為之師以佐牧也此則正與下文外薄四海咸建五長相應其說為長而其所以為每州立十二師之說則為不可信蓋其說以謂堯初制五服服各五百里禹弼五服之殘數亦每服各五百里故有萬里之界萬國之封焉猶用要服之內為九州州更方七千里七七四十九得方千里者四十九其一以為圻內餘四十八八州分而各有六蓋百國一師州十有二師則州千二百國也八州凡九千六百國其餘四百國在圻內合於春秋傳禹朝羣臣於㑹稽執玉帛者萬國之言而先儒王肅之徒謂禹之功在於平治水土不在于開拓境土地廣三倍於堯而書傳無聞焉以是知鄭氏此說其附會雖若可從而其理則非但其論每州建十二諸侯以為之師則其說可行外薄四海咸建五長謂九州之外迫於四海每方各建五人以為之長也蓋自甸服至綏服方三千里是九州之內也要服荒服各一千里是九州之外也自甸至綏每州建十二諸侯為之師要荒二服每方建五人為之長此詳內而略外也而其若干諸侯而置一師若千種落而置一長則世代久逺不可得而知矣各迪有功苗頑弗即工帝其念哉謂內之每州十二師外之每方五長皆迪道上之德而從上之政教以有其功惟三苗頑凶負固不服之國不肯就功帝當以三苗為念而憂勤於政事不可使有一日之慢遊也禹之陳謨有及於此蓋謂四海九州既已悉服苟使天子者不能窒其利欲之原則情竇一開慢逰傲虐無所不至將見一國叛之天下靡然日入於亂矣昔唐明皇之時海內無事四方諸侯奉職貢於京師不敢有後者及其一旦天子惑於女色侈心遂生忠直浸踈讒諂並進朝廷之勢輕祿山竊發於幽陵兩京陷沒四海橫流雖李郭之徒奮其忠義以圖恢復之功而河北之地卒為割據之壤終唐室而不能復收舜之時既有頑弗即工之三苗苟使舜忽而不念至于怠忽之心生憂勤之志怠三苗乘間而起則雖內之十二師外之五長各迪有功亦不足恃也禹之陳謨其言至此旨哉帝曰迪朕德時乃功惟叙皋陶方祗厥叙方施象刑惟明王氏以謂禹言苗頑弗即工之事帝當念其罪而誅之也故於下文皋陶方祗厥叙方施象刑惟明謂皋陶方施刑於苗民惟明夫勸人主以用兵豈禹所以愛君之意哉苗之頑凶率六師以征之猶且逆命豈皋陶象刑之所能致哉此說為不可用自允迪厥德謨明弼諧至於帝其念哉則皋陶與禹相與語帝前其謨既無餘藴矣故舜併陳二人之功申美之謂天下之人皆迪我之德者是汝禹之功也蓋非弼成五服至于五千則無以建師長無以建師長則何以各迪有功此蓋因其言而遂美之也皋陶又能方祗禹所叙之功而施其象刑亦明於人之功罪輕重各得其宜也漢孔氏以皋陶方祗厥叙方施象刑惟明二句為史官之辭而鄭氏以為此乃舜推美二臣之言鄭氏之說為長唐孔氏則以為此文上無所由下無所結是不然自皋陶謨至此皆是禹皋陶相與語帝前其陳謨既終矣然後申美二人之功而結之安得謂上無所由下無所結哉孟子曰堯以不得舜為己憂舜以不得禹臯陶為己憂觀二人陳謨如此帝美之又如此信乎孟子之言也夔曰戛擊鳴球搏拊琴瑟以詠自此而下夔言其所以作樂之功也其文當為一假不與上下文勢相屬蓋舜之在位三十餘年其與禹臯夔益之徒相與答問者多矣夫史官取其尤彰明者為此數篇以詔後世其言止於是而已則是其所言者自有先後史官集而記之非其一日之言也諸儒之說自臯陶謨至此篇末皆謂其文勢相屬故薛氏以謂舜以苗民逆命臯陶方祗厥敘而行法故夔又進陳言鬼神猶可以樂語鳥獸猶可以樂致而况於人乎王氏則以謂治定制禮功成作樂舜之治功於是乎成矣故夔稱其作樂以美舜也凡此皆欲㑹同數篇所載以為一日之言豈史官獨載其一日之言而盡遺其餘乎此理之必不然也理之所不然而必為之說故其說皆牽㳂而不通今不取郊特牲曰歌者在上匏竹在下貴人聲也享禮曰升歌清廟示德也下管象武示事也燕禮曰升歌鹿鳴下管新宫蓋堂上之樂以歌為主故謂之升歌堂下之樂以管為主故謂之下管是知戛擊鳴球搏拊琴瑟以詠者皆堂上之樂也下管鼗鼓合止柷敔笙鏞以間皆堂下之樂也蓋樂之作雖有上下之異其實相合以成樂也孔氏謂戛擊柷敔所以止樂搏拊以韋為之實之以穅所以節樂其說亦無所據但以意度之耳然其義則有可疑者器雖有堂上堂下之異其實一樂也其作止節奏必相待而成聲堂下既已設柷敔豈於堂上又設之邪則戛擊不得為柷敔戛擊既非柷敔則搏拊亦不得為節樂之用明矣沈內翰曰鳴球非可戛且擊和之至詠之不足有時而至於戛且擊琴瑟非可以搏且拊和之至詠之不足有時而至於搏且拊所謂手之舞之足之蹈之而不自知據沈意但以戛擊為戛擊鳴球以搏拊為搏拊琴瑟意此說為可矣至謂和之至詠之不足手舞足蹈而不自知則亦不必如此楊子雲長楊賦云戛滴鳴球劉良注云球樂器也戛滴拊擊也顔師古曰戛擊擊考也以是知鳴球固可以戛擊矣古語云拊鳴琴吹洞簫又曰手撫五弦目視雲漢則琴瑟固可以搏拊蓋樂之作升歌於堂上則堂上之樂惟取其聲之輕清者與人聲相比故曰以詠故詠者但戛擊鳴球搏拊琴瑟以詠歌人聲也鳴球玉磬也玉磬而謂之鳴球者案考工記云梓人為筍虡羽屬無力而輕則於任輕宜其聲清陽而逺聞于磬宜若是者以為磬虡故擊其所懸而由其虡鳴鱗屬以為筍深其爪出其目作其鱗之而則於眂必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣以其筍虡如鱗羽之鳴故曰鳴球祖考來格虞賔在位羣后德讓此蓋謂樂聲和則人神和也祖考來格者非謂有神靈光景之接於人也蓋祭義曰其人室也僾然必有見乎其位周還出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其歎息之聲者以是為來格也據此作樂必是在宗廟祭祀之時此之謂祖考來格者祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯則知有虞氏之祖宗是顓頊與堯也此之作樂當在顓頊與堯之廟然以堯為宗則可以堯為考則不可謂之考則疑瞽瞍之廟以考為瞽瞍則祖者瞽瞍之父也祭法之言又復不可信然舜受堯之天下而韶樂之作豈不作于堯之廟而作于瞽瞍之廟於義未安然其代逺矣不可得而考矣虞賔者丹朱也堯之後為賔於虞猶微子為客於周也夫丹朱之慢逰傲虐可謂難化矣今也感樂之和其在位也與夫助祭之羣后以德而相讓小人之無不和蓋可知也下管鼗鼓合止柷敔下管以下此堂下之樂也管猶周禮大司樂曰隂竹之管孤竹之管孫竹之管是也鼗鼓如鼓而小持其柄而搖之旁耳還自擊所以出音柷者郭璞云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊止者其椎名也敔如伏虎背上有二十七鉏鋙刻以木長一尺而擽之蓋樂之始作也則擊柷以合之及其將終也則擽敔以止之謂之合止笙鏞以間笙樂器也以匏為之列管於匏中又施篁於管端笙竽類也三十六篁者謂之竽十三篁者謂之笙鏞大鐘也上言以詠此言以間相對而言蓋與詠歌迭奏也案儀禮云歌鹿鳴以笙南陔間歌魚麗以笙由庚間此所以迭奏也鳥獸蹌蹌言樂音不獨感神人至於鳥獸無知亦且相率而舞蹌蹌然也夫韶樂之奏而能使鳥獸蹌蹌而和者蓋樂之所以不能感物者以其不得中聲也苟得中聲則小大動植無有不感格矣故瓠巴鼓瑟而游魚出聽伯牙鼓琴而六馬仰秣况舜之盛德召和氣於上夔之典樂調中聲於下則韶樂之奏而百獸蹌蹌無足疑者簫韶九成鳯凰來儀此又論其舞也蓋樂之作也九德之歌升于堂上者九德之歌衆樂依之而舞於堂下者則舞於庭九韶之舞也謂之簫韶者孔氏曰言簫以見細器之備其說不然而說者又謂簫者不齊之管其聲清而細以象鳳凰之聲故奏之而鳳凰來儀其說亦不然案古今尚書簫字從竹從削簫舞者所執之物簫與簫音雖同而義實異說文於管簫之簫注云參差管而從竹從削之簫注云舜樂名簫韶延陵季札觀周樂見舞韶簫者其字從竹從削之簫以是知簫韶二字蓋舜樂之總名也今文作管簫之簫故諸儒皆以為細管之備而說者又謂編管為之其聲肅然如鳳皇聲此皆曲為之說非古書之本意今當從古文書以簫韶者為舜樂之總名則得之矣九成者鄭云韶樂之作所以象治功之成而舜治功之成見於九功惟叙九叙惟歌故其樂以九為節歌於堂上者九德之歌舞於庭者則九韶之舞亦猶武王之功成於六故其樂以六為節也鳳皇來儀者鳳皇羽族之最靈者其為物也治則見亂則隱不可求而得不可豢而養今也感樂聲而至舞於庭而有容儀也自古太平之世鳳皇出而為瑞氣後世或見於衰亂之朝者此蓋索而後獲非其自至不足為瑞也歐陽曰鳳皇鳥之逺人者也當舜之治天下政成而民恱命夔作樂之聲和鳥獸聞之皆鼓舞當是時也鳳皇適至舜之史因並記其實以為美故世因以鳳皇為有道之應其後鳳皇數至或出於庸君視政之時或出於危亡大亂之際是果為瑞哉此說未為允當周公曰我則鳴鳥不聞孔子曰鳯鳥不至河不出圖吾已矣夫觀周孔之言云爾以謂鳯皇為非有道之應可乎若以鳯皇為偶見於昏亂之時則併與帝王之瑞為不足信矣歐陽之說不可從自祖考來格至於鳳皇來儀是皆韶樂之所感召也然於堂上堂下文勢各有所屬者唐孔氏曰樂之作也依上下而迭奏音合而後曲成神物之來上下共致非堂上堂下別有所感以祖考尊神故配堂上之樂鳥獸賤物故配堂下之樂總上下之樂言九成致鳳尊異靈瑞故別言爾非堂上之樂獨致神來堂下之樂偏令獸舞也夔曰於豫擊石拊石百獸率舞庶尹允諧此又別於一時論作樂之效於字釋文無音當作如字讀據此當是歎而起語之辭宜讀為烏擊石拊石猶言戛擊鳴球也韶樂之作八音皆備而獨言擊石拊石者蓋五聲之播於八音而角之聲其數六十有四其聲在於清濁小大之間而石尚焉其聲有清濁小大之間則尤難和者石聲屬角石既和則金絲竹匏土革木之聲無有不和矣詩曰既和且平依我磬聲則知言石者總備韶樂之和而言之也此雖但云擊石拊石者其實總簫韶全樂而稱之上言鳥獸此言百獸者考工記曰天下之大獸五脂者膏者裸者羽者鱗者羽鱗可以謂之獸則知鳥獸皆可總而名百獸也尹者正也庶尹者百官府之長也允諧者信皆和諧也非庶尹之諧在於百獸率舞之後蓋言百獸從風猶且如此況百官者乎昔季札觀周樂見舞韶簫者乃曰德至矣盡矣如天之無不覆如地之無不載雖甚盛德蔑以加矣夫韶樂之奏幽而感神則祖考來格明而感人則庶尹允諧微而感物則百獸率舞原其所以能感召如此者皆由舜之德如天地之無不覆載也其樂之傳至孔子之時千有餘年而孔子聞之於齊尚且三月不知肉味曰不圖為樂之至於斯以是觀之其聞樂感韶者如此則知當時所感從可知矣觀孔子之忘味與夫季札之稱夔之言雖極其褒崇稱美之辭豈有一言之溢哉帝庸作歌曰勑天之命惟時惟幾文中子曰昔聖人述史三焉其述書也帝王之制備矣故索焉而皆獲其述詩也興衰之由顯矣故究焉而皆得其述春秋也邪正之迹明矣故考焉而皆當以此三者同出於史而不可雜也故聖人分焉觀文中子之言其意以謂詩也書也春秋也其原蓋出於一書也至後世簡冊繁多始分為三詩始於商書始於唐虞春秋始於平王魯隱公之際而其源流皆出於書故自西周以前嵗月之終始惟見於書此則春秋之未分也虞夏賡歌與其書而並傳此則詩之未分者也惟其未分故自虞夏之時觀之三者皆合而為一舜禹臯陶之賡歌與夫五子之歌雖載之於書其實三百篇之權輿也此三者皆出於一而後之學者各自分藩以立同異故學詩者不知有書學書者不知有詩學詩書者不知有春秋學春秋者不知有詩書以是為學豈不失聖人之旨哉此一段雖書之所載學詩者當自此始庸者用也助語也孔氏云用庶尹允諧之政故作歌以戒安不忘亂據此一段乃是史官載舜與臯陶相與賡歌之辭上文曰百獸率舞庶尹允諧其文意全不相貫但其文有庸字故孔氏從而為之說考之於理不通在所不取詩曰情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也觀舜之君臣相與答問於廟堂之上曰都曰俞曰吁曰於者皆言之不足又從而嗟歎之辭自帝庸作歌以下是皆嗟歎之不足而見於詠歌也舜曰股肱喜哉元首起哉百工熙哉臯陶曰元首明哉股肱良哉庶事康哉等語此所謂歌也舜曰勑天之命惟時惟幾臯陶曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事惰哉帝拜曰俞往欽哉此則道其意於永歌之前也勑天之命惟時惟幾者此舜言為人君者不可不勑正上天之命蓋天難諶命靡常其治亂安危之命果有自而勑正之哉時既安矣危之所自萌時既治矣亂之所自兆時既安矣時既治矣此之謂惟時危萌于安亂萌於治此之謂惟幾惟時者言順天之命於治安已成之後惟幾者言察天之命於危亡未兆之前此其所以能勑天之命也乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉人君欲勑天之命惟時惟幾非人臣之助則治功無自而濟故形之於聲則曰股肱喜哉元首起哉百工熙哉股肱喻臣也元首喻君也蓋一人之身手足喜恱從事於一身以為元首之助則元首為之興起亦猶人臣趨事赴功以為人君之助則人君亦從而興起百工熙哉者言百官之職業亦熙然而興也熙興也下言百工則知上言股肱者専指大臣而言之也舜既望大臣如此則臯陶於是拜手稽首揚言以奉承所歌之意也拜手者自首至手稽首者自首至地言盡敬於君也揚者大言而疾曰揚臯陶既拜手稽首而又揚言曰念哉者蓋舜之所歌泛指當時大臣而臯陶欲使當時大臣皆念夫帝所歌之意於是宣言於衆謂凡我同列大臣皆念帝所歌之意故曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉欽哉言凡我同列之大臣當率欽其上之命以興作其事業又當慎汝所守之典憲無敢不欽也屢省乃成欽哉者謂未成之事則作之興之既成之事則省之察之使無廢壞又不可不欽哉率作興事慎乃憲則能勑天命而惟時矣屢省乃成者則是能勑天之命而惟幾矣臯陶既與同列論其所以惟時惟幾以助天子勑天之命于是又續成帝歌以致其規戒之意賡續也載成也臯陶之歌而續成於帝者蓋帝所歌謂夫元首之起必由股肱之喜是君之所望於臣也臯陶之歌謂夫股肱之良必由元首之明是臣之所望於君也以足成其義也所謂賡載者亦猶訪落之詩蓋是嗣王朝於廟之時訪於諸侯之言必繼之以敬之詩然後其義乃足故作序者於訪落之序曰訪落嗣王謀於廟也於敬之序曰敬之羣臣進戒嗣王也此亦賡載之意也元首明哉股肱良哉此亦以人身為喻也元首明於上股肱良於下亦猶人君明於上則人臣得以盡忠於下此庶事所以安也又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉臯陶之歌既及於此猶未足盡其警戒之意故又歌曰元首叢脞哉股肱惰哉萬事墮哉叢脞者破碎而無大略也君叢脞於上則臣懈怠於下故股肱惰則事所以墮廢而不成也范內翰嘗論此言以謂君以知人為明臣以任職為良君知人則賢者得行其所學臣任職則不賢者不得苟容於朝此庶事所以康哉若夫君行臣職則叢脞矣臣不任君之事則惰矣此萬事所以墮也當舜之時禹平水土稷播百穀土穀之事舜不親也契敷五教臯陶明五刑教刑之事舜不治也伯夷典禮后夔典樂禮樂之事舜不治也益為虞垂作共工虞工之事舜不知也禹為相總百官自稷而下分職以聽焉君人者如天運乎上而四時寒暑各司其序則不勞而萬物生也君不可不逸也所治者大所司者要也臣不可以不勞也所治者寡所職者詳也此說盡之矣夫有虞之治所以能冠百王之上者惟其君臣各任其職而已孔子曰無為而治者其舜也與夫何為哉恭已正南面而已又曰舜有五臣而天下治蓋君無為而執其要於上臣有為而致其詳於下其治歷萬代而不可及原其所以致此者亦無出於賡歌之數語耳蓋由其嗟歎之不足形於歌詠故雖曰不過數語然言有盡而意無窮使讀之者如聞諸弦歌發越之音可以一唱而三歎也三百篇之源流蓋出於此學詩者不可不察也帝拜曰俞往欽哉者蓋拜受其言而然之自今而往君臣皆當欽其事而踐其言也禮曰君於臣則無答拜蓋至尊之勢無所屈也然太甲之于伊尹成王之于周公皆有拜手稽首之義所以尊師重道也臯陶之賡歌舜拜而受之豈亦以師傅之禮而待臯陶與案大禹臯陶益稷三篇當時君臣相與都俞告戒之辭史官取其深切著明者以為三篇垂於後世然堯舜行事其本末既載於二典必為此三篇者蓋以君臣之盛德尤在於此故也嘗觀唐太宗之為人父子兄弟之間閨門衽席之上蓋有不可言者然其所以致正觀之治至於米斗三錢外户不閉行旅不齎糧取給於道者由貴藝好賢屈已以從諫而已然太宗克厲矯揉自力於善故也太宗豈真能好從諫者哉強勉而行之未必出於至誠而其所成就猶且如是故當時史官述其聽諫之事以為正觀政要之書以示後世子孫亦以其能成正觀之治者有在於此故也知太宗之所以能成正觀之治則知舜之所以為大者舍此大禹謨益稷臯陶謨三篇亦無以見之矣尚書全解卷六
