body:
  text: 尚書全解卷二十四宋林之竒撰洪範周書書之名篇非成於一人之手蓋歷代史官各以其意標識其所傳之簡册以為别異非如春秋之書盡出於夫子之所刪定而可以一例通也故書之為體雖盡於典謨訓誥誓命之六者然而以篇名求之則不皆繫以此六者之名也雖不皆繫於六者之名然其體則無以出於六者之外先儒拘於名篇之有無而不知變遂以征貢歌範為十體殊不知洪範之作蓋箕子為武王歷陳治天下之大法其實謨之體也洪範者徒以史官傳録之時偶不以謨訓名篇耳凡有異者各自為體則將至於數十篇而猶未足也今徒見其篇名有一範字遂以為有範之體如此則是書之篇名非據篇中洪範二字以為簡册之别也學者能知書之篇名雜出於史官之手而不可以一例通則典謨訓誥誓命之體昭昭然若日星而不可掩矣書序之作亦與篇名相類蓋是史官隨其旨意各自立言而不可以一槩論也故有包括一篇之義而盡於數言者如堯典武成之類是也説者徒以謂書序盡出於夫子之手自堯典至泰誓莫不有深義於其間必欲皆從而為之説而不知於其間蓋有出於史官一時之意但述其所作之由而不及篇中之義者如湯誓之序曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓篇中初無伊尹相湯伐桀之事而序言此者蓋以上篇之序有伊尹去亳適夏既醜有夏復歸于亳故此篇接上文而為序非有異義也如周官之序曰成王既黜殷命滅淮夷還歸在豐作周官黜殷滅夷初無與於作周官之序此亦是與大誥微子之命等篇之序首尾相接若此之類在五十八篇之中自為一體不可以必求其義也如此篇序曰武王勝殷殺受立武庚以箕子歸作洪範殺受立武庚無與於篇中之事而序言之者蓋亦與上篇之序相接而言故耳唐孔氏曰此篇惟當言箕子歸耳乃言殺受立武庚者序自相顧為文上武成序言武王之伐紂故此言勝之下微子之命序云黜殷命殺武庚故此言立之序言此以順上下也如孔氏此言則是序之言此者蓋立序之體不得不然亦不可必其為説也而説者往往以謂書之序盡出於夫子之手必欲以春秋褒貶之義而求之故蘇氏曰殺受立武庚非所以同洪範者而孔子於此言之明箕子之德蓋武王師而不臣也武王將立殷後必以箕子為首微子次之而卒立武庚者必二子辭焉武庚死而立微子則是箕子固辭而不可立也然天以是道畀禹而傳至於箕子不可使自我而絶也以武王而不傳則天下無復可傳者故為箕子者傳道則可仕則不可此其論箕子之出處以謂傳道則可仕則不可固為盡善以謂出於夫子序書之意則失之鑿矣劉執中曰立武庚以奉成湯之祀明不奪其國而絶人之祀也以箕子歸作洪範者誅其君而師其臣以先王之法存與不存耳王氏曰武王殺受矣而不為商立後以統承先王修其禮物則是遇商不仁無禮無義也箕子嘗為商之大臣尚可以言之乎武王立武庚則是遇商仁且有禮義此實箕子所以言也是皆已甚之論也夫武王之待箕子固有此禮然未必是作書者之本意也武王勝殷殺受立武庚以箕子歸作洪範洪範惟十有三祀王訪于箕子王乃言曰嗚呼箕子湯之於桀放之南巢而已武王之於紂則殺之者荀子曰武王伐紂遂選馬而進厭旦於牧之野鼓之而紂卒易鄉遂乘殷人而進誅紂蓋殺者非周人固殷人也紂之見殺蓋以殷人如林之衆倒戈相攻併攻於紂武王至殷赦紂而不誅如湯之放桀之志已無及也於是立武庚代殷後以終致其不忍之意如湯放桀之意也孔氏曰不放而殺紂自焚也蓋其意以謂武王之心不殺紂故取於史記之説以謂紂兵敗走入登鹿臺蒙衣其珠玉赴火而死孔氏雖以是明殺紂非武王之本意然商紂自焚而死則不可謂之殺也唐孔氏知其説之未通則又從而為之説曰紂既自焚而死武王遂斬紂頭懸之太白旗死猶斬之則生必不放是則併與先儒之意失之矣某嘗以謂太史公之議論其是非叛於聖人者多矣未若以武王斬紂頭懸於太白之旗之為甚也漢髙祖與項羽親為仇敵以爭天下及羽死於垓下髙祖尚親為之發喪哭臨葬於彭城祀以魯公禮況武王於紂其為君臣上下之分較然明白寧忍為此已甚之戮乎故某推本於荀卿之言謂殺受者殷人非周人以釋學者之疑亦所以推明武王之道也武王勝殷殺受以立武庚則是所以待殷者盡矣於是以箕子歸蓋以天下之大法其傳在於箕子將屈已而問焉故致恭盡禮而奉之以歸非執俘而歸也惟十有三祀者武王即位之十三年也商曰祀周曰年此武王之十三年當曰年而曰祀者蓋箕子之辭也案諸傳記引此篇者皆以為商書則知此篇之作蓋以箕子為武王陳之退而自録其答問之辭以為書以箕子之所録故傳記皆以為商書雖然箕子所録史官啓而藏之故今文不以為商書而以為周書惟十有三祀者因箕子之辭而未革也王訪於箕子就而問之也禮曰禮聞來學不聞往教禮聞取於人不聞取人武王既致敬盡禮而奉箕子以歸訪之以治道故就而問之也蜀先主將見諸葛孔明謂徐庶曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之於是先主三訪孔明於草廬之中咨以世務武王於箕子就而見之者亦以箕子之不可屈而致故也孟子曰故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也武王將欲大有為於天下故就而訪箕子蓋其尊德樂道之誠出於中心之固然也既就而訪之矣於是咨嗟而呼箕子以致其所問之意也箕子殷封內諸侯之爵也天下既為周矣而箕子猶以殷圻內之封爵見稱於武王者蓋不臣於周也其封於朝鮮蓋是既遁而去不食周粟如夷齊之志武王因而封之耳雖封於朝鮮而猶稱箕子也惟天隂騭下民相協厥居我不知其彞倫攸敘此武王所問之意也漢孔氏曰天不言而默定下民是助合其居使有常生之資蓋其意以騭訓定而史記宋世家舉此文亦以為惟天隂騭下民先儒解釋多用此説然騭之訓定無所經見難以取信案爾雅曰騭升也方言曰魯衛之間為升騭則騭之訓升其來尚矣漢五行志舉此言而應劭之注以騭訓升蓋取諸此惟天隂騭下民相協厥居此蓋洪範之大要也楊子曰陽椎五福以類升隂幽六極以類降雖有吉凶善惡之不同然天之生斯民也性無有不善而命無有不正惟斯民之情因物有遷失其性命之至正故有陷於六極不能自出者非其性之本然也皆其愚不肖之自取耳若乃天之所以隂騭下民相協厥居而使之各正性命保合太和者未嘗不升之以福也惟相協厥居而升之以五福故其生斯民而立之君其使之贊化育而輔相裁成之者必在於建皇極而斂五福以敷錫庶民者實君師之任也武王惟知天之隂騭下民相協厥居而未知人君所以取夫隂騭之常理者其本末先後當如何也故曰我不知其彞倫攸敘大學曰物有本末事有終始知所先後則近道矣蓋欲求治道而不知本末先後之序則倒行逆施無自而成故武王未知彞倫之攸敘則勤勤懇懇致恭盡禮以訪于箕子而不敢緩為箕子者不得不以所聞而告之也傳曰禮恭然後可與言道之方辭順然後可與言道之理色從然後可與言道之致自我聞在昔以下皆箕子諄復反覆歷陳治天下之大法如此之深切著明無所不盡者蓋以武王禮既恭辭既順色既從則箕子之言不得不盡之矣箕子乃言曰武王之問箕子之對皆曰乃言者唐孔氏曰天道大沈吟乃問思慮乃答乃緩辭也蘇氏曰乃言難之也王虛心而致問箕子辭遜而後對此兩説皆通觀武王之克商放牛歸馬散財發粟大賚于四海而萬姓恱服則為治之本武王非不知之也然而方且皇皇然虛心屈體以訪箕子箕子又諄諄然為武王陳之者孟子曰離婁之明公輸子之巧不以規矩不能成方圎師曠之聰不以六律不能正五音堯舜之道不以仁政不能平治天下今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也故曰徒善不足以為政徒法不能以自行遵先王之法而過者未之有也觀武王之克商其所以大賚于四海者無非仁心仁聞也及考箕子之所問則是先王治天下之大法也猶公輸離婁之不可無規矩師曠之不可無六律此武王之所以汲汲而問箕子之所以諄諄而告也使武王有仁心仁問而不能訪箕子以求其先王治天下之大法是所謂徒善不足以為政箕子雖知先王治天下之大法苟不得武王訪而行之則是所謂徒法不能以自行以武王之仁心仁聞而能行箕子所傳先王治天下之大法此周之治所以巍巍煌煌集唐虞夏商之大成而為百王之冠也然九疇之敘雖箕子為武王陳之而其所陳則有所自來矣蓋自禹神智為天所錫建德於唐虞之世而立地平天成之功當是時也洪範九疇已有所傳之迹矣蓋其道乃百世所共由之道而其文則發於禹之神智經緯纂集著為成訓昭然示後世蓋所謂百世以俟聖人而不惑也禹之洪範箕子之所傳其詳見於此篇而其梗槩則見於大禹謨之書矣大禹謨曰惠迪吉從逆凶惟影響此洪範之大要也蓋天下之理順之則吉逆之則凶彝倫攸斁是從逆之凶也彝倫攸敘是惠迪之吉也洪範一篇大抵發明此理而箕子所陳蓋本於大禹謨而釋之大禹謨曰德惟善政政在飬民水火金木土榖惟修正德利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壞箕子之所演者演此而已此猶伏羲之易文王重之孔子贊之雖多寡不同而其大旨則一也學者欲學洪範不可不推原其所自來大禹謨乃洪範之根本不明乎大禹謨不可以驟語此我聞在昔鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸敘故箕子將陳彝倫之敘於是推本其所自來言鯀之所以失其敘禹之所以得其敘者然後歷陳其九疇之目也鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁者言鯀之逆此所以凶也鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸敘者言禹之迪此所以吉也蓋水曰潤下潤下者水之性也而鯀則堙之使不通以拂其常性使不得行其所無事此五行所以皆亂五行皆亂則失其本矣此彝倫之所以斁也惟禹能順其潤下之性而行其所無事則水由地中行而五行皆得其性得其性則其本立矣此彞倫之敘也然自漢以來儒者往往拘於河圗洛書之説以天錫禹以九疇者蓋其文自洛而出故禹因而次第遂謂天之錫禹洪範九疇自初一曰五行以下皆是龜背所負之文或以為六十五字或以為三十八字或以為二十七字其説雖時有不同是皆以為龜背所負之文誠有如五行等字禹次之以為洪範某竊以為不然古人之語於其最重者必推於天典曰天敘禮曰天秩命曰天命誅曰天討凡出於理之自然非人之私智所能增損莫非天也帝乃震怒不畀洪範九疇彞倫攸斁猶所謂天奪其魄也天乃錫禹洪範九疇彞倫攸敘猶所謂天誘其𠂻也雖然豈有物以豫奪於其間邪夫易之為書由數而起故今世所傳河圖縱橫十五之數謂伏羲準之以畫八卦猶可言也至洪範之為書大抵發明彞倫之敘本非由數而起也則龜背所負者果何物邪若以為有洛書之數如河圖之文則今世所傳洛書五行生成之數大抵出於附會不足信也若以為龜背之所負有五行五事等字則其説迂怪矣某竊謂天乃錫禹洪範九疇猶言天乃錫王勇智耳不必求之太深也學者誠知洪範之書不由數起而天之錫禹非洛書則九疇之意渙然而明矣初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極聖人之經雖同歸于道然其制作之體則各有門户而不可槩論也易之與洪範皆是聖人所以發明道學之祕論為治之道所以贊天地之化育以與天地參者要其指歸未嘗有異而其體則實有不同者觀其立名之意則已可見矣易之為書本於八卦自八卦而衍之為六十四循流相錯變動不居故名之曰易易者言其變而不可為常也洪範之為書本於五行自五行而推其用至於五福六極其彝倫之敘先後始終各有定體故名曰洪範洪範者言其大法之不可易也易之體圎圎故不可常譬之物圎者動方者靜圎流方止各隨其理之自然而不可以相移者也洪範之體方方故不可易是則此二書雖其理本於一揆學者之求之也自有門户於其間學易者不可以不論其變學易而不論其變則易之法泥矣學洪範者不可不論其序學洪範而不論其序則洪範之彞倫斁矣是以箕子將陳九疇之敘必先推本所自來乃言曰我聞在昔鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彞倫攸斁言鯀之所以失者以其彞倫斁也言禹之所以得者惟能敘其彞倫也何謂彝倫之敘自初一曰五行至次九曰嚮用五福威用六極是也此九者施之先後各自有序得其序則彝倫攸敘或失其先後之序而逆施之則斁矣此如一人之身元首居上耳自手足各以其序别之於下不容有毫釐之差舛也而諸儒之論洪範大抵多以易之體求之往往以九疇之敘附會配合以類相從亦欲如重卦之統于八卦也自漢董仲舒歆向父子以來則既失之矣故五行傳之説以謂貌之不恭是謂不肅謂田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直厥咎狂厥罰常雨厥極惡順之其福攸好德言之不從是謂不艾棄法律逐功臣殺太子以妾為妻則火不炎上厥咎僭厥罰常晹厥極憂順之其福康寧視之不明是謂不哲作宫室侈臺榭為淫亂則稼穡不成厥咎舒厥罰常燠厥極疾順之其福夀聼之不聰是謂不謀好戰攻輕百姓􅎖城郭侵邉境則金不從革厥咎急厥罰常寒厥極貧順之其福富思之不睿是謂不聖簡宗廟不禱祠廢宗祀逆天時則水不潤下厥咎霿厥罰常風厥極凶短折順之其福考終命皇之不極是謂不建厥咎眊厥罰常隂厥極弱大抵以此數者牽合相從徇其從己之見以為至當之論雖其援引春秋經傳以發明其説粗若可信然而失聖人之意逺矣蓋箕子所陳有九疇也陳其事以如此諸家之説相配為義則九疇必皆可配也今其可配者止於五行五事皇極五福六極之五者而八政五紀三德稽疑之四者則不可得而配則是漢儒之為鑿也洪範其咎有五曰狂僭豫急蒙其徴亦有五曰常雨常暘常燠常寒常風今欲配合於五福六極福之五者適存其數而六極則衍其一而無所當也則於咎徴各增其一曰皇之不極厥咎眊厥罰常隂厥極弱此則於箕文之外别立此二名以遷就其説又其所以配五行五事大抵皆失於穿鑿非自然之理也故老蘇著洪範論深闢其非以謂明其統舉其端削劉之惑繩孔之失使經意炳然如從璣衡窺天文矣其用意固善而糾正漢儒之失亦已切中其病也然其自為説則猶有未盡者其言謂皇極之建則貌恭言從視明聼聰思睿則木曲直金從革火炎上水潤下土稼穡而時雨時燠時寒時晹時風應之於是五福咸備皇極不建則反是而有六極之應此其為説雖不若漢儒之鑿然其相配亦止於五疇而已則八政五紀三德稽疑之四者則遺之而弗録也安在其為九疇哉其曰致至治總乎大法總大法本乎五行理五行資乎五事正五事賴乎皇極五行含羅九疇者也五事檢制五行者也皇極裁節五事者也含羅者其統也裁節者其端也禹之疇分之則幾五十矣諸儒不求所謂統與端者顧為之傳則向之五十又將百焉莫若以百歸之五十五十歸之九九歸之三三五行也五事也皇極也而又以皇極裁節五事五事得則五行從是三卒歸之一也老蘇之論如此可謂善守約矣然箕子之論九疇之敘自初一五行至嚮用五福威用六極自一至九始終先後各有序今以九歸之三三歸之一又以皇極裁節五事五事得而五行從則是九疇當先皇極次以五事次以五行而後及其餘豈不與箕子九疇之所陳者異乎豫嘗以謂九疇之言箕子所陳也必以箕子之言為正箕子之言曰天乃錫禹洪範九疇彞倫攸敘是九疇不可以無其敘也自初一五行至次九嚮用五福威用六極此其序也箕子所陳之序既已如此後世安可以私意而異之哉善乎曽子固舍人之論也其言曰五行者行乎三才萬物之間也故初一曰五行其在人為五事故次二曰敬用五事五事敬則身修矣身修然後可以出政故次三曰農用八政政必協天時故次四曰協用五紀修身出政協天時不可以不有常也常者大中而已矣故次五曰建用皇極立中以為常而未能適變則猶之執一也故次六曰乂用三德所以適變也能適變則人治極矣極人治而不敢絶天下之疑故次七曰明用稽疑稽疑者盡之於人神也人治極而通於神明者盡然猶未敢自信也必參吾之得失於天故次八曰念用庶徴徴有休咎則得失之應於天者可知矣猶以為未盡也故次九曰嚮用五福威用六極福極之在民皆吾有以致之故又以考己之得失於民也凡此九者皆人君之道其言不可雜而其序不可亂也推其為類則有九要其始終則猶之一言此言可謂曲盡之矣蓋此書發明先王治天下之大法必本於盡性踐形然後推之以和同天人之際而施政教而其極至於贊天地之化育以與天地參者彝倫之敘始終先後各有定體而不可易逆之則凶順之則吉故其謂序不可亂言不可雜此乃學洪範之綱領也中庸曰天命之謂性率性之謂道修道之謂教九疇自初一曰五行蓋以夫此五行之運於天地之間而發明天地之性中和之實也自五事八政而下則率性之謂道修道之謂教也道與教必率性而修之故自五事而下皆曰用而五行不曰用者自五行而用之也唐孔氏曰五行不言用者五行萬物之本天地萬物莫不用之不嫌非用也此説不然自五事至於六極莫不言用則豈皆以為非用而言用邪以謂用者自五行推而用之所自推者自不言用其理固然也孔子曰君子有九思視思明聼思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義言君子之治己有此九者之殊而此九者莫不各有所思視之於明聼之於聰以下皆是理之自然不可易各正其所無以復加也自五事以下各言用而隨其所用各繫一字亦猶九思之各有所主蓋其理之所當然也五事者聖人之所由以盡性充之以踐形者也視聼言貌思其用不同而蔽之以一言則曰修己以敬而已修己以敬則五事各得其正而無狂僭豫急蒙之失故於五事曰敬用八政者聖人以其正心誠意修身之道逹之於天下國家者也自食貨至於賔師不可不致其厚故於八政曰農用五紀者聖人所以定四時成嵗以釐百工而熙庶績者也而必曰協用者此蓋與協時月正日之協同蓋嵗月日星辰歷數其運行不同而治歷明時者必欲協此數者各無舛差然後正天時而治人事也故五紀曰協用皇極聖人所以允執厥中而為教者也中立於此民之所會而歸矣故曰建用三德所以趨時適變也先後相濟不可為常故於三德曰乂用稽疑者聖人所以盡幽明之情以定天下之事業也不可不審於神明吉凶之意故以明用言之庶證者以己之得失可否驗之於在天時之應者也造次顛沛宜必於此不可以須臾離也故曰念用福極者蓋其成效之見於民而存亡禍福治亂之所分者也故於福則嚮之於六極則宜威之曰嚮曰威者蓋在人君之心有所避就以為激勸而兢兢業業以制生民之命者也漢孔氏曰言天之所以嚮勸人用五福所以威沮人用六極以嚮威為天之所為大失其旨夫自敬用至念用皆指人君之用豈於此二者而獨言天之所用邪故張晦之廷評深得其説以謂王者體五行以齊政謹五事以修身厚八政以分職協五紀以正時建皇極以臨人乂三德以適變明稽疑以有為驗庶徴以調氣彞倫攸敘是所謂至治至治之世五福被於民彞倫攸斁是所謂至亂至亂之世六極傷於民是謂凡言乎用者皆人君之所用也此説固善而猶有未盡者既曰凡言用者皆人君之所用而繼之曰嚮者向而歸之謂威者威以畏之謂王者用五福則民向之而歸其治焉王者用六極則民威之而畏其亂焉既以五福六極為王者之用又以嚮與威為民之歸之畏之此則迂泥而失其旨矣不如曽子固之説為允子固曰五福在民則宜嚮之六極在民則宜畏之威畏也此説可以禆張晦之失也蓋嚮之畏之在人主心術之間爾斯民何與焉猶大禹謨曰戒之用休董之用威謂人主自戒自董耳夫此九疇者蓋自禹之神知本夫天錫發明治天下之大法推陳其先後始終之彞倫以明示天下後世也而箕子為武王諄諄而陳之自初一曰五行以上推本其所以敘九疇之由自威用六極以下則詳陳九疇之名物而其大要皆不出此數言曰初曰次者九疇各有其序而不可亂也曰敬用農用以至嚮用威用言每疇之用各有常理而不可易也序不可亂理不可易學者誠能循其序盡其理舉而措之事業之間則其能成天下之大順致天下之大利在指掌之間爾學者不可不盡心一五行一曰水二曰火三曰木四曰金五曰土胡安定曰自此而下皆是箕子歷陳九疇之名廣九疇之義蓋自上文初一曰五行次九曰嚮用五福威用六極方是説論彝倫之敘九疇之名雖已槩見之而未之詳也故此遍舉九疇之名而條列之剖析其名敷繹其義使先王治天下之大法昭然在目可以舉而措之事業者也據武王訪箕子始也問之以惟天隂騭下民相協厥居我不知其彝倫攸敘箕子告之以鯀之所以汨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸敘而武王於此必復有所發問而後箕子為之敘其九疇之目而每疇之間必復加發問然後箕子歷陳之此答問之常理也如子張問士何如斯可以從政矣孔子曰尊五美屏四惡子張復問曰何謂五美四惡於是夫子歷敘五美之辭以及夫四惡蓋答問之義自當如此武王之傳九疇於箕子其間必更有請問之辭如子張問於夫子者蓋箕子録其文以成書之時略去繁文以就簡要故其所傳止於如此學者當以意逆志可也一五行者在九疇之敘為一其疇曰五行一曰水二曰火三曰木四曰金五曰土此五行之目也洪範彝倫攸敘蓋出在於九疇而九疇之敘自一至九各有先後不易之序如父子兄弟之倫出於天序而不可易不容有毫釐之差舛也故箕子陳九疇之敘必言初與次者蓋此但列其每疇之目耳非有先後之序也而諸儒於此必欲求其先後之序而為之説雖其間亦有可以為之説者然其穿鑿附會者固已多矣至於五行其説尤為乖異而不可行箕子之所謂一曰水至五曰土蓋謂九疇之所謂五行者是此五者之物也而諸儒孔鄭皆以為一二三四五是五行之生數此其為説蓋本於易之繫辭也易曰天一地二天三地四天五地六天七地八天九地十諸儒因之遂以附會此五行之敘而為之説以謂天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之至本朝劉牧之遂以此為洛書本文其説以謂天與五合而為十一六為水二七為火三八為木四九為金五十為土故其圗則以土居中央而一二三四分左右前後各以其成數配之竊謂五行非無數也而洪範所陳其意蓋有所主而不可以數言也其所謂一二三四五者但列此五者之目耳乃若其意則水曰潤下以下是也如漢儒一曰水至五曰土則傅會以一二三四五為五行之生數至於五事其所謂一二三四五者豈皆亦有數邪以至五紀五福亦皆五物也如五行謂可以繫之於數則此五紀五福必皆可以數繫之以至於八政必合於八之數三德必合於三之數然後可以為箕子之意今於其他不以數言而獨於五行則以約生其數學者遂從而深信之以為洛書之本文果如此何其不思之甚邪夫易之為書起於大衍之數自一至五衍之為十有五又自六至十增而衍之為五十有五而天地之數備矣用其四十九以筮則其數不可勝計也蓋易之為書本由數而起故自一二三四五衍之至於無窮此易之體也若夫洪範之體則異於此蓋其書以五行為本窮理盡性至於贊天地之化育而與天地參故其論五行者論其性與理而已理不可移性不可易其與易大衍之數變通而不窮者固已如冰炭之不相入矣安得以數而推之乎故學易者知洪範之五行不可以數而通則可以學洪範矣水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘夫聖人之治天下其極至於所過者化所存者神上下與天地同流凡天地之化育無非己之化育也故洪範之為書要其極致至於休徵咎徵之在天五福六極之在人其所以輔相裁成者莫不在於心術之間蓋至於命之事也欲至於命必窮理盡性而後能至焉故其書必始於五行而論五行之所以然者必言水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡此蓋發明五行之理與性也詩曰天生蒸民有物有則蓋天之生物有是物必有是理此五物生於天地之間為最大者故舉此五物所受天命之性以見物之皆然也水之性濕濕故潤下然搏之激之則有不潤下者而非水之常性也火之性燥燥故炎上然抑之湮之則有不炎上者而非火之常性也木之性敷榮故曲直然失其常性則有夭閼其生者矣金之性堅利故從革然失其常性則有頑鈍其質者矣土之性和緩故可施之於稼穡然而亦有磽確而不利於種斂者而土之性本不如此也此蓋言五行出於天地之間各有稟受之性其所以稟受之於性則有理存焉理不可窮性不可盡故洪範之書將欲建皇極斂五福以錫庶民而立天下之大命則必先窮理盡性以為其本然後舉而措之天下之事業而不可勝用矣故其論五行必以理與性之不可易者而言之也孟子之言性善蓋本於此蓋人之性本善而所以至於不善者蓋必有陷溺而然非其性之本善也性之必善猶水之必潤下火之必炎上木之必曲直金之必從革土之必爰稼穡乃自然而然非有使之然也水火金木皆言曰至於土獨言爰者曽子固曰潤下者水也故水曰潤下炎上者火也故火曰炎上木金皆然惟稼穡則非土也故曰土爰稼穡而已其説不得不然也此説是也五行各窮其理盡其性物格而知至則其本立矣潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘此又五行之味也夫五行之在天下聲色氣味莫不具此五者而此獨言其味者蓋五行各成其性以為味者此皆造化之妙用也水之潤下故凝結而鹹之味成焉火之炎上故焦暵而苦味成焉木之曲直故成實而成酸之味金之從革故其氣腥而成辛之味土之於稼穡則種之斂之而甘味於是乎成五行至於成味則是各盡其性而成此五者之妙用或可以收或可以散或可以堅或可以緩或可以軟多寡有無各適其節而天地養人之功於是乎在聖人之體之故其盡萬物之理贊天地之化育必至於致中和位天也育萬物而後為至也大禹謨德惟善政政在養民水火金木上榖惟修此蓋箕子所衍為九疇者故其初言五行必先本其性推其味以發明此理然後敘其所以措之事業者次而陳之雖出於箕子之所傳而其大致已見於大禹謨之所載矣學者不可不知二五事一曰貌二曰言三曰視四曰聼五曰思貌曰恭言曰從視曰明聼曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖二五事者在九疇之序為二曰貌曰言曰視曰聼曰思此則五事之用也諸儒之論五事皆以配五行唐孔氏曰木有華葉故貌屬木言之決斷若金之斬割故言屬金火外光故視屬火水內明故聽屬水土安靜而萬物生心思慮而萬事成故思屬土謂東方震為足足所以動容貌也西方兊為口口出言也南方離為目目視物也北方坎為耳耳聽聲也中在內猶思在心後來如王氏蘇氏之説大抵類此而王氏之説詳明某嘗謂此諸儒皆是附會穿鑿而為之説箕子之意本不如是若五事果可以配五行則自八政以下皆各有所配豈止於五事而皇極庶徵福極猶可條而入之至於其餘不可以穿鑿通者則舍之不論此豈自然之理哉故某當以謂五行自為五行五事自為五事以至八政五紀以下各自為疇而不可以附會通諸儒既以五行配五事故其論五事之序或以為合於五勝之序或以為合於五常之序要之皆是附會文致之辭正猶以五行為皆具生數也東坡曰人之生也五事皆具而未能用也自其始孩而貌知恭見其父母匍匐而就之擎跽而禮之是貌恭者先成也稍長而知其語以達其意故言從者次之於是始有識别而目乃知物之美惡耳乃知事之然否於是而致其思無所不至故視明聼聰而思睿者又次之蘇氏每譏王氏以為喜鑿至於此論則其去王氏無幾矣九疇必以五事而次五行者蓋聖人體天地中和之性致知格物以經綸天下之大經已見於五行矣物格知至則其施設之序必先於正心誠意以修其身而立天下之大本然後推之於天下國家此蓋彝倫之不可易者也孟子曰形色天性也惟聖人然後可以踐形五事自曰貌曰言曰視曰聽曰思必皆以敬用者此蓋踐形之學也自貌曰恭言曰從視曰明聽曰聰思曰睿蓋學所以踐形也自恭作肅從作乂明作哲聰作謀睿作聖則可以踐形矣此蓋聖人之事業也人之正心誠意惟驗於修身之間故貌不可以不恭恭也者莊肅而不敢慢也自貌恭而充之至於作肅則恭之德成矣其曰恭者猶有不恭之時至於作肅則凡其身之所動無有不恭者矣言不可以不從從也者順理而無所悖也孔氏曰是則可從案易曰君子居其室出其言善則千里之外應之出其言不善則千里之外違之孔氏之所謂是則可從蓋本於此然而以之為言曰從之義則失之矣蓋五事所謂恭從明聰睿者方是修己未及於人應之也其曰從者於理而不悖耳非指人之從之也由從而充之至於作乂則從之德成矣蓋曰從則疑有不從之時至於作乂則凡其口之所言無有不從者矣視不可以不明明也者洞逹而無所蔽之謂也自明而充之至於作哲則明之德成矣作哲者視無有不明也聽不可以不聰聰也者審諦而無所惑之謂也自聰而充之至於作謀則聰之德成矣作謀者聽無不聰之謂也思不可以不睿睿也者精一而無所疑之謂也自睿而充之至於作聖則睿之德成矣作聖者思無不睿之謂也貌無不恭而至於作肅言無不從而至於作乂視無不明而至於作哲聽無不聰而至於作謀思無不睿而至於作聖則盡性踐形之道於是乎盡而治天下國家之本立矣此九疇之序所以先之五行而後次之以五事也三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰可寇七曰賔八曰師大學曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物此蓋言本末始終之序出於自然而不可易者也洪範之書始於五行以盡性五事以踐形盡性踐形以致知格物正心誠意以修其身者可謂至矣楊子曰身立則政立能修身則身立於此矣故其舉而措之天下國家則政利於彼蓋其機如此此洪範於五行五事而下必繼之以八政者以此也三八政者在九疇之序為三其疇曰八政自一曰食至八曰師者是八政之目也先王欲明德於天下既盡性踐形以修其身而立其政事之本矣則其所以舉而措之天下者有此八者之政此八者皆先王所以厚民以為教化之地者也故曰農用農用者無所不致其厚也一流於薄則斯民必有受其弊者矣自一曰食至八曰師皆是治術之先務闕一則不可其勢敵其體鈞皆在所厚而不可以先後緩急論也諸儒之論此者皆以為食貨生民之最急故以為先至於賔師居下莫不有説某謂不必如此要之以是先王厚民之政不出於此八者而已一曰食者務農重榖之政也如井田補助之類是也二曰貨者阜通貨財之政也如懋遷有無化居之類是也三曰祀者報本反始之政也社稷宗廟山川百神以至公卿大夫士庶莫不祭其先之類是也四曰司空者度土居民之政也如辨方正位體國經野使士農工商各得其所之類是也五曰司徒者教民之政也如學校選舉之類是也六曰司寇者立法懲姦之政也如五刑之屬是也七曰賔者交際酬酢之政也如冠昏喪祭鄉飲相見之類是也八曰師者寓兵於農以修武備之政如鄉遂教閲之法是也此八者皆國家之急務為治者所不可忽非有先後緩急之殊也故箕子陳八者之政而斷之以一言曰農用則是八者之體均矣必如諸家之論以食貨為生民最急故在所先雖亦有此理然則司空居民之政也民無所居則雖有食貨之政何自而施哉唐虞時洪水未平禹作司空平水土然後懋遷有無化居蒸民乃粒萬邦作乂必曰食貨為先司空為後則泥矣故此八者不可以先後緩急論之也然此八者之中如食貨祀賔師則稱其事司空司徒司寇則稱其官者言以之逹意而已必取其理之明白而易曉者司空司徒司寇之政者多矣若舉其事而槩以一言則未必盡也故以其官而該之至於食貨賔師則可以其事也或舉其事或舉其官而八者之政曉然可見人君治天下之大政無復餘藴於此矣此實箕子所以為善於開導人主之聽而不費辭也雖舉其一隅至於官各有事事各有官亦可以觸類而通之矣孟子論王道之始必先以養生送死無憾者其説蓋出於此夫欲使斯民養生送死無憾則其所以施於有政者不可不致其厚一有所不厚則養生送死有憾矣王道何自而成哉此八者無所不厚則其養生送死無憾矣此乃王道之所自基也以是觀之洪範彞倫之序豈可易哉四五紀一曰嵗二曰月三曰日四曰星辰五曰歷數前所言者先王所以厚民之政然政事之施不可不本於天時堯典咨汝羲暨和期三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙蓋欲釐百工熙庶績者必在於定四時成嵗使時不定嵗不成則政事雖厚無自而施也故洪範於八政之下繼之以協用五紀者蓋所以正閏餘而成嵗功也四五紀者在九疇之序為四其疇曰五紀一曰嵗二曰月三曰日四曰星辰五曰歷數此五紀之目也謂之五紀者蓋以隂陽寒暑之氣運於冥冥之中其消息盈虛迭相推移而成四時其氣之往來終始不可得而知也故以夫歷象數可紀者而推之有象與數之可紀然後隂陽二氣可得而定故謂之五紀一曰嵗者蘇氏謂嵗星所次是也歲星日行千七百二十八分度之百四十五每歲歷一辰十二歲一周天者也二曰月者月行於天日十三度十九分度之七一月一周天者也三曰日者日之行於天日一度一歲而一周天者也四曰星辰者歲日月之所行也星者二十八宿東方角元氐房心尾箕七十五度南方井鬼栁星張翼軫一百二十度西方奎婁胃昴畢觜參八十度北方斗牛女虛危室壁九十八度四分度之一是也辰者日月所會之次其次十有二正月會于訾陬二月會于玄枵是也星辰之行與天左旋一日而一周一月而移一辰一歲而復初者也五曰歷數者推數於歷以候日月星辰之行度而定時成歲也唐一行大衍歷曰天數五地數五五位相得而各有合所以成變化而行鬼神也天數始於一地數始於二合二始以為剛柔天數終於九地數終於十合二終以成閏餘天數中於五地數中於六合二中以通律歷蓋歷之作必起於數數有常積自一二三四五推而衍之至於無窮則歲日月星辰之行度雖千歲之日可坐而致也夫洪範之為書包括天地人之理以為聖人治天下之大法其中無所不有大衍之數所謂天一至地十自一至五衍之為十有五又自六至十增而衍之為五十有五天地之數備其衍之至於無窮而歷法由此而積凡此數者皆繫於此五紀之中而諸儒乃於五行言之豈不悖哉故某欲以此數悉順之於五紀而於五行則不言數者此蓋箕子之本意也所謂五曰歷數歲也日也月也星辰也此四者其節各有盈縮進退遲速長短之不同故必以歷數而齊其行度然後各當其道而無差舛於其間故箕疇於此必曰協用者協之者其有所不齊與協時月正日之協同五紀協則百官皆得其職萬事各得其序而厚民之政於是而畢矣故先王之世必重其歷數之官者凡以其政事之所自出者也善乎程伊川之言曰古之時分職主事察天運以正四時遂居其方之官主其時之政在堯典謂之四嶽於周乃分為六卿之任統天下之治者也後世學其法者不知其道故以星歷為工技之事而與政分矣蓋歷數之學自後世而言之是特工技之事耳故太史公曰文史星歷近乎卜祝之間言主上以倡優蓄之非當世之所重也然以先王之時而言之則夫所以厚民政以建皇極者必本於此苟不本於此則皇極不可得而建也彼星歷之學不行於世徒為工技之事則是天人異用而定四時成歲之事遂與政分治歷明時之職寖輕則皇極之教亦復不明於世矣自秦漢以來英雄大度之主博學多識之臣有意於治者不為不少矣卒不能建皇極厚民政斂五福以錫庶民以所施者非彞倫之敘故也以星歷之一事而觀之則先王所以維持政教之具失其旨於後世者多矣無怪乎治效之不如古也五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎堯曰咨爾舜天之歷數在爾躬允執其中人君所以執中而立教以為蒸民之極必自夫歷數在躬之後蓋道之大原出于天歷數在躬然後性與天道合而為一髙明博厚悠久無疆與天地合其德故能不見而章不動而變無為而成此皇極之數所自立也是以洪範之書先五行次以五事者所以盡性踐形也自是而推之於八政五紀以和同天人之際然後繼之以皇極蓋聖人之教至是而後立也諸儒之説皆謂九疇之義統於皇極故漢孔氏謂皇極行九疇之義老蘇曰致至治總乎大法立大法本乎五行理五行則資乎五事正五事賴于皇極此其意蓋謂中者天下之本本立而道生况五疇之義必本於中某竊以此説為不然夫皇極在於五行五事八政五紀之後三德稽疑庶徵福極之前者此蓋其彞倫之序出於自然而不可易也九疇以序言序之先後各有定體設使聖人之意謂皇極行九疇之義理五行資乎五事正五事賴乎皇極則是九疇當先皇極矣今其彞倫之序先之以五行次之以五事次之以八政五紀然後及於皇極而説者乃謂皇極為九疇之主豈不謬哉為此説者徒以謂皇極之疇居五之中數也皇極居中可以包括上下此説尤不可取九疇以序而言不以數而言之皇極居之中數也則以謂皇極居中以包括上下信如此則五紀之數四以至於五行之數一三德之數六以至福極之數九必皆以數言也必皆有説也今於八者之數則皆無説而獨於皇極則繫之中數此蓋不通之論也而又有所甚不可者揚子雲作太玄其書由數而起自一衍之至於八十一故其圗起於中中為一元自一元衍而為三方自三方衍而為九州自九州衍而為二十七部自二十七部衍而為八十一家蓋以其體由中而起故也今洪範之序自初一曰五行順而陳之以至於次九曰嚮用五福威用六極苟以謂統於皇極則是其體當亦自中而起推而上之則自五紀而五行推而下之則自三德而福極彝倫之敘其不斁者幾希學者知洪範九疇之序出於自然而不可易則知皇極之疇不可不繫於五紀之後三德之前矣故諸儒之説未敢以為然也雖諸儒之説不敢以為然然其謂聖人之治天下必以大中為本此則不可易之論也但不可謂皇極為九疇之本耳洪範初一曰五行則聖人之治天下必以大中為本其理已見於此天命之謂性性者中之本體也洪範之於五行發明盡性之理已繫於此矣則聖人建大中以為治天下之本者既由是廣而充之至於五事敬八政農五紀協則治天下之規模法度畢備矣次五曰建用皇極者是推之以立教非謂聖人窮理盡性於喜怒哀樂未發之前也湯懋大德建中于民舜執兩端用中於民此皆建用皇極之事也五皇極者在九疇之序為五其疇曰皇極箕子之陳九疇其八疇皆詳言其所以為是疇者獨於皇極一疇不言其所以為皇極而遽言皇建其有極斂時五福用敷錫厥庶民者蓋自五行至五紀即聖人所以建皇極以教民者非是於數者之外别有皇極也自皇建其有極至於為天下王皆是聖人建極以教民之事其文比於諸疇最為詳備蓋聖人以先知覺後知以先覺覺後覺其致知格物正心誠意以修其身舉而措之以至於家齊國治天下平者盡在於此故箕子反覆為武王陳之其義無所不盡也皇極有二説先儒謂皇大也言大中之道也漢五行志曰皇君也極中也謂人君所建之中二説不同而某謂先儒之説為勝箕子之陳洪範蓋聖人所以為人君治天下之大法當如此自五行至五紀皆人君之急務也豈至於皇極言人君建其有中乎湯誥曰惟皇上帝降衷于民其皇字亦訓大不得以訓君皇建其有極亦猶是也中庸曰中者天下之大本此正皇極之義也惟中故大惟大故中張橫渠曰極其大而後中可求止其中而後大可有此言盡之矣不謂之大而謂之皇不謂之中而謂之極者何也莊子曰無門無旁四達皇皇皇也者大而無所不及之謂也北辰謂之北極極者居其所而衆星拱之謂也是極之為言立之於此四方之所取正焉者也自其本而言之則謂之大中自其推之以立教而言之則謂之皇極觀皇極二字則聖人所以教民之意可見矣皇建其有極而下惟敷繹此義而已夫天下不可以小治也竭太倉之粟不足以飽其飢殫內帑之帛不足以暖其寒聖人之治天下也固欲天下之大萬民之衆皆應天之五福然苟不知操之有要則不能治之必若人人而為之謀家家而為之慮何若而富夀何若而康寧何若而攸好德何若而考終命不惟其智有窮而力將不給矣吾將不殫其智力而綽然有餘裕者惟在於操之有要而已夫福極之在人各以類應作善降之百祥蓋善者百祥之類也作不善降之百殃蓋不善者百殃之類也夫惟禍福吉凶之於善惡各以類而相感後之人君惟能使民自嚮於善則天之百祥皆將以類而應斯民莫不各得其所欲而無有夭閼札瘥之病矣故皇建其有極是乃所以斂五福而錫之於民也蓋人君以皇極設教則民之過者不及者咸於君取中而皆自力於為善作善者百祥之所集也君建極於上則民皆則效於君而取中矣故曰惟時厥庶民于汝極錫汝保極謂其各正性命保合大和以丕應其上也凡厥庶民無有淫朋人無有比德則所謂錫汝保極也無淫朋無比德則能保其極矣惟皇上帝降𠂻于下民民之受𠂻于天初無以異也惟其因物有遷以陷溺其良心故相與為淫朋比德以失其所受於天之常性苟在上之人能建極以示之以先知覺後知以先覺覺後覺則斯民知自反於善則易直子諒之心油然而生相與勸勉同趨於忠信孝悌之域故其直己而行無有淫朋無有比德斯惟皇作極夫至於惟皇作極則君臣上下皆入於大中至正之域矣然所以使斯民惟皇作極者必有其道焉人之生也同稟此天命之性初未嘗有智愚賢不肖之分然其所稟受則有氣質之性存焉故論天命之性則凡受中於天者均一性也而論其氣質之性則有上智焉有下愚焉而於上智下愚之間乃有中人之性焉上焉不待文王而興上之人雖不設皇極以導之而能自入於善下焉者自暴自棄上之人雖設皇極以教之有所不從也則是皇極之所教者惟中人而已中人者可以語上亦可以語下也蓋使皇極之教修則世之中人皆可以進而為上智皇極之教不修則世之中人皆將流而為下愚故箕子將欲建皇極斂五福以錫庶民而使之惟皇作極則必因其性之有上中下之别各因其材而篤焉凡厥庶民有猷有為有守汝則念之此則豪傑之士無所待於教而自歸於皇極者也姑但念之而不忘而已謂無事於教也于其無好德汝雖錫之福其作汝用咎此則下愚之不移雖教之而不率誨爾諄諄聽我藐藐此皇極之所無可奈何者也故寧棄絶之而不教必欲盡而教之彼既不率徒為我之過咎而已上智之人既無事於教而下愚之人教之又有所不從則是皇極之所教者惟中人而已自不協于極不罹于咎至於時人斯其辜此皆所以教中人之道也不協于極言其所行猶未合於大中之道雖不合於大中之道而亦不至罹於過咎曽子固曰若狂也肆矜也亷愚也直之類此説是也狂也矜也愚也所謂不協于極也以其肆而不蕩廉而不忿戾直而不詐則所謂不罹于咎也不協于極不罹于咎而可以抑其過引其不及而歸之於中道故皇則受之皇大也曽子固曰大則受之言非小者之所能受也此説是也受之則必有以教之故繼之曰而康而色言當安汝之顔色以教之如詩所謂載色載笑匪怒伊教是也豫攸好德汝則錫之福謂中人之材雖不協于極苟知大中之為可慕則其好德之志形之於言雖未必有好德之實汝當無沮其好善之心錫之以福也先儒解則錫之福與下文汝雖錫之福皆以福為爵祿惟孫元忠則不然其説曰箕子之敘皇極其言錫福者有三焉始言斂時五福用敷錫厥庶民一也中言豫攸好德汝則錫之福二也末言于其無好德汝雖錫之福其作汝用咎三也先儒皆以福為爵祿又恐不然蓋皇極之道本以五福為用故凡言錫者皆五福之理也此説是也蓋皇極之所謂福與三德惟辟作福之福不同以三德推之非是也故凡皇極之所謂福者皆教之以大中之道大中之道五福之所由集也建極之君既而康而色以教之雖有其好德之言而未必有好德之實者皆錫之以福如此則天下之中人莫不心悅誠服而歸於大中至正之道故繼之曰時人斯其惟皇之極人既相與歸於大中至正之道則為之君者必有所抑揚去取以為之勸率苟其好德則不以其勢之煢獨而虐之苟其不好德則不以其勢之髙明而畏之煢獨者不虐髙明者不畏惟在於好德與不好德之分而已取舍既如是之審則好德者必見知於上故曰人之有能有為使羞其行而邦其昌言不協于極不罹于咎之中人苟能至於好德而有猷有為汝則當有以奬勸之使進其行於朝廷之上則邦家賴之其將至於昌盛矣其未能至於有猷有為者則必將有以為之勸率亦使之同趨於大中至正之域孟子曰無常産者無常心苟無常心放僻邪侈無不為己蓋無常心之人至於倉廪實而後知禮義衣食足而後知榮辱故在夫上之人有以飬其常心然後可以納之於善故曰凡厥正人既富方榖至時人斯其辜此蓋所以待無常心之人也謂凡厥正人之道必先有以富之然後可以驅而之善榖善也苟不有以富之使之守其常心而不忍為惡則其放僻邪侈無不為也好者與孟子所謂鄉黨皆好之好同猶言有所顧藉也夫皇極之所以待乎中才者其始終之間深思熟慮既如此其盡宜其中才之人無淫朋比德而趨於大中至正之道人有士君子之行以至於比屋可封也待之既如此其盡而猶有不入於善者則是自暴自棄而為下愚之不移是可以棄於罪戾之域而莫之恤蓋往者不追來者不拒如此而已矣是則皇極之教也箕子之陳皇極其發端有云皇建其有極斂時五福至惟皇作極總提皇極之大綱於上然後申其義於下也凡厥庶民有猷有為有守以下所以申皇建其有極至惟皇作極之義也蓋人之生雖稟於天之性而其所受之氣質則不無上智中人下愚之殊上智者無所事於教而下愚者教之有所不入則其教者惟中人而已既建皇極之教誘天下中人而納之於善則斯民必將無淫朋比德而同趨於公正之域而惟皇作極矣無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極自無偏無陂以至於歸其有極此所以申言凡厥庶民至惟皇作極之義也諸儒之説皆以此為人君之事故漢孔氏曰無偏無陂遵王之義者言當循先王之正義以治民無有作好遵王之道無有作惡遵王之路言必循先王之道路以至會其有極歸其有極言會其有中而行之則天下皆歸其有中矣諸家之説雖小有異同然大抵多謂人君建皇極當如此某竊謂不然夫洪範之書彞倫之始終莫不有先後自然之序政者正也其身不正雖令不從未有身之不正而能正人者故彞倫之序必先五行以盡性五事以踐形然後施於有政而建皇極焉此蓋己正而物自正非至於正物然後所以正己也如其皇極已建於上方議其偏陂反側而去之無乃倒行逆施而失其先後之序乎故自無偏無陂至歸其有極皆民之取正於君同趨於大中至正之域爾非人君所以建皇極之本也蓋人君所以正心誠意以修其身而建為皇極之本者則於五事既詳言之矣此皇極之所陳皆其設中以正教之事也故無偏無陂以下乃民之趨於皇極之道而不可以為君之事也學記之論學曰不陵節而施之謂孫雜施而不孫則壞亂而不修蓋人之學其進之必有其術不可驟而致也故孟子論浩然之氣至大至剛而其所以飬之者則以謂是集義所生非義襲而取之也蓋謂其飬之不可以無其序苟失其序於毫末之間則為陵節而雜施壞亂不修矣故聖人建皇極以教民而民之趨於皇極者必有其序焉惟皇上帝降衷于民民之所以稟受於天者莫不有皇極之道惟其因物有遷梏於蕞爾形體之微故小己自私至於偏陂反側而失其所以固有之中流於物欲而不能自反人君既已建皇極於上使民皆知大中之道本於天性之所固有而去其所謂偏陂反側者則大中之道將卓然而自存矣偏者不平之謂也陂者不正之謂也既不平又不正則大中之道汨沒而不存今也大中之道既明於上則民將去其不平不正而遵王之義焉苟知義之為可遵則可與入德矣故遵王之義者皇極之門也由此而進之遂至於無有作好遵王之道無有作惡遵王之路蓋惟仁者能好人能惡人好惡者人之常情所不能無也惟不可以有作作好作惡是其私好惡也既遵王之義則廣而充之遂能去其好惡之私而遵王之道路焉孔子曰行義以達其道韓愈曰行而宜之之謂義由是而之焉之謂道由是義然後可以至於道也路亦道也曽子固曰道路云者異辭也此説為善陂舊作頗字唐明皇以協韻改為詖字蓋此數句雖書之所載其實詩之體存焉古人於韻語各取其聲之協不必盡有其義觀三百篇之所言蓋可見矣故無有作好遵王之道無有作惡遵王之路蓋道字與好字相協惡字與路字相協各取其聲律之便而已不必從而為之説也遵王之義遵王之路必皆以其遵為言遵也者自外入之辭也有所遵則將有所從違出入於其間而未可以常也由此而繼之則無所事於遵而自合於王道矣故繼之曰無偏無黨王道蕩蕩無黨無偏王道平平蕩蕩者廣大也平平者夷易也蕩蕩者所謂魯道有蕩平平者猶所謂周道如砥偏謂偏於己黨謂黨於人於己無偏則所以待人者無黨無偏無黨則見夫王道之蕩蕩其行也無陜隘焉於人無黨則在己者終得以無偏無黨無偏則見夫王道之平平其行也無險阻焉蕩蕩平平亦異辭也既無黨無偏又由此而進之行之以勇守之以誠則將至於無所迂回以見夫王道之正直正直者大中之體也至於王道正直則斯能惟皇作極而淫朋比德於是乎盡去矣故能會其有極歸其有極也曽子固曰會者來而赴乎中也歸者往而返乎中也此説善蓋如人之行役也其出而有所趨則謂之赴如春秋凡書公會于某者是也其入而有所反則謂之歸如春秋凡書公至自某者是也會其有極歸其有極則凡出入往返之間無非中道而顛沛造次未嘗違焉此所謂無所不用其極也民之所以能無所不用其極以為之君者能建之於上有所建於上則民之所會而歸焉此理之必然也孔子曰為政以德譬如北辰居其所而衆星拱之蓋建極者如北辰之居所而會其有極歸其有極者則如衆星之拱北辰也曰皇極之敷言是彞是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王自無偏無陂至於歸其有極其所以循循然善誘以訓致其民於太平至和之域者可謂曲盡其道然豈人君設為私意所能然哉其所施設皆本於天理之自然故於此又推本而言之語既更端故加曰字以别之蓋所以總結乎上文也言人君建皇極敷而為言以教人凡所以順帝之則而已民以是順而為言以胥告戒者皆所以儀刑於上之德此所以語上焉可以為天之子下焉可以為民之父母而為天下王也范內翰曰君以大中之道形於言守之足以為彞推之足以為訓著為典則而不易是彞也發號施令下告於庶民使無淫朋比德是訓也然而為此者所以訓于帝而已上帝降衷于下民無非中也天以是而錫聖人聖人以是而錫民凡厥庶民之陳於言或父之詔子兄之教弟朝夕謦咳之間是民之訓也以至于慈孝友順蹈履出處語默之際無非中民之行也中無間於聖賢愚夫愚婦之别苟適於中雖去聖人千萬里之逺其近於光華者如威顔咫尺而已君臣之相與者不過於中君以皇極而是彞是訓則民以皇極而是訓是行以近天子之光是以天子作民父母以為天下王夫天生蒸民而立之君使司牧之勿使失性豈其欲一人肆於民上而棄天地之性哉所以為民父母而為天下之君者要將以中教民使歸於中而已此説為善王氏之説其言曰有極之所在吾安所取正取正於天而已我取正於天則民取正於我道之本出於天其在我為德皇極我與庶民所同然也故我訓于帝則民訓于我矣此論比於范説為長學者當深考之大抵此一段總結皇極之道故推原其本而要其成必言君之所以建極者凡所以訓于天而已所謂天者豈蒼蒼之謂哉亦本於天命之性而已五行是也達夫天命之性推而行之無非道也庶民之所取正者在此而已詩曰上天之載無聲無臭儀刑文王萬邦作孚此之謂也尚書全解卷二十四
