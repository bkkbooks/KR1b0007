body:
  text: 尚書全解卷二宋林之竒撰舜典虞書堯典舜典皆虞書也堯典序云昔在帝堯聦明大思光宅天下將遜于位譲于虞舜作堯典舜典序言虞舜側㣲堯聞之聦明將使嗣位歴試諸難作舜典考其文意若終始相因之辭也葢堯典終於四岳薦舜堯妻之二女將授以天下接於舜典歴試諸難以受堯之禪故其序如此虞舜側㣲堯聞之聦明將使嗣位歴試諸難作舜典舜典側㣲者孔氏云不在朝廷謂之側其人貧賤謂之㣲孟子曰舜居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希又曰舜之飯糗茹草若將終身焉以是觀之則知舜之其居側其人㣲一匹夫耳而史記案世本帝系以為堯與舜同出於黄帝黄帝生顓頊顓頊生窮蟬窮蟬生敬康敬康生勾望勾望生蟜牛蟜牛生瞽瞍瞽瞍生舜如此則舜者黄帝之八代孫葢帝之族姓也豈有帝之族姓而謂之側㣲者哉左氏傳載史趙之言曰自幕至於瞽瞍無違命舜重之以明徳寘徳於遂遂世守之信斯言也則是自督瞍而上皆有國邑以相傳襲尤不可謂之側㣲也故當以孟子及書序之言為證歴試諸難者自舜典而下是也舜之釐降二女事之至難莫難於此堯將授以天下固斷然無疑矣而將協天人之望故歴試焉曰若稽古帝舜曰重華協于帝堯典曰光被四表格于上下舜典曰重華協于帝二典相因而成書也葢堯舜之徳充實輝光之徳充塞乎天地之間初無異也而史官欲經緯錯綜以成文體故於堯典先言欽明文思安安允恭克讓而後言光被四表格於上下葢言堯有如是之徳故能有如是之輝光也舜典先言重華協于帝而後言濬哲文明葢言所以有如是之輝光也以其有如是之徳也是皆錯綜其體以成文以見堯舜一道非善形容聖人之徳美者豈足及此也濬哲文明温恭允塞程氏曰濬深宏也哲睿知也文文章也明聦明也温粹和也恭恭欽也允信義也塞充實也凡論聖人者必取其徳之焕發者而稱之隨其所取不必同也故堯曰欽明文思夫子温良恭儉讓要之皆是聖人之徳美也稱之所以見其為聖譬如論玉之美者或取其色之温潤或取其質之堅正要之舉其一則知其為寳矣此說甚善而王氏以謂堯曰欽明文思者成徳之序也舜曰濬哲文明温恭允塞者修為之序也故於堯則言性之所有於舜則言學以成之此鑿說也據龜山李校書已言其非矣𤣥徳升聞乃命以位父頑母嚚象傲克諧以孝烝烝乂不格姦此所謂𤣥徳也岳曰有鰥在下曰虞舜帝曰俞予聞如何此所謂升聞也自慎徽五典而下是所謂乃命以位也孔氏曰𤣥謂幽濳濳行道徳升聞天朝遂見徴用葢謂修之於此而升聞於彼也莊子曰以此處上聖王天子之徳也以此處下元聖素王之道也亢倉子曰舜之徳之盛為天下君善事父母所致也劉晏曰舜耕而田者相遜釣而漁者相與當是時口不設言手不指麾執𤣥徳於心而化馳若神此皆𤣥徳之證也慎徽五典五典克從納于百揆百揆時叙賔于四門四門穆穆納于大麓烈風雷雨弗迷伏生以舜典合於堯典慎徽五典而下合於堯典帝曰欽哉之文共為一篇至孔安國纂壁中書始釐而為二加乃命以位上二十八字由是始為二篇雖釐為二篇然慎徽五典之文與帝曰欽哉之文辭意相接其實一篇也故序言歴試諸難篇中言乃命以位葢堯試舜以難事凡歴數職皆能其官也慎徽五典司徒之事也為司徒而慎徽五典則五典克從宅百揆奮庸熙載之任也使揆度百事而百事莫不時序賔于四門使典領方岳諸侯之事四岳之職也賔諸侯于四方之門而四方諸侯來朝者莫不和睦如詩所謂有來雍雍至止肅肅是也凡此所謂使之主事而事治也納于大麓所謂薦之於天是也烈風雷雨弗迷所謂使之主祭而百神享之是也孔氏曰麓録也納舜使大録萬機之政此說不然周官曰唐虞稽古建官惟百内有百揆四岳則是當堯之時官無尊於百揆者大録萬機之政非百揆而何既已納于百揆矣又納于大麓必無此理說者以謂麓地名也即禹貢所謂大陸既作也又說者以謂麓泰山之足若梁父之類然經無明文不可得而見據上文慎徽五典而下既是主事而事治此必是主祭之事但不知大麓之祭果何祭也王氏云古者易姓告代必無是理要之世代緜逺大麓之地與夫祭於大麓皆不可考惟孟子使之主祭之言為可憑爾烈風雷雨弗迷有二說孔氏謂隂陽和風雨時各以其節無有迷錯愆伏王氏因之遂以謂風之烈而雷雨弗迷者則隂陽不失序可知矣太史公以謂山林川澤烈風雷雨舜行不迷而蘇氏因之遂以為洪水為患使舜入山林相視原隰雷雨大至衆懼失常而舜不迷其度量有絶人者天地鬼神亦或有以相之與此二說不同太史公之言渉於神怪然而以理揆之亦有未安夫自慎徽五典而下皆試舜之事則納于大麓者是亦將試之試之時使入山林川澤安知天之必有烈風雷雨而視其迷與不迷乎孔氏謂隂陽和風雨時則合乎百神之說但既曰隂陽和風雨時則不應又有烈風雷雨也程氏曰無烈風雷雨之迷錯其辭亦不順惟孫博士推廣王氏之說曰上天之載無聲無臭所可推者隂陽之氣矣隂陽以散而生風至於烈風則隂陽之極也隂陽薄而成雷隂陽亨而成雨雷雨則隂陽相成之極也隂陽之極多迷而不復常則為物之害聖人在上徳足以當天心雖風之烈而雷雨不至於迷而害物則隂陽之不失其序此說粗通矣帝曰格汝舜詢事考言乃言厎可績三載汝陟帝位舜讓于徳弗嗣既以歴試諸難薦之於天而天受之暴之於民而民受之矣於是攝行天子之事而陟帝位者焉故且曰格汝舜格來也猶云來汝說也詢事考言乃言厎可績三載孔氏云汝言致可以立功三年矣薛氏言舜之始見堯也必有以論天下之事其措置當爾而其成當如何者三年而其言驗乃致其功葢唐虞官人之法必先察其言然後考其成功之稱否而加黜陟焉此所謂敷奏以言明試以功車服以庸是也曽氏謂以事考言之道以理言之則厎可以效言之則考不害績績不害考此說雖然非書之意也詢事考言底可績猶行之必可言言之必可行豈有考與績之異哉王氏云譲于徳者有徳之人也弗嗣弗肯陟帝位以嗣堯也葢以舜之命禹宅百揆而禹譲于稷契臯陶命垂作共工而垂譲殳斨伯與命益作朕虞而益讓朱虎熊羆命伯夷典禮而伯夷譲于夔龍葢濟濟相譲者唐虞之風也正月上日受終于文祖舜既不獲讓矣故於是以正月上日受終于文祖攝行天子之事也上日孔氏以謂朔日王氏謂上旬之日曽氏云所謂上辛上丁上戊之類此二說不同據下文月正元日舜格于文祖大禹謨言正月朔旦受命于神宗則此上日宜為朔旦特史官變其辭而云爾猶正月朝㑹謂之元㑹元㑹亦朔日也豈有受命于神宗獨用朔日而受終于文祖獨不用朔日乎然月令仲春之月擇元日命民社則元日亦不必為朔日也元日既不必為朔日則上日亦不必為上旬之日也曽氏以謂舜之受終其日不可以不卜卜之而朔日不吉則用上旬之日下言用朔日葢朔既吉不須用他日此說雖長然而世代久逺時日之詳不可得而考曽氏之說亦不敢以為必然之論受終于文祖者舜受堯之禪終于文祖之廟也受終而不言舜者蒙上之文也王氏徒見此文不加舜字遂以謂堯受終于文祖李校書云信如王氏之說則下文在璿璣玉衡以齊七政亦當屬之堯矣孟子曰堯老而舜攝也又曰舜相堯二十有八載始堯命舜云汝陟帝位而又言受終于文祖則是自此以後堯不復有庶政矣此論是也文祖者堯之太祖也薛氏云受天下於人必告於其人之所從受者此論當矣然而所祖之人不可得而知也祭法曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯舜典大禹謨皆虞書也既是虞書則所稱祖宗必自虞世言之神宗即堯也神宗為堯則文祖亦可指為顓頊然而去古逺矣不可以為必然之論唐孔氏云堯之文祖不可強言此亦慎言闕疑之義先儒忠厚葢見於此在璿璣玉衡以齊七政在者察也葢與平在朔易之在同璿璣玉衡漢孔氏傳云王者正天文之器可運轉者正後世之渾儀也璿璣者以璿為璣也玉衡者以玉為衡也璣徑八尺圓周二大五尺象天可以運轉也玉衡横簫也長八尺孔徑一寸下端望之以視星辰葢懸璣以象天而衡望之轉璣窺衡以知星宿曽氏云歩七政之軌度時數而以轉璣窺衡兩不差焉故曰齊其不齊者為陵歴鬬食盈縮犯守者也葢璣衡之所見者皆其軌度時數之當然不如璣衡則為變異此說是也渾儀自漢以來相承用之以至於今實唐虞之遺法也沈存中云天文象有渾儀測天之器置於崇徳以候垂象葢古之璣衡也熙寧中予受詔典歴官考察星歴以璣衡求極星初夜在窺管中少時復出窺管候之凡歴三月極星方常循窺管之中夜夜不差窺管即玉衡也璿孔氏云美玉也王氏云美珠謂之璿唐孔氏從先儒之說以璿為美玉則從左傳瓊弁玉纓為證孫氏從王氏之說以璿為寶珠引列子有玉者方流有珠者圜折之言古詩云玉水記方流璿源載圜折穆天子傳云天子之寳璿珠以是璿為美珠此說不同然後世之渾儀既不用珠玉而用銅為之則古之璿璣或以玉為之或綴珠於其上皆不可得而知孔氏云舜察天文齊七政以審已當天心與否此說不然夫舜既受堯之終于文祖之廟矣乃始在璿璣玉衡以齊七政以審已之當天心與否使其七政有失度則將奈何古之人授受之義自不然也使其不當天心不符人望則不授之而已既已授之而方且察天心之當否進退無所據矣孔氏於烈風雷雨弗迷下注云明舜徳之合於天心則是舜未受終以前已當天心矣至此又曰審已當天心與否其說亦自相違戾舜之受終則在璿璣玉衡以齊七政者葢既攝帝位則將廵狩於方岳以考制度協時月正日同律度量衡也七政者日月五星也堯之歴象日月星辰命羲和之四子方且考四方之中星而已至舜考察日月之行加之以五緯之躔度然後其法加宻也日行一度月行十三度十九分度之七嵗星日行千七百二十八分度之百四十五熒惑星日行一萬三千八百二十四分度之七千二百五十五太白辰星日各行一度鎮星日行四千三百二十分度之百四十五惟其七政之躔度其多寡長短之不同如此故必以璿璣玉衡然後立法無差忒矣而王氏云堯典言歴象舜典言璣衡璣衡者器也堯典言日月星辰此言七政七政者事也堯典所言者皆道也於此所言皆器也事也此說殊不然夫堯典所謂歴象即舜典之所謂璣衡也舜典所謂七政即堯典所謂日月星辰皆在其中矣豈有道與器與事之異哉肆類于上帝禋于六宗望于山川徧于羣神肆遂也程氏云猶後世作文者言於是也類于上帝禋于六宗望于山川徧于羣神皆以攝位告也類者孔氏云攝位事類其說不然周禮肆師類造上帝注云類祈因郊祀而為之葢郊祀者祭昊天之常祭也非常祭而祭告於天則其禮依郊祀而為之故謂之類武王伐商類于上帝王制曰天子將出類于上帝皆非常祭是也謂之類上帝者孔氏云以攝位告天及五帝葢五天之說起於漢而出於緯書詳於鄭康成康成之說曰昊天上帝天皇大帝北辰之星也五帝五行精氣之神也東方青帝靈威仰南方赤帝赤熛怒中央黄帝含樞紐西方白帝白招拒北方黒帝叶光紀孔氏謂告天及五帝皆本於此而王肅諸儒皆以為不然王肅之言是也士無二王家無二主尊無二上天即帝也帝即天也二猶不可况於五乎天蒼蒼而在上不可得而名言也自其形體而言之則謂之天自其主宰而言之則謂之帝其實一也必欲指其孰為天孰為帝抑何不思之甚也然而有曰昊天上帝又有曰五帝五帝者趙伯循曰凡帝必及於五帝者五帝之功多遂為五方之主即月令其帝太皡等是也以其功高故歴代肈於四郊而祀之次於天帝此說甚是類于上帝但謂攝位告天矣而曰告天及五帝此皆漢儒之失禋于六宗禋者精意以享之之謂也六宗先儒有九說孔氏曰四時也寒暑也日月也星辰也水旱也而歐陽大小夏侯皆云上不謂天下不謂地旁不謂四方在六者之間助隂陽變化實一而名六宗孔光劉歆謂乾坤六子水火雷風山澤也賈逵以謂天宗日月星辰地宗河海岱馬融曰天地四時鄭𤣥以謂星辰司中司命風師雨師司馬彪謂天宗日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗四時五帝之屬其說近於馬融而孟康謂天地閒遊神也紛紛異同幾於聚訟惟張髦謂三昭三穆學者多從其說王氏程氏亦皆從之而二蘇獨取於孔氏而為之說曰謂古者郊祭天地必及於天地間所謂尊神者此禋于六宗望于山川徧于羣神葢與類于上帝為一禮耳祭法曰燔柴於泰壇祭天也瘞埋於泰折祭地也則此所謂類于上帝者也埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也則此所謂禋于六宗也四坎壇祭四方也山林川谷邱陵能出雲為風雨見怪物皆曰神有天下者祭百神此所謂望于山川徧于羣神也祭法所叙郊祀天地從祀諸神之壇位者舜典之章句義䟽也此說為得之而謂從祀天地諸神之壇位則不然夫舜之以攝位告是亦即其常事而告耳若以謂從祀天地則泰壇坎壇之類皆當合為一處恐無是理也三昭三穆然愚亦知其不然者葢七世之廟自太祖而下謂之六宗則不可古者祖有功宗有徳必有徳者而宗之如云周之六宗是也若以三昭三穆為六宗則七世之廟皆宗古無是理也而蘇氏謂受終之初既有事于文祖其勢必及餘廟豈有獨祭文祖於齊七政之前而祭餘廟於類上帝之後者乎以此觀之則張髦之說雖近似不可從也望于山川徧于羣神孔氏云九州名山大川五岳四瀆之屬皆一時望祭之羣神謂邱陵墳衍古之聖賢皆祭之此亦本於祭法而為之說也輯五瑞歛五等諸侯之瑞也案周禮玉人云天子執瑁圭以朝諸侯鄭康成云名玉曰冒者言徳能覆葢天下也諸侯始受命天子錫以命圭圭頭斜銳其冒當下斜刻之其刻長短廣狹如圭頭諸侯來朝以圭授天子天子以圭冒之刻處冒此圭頭其小大相當則是本所賜其有不同則圭是偽作以是知諸侯信與不信猶今之合符也又曰天子以瑁冒天下之圭則與公侯伯之圭等也此瑁惟冒圭耳不得冒璧璧亦稱瑞不知所以齊信此說為盡舜既居攝輯諸侯所執之瑞以冒之驗其信偽為之更始也既月乃日覲四岳羣牧既月盡二月也程氏云既月則四方諸侯至矣逺近不同來者有先後故以既月而日日見之非如常朝㑹期於一日也此論甚當四岳則盡率方岳之諸侯羣牧則各率其方之諸侯以從四岳猶康王之誥云太保率西方諸侯入應門左畢公率東方諸侯入應門右葢於是始見四方之諸侯也班瑞于羣后言既已合符矣於是頒而還之使歸其國也唐孔氏謂此瑞本受于堯歛而又還之若言舜新付之今為舜臣與之正新君之始此說固是然謂與之正始則可與之正新君之始則不可咸邱蒙曰舜南面而立堯率諸侯北面而朝之孟子曰此非君子之言齊東野人之語也堯老而舜攝也舜典曰二十有八載放勲乃殂落百姓如喪考妣三載四海遏宻八音孔子曰天無二日民無二王舜既為天子矣又率天下諸侯以為堯三年喪是二天子矣葢舜雖受終于文祖其實攝行天子之事未嘗正名以為新君使舜正名以為新君諸侯皆改為舜臣則將何以處堯乎孔氏此言正齊東野人之語嵗二月東巡守孔氏云既頒瑞之明月乃東廵此說不然據上文云正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望于山川徧于羣神輯五瑞而後曰既月乃日覲四岳羣牧頒瑞于羣后則是覲岳牧而頒瑞者二月之事也孔氏於覲岳牧頒瑞以為盡正月内故以此既頒瑞之明月夫苟頒瑞果在正月中則其文當與輯五瑞相接何須更加既月乃三字曽氏知其說不通遂為之說曰覲岳牧頒瑞二月之事也而此須言正月者正朔三而改堯正丑舜正子舜未改堯正則載二月者正之二月也猶周官凌人言正嵗十有二月同意此說雖順經文然改正朔之事出於周時唐虞夏之世惟以建寅為正非有嵗與年之異若周禮之所言也曾氏之說亦不可為據竊謂嵗二月者來嵗之二月故加嵗一字於其中葢前一年羣后來朝故至明年舜乃廵狩考制度于四岳非與覲岳牧頒瑞同在一年之中嵗二月東廵狩狩者廵諸侯之所守也必以嵗二月東廵者朱博士曰天子廵守必順隂陽之氣以出入春則之乎東夏則之乎南秋則之乎西冬則之乎北而又以地言之自東祖南自南徂西自西徂北然後自北而歸京師亦其理也此說盡之至于岱宗柴望秩于山川岱者東岳泰山之别名也以其為四岳之長故謂之曰岱宗柴者燔柴祭天以告至也既柴而望秩其序然也時邁之詩曰廵狩告祭柴望也葢廵狩之禮如此望秩于山川者望于山川而必秩之者葢有當祭而不祭者有不當祭而祭者與其品位之高下牲禮之厚薄莫不各得其所也肆覲東后協時月正日肆與肆類于上帝之肆同葢於是始見東方之諸侯也協時月正日同律度量衡者葢所以考制度也漢孔氏曰合四時之氣節月之大小日之甲乙使齊一也此說為備而唐孔氏所說甚略曽氏之說尤詳可以補正義之未備者曽氏曰治歴之法協時月為最難又曰三百六十當期之日然時之為九十日常有餘故四時之周三百六十五日四分日之一則常期為有餘月之為三十日常不足故月一小一大而十有二月或但三百五十四日而已則常期為不足四時常期為有餘十有二月常期為不足故協之為難審也如此并時之有餘月之不足而協之故十九年而七閏謂之章二十七章謂之㑹三㑹謂之統三統合為一元時首月者也月首朔者也時月之朔由章㑹至於統元則至與朔合焉此之謂協時月時月既協則日不可不正葢日在天為度在歴為日則時月由此積焉故正之此說為盡舜之廵狩也必協時月正日者春秋左氏傳曰天子有日官諸侯有日御日官居卿以眂日禮也日御不失日以受百官於朝葢古者天子諸侯國皆有掌歴之官天子歴官主頒朔於諸侯若堯之命羲和四子是也諸侯之歴則不得自為歴必受歴於天子之國以其歴頒授於萬民堯既命羲和四子定閏餘而四時成嵗矣故舜之居攝則廵狩而考制度於四岳考制度而先言協時月正日者懼時月之有差也周室衰廵狩之禮不講天子不頒歴於諸侯諸侯亦自為歴哀公十二年十一月朔日有食之於是辰在申司歴過也再失閏矣明年春無氷杜元凱曰欲置兩閏以應天正故正月建子無氷為災夫周不頒歴而魯自為歴當其無也則至再失閏及其有也則欲置両閏以求合舜之考制度而先協時月正日者葢慮此也同律度量衡律者十二律也六律黄鍾太蔟姑洗為陽𬎼賔夷則無射為隂六吕大吕夾鍾中吕為陽林鍾南吕應鍾為隂十二月之氣同類娶妻隔八生子黄鍾生林鍾林鍾生太蔟太蔟生南吕南吕生姑洗姑洗生應鍾應鍾生𬎼賔𬎼賔生大吕大吕生夷則夷則生夾鍾夾鍾生無射無射生中吕十二律既備文之以五聲播之以八音而樂成焉度者所以度長短也千二百黍為分十分為寸十寸為尺十尺為丈十丈為引謂之五度量者所以量多寡也千二百黍為龠十龠為合十合為升十升為斗十斗為斛謂之五量衡者所以知輕重也千二百黍重十二銖二十四銖為兩十六兩為斤三十斤為鈞四鈞為石謂之五權同律度量衡者所以齊民信也老蘇權衡論云先王欲杜天下之欺也為之度以一天下之長短為之量以齊天下之多寡為之權衡以信天下之輕重故度量權衡法必資之官而後天下同今也庶民之家刻木比竹繩絲槌石以為之富商大賈内以大出以小齊人適楚不知其孰為斗孰為斛持東家之尺而較之西鄰則若十指然以此觀之則舜之同律度量衡其急務也夫命羲和四子歴象日月星辰敬授人時至舜廵守考制度于四岳而又加之以同律度量衡者班孟堅律歴志云推歴生律制器規圜矩方權重衡平準繩嘉量探賾索隠鈎深致逺莫不用焉葢律歴之法同起於數洛下閎曰律容一龠積八十一寸則一日之分也以是知律歴皆自數而起既自數而起故度起於黄鍾之長量起於黄鍾之龠衡起於黄鍾之重由衡生規由規生矩由矩生繩由繩生準而天下制度舉不出於此矣堯歴象之時制度已備舜之時不過同之協之而已以此觀之則四岳為羲和之四子信矣修五禮五禮者吉凶軍賔嘉也唐孔氏謂歴驗此經亦有五事類于上帝者吉也百姓如喪考妣凶也羣后四朝賔也大禹謨云禹徂征軍也堯典云女于時嘉也其意葢謂當堯之時此五禮已備亦不必如此分別也要之人之交接不出於五者而已上言同律度量衡此言修五禮者葢禮樂征伐自天子出故也伊川云正五等諸侯之秩序制度之等差是修五禮也五等之制古有之矣防其差亂故廵守所至必修明也正其五等制度并其君臣所執圭幣皆使合禮也五玉三帛二生一死贄如五器卒乃復五玉五等諸侯所執之圭璧也孔氏以五玉連上修五禮之文故唐孔氏謂不言修者蒙上之修字也此說不然夫禮固有因革損益謂之修可也五等諸侯執圭璧來朝方岳之下不過正品秩而已何修之有張横渠以修五禮為一句五玉三帛二生一死贄為一句葢得之矣案周禮公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧其短長之數皆如其命桓圭長九寸信圭躬圭長七寸穀璧蒲璧皆徑五寸此之謂五玉三帛孔氏謂諸侯世子執纁公之孤執𤣥附庸之君執黄案周禮典命諸侯適子未誓於天子則以皮帛繼子男之下公之孤四命以皮帛眂小國之君據此文但有諸侯世子公之孤執帛之文而不言其色至於附庸之君所執則全不見於經而孔氏云爾者孔氏采摭羣言古人忠厚信以傳信疑以傳疑彼其於三帛斷然明言所執之人與其色其與卿執羔大夫執鴈士執雉同稱略不致疑於其間必有所據而云耳鄭氏謂三帛者薦玉也必致三者之帛高陽氏之後用赤繒高辛氏之後用黒缯其餘諸侯用白繒此臆說也夫既已言五等諸侯所執圭璧於其上而又言薦玉帛於其下文豈不重複也曽氏以為皮帛羔帛鴈帛其說皆不通二生者卿執羔大夫執鴈是也一死者士執雉也自五玉至於一死贄皆其所贄之物量其貴賤輕重以寓其等差而已非有義理於其間王氏曲生義訓皆從而為之辭穿鑿為甚如此等說皆無取焉三帛二生一死贄則受之惟五玉則禮畢而復還之者聘義云以圭璋聘重禮也巳聘而還圭璋此輕財而重禮之義也五器卒乃復亦猶是也而王氏謂諸侯有不能臣之義復之所以賔之也其說非也有曰五瑞有曰五玉有曰五器其實一也葢史官之變文也五月南廵守至于南岳如岱禮八月西廵守至于西岳如初十有一月朔巡守至于北岳如西禮歸格于藝祖用特岱宗禮畢則南廵守以五月至于南岳其柴望秩于山川以下皆如岱宗之禮八月西廵十有一月朔廵禮亦皆然曰岱禮曰西禮曰如初皆史官之變文也北岳禮畢然後歸於京師葢一嵗而廵四岳也胡舍人則疑之以謂計其地理考其日程豈有萬乗之尊六軍之衛百官之富一嵗而周萬五千里哉此說殊不然叔恬問於文中子曰舜一嵗而廵守四岳國不費而民不勞何也文中子曰儀衛少而徵求寡也夫惟儀衛少而徵求寡故國不費而民不勞元朔六年冬十月勤兵十餘萬北廵朔方東望緱山登中岳少室東廵海上還封泰山禪梁父復之海上並海北之碣石歴西朔方九原以五月至於甘泉周萬八千里夫武帝儀衛可謂多矣徵求可謂衆矣尚能八月之間周歴萬八千里而舜則儀衛少而徵求寡豈不能周歴萬五千里乎胡氏之說不可為據既廵四岳而歸於是告祭于藝祖之廟藝祖即文祖也或曰藝祖或曰文祖特史官之變文也春秋桓二年公及戎盟于唐冬公至自唐左氏曰告於廟也凡公行告於宗廟反行飲至舎爵䇿勲禮也歸格于藝祖用特則是禮也用特者用特牛以祭也薛氏云格廟用特其禮儉也廟禮從儉制度可知矣必儉其用度而後可以廵守此說為善據此云廵守四岳既畢然後歸格于藝祖用特則是一年而周四岳然後歸也鄭氏以孟月禮畢而歸仲月復徃夫一年而廵四岳胡舍人尚計其地理考其日程而謂不能周歴萬五千里若廵一岳歸至於仲月復徃則一嵗間周數萬里此必無之理也五載一廵守羣后四朝敷奏以言明試以功車服以庸孔氏云各㑹朝於方岳之下凡四處故曰四朝此說不然諸侯朝於方岳之下於上文肆覲東后如岱禮如初如西禮已備言之矣不應於此又言之也鄭氏云廵守之年諸侯來朝於方岳之下其間四年則四方諸侯分來朝京師此說乃得之周官之六年五服一朝又六年王乃時廵考制度于四岳諸侯各朝于方岳大明黜陟此則唐虞之禮也但其年嵗久近之不同耳胡氏既疑舜之時不能一載而廵四岳遂以五載而廵守謂一年而東一年而南一年而西一年而北此羣后所以四朝也五載之中一嵗息駕行李往來之費皆可備也信如此說則是諸侯惟朝天子於方岳之下而未嘗朝於京師也必無是理五載一廵守葢言廵守於方岳之下以協時月正日同律度量衡以至於如五器卒乃復之事而諸侯來朝京師則有此敷奏以言明試以功車服以庸之三事也葢諸侯來朝則訪問之使陳其言既言之矣則明試其言以考其功功之既著者則庸之以車服此但不止一時之事一人之身於其來朝敷奏以言使試其功便庸以車服葢待之以嵗月之久則其未來朝也敷奏以言其既來朝也則或考其功功之有效者則旌其車服葢是緫衆諸侯而言之於朝有此三者之事也庸與格則承之庸之庸同葢言通用之也采菽之詩曰君子來朝何以予之雖無予之路車乗馬又何予之𤣥衮及黼此車服以庸之事也而王氏必以周官六功之說於放勲則引王功曰勲於此則引民功曰庸夫六功之說出於周官以是而見於堯典舜典之言非正義矣至知其說不通則迂濶而求合於放勲則曰功嚮於王於此則曰六功皆曰上之所報以民功為主薛氏所謂人本無病病從藥生此類是也然唐虞之用刑賞有黜陟謂之明試以功是有其效也若其幽而宜黜者鮮矣罰不足道也以舜之三考黜陟而分北之止於三苖而已則宜黜者少於此可見此說為美傳曰堯舜臨民有五葢言唐虞之治惟此五者為臨民之政所謂五者五載一廵守羣后四朝之謂也葢苟以封建為國則廵守朝覲之時不可以不嚴舜五載一周四岳覲諸侯考制度定禮樂以一四方之視聽其間四年則使四方之諸侯分來朝於京師考試其言行而黜陟之於是諸侯皆奉天子之政令莫敢有異議者兹其所以為唐虞之治也及成周之時設官分職雖號祖述唐虞然而王乃時廵考制度于四岳則其法已不如唐虞之宻東遷之後此禮皆廢天子不廵守諸侯不朝覲於是強陵弱衆暴寡大併小而周道陵夷不可復振論者不探其本如栁子厚則以封建為不可行此葢未嘗深考唐虞致治之績也肇十有二州典之所載雖紀舜事而先後不以相屬此又言舜既使禹治水之後更定疆界分天下為十二州也十二州者於九州之地擇其疆理闊逺者又増置三州三州先儒謂舜分冀州為幽州并州分青州為營州葢周禮職方氏載九州有并幽而無徐梁爾雅載九州無梁青而有幽營先儒於此三者參較禹貢而於九州之外又得三州焉曰幽曰并曰營故遂以此充為十二州然而世代久逺是非不可得而知馬融云舜以冀州之地廣大分置并州燕齊遼逺分燕置幽州分齊置營州此說雖善亦是本職方氏爾雅而為之說未必有據然或近之矣封十有二山濬川孔氏云每州之名山殊大者以為其州之鎮封大也據左氏傳云封豕長蛇則封固可以訓大也周禮職方氏每州皆取其大者以為鎮若揚州山鎮曰會稽荆州山鎮曰衡山之類耳先儒之說未為無據然封十有二山而言大十有二山則其為文不順據左氏傳曰將善是封殖易曰不封不殖則封之為言封殖之謂也葢洪水既平之後封殖其山而加樹藝焉謂之封殖者非必於每州封一山之最大者凡十有二州之山皆封殖之如九山刋旅者謂凡九州之山皆得刋木而旅祭也濬川者洪水既平不可以不時而䟽導之也唐孔氏謂禹之治水通鯀為十三載則舜攝位元年九州始畢當是二年之後始封為十二州也竊謂去古已逺時月之詳不可得而考然學者於聖人之經但求其意而已至於時月則不可設為一定之論如禹之治水其時月最難考信洪範曰鯀則殛死禹乃嗣興左傳云舜之罪也殛鯀其舉也興禹又曰鯀殛而禹興祭法曰鯀鄣洪水而殛死顧此數說則是鯀既殛于羽山已死然後舉禹而治水也益稷曰予創若時娶于塗山辛壬癸甲啓呱呱而泣予弗子則是鯀既死之後禹終三年之喪既娶而後治水也則舜攝之元年安得洪水之功畢乎觀此則治水功畢當在舜居攝以後數年也然舜之居攝次年則廵守朝諸侯考制度使洪水未平則此禮亦不可得而講也觀此則知治水功畢又當居攝之前而孟子又謂禹八年於外三過其門而不入凡此數說求之皆齟齬學者當闕之象以典刑此又言舜明慎用刑之道也王氏云象者垂以示人之謂若周官垂法象魏是也此說比先儒為長葢王者之法如江河必使易避而難犯故必垂以示之使知避之苟不垂以示之使知所避及陷於罪然後從而刑之是罔民也周官司宼正月之吉始和布刑于邦國都鄙乃懸象刑之法於象魏使萬民觀象挾日而歛之此則唐虞之象以典刑之意也而說者多以象刑為畫象刑其說皆出於大傳與漢帝之詔此說雖近似然以象刑為畫象而解象以典刑之句其辭為不順而象刑亦有難治者荀子曰世俗之說曰治古無肉刑而有象刑是不然以為治邪則人固莫觸罪非獨不用肉刑亦不用象刑矣以為人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡也亂莫大焉薛氏又論世俗以為畫衣冠異章服為象刑豈非讀舜典而誤與此說有理流宥五刑此葢象刑之目也五刑墨劓剕宫大辟也流宥五刑者王氏謂制五流之法以宥五刑之輕者葢人之罪有被之五刑為已重加之鞭扑為已輕故制為流法以宥焉鞭作官刑扑作教刑鞭作官刑者以鞭為治官之刑也扑作教刑者不勤道業則撻之唐刑法志曰唐用刑有五一曰笞笞恥也罪之小者則加鞭撻以恥之此舜典所謂扑作教刑是也二曰扙扙持也可持以擊之此舜典所謂鞭作官刑是也要之此二者皆鞭撻之刑有輕有重之不同其曰官刑教刑者此亦據大凡而言葢教刑多用輕者故以朴係之其實二者皆通用也金作贖刑葢謂人有過誤入罪與事渉疑似者使之以金贖其罪孔氏以謂黄金而唐孔氏謂古之贖罪皆用銅漢始用黄金但少其斤兩令其與銅相敵後魏以金為難得故大辟之罪其罰千鐶贖銅三百七十五斤然或用金亦不可得而知之也眚災肆赦自流宥五行至金作贖刑此象刑之目也自鞭作官刑至於眚災肆赦葢量人情之輕重也昔者聖人雖設為常法然必原人情之輕重然後用其常刑故能刑期于無刑使過誤者得罰金而故犯者必不赦君子不䧟於無辜小人不至於苟免人將遷善逺罪日趨於君子之域此則刑期無刑之謂也眚災者不幸而入於罪戾也李校書曰周官甸師之職喪事代王受眚災眚災古語有是爾猶言天作孽云耳其罪非已作或為人罣誤而入於刑猶論語所謂雖在縲絏之中非其罪也如此之人其情在所可恕故其逋逃而未獲則肆縱之已獲而繫囚則赦宥之也春秋言肆大眚其實葢本諸此怙終賊刑孔氏謂怙姦自終當刑殺之此說不然夫以賊刑為刑殺之則是聖人用刑所以賊人也左傳載叔向之言曰已惡而掠美為昬貪以敗官為墨殺人不忌為賊昬墨賊殺臯陶之刑也杜元凱云三者皆死刑昬墨賊殺與怗終賊刑文勢正同葢怙恃其惡者與終不能改者與賊害人者皆律家所謂情重故刑之欽哉欽哉惟刑之恤哉孫氏云史官既言舜用刑之目於是又言其明徳慎罰恤刑之意曰舜之用刑也欽哉欽哉是刑之為憂恤哉言其哀矜憂恤之至而或以為舜語非也此說為是流共工于幽洲放驩兜于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服史官既言明慎用刑於是又論誅四凶之罪以見其用刑之當也共工象恭滔天足以惑世故流之幽州幽州者先儒謂在州境之北邉也驩兜黨共工其罪同故放之于崇山崇山者先儒謂禹貢無崇山未知其處葢在衡山之陽葢者疑之之辭也三苖國名也縉雲氏之後貪冒無厭不恤其民故竄之于三危三危在雍州也鯀九載績用弗成違戾圮族益甚故殛之于羽山羽山即徐州所謂蒙羽其藝也流放竄殛皆是屏之逺方也左氏傳所謂流四凶族投諸四裔以禦魑魅是也而有放流竄殛之異者孔氏曰異其文述作之體其說是也凡典之所載有一言而再言之者則必變其文如既曰正月上日又曰月正元日而又曰正月朔旦既曰五瑞又曰五玉又曰五器既曰文祖又曰藝祖南岳曰如岱禮西岳曰如初北岳曰如西禮及此流放竄殛皆是經緯其語以成文體非有異義也殛鯀于羽山說者多以為殺之遂舉洪範鯀則殛死之言為證是不然使鯀之罪果在所當殺則直殺之矣何必殛之羽山洪範所謂殛死者正如後世史傳言貶死也太祖皇帝讀書歎曰堯舜之世四凶之罪止從投竄何近代法網之宻也太祖之言可謂得聖人之意矣葢舜之制為流法以宥五刑四凶之罪可謂大矣而止於從殛竄則終舜之世死刑未嘗用也史記云以見舜之盛徳云耳四凶不誅於堯世而誅於舜之時何也程氏曰四凶在堯之朝知其惡之不可行則能隱其惡立堯之朝以助堯之治堯何因而誅之及舜登庸於側隱之中而居其上始有不平之心而肆其惡故舜誅之耳幽州崇山三危羽山皆是棄之逺惡之地左氏傳云投諸四裔謂之四裔則亦是猶四處而言非必有南北東西之異太史公曰流共工于幽州以變北狄放驩兜于崇山以變南蠻竄三苖于三危以變西戎殛鯀于羽山以變東夷孔氏因此說遂以幽州為北裔崇山為南裔三危為西裔羽山為東裔夫四凶之罪貫盈而不可赦故投於逺惡之地而絶之其何以變東夷西戎南蠻北狄哉孔子曰言忠信行篤敬雖蠻貊之邦行矣見弃於中國而可以變於蠻貊無是理也四罪而天下咸服者罰既當罪而天下心服之也據舜誅四凶在於歴試之初肈十有二州封十有二山濬川在命禹平水土之後而作典者載先後之辭如此者葢史官因言舜之明慎用刑遂援其誅四凶之事以為證非謂先肈十有二州而後誅四凶也二十有八載帝乃殂落百姓如喪考妣三載四海遏宻八音言舜之居攝二十有八年而後堯死也殂落死也葢人之死也魂氣歸於天故謂之殂體魄降於地故謂之落百姓如喪考妣言百姓之失堯如失父母也孔氏云言百官感徳思慕非也夫百姓有指百官而言之者若堯典平章百姓是也有指民而言之者若論語修已以安百姓是也此百姓葢指民而言之言堯之徳及於民也深且久其崩也百姓若失父母無小大無逺近皆然非獨百官而已三載四海遏宻八音指其地而言之則曰四海指其人而言之則曰百姓其實不異也而王氏云聖人之政其施不能無厚薄則其報施之義亦不能無厚薄也此葢曲生穿鑿無義理也夫謂百姓如喪考妣者非是處苫塊真如居父母之喪也但謂憂愁不樂也惟憂愁不樂則於三年之問遏密八音此葢相因之辭無有臣與民之異也遏絶也宻靜也八音金石絲竹匏土革木也凡音之起由人心生人心歡樂則八音之奏和恱而無有厭斁苟其心一有所不樂則雖八音陳於前而心不在焉不知其為樂也堯之崩也百姓哀慕如喪考妣至於三載四海遏宻八音此葢至誠所感自然而然非有刑政以驅之也竊惟堯舜之世有後世所不可跂及者二事驩兜共工之徒皆世之所謂大姦大惡立於其朝非惟不逞其姦而反為世所用此其所不可跂而及者一也堯老而舜攝者二十八年堯以天子之尊不復以庻政自聞而退處於上舜以匹夫之賤攝行天子之事歴年如是之久而讒間不生及堯崩舜率天下諸侯以為堯三年之喪然後即天子之位内外大小無有纎豪之隙者此後世所不可跂而及者二也且如唐明皇肅宗親父子之間及肅宗即位明皇處西内而程元振之徒一肆其讒問則父子之間不啻如仇讎堯與舜初非有天屬之親而舜能率天下以事堯使斯民戴堯之心無有厭斁及其崩也百姓如喪考妣三載四海遏宻八音此其為難葢本試於諧頑嚚刑二女也桞子厚智不足以知此且謂堯不能使民忘之不能以天下授舜舜不能自係於民不能以受堯之天下且謂如喪考妣三載四海遏宻八音乃是舜歸徳於堯史尊堯之辭此葢以一已之私意測度聖人者也子厚之心術葢可見矣尚書全解卷二
