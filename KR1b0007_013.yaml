body:
  text: 尚書全解卷十三宋林之竒撰胤征夏書孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也又曰天子討而不伐諸侯伐而不討五霸者摟諸侯以伐諸侯也故曰五霸者三王之罪人也春秋之世五霸之戰伐不為不多矣而孔子皆無取焉蓋以命自已出不由天子之命征率敵王所愾而往伐之其名曰征征者天子討有罪之辭也古之人有行之者禹之於有苗胤侯之於羲和是也舜曰咨禹惟時有苗弗率汝徂征禹乃會羣后誓於師而往征之羲和湎淫廢時亂日胤后承王命徂征此皆奉天子之命而以伐有罪其用兵行師皆以義而動非五霸之摟諸侯以伐諸侯為敵國之相征也然舜大聖人也禹亦大聖人也又適當至治之世禹之居攝奉舜之命以徂征有苗雖其事則美然未見其為難也至於仲康之嗣位適當有夏中衰之運羿以兵拒太康執其國政社稷安危在其掌握仲康當此之時乃能命嗣侯以徂征嗣侯當此之時乃能奉仲康之辭以伐有罪彼羿雖挾震主之威擅竊國之柄不可得而制之者惟其兵以義動故也此誠天下之至難而仲康胤侯能之則其智勇之絶人蓋可見矣故夏史録其書以為後世法其名曰胤征仲尼定夏書才四篇而胤征在焉蓋征之為言正也以胤侯之征羲和奉天子之命而不敢專以為萬世法者也學者能以此篇之義而觀之則知孟子所謂五霸者三王之罪人又謂春秋無義戰者誠非過論也此篇雖以胤征為名然以典謨訓誥誓命之體求之其實誓也自嗟豫有衆而下皆胤侯誓師之辭也唐孔氏徒見此篇無誓字遂於六體之外增其四以為十曰貢歌征範貢者謂禹貢也歌者五子之歌範者洪範而征者則謂此篇也夫苟以征字為書之體則西伯戡黎戡字亦當為一體乎漢孔氏曰仲尼討論墳典斷自唐虞以下訖於周芟夷煩亂翦截浮辭舉其宏綱撮其樞要足以垂世立教典謨訓誥誓命之文凡百篇據漢孔氏之意蓋以謂書之體盡於此而已而唐孔氏則贅以為十甚失先儒之意此不可不詳論也羲和湎淫廢時亂日胤往征之作胤征胤征古者官有大功則有官族顓頊氏命南正重司天以屬神北正黎司地以屬民謂之重黎蓋官稱也至於堯命羲和歷象日月星辰猶重黎也吕刑曰乃命重黎絶地天通是也羲和之命在堯之世謂之羲仲羲叔和仲和叔蓋以是四者為官稱也至於夏時掌天地四時之官猶謂之羲和若此之類蓋是以官為族猶漢之倉氏庫氏堯時分命羲和四子定歷象正閏餘以為甚重其設官分職莫先於此至於夏時雖羲和之政尚存然有國邑且以沈湎得罪則是羲和之官合而為一職不復分四時之官各主一方之政一時之事如堯之羲和矣蓋時異事變則其職任亦有不同者至於周時羲和之職不復有矣而馮相保章氏之所掌皆以中士為之隸於周官大宗伯之屬則其職任蓋又輕於夏時矣由兹而降此職益輕太史公曰文史星歷近乎卜祝之間故主上所戲弄優倡蓄之流俗之所輕也以此觀之則是羲和之所職者至於後世僅得不廢故也堯舜之時以此為致治之本而後世之於是官也至以卜祝齒之優倡蓄之此無惑乎其治效之不及於堯舜也湎淫淫之過也言湎淫於酒過差非度也惟其湎淫故身為司歷之官則至於廢厥職而不舉廢天時亂甲乙也故曰廢時亂日自古帝王盛時尤重歷象之事舜之居攝既受命於文祖則在璿璣玉衡以齊七政既巡守四嶽朝覲諸侯未遑他事而先之以考制度協時月正日使諸侯有時月之不協日之不正則不免於誅戮矣夫諸侯奉天子之正朔惟其時月之不協日之不正則其罪至於不赦况乎歷象之官正朔之所自稟時月之所自出今也沈湎於酒而至於廢時月則時月之在諸侯者無自而協至於亂日則日之在諸侯者無自而正由此一職之不舉而天下之時月日皆不得而協也安能免於誅戮哉胤國名也顧命曰胤之舞衣即此胤國也胤往征之蓋胤國之君奉天子之命而往征之也惟仲康肇位四海胤侯命掌六師胤征之義蘇氏則案魏絳伍員之言以謂自太康失國之後至少康嗣夏之前皆羿浞専政僭位之年胤侯之徂征蓋羿假仲康之命以命胤侯若後世所謂挾天子以令諸侯者學者疑焉某常因蘇氏之論而考左氏傳所載羿雖廢太康而立仲康然其篡也乃在乎相之世相仲康之子也仲康不為羿所篡至其子相然後見篡於羿是則仲康之世羿之強威卒不敢加無禮於其上其所以不敢加無禮於其上者則仲康有以制之也史官之序此書也其言曰惟仲康肇位四海胤侯命掌六師案唐書志季秋月朔辰弗集於房在仲康即位之五年而序書者首言肇位四海蓋推本其所以徂征之意也羿之立伸康也方將執其禮樂征伐之權以號令天下而仲康沈機先物奮其獨斷故於即位之始命嗣侯以掌六師正如漢文帝入自代邸即皇帝位夜拜宋昌為衛將軍鎮撫南北軍也羿之所以欲假借以為威者既為胤后所得故羿雖有強悍之志終太康之世而不得逞其不軌之謀也羲和之罪雖主於廢時亂日意其欲黨於后羿將與之同惡相濟以共為不軌之謀故胤后承王命以徂征而其誓師之言則曰爾衆士同力王室尚弼豫欽承天子威命其意蓋可見矣仲康之命也得夫天子討罪之權胤后之征也得夫諸侯敵愾之義羿之所以懷不軌之意而不得逞者其理在於此相之所以見篡於羿必是優遊不斷浸失其六師之柄以至於此極也向使六師之權不失常如仲康之世羿何自而篡哉蘇氏又曰書固有聖人之所不取而猶存者此尤不然夫以春秋之為經為褒貶而作也故有非聖人之所取而存之以示刺者至於書則紀載帝王之實迹録其典謨訓誥誓命之文以為萬世法豈容有所不取而猶存者哉使胤征之事果是挾天子以令諸侯而夫子存之於書略不見其所以譏之之意其不思後世之亂臣賊子將以是為口實也哉蘇氏此言係乎君臣上下之大分不可以不辨惟仲康肇位四海者始踐天子之位也始踐天子之位即命胤侯以掌六師而為大司馬蓋投機之會間不容穟當斷不斷反招其亂羿專廢立之權且將有竊國擅權之志當此之時兵柄之得失國家社稷之存亡係焉苟遲之以旬月之間則無及矣故命胤侯掌六師必於肇位四海之上蓋乘夫不可失之機如曹操之於漢司馬懿之於魏劉裕之於晉蕭道成之於宋蕭衍之於齊陳霸先之於梁楊堅之於周未有不得其兵柄而能成篡奪之謀者羿之於夏所以懷其不軌之謀而不得逞者惟胤侯掌其六師之權也仲康之沈機先物於斯見矣羲和廢厥職酒荒于厥邑胤后承王命徂征蘇氏曰羲和湎淫之臣也而二於羿蓋忠於夏也如王陵諸葛誕之叛晉尉遲逈之叛隋審如此説則是羲和之罪誠為可赦而嗣侯乃黨姦怙惡之臣仲康乃優遊失權之主胤征之篇乃與王莽之大誥等爾聖人何以録其書於百篇之內以與堯舜禹湯文武之書並傳於不朽乎以是知羲和之廢厥職酒荒於厥邑當是時聚羣不逞之人崇飲於其私邑以謀作亂其罪不止於廢時亂日此胤侯所以承王命而往征之也胤后胤侯也蓋以諸侯入為王朝公卿故謂之后亦猶禹稷伯夷稱三后周公君陳畢公亦稱三后也告于衆曰嗟豫有衆聖有謨訓明徵定保自此而下嗣侯誓師之辭也嗟豫有衆亦猶所謂嗟六事之人也蓋嗟咨以重其事而勑戒之辭也聖有謨訓明徵定保謨者人臣所陳之謨若大禹謨臯陶謨是也然人君所以為法於後世者亦謂之謨伊訓曰聖謨洋洋是也訓者人臣所陳之訓若伊訓高宗之訓是也然人君所以垂教於後世者亦謂之訓如五子之歌曰皇祖有訓是也此曰聖有謨訓蓋是上古聖人為法垂教以示後世子孫者是人君之謨訓也明徵定保謂聖人謨訓為世明證所以安定國家此孔氏之説也不如蘇氏曰徵猶書所謂庶徵也保猶詩所謂天保也蓋明其休咎之證以定其保大之業也此説比先儒為長王氏曰其言可以明證其事可以定保據經言初無言與事之别王氏分為二説迂矣先王克謹天戒臣人克有常憲百官修輔厥后惟明明聖人之謨訓所以明徵定保者蓋君臣各盡其職以裁成天地之道輔相天地之宜故循職為務君有君之道臣有臣之道君臣之道有勞佚詳略之不同故百官則各修其職以輔君而人君之謹天戒於上夫何為哉惟明其明德而已此下句所以結前之義而非别為一意也嗣侯之誓師首以此為言者蓋使羲和能謹其常憲以修輔其君則仲康得以謹天戒而明慎於上今也至於畔官離次而不知有日食之變則是廢人臣之常憲此危亡之徵也安能免於誅乎故其誓師首言及此惟人君之謹天戒必使夫百官之修輔故先王之世必常有以謹戒之使夫一介賤臣猶不忘於謹戒之意然後可與成就人君之明德而享天心也廢而不修仲康雖有謹天戒之心亦不得施君不能謹天戒於上臣不奉常憲於下矣每歲孟春遒人以木鐸徇于路官師相規工執藝事以諫其或不恭邦有常刑周官正月之吉始和布治於邦國都鄙乃縣治象之法於象魏使萬民觀治象挾日而斂之蓋古者將欲布令以勑戒夫百官萬民則必用正歲之正月故先王將使百官修輔則亦必以每歲之孟春使遒人以木鐸徇於路而戒勑之也遒人宣令之官也周官無此官惟小宰之職曰正歲率治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑與此所載同意者遒人之官其在夏時亦為治官之屬宣逹上之法令而布之於下者也禮有金鐸有木鐸其體皆以金為之惟舌則有金木之異木舌木鐸也文事則振之金舌金鐸也武事則振之此文事也故徇以木鐸其徇之言曰官師相規工執藝事以諫其或不恭邦有常刑此蓋前期而申警之也官師相規者言貴而為官師者則朝夕納誨規正人君之闕失也規正人君之闕失而曰相者亦猶周公所謂胥訓誥胥保惠胥教誨也工執藝事以諫者賤而為百工者各執其藝事以諫蓋雖百工技藝之事而至理存焉苟能執其藝事以諫無非治天下國家之道也唐穆宗問桞公權筆法公權曰心正則筆正筆正乃可法矣時帝荒縱故公權及之帝悟其筆諌也夫公權雖非技藝之人而其言乃幾乎執藝事以諫意者先王之時凡執藝事以諫者莫不然也夫上而官師下而技藝之事無不欲其規諫蓋將成明明之德不可不資臣下之助蓋邱陵積卑以為髙江海合小而成大一人合并以為公也其有不以規諫為意者則是不敬其君邦有常刑而不敢赦也惟時羲和顛覆厥德沈亂于酒畔官離次俶擾天紀遐棄厥司此遂申言羲和之罪上干先王之誅無所逃於刑憲故往征之非是仲康妄興干戈以快一時之私怨也酒誥曰天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜酒之為禍大矣天子而沈湎於酒則失其天下若夏之太康商之紂周之幽厲是也卿大夫而沈湎於酒則喪其國邑若羲和是也夫人苟湎於酒則驕奢淫佚無所不至惟耽樂之從而廢其職業之所當修者則始喪其德終而至於喪國亡家其勢然也羲和之罪至於廢官曠職上干先王之誅推本而言豈有他哉惟酒為之禍而已是以嗣侯數羲和之罪所言曰惟時羲和棄其德而行不修若木之顛器之覆而不能自立者惟沈湎喪亂於酒而已既沈亂於酒則畔其所掌之官離其所居之位而莫之有也俶始也擾亂也天紀天之五紀也即洪範所謂歲日月星辰歷數是也薛氏曰天紀未嘗亂而亂之者自羲和始故曰俶擾天紀此説是也蓋自堯舜命羲和歷象日月星辰敬授人時之後為羲和者世守其職未嘗亂於天紀蓋於是而始亂亦猶五子之歌曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡亦謂自陶唐以來紀綱未嘗亂至於太康而始亂也遐棄厥司逺棄其所主之職還其私邑而無所忌憚也乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走羲和尸厥官罔聞知昏迷于天象以干先王之誅夫羲和之罪至於是仲康猶隱忍未誅之也蓋先王之討誅有罪乃天下之所共怒衆之所不容與衆人共棄之羲和廢職之罪仲康知之久矣而其罪猶未暴白於天下至於季秋月朔辰弗集於房瞽奏鼓嗇夫馳庶人走而羲和乃罔聞知則既取怨於天下矣此則不得而不誅也亦猶鯀之方命圯族堯固已知其不可用矣然猶徇四嶽之請而試之使治水至於九載績用弗成然後殛之凡此皆順因衆之所共怒而後誅之也蓋非天下之所共怒則雖實有罪先王猶未之誅也孟子曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也然後可以為民父母先王之誅有罪其所以誅之而天下莫不服者此無他惟其與國人共殺之而已乃季秋月朔者九月之朔也辰弗集於房漢孔氏曰辰日月所會房所舍之次集合也不合即日蝕可知據孔氏此言蓋以羲和之廢厥職至於日有蝕之變猶不之知也然胡舍人則以此説為不然以謂日月交會之謂辰十二月十二辰之次也日行赤道月行黃道日行遲月行急一月一會必合於黃道赤道之間或髙或低或上或下不相掩蔽是謂不食或左或右或先或後而相掩蔽則蝕矣日食於晝月食於夜則見也日食於夜月食於晝不見也日月交會則有食矣謂不集所舍而致食乎既不集則非晦也非朔也安得謂之季秋月朔乎胡氏此説則以謂日月集合而後有蝕既謂辰弗集於房則不得謂之日食此説有理然胡氏既疑辰弗集於房為非日食至其論弗集於房之義則以為歷誤也謂房者二十八宿之房非是十二次之舍也秋之九月日月當合朔於房心之次今也弗集於房者則是歷之誤非日食也夫歷之誤至於當合朔而不合朔也此非精於歷者不足以知之而何以至於瞽奏鼓嗇夫馳庶人走乎胡氏亦自知其説之不通遂謂先歷誤而後日食其迂甚矣唐書律歷志論辰弗集於房之義以謂案古文集與輯義同日月嘉會而隂陽輯睦則陽不愆乎位以常其明隂亦含章示沖以隱其形若變而相傷則不輯矣唐志此説殊為可行案漢書帝紀西蠻北夷頗未集睦顔師古曰集與輯同以此觀之則辰弗集於房其為日食審矣但集之義當為集睦之輯蓋日月不相輯睦於其所舍故得有食孔氏曰集為集合之集則非其義此其所以起胡氏之疑也今當從孔氏之説以為日食而參之以唐律歷志之義以集為輯睦之輯則下文相貫矣房有二説或以為房星案日月會於大火之次正在季秋月朔謂之房星理亦可通然唐律歷志曰君子慎疑寧以日在之宿為文近代善歷者推仲康時九月合朔已在房心北矣觀此説則以房所次之舍其説為長據左氏傳梓慎曰宋大辰之虛陳太皡之虛鄭祝融之虛皆火房也所謂火房與此義同皆所舍之次也辰弗集於房蓋謂日月不集睦於其所舍之次爾日月不集於所舍之次而日有食之其為變也大矣瞽奏鼓嗇夫馳庶人走皆所以救日食也案左傳文十五年日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝則是古者當日食之時有此伐鼓之禮也瞽樂官也奏鼓者進鼓而伐之也詩曰奏鼓衎衎與此義同者食必奏鼓曽氏曰日食隂侵陽也鼓陽聲也瞽奏鼓者助陽以警隂義或然也嗇夫周禮無此官漢孔氏謂王幣之官鄭氏謂夏官之屬殊無所據此亦但以意度之而已百官表鄉有嗇夫職聽訟收賦稅上林亦有虎圈嗇夫故漢鄭玄第五倫皆常為鄉嗇夫則是知役之賤者此篇遒人與嗇夫考之於周禮皆無此官則知周之建官其名與夏時異者多矣庶人乃庶人之在官者也嗇夫馳庶人走皆所以供日食之百役也春秋榖梁傳曰天子救日置五麾陳五鼓曽子問曰諸侯從天子救日食各以方色旗與其兵而周官庭氏云救日月之弓矢則是救日之時必有此役嗇夫庶人之馳走者蓋所以供此役也然必謂之馳走者蓋以見日食之變天子謹天戒以恐懼修省於上而嗇夫庶人尚且馳驅奔走於下以從天子救日如此其急而羲和親為歷象之官乃沈湎於酒安於其邑而罔聞知也尸者不言不為而無所事也日食之變百姓震動而不遑寧羲和莫之知可謂尸厥官矣夫先王所以設羲和之官者使之仰觀夫日月星辰之運行以候天地之氣而知日時寒暑以相參合使萬民於此而取正焉則百工由是而允釐庶績由是而咸熙今也羲和畔官離次俶擾天紀遐棄厥司於季秋月朔日有食之而曽莫之知則天象於是昏迷而斯民無所取正違叛先王之訓謨以干犯先王之誅其可誅之罪豈特官師之不能相規工不能執藝事以諫而已杜元凱曰日行遲一歲一周天月行速一月一周天一歲凡十二交會然日月動物雖行度有大量不能不少有盈縮故有交會而不食者或有頻會而食者蓋日食之變有交其交會過險之常數歷家所可得而逆推之也使羲和能修其職逆知乎天將有日食之變以規諫於仲康則仲康得以恐懼修省上答天意而銷弭天變於未然之前今乃不能逆知其變至於日既食矣瞽奏鼓嗇夫馳庶人走而猶罔聞知其為不恭孰大於此使仲康舍而不誅安得為謹天戒乎泰誓曰商罪貫盈天命誅之豫弗順天厥罪惟鈞羲和既不修其職至於昏迷天象罪在不赦矣使仲康又舍之而不誅則是君臣同惡相濟厥罪鈞矣故仲康命嗣侯以征之其征之者蓋所以祗畏天命行先王之誅而不敢赦也然則用師也亦豈得已而不已者哉政典曰先時者殺無赦不及時者殺無赦諸儒解釋此義皆以此屬於上文故漢孔氏曰先時謂歷象之法四時之氣弦望朔晦先天時則罪死無赦不及時謂歷象後天時雖治其官苟有先後之差則無赦唐孔氏遂謂先天時者所名之日在天時之先假令天之正時當以甲子為朔今歷象乃以癸亥為朔是造歷先天時也若以乙丑為朔是造歷後天時也後即不及時也其氣望等亦皆如此以某觀之是殆不然帝王之世雖重歷象之事然歷官之差一日一朔則至於殺之無赦雖秦人棄灰於路步過六尺之誅亦不過如是之酷也豈先王忠恕待人之道哉據此文勢上文言克謹天戒臣人克有常憲至其或不恭邦有常刑此蓋嗣侯舉先王之誅以繩羲和之罪於是繼之以惟時羲和顛覆厥德以至於昏迷於天象以干先王之誅其首尾總結文義已足矣自政典曰以下乃是胤侯誓師敕戒吏士之辭當屬於下文不當復謂指羲和而言也周官冡宰掌建邦之六典以佐王治邦國一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典此周官六卿之典也治典者冡宰之所掌也教典者司徒之所掌也禮典者宗伯之所掌也政典者司馬之所掌也刑典者司冦之所掌也事典者司空之所掌也胤侯掌六師為大司馬故舉政典以為言蓋大司馬法也惟其軍馬故有先時不及時之誅先時者謂先前師期而進是邀功也漢班勇與張朗共攻焉耆勇從南道朗從北道約期俱至焉耆而朗嘗有罪欲邀功自贖遂先期至爵離關徑入焉耆若此之類是之謂先時蓋不與大軍相期會而嗜利輕進不可以不誅也故殺無赦不及時者謂後期而至是逗留也漢遣霍去病等擊胸奴公孫敖出北地二千餘里過居延斬首虜三萬餘級雖有功以後期當斬贖為庶人若此之類是之謂不及時蓋與大軍期而不至而稽延師期亦不可以不誅也故殺無赦惟此二者皆誅而無赦則軍士莫不用命矣此胤侯誓師之意也今豫以爾有衆奉將天罰前既言政典先時不及時之誅以誓師矣此遂告之以徂征之意謂今豫以爾有衆奉將天罰將行也蓋先王之克謹天戒則其臣之守常憲者以先王之心為心亦所以事闕天命也羲和酒淫不率其職以干先王之誅是不以先王事天之心為心不惟得罪於君亦得罪於天矣故胤侯之征蓋所以奉天罰而不敢專也爾衆士同力王室尚弼豫欽承天子威命天子討而不伐諸侯伐而不討仲康之命嗣侯得夫天子討罪之權胤侯之征羲和得夫諸侯敵愾之義其用兵行師也可謂仗大義而行矣故其辭直其義明非若五霸摟諸侯以伐諸侯其辭曲其義迂也我之征羲和既以欽承天子已行之威命爾當以同力王室為心不可不弼豫以徂征也火炎崑岡玉石俱焚天吏逸德烈于猛火殱厥渠魁脅從罔治舊染汚俗咸與惟新此則告以所為弔伐之意也蓋言火之焚於崑岡不擇玉石而焚之無所辨於美惡也羲和誠有罪也苟天吏有過逸之德不擇善惡而並戮矣其為害也又將甚於猛火非所謂誅其君而弔其民也今我之徂征惟殱其渠魁之害而罔治其脅從之黨凡舊染於羲和之俗則咸與教而惟新之此蓋王師弔民伐罪之意也湯之伐桀武王之伐紂號為應乎天而順乎人者不過若此而已彼項羽入秦關坑秦降卒數萬人殺秦王子嬰燒秦宫室所過殘滅此豈非所為天吏逸德烈於猛火乎胤侯之數羲和之罪其始也但言其畔官離次俶擾天紀而已而其終篇乃有及於脅從之黨舊染之俗以是知羲和之罪當不止於廢時亂日是必聚羣不逞之人崇飲於其私邑圖為亂黨將以助羿而為亂故曰有脅從之黨舊染之俗也若使羲和之罪止於廢時亂日則其執而戮之是特一法吏之事耳何至率六師而征之乎然其征之而不正名其惡者蓋若正名其惡則當窮治黨與鋤根浚源而戮之而仲康之勢未有足以制后羿之命故特治其廢時亂日之罪而已夫羲和有脅從之黨舊染之俗而且與后羿同時胤侯之征也其誓師之辭指羲和且謂爾衆士同力王室尚弼豫欽承天子威命則是羲和之黨於羿而嗣侯之忠於王室其事甚明而蘇氏乃以曹操司馬仲逹楊堅之流討二已者以為比某謂蘇氏之説經多失之易者此類之謂也嗚呼威克厥愛允濟愛克厥威允罔功王氏蘇氏二説大為穿鑿據此二説而考之皆以威為刑罰之威愛為仁愛之愛故其説如此殊不知所謂威者非刑威之威乃果斷之威也所謂愛者非仁愛之愛乃姑息之愛也以果斷之威勝其姑息之愛則有濟矣古人有得之者孝宣之綜核名實光武之總攬權綱是也以姑息之愛勝其果斷之威則陵夷大壞必至滅亡信乎其無功也古之人有行之者孝元之優遊不斷孝成之威福下移是也羲和之罪至於有脅從之黨舊染之俗且將與羿為亂矣苟舍之而不誅是區區於姑息之愛也豈所以為安全之道哉善觀古人之言必推本其立言之意不可以一概論也威克厥愛允濟若以此威為刑威之威愛為仁愛之愛此誠申商之言也豈詩書之訓哉其爾衆士懋戒哉此言我之所以誓師之意如此爾衆士則不可以不勉戒其心以用我之命也自古國家當中衰之運則朝廷之上往往行姑息之政故英雄之徒得以乘間抵巇肆為桀鷔而莫之奈何是以大有為之君當夫歷運中否社稷阽危之際苟非赫然奮其乾剛之斷未見其有能濟也唐自肅代以來一切行姑息之政藩鎮戮主帥者因而授以節鉞或聽自擇帥其驕子弟皆得以承襲父兄之位及憲宗剛明果斷足以有為不憚用兵以翦鋤強梗於是平夏平蜀平江東平澤潞以至易定魏博貝衛澶相淮蔡莫不率服而唐室遂以中興此無他惟威克愛故也憲宗雖以剛果為政而子孫不能率至於穆欽文宗之世又以姑息為政藩鎮復強而唐室遂亡仲康之世何以異此當其命嗣侯以征羲和誠得乎威克厥愛之義故足以制后羿之強而中興有夏之業惜夫后相繼之不能用其果斷以為政寖失天子之權綱卒為羿所篡而夏終於不祀此非仲康之失也繼之者非其人也可不慎哉自契至于成湯八遷湯始居亳從先王居作帝告釐沃湯征諸侯葛伯不祀湯始征之作湯征伊尹去亳適夏既醜有夏復歸于亳入自北門乃遇汝鳩汝方作汝鳩汝方尚書全解卷十三
