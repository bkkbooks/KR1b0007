body:
  text: 尚書全解卷三十八宋林之竒撰畢命周書康王命作册畢分居里成周郊作畢命畢命惟十有二年六月庚午朏越三日壬申王朝歩自宗周至于豐以成周之衆命畢公保釐東郊王若曰嗚呼父師惟文王武王敷大徳于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓旣厯三紀世變風移四方無虞予一人以寧道有升降政由俗革不臧厥臧民罔攸勸惟公懋徳克勤小物弼亮四世正色率下罔不祗師言嘉績多于先王予小子垂拱仰成周公以殷之頑民遷之于洛邑而親自監之周公既沒則君陳代其任而懋昭周公之訓此又康王命畢公以監殷民也漢孔氏曰命之代君陳也唐孔氏曰蓋君陳卒命之使代君陳也其曰蓋者疑之之辭未敢必以爲然也君陳之序曰周公既沒命君陳分正東郊成周君陳之代周公經有明文此序但曰康王命作册畢分居里成周郊不明言其代君陳然篇内有曰惟周公克謹厥始惟君陳克和厥中惟公克成厥終以周公爲始以君陳爲中以畢公爲終則畢公之代君陳雖無明文而自見於此命作册者唐孔氏曰命内史爲册書以命畢公蓋以周禮内史之職凡命諸侯及孤卿大夫則册命之故知作册者内史也册所以紀載王命之言使藏之也左傳城濮之戰襄王命内史叔興父册命晉侯爲侯伯曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命受册以出王謂叔父以下皆載於册晉侯受册以出則藏之也畢公之監殷民康王命作册以命之則知洛誥曰王命作册逸祝册惟告周公其後其册命周公留居洛邑無疑也先儒以後爲命魯公伯禽誤矣成周郊即君陳序所謂東郊成周成周在王城之東王城者别都之所在故以成周爲東郊惟爲王城之東郊故因謂之成周郊也篇内曰保釐東郊即此郊也分居里者康王之命畢公以旌别淑慝表厥宅里殊厥井疆俾克畏慕故序曰分居里言分其居里於成周東郊之地漢孔氏以成周郊爲成定東周郊境誤矣漢書志曰畢命豐刑曰惟十有二年六月庚午朏王命作䇿豐刑孟康曰豐刑逸書篇名唐孔氏曰此僞作者傳聞舊語得其年月不得以下之辭妄言作豐刑耳蓋此篇出於孔壁濟南伏生之所傳授者未得其本而孔壁之書當漢時未行於世故唐孔氏以豐刑爲僞作正如僞泰誓之類也惟十有二年康王即位之十二年也朏者説文曰月未盛之明也朏蓋月之三曰即哉生明也漢志謂六月戊辰朔故三日庚午朏越三日壬申者於朏之後三日并庚午數之故爲三六月之五日也豐文王之廟所在豐去宗周鎬京二十有五里故康王但朝發宗周則可以至焉必命之於文王之廟者以畢公文王之子也其至文王之廟則以成周所遷殷之餘民而命畢公使保釐於東郊之地釐治也與允釐百工之釐同王氏之説以書稱周公曰師保萬民命君陳曰尹兹東郊命畢公曰保釐東郊從而爲之辨其所以不同且告以天命使之宅爾邑繼爾居以爲師保簡厥修進厥良爲尹表厥宅里殊厥井疆爲保釐其言皆臲卼不安强生分别自可以彼此移易也王若曰以下此别命之之言畢公代周公爲太師亦代爲東方之伯故其朝康王也率東方諸侯而康王呼之爲父師畢公文王之子武王周公之弟成王之叔父其屬最尊故曰父即天子謂同姓爲叔父伯父也惟文王武王敷大徳于天下用克受殷命此言周之所以得天下之始文武之造周皆以其大徳布之於天下而民心歸之故天因民心使之代殷而受其命以奄甸四海先王指成王也經於左右先王綏定厥家之下即言毖殷頑民遷于洛邑遷頑民在成王之世則知先王爲成王無疑蓋謂遷殷頑民者乃周公之所以輔相成王則安定其國家也先儒及説者多以先王爲文武蓋其屬於上文殊不知康王之意言周之所以得天下則自文武而其所以安定天下則自周公之遷殷民不必以先王爲文武苟以先王爲文武則毖殷頑民上無所承矣王室謂王城王城者所以遷九鼎㑹諸侯之地故亦可謂之王室成王之命周公廸將其後也王城成周皆其所臨涖之地故其以商之頑民遷于洛之成周蓋使之親近王都之所在則漸染浸漬可以化其教訓矣殷民之在於故都也蓋乆染於惡習孰知善爲何物哉故不能自反於善惟周分既擇其尤頑者而遷之使親近王室則可以相觀而善焉其勢既可以相觀而善而又以其教訓日夕而啓廸之俾父詔其子兄詔其弟曉然知善之不可一日舍不善之不可一日向此其所以式化也毖慎也康王謂邦之安危惟兹商士則商民之化與不化其係於周家事大體重如此周公安得而不慎之哉周公之訓商民蓋不一而足如多士多方之篇此其可見於經者也孟子曰有楚大夫於此欲其子之齊語也則使齊人傅諸曰使齊人傅之曰一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣引而置之莊嶽之間數年雖日撻而求其楚亦不可得矣周公欲化商民而遷之密邇王室此正引而置之莊嶽之間者也十二年爲一紀左傳曰是謂一終一星終也言嵗星十二年而一周天此之謂一紀漢志謂周公攝政七年成王在位三十年共三十七年鄭康成謂成王二十八年崩章子平則曰成王在位四十七年史記既無明文未知孰是然以既厯三紀觀之則章子平之言非也使成王在位四十七年以七年爲周公攝政之年致政之明年方遷商民商民之遷在成王之世已四十年矣又加以康王之十二年共五十二年則是厯四紀也不得以爲三漢志所言成王三十年與夫康王十二年共四十二年則三紀有餘言三紀者舉其全數也鄭康成之數但少於漢志兩年耳父子相繼爲一世世變者指成王康王也言周公之遷頑民而訓之也至于今已厯三紀矣世又以變則其風俗當易惡而爲善蓋其漸染浸漬於忠厚之化厯年既乆當與時推移也周之得天下民心悦而歸之所慮者惟商民耳苟商民遷善逺罪則四方無一不化之民豈有不虞之變哉此我一人之所以得享其安寧之效此其責在畢公故以此命之也道有升降蘇氏引子思之言道隆則從而隆道汙則從而汙是也孟子曰天下有道以道徇身天下無道以身徇道此亦升降也政由俗革者風俗之弊必有偏而不起之處革之者舉其偏以補其弊而已矣所謂由俗革也王朴曰觀所以失之之由知所以平之之術是也康王此言蓋欲畢公觀商之頑民所以不善之由而革之耳其曰道有升降者蓋因政由俗革之弊而言之也不臧厥臧者言商民有變而爲善汝當以其爲善而有以奬厲之則其他將自勸苟不臧厥臧則非所謂政由俗革也夫人之爲善自非謹獨之君子未有不欲上之人知之苟上之人不以之爲善則彼將曰我已爲善而上之待我者無以異於他人我何以善爲哉是雖爲善者將不能以自固而况他人欲其勸慕之哉表厥宅里臧厥臧之謂也小物猶小事也小事猶勤則其大可知矣旅獒曰不矜細行終累大徳故畢公之勤小物所以懋其徳也晉謝安舉其姪元爲將拒苻堅郗超以元必不負舉其言曰吾嘗與元共在桓公府見其使才雖履屐間亦得其任所以知之蓋觀人者必自小而知之故畢公之克勤小物康王知其可以保釐東郊也康王既言其所以革商俗之道故遂稱美畢公之徳可以革之也四世文武成康也國語曰文王詢於八虞訪於辛尹重之以周召畢榮則畢公在文王之時已居輔相之任矣畢公嘗輔相文王更武王成王至康王蓋國之耆艾也而能懋徳以克勤小物則年彌髙而徳彌邵矣孟子曰所謂故國者有世臣之謂也畢公之弼亮四世所謂世臣孰加於此以之而監商則其徳望有以素服天下夫何商民之難化哉正色率下孔子所謂正其衣冠尊其瞻視儼然人望而畏之者也君子者容止可觀進退可度以臨其民是以其民畏而愛之則而象之望其容貌不敢生慢易焉則其善心油然而生故必正色而後可以率下也惟能正色以率下故有所不言其言也無不敬而法之蓋非法不言則必能口無擇言口無擇言則必能言滿天下無口過故祗師之也使其不能正也則其言孰信之哉故必正色率下而後祗師其言商之頑民以利口靡靡爲俗而又驕淫矜侉故必畢公之正色率下罔不祗師言乃可以鎮服之此康王之所以命畢公也惟畢公之徳可以鎮服商民也如此故雖其在先王之世其功績已爲多今我小子將垂衣拱手於廟堂之上惟仰公以成之也蓋當是時天下之民已盡向化法度紀綱已盡得其條理惟商民之未能擴然丕變康王每以爲東顧之憂今既得畢公矣故康王可以責成之也王曰嗚呼父師今予祗命公以周公之事徃哉旌别淑慝表厥宅里彰善癉惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻慎固封守以康四海政貴有恒辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉我聞曰世禄之家鮮克由禮以蕩陵徳實悖天道敝化奢麗萬世同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜侉將由惡終雖收放心閑之惟艱資富能訓惟以永年惟徳惟義時乃大訓不由古訓于何其訓王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥徳允修惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民四夷左衽罔不咸頼予小子永膺多福公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政漢荀悦有言君子以情用小人以形用榮辱者賞罰之精華歟故禮教榮辱以加君子化其情也桎梏鞭笞以加小人化其形也君子不犯辱况於刑乎小人不忌刑况於辱乎若教化之廢攘中人而墜於小人之域教化之行引小人而納於君子之塗蓋先王所恃以鼓舞天下使之遷善逺罪頑夫廉鄙夫寛變其氣質而有士君子之行者惟教化而已矣而教化行於天下則莫大於使民知耻而有所不爲孔子曰道之以政齊之以刑民免而無耻道之以徳齊之以禮有耻且格蓋天下之人不知夫如是而爲善如是而爲不善在上者徒以政刑而制御之則亦强制之而已矣民將惟務巧詐百出以苟免於罪戾其刀鋸斧鉞所不可得而加者民則肆爲之矣蓋刑政惟可以制其外而不能格其心惟以徳禮爲鼓舞天下之術則日漸月染曉然知善之可慕不善之可耻如好好色如惡惡臭其有放僻邪侈自暴自棄者不徒不容於朝廷蓋亦不容於鄉黨之間則孰有不丕變者哉故康王既言畢公之徳可以鎮服殷民如是謂今我敬命公以周公昔日監殷民之事周公之監殷民惟分别其善惡使斯民有耻心公之徃東郊不可不念也旌别淑慝此一句爲下之總目旌即所謂表厥宅里别即所謂殊厥井疆宅居也言商民有自反而爲善則當於其所居之里旌表之以異於衆爲善者彰顯於世而爲惡者耻其不若則必以爲病矣既以爲病孰不思所以自反哉如此則是立之風聲使民知所從也風即詩曰風風也教也聲即禹貢聲教是也言王教之所以立不在乎他惟使善者有以表暴於天下而惡者以爲病則是立之也自漢以來閭巷之民有事親居喪著至行者有數世同居者天子皆旌表其門閭正表厥宅里之遺制其有不率訓典則殊别其井居之疆界俾能畏爲不善之禍而慕爲善之福則其俗丕變矣王制曰司徒上賢以崇徳簡不肖以絀惡命鄉簡不帥教者以告耆老皆朝于上庠元日習射上功習鄉上齒大司徒帥國之俊士與執事焉不變命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右如初禮不變移之郊如初禮不變移之遂如初禮不變屏之逺方終身不齒移之左移之右移之郊移之遂所謂殊厥井疆也移之則俾之畏習射習鄉則俾之慕唐孔氏曰孟子云方里而井井九百畆使民死徙無出鄉鄉由同井出入相友守望相助疾病相扶持則百姓親睦然則先王之爲井田也顧使民相親愛不循教者其人不可親近與善民雜居或染善爲惡故殊其井田居界令民不與徃來猶今下民有大罪過不肯服者則擯出族黨之外吉凶不與交通此説爲盡不獨此也郊邑之境界亦當申重而規畫之守備亦當慎而固之孟子曰仁政必自經界始經界不正井地不均榖禄不平是故暴君汙吏必慢其經界經界既正分田制禄可坐而定也經界正然後可以分田制禄故必郊圻之畫封守之固然後可以表厥宅里殊厥井疆慎固封守則非所謂慢其經界如此然後可以安四海此一東郊耳而曰康四海亦上文四方無虞之意政貴有常辭尚體要言政之所貴者惟在有常辭之所尚者惟在體要二者皆不可以好異也政有常則其因革損益莫不合於人情與夫先王之道辭有體要則其言談議論莫不近於人情與夫先王之道苟爲政而好異則商君之徒也立辭而好異則楊墨鄒衍之徒也辭既不可以好異而商民之爲俗也乃靡靡然以利口爲賢以利口爲賢則必禦人以口給夫禦人以口給者屢憎於人而乃以爲賢其好惡之反如此雖周公君陳監之亦化厥訓矣而未能盡其變餘風猶未絶畢公不可不以是爲念也蓋欲畢公思所以盡變之之道焉殷民心術蓋染於紂之惡習紂智足以拒諫言足以飾非矜人臣以能高天下以功故其臣民化之亦以利口爲賢觀管蔡一倡其流言而商民起而應之相挻而爲亂惟其靡靡利口故也周既平管蔡矣以殷民之未能遷善逺罪故不擇而用之而商民謂殷家於夏之士廸簡在王庭有服在百僚而周於殷之士不然不知其賢否之不同而每以此藉口以咎周則其利口蓋優爲之也蓋治病者必知所受病之處殷民之不善蓋在於此故康王以戒畢公也蘇氏謂秦俗似商俗秦二世似紂張釋之所陳則康王以告畢公者也其言是矣殷民之居舊都者康叔治之而其士大夫之同惡者則遷之成周以其頑之最甚故以世禄之家爲言言古人有言謂卿大夫以其功徳之著受禄於其君而子孫世世有之則其家鮮克由於禮蓋其祖父建立之難故知所以長守富貴之道子孫未嘗知勞而坐享之則其不由禮必矣惟不由禮故以其放蕩之故而其徳遂陵夷而大壊徳既陵夷而大壊則實悖亂於天道矣蓋天命之謂性率性之謂道民之秉彞而好是懿徳則不失守天生之物則而順其所固有以蕩陵徳此豈天之降衷本如是哉故爲悖天之道也夫以不善之化而其奢麗如此苟無以變之則嵗復一嵗世復一世雖萬世亦與之同流矣蘇氏曰惟惡能及逺故秦之俗至今猶在此説甚善如賈誼所論秦之俗家富子壯則出分家貧子壯則出贅借父耰鋤慮有徳色母取箕帚立而誶語抱哺其子與公併倨婦姑不相説則反唇而相稽今世之俗蓋如是矣是秦之故習未改也惟其無周公君陳畢公之徒以爲之司牧故耳以此觀之則殷之俗使非三后亦將如秦俗至今猶在是之謂萬世同流今此殷之衆士蓋以世禄之故其藉寵勢亦已乆矣故怙恃其奢侈以滅其義滅義即所謂陵徳也蓋善不善之習如權衡然此首重則彼尾輕徳義積諸身則放蕩奢侈之習自消既放蕩奢侈矣而又且自矜夸於人徳義何有哉服美于人若子玉瓊弁玉纓子臧鷸冠之類非先王之法服故美于他人也夫既驕傲淫佚又以此自夸於人苟不知變則必將以惡終今雖以周公君陳之故能化其訓而收其放心畢公之所以防閑之者亦不可謂易也夫人之情儉生於貧侈生於富彼既富於財則必將用之如泥沙此其所以驕淫矜侉也故子貢問曰富而無驕何如子曰未若貧而樂富而好禮者也蓋富而能好禮則可以長守其富矣故以富之資而知教訓則可以永其年矣觀無逸所論商三宗彼其享四海之富惟以無逸之故遂能享國之永今殷士惟能以富而知教訓則豈不永其年乎蓋商士以世禄之家非不富也所乏者能訓耳故以永年而誘掖之也然所謂訓者不在乎他惟徳惟義而已所謂訓者莫大於此夫徳義人心之所同然其所以訓之者非推我所有以予之也亦非强彼所無而習之也惟彼以放蕩奢侈遂至於陵徳賊義失其所同然者訓之者亦因其所同然還以治之而已然所謂徳義之訓者必由古訓苟非古焉則何足以大訓乎蓋天下之理一也稽之前古揆之當今惟此理而已故徳義之訓必由於古也惟康王以世禄之家乃至於悖天道而殷之庶士席寵如此惟恐無以閑之則知武王之數紂之罪以其官人之世也蓋殷之世家驕淫矜侉與紂同惡相濟如此篇所稱故得以其官人以世爲罪不然古之仕者世禄賞延于世舜之盛徳又何訾哉此言周邦之安與危惟在殷士之化與不化而已當康王之命畢公之時殷之頑民以周公君陳監之之故世變風移已式化厥訓則是商民之已遷於善而周邦之已安而其言猶曰邦之安危惟兹殷士蓋行百里者半九十言末路之難也書曰爲山九仭功虧一簣殷之頑民雖已漸染於周公君陳之教訓使其能自同於善而不反則周邦信乎有泰山之安苟其一時服從教訓而心未能純一於善則其驕淫矜侉蓋有時而復作如此則雖天下之民已盡按堵若有太山之安而實有累卵之危不可以不戒然則欲殷士之化而周邦之安則惟在於政之不剛不柔蓋政不可以無剛柔而剛柔俱不可以偏勝如和羹焉必藉鹽梅以成其味然必鹹酸不可得而名言謂之爲鹹則不可謂之爲酸則亦不可然則爲和羹之善此之謂不剛不柔則其徳信乎修矣商民之居於成周也蓋始自周公營洛邑以遷之而爲之師保周公既慎之於始矣君陳之代周公又能和之於其中畢公之代君陳又能成之於其終此三后之所以化商民者其心若出於一則可以同致于道道既浹洽則其政事無不咸治故可以澤潤生民不獨中國也雖四夷左衽之邦亦得所恃頼矣觀漢之初蕭何爲相而曹參繼之因民之疾秦法順流與之更始二人同心遂安海内夫以蕭曹之同心其效猶如此則周公君陳畢公之協心其效爲如何邪夫既謂之協心則其道同矣而説者必從而爲之分别周公如是而爲慎君陳如是而爲和夫以厥終謂之成此所當然苟於其始必謹則其中其終不必謹邪其中必和則其始其終不必和邪如必分别其所以然則其説必至於此且康王之命畢公以周公之事而其所謂周公之事者旌别淑慝而已君陳之簡厥修亦簡其或不修是亦旌别淑慝之意舉此一端觀之則三后豈有異道哉此篇既曰四方無虞又曰以康四海今又曰四夷左衽罔不咸頼所治者成周之殷民而已四方四夷爲言者古人有言曰滿堂而飲酒有一人向隅而悲泣則一堂皆爲之不樂天下之勢猶一堂之上也一國一邑有反側不安則天下之勢必危蓋成周殷民密邇王室天下之根本所係殷民不安則天下可慮天下不安則四夷乗間而起矣此四夷左衽之所頼者必在於商民也中國夷狄皆已安寧天下之福孰大於是故我小子可以永受此福也公其以是成周之治爲我周邦立無窮之基則公亦有無窮之名顯於後世蓋周之基業所以緜緜延延而無有窮已者以畢公之監商民之故後世若論周家光有天下之效必將歸美於畢公此無窮之聞也有無窮之聞則子孫得以訓法其成式惟以治也訓其成式則烏有不治者乎成王之戒卿士曰萬邦惟無斁戒君陳曰終有辭于永世此曰亦有無窮之聞皆謂其實著則其名自顯效之必至也王氏以極高明道中庸制行不以已吉凶與民同患爲説楊龜山辨之詳矣罔曰弗克惟既厥心罔曰民寡惟謹厥事天下之事無難易惟在乎人之所爲如何耳不可以爲難而自沮亦不可以爲易而忽之故謂畢公無以爲不能惟盡其心則豈有不能者哉無以其民爲寡而不足爲不謹其事則雖寡民未有能治者矣既其心慎其事則可以敬順先王之成業以美于前人之政前人謂周公君陳守之而不失所以美之也以畢公之懋徳克勤小物則必不自以爲不能也必不以爲民寡而忽之也而猶以此戒之蓋前世帝王君臣之所以相告戒者未有不若是也夫以堯舜之盛徳而其臣戒之之言常若庸主之所爲者不如是無以革其非心而勉其不及也君牙周書穆王命君牙爲周大司徒作君牙君牙王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常惟予小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾渉于春冰今命爾予翼作股肱心膂纘乃舊服無忝祖考𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧嗚呼丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有乂穆王康王之孫昭王之子名滿大司徒卿官周禮曰乃立地官司徒使率其屬而掌邦教以佐王安擾邦國則大司徒教官之長也是時大司徒缺穆王命君牙爲之王若曰嗚呼君牙以下皆其命之之言史官紀載之以爲此篇也篇内有曰𢎞敷五典式和民則此正大司徒之職也穆王以大司徒之職所當爲者而命君牙且先之以纘乃舊服無忝祖考以洪敷五典爲君牙祖考之舊服則君牙之祖考蓋皆典是職矣累世司徒之官蓋若鄭桓公武公父子繼爲周司徒也歟成王之將崩康王初立芮伯爲司徒而君牙在穆王之世爲之則君牙者竊意是芮伯之子孫世襲父職雖以經之文前後參較知其若此然經無明文不敢必以爲然也前世帝王之命其臣而其臣或世臣之後則必稱揚其先世之功徳又欲其纂而行之則可以無忝其職也江漢之詩宣王命召虎平淮夷之詩也而其言有曰文武受命召公維翰無曰予小子召公是似常武之詩宣王命皇父平徐方之詩也而其言有曰赫赫明明王命卿士南仲太祖太師皇父蓋召公召虎之祖南仲皇父之祖召公日辟國百里而南仲之城朔方則玁狁于襄皆有大功載在王室故當命召虎皇父握兵出征之時則必稱述其事不獨以襃大其先以昡耀於天下蓋使夫思所以繼之也君牙之先既世爲司徒將欲其無忝祖考則必爲之言其祖考之所以然也孟子曰欲爲臣盡臣道所謂臣道忠貞而已晉獻公曰何謂忠貞荀息曰公家之利知無不爲忠也送徃事居耦俱無猜貞也觀荀息所言之意則知忠貞者皆謂致力於王家而無外心也君牙之祖與父世世皆篤於忠貞之道是以能服勤於王家惟其服勤故有成功可以紀之于太常也周禮司常掌九旗之物名日月爲常王建太常王者之旗則畫日月於其上昭其明也司勲曰凡有功者銘書于王之太常注曰銘之言名也生則書于王旌以識其人與其功也禮記曰夫鼎有銘銘者自名也自銘以稱揚其先祖之美而明著之後世者也紀于太常是亦如鍾鼎之有銘皆明著之後世而已矣惟明著之後世則後世可不思所以繼之乎今我小子之君天下也蓋繼守文武成康之遺緒自文武基於西土積徳累功以創造大業而成王康王持盈守成致天下於太平而我以小子嗣守其遺緒常懼不克負荷其責重矣然文武成康之所以治天下者蓋皆有賢臣以左右輔助之故能治四方以文武成康而又加以克左右之臣今穆王之徳自謂不及先王而又未有先王之臣此心之所以憂危也蹈虎尾者必不免於噬渉春冰者必不免於溺易曰履虎尾不咥人亨月令孟春之月東風解凍冰至於春其將釋矣而乃渉也此皆言其憂危之甚也我之憂危如此今既得君牙則命之輔翼我一人以爲我之股肱心膂傳曰君爲元首臣爲股肱明良一體相須而成作股肱心膂蓋言其與我一體也膂背也汝之爲我股肱心膂惟能繼汝祖考之舊事不爲爾祖考之辱則可矣爾祖考之舊事蓋以五典而教民爾能大布五典之教使民之則各得其和則爲能纘之也王氏曰天生烝民有物有則所謂民則者此也是也楊龜山曰孟子曰有物必有則蓋曰有物矣則物各有則焉近取諸身百骸五臟達之於君臣父子夫婦長㓜朋友皆物也而各有則視聴言動必由禮焉此一身之則也爲君而止於仁爲臣而止於忠爲父而止於慈爲子而止於孝此君臣父子之則也夫婦有别長㓜有序朋友有信此夫婦長㓜朋友之則也所謂五典之民則者此言盡之矣書載舜之命契曰汝作司徒敬敷五教在寛而孟子亦曰人之有道也飽食煖衣逸居而無教則近於禽獸聖人有憂之使契爲司徒教以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信𢎞敷五典式和民則蓋不過如契而已矣周禮司徒掌施十有二教鄭康成曰有虞氏五而周十有二焉案經周官之言六卿分職曰司徒掌邦教敷五典擾兆民此命君牙爲大司徒又曰𢎞敷五典五典即五教也而以爲有虞氏五周十有二何也蓋十有二教不可即以爲五教也爾身克正罔敢弗正民心罔中惟爾之中此言敷五典以和民則其本在於君牙身之正心之中也傳曰君子有三恕有君不能事有臣而求其使非恕也有父不能報有子而求其孝非恕也有兄不能敬有弟而求其聼令非恕也然則敷五典以和民則若不能盡父子之道而求斯民之父慈子孝可乎不能盡兄弟之道而求斯民之兄愛弟恭可乎以至於君臣夫婦朋友之間莫不然其爲不恕莫大於是雖使其號令之諄復政刑之嚴明終不能以和之也是必以身觀身以心觀心爾身之正然後可以求民之正爾心之中然後可以求民之中身誠正矣心誠中矣則其教化之所漸摩道徳之所鼓舞其孰有不中不正者乎王氏以身正爲政以心中爲徳意欲以分優劣淺深此蓋泥於孔子曰政者正也子率以正孰敢不正既以身之正爲政則必以心之中爲徳矣殊不知心正身脩豈有二道哉於身則先言爾於心則先言民蓋反覆言之以發明其意也祁寒盛寒也君牙竊意其以司徒而兼行三公之事者故以暑雨祁寒爲言欲其爕理隂陽以稱三公之任故也以六卿兼三公此周家之制周公召公毛公畢公是也四時運行一寒一暑雖本於天而所以爕調之者實本於人蓋天之與人精神有以相感者也使夫寒暑之失其常時雨暘之失其常度民豈以爲天之過哉其怨恨咨嗟之聲必以爲君相所致則夫居三公之職而佐天子以爕理之使夏無愆陽冬無伏隂咨怨之聲無自而發不可以不爲難而忽之也自漢以來隂陽一不調宰相之知大體者未嘗不引慝而歸於已天下之人未嘗不歸咎於宰相漢丙吉行逢人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣或以問吉吉曰方春少陽用事未可大熱恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調爕隂陽職當憂是以問之唐武后嘗季秋出梨花示宰相宰相以爲祥杜景佺曰隂陽不相奪倫瀆即爲災今草木黃落而木復華瀆隂陽也恐布徳施令有所虧紊臣位宰相助天治物治而不和臣之咎也此皆引慝以歸於已若夫楊再思爲相時水沴閉坊門以禳有車䧟于濘斥牛不前恚曰癡宰相不能和隂陽而閉坊門遣我艱于行則所謂怨咨者矣方其未調之前視之豈不爲艱及其既調之後視之則爲易故當思其艱以圖其易蓋至於易則無有咨怨者此民之所以寧也文王之居于岐周也雖三分天下有其二以服事商然伐紂之謀蓋自文王而啓此文王之謨所以爲丕顯惟文王之大統未集則武王伐商之功所以繼其志述其事而已此武王之烈所以爲丕承其曰丕者王氏謂積小成大蓋以楊子曰由小致大不亦丕乎故也文王之謨武王之烈所以開啓佑助我後之人者皆以正道而無有廢缺既無廢缺故紀綱法度所以盡得其條理而四海之内所以盡得其所若六月之序言鹿鳴廢則和樂缺之類以厲王之世廢缺如此則其失正者多矣故四夷交侵中國衰㣲以其缺而不振如此則知當穆王之世正而罔缺其盛爲如何哉惟其謨烈之盛汝當有以維持而昭明之故惟敬明其五典之訓則可用以奉順先王之道荅揚文武所以啓佑後人之光命而追配于汝之前人祖考也此言文武之謨烈蓋欲君牙洪敷五典以奉順之也王氏則以謂聖人所以爲謨烈亦敷五典之教以和五品之民殊不知謨烈者但指伐商之事楊龜山已辨之矣先正蘇氏曰周召畢公之流是也言君牙惟當率由先正舊典而式之蓋以民之治亂惟在此式與不式而已此篇所言者每以纘祖考爲言此又曰先正亦猶成王之告康叔既曰祗遹文考而又曰敷求殷先哲王别求古先哲王也既式先正而又循其祖父之所行則汝君之有治功於是而昭顯矣蓋君之治功實自於臣臣能稱職則其功必歸於君此古今之常理也蘇氏曰予讀穆王之書三篇然後知周徳之衰有以見也夫昭王征而不復至齊威乃以是問楚是終穆王之世君弑而賊不討也而王初無憤耻之志今觀君牙伯冏之書皆無哀痛惻怛之語予竊謂不然南征不復之事載於左傳使穆王誠無憤耻之意是誠可罪然夫子之於書雖平王不克終然其一時有志於中興之言夫子取之雖秦穆公不能踐言然其一時悔過自艾之語夫子取之此文侯之命秦誓所以預於百篇也如穆王之三篇其言純正明白有功於治體夫子亦以是而取之不得以昭王之事而謂其周徳之衰有見於此夫子豈以其衰而取之乎左傳以爲昭王不復而吕氏春秋曰昭王親將兵征蠻荆辛餘靡長且多力爲王右還反涉漢梁敗王及祭公隕于漢中辛餘靡振王北濟又以昭王爲脱於難不知何也冏命周書穆王命伯冏爲周太僕正作冏命冏命王若曰伯冏惟予弗克于徳嗣先人宅丕后怵惕惟厲中夜以興思免厥愆昔在文武聰明齊聖小大之臣咸懐忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休惟予一人無良實頼左右前後有位之士匡其不及繩愆糾繆格其非心俾克紹先烈今予命汝作大正正于羣僕侍御之臣懋乃后徳交修不逮慎簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖后徳惟臣不徳惟臣爾無昵于憸人充耳目之官廸上以非先王之典非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟予汝辜王曰嗚呼欽哉永弼乃后于彞憲伯景臣名大僕正僕官之長漢孔氏謂大馭中大夫案周官司馬之屬大僕下大夫二人祭僕中士六人御僕下士十有二人注曰僕侍御於尊者之名大僕其長也大馭中大夫二人戎僕中大夫二人齊僕下大夫二人道僕上士十有二人田僕上士十有二人注於大馭而下曰馭之最尊於戎僕之下則不曰馭言僕者此亦侍御於車周官大僕既爲僕官之長先儒不以大僕正爲大僕而乃以爲大馭者蓋大僕既下大夫而大馭乃上大夫此篇又曰正于羣僕侍御之臣曰羣僕則戎僕而下皆是戎僕中大夫其位在於大僕之上故知是大馭也且大僕之職王出入則爲前驅而已大馭掌馭王輅與王同車既親近於王而又位爲最長則大僕正非大馭而何不言馭而言僕者此亦周禮注所謂侍御於車者也穆王得伯景以爲賢而命之以爲羣僕之長蓋僕御之官雖若卑賤而人主之徳所以或成或不成者實係於此以其與王同車爲最親近故也既得賢者以爲其長則羣僕無非賢者矣故穆王以册書命之而史官記載以爲此篇此篇與君牙皆是命體君牙之命篇則但以其名此則去伯而加以命字是亦各其史官一時之意也怵惕憂懼之意孟子曰今人乍見孺子將入於井莫不皆有怵惕惻隱之心則怵惕者心之不安也故曰怵惕惟厲厲危也言我不能修徳而乃繼先人以居大君之任懼其不克負荷以遺先人之羞故怵惕然不自安半夜而興思所以免於愆過也穆王之命君牙曰心之憂危若蹈虎尾其命伯景則曰怵惕惟厲成湯之所謂慄慄危懼者亦不是過也而蘇氏曰二書皆無哀痛惻怛之語此非惻怛之語而何自昔在文武以下則所言免厥愆者惟在於小大左右之臣莫非正人也昔文王武王之君天下其徳之積於身者聰足以聼徳明足以視逺而又有齊聖之徳則徳之充實輝光可謂至矣文武之徳所以盛者則以其在朝之臣無小無大皆懐忠良之道雖其侍御僕從之在左右者亦無非當世之正人此諸臣於旦夕之間有以承弼其君獻可替否陳善閉邪彌縫其闕而匡救其惡此聰明齊聖之徳所以盛也故其出入起居則無有不欽發號施令則無有不善以此之故下民敬順之而萬邦至於皆美也此皆盛徳之所致而徳之所以盛則以其臣承弼之所致也觀立政言文武之臣不徒常伯常任準人之得人也至於虎賁綴衣趣馬小尹左右攜僕庶常吉士則其侍御僕從罔匪正人可知矣夫人君之所以治天下者不惟朝廷之大臣欲得其人至於左右近習尤不可以非其人使左右而非其人則朝夕與之居處漸染浸漬入於邪僻而不自知雖大臣或得天下之傑而君心已蠧孰與有爲哉孟子曰一薛居州獨如宋王何故雖小大忠良必侍御僕從皆正人而後可中庸曰惟天下至聖爲能聰明睿智足以有臨也寛裕温柔足以有容也發强剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也蓋文武所謂聰明齊聖者也見而民莫不敬言而民莫不信行而民莫不悦是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天地之所覆載日月之所臨照霜露之所墜凡有血氣者莫不尊親則所謂出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休者也論聖人盛徳無以加此蓋其積諸中者既充實輝光而不可揜則其發於外者其機如此理之必然也而文武所以爲徳者蓋本於臣之力文武猶不能自成其徳况穆王乎故穆王自謂無良必頼於左右前後有位之士匡正其不及而彌縫之繩正其愆過而糾察其繆尤以格其非心則可以克紹先烈也孟子曰人不足與適也政不足與閒也惟大人爲能格君心之非而後國定故穆王之紹先烈必本於此曰不及曰愆曰繆曰非心其實一也皆欲其輔贊彌縫致於無過之地而後已惟其有頼於左右前後之臣故今我命汝作僕官之長凡羣僕侍御之臣汝皆有以統率而正之則可以勉進君徳而交修其所不及焉羣僕即戎僕齊僕之類羣僕侍御即所謂左右前後之士穆王欲左右前後之得其人惟得一伯景可矣蓋鸞隼不同翼薰蕕不同噐君子小人不同事惟賢爲能知賢惟善爲能舉善伯景正則羣僕侍御而有一不正者必不能與之一朝居也故左右前後皆不可以非其人而其要則在於其長汝既爲僕官之長則夫羣僕侍御之臣與汝同僚者汝當謹擇之不可以巧言令色便僻側媚之人而進之惟吉士則可也便僻側媚皆謂不以正道事其君者也大僕正中大夫耳而得以慎簡乃僚則知周之世官長皆得自辟其僚屬也故唐陸贄請臺閣長官得自薦其屬而引此以爲言魏元同論選舉法弊亦引此也羣僕之臣皆以正道事其君則其君必正夫蓬生麻中不扶自直習與正人居其勢不能無不正若其阿諛以媚其上則其君必自以爲聖蓋其君之處心行事曽未及堯舜禹湯之萬一而其臣佞之以爲逺過於堯舜禹湯則豈不自負以爲聖乎昔子思言於衛侯曰君出言自以爲是而卿大夫莫敢矯其非卿大夫出言自以爲是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之詩曰具曰予聖誰知烏之雌雄抑亦似今之君臣乎蓋臨亂之君如桀紂幽厲未有不自以爲聖者以其臣之諛也夫自以爲聖者譬如掩耳盗鈴已則不聞其聲而謂他人亦不聞之惟僕臣之正則其后克正諛則其后自聖自后之徳與夫不徳惟在於僕臣也惟后之徳與不徳皆在於僕臣故穆王之命伯景也其言諄諄反覆惟欲其謹擇賢類以交修于我一人也漢世驂乗之官最爲要重以其職於天子爲親近故每用於天子素所倚信之人一非其人則其臣力爭以爲不可此蓋得周之遺法穆王之遺意文帝使趙談驂乗袁盎伏車前曰天子所與共六尺輿者皆天下豪傑今漢雖乏人獨奈何與刀鋸之餘共載文帝笑下談談哭下車成帝遊後庭欲與班倢伃同輦載辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止此漢家之制度然也耳目之官即羣僕也以其在王之左右前後而懋乃后徳交修不逮故謂之耳目之官惟僕臣之重如此汝之所以擇之也不可不謹不可親昵于小人以充此耳目之官以小人而充之則必導上以非先王之典矣汝所用者皆非其人之吉善但以行貨之故遂以爲吉而薦之若是則必不能任官而病之矣薛博士曰詩刺皇父擇三有事亶侯多藏此惟貨其吉是也漢韓安國以五百金遺田蚡蚡言於太后遂召用之唐杜黃裳納髙崇文錢四萬五千緡薦之平蜀安國崇文固可用然乃以其貨而得舉論者深以爲罪况非其人哉若用行貨之人而使之病其官則是汝大不能敬其君我實以爲汝之罪也景子謂未見子之所以敬王孟子則謂其人無以仁義與王言爲不敬莫大乎是此穆王以用行貨之人爲大不祗厥辟之意蓋人臣之所謂恭敬固不在於聲音笑貌之間也欽哉此終戒之以不可不欽也穆王之於景既戒之以巧言令色便嬖側媚之人又戒之以憸人又戒之以行貨之人蓋若人而用之則豈能弼汝君以常法哉汝當輔弼其君永以常法則惟當謹簡吉士而已後世之論穆王者多過其實左氏傳曰穆王欲肆其心周行天下將皆必有車轍馬迹又有謂得八駿以造父爲御西廵守㑹西王母於瑶池蘇氏因之遂以穆王之書爲周徳之衰今觀此篇其言純正明白切於治體彼其於僕御之臣丁寧反覆如此至謂慎簡乃僚無以便嬖側媚則其僕御豈有敢導王爲非者而王之言既然則亦豈肯爲無方之遊哉以是知世之論穆王者皆好事者爲之也當以書爲正尚書全解卷三十八
