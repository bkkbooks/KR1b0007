body:
  text: 尚書全解卷十六宋林之竒撰太甲上商書古者簡册以竹為之編次而成篇一篇之所編不可以多也故其文之多者或析而為二或析而為三以便於習讀析而為二者則於篇名之下加上下二字以别若禮記曲禮檀弓雜記孟子梁惠王公孫丑等篇是也析而為三者則有上中下之别如經所載太甲盤庚説命泰誓是也其所以析之為二為三者本於簡册之繁多其勢不可合而為一故出於不得已而然也至於後世既以紙易簡册則其一篇所載足以容古者百餘簡之所書而世之文人不悟夫古人分篇之意獨有泥於簡册之制者如桞子厚時令等篇皆分為上下篇李翺之復性書分為上中下篇皆是泥於古制不逹夫時變者惟韓退之之制作未嘗如此觀其原性等書雖有長短不同而皆别立篇名各盡其意而已未嘗離為上下以泥古制此皆得體可以為後世屬文之法也史之分篇為三有分而為上中下者若太甲盤庚説命泰誓是也有不分為上中下而以篇名為别者若皋陶矢厥謨禹成厥功帝舜申之作大禹皋陶謨益稷成湯既沒太甲元年伊尹作伊訓肆命徂后成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材據此皆以序而有三篇亦可以分為上中下而但以篇名為别者此蓋出於一時史官各自以其意題其簡編以為别異耳非有深義於其間也此篇名以太甲者唐孔氏曰伊訓肆命徂后與此三篇及咸有一德皆是伊尹戒太甲不可同名伊訓故隨事立稱以太甲名篇此説是也此篇亦是訓之體不可以名伊訓故别之曰太甲史記載太甲篇序以為太甲訓三篇意者漢之時此篇名猶有訓字而後世失之也然而太史公父子皆未嘗見孔壁中書此篇在孔壁二十五篇之內是乃孔安國所傳遭巫蠱事而不出者也太史公既未嘗見古文故於殷本紀但總篇序之言而臆度之是以全與此篇內不合其説以謂太甲既立三年不明暴虐不遵湯法亂德於是伊尹放之於桐宫三年伊尹攝政當國以朝諸侯三年太甲悔過改善於是伊尹乃迎太甲歸于亳而立之太甲修德諸侯咸服百姓以寧伊尹嘉之遂作訓太甲三篇以褒太甲據經之所載乃是自太甲不惠阿衡以至於營于桐宫而歸于亳史官述其本末之詳非是伊尹之嘉太甲而作是篇也中篇曰惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳則其所以不明者惟在於即位數月內耳故至於終喪則已悔過自艾而被冕服以歸于亳太史公乃謂既立三年不明暴虐亂德於是伊尹放于桐宫其説皆與經文不同蓋未嘗真見古文尚書而妄為之説班孟堅於孔安國傳又謂安國為諌議大夫授都尉朝而司馬遷亦從安國問故遷書載堯典禹貢洪範微子金縢諸篇多古文夫遷實未嘗見古文書其史記所序惟伏生書耳而孟堅乃以謂其多載此又孟堅之失也太甲既立不明伊尹放諸桐三年復歸于亳思庸謂太甲既立數月不用伊尹之言不明居喪之禮也桐宫湯之葬地也太甲既背伊尹之訓不可以言語口舌爭矣於是使之往居墓側加之以放逐之名致之於憂患之地以作其憤悱之意至於三年喪服已畢而能悔過遷善克終允德於是自桐宫復歸于亳而思用伊尹之言也故曰三年復歸于亳思庸自始立至於放而復歸伊尹每進言以戒之史序其事以作太甲三篇雖實史官之所序而其所言則皆伊尹之言故推本其言所自出而曰伊尹作太甲三篇首尾序述以盡出於伊尹之手也伊尹作太甲三篇太甲惟嗣王不惠于阿衡伊訓肆命徂后太甲三篇咸有一德皆是太甲末年商史所録故其敘述先後本末相屬成文若史家本紀之所載也但其簡册繁重故分而為七耳惟嗣王不惠于阿衡此文勢與上篇伊訓肆命徂后相屬蓋自太甲之立伊尹所以丁寧嗣王激切論興亡禍福之理以告戒之者可謂深切著明矣然誨爾諄諄聽我藐藐曽無從順之意也其下流之性所以陷溺其心者深故言雖切而未易入也伊尹自湯伐桀之時既為相矣及太甲既立實以冡宰總百官其曰阿衡者尊之之稱也猶周以太公為尚父齊以管仲為仲父也髙宗命傅説其稱伊尹曰昔先正保衡作我先王保衡即伊尹也古者大臣居人主之左右輔翊主德者蓋有阿衡之名王莾依放古制建公輔之官甄邯為太保劉歆為少阿甄豐為太阿以是知阿保皆師傅之官尊之之稱也伊尹稱阿衡蓋其一時所以極其推尊之意者其義則無傳焉孔氏曰阿倚衡平言湯倚而取平王氏云保其國如阿平其國如衡此皆是隨字立義未必得其當時所以命名之旨猶毛氏解尚父曰可尚可父云爾伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祇肅天監厥德用集大命撫綏萬方作書者作為簡册之書以陳其所勸戒之意若後世之章疏也漢世簡册未變故其以章疏進説於上者以皂囊封之謂之上封事蓋其所由來逺矣楊子曰捈中心之所欲通諸人之㗲㗲者莫如言著古昔之昏昏傳千里之忞忞者莫如書蓋古人之所以宣其意者惟書與言爾伊尹明言烈祖之成德訓于王此其言也自先王顧諟天之明命以下則其書也漢孔氏云顧謂常目在之諟是也唐孔氏曰諟與是古今之字異故變文為是也言先王每有所行必視是天之明命常目在之以顧為常目在之理固然也至以諟為是非之是則又無所據王氏曰諟以言其不違蘇氏曰以言許人曰諟亦皆是率意而為此説未敢以為信詳考經意曰先王顧諟天之明命但謂天之明命吉凶善惡皆以類至其福善禍淫若影響之應形聲先王知命之可畏也如此故其兢兢業業洋洋乎如在其上如在其左右雖一言一動皆不敢忘也詩曰敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾遊衍此則顧諟之意也惟知其天命之可畏顧諟而不敢忘故上以承于天神下以承于地祇以至社稷宗廟無不致其祗肅蓋其所以事鬼神者出於其嚴恭祗事之誠心而不區區於犧牲玉帛之間矣惟其誠意之孚如是故其馨香之德感于神明而天監之遂集天命於其身使之克夏以有天命而撫綏萬方之民也蓋成湯之所以由七十里而有天下其恭則自於寅畏上天之命其事則見夫致恭盡禮於祭祀之間洞洞乎屬屬乎如弗勝如將失之則其感格于天地鬼神之意受明命以式九圍非自外至也商道事神明鬼之俗蓋出於此此蓋成湯之所以詒孫謀以遺後世者故伊尹作書以戒嗣王首及於此也惟尹躬克左右厥辟宅師肆嗣王丕承基緒惟尹躬先見於西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟沗厥祖惟成湯盡其寅畏兢兢業業之誠以膺上天之所眷命撫綏萬方故我能以左右輔翼之以奄宅此天下之衆故嗣王得以大承基緒蓋謂非湯之自能克慎厥德則雖伊尹亦無所致其左右之力而嗣王亦無以享其盈成之業也尹伊尹名唐孔氏曰孫武兵書及吕氏春秋皆云伊尹名摯則尹非名也今自稱尹者蓋湯得伊尹正天下故號曰尹人皆呼之為尹故亦以尹自稱禮君前臣名不稱名者古人質直不可以後代之禮約之此説不然伊尹每自稱必曰尹躬則其君前臣名也審矣孫武吕氏春秋之言非所以為據也前既言成湯自慎其德然後伊尹得以左右之然其義猶未盡也詩曰商鑒不逺在夏后之世其君相之間所以克終與不克終可以為鑒而盡其義也夏都安邑其地在亳之西故謂惟我尹躬見此有夏先世之君自能以忠信而有終故其相亦能克終周忠信也論語曰君子周而不比小人比而不周孔氏曰忠信為周阿黨為比忠信而謂之周者施博士曰作偽者心勞而日拙則當缺露而不周忠信則無偽矣自能周而無缺此説是也其後世之嗣王謂桀也既不能以忠信自周而有終故相亦不克終蓋相之所以克終者惟係諸君而已君有終則相得其終君罔克終則相亦罔終矣伊尹言此者蓋謂湯之顧諟天命盡其恭敬以事天地社稷宗廟可謂自周有終矣故我得以左右厥辟宅師而有終也今太甲承湯之基緒苟不能以忠信有終則我亦何以克終哉言欲使我能致其克終之效惟在嗣王先能有終而已故又繼之曰嗣王戒哉言不可以不戒慎也所以戒慎者當敬爾為君君不敬其為君則將忝辱爾祖矣王惟庸罔念聞伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彥啓迪後人無越厥命以自覆慎乃儉德惟懷永圖若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭孟子曰人不足與適也政不足與間也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣伊尹作書以戒太甲其反覆所陳若此者蓋太甲至於欲敗度縱敗禮殊不以社稷之安危為念者其意必以謂伊尹之力足以任天下之重吾雖盤樂怠傲然有伊尹在必不至於亡也故伊尹為之稱其祖成湯慎德於先然後已得以左右之於後夏之先世能以忠信有終則相亦惟終其後嗣王不克有終則相亦罔終且告以辟不辟忝厥祖蓋以謂苟不能盡其為君之道則我亦末如之何矣意此蓋以格其心之非也漢昭帝薨霍光迎昌邑王賀賀亦恃有霍光為之輔佐故其即位以後行淫亂益甚凡二十七日而為光所廢其見廢也謂霍光曰聞天子有爭臣七人雖無道不失其天下彼蓋以謂我雖無道而光猶可恃以不失其天下也太甲之意諒亦如此然伊尹之於太甲則為之稱道今古以教誨之至於再三而猶不改然後營桐宫而使居之卒至於克終允德而霍光之於昌邑王直廢之而已烏覩所謂格君心之非者哉不格其心之非而遂廢之廢之而更立君而田延年以謂是舉也合於伊尹之廢太甲光遂信以為誠然光之不學無術也如此孔子曰惟上智與下愚不移蓋上智不可移而為愚若堯舜之不可與為惡是也下愚不可移而為智若桀紂之不可與為善是也苟智而未至於上智愚而未至於下愚皆可移也故智者而與之為惡則將移而為惡愚者而與之為善則將移而為智此則謂中人之性以其可上而可下也太甲實中人之性也伊尹知其性之可移而為智故諄諄然以誨之則冀其改過以遷善然其所性雖可移而未易移也故誨之諄諄聽我藐藐而有類夫下愚之不移者蓋由其所陷溺者深故其移之為難惟其有可移之理而移之為難是雖終於克終允德而其始也則猶罔念聞於伊尹之言也薛氏曰王惟庸者王當思而用之也罔念聞者心不是念耳不是聽也王雖罔念聞而伊尹所以繩愆紏繆格其非心之意不可以已也故於是又申前之義以謂先王所以授我以遺孤之託凡欲使我以道德仁義輔導爾子孫而已今至於欲敗度縱敗禮則是我之所以輔翼者不至而負乃祖所以寄託之意為罪大矣故為之詳陳所以祗厥辟之義其言寬而不迫遜而不怒優遊饜飫以入之也昧晦也爽明也昧爽者或晦或明也或晦而或明未旦之時也言先王於未旦之時大明其德正心誠意養其平旦之氣以待平明出而聼朝也其所以孜孜汲汲不遑寧處者無他惟欲旁求俊彥之士以啓迪爾後世之子孫而已蓋古之所謂託六尺之孤者非特扶持其位使之不傾而已必使之成就其德正之直之輔之翼之以格其非心使之知創業之艱難念守文之不易而為成德之主斯無負於寄託矣如太甲成王皆中材之主伊周受託於湯武而相之皆能使其德之成就而為一代之顯王蓋湯武之所以託之者如此而伊周所以不負其所託者亦以此至於後世所謂受遺託孤者則不復論其德之如何惟冀其位之不失而已如霍光諸葛孔明世皆以伊周許之豫嘗觀此二人者其忠義之心誠無負於國家社稷其視曹孟德司馬懿輩欺人孤兒寡婦而奪之位譬如霄壤之殊而較於伊周之事則非二子之所及也何則不能啓迪其主之德以格其君心之非使為成德之主而徒屑意於事為之末則僅能使其位之不傾而已故伊尹論其所以授寄託於先王者則以啓迪後人為言蓋所以成就爾太甲之德者是湯之所以望於我也湯之所以望於我以啓迪後人者其任固専於伊尹而曰旁求俊彥者以見湯之立賢無方其所賴以啓迪者衆也惟伊尹與其一時之俊彥咸以啓迪為任而今也太甲欲敗度縱敗禮誨之諄諄聽我藐藐則是將隕越厥命以自取覆亡雖有俊彥亦末如之何矣欲無越厥命以自取覆者則在於求其所以自顚覆之道而反諸其本故曰慎乃儉德惟懷永圖此蓋所以啓迪之也秦為宫室之麗起咸陽而西離宫三百鐘鼓帷帳不移而具而其後世曽不得聚廬而託處為馳道之麗東窮燕齊南極吳楚隱以金椎樹以青松而其後世曽不得蓬顆以蔽冢而託葬自古人君侈靡之極者無如秦而亂亡之速子孫無置錐之地亦莫若秦蓋奢侈敗亡之徴也禹卑宫室菲飲食惡衣服豈故為是儉陋而已哉誠知夫懷永圗者必自夫慎乃儉德故也太甲欲敗度縱敗禮蓋已昧夫所謂永圗矣苟其駸駸焉日入於奢侈而不知反則至於越厥命以自覆亦豈難哉故所以格其非心而反之於善者則蔽以一言謂欲懷永圗必自夫慎乃儉德可謂切中其疾夫人臣之進諫於君如醫者之用藥惟其切中所受病之處苟為以寒益寒以熱益熱則是促人之死而已如漢之武帝可謂窮奢極侈而不知紀極矣而董仲舒對䇿於其時以謂儉非聖人之中制者此則與夫公孫𢎞所謂人主病不廣大人臣病不節儉者無以異也議者論仲舒之䇿緩而不切以此言觀之則其言豈非緩而不切也哉慎乃儉德惟懷永圗言之於太甲縱欲之時可謂不費辭矣能懷永圗以慎乃儉德則神全氣定不為外物之所變遷其心安然而不撓然後可以泛應萬機之務而無有過舉矣故繼之曰若虞機張往省括于度則釋此言應物之審也機弩牙也括矢括也度其所準望蓋正鵠也弩之發者在機矢之所中者在括苟能虞機而張之省括于度而釋之使機必應于括括必應于度則百發而百中苟此三者差之於毫釐之間則失之者在尋丈之外矣楊子曰修身以為弓矯思以為矢立義以為的奠而後發發必中矣其立意正與此同所謂奠而後發者則虞機省括之謂也夫其應物之審如此故能欽厥止以率乃祖攸行夫為人子孫者孰不欲率其祖之所行苟使應物不審而不能敬其所止則其心蕩然無所適從而小人之善紛更者得以進其嘗試之説於是變亂先王之政刑至於小大而天下始大亂矣伊尹之告太甲其序如此者蓋太甲之不明也由其不惠于阿衡故至於欲敗度縱敗禮由其縱欲以敗度禮故至於顛覆湯之典刑是以其啓迪之也首告以先王所以旁求俊彥遺爾後人次又告以儉德之為可永圗末遂告之以欽厥止率乃祖之攸行蓋其所以繩愆紏繆格其非心者不可不推本其所以然者也王能如此則我伊尹之心乃可以喜恱其無負先王之所寄託而至於萬世猶有辭也有辭蓋謂為萬世之所稱也是所謂相亦惟終者也苟使嗣君終不能改過自艾則越厥命以自覆而商之社稷遂不復存則相亦罔終矣尚何至於萬世有辭也哉王未克變伊尹曰兹乃不義習與性成豫弗狎于弗順營于桐宫密邇先王其訓無俾世迷王徂桐宫居憂克終允德伊尹雖丁寧懇切如此而王猶安於不善未能變也故伊尹以謂此乃習於不義之事且將失其所固有之性而淪於惡習且將與性俱成於惡矣夫苟其所固有之善猶有存者則其所以諄諄以誨之者如此之深切著明豈不少悟而知所愧恥者哉今也曽是莫聽安其危而樂其所以亡者則是不義之習殆將成其性若其固有者矣豈復可以言語而動之哉故當此時可以勢動而不可以理聽也故惟使之弗狎習于弗順之事而放僻邪侈之習皆無因而至前則其外馳之心息矣而又有以動其哀戚之情而作其愧恥之意是以孝敬之心油然而生矣雖不暇諄諄而誨之而其反於善也蓋有不期然而然矣故曰豫弗狎于弗順營于桐宫密邇先王其訓無俾世迷蓋於是營之於成湯之墓側而使居之以密邇先王而思其訓無使終迷而不反也墟墓之間未施哀於民而民哀既奪其所嗜好之習而致之於哀戚易感之地放逺小人之黨擇賢俊而與之居彼其至於自怨自艾處仁遷義蓋理之必然也王於是而往桐宫而居憂卒能思念其祖而終其信德也孟子曰教亦多術矣豫不屑之教誨者是亦教誨之而已矣蓋君子之教人有如時雨化之者有成德者有逹材者有答問者有私淑艾者若夫道之而弗從誘之而不逹而君子猶不忍棄也而私以善淑之使之憤悱啓發入於善而不自知此不屑之教誨也王制論先王之教民其不帥教者命國之右鄉移之左左鄉移之右不變移之郊又不變移之遂又不變然後屏之逺方終身不齒此皆不忍絶之於自棄之域而私以善淑之蓋所謂不屑之教也伊尹之於太甲誨之諄諄聽我藐藐度其不可以教也則營諸桐宫而使居焉以感動其憂戚之心終以克終允德非不屑之教而何然而以不屑教之而其名曰放者蓋其所以欲敗度縱敗禮道之而弗從誘之而弗逹者彼以為伊尹受成湯寄託之重以天下為己任我雖無道而有伊尹必不至於亡也其所見如此非有以摧折激勵以生其憂患之心則若存若亡終不可得而正也故其遷之於桐宫命之曰放蓋示以將廢而不得立彼知其將不得立也於是憤悱而反於善此其所以為教也然則使太甲而終不改則奈何是亦廢之而已蓋其遷於桐宫也既處之於人情天理之極以觀之矣於人情天理之極而不知自反焉是無所可望也已古之人將知人君之德必於其哀戚之所感動者而觀之當哀戚而不哀戚豈復可以君天下乎魯襄公卒欲立公子禱穆叔不欲曰是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患武子不聽卒立之比及葬三易衰衰祍如故衰而昭公卒以不終漢成帝為太子中山哀王薨太子前弔元帝感悲不能自止而太子殊不哀元帝大恨曰安有人不慈仁可奉宗廟為民父母乎而成帝卒為漢室基禍之主蓋人情天理之極苟為有人之心者則宜於此焉變矣於是而不變尚何望焉使太甲居桐宫遭放黜而憤悱哀戚之心不由是而感發則雖與天下共廢之可也惟其困於心衡於慮而後改作也故終有天下為商太宗天下萬世仰其德之無斁是放之之效也世徒知伊尹之放其君而不求其所以放之之意則是伊尹不免於慙德而亂臣賊子亦將以之為口實矣故孟子發明其心以貽天下後世曰有伊尹之志則可無伊尹之志則篡也此言簡而盡矣太甲中商書惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳曽子曰愼終追逺民德歸厚矣先王之所以制為喪祭之禮豈苟為是文飾而已哉蓋以孝慈之心人皆有之民之所以生厚者其本在於此故先王之制禮使民知喪以慎終祭以追逺事死如事生事亡如事存以反其所謂孝慈之本苟其心之所固有者油然而生則自能歸厚矣太甲即位之初般樂怠傲不明居喪之禮伊尹推本其心術之所蔽惟其孝慈之心不篤故至於是遂乃營桐宫之地使之往居焉蓋使之慎終追逺以生其孝慈之心而反之於忠厚也彼太甲之性既非下愚之不移而一旦去其般樂怠傲之習寢苫塊啜粥面深墨以居始雖出於勉強不得已而為之及其久也則其固有之性發於哀戚之間殆有不期然而然者故及其終喪也則既能處仁遷義非復昔日之太甲矣故伊尹於是迎之以歸當是時也以天時言之則適當夫三年之喪畢冢宰之攝國事至是而可以歸政以人事言之則太甲徂桐宫居憂密邇先王其訓至是而亦可以即政矣伊尹可以歸政太甲可以即政天時人事於是而合此所以順天人之望而迎之以歸也太甲以元年十一月居仲壬之喪至此三年十二月朔蓋二十五朔祥禫之祭已畢於前月至是則可以變凶而即吉矣故伊尹以吉服奉之以歸于亳也周官司服王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則玄冕六冕冕皆有服其服皆玄衣纁裳此但云冕服不言其冕之名漢孔氏但以冕為冠亦無明説唐孔氏云天子六冕大裘之冕祭天尚質辨師惟掌五冕備物盡文惟衮冕耳此蓋衮冕之服義或然也以冕服奉嗣王歸于亳蓋於是除喪即位而始踐天子之位也作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥德實萬世無疆之休王之歸亳蓋喜其能處仁遷義而不墜成湯之業也於是作為簡册之書以稱美之曰民非君則無能相胥正以生不能相胥正以生則亂矣君非民則無以君四方無以君四方則亡矣言君民之勢相待以存也夏之民惟其遭桀之亂不能相正以生故相率而去以就湯而君之湯以民之歸之故遂以君四方而有天下蓋民之情至於亂而無以正之則固擇夫能正之者以為君之而賴之以君四方矣太甲之始不明厥德斯民已擇其所以能正之者而君之若去桀而從湯矣當是時雖伊尹亦末如之何也故太甲之不明於初是乃取亂亡之道也有可以取亂亡之道而卒能處仁遷義以念成湯之訓此豈人力之所能為哉蓋以皇天之於商家眷顧佑助之不使成湯之業再傳而遂亡也故天誘其衷於冥冥之中使嗣王克終厥德則民所賴以生者不失其正之之望矣民不失其所望我商家之所以君四方者又可以保之而不失矣是誠萬世無強之休美也夫太甲之所以能終厥德者是誠伊尹之力也蓋非營桐宫而使居之致之于哀戚之地加之以放逐之名以作其憤悱之志則太甲亦終為下流之歸而已而其所以奉之歸亳作書以序其意乃以為皇天眷佑有商俾嗣王克終厥德雖實一時謙抑之意然君子能致人於悔過遷善之地而不能必其人有悔過遷善之心伊尹之始事湯蓋嘗五就桀矣豈非以夫民所賴之胥正以生者在桀將欲使之遷善悔過而不失其所以辟四方之道乎其所以事桀者雖不得而盡見然以夫所以成就太甲之德者而觀之則其於桀五就之而不厭所以使之遷善逺罪者必已盡其道矣而桀之下愚終無自怨自艾之意故伊尹不得已相湯而伐之今也太甲乃能聽其訓己之言而克終允德非天之眷佑有商疇克爾哉竊謂天之於人其吉凶禍福之間若未嘗有切切然與於其間者然而要其所終而究其成則實未嘗有錙銖之差積善之家必有餘慶積不善之家必有餘殃成湯之孫宜其餘慶之所鍾無有不善者而太甲為之孫秦始皇之後宜其餘殃之所逮無有令淑之人而扶蘇為之子太甲為之孫冝商祚遂至於亡矣然而成湯以寬仁之德伐夏弔民以有天下其善之所積者厚矣豈應一再傳而遂亡哉故雖太甲欲敗度縱敗禮而終克終允德以守成湯之業此無他以湯之社稷有必存之理則雖太甲為之孫而終不亡也扶蘇之仁厚而為秦始皇之子則秦若可以存矣然始皇虐用其民以殘虐嗜殺而得天下其不善之所積者厚矣苟使扶蘇立則秦未可以遽亡也故始皇崩於沙丘而扶蘇卒以得罪重之以二世之暴戾而秦遂以滅此天實以秦之社稷有必亡之理則扶蘇為之子而終亦不得存也論至於此則是天地報應之理雖若眇忽茫昧而不可曉及要其極致而究其所以然則不啻若影響之應形聲可不戒哉王拜手稽首曰豫小子不明于德自砥不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圗惟厥終拜手首至手也稽首首至地也既首至手乃復申頭以至於地欽之至也臣之於君則有此禮太甲之於伊尹而拜手稽首者盡欽於師保故其禮如此蜀先主敕後主曰汝與丞相從事事之如父太甲拜手稽首於伊尹是亦事之如父也非其事之如父則其放之也安得不怒其復之也安得而不憾彼商人之見其或廢或立皆在其掌握亦安得而不疑也哉太甲既拜手稽首矣於是悔謝前過而述其自怨自艾之意以謂豫小子不明于己之德喪其固有之良心而自致於不類不類猶不肖蓋謂喪其德而失人道之正也詩曰克明克類惟克明然後能克類既不明于德所以自砥不類也惟其自砥不類故欲敗度縱敗禮以速戾于厥躬王氏曰欲而無以節之則敗度縱而無以操之則敗禮欲而無以節之謂廣其宫室侈其衣服之類縱而無以操之謂惰其志氣弛其言貌之類此説比先儒為長要之多欲者必縱肆縱肆者必多欲不類之人必有此二者之失故其至於敗度敗禮而不自反則召罪戾於其身也速戾于厥躬蓋指放于桐宫之事也孽災也違逭皆逃避也天作孽謂已無以致之而其災出於天之所作者蓋無妄之災也此則可以違避若乃欲敗度縱敗禮則是自作之災孽也其召戾于厥躬必矣此則不可逃矣孟子曰不仁者可與言哉安其危而利其災樂其所以亡者不仁而可與言則何亡國敗家之有夫人必自侮而後人侮之家必自毁而後人毁之國必自伐而後人伐之遂引此言為證蓋為國家者苟有畏危亡之心常思兢兢業業以維持之而我無以致危亡之道則雖有天作之災吾猶可恐懼修省而避之苟其咎自我作安其危而利其災樂其所以亡者於是自取之而已其危亡之至豈可得而逃哉孟子之言所以申明太甲之意以諭後世也太甲云我之所以速戾于厥躬者蓋自作之咎既往者背違師保之教訓不能修德於其初矣尚有賴於伊尹正救之德圗謀其終以逭夫自作之孽也蓋於是始知伊尹之忠而望其啓沃即序所謂思庸者也夫伊尹云太甲克終厥德蓋以謂皇天眷佑有商之所致至太甲言其不明則曰天作孽猶可違自作孽不可逭不以其所不明者歸之於天何也莫之為而為者天也莫之致而至者命也古之人所為非其力之所能致者然後歸之於無可奈何而委分於天如伊尹之於太甲能言烈祖之成德以訓之至於不改又諄諄而誥戒之至於又不改則營桐宫而居之其所以自盡者能如是而已矣至於克終允德則非伊尹之所能必也而太甲遂能克終允德豈非天乎若夫太甲之自砥不類欲敗度縱敗禮實自為也豈莫之為而為之者哉實自致也豈莫之致而至之者哉故其孽皆自作之孽而不可以歸於天也如以自作之孽而歸之於天則人事廢矣西伯既戡黎祖伊恐奔告于受曰天既訖我殷命格人元龜罔敢知吉故天棄我不有康食不虞天性不迪率典而紂答之曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天殷之即喪指乃功不無戮于爾邦夫祖伊言天之命而紂亦言天命祖伊乃以為紂責命于天而深陳其不可者蓋命非人主之所言也安危存亡之勢皆於己取之而已矣苟為責命于天而謂已無預乎事則無復有悔過遷善之心矣若夫人臣之於君雖在我者能盡夫為臣之道而從與不從在夫君從之則安且治不從則危且亂從與不從之間而治亂安危分焉非己之所能必也伊尹之言太甲從之者天也祖伊之言紂不從之者亦天也故二子可以言天若太甲與紂不可以言天矣太甲以為自作孽遂終厥德紂以為我生不有命在天故至於亡學者觀諸此則可以知天命之所自出矣伊尹拜手稽首曰修厥身允德協于下惟明后先王子惠困窮民服厥命罔有不恱並其有邦厥鄰乃曰徯我后后來無罰王懋乃德視乃厥祖無時豫怠奉先思孝接下思恭視逺惟明聽德惟聰朕承王之休無斁伊尹於是而盡敬於太甲拜手稽首以致其言而又陳其所以告戒之意也孟子曰惻隱之心人皆有之羞惡之心人皆有之是非之心人皆有之辭遜之心人皆有之凡有四端於我者知皆擴而充之若火之始然泉之始逹苟能充之足以保四海苟不充之不足以事父母人有仁義禮智也豈以獨善其一身而已哉其心擴而充之使其四端之充實輝光發見於外使四海之人咸受其賜然後為能盡其性之所固有此古聖人之治天下所以始於致知格物正心誠意以修其身矣而遂舉斯心以加諸彼至於家齊國治而天下平也太甲之居於桐宫既能自怨自艾處仁遷義以聽伊尹之訓已其於欲敗度縱敗禮以速戾于厥躬者亦已悔而不復為矣於是伊尹以冕服奉之以歸于亳始踐天子之位於是時也既能處仁遷義則是既以伊尹之訓正心誠意以修厥身而成其允德矣故在夫以其仁義禮智之實擴而充之使天下咸受其賜然後為能盡為君之道是以伊尹於其始踐位既言君之與民其勢相須以生蓋其為皇天之所眷佑克終允德以為萬世無疆之休矣於是又欲善推其所為以惠及斯民也故遂告之曰人君之正心誠意以修厥身必使允行之德協于羣下之心然後可以為明后也蘇氏曰允德信有德也下之協從從其非偽者蓋欲天下中心恱而誠服苟非其德出於固有之誠心未有能至者既言其理之如是於是又以祖成湯之允德所以協于下者發明其意而盡其義也孟子曰人皆有不忍人之心先王有不忍人之心斯有不忍人之政以不忍人之心行不忍人之政治天下可運於掌上蓋先王之治天下所以能使天下中心恱而誠服者無他惟其不忍人之政出於不忍人之心而已其愛養百姓之心惟恐一夫之失其所視民之有困窮而無告者哀矜惻隱若已實致之於困窮之地者故其愛惠之心也若子然既視之若子矣豈有不能盡其所以撫字鞠育之道哉故困窮之民先王之所以受天命之本於困窮而能子惠之則其深仁厚澤無所不被蓋可見矣惟其子惠及於困窮則斯民信其有愛人利物之心矣故服其命令而罔有不恱也罔有不恱則欲以為君矣故當時與湯同為諸侯者皆鄰並而有邦矣湯所有者惟亳之民以湯為君者亦惟亳之民今也湯之德惠及困窮故鄰國之民非湯之所有者亦皆以湯為君而望其來曰徯我后后來無罰蓋是時諸侯之邦皆化於桀之虐政峻法以荼毒斯民民墜塗炭不獲保其生而湯之在亳獨以仁政至於困窮之民無不被其澤者其深仁厚澤雖其所施者未出於亳邑而其惻怛愛民之意已固結於天下故鄰國之徯之也曰我后之來其無刑罰也必矣此其所謂允德協于下者也豫竊以謂孟子之遊諸侯大率用此意蓋是時諸侯皆以暴虐為政非使民以攻戰則厚賦斂以虐之嚴刑罰以脅之孟子之意以謂今之諸侯苟有行仁政者則諸侯之為暴虐者皆為之驅民而歸之矣故曰今夫天下之人牧未有不嗜殺人者如有不嗜殺人者則天下之民皆引領而望之矣又曰彼奪其農時使不得耕耨以養其父母父母凍餓兄弟妻子離散彼陷溺其民王往而征之夫誰與王敵又曰信能行此五者則鄰國之民仰之若父母矣率其子弟攻其父母自生民以來未有能濟者也大凡此皆伊尹所謂並其有邦厥鄰乃曰徯我后后來無罰之意也惟湯之子惠困窮而其允德協于下其見於已然之效者如此今也太甲繼之既能處仁遷義克終允德矣將欲擴而充之使民服厥命罔有不恱亦如成湯之時豈有他哉惟在勉之而已故繼之曰王懋乃德視乃厥祖無時豫怠謂惟其不豫怠以勉其德則至於成湯亦不難也湯之盤銘曰苟日新日日新又日新湯之所以懋其德者其新之又新也如此豈有一時之豫怠也哉故欲懋乃德則當視乃祖之所以又日新者無時豫怠則其德愈崇而民無不被其澤矣奉先思孝接下思恭視逺惟明聽德惟聰此又告之以懋乃德之實也為湯之子孫而欲懋其德以子惠困窮使民服厥命罔有不恱苟非孝恭以立本聰明以致用其安能使其民被其澤哉故其上承祖宗之託則其奉之也不可不思孝下膺臣民之歸則其接之也不可不思恭奉先思孝則能懋乃德視乃厥祖無時豫怠矣接下思恭則能子惠困窮使民服厥命罔有不恱矣然人君以眇然之身處於九重之上垂旒蔽明黈纊塞聰而欲盡知四方情偽以子惠其困窮非其聰明足以察見人情之好惡則其聞見止於耳目所接之地而已故又在夫明足以視逺聰足以聽德然後為盡明曰視逺聰曰聽德者唐孔氏曰視戒見近迷逺故言視逺聽戒背正從邪故曰聽德各準其事相配為文此説是也而未若林子和之説為善子和云髙其目所視者逺然後可以為明下其耳所聽者德然後可以為聰此蓋言聰明之用其所施者有不同故也既能孝恭以立本聰明以致用則為君之道盡矣其能擴而充之者斯可以協于下矣伊尹之所以望大甲者既得之矣故終之曰朕承王之休無斁言我承王之休美無有厭斁者也太甲下商書伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后申重也伊尹於是重誥于王以盡其所以警戒之意蓋優遊饜飫欲其入之深而不背也書之六體典謨訓誥誓命之文雖曰其體有六亦無截然為謨為訓為誓為命之理蓋其體亦有相參混者如太甲三篇與伊訓皆是伊尹訓太甲言蓋皆訓體也而此篇曰伊尹申誥于王則訓之與誥義亦相通蓋此二字亦皆是有所警戒之意無逸曰古之人猶胥訓誥則是二字之義蓋不相逺學者於此尤不可以穿鑿通之也嗚呼者歎而發其辭也古人有言曰善亦何常師之有蹈之則為君子違之則為小人惟善與不善之無常也故太甲始也欲敗度縱敗禮以速戾于厥躬可謂其心為小人之歸矣而其一旦幡然而改則遂能克終允德以聽伊尹之訓已此有以見其不善之無常也然雖幡然改於不善而徙夫善而其中人易流之性常為放僻邪侈之所變遷安能保其終不至於棄其善以從於不善也故伊尹懼夫善之無常也則為之稱道夫天人神鬼所以禍福吉凶向背之際惟在善不善之間蓋所以警動其恐懼修省之意而欲成其克終之善也惟天無親民罔常懷鬼神無常享蓋言天之所親民之所懷鬼神之所享皆無常也其所以無常者蓋有德則親之懷之享之無德則不親不懷不享矣故曰克敬惟親懷于有仁享于克誠蓋謂惟有德則可常也敬仁誠皆是有德之名但變其文耳惟天與鬼神之所親享民之所懷其無常也如此則人君所處之天位可謂難矣其所以難者蓋有德則治否德則亂故也所以德惟治者以與治同道罔不興故也所以否德則亂者以與亂同事罔不亡故也治曰同道亂曰同事言治之難而亂之易也蘇氏曰堯舜讓而帝子噲讓而絶湯武行仁政而王宋襄行仁義而亡與治同事未必興也必同道而後興道同者事未必同也周厲王弭謗秦始皇禁偶語周景王鑄大泉王莽作泉貨紂積巨橋之粟隋煬帝洛口諸倉其事同其道無不同者故與亂同事無不亡矣此説為盡大抵伊尹之誨太甲每告之以成之甚難而壞之甚易故始之所訓者則謂爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗至此又曰與治同道罔不興與亂同事罔不亡欲與治同道非大德不可也苟與亂同事以不德之小者足以墜厥宗矣此皆伊尹至忠之訓也夫與治同道則興興之之難也如此與亂同事則亡亡之之易也如此將欲同其所以治之之道而不同其所以亂之之事者無他惟在謹其所與之人而已所與者君子固與治同道矣所與者小人則與亂同事矣能終始之際謹其所與君子而不使小人得以乘間而進惟是明明之主明明者明之至也先王惟時懋敬厥德克配上帝今王嗣有令緒尚監兹哉若升髙必自下若陟遐必自邇荀子曰治生乎君子亂生乎小人自古治亂之所生必自夫君子小人進退之間然人主即政之始鋭意於治則往往多用君子及其享富貴之日久驕縱之心日生而忘其禍亂之機故每至於用小人小人既用則天下由是亂矣蓋始用君子而卒用小人者此中材庸主之通患也故其國家亦皆始治而終亂且以唐室觀之髙宗始與長孫無忌禇遂良則治終與李義府許敬宗則亂明皇始與姚宋則治終與李林甫楊國忠則亂德宗始與崔祐甫則治終與裴延齡盧杞則亂憲宗始與杜黃裳裴度則治終與皇甫鎛程異則亂此數主者始終之際其用君子小人相反如此而治亂之應亦如影響之不差則是安危存亡之機果在此而不在彼也太甲雖能自怨自艾處仁遷義以聽伊尹之訓已然而亦安能保其終不與小人以至於亂天下者哉夫以堯舜之聖聰明睿智出於天縱其不惑於小人也必矣然猶且憂歡兜遷有苗畏巧言令色孔壬況如太甲中材之主也伊尹論君子小人之無常治亂之難易而總結之曰終始慎厥與惟明明后使太甲知夫安危存亡之本以克慎厥終古所謂一言而興邦者此類之謂也伊尹既論天人向背之理與夫治亂難易之勢以致其所以誥戒之意然猶未足以盡其義也又稱夫其祖成湯知夫天之所親民之所懷鬼神之所享不可常也有德而與治同道則治無德而與亂同事則亡治亂興亡之際如此其不可恃也故於是勉敬其德德日新日日新又日新以慎其所與於終始之際無時豫怠是以自七十里興而伐夏弔民以有天下創業垂統貽子孫萬世之法為啇家之太祖克配上帝之祀也孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝古者祭昊天上帝必以其祖考之肇造基業者為之配蓋所以極其尊嚴之道而盡其孝敬之儀周之祀明堂以文王配則商之祀以成湯配蓋可知也此曰克配上帝蓋是指其廟為太祖而克配食於上帝之祀也必言其克配上帝者蓋創業之君其德至於配食上帝之祀則是其始終之際懋敬厥德者至是而成矣賈誼陳治安之䇿謂大數既得則天下順治海內之氣清和咸理生為明帝沒為明神名譽之美垂於無窮禮祖有功而宗有德使顧成之廟稱為太宗上配太祖與漢亡極大抵論人主之盛德必至於鴻名熙號與天地宗廟之祀相為無窮然後為至未至於是則天之所親民之所懷鬼神之所享猶未敢自必其有常也惟湯之所以兢兢業業克終厥德也如此而太甲繼其有令善之緒當夙夜庶幾監視此成湯之所以懋敬者率而行之夫繼世而有天下莫不承祖考之緒然有若仲康之世所承者太康之緒宣王之世所承者厲王之緒則其欲大有為於天下必也有所變更移易而治功不可以遽成太甲之所承者湯之緒可謂善矣嗣有善緒則其舉而措之天下無難矣長卿曰軌迹夷易易遵也湛恩厖洪易豐也憲度著明易則也垂統理順易繼也是以業隆於襁褓而崇冠乎二后蓋謂成王因文王之令緒故其成德如此其易也太甲之繼成湯亦若是而已矣故為太甲者夫復何為哉惟監成湯之德以盡其持盈守成之志則何施而不可哉自此而下於是丁寧反覆告之以嗣守成湯之令緒持盈守成之道也夫成湯之所以懋敬厥德至於克配上帝者夫豈於一日之間襲而取之哉蓋由其明夫物之本末事之終始而知所先後故其德日新日日新又日新而至於是也故伊尹欲太甲之監於成湯之懋敬厥德則首告之以若升髙必自下若陟遐必自邇蓋以夫人之所以升髙陟遐者喻修德者之不可以無漸也夫自下而升於髙自邇而陟于遐皆由其跬步而積之積跬步而不已極其所如往而無跬步之闊焉然後能至未有不積跬步而能至者故中庸論君子之道亦以謂譬如行逺必自邇譬如登髙必自卑蓋進德修業之喻未有如此之切者成湯之懋敬厥德所以銘於盤盂之上以為朝夕之監戒而曰德日新日日新又日新誠知夫所以自修之道如升髙陟遐然雖跬步不可廢也故太甲欲率乃祖之攸行亦惟見於躬行之實明夫先後本末始終之序如自下而升髙自邇而陟遐不可以陵節躐等而無其序也無輕民事惟難無安厥位惟危慎終于始有言逆于汝心必求諸道有言遜于汝志必求諸非道嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休夫既以懋敬厥德如升髙陟遐之不可以無漸然則其所當先者果何事哉下焉為億兆之所倚賴一有輕之之心則乖離之釁生矣故必難之而後可難之者深思逺慮惟恐一夫之失其所也上焉為祖宗之所付託一有安之之心則亂亡之機兆矣故必危之而後可危之者戒慎恐懼如臨深淵如履薄氷惟恐有一朝之患也無輕民事惟難則民事日益修無安厥位唯危則天位日益安矣夫人君所以懋敬厥德自其始而慎之以至於終不越夫此二者而已故繼之曰慎終于始言欲謹其終必於其始謹之始之不克謹終亦無可見之效矣如升髙者必自下而慎之如陟遐者必自邇而慎之不慎其自下自邇而能至於髙與遐者未之有也然自古人君之治天下處於持盈守成之世亦莫不欲重民事保天位以終始其德然往往或至於忽民事而不念以危其位則有始而無終者無他繼體守成之君生於深宫之中長於婦人之手未嘗知憂未嘗知危未嘗知哀未嘗知懼處富貴之極不知下民之疾苦雖自力於為善而至於享逸樂之久海內治安上恬下嬉廓然無事則往往好人之順已而惡人之逆已於是諂諛之言日進而忠鯁之義不聞此民事之所以日忘而天位之所以日危而德之所以不終也如唐明皇即位姚宋為相姚善應變以成天下之務宋善守文以持天下之正遂成開元之治及其太平日久一惑於聲色玩好盡忘其平日好賢樂善之心於是張九齡以忠直見疏而李林甫楊國忠以諂佞獲用一旦漁陽竊發四海橫流而猶不悟觀其與裴士淹論宰相賢否至宋璟曰彼賣直以取容耳彼宋璟者乃明皇初年賴其忠直以致太平者也至其狎習於小人遜志之言而逆耳之諌久不接於耳也則指之為賣直而不自知嗚呼明皇未足道也以唐太宗之英睿蓋天錫之勇智而又躬冒矢石跋履艱難以有天下然至其治定功成之後其從善納諌之心亦寖以陵替故魏鄭公曰陛下貞觀之初導人使諌三年以後見諌者恱而從之比三年強勉受諌而終不平也夫始也導人使諌是惟恐人之不逆其志也及其強勉受諌而終不平則是欲人之遜其志矣此實溺於宴安之習無敵國外患以警其寅畏之心則其好人之順已而惡人之逆已者是人情之常也而非魏鄭公日陳其不克終之漸以類戒之則其至於追咎忠諌之人以為賣直取名如明皇天寶之亂亦不難也太甲之居於桐宫困於心衡於慮而作也雖既能處仁遷義以聽伊尹之訓已而伊尹懼其安於逸樂之久則或至於好人之順已惡人之逆已以寖不克終故告之以慎終于始矣又繼之曰有言逆于汝心必求諸道有言遜于汝志必求諸非道此蓋告之以聽言之道也有言逆于汝心是拂耳之言也拂耳之言不可以逆已而遂怒之必以其言而求諸道使其言果合於道則固忠直之言也雖逆耳而當從之也有言遜于汝志是順耳之言也順耳之言不可以從已而遂喜之必以其言而求諸非道果非道則固諂諛之言也雖順耳而當拒之也逆順之際不徇吾好惡之情而一斷之於道則君子得以伸其忠小人無所容其姦矣此終始謹厥與之要漸也然言之逆順必以道而求之苟其心不斷然知夫道與非道之為異則或至於以道為非道而以非道為道矣欲知道與非道之異而不惑於是非則奈何亦不過乎慎思之力行之而已故伊尹於是又歎其難而曰弗慮則不獲蓋欲其深思之也弗為則不成欲其力行之也慎思力行則慮而獲矣為而成矣此一人所以元良也元良言其大也一人大善則知道與非道之别故逆耳之言不可以情拒之順耳之言不可以情受之如此則君子在位而小人不得容其讒佞於其間此萬邦所以正也孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定矣一人元良萬邦以正之謂也至於一人元良萬邦以正則伊尹之所以期望於太甲者盡於此矣彼太甲能事斯言躬行以懋敬厥德而慎之於終始之際則能灼知君子小人之情狀而浸潤之譖膚受之訴必不得行彼小人之類進其嘗試之説以變亂先王之政刑者將無隙而入矣故終之以君罔以辨言亂舊政言先王之舊政可以為萬世常行之道惟小人之辨言為能亂之君不信辨言則舊政不亂矣太甲能不以辨言亂舊政則離師傅而弗反矣故伊尹得以遂其功成身退之志不以寵利居成功而引身告老以歸也君罔以辨言亂舊政則君之道得矣臣罔以寵利居成功則臣之道得矣君臣各得其道則我商家可以保其永久之年信有休美于無窮矣自古膺受遺託孤之任其進退之際可謂至難矣蓋其德之可以託六尺之孤必也耆年宿德為一世之老成人然後可以服天下之心故其至於功成事定也以其年齒論之則可以告老而歸而以事勢觀之則或未可以遽去者蓋為幼主者類多血氣未定趨舍未堅苟其德未能至於離師傅而弗反而吾則引身以去使小人得以乘隙而進則將至於辨言亂舊政而貽四方之禍矣故召公不恱周公之留輔成王而周公反覆再三言其所以不得不留之意者則其勢未可以去則亦不得以寵利居成功為嫌也太甲之自桐宫而歸也既能處仁遷義以克終允德矣而其當時內外協德無有異心上則無管蔡流言下則無頑民之不率教者伊尹之心度其必能終始謹厥與不以辨言亂舊政也故諄復明告以堅其心於申誥之時而遂示其所以引身求退之意蓋如是而不能引身而去則為以寵利居成功矣昔霍光受武帝寄託輔翼少主昭帝即位方年十四而其時又有上官蓋燕之徒懷異志而窺伺神器當此之時不可一日而無光也故方其不引身而去於昭帝之時其義為得至於宣帝之立年已長矣其聰明慈仁足以獨當萬機之勢而守髙皇之業光可以歸政矣而猶執其權者纍年寵盛勢極卒成族滅之禍豫嘗以為光在昭帝之時是周召之勢也在宣帝之時伊尹之勢也伊尹不以寵利居成功而光居之所以為不學無術也尚書全解卷十六
