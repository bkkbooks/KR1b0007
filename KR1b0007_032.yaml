body:
  text: 尚書全解卷三十二宋林之竒撰多士周書成周既成遷殷頑民周公以王命誥作多士多士惟三月周公初于新邑洛用告商王士王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天眀威致王罰勑殷命終于帝肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位惟帝不畀惟我下民秉為惟天眀畏我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰乃命爾先祖成湯革夏俊民甸四方自成湯至于帝乙罔不眀徳恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祇惟時上帝不保降若玆大喪惟天不畀不眀厥徳凡四方小大邦喪罔非有辭于罰此篇乃周公既卜洛而言遂規度經營建為二邑以其一為下都遷殷之頑民使居之使之宻邇王室式化厥訓遂告以遷居之意如盤庚三篇是亦告民以遷居之意然當盤庚之將遷也雖以耿之地卑弱昏墊非下民之利然其在位者不以其遷為便乃扇為浮言以惑民聽民遂相與咨怨而不適有居使其驅之以刑脅之以勢夫誰敢不聽從而盤庚則不然雍容而曉譬之丁寧委曲使其心曉然知遷之為利不遷之為害然後與之從事葢以常人之情好逸而惡勞故安土懐居而重於遷徙必其所以告諭之者較然明白然後能使下之從上如臂之使指也若夫周公之營洛邑以遷頑民方其規度之始命庶殷以工役之事而庶殷之人翕然丕作則其遷也必不如盤庚之民齟齬而不肯從也况此篇之作即洛邑而告之則是既已遷矣而猶告以遷居意者何哉葢當武庚之叛殷民與之相煽而起以覬非常其氣燄甚熾向微周公則周之為周未可知也是殷人之意妄意以為殷可以復興周可以遽滅也昔宋襄公有霸諸侯之志大司馬固諫曰天之棄商久矣君将興之弗可周既衰㣲萇洪欲遷都以延其祚晉女叔寛曰萇叔違天天之所壊不可支也夫天之所棄固不可興其所壊固不可支然自非深知天命者不能知之也周公慮殷之餘民知淺識短竊不自量而有興復之志當武庚之倐起而即敗則周不可遽滅商不可復興也明矣而其僥倖萬一天下有變以逞其忿怒之心猶恐其未之已也故於其遷也諄諄告戒之言先言殷以淫泆之故而自絶於天非我周家詭謀匿計以營求之汝惟當有爾土以寧幹止不可有他慮以自速罪戾也昔秦軍降諸侯諸侯吏卒乗勝奴虜使輕折辱秦吏卒吏卒多竊言曰章將軍等詐吾屬降諸侯今能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子諸將微聞其計以告項羽項羽乃召英布等計曰秦吏卒尚衆其心不服至關不聽事必危不如擊之於是夜擊阬秦軍二十餘萬人夫以人之不服已而以計覆之使無噍類以絶後患此固暴虐不仁如項羽者之所忍為周公必不為也然而使周公以其嘗預於武庚之亂而移之逺方夫孰以為非哉周公之心則不然方且建都邑而移之以自近惟以優㳺寛大之言漸摩而柔服之以消其強梗悖亂之氣而咸歸於善此其所以為周公而後世不可得而及也成周下都也王城所以定九鼎是為王都故成周為下都為王氏之學者以成周即洛邑初無王城成周之辨說春秋者亦多以王城成周合而為一夫王城之與成周厯代諸儒所紀甚詳其援證為明白不可破也攷之微子畢命之篇則殷之民可謂頑也王氏曰此頑民者乃商王士而謂之頑者以其不則徳義之經而無常心故也王氏之意謂周公之所遷者皆其士大夫以其心之無常故雖士而謂之民此强説也既謂之頑民又謂之多士則其遷也不獨士而已以王命誥者言誥者成王之命而誥之者則周公也先儒曰所告者即衆士故以名篇據此篇多亦是撮篇中爾殷遺多士之言而以二字為此簡編之別如先儒所言是有其義非得其本意也三月先儒以為周公致政明年之三月成周南臨洛水故曰新邑洛言周公以此三月始於此所建新邑之洛用成王之命以告商王之衆士也殷遺多士所謂殷遺民也弗弔言不為旻天所弔閔故大降喪于殷家而覆宗絶祀也先儒以弔訓至言殷道不至非也某於大誥篇已論之詳矣殷既喪亡故我有周受天佑助之命奉天之眀威致王者之誅罰𠡠正殷命以終於上帝言上帝勦絶其命也終者所謂天祿永終也殷命既終則周代殷受命以奄有天下故謂爾多士言我之代殷非我周敢弋取之也周以世世脩徳故天監代殷莫如周焉王氏曰肆爾多士者肆之而不誅也與眚灾肆赦肆大眚之肆同意謂其致天罰也惟誅獨夫紂而已脅從罔治也葢周公將言我小國敢弋殷命故呼爾多士而告之王氏之說盖強説也先儒謂天祐我故爾多士臣服我亦非經之本意如魏之代漢晉之代魏宋之代晉齊之代宋梁之代齊陳之代梁周齊之代後魏隋之代周是皆弋天命也言小國亦如大誥言興我小邦周盖謙辭也春秋諸侯多稱敝邑正此類也允罔固亂當從蘇氏之説曰固讀如推亡固存之固信哉天之固治不固亂也惟天不畀殷家以永命盖信其不固亂者此所以輔我周家從百里而起以我周家居於王位豈敢求之哉惟上帝既不畀殷家以永命故下民皆秉心而為我葢以天之明畏自我民明威故也我豈嘗弋而求之哉明者天之所明也此其所以佑周畏者天之所威也此其所以棄商明畏之来如影響然未嘗有毫釐之差也上帝引逸此古人之言而周公聞之也言發政施仁以使民安逸者上帝之所引也引者謂言其命也惟天恵民惟辟奉天則逸民豈非上帝之所引乎有夏桀不適逸民之道則惟上帝之於夏家猶降格而嚮之葢譴告謹戒欲其改過仲舒曰天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君欲正其亂也自非大亡道之世天盡欲扶持而安全之事在強勉而已此上帝降格嚮于時夏之意也天雖譴告警懼於桀而桀不能用天之戒大為淫泆而為辭以自解釋所謂矯誣上天是也桀雖有辭而不足以欺天故天無所念聞而其惟廢墜其大命降而致其罰乃命爾多士之先祖成湯革夏正以有九有之師湯之革夏正也則擇其夏之俊民使之治四方下文曰夏廸簡在王庭有服在百僚是也殷之君自成湯以至于帝乙無有不明徳而恤祀恤祀者謂致敬以奉社稷宗廟天地之祭祀也明徳則人安之恤祀則神享之人神共歆此天所以大建而安治有殷使之厯運緜長基業鞏固殷王又皆兢兢業業惟恐失上天之心不以天之丕建保乂於我而自怠也故罔不配天而布其徳澤焉在今後嗣王謂紂也紂則淫酗肆虐而不明於徳謂祭無益而不恤於祀故視天道猶無明况能聽念先王所以勤勞國家之道乎盖自古昏暴之君其不能率先王之遺範者多矣然未有不畏者惟紂謂已有天命天既不畏之矣則其視先王之政為如何哉此言正與召誥曰其稽我古人之徳矧曰其有能稽謀自天理雖相反而意則同也紂雖為大淫佚不顧于天顯民祗故惟是上帝不保降若此大喪于殷家也天有顯道天顯也下民祗若民祗也不顧于天顯民祗上不畏天下不敬民也惟天之所以不畀殷家以永命葢以殷紂之不明厥徳也故凡在於四方其國無小無大而至於喪亡者皆天罰之有其辭也如紂之不明其徳而天不畀豈非有辭乎今爾多士猶謂殷未有滅亡之罪而天猶惓惓於殷此則不知天命也爾當安居於此其可懐他慮乎唐孔氏曰下篇説中宗髙宗祖甲三王以外其後立王生則逸亦罔弗克夀則帝乙以上非無僻王而此言無不明徳恤祀者立文之法辭有抑揚方說紂之不善盛稱其先王皆賢正以守位不失故得羙而言之此說甚善昔魯莊公丹楹刻桷御孫諫曰先君有共徳而君納諸大惡無乃不可乎夫桓公固不足道也而以為有共徳立文抑揚之法自當如是古之人皆然也王若曰爾殷多士今惟我周王丕靈承帝事有命曰割殷告𠡠于帝惟我事不貳適惟爾王家我適予其曰惟爾洪無度我不爾動自乃邑予亦念天即于殷大戾肆不正王曰猷告爾多士予惟時其遷居西爾非我一人奉徳不康寧時惟天命無違朕不敢有後無我怨惟爾知惟殷先人有冊有典殷革夏命今爾其曰夏迪簡在王庭有服在百僚予一人惟聼用徳肆予敢求爾于天邑商予惟率肆矜爾非予罪時惟天命王曰多士昔朕來自奄予大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜王曰告爾殷多士今予惟不爾殺予惟時命有申今朕作大邑于兹洛予惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜爾乃尚有爾土爾乃尚寧幹止爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土予亦致天之罰于爾躬今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷王曰又曰時予乃或言爾攸居前旣言紂之所以失天下亦如桀之墜厥命周之代殷亦如成湯之革夏其一興一廢皆本於天而非人之所能為爾多士當平心定氣深思其所以然之故安於天命而不可有他慮故此又申言之凡我之所以不以爾之罪為可誅而赦之又為之遷之以自近使之漸染而自化無非天命也靈善也王者之治天下其舉措動作無非天之事故其典曰天叙禮曰天秩命曰天命討曰天討凡所以施之國家者非人之私意所能為也惟當承天意以從事而已矣能奉天者天之所予其絶於天者天豈享之哉紂之肆為淫泆而不明於徳故腥聞于天而天所斷棄乃監求于天下四方可以代殷者宜莫周若也葢周之文武大能善奉天之事以治其民故天有命而命我周曰當斷絶殷之命而汝代之也割殷與割正夏之割同惟天以割殷之命命我周王故周王以𠡠殷命而告于天也蘇氏曰將有割殷之事必先告正于天而後行曰將有大正于商是也此說甚當漢孔氏曰告正于天謂旣克紂柴于牧野告天不頓兵生事此則非也葢此方言天命我有周故周告于天而後代之此所謂告即所謂告于皇天后土之意也非大告武成之告也惟我事不貳適惟爾王家我適漢孔氏曰言天下事已之我周矣不貳之他惟汝殷王家已之我不復有變其說不明白不如蘇氏於惟我事不貳適曰我有事于四方曷嘗有再舉而後定乎貳適再往也其言是矣至於惟爾王家我適乃曰惟于殷則觀兵而歸已而再往不申言貳適者因前之辭也此則是泥於先儒觀兵之說而為此觧也荀子曰王者之兵不試湯武之誅桀紂也拱揖指麾而強暴之國莫不趨使誅桀紂若誅獨夫葢王者之用兵既度之人又度之己己可以取之而彼未可取吾不動也彼可取而已未可以取之吾不動也必其彼有必敗之理已有必勝之道計之之審而後有事焉則豈有再往而定乎蘇氏之言是也但觀兵之說無經見某於泰誓已嘗論之詳矣惟爾王家我適當連下文說爾王家指殷也言凡我之事未嘗再往而後定今於爾王家所以往而伐之者葢我之言曰惟爾殷紂大無法度天人之所共棄則我之勝商豈至於再乎武王數紂之罪曰力行無度而其所以為無度者如曰播棄黎老昵比罪人朋家作仇脅權相滅則其無度也不亦大乎紂既以無度之故天人之所共棄然後我從而伐之則我之於爾本豈有伐之之心哉使紂能明厥徳以光大成湯之緒則周文武雖有聖徳亦將永為商之諸侯以藩王室而已惟其暴虐淫湎靡所不為天意之所憤怒民心之所咨怨故不得不應天而順人也則商之喪亡非禍端自周而動也其亂從而起矣孟子曰人必自侮然後人侮之國必自伐然後人伐之紂乃自伐也故周伐之此所以曰我不爾動自乃邑伊訓曰造攻自鳴條朕哉自亳亦此意也周人伐殷葢我念天命而就誅爾殷之大罪戾者故不正治其餘黨也葢殱厥渠魁脅從罔治舊染汙俗咸與惟新此爾多士所以得至於今尚存焉王氏曰今不正治汝不忍助天為虐也酒誥曰天非虐惟民自速辜乃以滅殷為天之虐可乎猷發語之聲也遷居西爾即遷扵洛邑也洛者土中而云西者以殷之故都所向而言也唐孔氏曰從殷適洛南行西廻故為居西也人情莫不欲安故王者必使民安其田里而無絲毫之擾然後斯民得以享其康寧今乃使爾有遷徙之勞非我一人所奉之徳不使爾康寜也是惟天命之所宜然在乎無違而已故朕不敢有後而稽留天命爾無以遷居為出扵我之意而怨我也惟爾之殷先人葢皆有冊書典籍以紀載殷革夏命之故事爾之所備知也則我周之伐殷亦如殷之革夏而已爾其可以有他辭哉今爾乃出怨言曰殷之革夏而夏之多士皆迪而進之簡而擇之使在王庭故有服行職事列於百僚今周之於多士也不然則是周猶不䏻忘小嫌而捐小怨如殷之於夏也葢我一人所聽察而任用之者惟其徳而已有徳則進無徳則退豈有彼此哉唐太宗嘗曰朕任官必以才不才雖親若襄邑王神符亦不妄授若才雖仇若魏徵不棄也太宗且然而況於周乎今爾多士染殷之餘習驕淫矜夸無所不至予其敢求爾于大邑商而用之哉其所以舍爾而不求者以其無徳也非以有殷之讎而棄汝也我惟循湯故事肆赦爾罪而矜憐爾愚遷之於王都以式化厥訓此非我之罪也亦是惟天命而已葢王者與天地合其徳先天而天不違後天而奉天時故其所舉動天即聖人聖人即天故周公之於殷遷其頑民以宻邇王室與夫以其無徳而不任之以官雖皆周家之政皆以為天命也奄淮夷也四國三監及奄也方武王即世而周公攝政三監及淮夷挟武庚以叛周公親率兵以誅之先誅三監後伐奄自伐奄歸周乃大降黜爾四國民命明致天之誅罰於汝其餘民則自遐逖之地而移之以宻邇王室使之親比以臣事於我家以多為遜順革其不善之習也周公東征則来自奄者周公此言王若曰昔朕来自奄則以来自奄為成王與成王既伐管叔蔡叔同自洛而視殷之故地則殷為逺故以遷于洛為移爾遐逖王氏以為徙其民於逺方此事無所經見既徙之逺何為而又遷之周哉王氏又以我宗為康叔既徙之逺方而康叔封扵殷之故都安得臣扵康叔乎我宗猶言我家也非康叔也言爾多士之罪固可殺然我不忍不敎而誅汝故我惟是命令以申告汝也我之營作大邑于此洛邑也葢以四方諸侯朝覲貢賦而無以賔之又欲使爾多士服勤奔走以臣於我而多為遜順以四方之故故有王城以多士之故故有成周既建此都邑以遷爾多士矣爾庶㡬䏻有此新土先儒以為還有本土非也其遷之也将使宻邇王室式化厥訓豈又還有本土哉庶安居於此幹事扵此而得其所止也爾若能修已以敬則天必有以畀予之矜憐之畀矜者迪簡而在百僚也左傳曰敬徳之聚也能敬必有徳徳以治民君請用之葢殷士之敬則是遷善逺罪故天畀矜而使周用之也如其不敬則豈特不能有此新土而已哉我将致天之誅罰於汝之身也今汝惟是安居於汝之新邑而其子子孫孫繼繼承承居於此則爾其有幹有年于玆洛邑矣繼爾居則是有年也小子與酒誥之言小子同謂其子孫也先儒以遷為遷善其說為曲不如蘇氏曰汝能敬天安居汝子孫其有興者其所由来皆自於遷洛殷人怨不在王庭百僚故成王以此荅其意也是也葢人之愛其子孫天下之至情也故以此誘之王曰又曰者唐孔氏謂凡言王曰者皆是史官錄辭非王語也今史官錄王之言曰以前事未盡故言又曰蘇氏曰非一日之言故以又曰別之皆不如薛博士之言曰王曰又曰時予乃或言爾攸居疑此二句有誤陳少南尤為詳明曰王曰之下當有文其簡脫矣又曰者承上文而言之也多方之末曰王曰我不惟多誥我惟祇告爾命又曰時惟爾初不克敬于和則無我怨用是知王曰之下當有文也乃或言爾攸居其文承上上簡脫矣予不䏻知其下矣此篇與盤庚皆是告以遷居之意故其辭意多相類非我一人奉徳不康寧即盤庚所謂予迓續乃命于天予豈汝威也時惟天命無違即所謂天其永我命于玆新邑也無我怨即所謂爾無共怒協比䜛言予一人也大扺皆然葢古之聖人惟不忍鄙其民而欺之故其諄諄告諭之言開其為此而禁其為彼不約而同也漢之初以婁敬之言遷齊諸田楚昭屈景燕趙韓魏後及豪傑名家以實關中其後世徙吏二千石髙貲冨人及豪傑兼并之家於諸陵是亦遷殷頑民之遺意然周公之遷殷民葢使之宻邇王室式化厥訓故雖商之餘民染於惡化不能自反而成王康王建皇極於上周公君陳畢公敷大徳於下歴百年然後斯民丕變於忠厚漢之遷豪傑徒為强本弱支之術而已非有化之之道也故關中以五方雜錯風俗不純其世家則好禮文冨人則商賈為利豪傑則游俠通姦其與周之風俗固萬萬不侔矣不獨此也周公之遷之也則以優游寛大之言雍容而漸漬之使之感而歸善漢則不然惟命之遷則遷未嘗有誥諭之辭秦少游學士曰太上㤀言其次有言其下不及言若漢者所謂不及言者也無逸周書周公作無逸無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知周之興也以百里之諸侯積徳累功乃代商而有天下天下一統矣而後成王嗣立成王之立也百官緫已以聼扵冢宰制禮作樂制度紀綱罔有不備天下太平矣而後成王即政葢其膺萬乗之尊扵幼稺之年覽萬㡬之務扵盈成之後非有櫛風沐雨之艱而遂據此富貴之勢非有殫精疲神之勞而遂享此治安之效則逸豫之心不期生而自生矣故周公於其即政之初而遂作此篇以為戒也范内翰嘗曰所貴乎賢者為其能救亂於未然閑邪於未形也若其已然則衆人之所能知也何頼扵賢乎周公於成王逸豫之心未萌而其諄諄告戒之言已如此此其所以為周公也漢孔氏曰成王即政恐其逸豫故以所戒名篇而豐祭酒亦曰仲尼序書以周公所戒名篇夫周公之戒成王其大意固在於無逸然謂以此義而命篇之名則必有窒礙矣何者以書之五十八篇其命篇之名固不能皆可以包括一篇之義也其説葢由於以序書之作出於孔氏之手故以其篇名為皆有其義殊不知此皆當時之史官撮取數字以為簡篇之別故其義有可得而通者亦有窒礙不可得而通者苟不於命篇之名必求其義則無拘泥之弊矣書之序有直言其所作之人而不言其所作之事者伊尹作咸有一徳周公作無逸立政是也司馬侍講曰本篇論無逸之事文義已明白易曉故孔子作序但云周公作無逸而薛博士亦曰無逸之義昭矣於其序之也正其名而已故曰周公作無逸此亦不然夫無逸之序既不言其所作之故而於篇之發首亦不言之則謂其文義明白易曉故於其序但正其名而已可也然考之五十八篇於其發首有詳言其所作之故則是文義已明白易曉矣何為又申言於序邪葢書之序本自為一篇不以冠於每篇之上故其體往往不同有其事迹見於序而發首則不言者湯誓大誥是也有其事迹見於篇首而序則不言者咸有一徳是也惟此篇之序與發首並不言其所作之故此皆各出其當代史官一時之旨意不可以為說也是故為之說者必窒礙於五十八篇之中矣君子所其無逸者言君子之所在其惟無逸也司馬侍講曰周公歎羙君子所在常不可逸是也葢人君之一身而賊之者甚衆或以酒或以色或以音樂或以田獵或以宫室或以珍禽竒獸皆可以兆天下之亂而其原則自於人君之逸而人君有好逸之心則是數者乃有隙而可入矣此君子所在所以不可以逸也然人君以無敵之貴無倫之富則何欲而不獲何為而不遂故雖萬里所不可得而致者可使致之於數歩之内數年所不可得而成者可使成之於一日之閒如此則逸心浸淫矣是以逸者常昜而無逸者常難逸者常多而無逸者常少自非有以警懼而制馭之使之憂於是慮於是而其好逸之心有所畏而不敢發有所慊而不肯發則何以能無逸哉故君子之無逸者必先知稼穡之艱難也魯哀公問於孔子曰寡人生於深宫之中長於婦人之手未嘗知憂未嘗知勞未嘗知懼未嘗知危孔子曰君入廟門而右登自阼階仰視榱棟俛視几筵其器存其人亡君以此思哀則哀將焉而不至君昧爽而櫛冠平明而聼朝一物不應亂之端也君以此思憂則憂將焉而不至勞也懼也危也皆然周公欲無逸者先知稼穡之艱難是亦孔子欲哀公思之之意也有以思之則其戒謹恐懼之心不敢忘有以知之則其矜憐撫養之心其敢忘乎哉此所以無逸也司馬侍講曰夫農之事最為勞苦艱難寒耕熱耘沾體塗足終嵗勤力幸無水旱螟蝗風雹之灾然後以所得先輸租稅次償逋債所餘已無㡬其田多口少者僅能周一嵗之用其田少口衆者不免又假貸扵人其所食不厭糟糠其所衣不具裋褐若稍遇水旱饑饉則凍餒死扵溝壑者不可勝數為天下之至勤受天下之至苦天下之人衣食皆出扵農能活舉天下人性命而農夫反自無衣食至扵凍餒而死觀此言則天下之所謂艱難者豈有復過扵此哉夫能以稼穡之艱難常置扵胷襟之閒一思及此則怵惕惻隱之心油然而生矣葢將謂彼之勞苦萬狀我何忍以逸為哉斯民必將得以從事扵畎畝之閒而無絲毫之擾也蘇氏曰舊說先知農夫之艱難乃謀逸豫非也周公方以逸為深戒何其謀逸之亟也葢曰王當先知稼穡之道惟艱難乃所以逸樂此說是也先儒之失在扵謀之一字以逸豫為謀則是有心於逸有心於逸則將為民害矣惟以稼穡艱難為念而不留意扵逸者乃所以能逸葢好逸未必得逸無逸者自然逸也李翺曰人皆知重斂可以得財而不知輕斂之得財愈多栁子厚曰汙吏之為商不若廉吏之為商其為利也博是周公無逸乃逸之說也夫無逸而乃逸非是無逸者其心已在於逸也效之必至理之固然也自古無為之治惟舜孔子曰無為而治者其舜也歟夫何為哉恭已正南面而已矣楊子問道亦曰垂拱而視天民之阜無為矣然舜之所以享其逸者豈無所用其心哉自耕稼陶漁以至為帝則稼穡艱難備嘗之矣不獨知之也此其所以無為而逸也人君知稼穡之艱難不徒然也欲知小人之所依夫小人之所依者衣食也魚無水則死故魚之所依者水人無衣食則不能以自存故人之所依者衣食君能知人之所依者在是則其一注一措一號一令惟恐其奪民時而困民力使其失所依也其可以逸乎相視也視彼農夫不孝無知之子其父母勤勞於播種收穫得以飬育其子其子不勞而坐享其父母之飬故不知稼穡之艱難既巳不知之矣故其操心不危而慮患宗深以苟目前所以肆為逸樂輕費妄用以敗壊其父母之基業而又叛諺不恭無所拘束既而誕妄以欺其父母不然則狎侮其父母曰汝乃故老之人無所聞知意謂其無所聞知故不能享其逸樂徒自苦耳古之人君惟自側㣲而起者無不有知稼穡之艱難如漢髙帝宣帝光武唐太宗本朝太祖太宗皇帝是也惟繼體守文之主未嘗苦其心志勞其筋骨一旦嗣立遂享有前世之富貴得之既易故其扵稼穡之艱難鮮有知之者如宋武帝㣲時躬耕於丹徒及受命耨耜之具頗有存者皆命藏之以留於後及文帝幸舊宫見而問焉左右以實對文帝色慙有近侍進曰大舜躬耕歴山伯禹親事土木陛下不覩列聖之遺物何以知稼穡之艱難何以知先帝之至徳乎夫文帝元嘉之賢君也猶不足於此況其他乎夫文帝以耨耜為恥誠為失徳然其餞衡陽王也將行勑諸子且勿食至會所設饌日旰不至有飢色乃謂曰汝曹少長豐逸不見百姓艱苦今使汝曹識有飢苦知以節儉期物耳則是文帝於稼穡之艱難非不深知之也彼其以武帝之躬耕為恥者葢恥其先世之㣲耳唐眀皇嘗種麥扵苑中帥太子以下親徃芟之謂曰此所以薦宗廟故不敢不親其欲使汝曹知稼穡艱難耳宋文帝使其子飢唐明皇使其子刈麥皆是恐其生而富貴不知飢餓耕穫為何等物故致之於困厄勞勩之地而使知之也子既知之則不敢侮其父母矣如宋孝武壊髙祖所居陰室於其處起玊燭殿與其羣臣觀之牀頭有土障壁上掛葛燈籠麻繩拂侍中袁覬盛稱髙祖儉素之徳孝武不荅獨曰田舍翁得此已為過矣齊廢帝東昏侯起宫殿皆布飾以金碧武帝興光樓上施青漆世謂之青樓東昏侯曰武帝不巧何不純用琉璃此則所謂侮厥父母曰昔之人無聞知也宋武帝齊東昏無足責者若漢武帝則可責也文帝嘗欲作露䑓召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以䑓為是文帝之心戰戰兢兢惟恐其不能享先帝之餘慶也而武帝則不然起建章宫左鳳闕右神明號稱千門萬戸土木之功過於前世數倍則其心必以前世之制為狭隘鄙陋不足以示天子之尊也惟其輕視前世之制故由此而積之則髙皇帝之約束紛更始盡矣胡不思曹參問惠帝之言曰陛下熟察聖武孰與髙皇帝而乃傲睨前世以為不足乎雖其號令文章煥然可述而其所失者大矣故周公取喻扵小人之子不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知此誠盡夫不肖子之情狀此而進戒於王葢欲王謹守文武憂勤㳟儉之道以濟斯民不可少有改易方可以持盈守成也觀諸漢武帝乃知周公之言誠萬世之眀鑒周公曰嗚呼我聞曰昔在殷王中宗嚴㳟寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年其在髙宗時舊勞于外爰暨小人作其即位乃或亮陰三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆髙宗之享國五十有九年其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽或十年或七八年或五六年或四三年周公之作無逸葢以成王聼政之初而天下既已太平未嘗勞其筋骨苦其心志而遂據此崇髙之勢享此治安之效則畏懼之心昜弛而驕怠之心昜生故欲其知稼穡之艱難而又以夫小人之逸諺誕侮者戒之使之知夫前世積累之不昜而不敢輕也然周公之心猶以為未也又稱商家之君其無逸者則歴年有永其逸者則蚤墜厥命使成王將欲耽扵逸樂以苟目前之娱則無望乎享國歴年之永將欲耆艾夀考以保無疆之福則雖一日之逸亦不可為也葢聲色游畋以肆其逸豫之情人君之所欲也而享國長久以介眉夀又人君之所大欲也以其所大欲節其所欲庶其知所慕矣此周公作無逸之本意也詩曰殷鑒不逺在夏后之世殷之鑒在夏后之世則周之鑒其在殷之世矣故周公之戒成王所以舉商家無逸之君而為言也司馬侍講曰前代無逸之君多矣獨稱商家以来賢王者商事最近周人熟知其詳故取其切近者言易法也商之賢王不言成湯而言三宗者危内翰曰三宗繼世有天下之君與成王同是也此篇言周公曰嗚呼者七司馬侍講曰人欲有所言若意深事重則必先歎息周公語每更端則曰嗚呼是也中宗大戊也大戊湯之𤣥孫大戊兄雍已之立為王也殷道衰諸侯或不至及大戊立殷復興諸侯歸之故其廟為中宗葢古者祖有功而宗有徳其他廟則親盡而迭毁惟祖宗之廟則百世不毁焉故劉歆曰天子之廟七七者其正法數可常數也宗不在此數中苟有功徳則宗之不可預為設數故於殷大甲為大宗大戊為中宗武丁為髙宗周公無逸之戒舉殷三宗以勸成王由是言之宗無數也然則大戊之稱中宗葢殷人以其有徳以立廟為宗而不毁曰中宗者其廟號也嚴恭寅畏天命者言其畏天也葢天命之無常修徳則降之以福不修徳則降之以禍故不可不敬畏之也唐孔氏謂嚴是威㳟是貌寅是心胡博士則以嚴為貌㳟為行寅為心如薛博士豐祭酒皆從而為之分別皆不必如此既曰嚴又曰㳟又曰畏葢言其畏天之心有加而無已書之文其義同而重復言之者多矣此正如所謂日嚴祇敬六徳言敬重六徳之人與之共事而王氏以為貌嚴行祗心敬也其畏天也豈徒然哉自度者自治以法度也猶所謂身為法度也能自治以法度則不耽於逸豫矣史記曰大戊立伊陟為相亳有祥桑榖共生於朝一暮大拱大戊懼問伊陟伊陟曰臣聞妖不勝徳帝之政其有闕歟帝其脩徳大戊從之而祥桑枯死夫大戊之於天命其戰戰兢兢如此故其自度可知矣惟其自度故以治民則致其祗懼而不敢荒怠自安也昔禹之訓有曰予臨兆民凜乎若朽索之馭六馬為人上者奈何不敬則治民不可以不祗懼也酒誥曰在昔殷先哲王迪畏天顯小民大戊之嚴㳟寅畏天命所謂畏天顯也治民祗懼所謂畏小民也惟其無逸如此故在天子位享國祚者七十有五年髙宗武丁大戊之孫武丁未即位之前其父小乙欲其知稼穡艱難人民疾苦故使之出居民閒勞苦扵外及小人共事故曰舊勞于外爰暨小人諸家說者無不以說命言既乃遯于荒野入宅于河自河徂亳為髙宗舊勞于外之證據說命既乃遯扵荒野以下之文乃甘盤逃遯而去匿迹晦名不知其所終故髙宗欲傅說之訓朕志非是髙宗舊勞扵外之事也髙宗既久居民閒親履其勞是以起而即天子位則不敢逸豫居喪則亮陰而三年不言其篤於孝道如此既免喪則可以言矣故言而天下莫不雍和葢惟其不言故言則天下信之矣而髙宗之所以治民者則亦如中宗不敢荒寧故能善治商邦或小或大皆得其歡心無有怨之者先儒以靖為謀言善謀殷竊謂靖當訓治釋詁曰靖謀也周頌日靖四方毛曰謀也鄭曰治也鄭說為勝則此亦當訓治惟其無逸如此故髙宗之在天子位享有國祚者五十有九年也祖甲湯孫大甲也大甲者大戊之祖論世次之先後則先大甲次大戊次武丁今乃以祖甲列於武丁之後者先儒曰此以徳優劣立年多少為先後故祖甲在下而蘇氏之說尤為眀白其説曰此方論享國之長短故先言享國之最長者非世次也此説為得周公之本意而鄭康成乃以祖甲為武丁子帝甲案殷本紀武丁崩子祖庚立祖庚崩弟祖甲立是為帝甲帝甲淫亂殷復衰殷之君既有祖甲而又其世次在於武丁之後則其説似為勝然帝甲既以淫亂而殷道衰則非無逸之君周公豈取之哉康成之說以謂帝甲有兄祖庚賢武丁欲廢兄立弟祖甲以為不義逃於人閒故曰久為小人此説葢本於馬融無所經見難以憑信陳少南亦以此説為信而以司馬史記為誣且謂周公言自殷王中宗及髙宗及祖甲及我周文王此其文不可謂不以世次先後言之也夫周公既以享國之長短為先後而列序其事扵上矣其曰自殷王中宗及髙宗及祖甲及我周文王葢因前之文也非其世次也唐孔氏引國語曰帝甲亂之七代而殞則司馬氏以帝甲為淫亂之主不為無據豈可謂之誣哉觀太甲之篇曰玆乃不義習與性成又曰予小子不明于徳自厎不類欲敗度縱敗禮以速戾于厥躬正所謂不義惟王舊為小人則以祖甲為太甲豈不明甚寧不愈於康成所載祖甲舊為小人之事乎惟太甲之初立陷於不義而為小人之行故伊尹放之於桐宫致之於憂患之地而作其愧恥之心既三年矣則能悔過自責處仁遷義以聼伊尹之訓己故其起而即位則能知小人之所依不為逸豫以奪民時而困民力故能安順於衆民雖鰥寡不能自存者皆有以敬而飬之惟其無逸如此故太甲之享國者三十有三年也自時厥後謂繼三宗而立者或在中宗之後或在髙宗之後或在祖甲之後也其所立之王生則逸豫無度自適一己之樂而不復恤斯民焉其所以逸豫者則以生於深宫長於富貴不知稼穡之艱難不聞小人之勞故惟耽樂之事則從而為之惟其逸豫如此則所以伐性殞夀者多矣故其享國高者十年短者三年而已周公引商家之君以其賢否為之鑒戒葢欲使成王憂勤於上如商之三宗則其享國之永亦將如之久者七十五年其下者亦三十三年苟逸豫於上如商之後王則其享國之促亦將如之其久者不過十年其下者惟三年而已成王將何擇哉世之人多以夀夭歸之天命殊不知人之或夀或夭扵已取之而已矣苟其憂勤如三宗而其享國之促至扵四三年逸豫如後王而其享國之永至扵七十有五年如此則可以歸之命何者莫之致而至者命也若夫憂勤而夀逸豫而夭乃其所取也豈命也哉古人有言曰目愛采色命曰伐性之斧耳樂淫聲命曰攻心之鼓口貪滋味命曰腐腸之藥鼻恱芬芳命曰薫喉之煙身安輿駟命曰召蹶之機此五者所以養生亦以傷生則肆逸豫者最為害之大伐性殞壽所由以起也今夫天下之民其居扵深山窮谷之中者暴露其膚體勞苦其筋骨歴嵗窮年而不得休息雖終其身而不知聲色臭味之為可好故其夀多至扵百年其居於都邑之閒輦轂之下者紛華之可樂嗜慾之可玩故多不得其天年而死以是觀之則人君之壽豈不本於無逸乎自古人臣之愛君未有不欲其君之夀考葢洪範五福一曰壽五福以夀為先則世之所謂百福者莫夀若也天保報上之詩也則曰如南山之壽不騫不崩而召公之對揚王休也亦曰天子萬年天子萬夀周公之戒成王葢欲其享國長久與天地相為無窮其愛成王之心可謂至矣而其所以享國之久長者則在於無逸以是知周公愛君之深所謂愛君以徳者也周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功田功徽柔懿恭懐保小民惠鮮鰥寡自朝至于日中􅉴不遑暇食用咸和萬民文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒徳哉周公之戒成王既引商之三宗憂勤不怠而歴年有永欲成王以之為法又引商之後王逸豫自適而蚤墜厥命欲成王以之為鑒意謂三宗享國之長非天實延之也在我者有以延之也後王享國之短非天實促之也在我者有以促之也天之於人吉凶夀夭如影響然豈獨私於三宗而偏疾於後王哉以其有逸不逸之異耳成王將欲享國長久如商三宗則其無逸之心豈可以不如三宗哉此實周公愛君之至然周公之心猶以為未也又以文王享國之效而告之葢前代之君去周之近莫如殷而我周家祖宗之成憲可為楷模者比之商又為近焉故先引商家之君而後言我先王也如伊訓之篇先言夏后氏之懋徳而其子孫之弗率遂言其烈祖之成徳以訓于王古之大臣陳善閉邪以啓沃於君者率用此道也周公嗟歎而言不獨商王然也我先王亦然我周之大王王季皆能謙抑而畏懼未嘗懐驕怠之心故大王之所以能肈基王迹王季之所以能勤勞王家而周之基業自此興矣文王繼之然亦不敢逸豫以困斯民焉葢天生民而立之君以司牧之將使以一人而治天下不以天下而奉一人故文王之治其國惟以斯民之不獲為慮而不以一己之憂勤為難恭儉節用以卑其衣服也葢為就其安民之功與其治田之功而已柔和㳟敬之徳皆盡羙也葢為懐保小民與夫加惠於鮮乏鰥寡之人而已自旦至于日中及日􅉴不暇飲食也葢為咸和萬民而已夫欲天下之匹夫匹婦無有不被其澤則無望乎適一己之便逸豫者可以適一己之便矣而天下之民必有不得其所者使文王為鮮衣羙服則必不能就安民治田之功狠虐暴慢則必不能加惠於窮民惟口腹之是念則必不能咸和萬民何者天下無兩全之利也是以文王寧屈己以便民不肯拂民以奉己也然文王之愛民不獨此也又不敢盤樂于遊田者葢以庶邦之貢賦惟供所當用者若以供遊田之費則非其正矣夫天地之生財有限而庶邦之貢賦有常若以供其私費則必有不繼者而横賦暴斂將自此起矣文王之所以不敢盤于遊田也惟文王之無逸如此故其享有國祚者五十年受命惟中身者文王九十七而終而享國五十年則受天之命而繼世即位以九十七言之正得其半故扵身為中也唐孔氏曰文王即位時年四十七扵身非中而言中身舉全數而言之也徽懿皆羙也徽柔懿㳟言柔之與㳟皆盡其羙非以聲音笑貌而為之猶言允恭克讓也日中􅉴謂日中及􅉴時也左傳曰日上其中食日為二旦日為三是以日有十數平旦而後食時食時而後日中日中而後日昳昳即􅉴也謂日蹉跌而下也說文曰日在西方時􅉴也夫謂之食時則人飲食葢以此時今自旦至日中及􅉴而不暇食其勤可見矣遑即暇也唐孔氏曰重言之者古人自有複語猶言艱難是也在昜損上益下為益損下益上為損損下者宜上之益也而乃為損者百姓足君孰與不足故也文王欲即康功田功則卑其衣服欲恵鮮鰥寡則徽柔懿㳟欲咸和萬民則不遑暇食身為人君而其奉養如是之薄經綸如是之勞可謂損上益下矣而其效則至扵享國久長益孰有大於此者乎而説者乃有文以憂勤損夀武以逸樂延年之言其戾扵經世之言文武之年者文王九十七而終武王九十三而終是文武之年皆所謂期頤之夀也魚麗之序曰文武以天保以上治内采薇以下治外始扵憂勤終扵逸樂是文武皆以憂勤之故而後享其逸樂非文王憂勤而武王逸樂也既非文王憂勤而武王逸樂而文武又皆享期頤之夀安得謂文王以憂勤損夀武王以逸樂延年哉為此説者葢以文王世子之言我百爾九十吾與爾三焉惟文王自減其三以益武王故有損夀延年之言所欲與武王以三齡葢將以成其克商之志則是文王年十八生武王至崩時武王年八十矣即位十一年而伐商既克商二年而崩其集大統也葢在於所與三齡之内不與之則商不可得而克其所以或損或增者非以憂勤逸樂之故也周公謂文王以無逸享國久長先儒乃謂文王以憂勤損壽學者將孰信哉繼自今嗣王繼自今以徃嗣世之主皆當如是也司馬侍講曰不獨成王當以為戒繼自今以徃嗣世之主皆當以為戒周公用意深逺垂訓後世故并言之是也淫過也觀逸游畋皆所謂逸豫也欲必一一而辨之則如隱公之觀魚莊公之觀社所謂觀也秦二世居禁中公卿希得朝見唐敬宗日晏坐朝所謂逸也周穆王周行天下將皆必有車轍馬迹所謂游也太康畋于有洛之表所謂畋也夫觀逸遊畋人情所不䏻免也先王豈惡之哉所惡扵觀逸遊畋者謂其過也過而為之如前數君之所為則所費不貲下民有受其弊啇之後王所以享國之促者葢以此也故自今嗣王不可過為觀逸㳺畋之樂以萬民之稅賦惟供其所用者其可輕費而妄用哉或曰庶邦或曰萬民亦是史家之體經緯其文不必為之説也能愛惜萬民之膏血而不以供一己之私欲則其享國亦將如三宗文王矣夫享國之長久在於無淫于觀于逸于遊于畋以萬民惟正之供而漢武帝恃其冨強之資靡所不為明珠文甲通犀翠羽之珍盈於後宫蒲梢龍文魚目汗血之馬充於黄門廣開上林穿昆明池營千門萬戸之宫立神明通天之臺又嘗勒兵十餘萬北巡朔方遂東幸緱氏登中嶽東巡海上封禪泰山復並海北之碣石歴北邉八月之閒行萬八千里其費不可勝計於是搉酒酤筦鹽鐵鑄白金造皮幣算至車船租及六畜其肆為逸樂以横取於民一至於此乃欲禮方士祠神人遊大海望蓬莱以求長生延年之術正所謂卻行而求及前人也不可自假曰惟今日為此耽樂他日不復為也夫耽樂者非所以訓民非所以順天是人大則有過矣夫自古人君之耽樂也豈以其害治而為之哉葢以為無害也彼自以為終嵗憂勤惟一日之耽樂有何不可哉然兢兢業業一日二日萬幾一日二日之閒而危亡之幾至於萬數故一日之勤則有一日之效一日之逸則有一日之害自此而積之以一日之逸為無害則雖一月亦可以一月之逸為無害則雖一嵗亦可以一嵗之逸為無害則雖終身亦可也葢人君不可以有逸豫之心苟有其心則日復一日月復一月嵗復一嵗浸淫横流而不可遏矣夫仰天而天或倦俯地而地或怠則其確然隤然者且將與物俱腐矣葢至誠無息悠久無疆皆不息之積也苟有息焉則一日之耽樂而終身之禍其在是矣何者以其息故也息則不可以久不可以久則善心日消人慾日肆而無復有為矣昔宇文士及謂唐太宗曰南衙羣臣面折廷諍陛下不得舉手今日幸在左右不少有將順則為天子亦何聊使其以少有將順為無害自此而積之則朝夕之閒左右之臣將務為阿諛矣耽樂之源其不可啓也如此陶侃在廣州無事輙朝運百甓於齋外暮運百甓於齋内人問其故侃曰吾方致力中原過爾優逸恐不堪事侃之心以一日之逸其害如此人君能以陶侃之心為心則豈以今日耽樂為可哉觀酒誥言商紂之酣身至縦淫佚于非彞用燕喪威儀厥心疾很不克畏死其禍惨矣而其源葢自於一日之耽樂故周公戒王曰無若商王受之迷亂以沈酗于酒而為徳東坡曰周公戒成王曰無若商王受之迷亂酗于酒徳成王豈有是哉當時人君曽莫之罪而前史書之以為羙談此説甚善葢進言於上切直而無避諱者此實大臣愛君之心也唐太宗營洛陽殿張元素曰昔阿房成秦人散章華就楚衆離乾陽華清隋人解體臣恐陛下之過甚於煬帝賈誼曰前車覆後車戒秦世所以亟絶者其轍迹可見也然而不避是後車又將覆也此皆得周公之意夫商亡而周代之則必以商之惡為諱而其可鑒者莫如商秦亡而漢代之則必以秦之惡為諱而其可鑒者莫如秦隋亡而唐代之則必以隋之惡為諱而可鑒者莫如隋故忠臣之言必以此而獻替上使其知所警也周公曰嗚呼我聞曰古之人猶胥訓告胥保恵胥敎誨民無或胥譸張為幻此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王玆四人迪哲厥或告之曰小人怨汝詈汝則皇自敬徳厥愆曰朕之愆允若時不啻不敢含怒此厥不聼人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寛綽厥心亂罰無罪殺無辜怨有同是叢于厥身周公曰嗚呼嗣王其監于兹周公既欲成王以商之三宗及我周之先王為法以商之後王及紂之酗于酒為戒戰戰兢兢懐憂勤戒懼之心以保盈成之業不可以須臾舍雖一日之耽樂亦不可為乃可以享國久長以介眉夀矣周公於此又以謂為人君者苟能無逸則公公則明明則䜛邪無自而萌怨讟無自而生刑罰無自而虐此其所以治安苟或逸豫則心術不明心術不明則讒邪必萌讒邪萌則怨讟必生怨讟生則刑罰必虐此其所以亂亡並作其源皆自於一日之逸此周公所以又反覆而言之也古之人謂前古盛治之世也前古盛治之世政敎脩明海内乂寧可無事於獻替矣然其臣猶相與訓告保恵敎誨於其君君兼聼於上而下情通則民之利病罔不周知此民之所以無能相譸張而為幻也夫小人之譸張為幻類出於宴安無事之世方其宴安無事也自以為上恬下熙怡怡自如方甘心於聲色之奉游畋之樂惟恐失之其肯以國事為意哉人主既不以國事為意而讒邪之人又䏻順適其所欲彼將自以為既得是人則可以安枕矣故其譸張為幻無所不至也惟古之人猶胥訓告保惠敎誨則姦邪不能乗閒投隙而入之此其所以不能譸張為幻也譬之人營衛開通血氣周流斯能無膏肓心腹之疾苟其壅遏否塞必將百疾閒作唐太宗之世惟其屈己以從諫有所不言言無不聼公卿大夫皆思陳善閉邪以輔成人主之徳是以治道通逹而小人不得以摇其志封徳彝誘之以律而不從權萬紀怵之以財利而不納其誰能譸張為幻哉以唐太宗觀之則知古之人其所以抑絶小人使不能譸張為幻者惟其胥訓告保惠敎誨而已苟其不聽古人之所為則邪佞非僻之言昜入故人乃有以非道訓之者遂變亂先王之正法至于小者大者無不紛更也夫先王之正法民情之所安也今既變亂則民將自此而不寧此心之所以違怨而口之所以詛祝也夫天下已安已治謂之守文之世者言前世人創業垂統為可繼矣惟在於守之而勿失也然自古守文之世所以每至於亂者惟其不䏻守也葢其始也必有小人焉以前世之法度為不足守欲盡取而紛更之則天下之亂萌於此矣當其治安也紀綱制度煥然可述君臣無為固足以為治矣然其變亂先王之正刑者皆小人之喜作為不䏻安於無事故奮其私智謂前世人法度狹鄙廢墜不足以有為非更張則不可其意葢謂不如是則不能以其世而固寵也漢之張湯桑𢎞羊唐之宇文融李林甫其所以致位公輔恩寵固結而不可解者惟以是故也故周公之言有及於此伊尹之告大甲曰君罔以辯言亂舊政正此意也夫舜大聖人也而益猶戒之以罔失法度况太甲成王乎訓告保惠敎誨皆是言人臣以正言而進於君也保安之也惠順之也惠與不惠于阿衡之惠同既曰訓告又曰保惠又曰敎誨則人臣之於君其所以將順其羙而彌縫其闕之端盡於此矣而唐孔氏謂敎誨以義方訓告以善道安順以羙政胡博士則曰訓告以言保惠以徳敎誨以道林子和則曰訓告以事言之保惠以徳言之敎誨以道言之其説皆臲卼而不安苟易彼而為此易此而為彼皆可也葢一一而辯之非周公本意所存不辯可也胥者言臣之相與以是而啓迪於上也與官師相規之相同陳少南曰古人之言言胥訓小人之訓不言胥則知古之人君兼聼亂世之君専聼小人而已此說為善譸張爾雅曰誑也幻相詐惑也列子曰窮數逹變因形移昜者謂之化謂之幻漢張騫傳曰大宛諸國以大鳥卵及犛靬眩人獻扵漢顔師古曰眩讀與幻同即今吞刀吐火植瓜種樹屠人截馬之術皆是也讒邪之人以是為非以非為是惑亂人主之視聽謂之為幻可謂得小人之情狀矣違怨者司馬侍講曰外雖迫於威刑不敢不從獨其心相違而怨憾也詛祝者唐孔氏曰告神明令加殃咎也傳曰楚郤宛之難國言未已進胙者莫不謗令尹則是祝詛者因祭而為之也否者言民之不違怨則詛祝不祝詛則違怨也周公又嗟歎而言曰自大戊及武丁及大甲及文王此四人皆迪於哲四人之所以迪哲者以其無逸故也無逸則公公則明也上之所言者太王王季而後及文王此特舉文王而舍太王王季故王氏曰四人皆天子非若諸侯以戰戰兢兢為孝者楊龜山破之謂畏天者保其國而已謂中宗為畏天是亦諸侯之事其説自相抵牾矣文王大勲未集雖曰受命之君未嘗為天子也葢四人者皆享國克夀故特言之非謂其為天子也此説是矣夫無逸之所言者葢皆以其戰戰競兢而取之如王氏之言則是逸豫自肆者乃周公之所取也范内翰曰祖甲初立不眀能聼伊尹之訓克終其德聖人重其改過列扵三宗與文王同為明哲之君由是觀之改過聼諫人君之大徳也此説甚善自祖甲之不明而言之則將與桀紂同科今遂與文王同列則人君不可以其有過而自棄惟患其不䏻改也惟四人之迪哲則不為浮言所惑故人雖告之曰小人或怨恨扵汝毁詈於汝則必自反於己思所以致其怨我詈我之由故大自敬其徳也夫當四人之治天下以其無逸之故民將誦而歌舞之豈復有怨詈者哉然小人之欲得志於朝者必設為此言以嘗試其君君苟不察而輕信之則心術將自此不正而可以利動矣惟其自反於己以敬徳則浮言無自而入也民之有過則曰我之過所謂萬方有罪在予一人百姓有過在予一人是也民之所以不䏻漸仁摩義而至於有過者皆我有以致之豈以為斯民之罪哉人君信䏻如是則不啻不敢含怒也必和恱其顔色而受之則其聞怨詈之言已誠有以致之其必敬修厥徳而不敢怠苟無有也豈以怨詈者為無根之言而窮治之哉亦三省其身而後已且人之告我以是固欲其忿怒肆行而後已得以逞其志今惟敬徳而已彼何自而入哉苟其不聽四人之所為而昏暗不明則人將譸張為幻曰小人怨汝詈汝則必信之如是者以其不䏻長念其為君之道不寛綽其心敬信其言以為誠然至於無罪無辜者必將惟其殺罰矣無罪而罰之無辜而殺之是亂也則天下之怨同而聚於吾身矣如周厲王之監謗秦始皇有誹謗妖言之律是不念為君之道以寛綽其心故其刑罰不當此怨之所積而厲王流于彘秦二世而亡也葢眀王之治天下固無致怨詈之道然聞怨詈之言而益敬徳則怨詈何自而興暗主之治天下怨汝詈汝乃其所戒也今聞怨詈之言而又嚴刑峻法欲以遏絶之則怨當益深而詈當益衆矣嗣王不可以不監也成王長於深居之中以㓜沖之年而即天子之位周公懼其有驕心也今始聼政而天下太平周公懼其有怠心也驕怠之心一萌則觀逸游田無所不為䜛邪之所自入怨讟之所自興刑罰之所自繁而夀考何自而致乎故周公作此篇以戒之前後反覆惟欲其無逸而已惟其無逸則將専心於學問留意於政事其他可以伐性損夀者有不暇為此所以夀也漢霍光之輔昭帝方其幼沖之年所習之邪正則夀夭由此而分光欲上官皇后擅寵有子雖宫人使令皆為窮袴多其帶後宫莫有進者夫少之時血氣未定戒之在色此豈輔少主之道哉昭帝之所以享年不永者葢光之所以輔之者非其道也以昭帝之聦慧使光知以無逸之意為之啓沃是亦成王之徒也然則光之愛君乃婦人女子之愛君異乎周公也周公之於成王前有七月之詩後有無逸之書體雖異而意則同七月之詩欲其知創業之難而不敢忽無逸之書則欲其知守文之不易而不敢怠唐太宗問創業守成孰難房元齡以創業為難魏徵以守成為難元齡之心七月之詩也魏徵之心無逸之書也皆有周公愛君之遺意尚書全解卷三十二
