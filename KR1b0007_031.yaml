body:
  text: 尚書全解卷三十一宋林之竒撰洛誥周書召公既相宅周公往營成周使來告卜作洛誥洛誥周公拜手稽首曰朕復子眀辟王如弗敢及天基命定命豫乃胤保大相東土其基作民眀辟豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言召誥洛誥二篇皆作於營洛邑之際然當其營洛邑也蓋周公之意將歸政於成王故召公因諸侯庶殷之咸在告王以天命之無常歷年之不可必惟一視商周之民無輕重於其間而敬德以化之則可以此小民而受天永命蓋以成王當聽政之初安危治亂之所自始不可以不謹此則召誥之所陳也而洛誥之所陳者則周公將歸政于成王而洛邑既成王將歸鎬京乃留公於洛以鎮撫商民故周公之歸政成王之留公於洛其相與問答之言備載于此而周公之意則亦欲一視商周之人如召公之意也此二篇辭雖不同而其意相為終始焉左氏之作傳以釋經有先經以始事者有後經以終義者召誥之篇是先經以始事之類也洛誥之篇是後經以終義之類也然召誥之所載者召公之相宅既而卜之既而經營之既而攻其位既而周公達觀之既而周公用書以命之既而庶殷丕作於是召公遂以諸侯取幣而陳於王因陳其所欲告戒之意而序之所言者但曰成王在豐欲宅洛邑使召公先相宅而已此篇之所載者周公欲歸政于成王而成王不可周公又告成王以治道之要既而成王欲周公留居于洛以鎮撫殷民而序之所言者乃曰召公既相宅周公往營成周使來告卜者即周公之言伻來以圖及獻卜之一也而即以此為一篇之序者蓋書序之作類非一人之所為故有一篇之義包括於數句之間者如太甲之序曰太甲既立不明伊尹放諸桐三年復歸于亳思庸此固可以包括三篇之義者也亦有姑撮其事之始而略載之者如康誥酒誥梓材三篇之作雖康叔之封在於武庚三叔既誅之後而其告之也乃在夫宅新邑洛四方和會之時而其序則曰成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材此則姑撮其事之始而已召誥洛誥之序亦猶此也周公之達觀于新邑營蓋王城之與成周皆在於規度此則惟曰往營成周亦是略言之也使來告卜者當周公之至洛王尚在塗故遣使而來以所得吉卜告於成王也胡舍人之説意謂果周公使人而來告卜於王則王在豐而周公在洛篇內不應有相與問答之辭既有成王周公相與問答之辭則告吉卜者非使人來也遂以此使字作去聲讀言是時成王在于宗周周公既得吉卜則自為使者而來告于王因得以相與問答也漢吳王濞謀叛漢念諸侯無足與計者聞膠西王勇好兵諸侯皆畏憚之乃使其大夫應髙説之膠西王以為善吳王猶恐其不果乃身自為使者至膠西面約之胡舍人因謂周公之自為使者亦吳王之類夫吳王懷逆亂之謀恐事不集故出于一時迫切之計而為此耳若周公之告吉卜使人可也豈至以冢宰之尊而下行行人之職乎乃引吳王以證周公非其類也當是時王實在洛而胡舍人以為在于宗周王既在宗周無緣與周公共談求其説而不得故以使字作去聲讀此蓋胡舍人泥于書序為皆包括一篇之義故其説如此先儒謂王與周公俱至意謂王亦以乙卯之日至于洛也王果以乙卯之日至于洛則其得吉卜也王蓋嘗目覩其事豈必使人來告則王之至洛蓋後周公而來也先儒又謂周公與王之相問答乃周公既成洛邑又歸宗周之後故篇末云王在新邑明戊辰以前皆是宗周之事此亦不然篇內有曰豫小子其退即辟于周又曰公定豫往已是成王將退而歸鎬京欲周公留居於洛則其相與應答皆在洛邑也明矣案此二篇皆是營洛邑之事然召誥則以召公誥王之故而以召之一字繫之以誥而命篇此篇是周公與王問答而特以洛名篇正猶康誥酒誥雖皆所以告康叔酒誥則以毖酒之故而以酒名篇康誥則特以康叔之故即以康命篇皆其史官一時之意旨也漢孔氏曰既成洛邑將致政於王因陳居洛之義如此則書之命篇皆有其義也非當時命篇之本義拜手稽首者致敬盡禮於成王也復子明辟者漢孔氏曰言我復還明君之政於子而王氏破其説曰先儒謂成王幼周公代王為辟至是乃反政于成王故曰復子明辟荀卿曰以叔代王而非越也君臣易位而非不順也以書考之周公位冢宰正百工而已未嘗代王為辟則何君臣易位復辟之有哉如禮明堂位曰昔者周公朝諸侯于明堂之位天子負斧扆南鄉而立又曰武王崩成王幼弱周公踐天子之位以治天下則是周公正天子之位以臨萬國王氏之所謂代王為辟者指此也則王氏之破先儒之説可謂明於君臣之大分而有功於名教也蓋説者徒見成王幼沖周公攝政則遂疑其稱王以令天下如多士之篇序曰成周既成遷殷頑民周公以王命誥而篇之發首則曰惟三月周公初于新邑洛用告啇王士王若曰蓋眀周公雖攝政而其號令皆稱成王之命也謂代王為辟固無是理然王氏之説則曰復如復逆之復成王命周公往營成周周公得卜復命於成王謂成王為子者親之也謂成王為眀辟者尊之也案周公之至洛而得吉卜則已遣使人來告於王下文曰伻來以圖及獻卜是也非是周公至此方以吉卜而復於成王也且既謂成王為子又謂眀辟以為兼尊親之稱則鑿矣蓋先儒謂復子為還政於成王則是但以眀辟為還眀君之政則是代王為辟此則不可也蘇氏曰周公雖不居位稱王然是行王事至此歸政則成王之德始眀於天下曰子者叔父家人之辭此則得之當周公之攝也成王雖為天子然端拱於上而已何所為哉今也始親萬幾則君道自此眀矣故曰眀辟漢宣帝紀地節二年大將軍光薨上始親政事令羣臣得奏封事以知下情五日一聽事自丞相以下各奉職奏事以傳奏其言考試功能樞機周密品式備具上下相安莫有苟且之意自光未薨之前政由光出宣帝雖有綜核名實之志天下何自而知之一旦親政而其設施如此則為辟之道豈不眀哉周公之攝政制禮作樂而天下太平成王之年已長蓋將歸政於成王使成王之君德大眀於天下亦已久矣然武王定鼎于郟鄏有宅洛之志而未之果其事大體重必有藉於周公而復能卒成王之志故周公謂我久欲還政於子而王若不敢及天命之始而定其命以固根本此亦猶漢宣帝即位光稽首歸政上謙讓委任焉成王之不敢即宣帝之謙讓也故我乃繼此以保佑成王以相視東土之洛邑經營規度以為成王作民明君之始也周公之意營洛而即歸政故欲其作民明君於此始也我以三月之十二乙卯之旦至于洛邑其曰洛師者唐孔氏曰周公至洛之時庶殷已集于洛邑故曰洛師是也黎水在河之北故曰河朔黎水周公之營東都蓋以求天地之中欲諸侯之朝覲貢賦道里為均而乃先卜河朔黎水者顧氏曰黎水近於紂都為其懷土重遷故先卜近以恱之此説固是意者黎水去洛不逺亦不失為地中也黎水為河朔則澗水瀍水皆在河之南可知矣禹貢曰導洛至澗瀍洛與澗皆在河南而澗在瀍西瀍在澗東瀍澗皆在洛之北澗之東瀍之西王城也洛之北地瀍之東成周也亦洛之北地故皆曰惟洛食眀此二邑皆在於洛但以澗而别其為二矣凡卜者先以墨畫龜要坼依此墨然後灼之求其兆順食此墨畫之處故謂之食周官卜師曰揚火以作龜致其墨者灼之明其兆蓋食則吉不食則不吉也周公之卜也以河朔於啇都為近故先卜之而其兆不吉乃改卜瀍之西及其東皆獲吉焉則使人來以其地圖及吉卜獻於成王蓋將畢此事而復政也伻使也召誥曰越三日戊申太保朝至于洛卜宅厥既得卜則經營即此卜河朔黎水及澗東瀍西及瀍之東是也召公之得吉卜也周公尚未至而周公以為我卜者葉博士曰成王使召公相宅而所以營洛而成之周公實總其事則卜也奉以歸之周公宜矣是也蓋召公之得吉卜即經營而周公之來至則方以此獻之王也王拜手稽首者致敬盡禮於周公也禮曰君與臣無答拜蓋尊卑之分當然也而太甲之於伊尹成王之於周公皆有拜手稽首之禮此又尊師重傅之道然也周公既欲營洛而遂歸政而成王之心猶未敢當也故答周公之言如此言公之營洛邑蓋成武王之志定九鼎以永天休命公既不敢不敬奉之而來相宅於此洛地其將作周家之業以配天之休命也公既達觀于新邑營而定其新居之地則使人來至於王所視我以卜之休美及其常吉常吉者言建都於此其吉未艾也傳曰成王定鼎于郟鄏卜世三十卜年七百非常吉而何貞正也言我與周公二人共正此卜以定其謀公當輔佐我小子常如營洛之事可以我萬億年而敬天之休也觀成王有誨我之言而拜手稽首以敬之也周公之復政也蓋以成王之德固已成就可以君天下成王之不聽公之復政也蓋以幼沖之資懼其弗克負荷以沗祖考之大業故其君臣問答之誠無所矯飾也周公曰王肇稱殷禮祀于新邑咸秩無文豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始焰焰厥攸灼敘弗其絶厥若彝及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭公曰已汝惟沖子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇聽朕教汝于棐民彞汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無逺用戾語曰君薨百官總已以聽於冢宰三年蓋人君當其繼世之初創巨者其日多痛甚者其愈遲感哀戚之情則失萬幾之務有所不暇恤此所以以其政委於冢宰至於三年之久而後歸也然自古人君之嗣位或在襁褓之中或當幼沖之年安危治亂之機豈能諳識舉措取舍之端豈能錬習而使之君天下豈不殆哉故當是時也則冢宰之總百官蓋不拘于三年也必俟其年已長矣德已成矣教導訓迪而其聰明日益進而後可以歸政也周公之位冢宰正百工也蓋以成王沖幼之年故至七年而始復子明辟然周公之攝也制禮作樂以致太平凡朝廷之制度紀綱莫不得其條理而四海九州之民莫不安居樂業天下之勢蓋若泰山而四維之安雖植遺腹朝委裘而天下自治况成王之德以周公為師召公為保之故見正事聞正言行正道左右前後莫匪正人至是而可以躬覽萬幾矣此所以復子明辟也而成王之心猶懼其弗克負荷以沗祖考之大業故周公雖欲歸政而成王猶未之聽周公以謂當王繼世之初年尚幼沖而德未成立故不得不總百官之政及王年長而德成其可以不歸政乎王惟能以至公為心無有殷周之間而于諸侯享覲之禮有以辨之使皆盡其奉上之心則以之君天下豈難也哉故自此以下皆周公將歸政而戒成王之言也王肇稱殷禮祀于新邑漢孔氏曰王當始舉殷家祭祀以禮典祀于新邑王氏曰殷者與五年再殷祭之殷同非夏殷之殷也當從王民之説易象雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考禮有殷祭殷奠皆取殷盛之義與周因於殷禮其字雖同而義則異矣考之詩頌清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉當公之攝制禮作樂無政之不舉所未及者營洛邑耳今也規度經營斷之朝廷而考之龜策建王城以定九鼎建成周以遷殷民上天之所以命我文王之命自此定矣故方其邑之初成則率諸侯以祀文王而始舉盛禮以告成也易萃卦曰王假有廟用大牲蓋萃聚之世豐厚之時也其用宜稱此所以用大牲周公致太平而營洛邑非萃之時乎則始舉盛禮以祭祀豈不宜哉咸秩無文此禮之殷也無文謂不在祀典者也祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之及夫日月星辰民所瞻仰也山林川谷邱陵民所取財用也非此族也不在祀典必有典者不可非其鬼而祭之也亦不可昏棄厥肆祀弗答也今成王既舉盛禮則雖不在祀典者亦皆以秩次而祭之也成王舉殷禮雖不在祀典者秩次而祭之而其所以秩次之者蓋必有其官若伯夷所掌之官謂之秩宗也楚語曰使名姓之後能知四時之生犧牲之物玉帛之類乘服之儀屏攝之位壇場之所上下之神氏族之出而心率舊典者為之宗則宗伯者所以秩次所祭之神也王既舉盛禮以祭于新邑故我齊一百官無有彼此無有親踈使皆從王于周我惟曰庶幾此百官皆舉職事以效功也今王就洛而命我曰有功者則記而尊之以其功而列之大祀王氏曰記功者若紀於太常藏在盟府闕博採而無所偏私也昔昌邑王即帝位國輔大臣未褒而昌邑小輩先遷張敞以為過之大昌邑之羣臣固不足道然其心之有所私則與髙祖光武無以異也况殷之餘民新從三叔武庚之叛於周家不無嫌間而成王之所記功者皆其自教工則殷民聞之必將不自安矣故周公呼成王而告之曰汝雖孺子其為朋乎孺子苟由朋黨而往則其禍不可救當遏之於始無若火焉其始之焰焰其撲滅之固易為力而不之為其終也所燔灼者自有次序以漸而積不可得而絶矣蓋焰焰不滅炎炎若何百尺之室以突隙之煙焚天下之患未有不始于微而成于著也漢唐朋黨之禍皆始於細微而不謹則其末寖淫而不可解漢之朋黨始於甘陵南北二部而其終也鈎黨之獄興海內塗炭二十餘年唐之朋黨始于牛李對䇿而其終也相軋四十餘年縉紳之禍不解兹非若火始焰焰厥攸灼敘弗其絶乎成王之賞功而悉以自教工雖若小過也自智者觀之蓋將以為莫大之禍漢唐之事自可見矣故今王其所順之常道及有所撫臨之事當如我惟以在周之百工往新邑使之向就舊僚以趨事赴功正惟擇有功者顯明而作起之王之所知者臣之有功而已不當以私人而偏寵之也能如此則是篤厚光大以成汝寬裕之德汝將永有稱譽之辭於後世歷千萬年而不泯也蓋惇大成裕則不徇於私而為朋黨矣徇於私者乃浮躁衒露狹隘偏小之人也豈能成寬裕之德哉泰之九二曰包荒用馮河不遐遺朋亡得尚于中行即此之謂也周公又告成王曰已矣汝惟沖子當思其終也當思其終者蓋當敬識百辟之享與不享者也百辟諸侯也享朝享也夫三代之時一人端拱于上而諸侯謹度於下分土而與之共守分民而與之共治故其強弱盛衰之勢惟在於諸侯也苟諸侯致其誠盡其禮以朝覲於吾則天子尊而京師強海內之勢如身之使臂臂之使指莫不制從其或雖朝覲宗遇得其時多其幣而其誠不專其禮不謹則王室輕而諸侯慢自此而則之諸侯將皆不得欲朝以為王者不可朝事矣故王於此當敬識而下别之也儀禮也物幣也考之覲禮諸侯之朝王皆有束帛加璧庭實所謂物也其辭遜升降之容所謂儀也享固多儀苟儀不及物禮不足而幣有餘則雖享覲於王與不享無以異也蓋不享固為非禮享而儀不足是亦非禮故與不享同也其所以儀不足者蓋以諸侯不用志于享上故也諸侯既不專心致意於此則凡民化之亦皆無奉上之心天下之事將差錯侮慢不可正也故汝當敬識之敬識之者以諸侯之勤惰而反諸已戒謹恐懼不敢忽也苟不能敬識則王綱廢弛而不能自振春秋之時自可見矣僖二十八年公朝于王所蓋因晉侯召王而朝之也成十三年公如京師蓋因會晉伐秦而朝之也使當時天王不在河陽晉不召諸侯伐秦其肯出于誠心跋涉山川述職于王庭以講纍世久廢之典乎此所謂不役志于享蓋與不朝無以異也昔孟子居鄒季任為任處守以幣交受之而不報處于平陸儲子為相以幣交受之而不報他日由鄒之任見季子由平陸之齊不見儲子屋廬子以孟子為非謂季任君弟故見之儲子為相故輕之孟子曰非也書曰享多儀儀不及物惟曰不享惟不役志于享為其不成享也孟子之意以為季任為任處守其職不可舍宗廟而見孟子故可以幣交儲子可以越境而見孟子今乃使人致其幣則所謂儀不及物也非所謂役志也觀孟子之言則僖之朝王所成公之如京師豈得為成享哉檀公曰喪禮與其哀不足而禮有餘也孰若禮不足而哀有餘祭禮與其敬不足而禮有餘也孰若禮不足而敬有餘祭之所謂敬喪之所謂哀即此所謂儀也其所謂禮即此所謂物也祭不可以敬不足而禮有餘喪不可以哀不足而禮有餘則享其可以儀不及物哉蓋使其用志于此則儀豈有不及者哉非特諸侯之享王不可恃其幣而不役志于享王之待其臣亦不可徒以爵祿而寵鍚之當以其嘉猷嘉謀之入告者服膺而不失也故謂成王苟徒以爵祿寵鍚我而不暇聽我教汝輔民彝之道則是不勉其安能永保天命綿綿延延而不替哉蘉勉也汝欲永保天命則當厚于次序正父武王之所為而行之無不順我之教以棐民彝輔之翼之正之直之使自得之而不自棄于小人之域則天下不敢棄汝之教命矣汝自今以往當致其敬敬則能勉我惟教民以農事也蓋倉廩實而後知禮節衣食足而後知榮辱苟為制民之産仰不足以事父母俯不足以蓄妻子奚暇治禮義哉此周公明農而後成王得以棐民彞也彼裕我民無逺用戾孔氏曰彼天下被寬裕之政則我民無逺不用來蘇氏曰我不裕民而彼或裕之則無逺而逝矣不如王氏曰彼逺者以我民為裕則無逺用戾也蓋明農以棐民彞此我民之所以裕也成王之遷殷頑民欲其密邇王室式化厥訓故曰彼裕我民無逺用戾觀周公之告成王之言蓋謂成王能盡此道則其於君天下蓋有餘刃也我安得而不復子明辟哉王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀王曰公功棐迪篤罔不若時王曰公豫小子其退即辟于周命公後四方迪亂未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享周公之攝也雖成王亮隂之制已終而猶秉朝政蓋以成王幼沖未可以為天子故不得不攝也此公之處禮之變也至是而復子明辟蓋以成王年已長矣德已成矣可以為天子矣故不得不歸也周公慨然自任以天下之重故其處禮之變而攝政至于七年未嘗飭小謙以邀譽當世則其歸政也夫豈以禮讓也哉必其出于中心之誠可以歸政而遂歸之也成王知周公之意已堅故不得不許公焉既而洛邑始成而頑民始遷將欲作其愧恥之心而革其暴戾之習以馴致于士君子之域不可不擇人以鎮撫之周公既已歸政當為我留居洛中以為之司牧也故自此以下皆成王稱譽周公居攝之功而留公于洛以治頑民也自公明保豫沖子以下皆稱美其居攝之功也自小子其退即辟于周以下皆留公于洛以治頑民也沖子成王自謂也言公之明保我幼沖人也公則稱舉其大明之德以輔我一人使我雖小子得以繼揚文武之功業而不墜故上則可以奉答天命下則可以和恆四方之民也夫文王武王之所以肇造區夏而建無窮之功業者惟其上得天下得人而已故周公能盡其翊贊之力以成王揚文武之烈則亦可以奉答天命而為上天之眷顧和恆四方民而為下民之所愛戴也居師謂居其衆惇宗謂厚其族薛博士曰居師惇宗將禮秩祀皆王宅洛之政是也既宅洛以定民之居而又惇厚宗族以為藩翰于是秉禮而稱秩元祀咸秩無文也咸秩無文即上文曰肇稱殷禮祀于新邑咸秩無文是也成王以冢嗣繼世為天子實主周家之祭祀故周公以肇稱殷禮祀于新邑為王之事然是時政自周公出其所以能營洛以展祭祀之禮者則周公之力故成王歸功于公也惟公德明光于上下勤施于四方者言公之德其明則光于上下而無所不達其達則施于四方而無所不被光于上下勤施于四方正猶堯典曰格于上下光被四表也格于上下光被四表而堯之君德於是為至光于上下施于四方而周公之臣德於是為至蓋德之盛者必其充塞天地遍覆天下而後為至也薛博士曰明者德勤者業也經只言惟公德明而於其下分德與業非也旁作穆穆迓衡先儒曰四方旁求為敬王之道以迎太平之政不如王氏曰穆穆天子之容旁作謂輔成王而作之以成其穆穆之德以迎太平是以於文武之勤教垂之後代者皆率循之而不迷也豫沖子夙夜毖祀者昔周之政事既自周公出以致太平則成王端拱于上何所為哉惟蚤夜之間愼於祭祀而已唐孔氏曰襄公二十六年左傳云衛獻公使與寧喜言曰苟得反國政由寧氏祭則寡人亦猶是也此説為是王曰公功棐迪篤罔不若時者唐孔氏曰王又重述前言還説居攝時事也公之功棐道我已厚矣天下無有不順而是公之功者是也王氏以為罔不若罔不時循道而不違此棐迪之若趨時而不失此棐迪之時此則鑿矣王曰公豫小子其退即辟于周命公後者漢孔氏曰我小子退坐之後便就君于周命立公後公當留佐我意謂成王是時在于宗周與周公相應答至于戊辰王在新邑以後方至洛都故謂成王言我當退而行天子之政于洛邑立公之世子為諸侯公當留周以為我之輔是成王雖許公之歸政而不許公之去也諸家説者亦皆以命公後為封伯禽于魯夫周公之歸政而成王之留公蓋在洛邑其曰退即辟于周者蓋我將退而即明辟之政于宗周則命公留居于洛也其曰命公後者若近世留守留後之類詳考此篇之意蓋周公留成周以遷殷頑民使密邇王室式化厥訓成王祀于新邑將歸鎬京留周公于洛以鎮撫殷民故成王之言曰其退即辟于周命公後又曰公定豫往已皆言成王往而周公留也王往周公留故以周公之留為命公後先儒解釋此篇文意多不聨屬良由以王命周公後為封伯禽於魯故其説不通惟以命公後為留居于洛以此而反復經意則首尾問答乃有條貫也案伯禽與太公望相先後而報政其言見於傳記甚詳則其就封於魯為周公後也固已久矣非在於洛邑既成之後也夫必待封伯禽於魯然後肯留以輔成王此則淺丈夫要君射利之為也豈所以待周公哉案成王命君陳之分正東郊也其言曰昔周公師保萬民民懷其德往謹乃司兹率厥常懋昭周公之訓惟民其乂康王命畢公之保釐東郊也其言曰惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓今豫祗命公以周公之事又曰惟周公克謹厥始惟君陳克和厥中惟公克成厥終以此二者觀之則周公之於洛邑蓋亦分正而保釐之不但營之而遷殷頑民也故成王之於君陳則欲其懋昭周公之訓康王之命畢公則祗命以周公之事且又有始終中之言則周公之於殷民蓋嘗為之司牧革其不善之習而馴納之善也故君陳畢公得以繼其遺範以是知命公後其為成王留公于洛以鎮撫殷民也明矣若成王既祀于新邑而周公即與之歸于鎬京以為王輔則君陳之分正畢公之保釐安得以周公為始而或和其中或成其終哉周公將復子明辟成王許之故曰即辟于周亂治也賈文元公曰乿古文尚書治字也􅜆古文亂字也孔安國訓亂曰治經典大抵以亂為不理亦或為理夫理亂之義善惡相反而以理訓亂可惑焉若以古文禹書考之似乿亂字别而體近豈𨽻古之初傳習訛謬合為一字而作治亂二訓後之諸儒遂不復辨之歟當是時制禮作樂以致太平天下之民無不感戴周德惟殷民之頑雖遷於洛而未能使之遷善逺罪故謂四方雖迪於治然猶未定于宗廟之禮蓋成王將以騂牛祭于文武以告周公之留于洛其禮未行故曰未定于宗廟之禮殷民既未能式化厥訓以遷善逺罪故亦未能安于公之功是以周公當教迪將助于成王既歸鎬京之後以監我士師工也師衆也士師猶言士民言監殷之士民及百官也其使周公監士師工者蓋欲其大保文武所受之民而治之為周四方之輔也周民文王所受之民殷民武王所受之民也周公欲成王一視殷周之民不可懷朋黨之心以徇私而有輕重於其間今成王曰誕保文武受民則其心本于至公無有彼此可謂能服膺周公之教矣説者多以詩曰王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔而此曰亂為四輔故以命公後為封伯禽無疑然誕保文武受民此豈所以命外服之侯哉以誕保文武受民觀之則所謂後者其留公于洛灼灼然矣王曰公定豫往已者言公定居于此我當往歸鎬京也公之功以恭肅將之故天下皆敬樂公之功也夫出乎爾者反乎爾者也故公致其肅則天下皆致其祗以樂之也公之竭其肱股之力以輔佐豫一人固為勞矣今留公于洛以鎮撫殷民公當無倦于此也我于康天下之事亦不敢有所厭斁也蓋欲君臣皆不憚勤勞以天下之安危為心也公之所以儀刑四方者能永永而勿替則四方將世世享矣觀畢命曰既歷三紀世變風移四方無虞豫一人以寧則世享可見矣周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王惠篤敘無有遘自疾萬年厭于乃德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德戊辰王在新邑蒸祭歲文王騂牛一武王騂牛一王命作册逸祝册惟告周公其後王賓殺禋咸格王入太室祼王命周公後作册逸誥在十有二月惟周公誕保文武受命惟七年古人有言曰從善如登從惡如崩言善之難也殷之餘民染紂之惡草竊姦究靡所不為至康王之世其餘風猶未殄則其與之為善也可謂如登而與之為惡也可謂如崩矣然當成王繼世之初武庚三叔肱髀相依以間王室殷民與之相挻而為亂莫不響應今既鋤誅元惡而其餘黨咸與惟新又為之營成周以遷之使之密邇王室式化厥訓苟不得其人而為之司牧作其愧恥之心薰陶漸漬咸歸于善則一旦天下有變安能保其不乘間而起乎况今又居於洛邑咽喉之地則其為禍蓋將慘于前日以是知殷民之化與不化周家安危之機也周公雖既歸政而成王留公于洛以鎮撫之公宗臣也義所不得辭故拜手稽首致恭盡禮以受王命也王命豫來承保乃文祖受命民越乃光烈考武王即上文成王之言曰誕保文武受民是也論語曰使民如承大祭書曰若保赤子承保者愛謹其民而不敢忽也曰受命民者唐孔氏曰天命文王使為民主故民是文王所受命之民是也光烈考即武王也稱武王為光烈考亦猶稱文王為丕顯考也文王但稱文祖而於武王乃先稱光烈考即繼以武王亦猶武成之篇公劉太王王季則時稱之而惟於文王曰我文考文王也越及也言及我光烈考武王則是亦承保武王所受命之民以上文誕保受民觀之自可見矣此史家之省文也人君之治天下也未有不本於恭故堯曰允恭舜曰溫恭文王曰懿恭蓋其端拱於廟堂之上是必有德義可尊作事可法容止可觀進退可度以臨其民然後其民畏而愛之則而象之非恭何以哉故成王留公于洛蓋欲承保文武所受命之民以洪大我之恭德也成王自謂其恭德必有賴於周公而後大故周公遂進戒於王言王當勉行恭德以盡為君之道然後為有成功我惟知盡其臣職而已矣孺子指成王成王之來相宅於洛邑也其當大厚行典禮於殷賢人以治四方而為四方之新君使後世言周家之恭者必以成王為先也又誨之曰其自是土中而致治則萬邦咸被其休如此則惟王乃有成功也語之更端故又加一曰字我惟以多子與夫御事篤行前人之成功以答其衆心使後世言周家之信者必以我為先也定公問君使臣臣事君如之何子曰君使臣以禮臣事君以忠惟君使臣以禮故君道莫大於恭惟臣事君以忠故臣道莫大於孚欲為君盡君道欲為臣盡臣道君臣各盡其道則天下後世孰不以是名歸之推之以為先乎故盡其恭者其責在成王周公惟致其信而已矣獻賢也殷頑民謂之獻民亦猶召誥曰讎民百君子也成王即位雖至是已歷七年其覽萬幾之務甫自此始故曰新辟多子謂衆卿大夫也子指成王也此篇稱成王曰子曰孺子皆是叔父家人之辭言稽考我所以明子之法乃盡是文王之德則其宅洛也不可不以其事祭告於其神靈也故王之使使者來謹教殷民則命安我以秬鬯二卣其言曰當以此二卣明潔其禋祀以告文王武王再拜稽首致美以享神我聞王之命未敢宿也即禋于文王武王而告以宅洛之事焉上文言承保乃文祖受命民越乃光烈考武王而下又曰禋于文王武王則周公所以明成王之法蓋盡是文武之德故禋祀之而經特言文祖不言武王是亦史家之省文也唐孔氏曰特舉文祖不言武王下句並告文武兼用文武可知秬黑黍也周官鬯人掌秬鬯鬱人掌和鬱鬯蓋築鬱金之草而煮之以和秬黍之酒使之氣味相入芬香條暢謂之秬鬯亦謂之鬱鬯也説文曰鬯以秬釀鬱草芬芳攸服以降神也從凵去魚反凵器也中篆米匕所以扱之易曰不喪匕鬯即此也鬱芳草也十葉為貫百二十貫築以煮之為鬱一曰鬱鬯百草之華逺方鬱人所貢芳草合釀之以降神鬱今鬱林郡也陸農師曰禮曰鬯臼以掬杵以梧枇以桑蓋掬臼梧杵所以搗鬱而桑枇者所以扱之先儒以為桑枇以載牲體誤矣爾雅曰卣中尊鬱人掌和鬱鬯以實彝而陳之則鬯當在彞而此及文侯之命及詩常武皆言卣者當祭之時則在彞未祭故在卣也文侯之命常武皆曰一卣此言二者宣王平王之賜其臣使以祭其太祖故惟一卣此告于文王武王故以二也豫不敢宿與曲禮曰凡為君使者已受命君言不宿於家之宿同漢孔氏以明禋為告太平既失之矣唐孔氏順其意則曰此三月營洛邑民已和會則三月之時已太平矣既告而致政則告在歲末而云不經宿者蓋周公營洛邑至冬始成得還鎬京即告文武是為不經宿也且太平非一日之事公云不經宿者亦虔恭之意耳未必旦見太平即此日告也此蓋強為之説蓋由先儒以明禋為告太平不以為告宅洛之事以伻來毖殷為文武使已來不以為王使使者來又以為王與周公應答皆在鎬京故其説不得不如此也蘇氏曰王使人以秬鬯二卣綏寧周公拜手稽首而致之公曰明禋曰休享者何也事周公如事神明也周公不敢當此禮即日致之文武如蘇氏此言則寧豫以秬鬯二卣正如禮記所謂康周公故以賜魯其論寧豫之言固為明白然謂事周公如事神明故曰明禋曰休享恐無是理自此而推之則與春秋之時仲子未薨而致其賵為何以異哉豈有周公尚存而謂之禋乎其使當時誠以此致之周公則一卣可矣何必二哉以其二卣則成王命周公禋于文武也明矣非是禋于文武出周公之意也惠篤敘以下先儒王氏皆以為周公戒成王之言以此為戒成王之言則與上文不相貫惟蘇氏以為周公祝文武之辭此得之矣但蘇氏自其永觀朕子懷德以上皆以為祝辭則其義又不結竊謂殷乃引考以上則周公之祝辭王伻殷以下則戒王之言也周公惟欲成王一視殷周之民亦如召誥之友讎故先引文武之辭以告王因而戒之也蘇氏曰使我周家順厚以敘身其康強無有遇疾子孫萬年厭飽乃德殷人亦永壽考此其祝辭也則今王當使殷人承王所惠篤敘之道至於萬年則其將永觀我孺子之所行而懷其德也楊子曰民可使覿德不可使覿刑覿德則終覿刑則亂周公欲王推其優遊寬大之道以化殷人使之風移俗易故曰其永觀朕子懷德也孟子曰武王不泄邇不忘逺殷人易忘而周人易泄故周公之言其惓惓於殷人也如此戊辰王在新邑先儒曰自戊辰以下史所終述是也戊辰先儒以為十二月晦日王始到洛然先儒以為戊辰日到洛則不可使王果以是日至洛則其文當如召誥越三日戊申太保朝至于洛越翼日乙卯周公朝至于洛不當言王在新邑也歲先儒以為明月夏之仲冬其意以謂夏之仲冬於周之正月是為嵗首故曰嵗王以戊辰晦到洛故至正月方行蒸祭周官仲冬以享蒸故以歲首為夏之仲冬也使其蒸祭果在于歲則但曰蒸祭歲可矣其曰戊辰王在新邑似羡文也蘇氏曰是嵗始冬蒸于洛則以蒸祭只用戊辰之日然但言蒸祭可矣何必言嵗哉此當闕之傳曰凡四時之祭蓋用孟月若有故及日不吉則用仲月若又有故及日不吉即用季月然苟有其故而用季月涉于怠矣當用仲月為佳也時物既登且得二至二月之節故祭必以仲月今以蒸祭為在周之十二月固可在正月亦可但執其説則必窒礙今但言其行蒸祭而已其月則當闕之也騂赤色也周尚赤故用騂詩曰從以騂牡是也宗廟用太牢此于文武皆言牛一蓋于太牢之外加之以此祭告成王之命周公從而加之也王則命有司作册書以其事載之于册將使史官名逸者讀之故曰祝册讀册告神謂之祝也其册之所言者惟告周公留居於洛以為成王位也當其蒸祭也王所賓者謂助祭之諸侯其殺牲以禋祀則咸格焉太室室之大者也清廟有五室中央曰太室焉祼者王以圭瓉酌鬱鬯之酒以獻尸尸受命而灌於地所以求神也王入清廟之太室祼以求神則命周公後為册書而逸讀以告之也郊特牲曰既灌然後迎牲則殺在祼後今乃先殺後祼者蓋自王入太室祼以下方是王之行祭禮自此以上皆先序其事非先殺後祼也如其不然則何以既言逸祝册而復言逸誥哉蓋王既許周公之歸政而周公又許王之留洛故告之文武而後行也在此十二月乃周公攝政太保文武受天命以有天下凡七年而後復于成王故史官總結之也伊尹既復政厥辟而遂告歸周公之復子明辟而又留洛者蓋伊尹之復政也天下敉寧無可慮之事此所以告歸周公雖以成王年長德成而復子明辟然殷民以頑狠之衆而羣居洛邑處之得其道則咸作使不得其道則咸作敵周公豈得恝然不以為念哉以是知周公伊尹之或去或不去時焉而已矣其心則一也彼王莽何為者耶遭漢中微肆其姦慝以成盜僭之禍而其所為動以周公自比及其代漢自立也其情露矣而猶執孺子手流涕曰昔周公攝位終得復子明辟今豫獨迫皇天威命不得如意嗚呼莽之言其誰欺乎尚書全解卷三十一
