body:
  text: 尚書全解卷二十宋林之竒撰説命上商書此三篇蓋史官記載商之高宗恭默思道夢得賢臣傅説立以為相與之反覆商較議論為治之道與夫學問之大方而其文煩多故其䇿分為三篇名曰説命而有上中下之别曰説命者高宗所以命説之言也如上萹言王置諸其左右命之曰朝夕納誨以輔台德以下是也亦猶蔡仲之命微子之命畢命冏命是皆所命之言後世每命官必有制辭其原蓋出於此此篇雖以説命為文其實雜出衆體與夫名萹又有不同王庸作書以誥則有誥存焉爾惟訓于朕志則有訓存焉作書者姑以説命二字明簡册之别高宗夢得説使百工營求諸野得諸傳巖作説命三萹説命高宗者盤庚之弟小乙之子名武丁高宗乃其廟號也古者祖有功而宗有德創業垂統有功者祀以為祖守文之主有德者祀以為宗其廟皆百世而不毁商人立廟之制其所以祖而祀之者成湯是也所以宗而祀之者太甲太戊高宗是也宗之者既不止於一人則人不可以無别故以太甲為太宗太戊為中宗武丁為高宗曰太曰中曰高者所以為廟之制也若孔氏曰武丁德高可尊故號高宗亦不必如此雖則如此亦不失也如禮記喪服四制曰武丁商之賢王繼世即位而慈良於喪當此之時殷衰而復興禮廢而復起故善之善之故載書中而高之故謂之高宗則是載於書而後有高宗之名此則失之逺矣祖有功宗有德之制至漢而猶存故高祖世祖皆為一時之祖宗前漢以文帝為太宗武帝為世宗宣帝為中宗後漢以明帝為顯宗章帝為肅宗此皆以其功德而祖宗也至於魏晉以來各推其一代之賢君而宗之晉未得乎三代立宗之意故唐室自太宗至於昭宗凡十八帝皆以宗名至於此則是宗為廟號之常稱不復論德建為不朽之廟而先王建廟立宗之制至是紊矣此不可以不辨也説者傳説也高宗夢而得之所謂得者夢得其狀貌非夢其名也漢孔氏曰夢得賢相其名曰説史記亦云武丁夜夢得聖人名曰説此不然案下文曰恭默思道夢帝賚子良弼其代豫言乃審厥象俾以形旁求于天下説築傳巖之野惟肖則是其夢中所得但得良弼之狀貌及其以所夢形象求於天下然後得説於傳巖之野惟肖肖者肖其形非謂其名與夢合也作序者於下句云使百工營求諸野得諸傳巖上句不識説之名故以名為繫於夢而稱之曰高宗夢得説非謂夢其名也高宗既夢得説之狀貌於是使百工營求於外野得説於傳巖肖其所夢之形而得之也孔氏曰使百官以所夢之形象經營求於外野皇甫謐云使百工技巧之人寫其形象竊以孔氏之説為勝蓋使百官有司散而求之於四方也但言求之者衆矣若以謂百工之人寫其形狀則豈至百工技藝之人而盡使之乎既旁求於天下得説於傅巖而協其所夢立以為相講論為治之大要學問之大方史官敘述其事而作此三萹也王宅憂亮隂三祀既免喪其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令宅憂乃居憂也史官將序述夢得良弼之事故推本其所以然為之發端曰武丁居小乙之喪亮隂不言者三年亮隂説者不同然鄭氏之説迂回而不通晉杜預以為天子三年喪始服齊斬既葬除喪服亮隂以居心喪制不與士庶同其意以謂亮隂二字蓋是既釋喪去齊斬之服而服心喪之名也雖其援引經傳而難信據此下文曰既免喪其惟弗言而上句言王宅憂亮隂三祀則亮隂二字蓋述其不言於三年之中為得禮既免而猶不言則為己甚羣臣於是進諫故孔氏曰隂默也居隂信默三年不言其意與下文實相連接蓋史官序書不復以重復成文下文有其惟弗言之句上文言宅憂故變其文為亮隂二字形容其不言之實言其喪不易事盡其慤而慤之盡其信而信之國政決於冡宰而已無所與也禮記曰庸言之信庸行之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾慥慥誠實也言君子誠實於事不可以過不可以不及使高宗於三年亮隂之中而言及於政則是哀戚之情有所不及非出於誠實也髙宗之情既發於心之誠實至於三年亮隂不言可謂得禮矣及其免喪也則可言矣可言而不言則是失之過矣失之過則是幾於有餘而盡之也羣臣恐其不能俯而就中以合於禮不為賢者之己憂故進於王言其貴為天子富有四海雖欲不言而不可以不言也孟子曰天之生此民也使先知覺後知使先覺覺後覺豫天民之先覺者也子將以斯道覺斯民也所貴乎聖賢者謂其知之在先將使覺乎未知者其覺之在先所賴以覺乎未覺者蓋先得乎吾心之所同然者故不可不推其所以為法於天下此正聖賢之任也故羣臣進諫于高宗歎而言曰人之生孰無天命之性然非明哲則不足以知之明哲者先知先覺之人也既明哲有以知之則其所知者豈特獨善而已哉蓋將以覺其所未覺而作則於四方也若權衡之立於此而輕重多寡莫不於此而取正焉此蓋言處聖賢之任當如此則髙宗所以君臨天下之尊其所有者萬邦之衆百官之所仰式命令之所自出也使王而言及於政則以作命百官百官承之而可以布於萬方然後為斯民之所取則也今也猶弗言則百官無所稟以為令萬方無所取則矣當王之宅憂亮隂也百官稟命於冡宰今也既免喪則冡宰歸政於王矣然猶稟命於冡宰而王又不言則萬邦之衆無所稟以為令豈不負萬邦之望哉此羣臣之進戒諄諄而不能自已也王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭默思道夢帝賚豫良弼其代豫言乃審厥象俾以形旁求于天下説築傅巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台德君奭之序曰召公為保周公為師相成王為左右者置相其任非特統百官均四海而已蓋將使之左右為之師保以輔翼成就其德而引之於當道故古之宰相必處師保之任周召相成王而左右之蓋以師保之尊而兼宰相之職也高宗得傅説於版築之微既立以為相矣於是又以其人置諸左右而命之曰朝夕納誨以輔台德使之兼師保之位身為三公之尊非特任以為相而已孟子曰人不足與適也政不足間也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣蓋大臣之事君務在乎先立其大者不先立乎其大者而屑屑於其小者則其用力多而見功寡也是以人不足以有適政不足以有問而惟以格君心之非為先蓋使大臣能格君心之非而納之於正至於一正君而國定則人與政豈復有不善者哉高宗深明乎此故其命傅説以為相也未敢言及於政事而先處之於師保之尊命之朝夕之間納其誨言以輔翼我之德蓋將使之匡其不及繩愆糾繆成就其德是所謂一正君而國定也若高宗者可謂知所本矣苟使為君者其德不足則其心必有所蔽而不可誨則輔相之臣雖有格天之業亦無自而施之高宗既得傅説之才誠足以相天下而其所言者惟恐己之德有所不足使彼不得展其志之所為也是以朝夕之間惟欲納誨以輔其德而不及其他也若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心此高宗所以申言其所以朝夕納誨以輔台德之事也孟子曰故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是則不足與有為也蓋人君苟有尊德樂道之誠意則師保之臣必將樂告之以善而其德無有不成者故推之以大有為無所不可苟不如是則不足與有為夫其可以有為與不可以有為惟在於德之成與不成而德之成不成惟在於師保之臣納誨與不納誨耳然則高宗所望於傅説者可謂善矣故既命之朝夕納誨以輔台德又託微意設喻見其所以望之者如此其急也金欲成利器則不可以無礪巨川之患欲濟則不可以無舟楫大旱之時欲蘇苗稼則不可以無霖雨金欲成器而無礪則鈍巨川無舟楫則不可以涉大旱無霖雨則苗稼有飢餒之憂此三者皆望之􅋀而賴之深也但其言之不足故設喻託意以盡其情若詩人之如切如磋如琢如磨皆所以喻人之有美質者不可以不學而成也雖有切磋琢磨之不同其實一也若但舉一句而言之則玉不琢不成器亦可以見其意也高宗之設此三喻大抵言其望於傅説之納誨者如此其激切而其託意之深故重復言之或者見其有此三喻則必從而為之説以為每句皆有所託王氏曰若金用汝作礪者命之使治己也若濟巨川用汝作舟楫者命之使濟難也若嵗大旱用汝作霖雨者使之澤民也吕吉甫又以謂若金用汝作礪者舉一已而聼之若濟巨川用汝作舟楫者舉臣下而聼之若嵗大旱用汝作霖雨者舉天下而聼之是皆附會穿鑿以追求高宗之意據此上文言朝夕納誨以輔台德下文言啓乃心沃朕心則是高宗於此其與傅説言者大抵欲成就其己之德而已未及乎濟難澤民與舉天下而聼之之事也若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷高宗既告傅説以其所以望之之深如此其切欲汝副吾之望則當啓乃之心無隱有犯朝夕納誨而沃我之心也沃如水之沃物有潤澤之意蘇氏曰渴其言也此説是也此又言爾之所以啓乃心而成就我德者其説有二也若我之過失見於已形而其愆繆之迹既著於言行者則汝當危言鯁論極其剴切以繩糾之若用瞑眩之藥以攻難治之疾也苟不用瞑眩之藥則厥疾弗瘳矣其或過失弗形而其所言所行陷於愆繆而不自知則汝必當先事慮患使無繩糾之迹若跣足而行使之視地不至於為茨棘瓦礫之所傷也苟不使之視地則厥足用傷矣惟暨乃僚罔不同心以匡乃辟俾率先王迪我高后以康兆民嗚呼欽豫時命其惟有終言汝能以此二者朝夕納誨以輔台德則足以副吾之所期望矣然其所以副吾之期望者非但使汝盡其啓沃如上文之所陳凡在朝之臣與汝比肩而北面以事我者我無不以此望之也故繼之曰惟暨乃僚罔不同心以匡乃辟蓋説既作相而總百官則自卿士而下皆其屬也欲使傅説暨乃僚無不同心以匡正汝君之心而成就其君之德者良由我之所以尊德樂道之誠意有加而無已也孟子謂戴不勝曰子謂薛居州善士也使之居於王所在於王所者長幼尊卑皆薛居州也王誰與為不善在王所者皆非薛居州也王誰與為善一薛居州獨如宋王何使傅説能盡其啓沃之心而其在王所者長幼尊卑皆不能同心以匡人主之所不逮則一傳説亦不足與有為故必舉在朝之臣無不同心然後一正君而國定矣然人臣之進諫於君又不可以無稽也必則古昔之先王故汝之暨乃僚罔不同心以匡乃辟率修古我哲王迪導我高后成湯之德以安天下之民下言迪我高后以匡兆民上言俾率先王則先王蓋指成湯以前之王天下者康誥曰往敷求於殷先哲王用保乂民曰別求聞由古先哲王用康保民與此正同高宗之所以諄諄告戒述其志之所以期望傳説之深既盡於此矣故又嗟嘆盡其義言汝能敬我所以告汝之命則我之德無所闕失終能永保天命矣説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命高宗之所以虛心屈體而望於傳説其言反覆激切既盡於此説於是盡其啓沃之辭而復于王與荀子大忠以德復君之復同蓋以其德言而優遊饜飫以入之也高宗之所以告説者既以金之於礪巨川之於舟楫大旱之於霖雨以見其望之切故説之所以復于王亦設喻託物以盡其意以謂君以從諫而聖猶木之從繩而正也木之作器無所不正者豈木之生而皆正哉蓋其生也自有曲直之不齊而其作器也必取於從繩故無不正之理人主之所行豈無有善有不善於其間惟能從諫弗咈而擇善以從其善者無所不行不善者無所不去斯能成其聖德不必生而知之而後可以成其聖也惟君能以從諫為心是好善矣苟好善則天下之人皆將輕千里而來告於我而况在朝之羣臣乎故雖不命其承上之意以納諫而其臣無敢不納諫者故繼之曰后克聖臣不命其承疇敢不祗若王之休命蓋言君苟有納諫之意雖不諄諄以命之而彼自能敬順王之善命也魯定公問於孔子曰一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君惟其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎此二言者若緩而不切而孔子謂邦之興喪實繫於此者蓋知為君之難則自以為不足故從諫從諫則邦之所以興也惟其言而莫豫違則自以為有餘故拒諫拒諫則邦之所以喪也邦之興衰所以實繫於此一言者以其從諫拒諫之不同也桀以拒諫喪湯以從諫興紂以拒諫喪武王以從諫興秦以拒諫喪髙祖以從諫興隋以拒諫喪唐太宗以從諫興歷代興喪之迹究其所本未嘗不繫於此則孔子之論可謂深切著明矣髙宗之命傅説以納誨而傅説復之以從諫彼其君臣所以相告戒之意者蓋以為天下之事未有不先於此故其禮樂刑政未嘗一言及之而其相告勉者惟以此為先也東坡有言曰説以匹夫得政而王虛心以待之者如此意其必有高世絶人之謀今其所以復于王者曰從諫而已大哉仁人之言約而至也唐太宗中主也其事父母畜妻子正身治家有不至者多矣然所以致刑措其成功去聖人無幾者特以從諫而已説以為此一言可以聖也故首進之説命中商書惟説命總百官乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民在禮天子宅憂而百官總已以聼冡宰三年當此之時事皆總於冡宰而天子則惟亮陰而不言居於廬以致其誠一於喪祭之事而已及其三年之喪畢然後冡宰歸政於天子始親萬幾之務而專聼斷此蓋禮經之常典也高宗既免喪而冡宰歸政猶恭默不言萬幾之務無所稟以為令者羣臣懇請甚堅而髙宗猶且不從而曰豫恐德弗類至其代豫言其意蓋欲終不言而求良弼以代之言也及其既得傳説則是既有代豫言之人矣於是立為相置之左右命之朝夕納誨以輔台德而萬幾之務則委之而已無所與也蓋高宗之於傅説也信之如此其篤任之如此其專得於傅巖之間而不以為踈賤遂舉國而聼之使之代言政事命百官總已而聼之若其宅憂亮隂之時而不復致疑於其間良由其至誠之心上格於天下孚於民而其君臣同心同志相與孚契於一堂之上如股肱元首之相為用故雖用禮之權於免喪之後而百官總已以聼冡宰而天下不可以為不善也案周官冡宰掌邦治統百官均四海則説之為相而總百官亦其常職然也而乃以為禮之權者蓋以上萹其代豫言而知之前既有曰其代豫言而此萹又曰惟説命總百官則是萬幾之務總以聼之而已若齊威公所謂一則仲父二則仲父其為職任之重蓋非如冡宰之比也説既總百官以代高宗躬覽萬幾之務則為高宗者惟恭己以正南面也蓋明君勞於求賢逸於得人方未得説也恭默思道憂勤之念猶形於夢寐之間遂旁求於天下而後得之及其既得之也禮樂刑政百官有司之事舉以授之而已遂以優遊無為巖廊之上蓋所勞者在於求賢之前而享其逸樂於得人之後也高宗雖優遊恭己不親萬幾之務亦豈遂盤樂怠傲深拱宫禁而無意於天下之治哉蓋將使説朝夕以輔成其德使其德之輝光發見於天下則如北辰居其所而衆星拱也傅説既總百官使高宗得以清心省事於上於是朝夕納誨以輔成其德其意以謂百官之事雖總而其提大綱以為衆目之所取正者則在於高宗不可不勉故乃進而告王而其所告者無非天子執要御詳之事也嗚呼者嗟歎以重其言也詩曰維天之命於穆不已於乎不顯文王之德之純中庸釋之曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已其意以謂天道之運日新而無窮晝夜寒暑循環迭運造化之功未嘗有息聖人體之而為純德造次顛沛亦日新而不窮蓋所以體天之道也傅説欲使高宗日新其德而同於天道之運故首告之曰明王奉若天道言古之明王承順上天之道體其不已之意於是建邦諸侯於外設天子之都於內其所以立天子諸侯於上而承以大夫師長於下者豈欲其在位者肆為逸豫而以位為樂哉惟欲使之體夫上天日新不已之道君臣上下協心同德以治斯民而已后王天子也君公諸侯也大夫仕於朝者師長親民之官也自后王至於師長皆不可肆為逸豫苟有一人焉肆其逸豫則失其所以代天亂民之意惟天聰明惟聖時憲惟臣欽若惟民從乂蓋言雖在位者皆不可以逸豫然其所以率羣臣不為逸豫者惟在於日新其德而已故又繼之曰惟天聰明惟聖時憲言明王之所以奉若天道者無他惟在乎憲天聰明之德而已天之聰也公天下之聼以為聼故聼不以耳而無所不聞天之明也公天下之視以為視故視不以目而無所不見聖人之憲天聰明公其視聼而無所容私焉則其聞見逹乎天下而日新不已豈復有逸豫生於其心哉惟天子既憲天聰明而日新其德於上則其臣莫不敬順而奉之自然不為逸豫之行君臣皆不為逸豫則得乎治民之道此民之所以從乂也臯陶謨曰天聰明自我民聰明泰誓曰天視自我民視天聼自我民聼言天之聰明即民之聰明君能公其心以憲天聰明而率其臣以欽若則自合乎民之心矣民之從乂蓋得天下之所同然非勉強而從之也傅説言此者言高宗既以萬幾任於臣而垂拱仰成端拱於巖廊之上苟使不能廣其視聽於天下則其聰明止於耳目之所接則逸豫之心生而讒諂面諛之人至浸潤之譖膚受之訴由是而行焉如是則説雖欲盡其協贊之力不可得也故其所欲成就之德無他惟使之憲天之聰明而已夫苟其憲聰明如天則無所不聞無所不見則明白昭晰而小人無所容於其間此説之所以得盡其才而高宗所以得遂其垂拱仰成之道也惟口起羞惟甲胄起戎惟衣裳在笥惟千戈省厥躬王惟戒兹允兹克明乃罔不休言欲公其心以憲天之聰明則其所發者莫重於賞刑之用洪範曰惟辟作福惟辟作威説雖總百官以聽萬幾之務至於威福豫奪之柄在於高宗之獨斷故既告之日新厥德以憲聰明而其所以諄諄告戒於其後者於此又致詳焉自惟口起羞以下四句説者不同最為難曉竊求其義上兩句有起羞起戎各言禍亂之所由起其文無所結下兩句有在笥省躬是言其所以致謹重之道其文無所成蓋由説者以四句為四義故其文上無所結下無所成據某所見下兩句所以結前句惟口起羞故惟衣裳在笥惟甲胄起戎故惟干戈省厥躬禮曰口惠而實不至怨葘及其身朝錯曰上之所言者謂之命一命受爵再命受服三命受位苟為口之所命者非其人而適足以起羞故寧藏衣裳於笥而不輕以豫人也甲胄干戈皆兵器也自其被於已而言之則謂甲胄自其加於人而言之則謂干戈甲胄之用苟有不當則適足以起戎矣故當其用干戈以加於人之時不可不省於躬而自反察己之無罪然後可以討人也此蓋言賞罰之用禍亂之所萌而其施則不可不謹也王惟以此起羞起戎之二者以為謹戒而信其不可輕用苟能知其賞罰之用皆當於功罪而克明則無不善矣惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢自此以下又所以申前之義而盡之也言國之治亂惟在於庶官之邪正能否官之得其人則天下國家無適而不治非其人則天下國家無往而能治必然之理不可易之常道也傅説總萬幾之務而已至於升黜進退則在高宗之所用如何爾苟使高宗所用既非其人則雖説亦無所施其才矣故治亂之所本惟在高宗能用庶官而説則能總其事而已惟治亂在庶官故官不可以及私昵爵不及惡德惟其賢能而後可也王制曰論定而後官之任官而後爵之蓋自六卿至於三百六十所謂官也而公卿大夫所謂爵也欲官其人必以其人之能可任是官者而後官之不可以私愛而官之也欲爵其人必其任官之賢於人而實有德者而後爵之不可以惡德而進之也孟子曰尊賢使能官不及私昵惟其能蓋所以使能也爵罔及惡德惟其賢蓋所以尊賢也惡德者以惡為德也孔氏曰私昵謂知其不可而用之惡德謂不知其非而任之戒王使審求人絶私好也此説為善説之此言大抵欲高宗屛小人而擢用君子也慮善以動動惟厥時言心有所為必審思之使合於善而後動善者理之所當然者也雖然慮善以動則又不可不審其時時者所以權乎善之輕重而用之也猶禹思天下有溺者由已溺之稷思天下有飢者由己飢之善也顏子居陋巷不改其樂亦善也然其為善者各有其時當禹稷之時而為顏子之事則非善也當顏子之時而為禹稷之事亦非善也善猶葛之於夏裘之於冬動惟其時則猶夏葛而冬裘也善則可以立矣慮善以動則可以權矣慮善以動動惟其時則酬酢萬變而不窮矣有其善喪厥善矜其能喪厥功此又告之以不矜不伐而享其盈成之業公羊曰貫澤之會桓公有憂中國之心不召而至者江人黃人也葵邱之會震而矜之叛者九國矣夫以威公之霸攘夷狄尊王室一正天下可謂盛矣及一旦震而矜之則叛者如此其衆蓋有其善喪厥善矜其能喪厥功故也如禹之不矜不伐而天下皆無與之爭功故人之有善有能而矜之有之是乃所以喪也以是知欲人之有善有能者其所以保之之道惟在於不有之不矜之而已高宗之恭默思道以致中興之功其豐功茂烈可謂無所復加矣惟在不有不矜以保之也惟事事乃其有備有備無患此又戒之以預備於不慮治不忘亂安不忘危之事也蓋古者治安之時上恬下熙海宇無事而危亂之萌往往萌蘖於其間及其一旦變生於肘腋則至於陵夷敗壞不可救藥者此無他當無事之時而不能為有事之備也故在事事而為之備事事者無一事而不在所備也一事不備則一患隨之惟事事有備無危亂之釁生矣故無有不可制之患也無啓寵納侮無恥過作非惟厥攸居政事惟醇黷於祭祀時謂弗欽禮煩則亂事神則難言無啓私嬖之寵以納小人之侮也蓋小人之於君上本不敢肆其陵侮之心惟君上寵之而故為之也苟知而故為之則不復有悛革之心矣此二者是亦中才庸主安於逸樂遂以謂寵一嬖幸未必害事遂一非事未必致亂殊不知履霜堅氷其來有漸於其小者而不知謹則將馴致其大矣唐明皇寵安祿山為安祿山起第既成其幄帟器皿充牣其中雖禁中服御之物殆不及也每出入宫掖不禁或與貴妃對食或通宵不出頗有醜聲於外帝亦不疑也其待之可謂厚矣而祿山不軌之心實萌於此故卒至漁陽竊發四海橫流此啓寵納侮以致禍也漢武帝為竇太后置酒宣室使謁者引內董君是時東方朔執戟殿下辟戟而前曰董偃有斬罪三安得入乎上曰善有詔止更置酒北宫引董君從司馬門賜朔黃金三十斤若此之類所謂恥過作非也自此以上其深思熟慮所以為高宗謀者無所不至故又總結之曰惟厥攸居政事惟醇蓋言如上之所云其所當謹者可謂至衆矣然其本則在於人主先正其心術而已居者有所主於中也中有所主則政事不駁雜此其本也此所謂一正君而國定矣自篇首至於此是皆説與高宗泛論為治之要道以啓迪其心志既盡於此然高宗之心術則有黷於祭祀之蔽祖己曰典祀無豐于昵則是高宗之心術所蔽實在於此故傳説舉以為訓所以繩其愆糾其謬格其既非之心是所謂若藥不瞑眩厥疾弗瘳也蓋祭不欲數數則黷黷則不敬祭不欲疏疏則怠怠則忘祭之疏數惟稱於禮苟不稱於禮而以私意為之則疏數之失一也蓋數則過也疏則不及也過與不及皆非禮之中也高宗不審於此而以黷於祭祀為欽殊不知其所謂欽者乃所以為不欽也故曰黷于祭祀時謂弗欽黷而謂之不欽者以禮煩則紛亂而難行也夫鬼神聰明正直享於克誠苟亂而非禮則鬼神豈享之哉故曰禮煩則亂事神則難蓋夙夜惟寅直哉惟清則於事神為易也自明王奉若天道至於此皆是傅説道啓沃之言以納誨而輔成高宗之德王曰旨哉説乃言惟服乃不良于言豫罔聞于行説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成德惟説不言有厥咎高宗之得傅説使之啓乃心沃朕心蓋虛心屈已而樂聞其朝夕之誨也説既總百官矣於是進其嘉謀嘉猷自明王奉若天道以下凡數十言無非治道之大原君術之至要其所以進言啓沃以成就高宗之德可謂展盡底蘊而無餘矣高宗之恭默思道徯聞至忠之誨為日久矣至是而聞其所未聞義理之悅於其心而無厭也故遂嗟歎而告之曰旨哉旨美也古人於飲食之美者必以旨言之詩曰君子有酒旨且有又物其旨矣維其偕矣則旨者味之美也高宗聞説之言如美味之悅其口托食其實饜飫充足樂之而不厭故曰旨哉者味之之深也既味其言之美乃呼説而告之曰爾之所言我當佩服而行之苟汝不善於其所言則我雖欲聞而行之不可得已高宗之得傅説以為若金之得礪濟巨川之得舟楫大旱之得霖雨其所以望之如此其切誠以不得傅説之啓沃則雖欲行之不知其所以行之矣故其既得傅説之誨則若飢之甘食渴之甘飲入乎口著乎心斷然必以為可以行之而無疑也高宗既許傅説以行其言矣人臣之事君諫行言聽然後膏澤下於民而其致君澤民之心得以逹乎天下矣於是拜手稽首而至地以盡其敬於君又勉高宗以行之之難而冀其不倦以終之也董仲舒引曾子曰尊其所聞則高明矣行其所知則光大矣高明光大不在乎他在乎加之意而已傅説之所陳治道之大原君術之至要諄復懇到可謂盡矣高宗之所聞所知可謂富矣惟能加意以尊其所聞行其所知則施之於天下國家德仁又將不勝富也故曰非知之艱行之維艱所貴乎知之者惟欲其行之也知之不能行則與之為二矣故其嘉謀雖日接於耳目之前既與之為二則是他人之物非己之所自有也知而行之則與之為一而自得之矣是故人主之學要在於行為先如堯舜之治其所以巍巍蕩蕩而不可及者惟其能躬行而已躬行則凡接於吾之耳目者皆所自有也自古苟非大無道之主其聞善言見善行未嘗不改容變色以致重之如齊景公問政孔子孔子對曰君君臣臣父父子子公曰善哉則景公非不知孔子之言為可行也孟子與齊宣王言惟仁者能以大事小惟智者能以小事大宣王曰大哉言矣又與言文王之治岐以行仁政於民宣王曰善哉言乎若宣王者非不知孟子之言為可行也二者雖皆知其言為可行然夷考其所行則實與其言相反此蓋無躬行之誠心故其所病者不在於知之之難而在於行之之難高宗以傅説之言為旨哉此亦如齊景公宣王以孔孟之言為善也使其徒以為善知之而不能行則是亦齊景公宣王也故言知之易行之難以勉高宗蓋所謂責難於君謂之恭也然行之之艱自不行者而言則見其為艱矣苟能一日用其力而行之則亦何難之有王誠不憚其難而力行之造次必於是顛沛必於是尊所聞行所知是將信協先王成湯之成德蓋湯所以能成就其德者惟以從諫弗咈先民時若用人惟己改過不吝與人不求備檢身若不及而已王能躬行其所知所聞之言是亦成湯之用心也王能以成湯之心為心則是於傅説之言無所不行也君能黽勉以行臣之言臣有嘉謀嘉猷匿而不告則臣為有罪矣故終之曰惟説不言有厥咎蓋所謂大臣者以道事君不可則止諫則不行言則不聽而乃聒聒不舍以取禍尤則是不可以言而言非所謂以道事君者也故孔子之於齊景公孟子之於齊宣王言之不行則遂去而已至於諫行言聽膏澤下於民而不以堯舜之道望其君乃有所隱匿而不言則是可以言而不言亦非所謂以道事君也故阿衡之於太甲傅説之於高宗其所以引君以當道者有加而無已也欲觀大臣之事質諸此而已説命下商書此篇記載高宗與傳説相與講論學問之大方蓋自古帝王之所以致知格物正心誠意以修其身而推之以齊家治國平天下未有不由學以成者學必有師堯師於君疇舜師於務成昭禹師於西王國湯師於伊尹高宗師於甘盤傅説文王師於太公望成王師於周召未有不師於聖賢而能學者未有不學而能成其德者然厯代帝王之所以學與師者世代久逺其詳不可得而盡知惟高宗之於傅説其答問酬酢始終畢備於此篇可以為萬世人主學問之大法王曰來汝説台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯爾惟訓于朕志高宗欲問學於傅説於是進説使前而告之以所願學之意也蓋其未得傅説於版築之前固嘗學于甘盤矣甘盤者商之舊臣有道德者也而高宗敬其道德而學焉學于甘盤而不終故欲學于傳説以終之也台小子者高宗自謙抑以問學之辭也舊學于甘盤將告以學而未克終之意也既乃遁于荒野入宅于河自河徂亳暨厥終罔顯二孔之説謂高宗為王子時既學于甘盤學而中廢業遁居田野入宅于河故自河徂亳蓋自高宗之父小乙欲使高宗知民之艱苦故使居民間既廢業而居民間遂無明顯之德此説本無逸之言曰其在高宗時舊勞于外爰暨小人故以遁于荒野為爰暨小人之事也諸儒從之惟蘇氏不然蘇氏謂武丁為太子時學于甘盤及即位而甘盤遁去荒野武丁使人求之迹其所往則居於河濱自河徂亳不知其所終武丁無與共政者故相説也舊説則以遁于荒野為武丁之遁武丁為太子而遁決無此理遁則為吳太伯豈復立也哉竊以蘇氏之説為善蓋高宗言其所以學于甘盤而未克終者以求教於傅説故言甘盤之遁去而莫知其所終則已無所資以為學者其言與下文訓于朕志相接若從先儒之説以遁為武丁之遁則高宗方言學于甘盤而遂及於爰暨小人之事非事辭之序也而其以出居民間為遁及以顯明之德為顯皆不如蘇氏之説蓋甘盤既遁去而不知所終高宗皇皇然失所依賴如濟巨川之望舟楫大旱之望霖雨故得傳説而學焉此其所以告説而冀其朝夕納誨以成就其德者也遂繼之曰爾惟訓于朕志言我之志欲務學以成就其德汝當啓迪我之意志而引之當道以終其所學于甘盤之事也若作酒醴爾惟麴蘖若作和羮爾惟鹽梅爾交修豫罔豫棄豫惟克邁乃訓此又指物與喻以見其所欲學之意范內翰曰酒非麴蘖不成羮非鹽梅不和猶人君雖有美質必得賢人輔導乃能成聖作酒者麴多則太苦糵多則太甘麴糵得中乃能成酒作羮者鹽過則鹹梅過則酸必鹽梅得中然後成羮臣之於君不可上下相同當以柔濟剛以可濟否左右規正其君之德則君志乃和高宗求益於傅説故以作酒作羮為喻此説甚善高宗之意欲使傅説匡其所不及將順正救如酒人羮人以甘苦鹹酸相濟而成味故又繼之爾交修豫交修者可否相濟以輔豫之不逮也豫之所望汝以交修者既如酒之於麴蘖羮之於鹽梅不可須臾廢則當始終以成就其德毋亦若甘盤之棄我而去我當佩服汝之言而行之不敢失墜也案君奭篇周公告召公以留輔成王之意其言商之舊臣厯事數王而不敢自寧者而曰在武丁時則有若甘盤則是甘盤在武丁之初亦如阿衡之輔太甲實居受遺託孤之任者也以是知高宗之亮隂也甘盤實居冡宰之職百官總己以聽焉及其既免喪而甘盤歸政則一旦幡然而去遁于荒野莫知所之高宗既失甘盤而無所託故恭默思道而得傅説則甘盤之去商也蓋舉國之人失其倚賴皇皇焉以求之而不可得若甘盤者其為高蹈之節傑然出於千古之上嚴子陵方之有慙德焉朝補之嘗論嚴子陵以謂陵道足乎已無求於世則求而不至可也至而不仕可也何必明人以天子三公皆故舊而示放驁以自存陵操誠高亦未忘名者古惟兩士不近於名其一猶恨其自言也晉文公賞從亡者介之推不言祿祿亦不及推將隱於綿上山中其母曰亦使知之若何曰身將隱矣何以文為若之推者可謂不纍於名漢朝韓康賣藥長安市不二價有女從康買藥康守價不移女子曰君非韓伯休邪乃不二價康曰我本避名今女子乃知我名何以藥為遂去居霸陵中康之避名誠是也恐人識之則默去焉可也何必曉人以吾果韓康邪故曰猶恨其自言也此二人者皆勝陵據補之此言蓋謂之推賢於韓康而康又賢於嚴子陵某竊謂之推雖不近於名然其所以不求顯之言猶聞乎世是雖能忘名而未能忘其所以忘名者也如甘盤者身居公輔之尊一旦之間遁而去則舉世莫知其所之賢於之推也又逺矣其易遁之上九曰肥遁無不利蓋處遁之最善無如此爻者其甘盤之謂歟説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞説命之書雖離為三篇然其文勢上下實相貫穿蓋史官盡録高宗所以與傅説相答問者高宗惓惓然以望於説説之諄復以告於高宗其意未嘗不相屬也説之總百官而進諫王王玩味其言而無所厭斁也曰乃言惟服乃不良于言豫罔聞于行蓋許之以佩服其言也説於是言非知之艱以勉其所力行於此者而又繼之曰王忱不艱允協于先王成德惟説不言有厥咎此則説之許高宗以為苟能行我之言則我不可以不繼此而有言也故高宗敘述其所以願學之意而終之曰爾交修豫罔豫棄豫惟克邁乃訓言我能行汝之言今虛心屈已以問學於汝可以言之時矣不可以無言也至於是則説之所以啓沃者固宜無所不盡矣遂乃備言帝王之所以學者本末始終之序明白詳言無所不備蓋善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲高宗既從容以問矣故説得以盡其聲也道之大原出於天堯以是傳之舜舜以是傳之禹禹以是傳之湯此數聖人相傳之道蓋本於性命之至正仁義之極致其為道也致廣大而盡精微極高明而道中庸學道而不自乎此不可謂善學也故傅説之論學必以師為先師古者質諸堯舜禹湯之所傳者也孔氏以王人求多聞時惟建事為王者求多聞以立學其意蓋謂王人猶云王者爾王者為王人無所考據王氏以謂傅説稱王而告之曰人求多聞時惟建事竊謂此説為勝禹言於舜曰帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣亦是稱帝而告之與此稱王其文勢正同猶後世奏事稱陛下也説之告高宗人之所以求多聞以多識前言往行者非欲苟知之而已蓋將見之於行事之深切著明也雖務多聞以建事然其所聞者有是有非有邪有正差之毫釐繆以千里苟不能審其所擇而徒貪多務得以益所聞則或不免為邪説異端之所惑也所適者正道則以之建邦乃有所得矣不師古訓而能有所得以永世者匪説之所聞也獲如孔子所謂仁者先難而後獲如三代有天下傳世數十享祚數百此皆其所獲者也雖其所獲者如此其長且久然其所以致此者則自夫學于古訓而不自徇其私意雖明其道不計其功而功之所獲自及於無窮若秦人焚詩書滅禮樂奮其私意而不師古自以為子孫帝王萬世之業而傳祚才二世而亡此不克永世者也惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥德修罔覺監于先王成憲其永無愆惟説式克欽承旁招俊乂列于庶位既言學于古訓則有所獲事不師古則不克永世其所以辨論邪正是非之分可謂明於此矣既明乎此則其志之所蘄向者確然有守而不移矣志之所蘄向者確然而不移則能止於至善知止而後有定定而後能靜靜而後能安安而後能慮慮而後能得學之所以能得者惟在夫知所止能止於至善則其志定志既定則順其志而不咈務時敏以力行之而不懈則能至於慮而有得矣蓋功崇惟志業廣惟勤學之欲有得者惟在於此二者遜志則功日以崇時敏則業日以廣此誠為學之大方惟能信懷此志與勤之二者則道積於其身矣乃來者蓋所謂自得之也道積于厥躬則是居之安資之深以至於取之左右逢其原至於是則學成矣然人之學也豈以獨善其一身而已哉中庸曰誠者非自成己而已也所以成物也成己仁也成物知也性之德也合外內之道也故時措之宜也蓋學者既遜志時敏以成己必在乎推而教人以成物能成己又能成物則可以合外內之道而忠恕兩盡此蓋為學之終也故繼之曰惟斆學半念終始典于學厥德修罔覺言推己之所有以教人是斆學半蓋學之始仁以成己學之終智以成物自成己推而成物其功半矣於功之半能思終始常於學則雖推以教人而已之德實由是而進日加益而不自知也此所謂厥德修罔覺言推此道以先知覺後知以先覺覺後覺有益於人是乃有益於己也傅説之所以厯陳為學之終始者蓋盡於此此非説之私智也蓋成湯之師古以學得夫堯舜禹之傳故其本末先後之序如是此實先王之成法高宗誠能率由此道監視先王成法而行之則是師古以克永世而無所愆過矣蓋人君之治天下必欲言滿天下無口過行滿天下無怨惡然後有以貽子孫萬世無疆之業欲言行之無愆繆則必自於學先王之道故傅説之言其序如此高宗能審於是學先王之道説用能欽承其德旁招俊乂以列于庶位共致其修輔之功也范內翰曰天子惟務學宰相職當求賢若天子好學於上宰相急賢於下衆賢皆列位則天下豈有不治宰相以進賢退不肖為職百官有司之事各有司存非宰相之任天子惟當任宰相宰相當任有司有司皆得人則天下自治唐太宗謂房喬杜如晦曰公為僕射當急求賢人隨才任使此宰相之職也比聞聽受詞訟日不暇給安能助朕求賢乎乃敕尚書細務屬左右丞惟大事乃關僕射以求賢責宰相此乃傅説旁招俊乂列于庶位之意此説甚得王曰嗚呼説四海之內咸仰朕德時乃風股肱惟人良臣惟聖昔先正保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我烈祖格于皇天爾尚明保豫罔俾阿衡專美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟於先王永綏民説拜稽首曰敢對揚天子之休命高宗既聞傅説勸學之言本末先後無不該悉於是嗟歎其言之善而告之曰我之恭默思道得汝於版築之間擢居相位三年不言言乃雍而四海之內無不仰我之德者乃汝之德有以鼓舞而動之也然我欲學于古訓以成聖人之德則必資爾説之助而不能以獨成也故又曰股肱惟人良臣惟聖言人之所以為人者以有股肱之助無股肱則不得為人矣人主之所以能成其德者以其有良臣之助也無良臣則不得成其聖矣蓋股肱之於人良臣之於聖實一體相待而成也既以良臣喻股肱之不可無於是又稱引成湯疇昔之所學伊尹者以見其意言我先代百官之長自居保衡之任為師傅之官蓋伊尹也伊尹在豫先世作股肱於我先王乃以致君澤民為己任曰我不能使其君如堯舜之君則其心愧恥若見撻于市其在於民有一夫不被堯舜之澤則曰是我之罪蓋其自畎畝受成湯聘幣幡然而起也則固自任以天下之重曰吾將使是君為堯舜之君使是民為堯舜之民既能言之於始必將實之於終有是言而君不為堯舜之君是己之所以引君於當道者有所不至也其為恥孰甚焉欲使是民為堯舜之民則民不被其澤是己之所以成就君之德者不用其極故其澤不遍於天下其罪亦無所逃也惟其所以自任者如此故能佐佑我有功烈之祖其德至於與皇天同德而無以復加爾傅説之起於版築而居於冡宰師傅之位其迹蓋與伊尹相契於數十年矣則爾之所以自任者不可不以伊尹之所以致君澤民者為心故汝當庶幾以道顯明保輔我以成其堯舜之學亦如伊尹之佐成湯以格于皇天無使伊尹專其美於我商家也惟后非賢不乂惟賢非后不食此申言君臣之分相須而成君須賢治賢須君食亦當幡然應聘而起以與我共天位治天職食天祿則是當夫所以致君澤民之責矣爾當以阿衡之所以自任者待其身使爾君德與成湯相繼然後能以永成此天下之民也蓋為臣者為上為德為下為民必先能致君於堯舜然後可以澤民君不如堯舜而能使民為堯舜之民者未之有也高宗之所以命説既如此其重説喜聞其仰成之意於是拜而稽首以盡其敬而欽承之曰敢答揚天子之美命謂當阿衡之責而不敢辭也薛氏曰説曰監于先王成憲其永無愆以湯之學於伊尹之事以告之也王曰罔俾阿衡專美有商以伊尹作先王之事任之也臣之所以致其君者如彼君之所以望乎臣者如此雖欲不治不可得也此説甚善蓋人君之學與匹夫異其所宅者至廣其所御者至衆則其所學固不在乎區區於章句訓詁之間如學士大夫之一藝也其所學者不過學為堯舜而已不學乎堯舜而云學者是陳後主隋煬帝之學所謂非徒無益而又害之者也若高宗之學於傅説其所謂堯舜之學矣伊尹之事成湯也蓋曰以堯舜之道事其君也而高宗則以成湯自期以伊尹期傅説是其所期者期於堯舜之為而已學者之期堯舜猶視者之必期離婁聽者之必期師曠雖有至不至然未有不期而能至者也孟子曰我非堯舜之道不敢陳於王前故齊人莫如我敬王也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大於是孟子生乎戰國之世齊梁之君皆庸下之才其不足與言仁義鄙夫孺子之所共知也而孟子必以堯舜之道説於其前不肯少自貶以求合者蓋人主之學惟有學為堯舜之一塗而已舍是則異端也舍聖人之道而為異端則何以為孟子哉故其寧厄窮而不得一施不肯舍所學而從人也傅説孟子易地則皆然尚書全解卷二十
