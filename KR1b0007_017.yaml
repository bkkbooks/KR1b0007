body:
  text: 尚書全解卷十七宋林之竒撰咸有一德商書伊尹作咸有一德咸有一德此篇蓋伊尹致政告老而歸訓于太甲丁寧告戒終致其拳拳愛君之意而作也而其簡冊所編次則與伊訓太甲三篇相連屬不可以無别也故别為篇名曰咸有一德蓋其篇中有曰惟尹躬暨湯咸有一德故借此四字以為簡冊之别然此篇之義不必全繫於是也漢孔氏曰言君臣皆有純一之德唐孔氏曰伊尹致仕而退恐太甲德不純一作此篇以戒之經言惟尹躬暨湯咸有一德言己之君臣皆有純一之德戒太甲使君臣亦然此主太甲而言臣有一德者欲令太甲亦任一德之臣經言任官惟賢材左右惟其人是戒太甲使善用臣也詳考此篇終始之義信如二孔之說蓋此篇之意實欲太甲慎於用臣君臣上下克終厥德以盡其純一之德然書之篇名以篇中字為簡冊之别者多矣如梓材無逸立政之類不必皆盡其一篇之義要之姑借此字以為篇名之别焉若必從而為之說則妄妄有穿鑿而不得通者且以詩譬之如召旻之詩其篇言旻天疾威天篤降喪而篇終曰昔者有如召公日闢國百里取其始終之美遂以召旻二字為此篇之名乃若詩之義不在是也而作序者乃曰旻閔也閔天下無如召公之臣也若此之類皆妄論也百篇之序蓋有述所作之人而不言其所以作是篇之意者如咎單作明居周公作立政與此篇之序比之諸序最為簡省若以為經文已明故略之然其諸序亦有經文已明而序文詳言之者故豫嘗謂書序之作非出於一人之手蓋厯代史官相傳以為書之總目既非出於一人之手故自有詳略不同至於書之本義不在是也如此篇發首是言伊尹復政厥辟將告歸乃陳戒于德則其序亦可言其致政告歸之意然當時史官所録者止如此若杜預所謂史有文質辭有詳略不必泥也學者於此不可校量同異而為之說苟以書序之作盡出於夫子之手必於其間校量同異輕重盡以春秋褒貶而求之則將不勝其鑿矣伊尹既復政厥辟將告歸乃陳戒于德太甲既終喪伊尹以冕服奉之于桐宫以歸于亳始踐天子之位故伊尹於是還政太甲告老而歸蓋功成名立則奉身而退不以寵利而居成功也夫豪傑之士蓋亦有可以當受遺託孤之寄者然至於天下之權在於掌握則往往固吝而不肯舍者有以為騎虎而不得下之勢者如霍光之忠義蓋所謂可以託六尺之孤臨大節而不可奪者然而寵盛勢尊則固惜權柄不肯還政於宣帝而積其疑似之釁卒成族滅之禍此猶可言也至於曹操司馬懿桓溫之徒則又往往肆其不軌之心欺孤兒寡婦而奪之位此無他惟其既執天下之大權而不忍棄去故其末流不害于其家則凶于其國其禍如此之慘也伊尹以冕服奉嗣王而歸既復政而遂告歸而去豈復以權勢繫吝其心哉孟子曰非其義也非其道也一介不以與人一介不以取諸人彼其視千駟之多天下之大無以異於一介之取與則眇然天下曽何足以動其心哉此其盛德大業所以歷萬世而不可企及者也伊尹雖告老而歸然太甲欲敗度縱敗禮蓋嘗習於下流而為放僻邪侈之事其居桐宫也困心衡慮然後改過遷善之心作於憂患之中其於處仁遷義蓋未久也而遂處至尊之勢躬攬萬幾之務伊尹度其所養也固所守也確必可以離師傅而弗反然其告歸本出於愛君之誠心拳拳然而不能自已也於是為之歷陳天人影響之應所以禍福興亡之理以堅其修德之志其言尤為􅈤到切至蓋其所以望於太甲以克終允德而為商家社稷無疆之休者其言實基於此使太甲優游饜飫入於其心而不背也故伊尹得遂其髙尚之志逺處於不用之地而無憂故曰將告歸乃陳戒于德蓋陳其德之常與不常以致夫禍福興亡之理者以戒之也曰嗚呼天難諶命靡常常厥德保厥位厥德靡常九有以亡嗚呼者歎而發其辭也蓋言之不足故嗟嘆之也諶者信也天之難信者以其禍福興亡之命初無常也治或變而為亂安或變而為危當其既安且治矣而遂信其無復有危亂則凶禍隨之矣蓋天命之無常惟其德則可以為常有能常厥德則其治可以永保蓋人之德有常則天命亦有常而可信苟其德之不常則雖奄有九有之衆亦不救於亡蓋人之德既無常則天命亦無常而不可信矣如以舜繼堯以禹繼舜天下大安大治者幾二百年此非天命之有常也蓋堯舜禹三聖人皆有常德故天命亦從而有常苟使以丹朱繼堯以商均繼舜其德既不常則天命亦將不常矣故人君之德常與不常是天命之所自出也惟天命之所自出是以惟人主不可以言命使人主而言命則將以天命為可信而常厥德保厥位者廢矣九有即九州也夏商周皆是用禹貢疆理之法分天下以為九域夏之九州即禹貢所載是也商之九州先儒以為即文觀之即成周之九州職方氏之所載者也夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正伊尹既言天命之無常惟有德則可常於是當引夫桀之所以失天下湯之所以得天下者以證之矣夏王桀不能常其德幽則慢於神明則虐於民彼所以慢神虐民者其意蓋謂天命之可信如紂所謂我生不有命在天也既慢之虐之矣於是民怨神怒皇天雖欲眷有夏而存之不可得也故於是棄之而弗保天既棄桀而弗保然而天下不可以無主也故鑒視萬方之衆擇其能有天命者而開導之於是眷求其一德之人俾為天地神祇之主矣而我商家君臣咸有純一之德故能上當天心於是受天之明命以有九州之衆革夏正而有天下也革夏正者夏以建寅之月為正湯既勝夏始以建丑之月為正是革正之事前世未嘗有蓋始於湯武王因之遂以建子之月為正易之革曰湯武革命順乎天而應乎人是也而說者乃以為正朔三而改自古相變謂夏以前迭用此說非是某於堯典已詳論之矣伊尹既於上言天難諶命靡常惟有德可以為常於是遂言桀之所以失天下湯之所以得天下者蓋天之所以不保於桀者是桀之弗克庸德自不能保也自緯候之書出於漢世祥瑞之說雜終而起儒者爭言三代受命之符使為人主者不知取必於其德而妄意符命於不可測之間使王莽因之而篡漢者推其源流皆漢儒之罪也孔氏生於漢世其於經也蓋有不淪於諸儒之習而卓然有超世之見其論伊尹成湯咸有一德克享天心受天明命是其一也故其說以謂所征無敵謂之受天命夫漢儒之論往往以謂帝王之興必有非人力之所能致而自至者符瑞之說不勝其煩孔氏不然以謂湯之所以受天明命者惟所征無敵耳至於東面而征西夷怨南面而征北狄怨曰奚獨後豫后來其蘇是則人心之無所不服人心既服天命其在是矣唐孔氏亦識其意遂從而發明之曰天道逺人道邇天之命人非有言辭之告正以神明佑之使之所征無敵謂之受天命也緯候之書乃稱有黃龍元龜白魚赤雀負圖銜書以授聖人正典無其事也若漢孔氏可謂不畔於經矣若唐孔氏亦可謂無負於先儒矣非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德此又申前之意以盡其義也言湯之所以受天明命者非天之私我商家也惟天之所助佑者在于一德故天佑之也其所以有九有之師者非啇之求于下民也惟民之所歸者在于一德我有一德故民歸之也我商家所以天佑之民歸之者以其德之一故動罔不吉也蓋德之一則是吉德也以吉德而動豈有不吉者哉桀之所以天不佑之而民不歸之者以其德之二三而動罔不凶也蓋德之二三則是凶德也以凶德而動豈有不凶者哉惟其動之吉凶皆繫於德之一與其二三故繼之曰惟吉凶不僭在人惟天降災祥在德言天之吉凶所以不僭差於人者則天之所降災祥惟在於德故也自其降於天者而言之則為災祥自其受於人者而言之則為吉凶其實一也伊尹自篇首至於此丁寧反覆如此之詳如此之盡而其大要則惟言天命之不可常惟有德則可以為常人事之得失動於此則天命之從違應於彼不可不謹也既曰常德又曰一德者惟一故常惟常故一天地之覆載日月之照臨四時之推遷萬物之生育所以悠久而不變者惟其一而常常而一故也故伊尹告歸其言及於一德常德尤為詳盡者蓋以謂常人之立事無不鋭於始而工於初至於中則稍怠末乃澶漫而不振此雖聰明睿智之主有所不能免者且以周宣玉觀之當其側身修行任賢使能見於雲漢蒸民江漢六月采芑之詩固已無愧於文武成康矣惟其盛德之髙明光大也如此故能復受天命以中興周室而復㑹諸侯於東都非其聰明睿智之有以過人者豈能爾哉及其憂勤之志弛於庭燎好賢之心替於鳴鶴逮其末年遂至不藉千畝料民太原而寖不克終繼以幽王之暴虐平王之孱弱而周室自此衰矣此無他惟其德之不常不一故也故太甲雖能處仁遷義於憂患之餘而伊尹以冕服奉之以踐天子位及其告歸而去也則懼其歷年寖久遂至于豫怠澶漫而不振也故其言丁寧反覆以堅其心謂德之可常而天命之不可常也苟其德之不常則天命亦不常矣故其言之丁寧反覆如是之切至也善乎蘇黃門之論陸贄也其言曰贄始以官從事德宗老而為宰相從之出奔而與之反國彌縫其闕而濟其危比其反也功業定矣而卒斃于裴延齡之手其故何哉孔子曰南人有言曰人而無常不可以作巫醫善夫不常其德或承之羞贄以有常之德事德宗之無常以巫醫之明而治無常之疾是以承其羞耳又曰德宗常持無常之心故前勇而後怯贄常持有常之心故勇怯各得其當然其君臣之間異同至此欲其上下相保不可得矣夫以德宗之為人也既非常德一德則雖以陸贄之賢事之卒至於君臣上下不能相保伊尹雖以一德為太甲之師傅終苟使太甲之德至於不常而不一則雖伊尹在朝亦末如之何也已而況於告歸而去乎故其將去也丁寧告戒出於愛君懇切之誠而不能自己也今嗣王新服厥命惟新厥德終始惟一時乃日新任官惟賢材左右惟其人伊尹前既論天命之無常惟有德則可以為常德之得失動於此則天之禍福吉凶應於彼其於天人相與之際反覆推明可謂曲盡其理矣於是致其拳拳之忠所以期望於太甲者以終其義也方太甲宅憂亮隂百官總已以聽冢宰也其萬幾之務皆伊尹之所剸裁當此之時天下之治亂社稷之安危伊尹實任之是以太甲之初雖欲敗度縱敗禮自肆於宫禁之中而其禍不及於百姓者以伊尹實當天下之憂責也今太甲既能克終厥德還自桐宫以踐天子之位伊尹於是復政厥辟告歸而去不復以庶政自關而太甲於是親萬幾之務矣既已親萬幾之務則其一言一動而安危治亂之機於此而萌矣伊尹既以其身之所自任者歸之於太甲有不可不盡其丁寧告戒之意故謂今嗣王新服厥命聿新厥德言新有事於萬幾之務言而作命實四方萬姓之所觀聽也人君即位之初發號施令所以端本正始而新天下之耳目尤不可不謹也髙宗亮隂三祀百官總已以聽冢宰及其免喪而踐天子之位也且恭默不言羣臣進諫于王曰天子惟君萬邦百官承式王言惟作命不言臣下罔攸禀令而髙宗以謂以台正于四方台恐德弗類兹故弗言蓋謂始有言于天下苟為輕動而妄發後雖悔之亦何及矣故其新服厥命將欲發號施令為天下之所取信者惟在于目新厥德德者日就月將學有緝熙于光明是也故繼之曰終始惟一時乃日新言始乎如是終亦如是終始惟在于一德而無造次顛沛之或違是乃其德日新之道也蘇氏曰中有所主之謂一中有主則物至而應物至而應則日新矣中無主則物為宰凡喜怒哀樂皆物也而誰使新之如衆人之言新則不能一而非日新也而伊尹曰一所以新也是謂萬物並育而不相害道並行而不相悖又曰聖人如天時殺時生君子如水因物賦形天不違仁水不失平惟一故新惟新故一一故不流新故無斁此言盡之矣終始惟一時乃日新蓋所以總結上文常厥德保厥位德惟一動罔不吉之義也為人君者亦莫不欲終始惟一則日新其德然每每至於寖不克終者蓋未嘗不以小人得以乘間而進熒惑人主之心術蠱害其德日滋月益則流入于敗亡而不自知故大臣之事君既有以格君心之非而成就其德又當使之舉賢材而用之使賢材既用於朝不能間之以小人則其日新之德蓋將有加而無已也是以伊尹之告歸尤丁寧􅈤切於此既曰終始惟一時乃日新而又戒之曰任官惟賢材左右惟其人漢孔氏曰官賢材而任之非賢材不可任選左右必忠良不忠良非其人原孔氏之意以謂任賢材充位列職自大臣至於百執事是也居是官者必得賢材而用終後無瘝官無曠職任官者既得賢材皆在王之左右所謂侍御僕從綴衣虎賁趣馬小尹之任又不可不選忠良之人而用之不忠良則是左右之非其人也蓋賢材雖已任官苟左右之非其人縱有賢材亦將見陷於浸潤之譖膚受之訴而不得一施矣孔氏之言雖簡而其㫖明說者不悟其意遂以左右為大臣謂左右者如說命曰王置諸左右謂惟其人者如周官曰官不必備惟其人此雖有所據而云然與上文任官惟賢材文勢不相應既曰任官惟賢材則大臣已在其中矣而又加左右於下豈不贅哉此蓋未嘗考先儒之意而妄為是說也自古賢材既居于位矣而天子左右或非其人則其勢不兩立小人必勝君子必退至於不能自存者多矣有宏恭石顯在于左右則周堪蕭望之之賢材無所施矣有曹節侯覽在于左右則陳蕃李膺之賢材無所施矣有仇士良陳洪志在于左右則裴度之賢材無所施矣欲賢材之任官而得其忠非左右惟其人不可也臣為上為德為下為民其難其慎惟和惟一此兩句說者不同漢孔氏曰言臣奉上布德順下訓民唐孔氏遂謂為上謂奉為在上為德謂布為道德順下謂卑順以為臣下訓民謂以善道訓助下民顧氏亦同此說故陸德明釋文曰以為上為民為于僞反為德為下如字夫為上與為下相對為文而為上則于僞反為下則如字又為德與為民相對為文而為德則如字為民則于僞反文勢同而意訓特異必無此理是知先儒之說不可從蘇氏曰臣之所以為民上者非為爵祿也為德也德非位則不行其所以為我下者非為爵祿也為民也王氏曰所謂為上為德者將順正救為其上造成所以為君之德所謂為下為民者先後相勸為其下造成所以為民之行也如蘇氏之言為下為民則通以為上為德言臣之所以為民上則經文並無為民上之意如王氏為上為德則通而以為下為民言為其下造成其為民之行所以為民之行則經文但有德字無行字是知此說皆不通某妄謂此四字皆當音于僞反蓋伊尹既言任官惟其人不可以小人在於人主之左右使君子無所效其能而未足以盡其義也故又言賢材之人惟人君之有德則可以致其輔相之力苟人君無其德雖有賢材亦末如之何也已若民則無所擇也蓋世有不可與有為之君而無不可治之民臣欲為上非其君之有德則不可得而為之也至於民則何所不可哉惟君有可有不可而民則無所不可也故不曰為上為君而曰為上為德也臣之為上既在於君之有德苟其君之無德則雖得賢材而用之必為小人之所排擊沮難而不能自存故繼之曰其難其慎惟和惟一言為君必如此而後可也其難其慎者言當疏逺小人憂之畏之惟恐有得乘其隙而進也惟和惟一者言當親近君子與之協心同德以大有為於天下也能如此則其德日新而臣之欲為上為德者無不得其志矣德無常師主善為師善無常主協于克一俾萬姓咸曰大哉王言又曰一哉王心克綏先王之祿永砥蒸民之生此又戒之以并謀兼智合以為公無偏黨也德無常師者言欲日新其德故無一定之師凡主於善者皆在所師也善亦無一定之主苟協于克一而可以成就吾之常德者皆在所主也孟子曰大舜有大焉善與人同舍已從人樂取諸人以為善中庸曰舜其大智也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎此有以見其德之無常師而善之無常主也苟使德有常師善有常主則其心必有所繫吝而不為公心有所繫吝而不公則小人得以窺伺其意之所在以迎合其意而投其所好如此則偏聽而不能并謀兼智與天下為公而民之不服者多矣如唐明皇始用姚崇兼容天下之善以致開元太平之始及其惑於聲色則私心漸勝於是舉國家之務而信一李林甫專咨朝政者十有八年至於末年諫諍路絶上下之情不通及其一旦盜發幽陵四海橫流唐遂陵遲不可復振此無他一有偏聽則天下之不服者衆矣故伊尹既戒太甲小人之不可用而又推原其所謂用小人者自夫君之心不能合并以為公故彼乘隙而入也苟能德無常師善無常主樂與人為善以與天下為公而私意小智不撓於其間則天下其有不心恱而誠服者哉故其發號施令則萬姓皆曰大哉王言又曰一哉王心蓋由其言之大則見其心之一也蓋德無常師善無常主則其心公而不私不私故其心一其心一則其言不期大而自大苟其心有繫吝之私於方寸之間紛然殽亂莫適為主雖諄諄然告人以其心之一而人愈不信矣德至於萬姓咸曰大哉王言又曰一哉王心則其德髙明盛大無以復加矣故上焉則可以綏先王之寵祿而下焉可以永底蒸民之生育矣嗚呼七世之廟可以觀德萬夫之長可以觀政后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功伊尹所以訓告太甲者諄復懇到盡於此矣於是咨嗟而申之以終其意也七世之廟天子之廟也三昭三穆與太祖之廟為七也此商書也言七世之廟則天子七廟其來尚矣而鄭氏云周制七廟者太祖及文王武王二祧與親廟四太祖后稷也商則六廟契及湯與二昭二穆而已此蓋妄為之說其實三代皆事七廟也萬夫之長者猶所謂萬姓萬民亦謂天子也非德無以遺後非政無以齊衆伊尹之言此者謂非德之可觀則無為萬夫之長太甲既上事七世之廟下為萬夫之長必其德政有可觀者然後可也季武子曰諸侯來魯於是乎觀禮與此觀同林子和曰觀者有以示於此而彼得以見之之謂也其意以謂太甲有七世之廟可以示其德於下為萬夫之長可以示其政於下言其勢之易也案此說則觀字當從去聲讀與易觀卦之象同其說亦通夫欲德與政皆有可觀於下則必有道矣惟不以民之至愚而忽之盡其所以敬民之道無一夫之不獲者德與政將不可勝其用矣故繼之曰后非民罔使民非后罔事匹夫匹婦不獲自盡民主罔與成厥功蓋言君之勢相須而立后使民而民事后蓋其尊卑之分不得不然也若謂后之可以使民遂以至尊之勢而驕之則將自廣以狹人矣若以民之勢為在於事上遂以至卑之勢而虐之則匹夫匹婦將不獲自盡矣為上者既自廣以狹人為下者將不獲自盡則君民之心離矣兹誠治亂安危之本也故終篇尤深切於此以謂太甲欲善其德與政則當克自抑畏其視天下愚夫愚婦一能勝豫而盡其欽民之道無自以為廣而謂人為狹苟使四海之廣萬民之衆而有一夫一婦不獲自盡則是人君之心有所未盡故彼亦不得以自盡也有一夫一婦不獲自盡則乖戾之心生而天地隂陽之氣亦將乖戾而不和矣其何以成厥功哉是以人主之職必在夫得萬國之歡心以事其先王使萬姓咸曰大哉王言又曰一哉王心然後為能盡其心此庸德一德所以克終也至於厥德靡常而致九有之亡者亦豈在天也哉失匹夫匹婦之心則天下之心自此去矣故太甲論德無常師主善為師善無常主協于克一而必以萬姓為言至於無自廣以狹人則但曰匹夫匹婦不獲自盡民主罔與成厥功亦猶其所謂爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗詳考此篇終始之義又與召誥之言曽無少異召誥曰我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命即此篇所謂天難諶命靡常常厥德保厥位厥德靡常九有以亡也召誥曰今王嗣受厥命我亦惟兹二國命嗣若功王乃初服嗚呼若生子罔不在厥初生自貽哲命即此篇所謂今嗣王新服厥命惟新厥德也召誥曰其惟王勿以小民淫用非彞至欲王以小民受天永命即此篇所謂后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功也蓋太甲成王皆是始踐尊位而攬萬幾之務故伊尹召公諄諄告戒之言若合符契其大意則皆以謂天命不可必而人事為可必不可以廢人事而不修而歸諸天命也夫中才庸主其所以偃然自肆於民上而不以國之安危休戚為意者惟其恃天命而廢人事故每至於敗亡而不自知唐德宗與李泌論建中之亂曰建中之亂術士豫請城奉天此蓋天命非用盧杞所能致也夫德宗怠棄厥德用盧杞以致禍亂至於鑾輿播遷生民塗炭若可以少悟矣而猶歸咎於天可謂愚矣故李泌曰命者他人尚可言惟君相造命者若言命則禮樂刑政皆無所用矣泌之言誠與咸有一德召誥合伊尹之相太甲召公之相成王不以天命歸於自然之數而謂本於人君之德與不德者蓋謂君相造命不可以言命也伊尹召公之言太甲成王信而用之故能成啇周之治泌之言德宗不能用而唐室陵遲其言則同而其治亂則異何也蓋對必以正者泌之所能必也至於用與不用則非泌之所能必也沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁伊陟相太戊亳有祥桑榖共生于朝伊陟贊于巫咸作咸乂四篇太戊贊于伊陟作伊陟原命仲丁遷于嚻作仲丁河亶甲居相作河亶甲祖乙圯于耿作祖乙尚書全解卷十七
