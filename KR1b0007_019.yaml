body:
  text: 尚書全解卷十九宋林之竒撰盤庚中商書盤庚三篇有上中下之别亦猶泰誓三篇也盖其書雖同為此一事而作然其所以誓誥之時則有先後故史記從而分之泰誓上篇始合諸侯于孟津而作也次篇次于河朔而作也下篇將發于孟津而作也故史官雖析為三篇而每篇之首必志其所作之時以為之别此盖記載之體然也此三篇之作亦有先後之不同故史之叙述皆志而别之上篇曰盤庚遷于殷民不適有居率籲衆慼出矢言中篇曰盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭下篇曰盤庚既遷奠厥攸居乃正厥位綏爰有衆皆志其所作之先後故唐孔氏曰上二篇未遷時事下一篇既遷後事上篇人皆怨上初啓民心故其辭尤切中篇民已少悟故其辭稍緩下篇民既從遷故辭復益緩此言深得叙書者之意王氏以為告羣臣庻民與夫百官族姓此則未深考於其所叙之先後而妄為之説也盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭盤庚乃登進厥民曰明聴朕言無荒失朕命盤庚既於上篇丁寕反覆告其臣民以遷都之意則夫臣之傲上從康不可以告訓民之相與咨怨不適有居者稍能自悔而遷都之謀决矣於是將欲與之涉河而遷焉猶懼夫民情之未甚孚也又諄諄而開誘之務使羣黎百姓皆中心恱而誠服然後帥之而遷故史官既叙載其所以告戒之言於後而必推本其所以告之之意而冠之於先觀此數言雖實至約而其所形容盖得盤庚之心可謂善叙事矣作者起而將遷之辭也漢孔氏曰為此南渡河之法用民徙鄭氏云作渡河之具王子雍云為此思渡河之事皆過論也據經但云盤庚作惟涉河以民遷則作之一字亦何必求之太深邪秦風無衣之詩曰豈曰無衣與子同澤王于興師修我矛㦸與子偕作豈曰無衣與子同裳王于興師修我甲兵與子偕行作與行字盖是一義以是知盤庚作者是將行而渡河耳非有他義也耿在河北亳在河南故曰作惟涉河以民遷也雖將以民渡河而遷然民之情好逸惡勞樂因循而憚改作猶有弗率者於是盤庚乃以話言開迪其蒙蓛而導之以遷都之利其所以大告於民者無他凡欲用其誠信於爾衆而已子夏曰信而後勞其民未信則以為厲已也民之弗率而彊之以遷苟非使其誠信著於民審知遷之為利不遷之為害而樂從之則是厲民而已厲民而用之仁者不為也故蘓氏曰民之弗率不以政令齊之而以話言曉之此盤庚之仁也又曰民怨誹逆命而盤庚終不怒引咎自責益開衆言反覆告訓以口舌代斧鉞忠厚之至此言皆深得盤庚之㫖盖齊之以政令劫之以斧鉞民未必不從也然其從實畏而從之耳欲民之信而從之不可得也惟其不以政令齊之而以話言曉之以口舌代斧鉞故其始雖若優游而無決而終能使民信而從之而無所勉彊於其間此盖盤庚之心而史官善形容之蘇氏善發明之皆可以一唱而三歎也造至也咸造勿褻在王庭葢使司宼之官致萬民於外朝而將告語之先戒以勿褻凟以聴上之令也登進厥民謂升進之使前而告語之也傳曰未言而信信在言前盤庚誕告用亶其有衆咸造勿褻在王庭然後登進厥民而告之可謂信在言前矣夫君民之勢有尊卑上下之殊若霄壌之不相侔苟君之於民而以其勢力與之較則為君者將以至尊自侈而莫接於民為民者將以至卑自抑而莫親於君上下之情離則危敗禍亂自此生矣故禹訓曰民可近不可下謂當以情接之而不當以勢凌之也民之弗率則使之咸造王庭升進之使前而與之周旋曲折論其禍福安危之理若父子兄弟相與議其家事於閨門之内者其近民也如此民其有不心悦而誠服者哉嗚呼古我前后罔不惟民之承保后胥慼鮮以不浮于天時言爾衆當明聴我之言無荒廢以失我之命既勅戒之矣於是嗟嘆而稱述其前世之所以屢遷者莫不本於人情而其民亦説而從之今之所以遷是以先王之意而民未之從也謂湯已下至於祖乙凡遷都之主皆是也孔子曰使民如承大祭言不敢輕用民力而重之如此罔不惟民之承謂我前后之所為無不敬民而承之未嘗輕用其力也我先后既罔不惟民之承故民亦保后而相與同其憂慼林子和曰憂民之憂民亦憂其憂罔不惟民之承則是憂民憂也保后胥慼則民亦憂其憂此説是也鮮以不浮于天時孔氏曰浮行也言皆行天時唐孔氏謂順時布政若月令之為王氏曰乘時流行無所底滯此諸説皆以浮為行其説亦通而某竊以謂蘇氏之説為勝謂古者謂過為浮浮之言勝也以此敬民故民保其后相與憂其憂雖有天時之災鮮不以人力勝之也此其為説不惟於浮字之義為通而且與上下文相貫古人謂名勝實為名浮於實而又有天人相勝之説天之降災於人宜其國遂至於危敗禍亂而不可救而先后能與其民同心協力擇利而遷是以安存而無虞是修其人事而能勝其天時者矣既言先世之君與民同其憂恤修人事以浮于天時於是又詳言其所以浮于天時之事也殷降大虐先王不懷厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰言我先王之遷未有無故而遷者皆因天時大災虐於我殷家盖仲丁之遷于囂河亶甲之遷于相祖乙之遷于耿雖其書已亡不見其所以遷之故然以此言觀之則知其遷也皆迫於禍災有不得已而不可以已者惟天降咎大虐於殷故我先王不敢懐居於其故邑舎其舊而新是圖於是見㡬而作視民之所利者而帥之以遷陳少南曰上浮天時下觀地利此先王遷之大畧也汝之臣民不從我以遷者何不念汝所聞於古我先后之事其所以遷大抵敬汝民而承之遂使汝從其遷徙之事惟欲與汝共其喜樂安康而已非汝之有過咎近于謫罰而遂迫汝以遷也予若籲懐兹新邑亦惟汝故以丕從厥志今予將試以汝遷安定厥邦先王之視民利用遷者既已如此我之所以號召爾民而進之使爾懐兹新邑者亦豈為我一人之私計也哉亦惟爾民之蕩析離居罔有定極故為爾擇利而遷以大從爾之志亦如先王之承汝俾汝惟喜康共也夫盤庚之遷盖民情相與怨咨而不悦今乃曰以丕從厥志何也蘇氏曰古之所謂從衆者非從其口之所不樂而從其心之所同然也亳邑之遷實斯民之所利也惟其為浮言之所摇動故其誦於口者咸有不樂之言若乃幡然而改以其利害安危之實而反求之於心則固知其遷之之利與不遷之害矣故丕從厥志者正蘇氏所謂非從其口之所不樂而從其心之所同然者也惟其遷也盖為汝民之故以丕從厥志故我今兹所以將試以汝遷者凡以安定厥邦而已非有他意也王氏曰今予將試以汝遷安定厥邦者告民以遷之安利也以遷為安定厥邦則知不遷必有危而不安亂而不定之事也此説是也汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動予一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳先王之世在上者視民利用遷以憂民之憂則民亦憂其憂今我之遷於斯邑亦惟汝民之故以丕從厥志而安定厥邦可謂憂民之憂矣而汝民不能保后胥慼以憂我之憂故遂責之由汝不能憂我心之所困盖盤庚之心以民之不遷為病也惟不念我心之所困病故為浮言之所摇動相與咨怨大不宣布爾腹心敬念以忱誠感動我一人爾徒為此紛紛以自取窮苦而已盖我將欲與汝共其喜樂以從汝之志而汝乃不宣其心以盡忠於我則其所窮苦也非爾之自貽伊慼而何汝既自取窮苦不肯從我以遷譬如舟之載物不以時而濟則將臭敗其所載盖耿之地潟鹵沮洳若此苟不以時遷則沈溺重膇之患無所不至矣此謂當及時而遷也既汝不能大宣乃心欽念以忱動予一人則是爾之誠忱有所不逮也誠忱不逮而失其可遷之時以相與及於沈溺之患矣詩曰其何能淑載胥及溺正此意也汝之不肯從我以遷者其害如此則是汝之所見進退無所稽考徒自肆其忿怒不遜之意果何時而瘳也汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上今予命汝一無起穢以自臭恐人倚乃身迂乃心予迓續乃命于天予豈汝威用奉畜汝衆汝不為長久之謀以思其不遷之災則是汝以憂自勸猶孟子曰安其危而利其災樂其所以亡也今其有今罔後汝何生在上顧氏云責羣臣汝今日其且有今目前之小利無後日長久之計禍患將至何得久在生民上乎盖亦責其逺慮也夫遷之為利不遷之為害盖一言而决矣今乃至於紛紛而莫定者則其心之莫適為主故浮言得以摇動之而無適從也是以盤庚既責其不以誠忱事上則遂告之曰今予命汝一言汝但能一汝之心而不狥於目前之利則利害之實見矣利害之實見則是不欲遷者徒起穢惡以自取臭敗而已此亦所以申前文若乘舟汝弗濟臭厥載之義盖反覆開譬以盡其意猶上章既言若農服田力穡又曰惰農自安既曰予若觀火又曰若火之燎于原皆首尾相發明之辭也我之所以命汝以一其心無起穢以自臭者盖恐羣臣之傲上從康者欲徇其私則倚託乃之身而迂僻乃之心遂使爾民怨誹咨嗟而不欲徙則彼得以為之辭也予之諄諄告汝以禍福利害之實亦豈有他哉盖將導迎汝於喜康之地而續汝之命于天予豈以威脅汝而使遷哉凡以畜養爾衆而已此盖所以縂結其前之義也先王之遷鮮亦不浮于天時故予續迓乃命于天是亦將修人事以勝夫天之降災也先王不懐舊邑視民利用遷俾汝惟喜康共非汝有咎比于罰故予豈汝威用奉畜汝衆是其志盖亦不在於咎罰汝而惟欲使爾享其利也先王之遷也如此吾之遷亦如是是則予之遷也豈咈百姓以從己之欲也哉盖所以順民之心以祈天永命而已黄博士曰天以人因人以天成則義與命相待而後立者故能承古以遷遷則天其永我命于兹新邑盤庚所以逆其命之至繼其命之絶使爾衆有復生在上也此説甚善人主造命而不可言命予言之屢矣而盤庚之所謂迓續乃命于天之説其義尤為深切著明故復論之易曰顯諸仁藏諸用鼓萬物而不與聖人同憂盖天之應物禍福吉凶之來皆以類至而聼其自取爾初未嘗容心於其間故其命靡常而不取必於其有治而無亂有安而無危也聖人治天下其所以應天者禍福吉凶之來而無有憂患之心故能轉禍而為福去凶而為告其至於將危將亂之際而皆有續之之道焉且以尭舜觀之以尭而生丹朱以舜而生商均則其傳天下也有必危必亂之道矣尭舜知其必危必亂將荼毒天下之民而不可救於是續民命于天而尭以位授之舜舜以位授之禹則斯民復享安且治無以異於尭舜在位之日而不見夫丹朱商均之患豈非聖人有憂天下之心以能迓續民命于天乎故凡聖賢之君當危亂之機已萌而有所變更而振起之者皆所以續民之命豈獨盤庚哉故栁子厚愈膏肓疾賦託言秦緩論膏肓之疾不可治而或者以為可治其言以醫國為喻而曰變弱為彊易曲成直寧闗天命在我人力以忠孝為干櫓以仁義為封殖拯厥兆庻綏乎社稷一言而熒惑退舎一揮而羲和匪􅉴桑穀生庭而自滅野雉雊鼎而自息誠天地之無親曷膏肓之能極秦緩於是言曰吾謂治國在天子謂治國在賢吾謂命不可續子謂命將可延此言託意興喻可謂曲盡其理矣不明乎此道者謂之不知命故伊川先生有言曰天命不可易也然有可易者惟有徳者能之如修養之引年世祚之祈天永命常人之至聖賢者皆此道也嗚呼世之治亂存亡人之夀天智愚為此繫于天而人事無所與焉是徒為自暴自棄而已予念我先神后之勞爾先予丕克羞爾用懐爾然王制曰修其教不易其俗齊其政不易其宜先王之所以施其政教於民大抵審其風俗之所尚而利導之故民之從之也輕亦曉然知利害好賢之實無黽勉不得已之意此所以用力寡而就效衆也殷人之俗尊神尚鬼而不敢慢彼其心盖以鬼神於人吉凶禍福其應如響洋洋然在其上在其左右而不可欺也故嚴威儼恪而事之盤庚審於風俗之所尚故其所以告諭民而率之以遷者既為之明言遷都之為利不遷都之為害而丁寧激切之辭盖尤嚴於鬼神之際上篇曰兹予大享于先王爾祖其從與享之作福作災予亦不敢動用非徳者盖言我先王與乃祖在天之神靈昭昭乎其不可欺我之所以事先王則不可以不遷爾知求其祖考則不可以不從我而遷也其所謂因其風俗之所尚而齊以政教者既已致意於此矣至於此萹反覆諄告以盡其意極陳其鬼神吉凶禍福之應而不厭其辭之繁縟也曰神后曰商后曰先后皆指自湯而下至于祖乙凡遷都之主也而其稱謂不同者特變其文耳亦猶舜典之言藝祖文祖本非有異義也而先儒以謂皆指湯而言其説非據上文稱古我先后罔不惟民之承殷降大虐先王不懐皆是泛指遷都之君此文與上意實相連接安得以為專指成湯乎况此文指臣民之先世皆云乃祖乃父而盤庚之世距成湯甚逺其臣民之父盖無有逮事成湯者以是知其所稱神后商后先后大抵泛指遷都之主不獨數湯一人而不及其餘也唐孔氏亦覺其非故從而為之説曰盤庚距湯年世多矣臣父不及湯世而云父者與祖連言之耳此盖欲庇葢先儒之失而彊為之辭矣夫言祖而連父於其所未甞逮事之世無是理也盤庚言我思念我先后自湯至于祖乙與爾先祖相與勤勞擇利而遷是爾之先臣在于前世有大勲勞于我商家故我大進用爾於列位用以綏懐汝使汝各得其所安以無忘先世之徳也失于政陳于兹高后丕乃崇降罪疾曰曷虐朕民汝萬民乃不生生暨予一人猷同心我惟用大進爾以綏懐爾故足以慰爾先后與夫乃祖父在天之靈盖先后乃祖乃父之心惟欲後之人各安其居而無蕩析離居之患也苟我失其政而惟臣民之所沮抑不得率汝以遷陳久于此耿邑而速其沈溺重膇之患則是我之優游不繼有以致之然也故我商后乃赫然震怒于上重降罪疾于我其意若曰汝何為虐我民不能擇利而遷乎惟我高后之心必欲使我重愛斯民之命擇利而遷今我既有遷都之定謀矣而汝萬民乃安于逸樂憚于勞苦而無趨事赴功之意以與我一人協其謀謨同心以遷則是汝衆之責也繼之曰汝萬民乃不生生暨予一人猷同心先儒以生生為進進不如蘇氏之説蘇氏曰樂生興事則其生也厚是謂生生張平子賦曰盤庚作誥率民以苦盖其自耿遷亳也將使斯民去其奢侈怠惰之習而為務本力農之事是所謂率之以苦惟其率之以苦故告之以是而又以樂其生生者勤勤懇懇其言不一而足既曰使萬民罔不生生又曰往哉生生又曰生生自庸盖為優游稱導其所勸勉之意使其敏於是功而無敗壞不振之患也先后丕降與汝罪疾曰曷不暨朕幼孫有比故有爽徳自上其罰汝汝罔能迪汝既不能樂生興事而與我同心以遷則是得罪於我先后矣故我先后大降罪病於汝其意曰汝何不與幼小之孫而相同心以遷乎故有爽明之徳自上天而罰汝汝無所道言無辭以自免故也幼孫者盤庚自抑之辭也古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死兹予有亂政同位具乃貝玉乃祖乃父丕乃告我高后曰作丕刑于朕孫迪高后丕乃崇降弗祥鬼神聰明正直賞罰善惡各以其類無容私於其間我雖為先后之子孫苟我虐朕民而不知其所以拯捄之者則得罪於先后雖我先王亦不以子孫之故而私之苟惟汝臣民不與我協心以遷而獲罪於我先后則乃祖乃父安得私爾子孫而不降之災乎故稱汝之獲戾于上天又謂乃祖乃父雖欲私爾不可得也言我先王既與汝之祖父相與勤勞以遷今為惕我所畜之民而有戕則在乃之心以沮敗國家之大計我先后懐乃祖乃父而告之乃祖乃父於是斷絶汝而不救汝之死也左傳曰毁敗為戕戕則天下也蘇氏謂則象也爾有戕民之象見於心以戕則為賊民之象其說迂也苟戕則在乃心已為我先后與乃祖乃父之心斷棄汝不救汝死况有亂國政之臣締交立黨同其列位眷戀於耿邑之奢侈具乃寳貝貪于貨賄莫知紀極而唱為戕賊之言以鼓惑愚民則其罪為愈重也貝水蟲也古者取其甲以為貨若今用錢貝者貨也玉者寳也下篇曰無縂于貨寳是也既其罪為汝重於是乃祖乃父乃告我之先后曰作大刑于朕之孫於是開導我先后降下不祥之罰于汝之身也自予念我先神后之勞爾先至迪高后丕乃崇降弗祥大抵言今兹之遷乃我高后與乃祖乃父之心我不能率汝以遷則是違我高后之意汝不從我心以遷則是違乃祖之意殃禍之來有如影響之速我不可以不率汝汝不可以不從我也夫鬼神之理蔵於幽冥杳忽之間而不可以形容想像求也故智者推而逺之而致之於不可測知之域惟男巫女覡之於鬼神然後信其所以與人相接者皆有卓然之實迹其居處飲食與明而為人者無異此盖愚俗之弊今盤庚與臣言其遷都之意而及其先王與臣民之祖父所以相告相語與夫所以震怒不悦而降以罪疾之言無所不至周公禱武王之疾於三王曰予仁若考多才多藝能事鬼神武王之不能事鬼神其言為尤著明信如此二説則是人之死也其君臣父子相與處於鬼神之域盖自若也無乃近於巫覡之見哉盖惟達於理然後能知鬼神之情狀不達於理而言鬼神則是巫覡而已季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死此盖夫子深告子路以死生鬼神之理不知生而欲知死不能事人而欲能事鬼神則是不知至理之所在而以求鬼神之情狀臆度而言之非愚則誣也盤庚之遷所以奉承先王之心而臣民傲上從康之心不可訓告此必為先后之所震怒而不赦也周公欲以身代武王之死盖王業之基天奪武王之速其三王之心皆所不忍於此也此二者至理之所在極其理而推之則可以知鬼神之情狀雖其言若親與鬼神相接見其好惡取舍之所在不為厚誣也嗚呼今予告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心乃有不吉不迪顚越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑不易釋文作易字讀今當作易字讀盤庚既以至理之所在推説鬼神之情狀論其吉凶禍福之不差僣者盡於此矣於是嗟歎而告之曰我今之遷都謀計之已深思慮之已熟計在必行而不可變易也汝當欽此優恤之事憂我之憂而無與我絶遠而使君民上下之情不得通也蘇氏曰遷國大憂也君臣與民一徳一心而後可相絶遠不殆矣汝臣民皆各以其類相與而思念從我以遷各設中正于汝之心無為浮言横議之所移奪其或有不善之人為不道以至于顚越我之命而不恭與夫暫遇姦宄之人是皆不能設中于乃心也故我論其輕重而加之罪輕則劓之重則殄滅之無使易種于兹新邑也易種者唐孔氏曰惡種在善人之中則善人亦變易為惡故絶其類無使易種于兹新邑也據此文理但是傲上從康不肯從我以遷之人初無異於劫奪之事夫劫奪之事國有常刑無俟於告戒之也其曰暫遇姦宄者大抵肆為浮言之人暫遇二字類不通姑且闕之往哉生生今予將試以汝遷永建乃家既告之以設中于乃心不可肆為顚越姦宄矣於是又縂結之曰自今以往汝當樂生興事以厚其生無戀于舊都而失此長久之業今我將涉河試以汝遷于亳邑永建汝之家使汝子子孫孫長享其生生之樂也亳邑成湯之舊都王業之所基也使商之君能審其治亂之勢世世而守之則其社稷無疆之休且可以萬年子子孫孫永保矣盤庚既自耿邑而遷於此以致中興之治而後高宗之興亦在亳邑盖商之興王未有不在亳邑者而其後世有從亳邑而遷于水之南商俗靡靡而至於紂居于朝歌之地夫朝歌者非使民務本從農之地也是以習為奢麗淫侈以至于亡靡靡之樂盖始于朝歌之風俗也盤庚下商書此篇盤庚既遷猶恐民情未盡諭其所以遷都之意故復為之反覆告諭申前篇之義推其赤心以與斯民同其勞逸共其好惡未嘗致疑於其間盖其愛民惻怛之意充實於中而優游寛大之語自然發見於外皆其心之所誠然者也故其始也臣民傲上從康扇為浮言其民相與咨嗟胥怨而不適有居其君臣上下之情可謂判然而離矣而其終也不變一法不戮一人而其臣民莫不中心悦服樂以從上無黽勉而不得已之意盖盤庚之徳發而為言則善能順民心之所欲者而利導之故能定天下難定之業斷天下難斷之疑史官深陳未遷之前既遷之後所以與臣民言者以示後世欲使人君知為國者舉大事決大謀而臣民之情或有未孚則其所以曉之者當如此也故雖其辭屈曲聱牙而不可曉而先王忠厚之意實存於其間學者於此又不可不盡心也薛氏曰百官族姓則凡以身任王事而與世禄之家皆在焉此所以異既遷奠居則無事矣而盤庚之於百姓猶諄諄若未遷之初者何也曰事未濟則待於衆也故委曲以求人而弗勞事已濟則無待於衆也故傲睨以絶物而弗顧此常人之情非君子居業之道也此説善將恐將懼惟予與汝將安將樂汝轉棄予此世俗之人以其得失利害而惑其心者也盤庚之心出於忠厚至誠惻怛之心其所以通上下之情而同其勞逸者豈以未遷既遷者而二其心哉惟其不然故其二篇雖若少緩而其愛民重民之意未嘗以其既遷而少懈也盤庚既遷奠厥攸居乃正厥位綏爰有衆盤庚既遷者既渡河而遷至于亳邑也奠厥攸居者既至亳邑於是君民各定其所居也乃正厥位者先儒謂正郊廟朝社之位其意謂遷都之制前朝後市左宗廟右社稷也然盤庚之營亳邑將必先定此郊廟之位然後遷而居之不應既遷而後定也案召誥之篇曰成王之營洛邑召公先卜之既得卜則經營至于位成然後周公乃達觀于新邑營古者既定都必先定其郊廟朝社之位而後遷盤庚之遷亦如此向使既遷而後定位則上而宗廟神祗亦皆有暴露之患下而百姓亦皆有繇役之困非古者遷都之道也所謂正厥位者既奠厥攸居於是正乎民之位登進之於朝而與之論遷都之勞而慰恤之故繼之曰綏爰有衆言諭其遷都之意以慰其心而安此有衆之情也曰無戲怠懋建大命楚莊王訓其民以若敖蚡冒篳路藍縷以啓山林箴之曰民生在勤勤則不匱盖創業之君其艱難險阻以遺其子孫有永之業者無非率民以勤苦也然子孫而率民以勤苦者亦必推本先王艱難之意成湯之居亳其地依山而居土高而地瘠故其民力穡務農不忘勞苦之意觀湯之伐桀也其民曰我后不恤我衆舍我穡事而割正夏則是亳之民猶汲汲於稼穡之事至於耿之地則潟鹵墊隘不利於稼穡而其民舍本趨末不復可以勞苦非所謂勤而不匱之道也故盤庚之於亳將告以先王勞苦之意是以首告之曰無戲怠懋建大命言汝既遷於此新邑當黽勉赴功務為勤則不匱之事以圗長久之計不可以遊戲怠惰驕奢之心生而自速禍災使大命顚覆而不得存也中篇曰予迓續乃命于天言我不能為汝擇利而遷使汝得趨於生生之樂則是我絶命而不續也今我能擇利而遷而汝無樂事赴功之意則是我不絶汝命而汝自絶之也是以既遷而告之曰懋建大命言我雖能續汝命于天汝心能無戲怠然後可以立汝之命也今予其敷心腹腎腸厯告爾百姓于朕志罔罪爾衆爾無共怒協比讒言予一人既告之以無戲怠懋建大命於是推本開導其先王之所以導民之意而率爾臣民以遷者以告之也故曰今予其敷心腹腎腸厯告爾百姓于朕志言我今其敷布我腹心腎腸不匿厥指徧告百姓以我所遷之意也昔之未遷也我諄諄告汝以不從我遷者必罰無赦凡欲黜其傲上從康之心無肆其讒慝以敗國家之大計今汝既從我以遷則我不罪汝衆矣爾當安居樂業無以遷之故共為忿怒相與協比肆其讒言以毁我一人也古我先王將多于前功適于山用降我凶徳嘉績于朕邦古我先王指成湯也契始居亳其後屢遷而莫能安定湯欲増廣前人之功於是復居于亳亳之地依山附險而居安立政三亳鄭氏曰湯舊都之民其長居險盖東成臯南轘轅西降谷也以是知適于山者盖指亳而言也適于山則其民敦厚務本而勞勞則善心生善心生則吉徳升而凶徳降盖驕奢淫逸者皆凶徳也惟其民之相與樂事赴功故成湯以成其美功欲我商家伐夏救民由七十里而有天下也今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷肆上帝將復我高祖之徳亂越我家朕及篤敬恭承民命用永地于新邑言我此耿地沈溺墊隘近於潟鹵之地我民摇蕩分析離其所居無有定止是將䧟于凶徳而莫之救拯爾臣民謂我何為震動萬民以遷都之勞盖我以民蕩析離居之故意者上帝之心將復我高祖成湯之徳使其子孫復興其基業故降亂于我邦使此耿之民蕩析離居罔有定極而啓我遷于新邑也路温舒曰天之降禍亂所以開聖人也故我之民盖將以復我高祖之徳于此新邑我於此時能以民之命而恭承之俾永宅于此新邑則是盤庚之所以遷者亦湯之將多于前功用降我凶徳嘉績于朕邦之心也肆予沖人非廢厥謀弔由靈各非敢違卜用宏兹賁我之自耿遷于亳遷則為降我凶徳也不遷則是凶徳之不降其利害較然也如此汝之臣民為私欲所勝傲上從康而不能平心定氣審利害之實以從我遷我之所以彊汝而遷者皆為其傲上從康之謀而不用之今之善謀皆是審於安危之勢是違其傲上從康之謀而從其善謀以成我商家之大業也宏大也恢擴之也左氏成公六年晉師侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知莊子范文子韓獻子諫曰不可於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎盤庚不從羣臣傲上之謀而能用其善謀此亦欒武子之意也嗚呼邦伯師長百執事之人尚皆隠哉予其懋簡相爾念敬我衆盤庚既重言其所以遷都用謀之意矣於是又丁寕反覆以申其所以使之無廢怠懋欽厥徳之意而告之曰自諸侯至于師長百執事之人者是皆我之所共憂戚而圖國家之安也我之勤勞憂戚率之以遷都而不敢自寧如此則汝亦皆憂戚惻然於心而念我一人矣邦伯者邦之諸侯師長者衆官之長六卿也百執事之人則其屬也爾邦伯師長百執事之人誠能惻隠於其心有所不安與我共勉勵賢才務以相念欽敬我衆民而民之不欲遷者由乎在位之臣傲上從康扇為浮言以恐動之故盤庚之先其責在位者尤至詳而其中篇之所告丁寧反覆告其在位之臣苟在位之臣能念敬我衆則斯民豈復有怨咨於上哉故自此下告戒之文不及於民惟在於百執事也朕不肩好貨敢恭生生鞠人謀人之保居叙欽今我既羞告爾于朕志若否罔有弗欽無緫于貨寳生生自庸式敷民徳永肩一心彼羣臣之所以不肯率民以遷而扇為浮言者惟在其安於驕侈之俗久不欲復易是以傲上從康扇為不根之言而恐沈于衆又既使之舍其沃饒奢侈之地而從其近山之都去其驕奢之俗而率為力農務本之習其心可謂至難者於是明言二者之利害以開其為此而去其為彼我不肩好貨之人惟其果於恭敬而聴吾之告令能樂生興事赴功以厚其生者為能鞠養此民者能謀人以保其居者此我所以叙勤勞而欽之也我之好惡既如此則汝當無縂于貨寳各思樂事赴功為民生興事使不失其所賴以生者則是能自致其功也盤庚之所告於臣民諄復告戒盡於此矣於是又縂結之曰式敷民徳永肩一心言敷徳於民則是能一心以事上盖汝之羣臣不能一心以事我者見汝貪于貨寳而要民之害故扇以浮言自以為有徳于民而不悟其非實徳也故上篇則告之以汝克黜乃心而其終篇則曰永肩一心盖謂欲黜其傲上従康之心則在於施實徳於民則能一心以事上矣盖私心去則義理自明義理眀則物莫能奪而愛民之實著矣尚書全解卷十九
