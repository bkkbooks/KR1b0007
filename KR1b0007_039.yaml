body:
  text: 尚書全解卷三十九宋林之竒撰吕刑周書吕命穆王訓夏贖刑作吕刑吕刑惟吕命王享國百年耄荒度作刑以詰四方王曰若古有訓蚩尤惟始作亂延及于平民罔不冦賊鴟義姦宄奪攘矯䖍苖民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫爲劓刵椓黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苖民無世在下乃命重黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無蓋皇帝清問下民鰥寡有辭于苗德威惟畏德明惟明吕吕侯也國語曰堯使禹治水四岳佐之祚四岳國爲侯伯氏曰有吕又曰齊許申吕由大姜則吕者四岳之後姜姓之國也孝經及禮記諸書引此篇之言多曰甫刑案崧髙之詩有生甫及申揚之水之詩有不與我戍甫甫即吕也漢孔氏曰吕侯復爲甫侯唐孔氏因之以吕侯在穆王之世而崧髙宣王之詩揚之水平王之詩故謂吕侯子孫改封爲甫使其子孫方改爲甫侯則吕侯在穆王之世不應謂之甫刑又崧髙之詩所言甫及申爲周之翰者正指此穆王之世吕侯而謂之甫何也毛詩正義曰詩及禮記作甫書及外傳作吕蓋因燔詩書字遂改易後人各從其學不敢定故也此說亦未盡蓋甫與吕正猶荆之與楚商之與殷故曰吕刑又曰甫刑也吕命者吕侯見命於穆王作此書以誥諸侯蓋吕侯之誥諸侯稱王命而已故曰穆王訓夏贖刑言此乃王訓諸夏以贖刑者也唐孔氏及薛博士以贖爲罰刑爲辟篇中所言百鍰至于千鍰者贖也墨辟至于大辟者刑也此蓋欲以序之所言者而包括一篇之義故分贖刑爲二苟不分則篇中言刑與罰而序不應特言贖也舜典曰金作贖刑與此贖刑何以異而必分之乎蘇氏曰贖者疑赦之罰耳然訓刑必以贖者非贖之鍰數無以爲五刑輕重之率也此雖不分贖刑爲二然必求夫所以包括一篇之義之說殊不知五十八篇之序有一篇之義包括於數句之間者亦有但取其大槩而序之者不可以一槩觀也先儒以夏爲夏禹贖刑之法考之篇中殊無夏禹制刑之事唐孔氏因之以爲夏刑近輕商刑稍重周雖減之猶重於夏吕侯度時制宜勸王改從夏法此皆無所經見但因先儒夏禹之言以意揣之而已王氏以夏爲中國其說勝於先儒而其言又曰先王於中國則疆以周索於蠻夷則疆以戎索贖刑不施於蠻夷施於中國而已故曰訓夏贖刑此亦是縁夏以生義支離至此亦與篇内不相應其曰訓夏者猶曰訓天下也不必求之太過也穆王命吕侯作此書以告諸侯則吕侯必爲司寇司寇掌邦禁以佐王刑邦國故也刑者侀也侀者成也一成而不可變故君子盡心焉今觀此篇所以告諸侯之書以苗民爲戒以伯夷臯陶爲法其言惻怛矜哀惟恐民之陷於罪戾而不能以自脫蓋有不忍人之心其盡心可謂至矣詩曰惟申及甫惟周之翰四國于蕃四方于宣甫侯之名與申伯並稱於雅則是佐穆王致太平之功有大造於周者其功業即此篇而可見以穆王之爲君而吕侯之爲臣君臣之間盡心刑罰如此此夫子所以取之而預於百篇也享國百年漢孔氏曰穆王即位年過四十矣史記周本紀穆王即位春秋已五十矣立五十五年崩說者因以穆王年百四歲案無逸言商三宗及周文王享國之年數皆以其在位之久曰王享國百年者皆其在位之年也史記以爲立五十五年當以書爲正禮記曰八十九十曰耄百年曰期頤此旣曰百年又曰耄者此亦如大舜之言曰耄期倦于勤旣曰耄又曰期也耄荒漢孔氏以爲耄亂荒怠此蓋言其老之狀蘇氏以爲荒屬於下句其字訓太與荒度土功之荒度同兩說皆通度者蘇氏曰約也猶漢髙祖約法三章也言惟吕侯見命之時穆王享國已百年其老之狀耄荒矣而能命甫侯度作刑以治四方蓋言其血氣雖衰精力雖疲而留心於治道如此也周官司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百共爲二千五百今穆王之刑乃三千條惟剕與周官同墨劓多而宫大辟則少雖其緫數比周官爲多而其實爲輕蓋以輕刑増而重刑減故也漢志以周官五刑爲中典穆王五刑爲重典徒以其多寡之數耳其實非重也王氏曰先王之爲天下内明而外治其發號施令以德教爲主不使民覿刑辟穆王之訓以贖刑爲主所以稱其耄荒也此蓋泥於耄荒之言而爲此說夫刑罰之不可廢猶藥石之不可無也蓋刑者治之輔助而已得其道則仁義興行而禮遜成俗然猶不敢廢刑所以爲民防也如舜典曰流宥五刑鞭作官刑扑作敎刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉堯舜之民比户可封而其於刑罰之說猶若此吕刑之言是皆以惟刑爲恤者也一篇之中吕侯之稱王命以告諸侯者蓋欲其哀矜於刑獄而已故序曰訓夏贖刑非是穆王之治專以刑爲主也言及於刑者便以爲以刑爲主此乃晉人浮虚之俗王衍口不言錢之類也昔梁統嘗言於漢曰刑罰在重無取於輕髙帝受命約法定律誠得其宜文帝惟除省肉刑相坐之法自餘皆率由舊章至哀平繼體王嘉輕爲穿鑿除先帝舊約成律百有餘事或不便於理或不厭民心又曰自髙祖至於孝宣海内稱治至元初建平而盜賊寖多皆刑罰不重愚人易犯之所致也由此觀之刑輕之作反生大患梁統謂孝宣以前刑重而治孝哀以後刑輕而亂其言之不仁甚矣穆王之刑旣比於周官爲輕今乃以其王之贖刑爲其德之衰竊恐其說必將流而入於梁統也蓋敎人主以殺人者必取夫疑似之言以文其說蓋差之毫釐則繆以千里古之達者每以是爲深憂也此言苗民以虐刑而遏絶其世不可以不鑒戒而苗民之惡則習於蚩尤故先言蚩尤而後言苗民也漢孔氏曰九黎之君號曰蚩尤蓋以楚語曰少昊氏之衰也九黎亂德其後三苗復九黎之德此言蚩尤而繼以三苗故以蚩尤爲九黎案史記曰神農氏世衰諸侯相侵伐神農氏不能治於是軒轅乃習用干戈以征不享諸侯咸來賔從而蚩尤最爲暴莫能伐黃帝乃徴師諸侯與蚩尤戰遂殺蚩尤蚩尤旣爲黄帝所殺而九黎在少昊之末則蚩尤非九黎先儒旣以蚩尤爲九黎而又曰黃帝所滅二說異同安得合之哉楚語昭王問於觀射父曰周書所謂重黎實使天地不通何也對曰九黎亂德顓頊命南正重司天以屬神北正黎司地以屬民使復舊常無相侵瀆是謂絶地天通其後三苗復九黎之德堯復育重黎之後不忘舊者使復典之此謂絶地天通蓋指三苗之事而言安得以爲在顓頊之世楚語非也則蚩尤當從史記應劭曰蚩尤古天子臣瓉曰孔子三朝記曰蚩尤庶人之貪者據史記之言則蚩尤諸侯二者皆非也若古者猶言若昔也蓋起語之辭非訓順也若古有訓蚩尤惟始作亂猶左傳曰夏訓有之曰有窮后羿也平民猶言齊民也鴟者貪殘之鳥詩曰爲梟爲鴟蓋言其以是爲義其好惡顛倒如此奪攘者謂非其有而取之也矯䖍蘇氏曰矯詐䖍劉也惟始作亂即史記所謂爲暴也言自開闢以來蚩尤方始作爲暴虐之政其風化之所漸染延及於齊民莫不皆然自冦賊以下皆是其民爲惡之狀也亦如殷罔不小大好草竊姦宄以紂化之也苗民三苗之君其曰苗民亦猶言殷人周人蓋統一國而言之也靈善也靈制即所謂祥刑也苗民習蚩尤之惡不能用先王善制以刑惟作五虐之刑自以爲法當如是以是而殺戮無罪之人於是始大爲劓刵椓黥也劓截鼻刵斷耳椓椓隂黥黥面不言剕者可以互見也蓋五虐之刑即劓刵㭬黥先王之靈制亦是五者而已但苗民以虐作之又淫爲之也故爲弗用靈制以刑也自苗民之前未有爲是虐刑虐刑自苗民始也於此有麗附於罪者併以刑制之不復差擇其辭之有曲直者此其所以爲虐也此其所以爲淫也民興胥漸漢孔氏曰三苗之民瀆於亂政起相漸化則漸字當作平聲讀泯泯爲亂也棼棼擾攘之狀左傳所謂治絲而棼之也與此棼同惟三苗之虐如此故其民皆起而相漸染習爲不善巧詐矯偽信不由中雖詛盟於鬼神而又反覆背之也傳曰國之將興聽於民將亡聽於神三苗之虐刑嚴罰峻民無所措手足惟爲盟詛訴於鬼神而已詩曰君子屢盟亂是用長左傳曰宋國區區而有詛有祝禍之本也至於盟詛則其亂甚矣然常人之情孰不知敬鬼神敬鬼神而逺之則非徒神無所出其靈響而民亦不瀆神苟一聽於神有不平之心則惟爲盟爲詛則是䙝之也旣已䙝之則將以爲不足畏矣故其勢多至於反覆口血未乾而背之也此無他以其信之不由中故信不足恃也信不由中則以漸染於惡習故也三苗暴虐之威民之被戮者衆豈皆民之罪哉故皆以其無罪而訴於天也天雖髙而聽甚卑民之所欲天必從之故因斯民之告訴而下視於民則夫三苗者罔有馨香之德刑其所以發聞而達於上者惟其腥穢之德而已蓋以德行刑則刑一人而千萬人莫不畏可以至於無刑故其治爲馨香苟惟作虐刑則必至於刑者相望於道囹圄成市民不勝其虐怨嗟之聲呼籲於天此腥穢之所以發聞也皇帝舜也先儒及諸家說者皆以爲堯蓋以下文曰乃命重黎絶地天通重黎即羲和也故以爲堯然竄三苗于三危舜攝位之後分北三苗舜即位之後故皇帝當爲舜大禹謨曰帝德廣運臯陶謨曰惟帝其難之先儒及諸家亦皆以爲堯蓋不深考之也舜哀閔夫衆庶被戮者之非其罪蓋奉上天之意以從斯民之欲故報爲虐者以威刑遏絶苗民而殄滅其世嗣故苗民無世在於下國也湯征葛四海之内皆曰非富天下也爲匹夫匹婦復讎也蓋湯之伐桀武王之伐紂皆以其與民爲讎故爲民復之也此所謂報即孟子所謂復也苗民淫爲劓則椓黥虐威庶戮其遏絶人世多矣故帝以遏絶之威而報之也出乎爾者反乎爾此之謂也楚靈王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎旣而曰余殺人子多矣能無及此乎蓋天理之當也舜之遏絶苗民蓋因天意而已上天之命舜遏絶苗民蓋因民意而已桀紂之亡湯武之王皆然也重羲黎和也世掌天地四時之官故堯命羲和而舜命重黎也惟詛盟之屢則瀆于鬼神故神人雜擾天地相通蓋有鬼神自上而降格者以其家爲巫史享祀無度故也夫神豈能爲民之厲哉惟䙝而近之此妖孽之所以興也左傳莊三十二年有神降于莘虢公使祝應宗區史嚚享焉神賜之土田秦文公獲若石于陳倉北阪城祠之其神常以夜光輝若流星從東方來集于祠城若雄雉其聲殷殷漢武帝時長陵女子死見神於先後宛若上厚禮致祠之内中聞其言不見其人呉孫權時有神自稱王表言語與人無異而形不可見皆其降格者也不能敬而逺之此神所以出其靈響其有害於敎化豈小小哉故舜旣遏絶苗民之世則命南正重司天以屬神北正黎司地以屬民使天地不得而相通亦無有降格則神人不相雜亂蓋所以變苗民之惡俗也楚語載觀射父之言詳矣但不當以書之所言絶地天通爲顓頊之世也羣后即羣臣也與三后之后同不必以爲諸侯逮在下與樛木后妃下逮之逮同言羣后之所以逮其在下者皆以明明之德輔天下之常道使不至於廢敗常道廢故鰥寡之情無有蓋覆之者惟鰥寡無蓋則在下者寃抑之情得以上通故舜清問于民則鰥寡得以三苗之虐爲辭而告訴焉舜於是問罪於三苗也清問者言其問之審而得其實也夫朝有姦臣障蔽君之耳目則下情不上通秦以趙髙之故陳勝唱亂而不得聞梁以朱异之故侯景向關而不得聞隋以虞世基之故賊徧天下而不得聞唐以李林甫之故禄山有反謀而不得聞是皆其在朝之臣無不逮其在下者故鰥寡之辭有所蓋也如唐明皇之出狩有老父郭從謹進曰草野之臣必知有今日久矣但九重嚴邃區區之心無路上達其鰥寡有辭蓋可知矣特言鰥寡者詩曰哿矣富人哀此惸獨暴虐之政鰥寡尤罹其害故其赴愬之心尤􅋀也德威惟畏德明惟明蓋緫結上文也皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下所謂德威也羣后之逮在下明明棐常鰥寡無蓋皇帝清問下民鰥寡有辭于苗所謂德明也舜能遏三苗爲民除害而天下莫不震恐此其德威也舜能清問下民知苗之罪惡貫盈而討之而天下無壅遏之患此其德明也以德爲威故爲可畏以德爲明故爲甚明苟威而非德如秦皇漢武非不可畏也然威䙝而民玩非所以爲畏明而非德如漢顯宗唐宣宗非不明也然失之過察則民將益出其巧詐以欺其上非所以爲明惟舜之威與明皆本於德故惡如三苗無不諸悉其罪一去三苗而天下莫不服也乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉榖三后成功惟殷于民士制百姓于刑之中以敎祗德穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彛典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永前旣言苗民以虐威庶戮之故民心之所怨咨天意之所厭棄故舜因天人之怒以遏絶其世然舜之所以遏絶苗民者蓋以得三后臯陶爲之臣以刑弼敎天下無有寃民故其遏絶之爲有名也孟子曰爲天吏則可以伐燕舜之遏絶苗民所謂天吏也苟爲在我者不能欽恤刑獄而乃欲以正苗民虐刑之罪則是以燕伐燕也故旣言苗民之虐矣於是言舜之用刑也其曰乃命三后者非是遏絶苗民之後方命三后也堯典於於變時雍之下言乃命羲和欽若昊天豈必萬邦咸乂而復命羲和以歴象之職哉此曰乃命正與堯典之意同三后伯夷禹稷也后者尊之之稱若君奭君陳之類如曰后稷是也恤功于民言命三后惟以民之功爲憂也孟子曰禹思天下有溺者由已溺之稷思天下有飢者由已飢之所謂恤也伯夷禮官也帝曰咨四岳有能典朕三禮僉曰伯夷帝曰咨伯夷汝作秩宗是也降典者以禮官而下敎於民也湯誥曰惟皇上帝降衷于下民天以衷而授民伯夷以典而敎民皆自上而下故曰降折折衷也賈誼曰禮者禁於將然之前而刑者禁於己然之後法之所用易見而禮之所爲難知則禮與刑一物也民能由於禮則何刑之有哉惟失禮則入刑矣故伯夷之降典者蓋以刑而折衷於民也方洪水之災浩浩滔天懐山襄陵則山川不可得而定名禹旣平水土矣則山川可得而辨别故主名之者如東北據海西南距岱則爲青州西南至荆山北距河水則爲豫州之類九州之疆界整整乎其有條理所謂奠髙山大川者主名之謂也后稷敎民稼穡故播種之法自上而下也既以播種敎民故三農之所殖也莫非嘉榖所謂黍稷重穋稙穉菽麥惟秬惟秠惟穈惟芑者也殷中也禹之功成則民得所居稷之功成則民得所養伯夷之功成則民得所敎此其所以中也士臯陶也百姓之不率敎者則以刑之中而制之蓋臯陶之用刑豈有意於殘民之肌膚肢體而已哉以刑示之使有所畏而不敢爲非則是敎民之祗敬其德也夫先王之治天下使斯民之遷善逺罪人人有士君子之行者豈獨徳禮之力哉刑罰不爲無力也故堯舜之民比屋可封而舜以四方風動爲臯陶之功焉是德禮者圉以敎之也刑亦以敎之也苐刑者治道之輔助而已不可專恃以爲治也使其專恃刑以爲治如秦之世固君子之所恥若以爲治道之輔助如臯陶之制百姓則何惡於刑乎唐孔氏曰此經大意言禹稷敎民使衣食充足伯夷道民使知禮而有不從敎者乃以刑威之故先言三后之功乃說用刑之事此言是也如漢楊賜辭廷尉之命曰三后成功惟殷于民臯陶不與焉蓋吝之也此言非也夫舜之治每歸功於臯陶則其明刑之功大矣而乃謂穆王吝之故不與於三后可乎此篇終始惟欲四方之諸侯留意於獄訟之事欽恤無所不至然後爲能上體一人之意而自古欽恤獄訟未有居臯陶之上者而以爲吝之可乎韓退之猶以賜之言爲然蓋未之思也三后之功禹平水土而後稷降播種伯夷降典又在播種之後而先言伯夷者唐孔氏曰將言制刑先言用禮刑禮相須重禮故先言之是也穆穆敬也和也天子之容也明明即上所謂明明是也惟舜以穆穆之德而在上三后臯陶以明明之德而在下君臣合德故其德之灼然著見于四方四方之民無有不勤於德者所謂政乃乂黎民敏德是也三后惟殷于民而臯陶以敎祗德則孰不勤於德哉惟其皆勤於德故於是皆明于刑之中蓋刑之中者可以治民而輔成常敎故也王者之法如江河使民難犯而易避臯陶制百姓以刑之中非苗民淫爲劓刵椓黥也故四方莫不明之莫不明之則莫不避之矣民知避刑則遷善逺罪爲士君子之行則輔成常敎者非刑之中而何典獄非訖于威惟訖于富言凡典獄之吏非欲誅殺以立威則欲納賄以致富若苗民之臣所謂庶威者訖于威也所謂奪貨者訖于貨也威者貨者此皆獄吏之常態如漢唐之世所謂酷吏者旣峻于誅殺使天下之人側足而立於是大納貨賄贓汙狼藉以爲姦偽惟敬之畏之者則無可擇之言在於其身子曰片言可以折獄者其由也歟子路無宿諾者以其口無擇言故也無擇言者必敬必畏焉敬畏者天之德也能有天德則可以自作元命在下而配享于天故其子孫之興緜緜延延而未艾自作元命與自貽哲命同言命之所以延久而不替者無不自已求之而已矣魏髙允曰臯陶至德也其後英蓼先滅劉項之際英布黥而王經世雖久猶有刑之餘釁況凡人能無咎乎敬畏者孰若臯陶而乃以爲有餘殃延及其後裔則是典刑者寃濫之報雖臯陶猶不免也夫自作元命則臯陶之後必有興者允之言非也漢于公其門閭壞父老方共治之于公曰少髙大門閭令容駟馬髙蓋車我治獄多隂德子孫必有興者其後果子爲丞相孫爲御史大夫封侯傳世焉此正所謂自作元命者于公且然而況臯陶乎如張湯杜周列於酷吏而其子孫爵位尊顯與漢始終此又有幸不幸於其間不可以常理論也嗟四方司政典獄而下此亦緫上文而言上旣言苗民虐刑之惡故欲四方以之爲懲旣言臯陶伯夷明刑之善故欲四方以爲之監言四方之諸侯各主一國之政典一國之獄者汝非爲天牧養斯民乎旣爲天牧養斯民則若伯夷播刑之道當以爲監苗民不察於獄之麗當以爲懲蓋天生民而立之君使司牧之勿使失性以伯夷爲監以苗民爲懲則無有失性之民可以無忝乎天牧之任也非時播刑之迪言汝所法者非是伯夷播刑之道乎惟此道則法之也上言伯夷禹稷臯陶此特言伯夷舉其大略也伯夷折民惟刑故雖典禮而曰播刑禮與刑一物故也匪察于獄之麗言有麗于獄者苗民不察之而妄加以刑也即上文曰越兹麗刑并制罔差有辭是也其不察之者則以不能擇吉人能觀于五刑之中者而用之其所用者惟是衆爲威虐以快已之怒奪人貨賄以塞已之欲故淫爲劓刵椓黥以制斷五刑不由於中道以亂加無罪之人上帝不潔其德故降之罪咎苗民之爲天所罰蓋已有以自取之無有辭可以自解釋故遏絶其世此不可以不懲也此皆略舉上文之意也伯父伯兄仲叔季弟幼子童孫此即四方之司政典獄者王之同姓有其父行者有其兄弟行者有其子孫行者伯仲叔季其長少之稱子孫故以幼童稱之特言同姓先儒謂舉同姓包異姓是也與康王之誥言一二伯父同穆王享國百年故諸侯或其子孫也格至也言諸侯能聽朕之言敬忌于獄訟之事則庶乎天命之至也曰勤先儒以曰爲子曰之曰釋文一音人實反只當作日字讀言令爾當無不由朕之言相慰勉而日愈勤不可相戒以不勤也蓋典獄之職人命所係死者不可復生刑者不可復續君子所當盡心故戒之以勤也天以刑而整齊下民使我推而行之一日所行或非爲天所終或爲天所終在人如何耳孟子曰禍福無不自已求之者敬忌則爲天所終而子孫代興虐刑則非爲天所終而遏絶其世我未嘗不致其慎也言一日者善惡之感於天不必積久也一日之間皆可矣爾當敬逆天命以奉我一人之言不可失墜逆天命者與迓續乃命于天之迓同勤於聽獄則天命之來吾有以當之故曰逆之也雖畏勿畏雖休勿休王氏曰雖有可畏之禍勿以爲畏雖有可美之福勿以爲美所以然者以禍福之變無常而人心不可知惟當脩德以逆天命耳是也三德剛柔正直所以逆天命者無他惟明于五刑則可以成三德矣蓋平康正直彊弗友剛克變友柔克此三德者雖不假於刑然明五刑者三德自然而成矣以刑成德而無向隅之泣則一人之慶莫大於是此兆民之所賴也其安寧之效豈不永哉夫刑者若爲不仁之具然旣以之自作元命又以之其寧惟永而世皆恥言刑何哉漢髙帝入關約法三章悉除去秦法不五年而成帝業子孫傳祚四百年實基於此一人有慶兆民賴之其寧惟永豈不信哉王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟内惟貨惟來其罪惟均其審克之五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聽具嚴天威墨辟疑赦其罰百鍰閱實其罪劓辟疑赦其罰惟倍閱實其罪剕辟疑赦其罰倍差閱實其罪宫辟疑赦其罰六百鍰閱實其罪大辟疑赦其罰千鍰閱實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千凡言王曰者皆語更端之辭如大誥康誥酒誥及此篇之類雖其終篇皆於一人之言而屢有王曰之文皆以其語更端也吁來者嘆而呼之使前也堯曰格汝舜格至也是亦言來之類祥爾雅曰善也祥刑者善用刑之道即上所謂靈制以刑自兩造具備以下皆是也王呼有邦有土之諸侯使來前而告之以善用刑之道其在於今爾之所以安百姓者當何所選擇乎所擇非吉人乎言惟吉人在所擇也當何所敬慎乎所敬非五刑乎言惟刑在所敬也當何所謀度乎所度非及世輕世重所冝乎言惟及世輕重所宜而用刑在所度也下曰上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重即此及是也曽博士曰上旣言苗民匪察于獄之麗則非能敬刑也罔擇吉人觀于五刑之中則非能擇人也斷制五刑以亂無辜則非能度刑也旣告之以所懲者如彼則其所當爲者冝若是也此言盡之造至也兩造謂囚與證俱至也唐孔氏曰凡競獄必有兩人爲敵將斷其罪必須得證故兩爲囚與證也囚證俱至具在於此則衆獄官聽其辭之曲直曰五辭者五刑之辭聽其辭而審其罪狀當以何刑加之故謂之五辭也所聽之辭簡核其實信爲有罪則正之於五刑當墨者墨之當劓者劓之也苟將正之于五刑而其辭不可以簡核則其罪爲可疑故但正之于五罰罰謂以金贖罪也言將正以此刑而其罪未審則但使出此刑罰金之數而已有五刑故有五罰也老蘇曰夫罪固有疑今有人或誣以殺人而不能自明者有誠殺人而官不能折其實者是皆不可以誠殺人之法坐由是而有減罪之律當死而流使彼爲不能自明者邪去死而不得流刑已酷矣使彼誠爲殺人者邪流而不死刑已寛矣是失實也有失實之弊則無辜者多怨而僥倖者亦以免今欲使不失實其莫若重贖彼罪疑者雖或非其辜而法亦不至於殘潰其肢體若其有罪則法雖不刑而彼固已困於贖金矣五刑不簡正于五罰此說爲盡蓋五刑之疑各有入罰不降相因古之制也唐孔氏曰以其所犯疑不能決故使贖之次刑非其所犯故不得降相因如後世有減罪之律則非古者不降相因之制矣苟正之以五罰而不服則其罪不應罰故但正之于五過以爲其過誤而赦之也有五罰故有五過也老蘇曰刑者必痛之而使人畏焉罰者不能痛之必困之而使人懲焉則罰者雖不能痛之儻其罪不可以罰則亦不可以困之也故赦其過而已五罰所謂金作贖刑也五過所謂眚災肆赦也疵病也惟官惟反惟内惟貨惟來皆刑罰之所病而特言五刑者帶上文而言耳以此文在五過之下故也詩書之言類多如此四牡之詩三章言不遑將父四章言不遑將母至卒章則特曰將母來諗板之詩言天之牖民如壎如篪如璋如圭如取如攜而其下則特曰攜無曰益皆帶上文而言也惟官王氏曰貴勢也惟反蘇氏曰報舊也惟内先儒曰内親用事蘇氏曰女謁皆通惟貨行貨以鬻獄也惟來舊相往來也夫刑之不簡則降從罰罰之不服則降從過蓋與其殺不辜寧失不經此固先王之仁政然不可以此五者之故而遂爲之降耳苟以此五者而爲之降則其罪與犯罪者均當以其罪罪之也汝於此當審察之而後能其事故曰審克克能也昔唐太宗問於劉德威曰比刑網寖密咎安在對曰律失入者減三失出者減五今坐入者無辜坐出者有罪所以吏務深入爲自安計五過之疵其罪惟均此失出者也特言出而不及於失入者觀一篇之中其丁寧諄復之意如此是豈坐入者無辜而坐出者有罪乎以意逆志可也先儒謂出入人罪得之矣五刑之疑有赦此即上文五刑不簡正于五罰赦而從罰也五罰之疑有赦此即上文五罰不服正于五過赦而免之也五罰之疑謂之赦可也五刑之疑尚不免於罰而謂之赦者蓋雖以金自贖而幸其不至於殘潰其肌體是亦赦也下文墨辟疑赦之類皆然也薛博士曰麗於辟而疑於無罪則赦赦謂釋其罪而不問非謂赦之而從罰也犯辟而不正當於辟則非無罪特不簡於正而已於是從罰此蓋以五刑五罰之下皆有赦字故爲此說下文曰墨辟疑赦其罰百鍰於疑赦之下罰字之上言其字者指其上之辭則百鍰之罰正以疑而赦也如此則上下之文意方連屬如以赦與罰異則曰墨辟疑赦其罰百鍰上下不相貫矣舜典曰眚災肆赦此曰五刑之疑有赦五罰之疑有赦蓋古之云赦者以疑似之罪不可以刑辟加故爲之差降贖罰以寛宥之所以矜恤善良非貸免惡人也後之云赦者不論罪之是否一切釋之而不問此徒足以惠及惡人而已唐太宗嘗謂羣臣曰吾聞語曰一歲再赦善人喑啞吾有天下未嘗數赦者不欲誘民於幸免也太宗之用刑至於三覆奏其矜恤如此則其不赦非不仁也不欲以惠及惡人而已其聽刑也苟簡核其辭信爲有罪而其可驗者衆則若可致之於刑矣然人情安則樂生痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏卻則煆煉而周内之故武后謂往日來俊臣等治詔獄朝臣相逮引一切承反朕意其枉更畀近臣臨問皆得其手牒不寃朕無所疑而可其奏故雖簡孚有衆而猶不能無寃此所以必稽考其貌焉惟貌有稽周官五聽之色聽是也蓋稽其貌則其寃枉之狀有可得而見者矣夫簡孚有衆者尚必稽其貌苟無簡孚之辭則不當聽其獄矣其聽獄所以如是之審者以其天威可畏不可不嚴敬之也如嚴延年在河南多所誅殺其母謂之曰天道神明人不可多殺已而延年果誅死則天威可不畏哉墨者先刻其額爲創以墨實創孔令變色也即所謂黥也劓截其鼻也剕斷其足即所謂刖也宫即所謂椓也男子則去其勢婦人則幽閉於宫漢亦謂之腐刑大辟死刑也以其於刑辟爲最大也鍰漢孔氏曰六兩周官考工記曰戈㦸重三鋝劒上制重九鋝中制重七鋝下制重五鋝鄭康成說文云鋝鍰也今東萊稱或以太半兩爲鈞十鈞爲鍰鋝重六兩太半兩鍰鋝似同矣惟鄭氏之說以鍰爲六兩太半兩故三鋝則一斤四兩九鋝則三斤十二兩七鋝則二斤十四兩三分兩之二三鋝則二斤一兩三分兩之一皆以六兩太半兩而計之也太半兩者三分兩之二也鄭康成以鋝爲鍰雖因說文之言然說文之所謂鋝者十銖二十五分之十三又曰北方以二十兩爲鋝鄭氏六兩太半兩之數所異於孔氏者太半兩耳如說文之言一則比之爲太輕一則比之爲太重也老蘇謂一鍰之重當今三百七十斤有竒蓋亦因孔氏六兩而計之也惟倍者倍於墨墨百鍰則劓罪二百也倍差者倍於劓而又有差有差則不啻倍之也劓二百剕倍之則四百有差者漢孔氏謂五百以宫旣六百故此爲五百也馬氏曰差者又加四百之三分之一凡五百三十三鍰三分鍰之一又與孔氏不同然不如孔氏之數簡徑孔氏之說又不如王氏王氏曰倍差者謂以百鍰二百四百相倍而爲差也則是以剕爲四百鍰或曰惟倍或曰倍差駁文也曰墨曰劓曰剕曰宫曰大辟此其輕重之序然以罰金之多少而觀之則劓重於墨剕重於劓宫重於剕其降殺之數相較則同惟大辟爲尤重故其數之重於宫比之三者之相校爲尤多也言犯此五刑者疑則赦之而其赦之也罰之而已閱實其罪蓋欲罪罰相當也閱實則不至於五罰不服矣屬者條目也言墨之罰雖百鍰而其條目則千也其下皆然周官司刑之五刑共二千五百均之皆有五百此則三千輕者多而重者少皆有降殺惟剕居五刑之中則與周官同此蓋因一時之宜而爲之也自穆王之後至於晚周皆以此爲法故孔子引三千以爲言也分而言則曰罰之屬緫而言則曰刑之屬先儒謂互見其義以相備是也昔叔向嘗有言曰昔先王議事以制不爲刑辟懼民之有爭心也民知有辟則不忌於上並有爭心以徴於書而徼幸以成之弗可爲矣夫所弗爲刑辟者非不設法也但設其大法而已其輕重之詳則付之人矣五刑之屬三千此大法也至於上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重此則委之於人蓋人與法並行而後可苟以此數者而亦豫設之則是爲刑辟矣上下比罪無僭亂辭勿用不行惟察惟法其審克之上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寳惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑老蘇嘗曰古之法簡今之法繁先王之作法也法舉其略而刑制其詳殺人者死傷人者刑則以著於法使民知天子之法不欲我殺人傷人耳若其輕重出入求其情而服其心者則以之屬吏任吏而不任法故其法簡今之法纎悉畢備不執於一左右前後四顧而不可逃是以輕重其罪出入其情皆可以求之法任法而不任吏故其法繁蓋法簡者雖若不可以革姦而天下乃或無一人之獄法繁者雖若可以止姦而獄訟嘗至於滋豐誠以銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失後世之所謂律令者煩曲周盡惟恐有所漏略凡輕重上下一聽於律而有司不得一奉手雖其繁積而律之用已有所窮故吏胥得以旁縁出入欺賣有司以逃其姦蓋欲其無所不備者乃所以爲大不備也如穆王之刑五刑之屬三千此律文也至於曰上下相比曰上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重此數者則在有司量情斟酌而施之故其律雖三千而其用之爲不窮徑而寡失蓋謂是也上下比罪者言聽獄之法必當上下比方其罪之輕重而參驗之也無僭亂辭者陳少南曰無以獄辭之亂而至有僭差是也夫訟於心者孰不以爲彼曲而我直其辭苟亂則用刑有僭差者矣汝當審之也勿用不行王氏曰謂責人以恕所不可行者勿用也莊子曰重其任而罰不勝逺其途而誅不至此皆不可行而先王之所不用也是也漢魏尚爲雲中守坐法免馮唐曰士卒盡家人子起田中從軍安知尺籍伍符上功幕府一言不應文吏以法繩之長安賈人與渾邪王市者坐當死五百餘人汲黯曰愚民安所知市買長安中而文吏以爲闌出財物如邊關乎若此之類皆是所不可行而用之也所不可行者而用之則民無所措手足矣惟察者察其情也惟法者正其法也察其情正其法則法與吏交相爲用而不偏廢蓋用刑如用藥焉夫藥之君臣佐使甘苦寒熱某可以治某疾某可以已某病此固在於方書至於視脉觀色聽其聲音而審其病之所由起必以已意參之而後可惟察者審其病之所由起也惟法者案方書而視之也汝諸侯其審於此而後能其事也上刑適輕下服下刑適重上服蘇氏破世俗之說而設爲竊盗二人以發其意說固善矣而不如陳少南之爲明白曰世之言罪重者莫如殺人罪輕者莫如詬罵殺人固重矣然今所殺者奴婢也奴婢而殺之非適輕乎故且服下刑也詬罵固輕矣然今所以詬罵者父兄也父兄而詬罵之非適重乎故宜服上刑也事不止於殺人及詬罵人者姑設二事以凖之所謂輕重諸罰有權也所謂下服者非即服最下刑也比之上刑爲減爾此言盡之刑罰世輕世重蓋承上文而言凡此諸刑罰皆當權其輕重也孟子曰權然後知輕重君子之心若權衡然不可以銖兩欺之故輕重無不得其平也刑罰世輕世重者周禮刑新國用輕典刑平國用中典刑亂國用重典一輕一重各因其世之冝而已因世之冝而輕重不同固不齊矣是乃所以齊之也如周官五刑二千五百穆王五刑三千或少而重或多而輕其不齊如此而其禁姦止慝以期于無刑則一也若乃膠柱調瑟者則不能因世而為輕重徒執一法以齊之適所以為不齊也如唐虞象刑而王莽亦象刑是也王氏曰上言刑罰輕重有權者權一人而為輕重也此言世輕世重者權一世而為輕重也是也世輕世重言刑罰可也至於上服下服則特言刑而於下文承之則言諸罰亦猶五刑分數則曰罰緫數則曰刑互見其義也有倫有要蘇氏謂倫其例也要其辭也則讀與康誥要囚之要同惟有倫則當惟法惟有要則當惟察罰懲非死人極于病此即老蘇曰刑者必痛之而使人畏焉罰者不能痛之必困之而後懲焉蓋言罰之所懲雖不至於死而其困於重贖已極于病亦可以使之遷善逺罪也非佞折獄口給也佞者禦人以口給則人不得以盡其情也如周亞夫詣廷尉責問曰君侯欲反何亞夫曰臣所謂買器乃葬器也何謂反乎吏曰君縱不欲反地上即反地下矣如此者是禦人以口給也臯陶喑而為大理天下無寃民子路無宿諾片言可以折獄則何以佞為哉故惟良可以折獄良者王氏謂有仁心是也孔子曰今之聽獄者求所以殺之古之聽獄者求所以生之良者求所以生之也良之可以折獄者蓋其所用無不在於刑之中也如秦以任刀筆之吏爭以亟疾苛察相髙則佞者安能明于刑之中哉察辭于差蘇氏曰事之真者不謀而同從其差者詰之多得其情是也非從惟從者棰楚之下何求而不得人不勝痛則誣服者多矣故囚惟吏之從而自誣者皆非所當從當有以辨明之也孟氏使陽膚為士師問於曽子曽子曰如得其情則哀矜而勿喜哀矜即此哀敬也其所以哀敬者惟以刑書而明啓之相與占考其所以然衆獄官以為然獄囚亦以為然雖麗於刑殺而無怨言如此則庶幾得其中正而無寃濫矣如秦之任趙髙漢之任張湯趙禹減宣義縱唐之任來俊臣侯思止刑書未嘗明啓亦未嘗胥占惟意之所殺則舞文巧詆如此則何中正之有然則其刑其罰不可以不審克也獄成而孚者言獄辭之成而得其情實信為有罪而其輸之於上亦當得其情實信為有罪然後斷之其刑之輸於上皆當具備不可隱漏其有一人之身輕重二罪俱發亦當并以兩刑而上之也蓋恐其有司得以欺賣出入以為姦故以此戒之也王制曰成獄辭史以獄成告於正正聽之正以獄成告於大司寇大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告於王王三宥然後制刑此正所謂獄成而孚輸而孚也王之有司輸之於王如此則有邦有土之臣輸之於其君亦然薛博士曰凡稱上者各指其上也此告有邦有土則國之士師指其君曰上推而及王朝則王之士師指天子曰上孔氏止名為上王府則於告有邦有土之文戾矣是也官伯族姓蘇氏曰呼其大官大族而戒之先儒即以官伯為諸侯族同族姓異姓其說鑿矣王氏以姓為諸侯族為羣臣亦無以異於先儒蓋旣戒其君以敬刑今又戒其臣也刑者人命所繫死者不可復生斷者不可復續此朕之言所以多懼孔子曰為之難言之得無訒乎言之多懼以其難也朕之所敬惟在于刑則以有德者惟哀敬于刑我安得而不謹哉今天相助此民而生育長養之臨民者必當有不忍之心然後能為天之配於下蓋天愛民是配之也所以配天者惟明清于單辭而已單辭有二說皆通先儒曰單辭特難聽故言之唐孔氏因引子路片言可以折獄片言即單辭也子路行直聞天下不肯自道已長妄稱彼短得其單辭即可以斷獄者惟子路耳凡人少能然故難聽也薛愽士則曰單盡也與單厥心之單同明清而使民得盡其辭也皆可用以為說明清者聽之審也民之所以治者以其聽獄之兩辭而無不中則曲直得其當無辜者不至於枉濫而有罪者不至於僥倖而免也穿封戍與公子圉爭鄭囚正於伯州犂伯州犂則上下其手此聽兩辭而不中者也苗民之泯泯棼棼以其罔差有辭則民之治豈不自於中聽兩辭乎不可以獄之兩辭而為私家以獄為家則惟貨是視不復問乎兩家之曲直也夫以獄得貨者非所以為寶也惟聚其罪耳府聚也言必將敗露而獲罪也功者言罪積於身而自以為功耳則必將報汝以衆罪而誅殛之也報者亦如報虐以威有是惡則必有是報皆是出乎爾者反乎爾者也獄貨者必報以庶尤則所長可畏者惟是天罰也天之罰之也非天之不中惟人取之爾人取之者在其敎命之不中也敎命不中則非所謂制百姓于刑之中以敎祗德天之罰不中則庶民必無有善政在于天下矣蓋以其無有善政故以不中而罰之也無有善政者君也而以為庶民者政雖出於君而布於庶民三苖之民泯泯棼棼此所謂庶民無有令政在于天下也嗣孫者王享國百年故諸侯或其孫也上言伯父伯兄仲叔季弟㓜子童孫此特言嗣孫舉其略也繼世而立故曰嗣言自今以徃當何所監非是施德于民以為之中乎言惟是在所監也德于民之中蓋指伯夷以為言爾庶幾明聽我言而行之不可忽也自古之稱哲人者惟在於用刑耳如臯陶以智稱於後世是蓋惟哲則能明清于單辭也五極五刑之得其中也先儒以為五常誤矣言有無窮之美譽者由五刑之得中刑得中則有餘慶矣旣有美譽又有餘慶天人之所共予也屬連也言美辭由於用刑故以屬言之嘉師善衆也猶言良民也汝受之於王而有邦有土者其所臨涖無非良民則如此上文所言祥刑不可不監也刑所以禁姦民旣善矣惟此祥刑可也吕侯之告諸侯雖出於王命而其言則吕侯之言故雖曰王曰而又曰受王嘉師亦猶梓材之篇周公以王命告康叔雖以王曰為言而又曰王啓監厥亂為民之類從而為之說則不可尚書全解卷三十九
