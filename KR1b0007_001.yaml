body:
  text: 尚書全解卷一宋林之竒撰堯典虞書昔在帝堯昔在者篇首起語之辭書序自為一篇故以昔在帝堯起於篇首如孔氏序云古者伏羲氏之王天下也鄭氏云昔在者使若無先之者唐孔氏云在昔者自下本上之辭言昔在者從上自下為稱據代有先之而書無所先故云昔也此說未是書始於堯典云昔在帝堯謂書無所先堯可也至冏命言在昔文武豈書亦無先之者乎五帝序云惟昔黄帝法天則地正與此同聦明文思光宅天下漢孔氏曰言聖徳逺著其說甚善大抵說經之體貴不費辭如秦近君說堯典二字至十餘萬言但說若稽古猶三萬言雖多亦奚以為哉是以古之人其說經也以約為難不以多為難昔孔子之解經其言愈約其意愈明如詩云天生烝民有物有則民之秉彝好是懿徳但於本文外加二故字一必字一也字詩意昭然如日星又何必以多為哉如孔氏云聖徳逺著聦明文思聖徳也光宅天下逺著也一言之間豈不簡而盡哉大抵聖徳當其妙藏諸用之時而觀之運於無聲無臭之間不可得而見所可得見而形容者惟其顯諸仁而已聦明文思皆其徳著見於外而可見也其視明其聽聦其文煥然其思湛然此四者之充實於一身而其輝光所至塞乎天地之間葢其徳之著見於外而可見者漢孔氏云聖徳逺著可謂約矣於約之中有深義存焉學者未冝以淺近而盡言也將遜于位讓于虞舜作堯典遜遁也春秋夫人姜氏遜于齊公遜于邾其義葢出於此遜于位非謂逃遁而去也葢厭倦萬機之務將使舜攝行天子之事而嬗焉孟子所謂堯老而舜攝也堯典之序有云將遜于位讓于虞舜者葢二典皆虞書也虞書紀舜之事而推本其所得天下於堯故序其事於堯典實為舜典張本正杜元凱序左傳所謂先經以始事是也堯典此二字史官之舊題也古者序自為一篇故史官以此二字為題孔氏既引序冠於篇首因存而不去某竊謂篇首既書堯典而又存此二字則為衍文當於將遜于位讓于虞舜作堯典下空一行曰若稽古帝堯乃為得體曰若稽古帝堯曰放勲若稽古者孔氏曰能順考古道而行之者王氏云聖人於古有可稽者有可若者李校書推本古文書以曰字為胡越之越與召誥越若來三月同此說甚善當從李校書之說程氏云若稽古者史官之體發論之辭也史官記載前世之事若考古某人之事言之下篇云若稽古帝舜若稽古大禹若稽古臯陶皆謂考古某人之事為如此也蘇氏云史之為此書也謂吾順考在昔而得其為人之大凡如此葢此四篇若稽古某人下皆有曰字故二公之說如此其說比先儒為優然而此皆虞書也虞書謂堯為古可也禹臯陶其時尚存亦謂之古可乎則此說不通若從周官唐虞稽古之文以稽古為堯則下加曰字又為難說如允迪厥徳臯陶之言也謂若稽古臯陶曰可也放勲重華文命以下非堯舜禹之言而加曰字則其義不行此說為難折故當闕之以俟知者放勲李校書曰放者大而無所不至也禮記曰夫孝置之而塞乎天地溥之而横乎四海施諸後世而無朝夕推而放諸東海而準推而放諸西海而準推而放諸南海而準推而放諸北海而準鄭𤣥云放猶至也謂堯有大功也孔子曰大哉堯之為君也蕩蕩乎民無能名焉是勲之謂也此說甚善孟子以放勲為堯號放勲曰勞之來之匡之直之輔之翼之又曰二十有八載放勲乃徂落屈原曰為重華而陳詞孟子屈原既以放勲重華為堯舜之號而後世以𩔖推之遂以文命為禹之號然允迪不可為臯陶之號其說不通世人多疑之諸家之說皆不然某嘗謂鄭少梅曰史官作史之時葢以是稱堯舜禹之功德後人因史官有是稱遂以放勲重華文命為堯舜禹之號然允迪不可為臯陶之號故不可以為稱正如子貢之稱夫子曰固天縱之將聖又多能也葢稱夫子之徳如此後世遂稱夫子為將聖與此正同欽明文思安安史記曰堯有大功於是推言其所以為大功者欽明文思安安允恭克讓光被四表格于上下此其所以為大功也大抵形容聖人之盛徳必推其著見者而言之堯曰欽明文思舜曰濬哲文明湯曰齊聖廣淵文王曰徽柔懿恭夫子曰温良恭儉讓皆稱其徳之著而言之也欽明文思者葢言帝堯之徳著見於外其行已也欽其遇事也明外則有煥然之文内則有淵然之思此言與序大抵相同然序則言聦明文思此則言欽明文思葢史官便於文體而序述也前言聦明者言堯能分明邪正得虞舜於側㣲卒授以天下故言聦明欲與下文讓于虞舜文𫝑相接此言欽明文思者意與下文允恭克讓相應皆隨冝立文非有深㫖於其間也孔氏云安天下之所當安然下文黎民於變時雍方是安天下之所當安者此謂安安者葢言堯有欽明文思之四徳安而行之非事於勉強修為若孟子所謂性者也允恭克讓唐孔氏云在已既有四徳其接人也又信恭能讓允恭者謂恭出於誠實非於聲音笑貎之間如文王所謂懿恭是也克者能也經稱湯居上克明為下克忠又曰克寛克仁詩稱文王曰克明克𩔖克長克君皆謂能其事也彼有望塵雅拜摇尾乞憐非不恭也允恭安在隱公之遜桓丁鴻之遜弟非不遜也克讓安在恭而允讓而克所以獨稱於堯也光被四表格於上下即所謂光宅天下也立政曰方行天下至於海表罔有不服四表謂四海之外也格於上下謂上際於天下蟠于地也曽氏曰光被四表則與日月合明而照臨之功無不被格于上下則與天地同流而覆載之功無不及此說盡之大抵論聖人之徳必推其著見者言之中庸曰惟天下至聖為能聦明睿智足以有臨也寛裕温柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不恱是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天地之所覆載日月之所照臨霜露之所隊凡有血氣者莫不尊親故曰配天此則人之所共聞而共見也至如惟天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天苟不固聦明聖知逹天徳者其孰能知之此州非史官所得形容也克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍前既言堯之徳其見於充實輝光者如天地之覆載日月之照臨可謂極其至矣此又言其舉而措之天下事業者也克明俊徳大學曰自明也孔氏曰能明俊徳之士此二說不同而李校書以謂前既言堯之徳欽明文思安安允恭克讓光被四表格于上下矣不應於此重述其徳也遂以孔氏之說為是如經言俊民籲俊之𩔖皆謂俊傑之士也大學之言漢儒所作斷章取義云爾此說是也唐孔氏言堯之為君也能尊明俊徳之士使之助已施化以此賢臣之化先令親其九族之親九族䝉化已親睦矣又使之和協顯明於百官之族百姓䝉化皆有禮儀昭然而明顯矣又使之合㑹調和天下之萬國其萬國之衆人於是變化從上是以風俗大和此說大體是也九族當從夏侯歐陽氏以謂父族四母族三妻族二孔氏傳謂高祖𤣥孫之親非也葢高祖非已所得而逮事𤣥孫非已所得而及見若必謂非高祖𤣥孫之親但據其族係出於高祖者則但本宗族亦何以為九族哉其既睦之九族若只本宗之一宗則其睦也亦不廣矣若以謂父族四母族三妻族二則旁及他族而本族亦在其中則其所睦者豈不廣哉父族四父五屬之内一也父之女昆弟適人者及其子二也已之女昆弟適人者及其子三也已之女子適人者及其子四也母族三母之父姓一也母之母姓二也母之女昆弟適人者及其子三也妻族二謂妻之父姓一也妻之母姓二也葢敦宗睦族之道必徧内外之親晏子曰使吾父之黨無不乗車者吾母之黨無不足衣食者妻之黨無有凍餒者敦九族之道固自此始百姓者百官族姓也不謂百官族姓而謂百姓者但舉其大數而言唐孔氏曰唐虞稽古建官惟百故言百姓蘇子瞻亦云百姓者葢是時上世帝王子孫其得姓者百餘族而已故曰百姓此說不然五子之歌曰萬姓仇予豈唐虞之世始有百姓而至夏頓有萬姓哉平章者平章百官之職業而升黜之後世以宰相為平章事葢出於此於變者唐孔氏曰其萬國之衆人於是變化從上子和云於者歎美之辭也葢言之不足故嗟歎之與詩所謂於論鼔鐘之於字同當作於字讀竊謂當從子和之說如詩人稱頌盛徳曰於穆清廟於緝熙敬止於鑠王師同此言堯治功之成故以於變言也時雍者孔氏云是以風俗大和程氏曰化成俗美而時雍和程氏之說善親九族言以親九族平章百姓協和萬邦不言以者曽氏云䝉上之以也九族言既睦百姓昭明黎民於變時雍不言既者曽氏云䝉上之既也上言以親下言既睦上言協和下言於變時雍此葢古史交互立文以見意無異義也夫九族者堯之九族也必得明俊徳之士而後親者李校書曰親親治之始也然所以至於治者非賢人其孰能任之後世用非其人而父子不相保者有之况九族乎此說甚善如漢武帝用一江充而太子諸王皆死巫蠱之禍唐明皇用一楊國忠一日而殺三子使其當時用董仲舒張九齡輩豈有此禍哉此章葢前之所言者謂堯以誠明之性格物致知正心誠意以修其身至於與天地合其徳與日月合其明而又能舉天下之賢才而與之共治故能施于有政葢所謂為政以徳譬如北辰居其所而衆星拱之者也是以其教不肅而成其政不嚴而治故能施于有政葢有不期然而然者矣故親九族則九族睦矣平章百姓則百姓昭明協和萬邦則黎民於變時雍矣非立之斯立道之斯行綏之斯來動之斯和疇克爾邪使夫子之得邦家亦若是而已矣乃命羲和程氏曰前既言堯之克明俊徳始於敦睦九族以至於協和萬邦黎民於變時雍此又言立政紀綱分正百官之職以熙庻績而事之最大最先莫若推測天道明歴象欽若時令以授人也天下萬事未有不本於此葢人君之治天下惟此二端而已治身齊家以至平天下者治之道也建立紀綱分正百官明天道以制事者治之法也作典者論堯之徳盡在於此矣自帝曰疇咨以下著其事以見堯之聖此說甚善言黎民於變時雍繼以乃命羲和與周官設官分職以為民極之下言乃立天官冢宰乃立地官司徒之𩔖同唐孔氏云乃命羲和者重述克明俊徳之事得致雍和所由己上論堯聖性此說堯任賢據堯身而言用臣故云乃命非時雍之後方始命之此論為當羲和者楚語云少昊之衰九黎亂徳人神雜擾不可方物顓頊受之乃命南正重司天以屬神北正黎司地以屬民使復舊常無相侵瀆其後三苖復九黎之惡堯復育重黎之後不忘舊者使復典之吕刑曰皇帝哀矜庶戮之不辜報虐以威遏絶苖民無世在下乃命重黎絶地天通罔有降格揚子雲曰羲近重和近黎是以堯之羲和即顓頊之重黎是也葢羲承重和承黎唐孔氏云羲和雖别為氏族而出自重黎謂羲和為氏族則不然如下云咨汝羲暨和則似名矣非氏族也王氏云散義氣以為羲斂仁氣以為和日出之氣為羲羲者陽也利物之謂和和者隂也羲和即人之名安有隂陽仁義之說哉此不可行也欽若昊天孔氏云昊天者元氣廣大也欽若者敬順也爾雅曰春曰蒼天夏曰昊天秋曰旻天冬曰上天鄭氏謂春氣博施故以廣大言之夏氣高明故以逺言之秋氣或生或殺故以閔下言之冬氣閉藏而清察故以監下言之王氏云天色可見者蒼蒼而已故於春言其色氣至夏而行故於夏言其氣情至秋而知故於秋言其情冬位正乎上故於冬言其位皆鑿說也孔氏云六籍之中諸稱天者以情所求言之非必於其時稱之此說甚善毛詩傳云尊而君之則曰皇天元氣廣大則曰昊天仁覆閔下故稱是天自上監下故稱上天據逺視之蒼然則稱蒼天此說與孔氏合最為得之歴象日月星辰欲欽若昊天者必有其法歴象日月星辰此其法也歴數也周天三百六十五度四分度之一而以日月星辰之久近紀嵗月之先後也象者璣衡也所以參考日月星辰之行度也日行一度月行十三度十九分度之七星者四方之中星也角亢氐房心尾箕為青龍凡七十五度斗牛女虛危室壁為𤣥武凡九十八度四分度之一奎婁胃昴畢觜參為白虎凡八十度井鬼栁星張翼軫為朱雀凡百一十二度共為三百六十五度四分度之一辰則日月所㑹也正月㑹於亥其辰為娵訾二月㑹於戌其辰為降婁三月㑹於酉其辰為大梁四月㑹於申其辰為實沈五月㑹於未其辰為鶉首六月㑹於午其辰為鶉火七月㑹於已其辰為鶉尾八月㑹於辰其辰為壽星九月㑹於夘其辰為大火十月㑹於寅其辰為析木十一月㑹於丑其辰為星紀十二月㑹於子其辰為𤣥枵星與辰一也據其人之所見而言之則謂之星據其日月所㑹而言之則謂之辰鄭氏以星為五緯辰為日月所㑹十二次者則以星辰為二然而此論欽授民時無取於五緯之義敬授人時孔氏云欽紀天時以示人也葢天時苟不定於歴象則人事無得而興故堯先歴象星辰而後欽授民時也薛氏云周建子天時也商建丑地時也夏建寅人時也堯之所授為人事而已以建寅之月授之故曰欽授人時此說雖近似然而改正朔始於周時堯舜之世無三正之異故春秋䟽衆鄭氏曰正朔三而改自古皆相變而以其說為不然謂古惟用夏正惟商革夏命而用建丑周革殷命而用建子觀此說則薛氏之說亦不可用矣據人時但言民時也史記作民時其義葢通自分命羲和以下所謂歴象日月星辰敬授人時者也分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昩谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙分命羲仲申命羲叔分命和仲申命和叔此一段皆是觀象作歴之法所以定中氣起閏餘也葢必先奠方隅測時氣齊晷刻候中星而又驗之於農事之早晚物𩔖之變化然後中氣可得而定中氣既定然後閏餘可得而推也學者於此不可以他求惟求作歴之法而盡得之矣分命申命孔氏乃命羲和以下注云此舉其目下别序之以是知羲仲羲叔和仲和叔即前之羲和馬融鄭𤣥王肅之徒云乃命者為天地之官分命申命為四時之職天地與四時於周則冡宰司徒之屬六卿是也此說雖近似然上文言乃命羲和而下文言羲仲羲叔和仲和叔之命乃是詳言歴象日月星辰之事非如周之六卿有治敎禮政等之異也前言乃命後言分命申命皆是錯綜其文以成義也羲仲羲叔和仲和叔猶曰仲突仲忽叔夜叔夏是也宅嵎夷曰暘谷宅南交宅西曰昧谷宅朔方曰幽都此所以奠方隅也葢作歴之法必在候日月之出沒星辰之躔度欲候日月之出沒星辰之躔度者必先準定四面方隅之地為表識東曰嵎夷西曰昧谷南曰南交北曰幽都四方既定然後可以候日月之出沒測星辰之運行而歴象之法自此起矣古者設為土圭之法以測日景土圭之景七尺五寸景之中也日至之景尺有五寸短之至也丈有三尺長之至也其法必於地中之所日中之時施圭以度焉日南則景短多暑日北則景長多寒日西則景夕多風日東則景朝多隂據此下文有日中日永宵中日短則是以土圭測日景之法於堯時已有之矣欲求天地之中者苟不先立土圭以測日景準定四方之地則何以定天地之中此葢作歴之始也嵎夷青州之嵎夷也在正東故東曰嵎夷南交孔氏云夏與春交王氏云南方相見之時隂陽之所交也故曰南交此說不然於東西曰嵎夷曰昩谷皆地名也不應於南方獨言其萬物相見之時其說為不𩔖葢南交即交趾也案史記五帝本紀曰黄帝之地北至於幽陵南至於交趾則交趾之對幽都其來尚矣又歴象欲知日月之食不食每於此候之唐一行云開元十二年七月戊午朔據歴當食半弦自朔方至於交趾候之不差是以知南方為交趾無疑矣交趾在正南故曰南交宅西者隴西之西縣也在正西故曰宅西幽都舜時之幽都也在正北故北曰幽都也四方既定矣然後可以候日月之出沒測星辰之運行以起歴法曰暘谷昧谷孔氏曰暘明也日出於谷而天下明故稱暘谷昩冥也日入於谷而天下㝠故曰昧谷葢嵎夷之方日出之地也隴西之方日入之地也據其地而言之則謂之嵎夷謂之宅西據其日月出沒而言之則謂之暘谷謂之昧谷將欲賔出日而餞納日故先定暘谷昧谷之地也幽都堯都幽冀在九州之正北也南方又宅於南交故不言曰也寅賔出日寅餞納日賔釋文如字讀而徐氏謂之曰儐據孔氏云賔導也則音儐者是與儐相之儐同如賔出日餞納日葢將以候日晷之早晚以驗晷刻之長短也寅敬也賔之餞之非實有賔餞之禮也唐孔氏云導者引前之言送者從後之稱因其出也導以引之因其入也從而送之各以其所冝立文其說是也帝嚳歴日月而迎送之即此法也平秩東作平秩南訛平秩西成平在朔易隂陽四時之氣運於天地之間造化密移莫不有序平秩平在者平均次序在察之葢所以候其氣節之早晚如後世分定二十四氣之𩔖是也孔氏於南訛云訛化也平序南方化育之事於西成言西方萬物已成平序其政助成物也於在朔易言嵗改易於朔方平均在察其政則是以南訛西成朔易皆謂天時也至於論東作則謂嵗起於東而始就耕平均次序東作之事以務農也則此一方獨以農事言之案下文厥民析方是言分散以就農此但謂萬物發生於東耳非取於農作之義也惟曽氏以謂春為陽中萬物以生秋為隂中萬物以成且引詩薇亦作止老子萬物並作為證此可以補先儒之失敬致敬致者孔氏謂敬行其敎以致其功其說不然若以為敬致其教則何獨於南方言之以是知敬致者當是致日也周官春夏致日秋冬致月左氏曰日官居卿以致日則敬致者致日之謂也葢歴法欲候日月之出沒此以昬旦見於南方之中星以定晷度之所至謂之敬致與寅賔寅餞同但其文𫝑有先後耳如月令云日在營室昬參中旦尾中謂日在營室有昬有旦者此所謂賔出日餞納日也謂昬參中旦尾中者即此所謂敬致也賔日於東餞日於西然後日中日永宵中日短可得而知也敬致南方之中星矣然後星鳥星火星昴星虛可得而見也此二者可得而知然後分至之氣可得而定矣故繼之曰日中星鳥以殷仲春日永星火以正仲夏宵中星虛以殷仲秋日短星昴以正仲冬日中星鳥以殷仲春日永星火以正仲夏宵中星虛以殷仲秋日短星昴以正仲冬鳥火虛昴皆是分至之昬見於南方直正午之中星而孔氏以謂七星畢見不以為中星故唐孔氏云仲春之月日在奎婁入於酉地則初昬之時井鬼在午栁星張在已翼軫在辰仲夏之月日在東井而入於酉地則初昏之時角亢在午氐房心在已箕尾在辰仲秋之月日在角亢而入於酉地則初昬之時斗牛在午女虛危在已室壁在辰仲冬之月日在斗入於酉地則初昬之時奎婁在午胃昴在已畢觜參在辰信如孔氏此說則是鳥火虛昴當分至昬皆見於己非正午也其何謂四方巾星哉王子雍覺其非遂謂宅嵎夷宅南交宅西宅朔方孟月也日中日永宵中日短仲月也星鳥星火星虚星昴季月也此說並與歴家偶合然分孟仲季非書之意葢二孔王氏皆不知歴家有嵗差之法以月令日在某宿而求之所以不合案歴家自北齊向子信始首知嵗法以古歴稽之凡八十餘年差一度月令日在某宿比之堯時則已差矣以日㑹月在某宿求之中星宜其不合矣故唐一行云月在虚一則星火星昴皆以仲月昬中而沈存中亦云堯典日短星昴今乃日短星東壁以是知嵗差之法乃歴家之所通知特先儒未之思耳葢仲春之月日在昴入於酉地則初昬之時鶉火之星見於南方正午之位當是時也晝夜分晝五十刻夜五十刻是為春分之氣故曰日中星鳥以殷仲春仲夏之月日在星入於酉地初昬之時大火之星見於南方正午之位當是時也晝長夜短晝六十刻夜四十刻是為夏至之氣故曰日永星火以正仲夏仲秋之月日在心入於酉地則初昬之時虛星見於南方正午之位當是時也晝夜分晝五十刻夜五十刻是為秋分之氣故曰宵中星虛以殷仲秋仲冬之月日在虛入於酉地初昬之時昴星見於南方正午之位方是時也晝短夜長晝四十刻夜六十刻是為冬至之氣故曰日短星昴以正仲冬分至之氣既定則十二月之氣無不定矣春曰日中秋曰宵中葢互文以見日夜之分也春曰星鳥夏曰星火秋曰星虚冬曰星昴者葢四方躔度之星以名言之自角亢氐房心尾箕至於井鬼栁星張翼軫凡二十有八以日月所㑹言之自娵訾降婁大梁實沈鶉首鶉火鶉尾壽星大火析木星紀至於𤣥枵凡一十有二以物象言之則青龍𤣥武白虎朱雀凡四作典者欲備見故互言之春秋言殷冬夏言正者亦猶春秋謂之分冬夏謂之至也分至定則十二月之中氣無不定矣然猶以為未也而又以析因夷隩驗之於農事早晚故繼之曰厥民析厥民因厥民夷厥民隩厥民析厥民因厥民夷厥民隩孔氏云析者言春事既起丁壯就功言其民老壯分析因者謂老弱因就在田之丁壯以助農也夷者平也老壯在田與夏平孔氏此說不然也於夏既言老弱因就在田於秋又言與夏平則是三時之辭其言無異非說經之體也程氏謂夷者平也秋稼將盛嵗事將畢民獲卒嵗之實心力平夷安舒也厥民隩者漢孔氏云隩者屋也民改嵗入此室處胡氏謂不然以謂若如孔氏之說當作奥字讀爾雅曰室西南隅謂之奥孫炎曰室中隱奥之處據陸氏釋文云於六反馬云隩暖也冬寒民集隱暖此說為是既定民事之早晚矣此以為未也猶考物𩔖之變化鳥獸孳尾鳥獸希革鳥獸毛毨鳥獸氄毛帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙孳尾者孔氏謂乳化曰孳交接曰尾希革謂鳥獸毛羽希少改易毛毨謂毛更生整理氄毛謂鳥獸皆生耎毳細毛此葢萬物之㣲感天地至和之氣而動作應時不期然而然爾故作歴者觀此則候天時之早晚如禮記月令云魚上冰獺祭魚倉庚鳴鴻鴈來之𩔖者是堯典之遺法也至於是則分至定矣分至定則十二月之中氣無不定矣然後閏餘又得而起王肅云斗之所建是為中氣日月所在斗指兩辰之間無中氣則置為閏葢閏月之置在無中氣之月中氣未定則閏餘亦未得而定前之所言皆為定中氣而作既定中氣矣故以閏餘繼之夫作歴之法雖始於定中氣本以置閏歴之置閏其事為大故更申言之咨者胡氏所謂訪問於善此說未然如咨汝羲暨和咨十有二牧皆勑戒之辭安得為訪問於善哉據此咨字只當訓嗟葢發語之辭與詩所謂嗟嗟臣工同二字葢通用也朞三百有六旬有六日以閏月定四時成嵗若作歴之法也葢作歴之法分周天三百六十五度四分度之一月之行也日十三度十九分度之七常以二十九日過半而與日合一嵗所餘凡五日九百四十分日之五百九十二日之行也日一度其為十二月以三百六十日是一嵗所餘凡五日九百四十分日之二百三十五以五百九十二并二百三十五是一嵗日月所餘共十日九百四十分日之八百二十七十九年年十日為百九十日又十九箇八百二十七為一萬五千七百一十三以日法九百四十分除之得十六日以并百九十日為二百六日不盡六百七十三分為日餘令為閏月得七閏每月二十九日為二百三日又七箇月餘各四百九十九分合為三千四百九十三以日法九百四十分除之得三日共為二百六日不盡亦六百七十三是為一章之數二十七章為一㑹三㑹為一統三統為一元章㑹統元運於無窮此四時所以定而嵗功所以成也四時定嵗功成然後百工可以允釐而庻績可以咸熙也允釐百工孔氏以謂夫允治百官爾雅曰熙興也郭氏注引此庻績咸熙為證則咸熙者衆功皆興也葢中氣不正則閏餘不正閏餘不正則雖欲釐百工熙庶績而無所致力今也中氣定則閏餘正閏餘正則百官得其職萬事得其序葢不期然而然爾當堯之時洪水横流泛濫於天下為生民之計可謂急矣然堯不先命禹以平水土命稷以播百穀命契以作司徒而首命羲和定歴象正閏餘者葢中氣不正則歴象無得而定苟三年而差一月則必以正月為二月每月皆差九年而差三月則將以春為夏十有九年差六月則四時相反如欲百工之允釐庶績之咸熙不可得矣雖有益稷臯陶之功果安所施哉惟天時既定則人功由是而施堯之治無先於此耳邵康節云日月星辰堯則之江河淮海禹平之其意不殊此帝曰疇咨若時登庸放齊曰𦙍子朱啓明帝曰吁嚚訟可乎疇誰也五子之歌曰予將疇依揚子曰疇克爾咨嗟也疇咨嗟誰也若時者孔氏曰誰能咸熙庶績順是事者將登用之而程氏謂堯老廣求聖賢以遜帝位之意故放齊以𦙍子朱對不與上文相連其說是也而王氏以若時登庸與若予采相對為言謂疇咨若時者咨順天道者也疇咨若予采者順人事也此說則非若時登庸以謂順天道如臯陶謨曰咸若時冏命曰若時瘝厥官豈亦咨順天道也哉疇咨若時者誰能順是登庸之任葢將授以天下也放齊曰𦙍子朱啓明孔氏云𦙍國子爵唐孔氏遂以𦙍侯命掌六師𦙍之舞衣為證夫虞書上采堯事為舜典張本則必推本舜之所以得天下於堯使朱果𦙍國之君則其事不應載之堯典其文全無所係也史記作嗣子丹朱其說是也葢堯將禪位訪於羣臣放齊以常情揆之父子相傳古今之通義也故以𦙍子為對正如漢文帝欲舉有徳以陪朕之不能有司請曰子啓最長敦厚寛仁請建以為太子正此意也胡氏曰自古以來父子相繼放齊薦子於義為宜若有太子而不繼君位别求外臣以登庸揆之人情豈期至此誠以嚚訟遂致旁求此論得之丹朱而謂之𦙍子朱案漢志堯禪舜使其子朱處於丹淵誤矣𦙍子朱啓明者放齊以其為人開明敏悟可授以天下也然放齊雖以丹朱為可用而堯獨知其不可於是疑怪之曰嚚訟可乎謂朱之為人口不道忠信之言而且好爭訟不可以當此大噐禹曰無若丹朱傲惟慢遊是好傲虐是作罔晝夜頟頟罔水行舟朋滛于家此又見其嚚訟矣夫丹朱嚚訟而放齊謂之開明朱博士曰嚚訟生於開明君子順開明之性以為善可以無嚚訟小人因開明之性以為不善適所以為嚚訟而已矣嚚訟可乎下文無所結者葢將為舜典張本矣帝曰疇咨若予采驩兜曰都共工方鳩僝功帝曰吁靜言庸違象恭滔天疇咨若予采謂能順我事也程氏曰此别一時求人之事也驩兜曰都者堯既求人以順事驩兜將薦共工故歎美之曰共工方鳩僝功共工者葢官稱也其人方為共工故驩兜薦之之辭曰共工方鳩僝功葢方鳩僝功共工之職然也既為共工而又薦之者葢亮采惠疇百揆之職也驩兜之薦將使堯大用也方鳩者孔氏云能方方鳩聚見其功據此方字多與湯湯洪水方割大禹謨臯陶方祗厥叙方施象刑惟明同皆是方始之方而先儒皆以為四方之方則失之矣僝功者孔氏云僝見其功唐孔氏云僝然見之狀僝之訓見無所經見說文云僝見也史記云方聚布其功布功者是功之可見也僝之訓見意者亦將有所出驩兜將薦其人方且鳩聚著見其功而帝亦知斯人不可以若予采故又疑怪之曰靜言庸違象恭滔天言此人不可當大用也静謀也言與之謀則能言試之以事則違戾為不可用如堯謂舜曰詢事考言乃言厎可績此則庸之而不可違也象恭者聲音笑貎之恭似恭而非恭也滔天者據此文當是時貎恭而心實滔天而滔天二字說者不同釋文云外貎恭敬而心中實包藏滔天莫測蘇氏曰滔滅天理曽氏云誠者天之道也汨沒其胷中之誠故曰滔天審如是說則與下文浩浩滔天語意斷異夫典之言滔天一也豈容有異哉史記作似恭漫天孔氏云貎象恭敬而心傲很若滔天而不可用也則其與下文滔天為一意然而洪水之為害際天所覆滔滔皆是謂之滔天可也象恭云滔天其說有理而難通故齊唐以謂古者竹簡容二十字自象恭至滔天始及一行故傳者誤書滔天二字然君子於其所不知葢闕如也若欲以已意而増損聖人之經此近世學者之大患不可為也帝曰咨四岳四岳孔氏云即上羲和之四子分掌四岳之諸侯故稱焉唐孔氏云平秩四時之人因主四岳之事此說可信據舜典有云嵗二月東巡守至於東岳五月南巡守至于南岳八月西巡守至于西岳十有一月朔巡守至于北岳觀四方諸侯而考制度其首協時月正日同律度量衡夫其考制度既以律歴為先則四岳為羲和四子必矣索方岳之人必用羲和之四子者程氏云古者天職主察天運以正四時遂居其方以主其時之政在堯則四岳於周則六卿之職統天下之治者也後世學其法者不知其道遂以星歴為工伎之事而與政分矣此實至當之論而李校書據春秋外傳謂羲和為司馬氏之先四岳為巾吕氏之先遂以四岳為非羲和四子夫自古帝王及列國世系其誑謬錯雜不可考信者葢多矣如羲和即重黎也而太史公以重黎為楚國之祖則是此數子既為司馬氏之先又為申吕氏之先又為楚芊氏之先則後世安所適從哉按左傳昭公二十九年稱少皥氏有子曰重顓頊氏有子曰黎則重黎二人各出一帝而羲和亦不得為一族也羲和非以為一族則司馬氏申莒氏芊氏同出羲和重黎亦或有此理也湯湯洪水方割蕩蕩懐山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圯族岳曰异哉試可乃已帝曰往欽哉九載績用弗成曽氏曰氓之詩曰淇水湯湯鼓鍾之詩曰淮水湯湯江漢之詩曰江漢湯湯故傳曰湯湯者水盛貎言其逆行而沸騰之謂也詩曰蕩蕩上帝又云蕩蕩無綱紀文章則蕩蕩者言其泛濫然無畛域之謂也孟子言善養氣塞乎天地之間而謂之浩然之氣則浩浩然者言其汗漫浩然無涯涘之謂也此論皆是葢堯將訪問能治水者則咨四岳言洪水之害曰湯湯洪水方割蕩蕩懐山襄陵言此大水逆流而沸騰方且為害謂其泛濫然無有畛域山之高者則懐而包之陵之卑者則襄而上之汗漫浩然而無有涯涘也浩浩滔天者言其浸至幾天也洪水為害如此則斯民之被其害也為甚故下民其咨此咨與民咨胥怨同孔氏云咨嗟憂愁病水困苦故問四岳有能治此大水者將使治之故曰有能俾乂於是四岳同辭嗟歎薦鯀也僉曰於鯀哉以謂鯀能治此洪水之害也夫謂之僉曰則四岳為四人也春秋外傳云姬姜之𦙍出於禹四岳而曰一王四伯謂之四伯則四岳為四人也必矣說者必欲為一人故韋昭曰四岳官名掌四岳之事為諸侯伯故曰四伯此葢未嘗深考書史所載而曲為之說既曰僉曰又謂之師錫則四岳為四人無可疑者何必曲為之說哉四岳雖同辭薦鯀以為可治水而堯知其不可用故疑怪之曰吁咈哉言其人違戾而不可用也所以違戾不可用者以其方命圯族而已方命者孔氏云鯀性很戾好此方直之名命而行事輒毁敗善類以方字為一義以命字連圮族之文非語辭也孟子云方命虐民趙氏注云方猶放也謂放棄不用先王之命但為虐民之政其說可通圯族者程氏云毁敗族類傾䧟忌刻之人也如左氏傳云不可敎訓不知話言告之則頑舍之則嚚即此所謂方命是也傲很明徳以亂天常此所以圮族也岳曰异哉异已也异哉言已矣乎孔子每言未見其人必曰已矣乎如曰已矣乎吾未見好徳如好色者也又曰已矣乎吾未見能見其過而内自訟者也皆歎其未見其人也此岳曰异哉謂其當時之人未有賢於鯀者也故曰异哉試可乃已蘇氏曰可以治水則已無求其他葢四岳之薦鯀治水堯知其方命圯族不可用而四岳之心未足以信此故謂其可以治水而已安可以方命圯族而廢之哉四岳既以鯀為可用堯勉而從之以順四岳之意而試之也故繼之曰往欽哉葢順四岳之意而試鯀也夫堯之聦明既知鯀為不可用而四岳之請又從之者李顒曰堯雖獨明於上衆多不逹於下故不得不副倒懸之望以供一切之求耳此論甚當九載績用弗成者鯀以方命圯族之故堯勉順四岳之請試使之治氷然以嵗月之久至於三考而終不能成謂之弗成者非無功也但無所成耳唐孔氏云鯀之治水非無小益衆人見其有益謂鯀實能治之日復一日以終乎三考之無成衆人乃服然後退之故至九年祭法云鯀障洪水而殛死得禹能終鯀之功然則禹之大功頗亦因鯀是治水有益但不能成功故誅殛之此論善矣然未若程氏之說為盡程氏云舜禹未顯當時之人其才智未有出鯀之右故也四岳舉之雖無成功見其所治亦非他人之所及惟其功用有序故自任以強暴很戾圮族愈甚故惡愈顯而功不能成矣當時大臣舉之天下信之而其才力又有過人者則堯不得不任之矣使其當時大臣有過鯀者則堯亦不任矣此說得之矣靜言庸違象恭滔天與夫九載績用弗成之下文無所緫者為舜典誅四凶張本也帝曰咨四岳朕在位七十載汝能庸命巽朕位岳曰否徳忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝又不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉此序堯將禪位於舜所以為舜張本也朕在位七十載孔氏云堯年十六以唐侯升為天子在位七十年則時年八十六老將求代此論堯之年數不知出於何書然而在漢之時去古未逺帝王遺書猶有存者孔氏必有所據而云朕在位七十載而年八十六則耄期倦于勤矣將使四岳代已攝行天子之事故曰汝能庸命巽朕位猶言陟帝位也王荆公曰自下升則曰陟自外入則曰巽汝能庸命巽朕位謂汝能庸我之命居帝之位攝行天子之事也岳曰否徳忝帝位堯雖使四岳庸命巽朕位而四岳辭讓不敢當則曰否徳言已之不徳適所以辱帝位也說者謂堯欲禪位於四岳而四岳曰否徳忝帝位則謂四岳只是一人以堯之禪位不應譲於四人也夫既以丹朱嚚訟為不可以受天下葢欲使四岳自相推舉一人以授帝位也如漢文帝時有司請建太子帝曰楚王季父也吳王於朕兄也淮南王弟也皆秉徳以陪朕諸侯王昆弟有功賢臣及有徳義者若舉有徳謂楚王吴王淮南王皆秉徳以陪朕正如堯之欲禪位於四岳也謂諸侯王宗室昆弟有功賢臣及有徳義者皆舉有徳正如堯之使四岳明明揚側陋也又何害於四岳之為四人哉曰明明揚側陋者葢四岳既辭不敢當帝位堯於是使之舉其所知貴而羣臣賤而庶民苟可以當此位者則將受之也史記曰悉舉賢臣及踈逺隱匿者蘇氏曰明其高明揚其側陋言不擇貴賤也其說皆是堯既使四岳明明揚側陋於是四岳同辭而稱薦不言僉曰而言師錫帝曰者重其事也鰥者無妻之稱舜年三十尚未娶故曰有鰥在下薛氏曰舉舜而言其鰥者欲帝妻之也此說雖可喜然據下文女于時觀厥刑于二女即是妻舜之事出於堯之意將試舜以所甚難者若以有鰥在下為信則是以女妻舜者出於四岳之請非堯意也夫岳舉舜於側㣲之中未知堯之用否而先請以女妻之非人情也竊謂此史臣増加潤色之辭因堯以女妻舜遂加有鰥在下於上以見其未娶爾正如湯誓泰誓稱予一人當桀紂在上湯武濟否時未可知豈宜遽稱予一人也哉竊謂皆是史官増加潤色之辭學者以意逆志可也虞氏也舜名也而或者乃以堯舜為謚故諡法曰翼善傳聖曰堯仁義盛明曰舜淵泉流通曰禹㓜名冠字五十以伯仲死諡周道也自周以前葢未有諡以堯舜為諡者皆是附㑹之說也四岳既舉舜以授帝位故帝曰俞然其舉也與曰吁者異矣予聞如何然我亦聞之其人果如何也司馬文正公有言曰舜自修於畎畆之中而聞於堯此舜之所難也舜在畎畝之中而堯聞之此堯之所難也或者以堯有予聞之言意欲禪舜故以禮譲四岳四岳不受而乃授於舜此乃史官潤色之辭也因堯以女妻舜遂加有鰥在下故孔氏於明明揚側陋注云明舉明人在側陋者信斯言也則是堯之意欲其舉舜也於有鰥在下注云舜在下民之中衆臣知舜聖賢恥已不若乃不得已而舉之信斯言也則四岳固不利於堯之禪舜也夫古之聖人作事直已而行無事曲折使其果欲禪舜則直禪舜矣又何必以禮譲四岳而為此不情之事乎葢堯聞舜之𤣥徳而未知其詳故因四岳之薦而審其如何四岳聞舜之賢方欲薦之適值堯之問而遂舉之矣故程氏云四岳堯之輔臣固賢者也堯將禪位固宜先四岳四岳不可當乃使明揚其可當者而或者多疑以為四岳可受則合授之不可授則何命之夫堯以天下之公噐授人豈宜獨為之哉故必先命大臣百官以及天下有能過己者必見舉矣更相推舉卒將得最賢者然後授以天下曽氏曰唐虞建官内有百揆四岳堯得舜而納于百揆則前此百揆之官未備也建官惟賢時無百揆則官無隆於四岳四岳之賢於羣臣可知矣想其徳未足以宅百揆故但為四岳而已則於庸命有所不能亦可知矣古之人自知甚明其所不當受者雖與之天下不受也此二說者足以𥙷先儒之失堯既審問四岳舜為人果如何故四岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦言舜所以可授天下者此也瞽者無目稱也葢舜父名曰瞽瞍詩曰矇瞍奏公則瞍亦無目稱也以其無目故名曰瞽瞍猶云黒臀黒肩之類史記云盲者之子父頑母嚚象傲則舜父之無目也審矣而孔氏謂舜父亦有目以其不能分别善惡故詩人謂之瞽唐孔氏曰孔不然者以經說舜徳行美其能養惡人父自名瞍何湏言之若實無目則是身有痼疾非善惡之事輒云盲者之子欲何所見乎此說非也四岳舉舜於側㣲之中故將言其為誰氏之子也若言其惡則下文曰父頑母嚚象傲已見之矣不應於上獨言不能分别善惡也夫盲之為痼疾固非善惡之事然有目而頑猶可言也無目而頑豈不愈難言哉父頑母嚚象傲謂舜之家有此三惡也其父則心不行徳義之經其母則口不道忠信之言其弟則又傲慢而不友有此三惡而舜則能克諧其弟以孝於父母烝烝乂不格姦此實人情之至難也烝烝者曽氏云烝如烝之浮浮之烝盛徳之氣可以上逹化而熟之使不自知故曰烝烝乂不格姦謂烝烝於乂而不至於姦惡也據此言烝烝乂不格姦則是舜未登庸之時瞽瞍與弟已能以善自治不至於姦惡矣彼謂父母使舜完廩捐階瞽瞍焚廪使浚井出從而掩之象曰謨葢都君咸我績牛羊父母倉廪父母干戈朕琴朕弤朕二嫂使治朕棲者此葢萬章傳聞之誤也四岳既言舜能克諧三惡烝烝乂不格姦以此為可授以天下而堯猶以為未也且曰我其試哉將欲試舜以考其行迹也其所以試之者以女而妻之也女于時則孟子所謂二女女焉者是也曽氏云以女歸人謂之女春秋傳曰宋雍氏女于鄭莊公又曰晉伐驪戎驪戎男女以驪姬皆非為之妻也故稱焉葢古者士庶人一妻一妾舜以堯歸之二女其一以為媵非皆為之妻劉氏列女傳云舜身為天子娥皇為后女英為妃以是知二女一為嫡一為妃非皆為之妻是以謂之女而不謂之妻觀厥刑于二女刑法也與刑于寡妻之刑同唐孔氏曰舜家有三惡身為匹夫忽納帝女難以和協觀其施法度於二女薛氏曰舜之所謂諸難者無難於此釐降二女于媯汭者王氏以釐降為下嫁此說亦可通然而以釐降為下嫁則是此一篇所載惟及乎堯之妻舜而不及乎舜也刑于二女而便與舜典慎徽五典之文相接甚為不備故不若從孔氏之說云舜能以義理下帝女之心而不若曽氏之說為尤善曽氏曰釐理也降下也二女之偶理之使有别故曰釐帝女之貴下之使不驕故曰降媯水名也汭水之北也舜之所居在是也時舜未登庸也雖帝女之貴必使之從夫而居孟子所謂使二女事舜於畎畆之中者是也嬪於虞者如大明詩云摯仲氏任自彼殷商來嫁于周曰嬪于京葢行婦道於虞氏也以其地名而言之則曰媯汭以其氏族而言之則曰虞舜其實一也舜既能釐降二女于媯汭堯曰欽哉美舜之辭也曽氏曰動容周旋中禮者聖人之欽也若有人則作無人則輟者此其為欽但可以掩塗人之耳目若在其室而與之居者則不可欺也故能釐降帝女而使之嬪于虞非能動容周旋中禮以刑之則不能與於此夫四岳之薦舜將使堯授以天下而其薦之者不言其他而惟曰父頑母嚚象傲克諧以孝烝烝乂不格姦堯之試舜將授以天下而其所以觀之者不觀其他而唯曰女于時觀厥刑于二女者葢夫夫婦婦而家道正家道正而天下定矣尚書全解卷一
