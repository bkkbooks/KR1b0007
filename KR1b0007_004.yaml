body:
  text: 尚書全解卷四宋林之竒撰大禹謨虞書虞史既述二典而其所載義有所未備者於是又敘其君臣之間嘉言善政二典之所不載者以為大禹謨皐陶謨益稷三篇此蓋備二典之所未備者非如舜典之初上接堯典之末也蓋舜典之末已載舜死而此三篇荅問之言皆舜未死已前之言也然文勢雖不相接而其意實相屬堯典載四岳薦舜於側微之中堯妻以二女既為舜典張本矣故舜典之初即載歴試受禪之事舜典既載禹宅百揆之職繼舜之任而其本末未有所屬也故大禹謨則載大禹居攝帝位率百官若帝之初然後舜之始末無所不備此其所以謂之虞書也然左氏傳舉皐陶益稷之言若皐陶邁種徳地平天成敷納以言等語皆以為夏書此蓋孔子未定書已前傳寫之誤也以為虞書者意其出孔子之所釐正矣據此三篇皆是舜禹皡陶夔益之徒相與都俞賡歌之言而其事則止於禹之居攝受命徂征有苖猶未及夫禹即帝位告廟之事安得以為夏書邪皐陶矢厥謨禹成厥功帝舜申之作大禹皐陶謨益稷大禹謨孟子曰堯以不得舜為己憂舜以不得禹皐陶為己憂蓋舜之所為治者禹皐陶之力居多皐陶以謨顯故曰皐陶矢厥謨矢陳也禹以功著故曰禹成厥功皐陶大禹之功皆可以為萬世法以是事舜舜猶以為未也於是又從而申之申重也皐陶之謨顯矣舜申之使致其功若所謂時乃功懋哉是也禹之功著矣舜申之使陳其謨若所謂來禹汝亦昌言是也皐陶有謨矣而又有功禹有功矣而又有謨實帝舜申之之效也先言皐陶而後言禹者此非有所輕重取與於其間蓋先言謨而後言功事辭之序也大禹皐陶謨益稷三篇其序之所以緫言三篇之意也然一序而必分為三篇者蓋古者編竹簡以成書竹簡所載不能多也故必析而分之既已析而分之則必取數字名其篇以為簡冊之别故此分為三篇者徒欲以便於簡冊而已非謂大禹謨盡在第一篇皐陶謨盡在第二篇也漢孔氏云大禹謨九功臯陶謨九徳此則拘於篇名必欲以本篇所據而為其謨也予竊謂不必如此三篇之中凡出於禹之所言者皆大禹謨也何必九功凡出於皐陶所言者皆皐陶謨也何必九徳九功九徳固可以為禹皐之謨而禹皐之謨非九功九徳所能盡也謂之謨者如器之有模言之於此而可為萬世法也曰若稽古大禹孟子曰大舜有大焉舍己從人樂取諸人以為善自耕稼陶漁以至為帝無非取諸人以為善蓋自其既即帝位而言之則謂之帝自其未即位尚為耕稼陶漁之時而言之則謂之大舜蓋史稱於大禹者蓋此書主為舜而作自舜之時言之禹尚為臣未可以君天下之辭而稱也故曰若稽古大禹曰文命敷于四海祗承于帝此當與下文曰后克艱厥后臣克艱厥臣曰相繼續文命上一曰字史官曰也下一曰字禹曰也不言禹曰者蒙上之文也史官謂禹之文徳敷于四海之外無所不及也此即禹貢所謂東漸于海西被于流沙朔南暨聲教訖于四海是也文命既已敷于四海矣於是陳其謨以祗承于帝帝者指舜而言之也其所陳謨以祗承于帝即后克艱厥后以下是也先儒言外布文徳敎命内以敬承堯舜其意以此二句亦如堯舜二典之稱堯舜之徳苟以此二句為稱帝之徳則下文曰字無所屬矣史官記載其體自有不同者堯典舜典其名曰典典則必記載其徳大禹謨臯陶謨其名曰謨謨則必記載其功如允廸厥徳謨明弼諧皆是皐陶之言也然皐陶謨載皐陶之言至大禹謨則加文命敷于四海祗承于帝二句者史官欲見禹之文徳敷命既東漸西被暨于朔南然後陳謨以祗承于帝也曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳此則禹之謨也孔子曰仁者先難而後獲必在難之於先而後獲之於後也政乃乂黎民敏徳此其所以致此者必在為君者難其所以為君為臣者難其所以為臣孟子曰欲為君盡君道欲為臣盡臣道君盡君道則難其所以為君矣臣盡臣道則難其所以為臣矣君臣各盡其道以之立政則民乃又以之教民則黎民敏徳曾無甚難者世之人徒以舜之為君夫何為哉㳟已正南面而已遂以舜之治天下優游無為曾無所用其心殊不知舜之君臣其都俞賡歌於一堂之上自一話一言未嘗不以克艱為戒惟其君臣之間皆不忘於克艱兹所以享無為之治也帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍己從人不虐無告不廢困窮惟帝時克禹既以克艱厥后陳謀而告舜舜於是然其言謂能盡克艱之道者惟堯為然而猶不足於此也允若兹者猶曰信能行此也嘉言罔攸伏野無遺賢堯之治至於人之有嘉謨嘉猷則皆入告於上而無所遺伏草野之中有賢者則皆願仕於朝而無遺其萬邦又已咸寧則其治之可謂大成矣嘉言罔攸伏若可以無事於詢訪野無遺賢若可以無事於營求萬邦咸寧若可以無事於憂恤而堯之心猶以為未也於是稽于衆以詢其政治之得失有未至者則舍己從人而不吝又且不虐無告不廢困窮惟恐一夫之不得其所無告謂鰥寡孤獨天民之窮者皆哀矜而不虐之困窮謂士之失職者皆任用而不廢之極四海之間無有一士之失職者無有一民之不被其澤然後為能盡君之道則是后克艱厥后惟堯足以當此言也益曰都帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君都美辭也孔氏曰益因舜言又美堯也此説不然夫舜既即天子之位則凡羣臣之稱帝者皆指舜而言也如禹曰於帝念哉曰帝光天之下臯陶曰帝德罔愆皆指舜而言也夫當舜之時舜謂堯為帝可也使益亦謂堯為帝則舜宜何稱哉張横渠曰此美舜也因舜歸美於堯故益亦歸美於舜此説為得之蓋舜既言克艱之道惟堯能盡之於是益言舜之徳旣廣運如此則其於克艱厥后之道蓋亦優為之也廣者洪之至運者通之至惟洪故能廣惟通故能運薛氏曰廣如地運如天廣則大矣而無不載運則通矣而無不周此説盡之矣乃聖乃神乃武乃文即廣運而為聖神文武之徳也蓋舜之徳既洪而能廣通而能運如天地之無不持載無不覆燾也是徳也自其大而化之而言之則謂之聖自其聖而不知而言之則謂之神自其威而可畏而言之則謂之武自其英華發於外而言之則謂之文聖神文武即廣運之所發也非於廣運之外别有聖神文武也而王氏則謂乃聖乃神所以立道乃武乃文所以立事先聖而後神道之序也先武而後文事之序也審如是説則是道之外復有事事之外復有道既有道之序復有事之序使道無預於事事無預於道此王氏患天下之術之原惟舜之徳自其廣運而充之至於乃聖乃神乃武乃文故皇天於是眷顧而命之起於側微之中𤣥徳外聞遂以受堯之禪奄有四海而君天下也蓋謂舜之廣運之徳既已修於畎畝之中升聞天朝上為天之眷顧下為四海之感戴則其克艱厥后以合於堯不在乎他在乎加之意而已先儒以為皇天眷命奄有四海為天下君言堯有此徳故為天所命所以知其不然者蓋舜自匹夫而為天子則其所以為皇天之所眷命奄有四海而君天下非其徳之廣運不能至於是故可言也堯繼世以有天下則其奄有四海為天下君固其所宜也又何言哉此張横渠之説所以為善也禹曰惠廸吉從逆凶惟影響益既稱美舜徳之廣運乃聖乃神乃武乃文遂以上為天所眷命下為四海所愛戴則其於后克艱厥后之道固可以優游為之矣禹於是又從而戒焉帝之徳雖為天所眷命然天之禍福吉凶本無常也人能順之而從道則天應之以吉其或從逆而不復順道則吉將變而為凶是道也如影之隨形如響之應聲蓋有不期然而然者其言舜雖有廣運之徳尚在乎兢兢業業盡其寅畏之志然後有以盡克艱之道蓋益之言所以勉之於其始禹之言所以戒之於其終或勉之或戒之皆所以成就君之徳舜既不以廣運之徳自居而虛已求弼直之言禹益之徒不以君之聖明忘其箴戒之意君臣上下相與圖治孜孜如不及此其所以為唐虞之治也益曰吁戒哉儆戒無虞禹既以吉凶影響之理陳戒於舜益於是申言所以儆戒之道當如此也吁歎辭也歎而後戒者將使聽者審其言也畢命曰四方無虞予一人以寧虞度也謂四方晏然無可度之事也夫惟四方晏然無可度之事則危亡禍亂所自萌也故當儆戒而無忽正如臯陶兢兢業業一日二日萬幾蓋一日二日之間危亡禍亂之幾至於萬數可不戒慎恐懼乎罔失法度蓋方是時襲堯之爵行堯之道法度彰禮樂著垂拱而坐視天民之阜夫何為哉惟守法度勿失斯可矣自古太平無事之世上恬下熙君臣無為足以致治矣而小人之好作為者必肆其私辯欲盡取前世之法度紛更之時君世主不悟而入其説往往至於危亂而不自知漢之武帝唐之明皇皆坐此也周公相成王已致太平之治作為無逸之書以戒成王而其終篇申儆之曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝此即益戒舜意也舜大聖人也益之言簡而盡成王中才之主也周公之言詳而明然而其意則一也罔遊于逸罔淫于樂任賢勿貳去邪勿疑疑謀勿成百志惟熙罔遊于逸者謂不可為無方之遊也罔淫于樂者謂不可為已甚之樂也任賢勿貳者謂任賢不當使小人惑之也去邪勿疑者謂苟知為小人則決意去之不復置疑於其間也所以任賢勿貳去邪勿疑又在於疑謀勿成也自古君子小人並仕於朝廷之上小人知其必不見容於君子往往進其疑謀以惑人主之視聽苟人主不察而使其疑謀得成則小人必得志君子必受禍矣劉子正曰執狐疑之心者來讒賊之口持不斷之志者開羣枉之門使人主不能破疑謀於未成之間則任賢豈能勿貳去邪豈能勿疑惟其使小人疑謀勿成則是非賢不肖洞然明白如大明之升天無有不顯也此百志所以惟熙也罔違道以干百姓之譽罔咈百姓以從己之欲此言為治者既不可違道以千衆譽又不可咈衆以從己之欲也蓋自古無道之政必出於此二者班孟堅曰秦燔詩書以立私議王莽誦六經以文姦言同歸殊塗俱用滅亡蓋若秦者是所謂咈百姓以從巳之欲者也若王莽者是所謂違道以干百姓之譽者也雖其所為不同而其所以致亂亡之道則一也夫為治者既不可違道以干百姓之譽又不可咈衆以從已之欲然則將奈何惟上不違先王之道下不咈百姓之欲則兩得之矣王氏以謂咈百姓以從先王之道則可咈百姓以從已之欲則不可古之人有行之者盤庚是也蓋人之情順之則譽咈之則毁所謂違道以干百姓之譽也即咈百姓以從先王之道者也此說大戻夫盤庚將遷都民咨胥怨而不從盤庚不强之以遷也方且優游訓誥若父兄之訓子弟至於再至於三必使之知遷都之為利不遷之為害然後率之以遷焉何甞咈之以從已哉夫王者之安天下必本於人情未有咈百姓而可以從先王之道也王氏此説甚牴牾於聖經矣無怠無荒四夷來王言苟能行此數者盡其儆戒之意而繼之以於心無怠於事無荒則豈惟中國之治哉雖四夷亦將來王矣無怠無荒猶所謂不倦以終之也聖人之治夷狄聽其自来而信其自去未甞招之而使來也苟修於此者既盡則彼將梯山航海而自至非有爵賞以勸乎其前又無刑罰以驅於其後無怠無荒而彼自來矣此唐虞之世禦戎之上策也夫舜大聖人也益既稱其徳之廣運乃聖乃神乃武乃文遂為皇天之所眷顧奄四海而君天下矣彼失法度游于逸淫于樂任賢貳去邪疑疑謀成與夫違道干譽咈衆從欲或荒或怠之事蓋中材庸主之所不為也益之智豈不知舜之心不至於此然而諄諄告戒惟恐不及者蓋聖人雖智周萬物道濟天下而其兢兢業業者實未甞須㬰忘此其所以為聖人也孔子曰徳之不修學之不講聞義不能徙不善不能改是吾憂也夫孔子之聖豈有學之不講豈有義之不徙而以是為憂乃知聖人顛沛造次未甞敢忘儆戒之意舜之徳盛於淫泆荒怠等事雖不至於此然而聖人儆戒之意實未甞敢忘此益之所以拳拳為舜言之而不已也禹曰於帝念哉徳惟善政政在養民水火金木土榖惟修正徳利用厚生惟和九功惟敘九敘惟歌益既諄諄告戒其所以啓廸於帝之徳禹遂言徳之施於有政者此蓋為治之要也然而告於舜而曰於帝念哉於者歎美而言之帝念哉重其言也徳惟善政政在養民言聖人膺天明命為民父母其所以兢兢業業日新厥徳不忘儆戒之意如益之所言者凡欲美其政也而所以美其政者無他欲以養民而已夫水火金木土穀惟修謂之六府此天地之養萬物者也聖人裁成輔相使水潤下火炎上木曲直金徔革土爰稼穡六者不失其性謂之惟修正徳利用厚生謂之三事此則聖人體天地化育之徳以養萬民者也孟子論王道之始曰不違農時穀不可勝食也數罟不入汙池魚鼈不可勝食也斧斤以時入山林材木不可勝用也穀與魚鼈不可勝食材木不可勝用是使民養生喪死無憾也養生喪死無憾王道之始也五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時數口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣七十者衣帛食肉黎民不飢不寒然而不王者未之有也謹庠序之教申之以孝悌之義此所謂正徳也糓與魚鼈不可勝食材木不可勝用養生喪死無憾此所謂利用也五畝之宅樹之以桑雞豚狗彘之畜無失其時百畝之田勿奪其時此所謂厚生也使此三者施之天下而不失其和故謂之惟和六府修三事和則九功於是惟敘矣謂之惟敘者非謂六府之修先水火而後金木土榖也謂之惟和亦非謂三事之和先正徳而後利用厚生但謂九者皆不失其序而已王氏謂以惟敘為六府三事之序故以土治水以水治火然後水火為用以火治金以金治木然後金木為器以木治土以土治榖然後土榖為利楊龜山曰不然神農氏斵木為耒揉木為耜耒耜之利以教天下蓋以木治土然後有耒耜之利非土能治榖矣洪範曰土爰稼穡與水之潤下火之炎上木之曲直金之從革一也謂土能治穀者非也此説為是然龜山既知土能治穀之為非而又曰五行相生以相繼相尅以相治相生為四時之序相尅為六府之序也夫既以相尅為六府之序則自水治火而推之亦將以土治穀矣此則流入於王氏之説而不自知也九敘惟歌者六府修三事治其功徳皆可歌也功徳既可歌則功成治定不可以有加矣惟在不倦以終之也故繼之曰戒之用休董之用威戒之用休董之用威勸之以九歌俾勿壞九者皆得其叙則天休滋至吾乃寅畏以享之此戒之用休也其或不然則天威將至而危敗禍亂自此生矣故督之以威而避也勸之以九歌謂九功之徳既可歌矣則遂以是九功之歌播之聲詩發揚蹈厲以自勸如此則九功之敘無有敗壞之時矣戒之董之勸之皆是人君自戒自董自勸也古者作樂歌以象徳舞以明功舜之為治自徳惟善政政在養民至於九功惟敘九敘惟歌則其功徳皆已盡其善矣故其樂象之而韶樂遂以九為節周禮大司樂曰黄鍾為宫大吕為角大蔟為徵應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九徳之歌九韶之舞奏之宗廟之中若樂九變則人鬼可得而禮矣蓋舜之韶樂升歌於上者九徳之歌合樂而舞於庭者九韶之舞韶樂之奏至於鳥獸率舞鳯凰來儀者原其所以致此者則本於九功惟敘而九功之所由敘者本夫舜之徳施於有政然也以是觀之則韶樂之舞盡善盡美豈苟然也自徳惟善政政在養民至於勸之以九歌俾勿壞此則箕子所陳洪範九疇而謂之天乃錫禹者但洪範之書箕子衍之而加詳焉耳其實不出乎此數語學者於此數語而求之洪範思過半矣帝曰俞地平天成六府三事允治萬世永頼時乃功帝曰俞然其言也地平天成者地既平矣則天功可得而成也蓋隂陽四時之運天施之地成之洪水横流泛濫於中國地不得以生天雖施之而生之之功無自而成今地既平矣則天功可得而成也所以地平天成者由六府三事之允治也水火金木土穀惟修謂之六府此六者天地生物之府也正徳利用厚生謂之三事此三者聖人修人事以賛天地之化育也六府三事既治豈一時被其徳哉蓋萬世永頼禹之功也禹既言九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壊者謂舜當戒之董之勸之使勿壞也舜於是稱美其功言汝之功雖萬世亦將頼之予其可不盡儆戒之意哉觀箕子以此言演為九疇而其書謂之洪範者大法也謂萬世帝王治天下之大法舉不出於此書以洪範之書觀之則謂大禹之功萬世永頼時乃功者豈溢美也哉帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠緫朕師此言舜將禪位於禹之事格汝禹者猶言格汝舜也朕宅帝位三十有三載言舜自格于文祖踐天子之位至是蓋三十有三年矣禮記曰八十九十曰耄百年曰期頤舜生三十徴庸三十在位并堯之喪而數之其即位也蓋年六十有三至是年九十六矣其年在於耄期之間則方厭倦於萬機之務矣蓋言禹當不懈其位以緫朕之衆蓋將使之代己緫攬萬機之政也傳曰老將昬而耄及之言老則昬昬則耄也舜年九十六禪位於禹當其未禪也蓋猶朝諸侯廵狩方岳緫攬萬機之務及其既禪也天下之大事猶所關及命禹徂征敷文徳舞干羽格有苖皆舜之所有事也雖及耄期之年而其徳不昬此聖人之所以為聖人也禹曰朕徳罔克民不依臯陶邁種徳徳乃降黎民懷之自朕徳罔克以下正如舜典所謂舜讓于徳弗嗣也典謨所載其文簡其事備蓋其為體或詳於此而略於彼或略於此而詳於彼以互相發明如舜終于文祖而下則言在璿璣玉衡以齊七政至告祭于上帝百神覲諸侯廵狩方岳之事無所不載而禹受終于神宗之下則惟記一言曰率百官若帝之初觀此則在璿璣玉衡以下不言而可見矣舜禪位於禹禹讓於臯陶舜不從其讓而更授禹禹又辭讓至於再三然後受命于神宗其載之詳如此至於堯之授舜則惟記以一言曰舜讓于徳弗嗣觀此則知舜之讓也亦將有所荅問辭遜若禹之於舜也典謨所載其辭不費類皆如此朕徳罔克者禹謂己之不徳民之所不從臯陶逺邁其徳其徳下洽於民而民懷之禹自以為不若皐陶也徳必稱其邁種者蘇氏曰種徳如農夫之種殖也衆人之種其徳也近朝種而暮收則其報也亦狹矣皐陶之種其徳也造次顛沛未甞不在於徳而不求其報也及其充溢而不已則沛然下及於民而民懐之此説盡之矣漢于定國父于公其閭門壞父老方共治之于公曰少髙大門閭令容駟車我治獄多隂徳子孫當有興者夫于公治獄無所寃信有隂徳矣然而遂髙大門閭以望子孫之興則知未能無利之之心非所謂邁種徳也臯陶之作士刑期于無刑民協于中其徳可謂大矣不期其報而民自歸之此其所以為難禹讓于徳無以易臯陶矣帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功言帝之所當念也念兹在兹釋兹在兹名言兹在兹允出兹在兹薛氏以繫於皐陶邁種徳之言而為之説曰念兹者固在兹矣及其念之至也則雖釋而不念亦未甞不在兹也其始也念仁而仁念義而義及其至也不念而自仁義也是謂念兹在兹釋兹在兹名言者其辭命也允出者其情實也名之以仁固仁矣名之以義固義矣是謂名言兹在兹及其至也不待名言而情實皆仁義也是謂允出兹在兹禹既以是稱皐陶之徳因以是敎舜也曰邁徳者其徳不可以一一數也念之而已念之至者念與不念未甞不在德也其外之辭命其中之情實皆徳也而徳不可勝用矣薛氏此言其論念釋名言允出在兹之義可謂曲當其理然上文曰帝念哉下文曰惟帝念功皆是禹讓於皐陶之意因以教舜而念哉念功皆為念徳則是此乃禹稱皐陶之徳殊不見其讓於皐陶之意與上文朕徳罔克文勢不相接故薛氏說雖善而非書之意也孔氏王氏皆以此為讓于皐陶其説是也然而意亦未順予竊謂禹之讓于皐陶也蓋以謂我之心念其可以受帝之禪者惟在於皐陶舍皐陶之外而求之餘人亦無及於皐陶者則可以受帝之禪者亦惟在臯陶故名言於口以為在皐陶允出於心亦以為在皐陶謂己之反覆而思之卒無有以易皐陶者猶下文舜謂禹曰毋惟汝諧是也惟帝念功者言皐陶之徳見於功者帝之所當念而可禪以位也帝曰皐陶惟兹臣庶罔或干予正汝作士明于五刑以弼五教期于予治刑期于無刑民協于中時乃功懋哉舜因禹之讓皐陶於是稱美皐陶之功以勉之也惟兹臣庶罔或干予正言民皆循理率教無有干予正者言不犯法也民之所以不犯法者則以皐陶之作士能明五刑以弼五教故爾古之聖人所以制為刑辟者非期於多刑人多殺人以為威也凡欲以輔吾教之所不逮而已出教則入於刑出刑則入于教使民皆趨於五教而刑為無用者是眞聖人之本心也皐陶能體此意故其用刑也亦非期於深文峻法使民無所措手足也其所期者惟欲使舜從欲以治而已欲使舜從欲以治要在使民不犯於有司囹圄空虚天下無一人之獄羣黎百姓皆協於大公至正之道使人徒知契與伯夷之教而不知有皐陶之刑此舜之威徳惟皐陶能推明其意而見於治功者然也董仲舒曰天道之大者在隂陽陽為徳隂為刑刑主殺而徳主生是故陽常居大夏而以生育長飬為事隂常居大冬而積於虛空不用之處以此見天之任德不任刑也天使陽出布施於上而主歲功使隂入伏於下而出佐陽陽不得隂之助亦不能獨成歲功陽以成歲為名此天意也王者承天意以從事故任徳而不任刑刑之不可任以治世猶隂之不可任以成歲也觀此則知刑以弼教期于無刑眞聖人之本意也蓋百官有司之職各職其職業而使其職無曠然後為能如百揆必能熙帝之載不能熙帝之載則為曠職矣稷官必能播百榖不能播百榖則為曠職矣共工必能使百工各盡其能不能使百工各盡其能則為曠職矣虞衡必能使草木鳥獸各遂其性不能使草木鳥獸各遂其性則為曠職矣以至司徒之於教秩宗之於禮龍之於納言必欲皆修其本職然後為無曠也惟士之一官乃獨異於此要在乎推明聖人所以明刑立法之意使民不犯于有司囹圄空虛天下無一人之獄其官若為虛設者然後為能其官此皐陶之徳所以為萬世治刑獄之法也時乃功懋哉者言其既稱其功又勉之使懋其職業也亦猶使禹宅百揆禹讓于稷契暨皐陶舜既不許其讓則更稱三人之前功而勉之也然禹之宅百揆以讓于稷契暨皐陶此惟讓皐陶而不及稷契者案史記稷契皆帝嚳之子帝嚳崩而摰立摯崩而堯立堯立七十年而使舜攝帝位二十八年而堯崩終堯之喪三年而後即帝位即帝位而後命九官當命九官之時稷契蓋年百有餘歲矣舜即位三十三年而後禪禹當禪禹之際此時稷契之徒蓋已死矣使是時尚存則其讓之固當所先也皐陶曰帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經舜既推美皐陶之功皐陶於是推本其所自以謂非舜之盛徳則已亦不能成此功也蓋有司之所守法令而已至於操縱予奪權其輕重之冝以濟有司之不及者則在天子惟臯陶執法於下而舜以好生之徳推之於上此民所以不犯于有司也帝德罔愆者謂帝之徳無有愆過蓋不以喜怒好惡而用刑賞也既不以喜怒好惡而用刑賞則有司得以奉公守法無所顧望阿私以行其志矣臨下以簡御衆以寛者此謂操之於上者既無繁苛之法則施之於民者必無暴虐之政矣蓋惟簡故能寛也漢髙祖入秦關約法三章餘悉除去秦法而秦民皆案堵如故由其簡故能寛也罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經此皆舜以忠厚之徳濟有司之所不及也人情莫不欲愛其子孫其所不欲者則惟恐子孫之䧟入其中及其所欲者則惟恐不能遺其子孫聖人之政夲於人情故罰弗及嗣以謂父子之罪不相及而賞得以延及於一世以此見聖人之用刑賞之法夲於人情伸於用賞而屈於用刑也宥過無大謂過誤所犯雖大必宥猶舜典所謂𤯝災肆赦是也刑故無小不忌故犯雖小必刑猶舜典所謂怙終賊刑是也蓋聖人制刑辟所以待小人長惡不悛者而非謂君子不幸而䧟入於其中也小人長惡不悛者雖小罪亦不可苟免則世之小人者皆有悔過自新之心而君子入於非辜雖大罪亦在所赦則君子有所依賴不為小人之所誣此聖人所以制刑罰之本意也罪疑惟輕功疑惟重此君子長者之道待天下樂夫君子之有功不忍小人之有罪也潁濵曰君之與民其逺近之勢小大之分故不待夫為之爭尋常之是非以勝之與其不屈吾法孰若使民全其肌膚保其首領而無憾於上與其不使名器之僭孰若使之樂得為善之利而無望望不足之意斯言盡矣與其殺不辜謂大辟之刑疑而讞於上其罪可以殺可以無殺不殺之則懼其實有罪而失不常之刑殺之則懼其實無罪而䧟於非辜此意有可疑而不敢決者而以讞於上舜之意則以謂斯人也其罪在於可不可之間與其殺無罪而陷於非辜寧縱有罪而失於不經也此大舜不忍用刑之意也自臨下以簡至於寧失不經則舜明愼用刑而致其仁愛之意至矣盡矣不復可以有加矣好生之徳洽于民心兹用不犯于有司好生之徳洽于民心如是則民自不犯法矣揚子曰秦之有司負秦之法度秦之法度負聖人之法度秦之嚴刑峻法既已負聖人之法度矣而其有司又從而負其法度焉此刑獄之所以繁也舜既以好生之徳垂拱於上而皐陶又能推明其意以君子長者之道待天下此所以使民不犯于有司也雖不犯于有司而原其所由是舜之盛徳所致也故舜雖歸美於皐陶非皐陶之所敢當也帝曰俾予從欲以治四方風動惟乃之休皐陶雖不敢當其功而舜則以謂臨下以簡御衆以寛至於與其殺不辜寧失不經雖如其所欲者如此苟使有司不能推明其意則已雖有好生之徳亦無自而洽于民心故謂之曰所以使予從欲以治至於四方從化靡然如風之偃草乃汝之功皐陶歸功於舜不敢自有其功舜不以盛徳自居而又歸功於皐陶更相推美其功徳之盛夷考其實未有一言溢美於其間其君臣相與以至誠如此唐虞之治所以歴萬世不可企及也帝曰來禹降水儆予成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功舜禪位於禹禹讓於皐陶帝雖獨美皐陶之功而卒不許其讓也舜於是遂申命以攝位之事與舜典汝往哉之意同但此為攝位而言兹事體重故其誥戒之辭加詳焉則來禹者猶云格汝禹也不言格汝禹而言來禹者蓋史官變其文也降水當從孟子作洪水字其說曰降水者洪水也蓋謂降水者洪水之異名而說文降字洪字皆音胡公反以是知此二者不惟義同字亦通用也而先儒從經文作誕降嘉種之降同其說以水性流下故曰降水此蓋不然水性下流固得其性矣惟其逆行此其所以為害也降水儆予舜謂天以洪水而儆戒予也堯之洪水說者皆以謂當堯之世有如此大變異也惟胡文定之說曰堯之洪水非有以致之蓋自開闢以來水行者未得其所歸使禹治之然後人得平土而居之蓋其意以謂堯世洪水之害乃事勢之所激非忽然而有也此論甚當夫其水害既出於事勢之所激非忽然而有而舜則以謂降水儆予者蓋聖人上儆天戒下重民命未甞敢忘戒懼之心雖實事勢之使然而聖人之心不以為天災而忘所以儆天戒重民命者故謂之儆予而不敢忽也夫使人君苟無儆戒之心則雖天災之顯然可見者猶不知懼又從而為之辭以自解免者如漢武帝謂旱為乾封彗為徳星如此則修人事應天變者廢矣司馬温公曰人君之所畏者惟畏天若不畏天何事而不可為者哉堯舜之洪水眞所謂無妄之災也而謂之儆予蓋自盡其所以畏天之意而不謂我無以致之也唐虞之治實基於此成允成功謂禹能體舜儆戒之意以成此治水之功也自古聖賢舉大事定大難未有不能成允成功也蓋成功非難成允難允成於此而功成於彼蓋有不期然而然者商鞅之於秦惟能徙木以示信故令下之日一國之民無敢違者夫鞅豈眞能信哉假而行之其效且如此况禹以至誠惻怛之心思天下之有溺者由已溺之故信而後勞其民民雖勞而不怨則其成天下之大順致天下之大利蓋可指顧而辦也惟汝賢者言無若汝之賢既有是功而又勤于邦儉于家不自滿假此人情之所尤難也孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫此克勤于邦克儉于家之實也不自滿假者執心謙冲而不自盈大也言禹有如是之功而退然若未甞有功者故勤于邦儉于家不自滿假者皆不居其功也惟汝賢者言無若汝之賢也賢者能為人所不能故賢於人也此又申前之義而無結文言禹有是能矣而不自矜也雖不自矜而天下莫與之爭能有是功矣而不自伐也雖不自伐而天下莫與之爭功說命曰有其善喪厥善矜其能喪厥功矜則人與之爭能伐則人與之爭功矣至於不矜不伐又誰與之爭邪夫成允成功非難有是功而克勤于邦克儉于家不矜不伐然後為難禹既有是成允成功之美而又有是克勤于邦克儉于家不矜不伐之徳此舜所以勉其有如是之徳而遂嘉其有如是之功也故繼之曰予懋乃德嘉乃丕績予懋乃徳嘉乃丕績天之暦數在汝躬汝終陟元后萬章問於孟子曰舜有天下也孰與之曰天與之天與者諄諄然命之乎曰否天不言以行與事示之而已矣予懋乃徳嘉乃丕績則其所以示之者可謂至矣故以是卜知天命之所在而曰天之暦數在汝躬言天命在汝汝當終陟元后而作天子也是時方命以居攝未即天子之位故以終陟言人心惟危道心惟微惟精惟一允執厥中此堯舜禹三聖人相授受之際發明其道學之要以相畀付者韓子曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳歴代聖賢所以相傳者不得盡見然以堯舜禹之所以相授受者而視之則知湯與文武而下其所以相傳者蓋不出諸此矣此實聖學之淵源而諸儒之說各有不同蓋聖人發明其心術之祕以相授受故其言淵深又必有聖人復起黙而識之自得於言意之表非詁訓章句之學可得而知也諸儒雖各以意形容而聖人之意終於不可盡某何人也足以知此姑掇諸儒之遺說而臆度之其中與否不可必也中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和苟於其既發而為私欲所勝則將發而不中節矣夫所發者既已危而不安則未發者亦將微而難明誠能惟精惟一以安其危則喜怒哀樂中節而和矣所發者既和則未發之中亦將卓然而獨存矣故能允執厥中此蓋與中庸之言相為表裏自堯舜禹以至孔孟所以相傳者舉不出此學者不可以不深意而精思之也無稽之言勿聽弗詢之謀勿庸此又戒以聽言之道也無稽之言不考於古也弗詢之謀不稽於衆也仁人君子之言上必考於古下必稽於衆故其用之可以為天下國家之利苟非此二者則是專己自用以濟其私為國家者小用之則小害大用之則大害無逸所謂譸張為幻者是也故舜以諄諄戒禹謂守盈保成之業惟在於遏絶此二者之萌而已故使之勿聽勿庸也曰謀曰言曰聽曰庸此蓋隨冝立言非有深義也可愛非君可畏非民衆非元后何戴后非衆罔與守邦此又言君民相須君不可不畏民民不可不使愛君先儒謂可愛非君民可愛者豈非君乎又謂可畏非民君可畏者豈非民乎民以君為命故可愛君失道則民叛之故君畏民也正如北風之詩云莫赤匪狐莫黒匪烏謂赤莫赤於狐黒莫黒於烏也所以謂可愛非君者以衆非元后則無以奉戴故曰衆非元后何戴蓋民無君則亂故民愛君也所以謂可畏非民者以后非衆罔與共守故曰后非衆罔與守邦蓋君失民則失國故君畏民也惟君民相須如此則為君者其可不致其兢慎之意如下所云哉欽哉愼乃有位敬修其可願四海困窮天禄永終惟口出好興戎朕言不再欽哉慎乃有位者謂當敬其事慎汝所守之位也欽哉慎乃有位則不可不敬修其可願蓋人君於所願欲之事苟知其可為則在決意以行之其所可願而不能決意以行之則是欲其所不欲為其所不為矣孟子曰欲無敵於天下而不以仁是猶惡濕而居下也以是知人君之治天下於其願欲之事不可不敬而修之敬修其可願則仁達於天下矣四海困窮天禄永終者先儒以屬於上文謂四海之内有困窮之民君當撫而育之言人君苟能勤此慎乃有位敬修其可願與夫撫育四海困窮之三者則天之禄秩常終汝身爾夫經但云四海困窮而先儒增為撫育之文其説為贅薛氏曰舜之授禹也天下可治矣而説四海困窮者托於不能以委禹也此説雖於經文為順然又未若王氏之説曰四海困窮則失民失民則無與守邦無與守邦則天禄永終矣此説為長此蓋申言上文罔與守邦之義也聖人之治天下所以生而不傷厚而不困持而不危節其力而不盡者惟恐四海之困窮不能終其天禄故也舜之所以告禹者盡於此矣於是遂言其所以禪位之事既有成命而不可改也惟口出好興戎朕言不再者言已之出命宣之於口者其言善則有以出好其言不善則有以興戎今之所以禪位於禹者慮之於心者既定發而為言矣不可以更授他人而再出命也禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭帝曰毋惟汝諧禹於是辭讓不受謂受禪大事也當並立枚卜功臣擇其可授而授之也帝曰禹官占惟先蔽志者舜又不許禹之讓而為之明言其不以枚卜之理也官占者謂帝王立卜筮之官此先自斷其志然後命元龜以決之苟使不先斷其志而徒取決於龜筮則南蒯之占雖得文王之兆亦為無益也故洪範之稽疑曰謀及乃心謀及卿士謀及庶人而後謀及卜筮蓋人謀既盡然後可以稽之於天命也禪位大事也舜之慮也可謂至矣既先定其志然後詢之衆人而謀之而衆謀無不僉同以人言既協則幽而鬼神其必依之故其稽之卜筮則協從而無所不吉矣正如洪範曰是之謂大同夫既協之於天人之望己從而無所不吉矣故繼之曰卜不習吉習者重也如習坎之習同不習吉者言無所事於重卜也先儒謂以習為因非也禹拜稽首固辭者蓋言禹又不敢受帝之位也於是再拜稽首而固讓焉古之人於賔主授受之際猶以三辭三讓然後成禮况於受天下之重輒敢易而為之哉故必辭讓至於再三再三辭者皆出於其中心之誠然也非勉强而為之如漢文帝立自代邸東嚮讓天下者三南嚮讓天下者再此亦知夫天下大器不敢輕受文帝所以致刑措之治其端蓋本諸此若夫飾情釣譽為不情之讓以濟其私若王莽之所為是乃舜禹之罪人也蓋毋者禁止之辭也止之使不能復讓也惟汝諧者惟禹可以當此元后之位也正月朔旦受命于神宗率百官若帝之初辭既不獲矣於是正月之朔旦受命于神宗神宗者堯廟也祭法曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯大禹謨虞書也所稱祖宗必指有虞之世而言之薛氏云受天下於人必告於其人所從受天下者此論是也率百官若帝之初先儒云順舜初攝帝位故事奉行之此説固是然而以若為順則失之無據此若字但訓如舜典所謂廵狩如初也蓋禹既受命于神宗則其率百官如舜居位之初所行之事也其所行之事即在璿璣玉衡以齊七政以下是也堯舜禹三聖相授而守一道堯咨舜之言即舜咨禹之言禹攝所行之事即舜攝所行之事史官互文見義其言約而盡簡而不費使學者深思而自得之可謂善敘事矣帝曰咨禹惟時有苖弗率汝徂征禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苖昬迷不恭侮慢自賢反道敗徳君子在野小人在位民棄不保天降之咎堯老而舜攝者二十有八年舜老而禹攝者十有七年其居攝也蓋代緫萬機之政而堯舜之尊為天子蓋自若也故國有大事猶禀命焉禹之征有苖蓋在夫居攝之後而其命禀於舜禹不敢專也以征有苖而推之則知舜之誅四凶其亦禀堯之命而流放竄殛非舜之所專也而左氏傳載太史克之言以謂渾孰窮竒之徒世濟其凶增惡名以至於堯堯不能去舜承堯流四凶族投諸四裔此徒見四凶之誅不在堯之世而在舜歴試之時遂謂堯不能去殊不知舜之去四凶實受堯之命也典謨所載其文明甚特後世未之思耳三苖之國左洞庭右彭蠡實負固不服之國也舜之誅四凶蓋始遷其君之桀驁者於三危之地雖遷其君不滅其國更立其近親以紹其宗嗣至舜之格于文祖而即帝位至於三考黜陟之後蓋三十餘年矣而苖民猶不之服舜未忍加誅也於是分别其善惡而析居之及舜以耄期禪位于禹使禹居攝又將三十年而苖民怙終其惡卒不從教蓋恃其土地之險謂兵刑之所不能加也舜於是命禹率諸侯而征之所以討其負固不服之罪而明正典刑也咨嗟也嗟禹而告之曰惟時有苖尚不率教汝其率諸侯以徃征之也禹乃㑹羣后蓋禹於是合諸侯而與之共征有苖也孟子曰天子討而不伐諸侯伐而不討蓋古者有負固之國天子致其討罪之辭以告諸侯然後方伯連帥率諸侯而徃征之諸侯雖能敵王所愾而討罪之辭則必受之於天子不敢專也舜曰咨禹惟時有苖弗率汝徂征禹乃㑹羣后而往征之天子諸侯之義是兩盡之矣誓于師者誓衆以所為征有苖之意也有㑹必有誓自唐虞以來則然也而禮記則曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之商人作誓而民始叛周人作㑹而民始疑榖梁子亦曰誥誓不及五帝觀此言禹乃㑹羣后誓于師則是㑹與誓皆出於舜禹之時矣蓋合諸侯以欽承天子之命豈可以無㑹有軍旅之事將警衆以用之豈可以無誓此堯舜禹所不能廢有㑹有誓亦何害於未施信而民信之未施敬而民敬之而又謂誓者殷民所以叛會者周民所以疑此徒見春秋之時盟㑹之煩誥誓之數而民不信也則謂帝王之時亦然此蓋未嘗深探其本原故也濟濟有衆衆盛之貌咸聽朕言當聽朕誓戒之命也蠢動也此蓋所以聲言有苖之罪也夫苖民之所以蠢動而不服者則其昬迷且不恭也惟其不恭故侮慢自賢惟其昬迷故反道敗徳君子在野小人在位言其國亂無政而禍及斯民棄而不保民既棄而不保是以知天將降之咎也肆予以爾衆士奉辭伐罪爾尚一乃心力其克有勲三旬苖民逆命益賛于禹曰惟徳動天無逺弗届滿招損謙受益時乃天道惟其苖民之罪為天所斷棄故予以爾衆士奉天討罪之辭以伐有苖之罪爾尚庶幾一乃心力其將有功勲以復於上三旬苖民逆命者言禹率諸侯以征有苖至于三旬而苖民猶弗服也漢孔氏曰責舜不先有文誥之命威讓之辭而便憚之以威脅之以兵有苖所以生辭此説不然夫有苖之罪在所當誅也乆矣舜以是寛待之至是蓋五六十年矣文誥之命威讓之辭豈有不盡苖安得以是而責舜哉而唐孔氏云以大舜足逹用兵之道而不為文誥之辭使之得生辭者有苖數干王誅逆者難以言服故憚之以威武任其生辭待其有辭為之振旅彼若師退而服我復更有何求退而又不降復往必無辭説若先告以辭未必即得從命不從而後行師必將大加殺戮不以文誥感徳自來固大聖之逺謀也信斯言也則是舜禹益用師進退皆出於權譎變詐之謀何期聖人之淺邪要之苖民逆命但是昬迷不恭耳不必從而為之説益賛于禹者益是時亦從禹出征見苖民負固恃强不可以威服也則以言賛佐禹欲使之班師振旅以徳懷之也謂徳至於動天則將無逺而弗届彼苖民者豈能終弗服哉欲徳之動天則在天順天道之常理滿招損謙受益此實天理之常也謂人之處心自滿者招損蓋有其善喪厥善矜其能喪厥功也謙抑則自受其益自後者人先之自下者人髙之言此者欲禹以謙冲之徳不與苖較苟順於天理之自然則有苖將自至矣帝初于歴山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齊慄瞽亦允若至諴感神矧兹有苖此又言舜之克諧瞽瞍之事以見徳之至者雖其凶頑之人猶可以化服之也帝初于歴山往于田謂舜之居側微畎畝之時也是時為父母所疾自咎其不順於父母既號泣于旻天又號泣于父母蓋自盡其怨慕之徳其所號泣于旻天父母惟負罪引慝而已蓋引咎以自責不以為父母之失也孟子載其言曰我竭力耕田供為子職而已父母之不我愛於我何哉此負罪引慝之實也惟其負罪引慝故供為子職不敢不盡其力祗載見瞽瞍謂敬其事以見於父起敬起愛而不敢怨也夔夔恐懼之貌謂恐懼齋莊愛敬盡於事親也惟竭至誠以事其父故雖瞽瞍之頑亦信順之夫舜之號泣于旻天于父母而其至誠實有以感格于上天之意則雖瞽瞍之頑猶至於允若以是知至誠可以感格于神明也如此况兹有苖之頑未至於瞽瞍之甚苟使禹以徳而懷來之彼將自至何必區區以干戈而征之此蓋益賛于禹之意也禹拜昌言曰俞班師振旅帝乃誕敷文徳舞干羽于兩階七旬有苖格薛氏曰昌言盛德之言也此蓋禹以益之言為盛徳之言於是拜受其言而然之遂為之班師振旅而歸也班師旋師也左氏傳曰班馬有聲謂還馬也入曰振旅出曰班師謂班師於有苖之國而振旅於京師也禹既班師振旅而歸於是舜大布文徳以懷來之也大舜之文徳何時不誕敷至是而後言誕敷者蓋責己自反不與苖較彼知聖人之大度足以有容如此則愧耻遷善之心油然而生此其所為誕敷文徳也干盾也舞者執之以為扞蔽明堂位曰朱干玉戚以舞大武蓋武舞也羽翳也亦舞也舞者執之以為蔽翳也簡兮之詩曰左手執籥右手秉翟蓋文舞也言舜之格有苖不用干戈以服之惟舞千戚於賔主兩階之間而苖民自至詳考此言蓋是史官形容舜禹盛徳不用干戈以服有苖惟履服無事舞干羽于兩階而苖民自至此形容不盡之意於言外非禹之班師振旅而歸舞于庭以是為誕敷文徳而望苖民之來也故曰以意逆志是為得之禹既不用干戈以與苖較惟誕敷文徳以懐來之故至七旬而有苖自格格與有耻且格之格同言有所感慕而來也夫唐虞之世聲教所被訖于四海之外不服者惟一有苖國而已以天下之全力而制一國之逆命何難之有而舜禹懐之以徳待之以寛遷其君而不服則為之分北其善惡而析居之分北而猶不服命率諸侯而征之亦不責其必至也又為之班師能使之自服蓋自苖民始叛至於是凡五六十餘年然後得其心説誠服聖人優游寛大之政非後世所能及也尚書全解卷四
