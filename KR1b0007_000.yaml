body:
  text: 尚書全解書類提要臣等謹案尚書全解四十卷宋林之竒撰之竒字少穎號拙齊侯官人官至宗正丞事迹具宋史儒林傳之竒辭祿家居博考諸儒之説以成是書宋志作五十八卷此本僅標題四十卷考其孫耕後序稱脫稿之初為門人吕祖謙持去諸生傳録僅十得二三書肆急于鋟梓遂訛以傳訛至淳祐辛丑耕從陳元鳯得宇文氏所傳書説拾遺手稿一册乃康誥至君陳之文乙巳得建安余氏所刻完本始知麻沙所刻自洛誥以下皆偽續又得葉真所藏林李二先生書解參校證驗釐為四十卷然則宋志所載乃麻沙偽本之卷數朱子所謂洛誥以後非林氏解者此本則耕所重編朱子未見夏僎作尚書解時亦未見故所引之竒之説亦至洛誥止也然耕既稱之竒初稿為吕祖謙持去則祖謙必見完書何以東萊書説始於洛誥以下云續之竒之書毋乃耕又有所增修託之乃祖歟自宋逮明流傳既久又佚其三十四卷多方一篇通志堂刊九經解竭力購之弗能補也惟永樂大典修自明初其時猶見舊刻故所載之竒書解此篇獨存今録而補之乃得復還舊觀之竒是書頗多異説如以陽鳥為地名三俊為常伯常任準人皆未嘗依傍前人至其辨析異同貫串史事覃思積悟實卓然成一家言雖真贋錯雜不可廢也屢經散佚而卒能完善亦其精神刻摯有足以自傳者矣前有自序一篇述尚書始末甚詳然舛誤特甚漢書藝文志巳明云古文尚書孔安國獻之遭巫蠱不列於學官而用偽孔傳序藏於家之説並謂劉歆未見儒林傳明言伏生壁藏其書漢興亡數十篇獨得二十九篇而用衛宏古文尚書序使女傳言之説並謂齊語難曉尤其致謬之大綱閻若璩諸人已有明辨兹不具論焉乾隆四十二年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書尚書全解序理義者人心之所同然也聖人之於經所以關百聖而不慙蔽天地而無恥者蓋出於人心之所同然而已苟不出於人心之所同然則異論曲説非吾聖人之所謂道也孔子曰君子之於天下也無適也無莫也義之與比竊謂學者之於經苟不知義之與比先立適莫於胸中或以甲之説為可從以乙之説為不可從以乙之説為可從以甲之説為不可從如此則私議鋒起好惡閧然將不勝其惑矣安能合人心之所同然哉苟欲合人心之所同然以義為主無適無莫平心定氣博採諸儒之説而去取之苟合於義雖近世學者之説亦在所取苟不合於義雖先儒之説亦所不取如此則將卓然不牽於好惡而聖人之經旨將煥然而明矣書孔子之所定凡百篇孔子之前書之多寡不可得而見書緯云孔子得黃帝元孫帝魁凡三千二百四十篇為尚書斷近取逺定其可為世法者百二十篇為簡書此説不然古書簡質必不如是之多也班孟堅藝文志於古今書外又有周書七十一篇劉向云周時號今蓋孔子所論百篇之餘於周時所刪去者才七十一篇自周以前疑愈少矣謂有三千餘篇非也孔子百篇遭秦火無存至漢時伏生口授得二十八篇後又得偽泰誓一篇為二十九篇孔壁之書既出孔安國定其可數者二十五篇又别出舜典益稷盤庚康王之誥共為五十八篇其文以𨽻書存古文故謂之古文尚書此書之成遭巫蠱而不出漢儒聞孔氏之書有五十八篇遂以張霸之徒造偽書二十四篇為古文尚書兩漢儒者之所傳大抵霸偽本也其實未嘗見真古文尚書也故杜預注左氏傳韋昭注國語趙岐注孟子凡所舉書出於二十五篇之中皆指為逸書其實未嘗逸也劉歆當西漢之末欲立古文書學官移書責諸博士甚力然歆之所見皆霸偽本亦非真古文書也以至賈馬鄭服之輩亦皆不見古文書至於晉齊之間然後其書漸出及開皇二年求遺書得舜典然後其書大備嗚呼聖人之經可謂多厄矣遭秦火失其半其半存者又隱而不出自漢武帝巫蠱事起至隋開皇二年凡六百七十餘年然後五十八篇得傳於學者而大備是可歎也孔氏書始出皆用隸書至唐天寶間詔衛衡改古文從今文書今之所傳乃唐天寶所定之本也此蓋書之始末也學必欲知書之木未者蓋有伏生之書有孔壁續出之書夫五十八篇皆帝王所定之書有坦然明白而易曉者有艱深聱牙而難曉者如湯誓湯誥均成湯時誥令如説命高宗肜日均高宗時語言如蔡仲之命微子之命康誥皆周公誥命然而艱易顯晦回然不同者蓋有伏生之書有孔壁續出之書其文易曉不煩訓詁可通者如大禹謨胤征五子之歌仲虺之誥湯誥伊訓太甲三篇咸有一德説命三篇泰誓三篇武成旅獒微子之命蔡仲之命周官君陳畢命君牙冏命此二十五篇皆孔壁續出其文易曉餘乃伏生之書多艱深聱牙不可易通伏生之書所以艱深不可通者伏生齊人也齊人之語多艱深難曉如公羊亦齊人也故傳春秋語亦艱深如昉於此乎登來之也何休注曰齊人語以是知齊人語多難曉者伏生編此書往往雜齊人語於其中故有難曉者衛宏序古文尚書言伏生老不能正言使其女傳言教朝錯齊人語多與潁川異朝錯所不知者二三僅以其意屬讀而已觀此可見以是知凡書之所難曉者未必帝王之書本如是傳者汨之矣耕自兒時侍先君旴江官舍郡齋修刋禮樂書先君實董其事與益國周公誠齋楊先生書問往來訂正訛舛甚悉暇日因與言曰吾家先拙齋書解今傳於世者自洛誥以後皆訛蓋是書初成門人東萊吕祖謙伯恭取其全本以歸諸生傳録十無二三書坊急於鋟梓不復參訂訛以傳訛非一日矣先君猶記鄉曲故家及嘗從先拙齋遊者録得全文及歸方尋訪未獲不幸此志莫償耕早孤稍知讀書則日夕在念慮間汨汨科舉業由鄉選入太學跋涉困苦如是者三十餘年淳祐辛丑僥幸末第間居需次得理故書日與抑齋今觀文陳公虛齋今文昌趙公參考講求摳趨請益抑齋出示北山先生手迹具言居官婺女日從東萊先生學東萊言吾少侍親官於閩從林少頴先生學且具知先拙齋授書之由時抑齋方閲六經疏義尤加意於林吕之學虛齋亦倣朱文公辨孔安國書著本旨耕得互相詰難其間凡諸家講解搜訪無遺一日友人陳元鳯儀叔攜書説拾遺一集示余蠧蝕其表蠅頭細書云得之宇文故家蓋宇文之先曽從拙齋學親傳之稿也其集從康誥至君陳此後又無之遂以鋟本參較康誥酒誥梓材召誥皆同鋟本自洛誥至君陳與鋟本異其詳倍之至是益信書坊之本誤矣當令兒輩作大字本謄出以元集歸之然猶未有他本可以參訂也又一朋友云建安書坊余氏數年前新刋一本謂之三山林少頴先生尚書全解此集蓋得其真刋成僅數月而書坊火今板本不存矣余亦未之信因遍索諸鬻書者乙巳仲春一老丈鶉衣銜袖踉蹡入門喜甚揖余而言曰吾為君求得青氈矣開視果新板以尚書全解標題書坊果建安余氏即倍其價以鬻之以所謄本參較自洛誥至君陳及顧命以後至卷終皆真本向者麻沙之本自洛誥以後果偽矣朋友轉相借觀以為得所未見既而耕暫攝鄉校學録葉君真里之耆儒嘗從勉齋遊其先世亦從拙齋學與東萊同時又出家藏寫本林李二先生書解及詩説相示較之首尾並同蓋得此本而益有證驗矣嗟夫此書先拙齋初著之時每日誦正經自首至尾一遍雖有他務不輟貫穿諸家旁搜逺紹會而稡之該括詳盡不應於洛誥以後詳略如出二手今以諸本參較真贋曉然信而有證可以傳而無疑矣書解自麻沙初刻繼而婺女及蜀中皆有本然承襲舛訛竟莫能辨柯山夏氏解多引林氏説自洛誥以後則略之僅有一二語亦從舊本往往傳訛東萊解只於禹貢引林三山數假他未之詳東萊非隱其師之説蓋拙齋已解者東萊不復解而唯條暢其義嗟夫書自安國而後不知其幾家我先拙齋裒集該括自壯及耄用心如此之勤用力如此之深始克成書而傳襲謬誤後學無從考證我先君家庭授受中更散亡極意搜訪竟無從得耕恪遵先志乂三十餘年旁詢博問且疑且信及得宇文私録又得余氏新刋全解又得葉學録家藏寫本稽驗新故訂正真贋參合舊聞而後釋然以無疑確然而始定然則著書傳後豈易云乎哉耕既喜先拙齋之書獲全又喜先君縣丞之志始遂顧小子何力之有抑天不欲廢墜斯文故久鬱而獲伸與不然何壁藏汲冡之復出也淳祐丁未之嵗石鼓冷廳事力甚微學廪粗給當路諸公不賜鄙夷捐金撥田悉有所助三年之間補葺經創石鼓兩學輪奐鼎新書版舊帙缺者復全於是慨然而思曰我先君未償之志孰有切於此者吾先世未全之書豈容緩於此者實為子孫之責也乃會書院新租嵗入之積因郡庠憲臺撥鏹之羡撙學廳清俸公給之餘計日命工以此全書亟鋟諸梓字稍加大匠必用良版以千計字以五十萬計釐為四十卷始於己酉之孟冬逮明年夏五月而畢是書之傳也亦難矣哉亦豈苟然哉舊本多訛耕偕次兒駿伯重加點校凡是正七千餘字今為善本庶有補於後學淳祐庚戌夏五嗣孝孫迪功郎衡州州學教授兼石鼓書院山長耕謹書觀林君耕叟序述其先王父全書始末兩世訪求志亦苦矣先是抑齋陳先生為僕言閩學源流開教甚悉乃知始於紫微吕公載道而南而拙齋先生實親承心學拙齋著書多而於尚書尤注意即少頴先生書解是也然自洛誥以後傳者失真世不得見其全書為恨先生之猶子諱子沖登癸丑科為南豐簿嘗分教盱江再轉為丞僕頃在庠序尚及識縣丞公於丈席縣丞公在盱據勘遺文多矣獨於拙齋全書散逸之餘訪求而未得不幸齎志以沒又數十年而先生之孫耕始克摹就豈其書之泰厄固自有時邪拙齋雖不克竟其用而傳聖賢之心壽斯文之脈其功大矣縣丞公尅志世其學而略不獲施於用至耕而全書始出以傳惟拙齋之學卓然光明久而益昌何庸繪畫耕字耕叟為衡州教授暨先生甫三世其孜孜問學多識往行好修者也君子曰無忝厥祖淳祐十年七月既望後學盱江鄧均拜手書於湖南漕司湘山觀
