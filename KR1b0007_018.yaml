body:
  text: 尚書全解卷十八宋林之竒撰盤庚上商書盤庚五遷將治亳殷民咨胥怨作盤庚三篇盤庚逸書之序葢有其書雖已亡而其所述亦可證見存之書者若其記載商人遷國之始末也自契至于成湯八遷湯始居亳從先王居作帝告釐沃仲丁遷于嚻河亶甲居相作河亶甲祖乙圯于耿作祖乙此皆逸書之序也盤庚五遷將治亳殷民咨胥怨作盤庚三篇此見存之書也盤庚之書雖存然不得逸書之序以見其前世遷徙之始末則盤庚之意亦復不明于世故自帝告釐沃以至于祖乙五篇之序葢所以爲盤庚之書張本於前若左氏傳或先經而始事也契者啇之始祖受封扵唐虞之世始有爵土傳之後世自契至于成湯凡十四世而八遷其國葢古者邑居無常擇利而後動其宗廟社稷朝市之制簡而不夥約而不費故不以屢遷為勞也如周之先世后稷封於邰公劉徙邠太王徙岐文王徙酆武王徙鎬亦屢遷也商之八遷歴世久逺其書雖已亡逸不見其所遷之地亦如文武而上遷徙無常而不出於其所封之國也湯遷居於亳從先王居先儒以先王為帝嚳非也武成曰惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家其曰先王葢指后稷也則先王居葢是契之舊邑也商頌曰𤣥王桓撥周語曰𤣥王勤商十有四世而興先王為契何所不可而必以為帝嚳也亳葢契之所居實王業所基之地湯從而居之遂克夏而有天下湯之後傳八世至于太戊皆居于亳咸乂之序曰亳有祥桑榖共生于朝是也太戊崩子仲丁立始自亳遷于嚻仲丁崩弟外壬立外壬崩弟河亶甲立後自嚻遷于相河亶甲子祖乙立復自相遷于耿既遷于耿則其地水泉濕爲水所圯欲改遷于他所而重勞民故遂留于耿自祖乙以来凡歴五世竟不克還及盤庚即位而民之被於墊溺已甚遂謀遷于亳殷此其遷徙之始末見於書之序者然也是以張平子東都賦曰商人屢遷前八後五蓋自契至于成湯八遷此所謂前八也自湯至于祖乙五遷此所謂後五也湯一人而再數之是以前八後五共爲十三遷也故序曰盤庚五遷將治亳殷其文蓋與自帝告釐沃至于祖乙五篇之序文勢首尾相貫蓋自契至成湯八遷而自湯至祖乙又五遷也盤庚既承祖乙圯于耿之後將欲遷于殷之舊都故治亳殷而將居焉亳地名也殷亳之别稱也周希聖曰商人稱殷自盤庚始此言是也蓋自此以前惟稱啇而已自盤庚既都亳之後於是殷商兼稱或單稱殷也亳殷說者不同鄭氏云在河南偃師皇甫謐云在梁榖熟縣或云濟隂亳縣唐孔氏於此諸說莫知所從學者難以折衷而某竊以謂惟鄭說爲可從蓋偃師在河南其地實與周之洛邑相近乃四方朝覲貢賦道里取中之地惟其都邑之勢爲四方之所取中故商頌曰古帝命武湯正域彼四方又曰邦畿千里維民所止肈域彼四海又曰商邑翼翼四方之極使亳地非河南則商頌之言不應如此則知鄭說比諸家爲長鄭說既以亳爲偃師故於立政之三亳則解曰湯舊都之民服文王者分爲三邑其長居險故言阪尹蓋東成臯南轘轅西降谷也此說可信皇甫謐以榖熟爲南亳蒙爲北亳三處之地皆名爲亳則二亳之地隔絶緜亘乃數百里建尹立監必不如此之遼也皇甫謐又以爲湯居亳與葛爲鄰葛伯不祀湯使亳衆往爲之耕葛即今梁國寧陵之葛鄉也亳地在偃師去寧陵八百餘里豈當使民往爲之耕乎其地名不同說者變易數千年之後攷之葛鄉則信以爲近亳之葛此正孔氏以升自陑爲出其不意皆未可以爲定論也故冝推本鄭氏之說以爲偃師而以商頌之言爲證盤庚五遷將治亳殷其所遷之意說者不同鄭氏曰祖乙居耿奢侈踰禮土地廹近山川嘗圯焉至陽甲立盤庚爲之臣乃謀徙居湯舊都王肅云自祖乙五世至盤庚之兄陽甲宫室奢侈下民邑居墊隘水泉潟鹵不可以行政化故徙都于亳皇甫謐曰耿在河北廹山川自祖辛以來民皆侈靡故盤庚遷于殷此諸說大同小異而某竊以謂王肅之說爲當耿地乃漢皮氏縣之耿鄉其地沃饒近鹽祖乙不審于利害之實而徙居之其居之乆也爲水所圯而不可居蓋其地沃饒而塞障故富家巨室緫于貨寳傲上從康而不可教訓其閭閻之民則苦于蕩析離居而罔有定極盤庚於是謀居于亳蓋擇其髙燥之地而將使居之是舉也是小民之所利而富家之所不欲而唱爲浮言以搖動小民之情斯民不悟盤庚所以遷之之意而爲浮言之所搖動故自歎而怨亦皆不欲遷也盤庚乃登進庶民告之以所以遷都之意且戒羣臣無扇浮言以搖惑斯民之視聼使羣臣不敢肆爲過逸之言而民皆樂從以遷此三篇之所由以作也哀十二年左氏傳舉此篇以爲盤庚之誥則此三篇皆誥辭也然不曰誥者意其後世失之或者以其篇名既有上中下字爲其簡編之别遂從省文雖不加誥字實誥之體也王肅曰取其徙而立功但以盤庚名篇此則失之矣此書三篇皆是誥其民臣之言而其誥之者自有先後故分爲三篇而以上中下爲之别唐孔氏曰此三篇皆以民不樂遷開釋民意誥以不遷之害遷都之善也上中二篇未遷時言下篇既遷後事而上篇人皆怨上初啓民心故其辭爲切中篇民已稍悟故辭稍緩下篇民既從遷故辭復益緩此說是也王氏曰上篇告其羣臣中篇告其庻民下篇告百官族姓強生分别攷之於經而不合不可從也盤庚遷于殷民不適有居率籲衆慼出矢言曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台適之也言盤庚將遷于亳殷之地而民不肯之殷有邑居也率籲衆慼者先儒以籲訓和蘇氏曰盤庚知民怨故呼衆憂之人而誥誓之竊謂蘇說勝秦誓曰無辜籲天則籲之爲呼蓋常訓也矢陳也與臯陶矢厥謨夫子矢之之矢同蓋陳其所以遷都之意而告之也先儒以爲出正直之言則其意失矣我王蓋指祖乙也言祖乙自相而來既已居于此耿地耿地既圯將欲復遷于土厚水深之地而不忍重勞民也故曰重我民無盡劉劉殺也言民既勞矣而又驅之則幾於盡致之死地若有不忍之意也既不忍勞民以遷遂居于耿者五世其地潟鹵墊隘民終不得安其居是不能相正以生也不能相正以生我於是以卜而攷之而龜辭告我曰此耿地無若我何蓋謂苟留居耿則雖天命亦無如之何也蓋古者將遷國邑必以卜定之如緜之詩曰爰始爰謀爰契我龜曰止曰時築室于兹衛文公楚丘之遷亦曰降觀于桑卜云其吉終焉允臧蓋遷都大事也必决之以鬼神之智所以祈社稷無彊之永命也周官太卜國大遷大師則貞龜蓋凡卜筮之事無如遷都之爲重也先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈若顚木之有由蘖天其永我命于兹新邑紹復先王之大業底綏四方言自湯以來欽奉皇天之命而不敢違謂重卜筮之事而信之凡有事則必謹天命而稽焉其地雖未至於潟鹵墊隘猶且擇利而動至於今已有五邦矣案序曰盤庚五遷將治亳殷是自湯至于盤庚之遷併而數之方及五遷今此言不常厥邑于今五邦又繼之以今不承于古罔知天之斷命則是盤庚之前所遷者既有五邦矣攷之前序但有亳嚻相耿之四邦不知何以有五邦若併數盤庚之遷以爲五邦則不惟其文勢不應如此而又所遷者乃復歸于亳謂之五遷則可謂之五邦則不可故太史公謂祖乙自耿遷于邢而汲冡記年亦謂祖乙遷于奄此皆與序文相戾不可以爲據也意者自仲丁至于盤庚更有一遷而史家失之盤庚據其當時所見而言之故得其實歴世久逺不可臆決也夫商之先王既恪謹天命以取信于卜筮不常厥邑于今五邦我既卜之於龜而曰其如我何今乃不能率爾臣民而遷則是不能承先王恪謹天命之意是不承于古也不承于古則是不知上天所斷之命蓋天命汝以遷而汝乃不遷是違天命也況此亳殷之地乃我商家肈造基業之邦實王業之所自始也誠能往而居之則是從先王之烈能從先王之烈則是我商家既廢而復興如既顚之木由是而生蘖蘖蓋木仆而更生者也蘇氏曰木之蠧病者雖勤於封殖不能使復遂既仆而蘖生之然後有復盛之道此言是也惟天時人事之間蓋有不得不遷者如是天將永我啇家社稷無窮之命于此新邑苟遷而居之則可以紹復先王之大業以綏安此四方之民蓋邦畿千里之民得其所止然後可以肈域彼四海也古者先王之創業垂統以貽萬世無窮之業必有根本之地蓋其王業之所自天命人心之所繫其子孫守之則興不能守之則廢湯之亳文王武王之酆鎬是也案太史公曰殷自仲丁以來廢適而更立諸弟子弟子或争相代立比九世亂夫此九世之亂雖自於弟適爭立然亦由仲丁自亳遷于嚻之後失成湯根本之地故數百年間無有勃然興者盤庚既以耿地墊隘遂復居于成湯之舊都因其根本之地而據之商家社稷於是復興信乎其能紹復先王之大業厎綏四方也周自犬戎之亂平王東遷其後不復有還居酆鎬之意惟其失文武根本之地故東周之主雖傳數十世而皆陵遲削弱不得復起齊晉秦楚迭執其柄禮樂征伐自諸侯出而天子擁虚器於上而不能自立此無他惟其不能守根本之地故也是則盤庚之遷與不遷實商家社稷安危強弱之所繫使其惑於浮言横議而不克遷則是亦一東周也彼其所以丁寧告戒敷心腹腎腸而強其臣民以遷者是豈得已而不已者哉盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸箴夫耿之地潟鹵墊隘而有沃饒之利是故不利於閭閻之小民而利於富家巨室盤庚之將遷也始於富家巨室之不恱故扇爲浮言詭說以簧鼓斯民之視聽至其終也閭閻之小民亦皆相與咨怨不適有居利害之實於是亂矣然其間亦有審於利害之實而欲遷者則又往往爲在位者之所排擊沮難故不能自逹於上當此之時如人之一身風邪入其肌膚而亂其脉絡則其闗竅閉塞而不通苟不能救其所以受病之處而治之徒攻以毒藥與病勢爭於否塞之間則將有不可測者矣故人君當夫上下之情不通而人情否塞之時可以誠意感而不可以勢力較也盤庚知其然於是推原其所以受患之處謂夫民情之所以未喻者本夫富家巨室牟利自營傲上從康不能率由典法而肆其巧言以熒惑愚民使其欲遷之心鬱而不得伸故其斆于民者必自有位而始其教于在位者亦非作爲一切之新法以整齊而脅從之也惟舉先王之世其遷都邑也蓋有故事存焉今之遷都亦始於前世之故事使之正其法度而已其所以正其法度者無他使爾在位之人無或敢伏小人之攸箴也蓋小人之患於潟鹵墊隘而欲遷者有以其言箴規於上則汝無得遏絶其言使不得自逹也此蓋史官序述盤庚所以戒臣民之言而先緫其大意爲此數語以表見其當時上下之情既壅室而復通者由盤庚之能審其人情之變而處之得其當也蘇氏曰矇誦工諫士傳言庶人謗于市此先王之舊典正法也今民敢有聚怨誹疑當立新法行權政以一切之威治之盤庚仁人也其下斆于民者以常舊事而已言不造新令也以正法度而已言不立權政也曰無或敢伏小人之攸箴者憂夫百官有司逆探其意而禁民言也盤庚遷而殷復興用此道也夫此論甚善亦有爲而𤼵也當時王介甫變更祖宗之制度立青苖免役等法而當朝公卿下而小民皆以爲不便而介甫決意行之其事與盤庚遷都相類故介甫以此藉口謂臣民之言皆不足恤然所以處之則與盤庚異者盤庚斆于民由乃在位以常舊服正法度而介甫一以新法從事盤庚言無或敢伏小人之攸箴而介甫則峻刑罰以繩天下之人言新法之不便者故雖以盤庚自解說而天下之人終不以盤庚許之者以其迹雖同而其心則異也非特天下之人不許之以盤庚之事而介甫亦自知其叛於盤庚之說其解盤庚又從而爲之辭以爲其新法之地而既曰無或敢伏小人之攸箴者斆之以無自用而違其下而又曰治形之疾以箴治性之疾以言小人之箴雖不可伏然亦不可受人之妄言妄言適足以亂性有至於亡國敗家者猶受人之妄刺非特傷形有至於殺身者矣故古之人堲讒說放淫辭使邪說者不得作而所不伏者嘉言而已觀王氏此言其與誦六經以文奸言者何以異哉蘇氏之言爲王氏而𤼵也雖爲王氏而𤼵實得盤庚斆民之意非奮其私意與王氏矛盾也王命衆悉至于庭王若曰格汝衆予告汝訓言使自羣臣以下至于庶民咸得至于庭也周官小司冦掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷盤庚蓋將遷都而謀于民故使臣民皆至于外庭也王若曰格汝衆予告汝訓者蘇氏曰書凡言若者非盡當時之言大抵若此而已格汝衆者呼之而使來也我將告之以予志之所欲言者自此而下皆爲羣臣之扇爲浮言以感流俗而𤼵也蓋上文所謂盤庚斆于民由乃在位者也汝猷黜乃心無傲從康夫天下利害之實煥終甚明不難知也人主心平而氣定上不爲名所惑下不爲利所怵者類能知之惟其心之所存一惑於利害之私則將見其利而不覩其害而利害之實亂矣遷之利與不遷之害在盤庚之時蓋可以一言決也然其羣臣乃以不遷爲利遷爲害者惟其貪於沃饒之利習於奢侈之俗此二者撓於胷中故致於傲上從康而不自知其非故盤庚告之也始則告之以一言曰汝猷黜乃心言汝欲知遷都之利害先當謀黜去汝之私心也苟去汝之私心則利害之實不爲物蔽而漸以明審必不至於傲上而不肯遷亦不至於懐安而不欲遷也故繼之以無傲從康古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚予弗知乃所訟非予自荒兹德惟汝含德不愓予一人予若觀火予亦拙謀作乃逸既告以黜其私心無傲上從康矣此又稱先王之時其臣皆從先王之命令而無敢逆之者即上文以常舊服正法度是也古我先王者蓋泛指成湯及殷之賢君舊人者亦泛指先王之臣也言我先王之謀任舊人與之共政也王播告之修者此言王亦指先王也不言先王者變上之文也播告之修言舊臣之事先王先王使之播告其所修之政於天下而舊臣則能不隱匿其旨志故先王用大敬之而舊臣所敎之㫖又無過逸之言以扇惑民聽故民用大變蓋上焉爲王之所欽者以其不匿厥指故也下焉爲民之所從者以其罔有逸言故也而今之羣臣乃不以盤庚遷都之意告民而乃扇爲浮言以恐動之此民之所以不至于丕變而王之所以不至于丕欽也故繼而責之曰今汝聒聒起信險膚予弗知乃所訟言汝今乃聒聒終肆爲多言務以險膚之說起信於人我意不知汝所訟言者果何謂也險謂恱害而幸災膚謂淺近而不由中此二者雖皆誕妄無實而皆有以取信於流俗也在流俗則信之而自知者觀之則弗知乃所訟也弗知乃所訟者言我之不知汝所言者果何謂也王氏曰不夷謂之險不衷謂之膚此論甚善而繼之曰造險膚者所不待敎而誅此言大害義理夫盤庚斆于民由乃在位則是爲險膚之言者皆敎之而不忍誅也今曰造險膚者不待敎而誅則是盤庚之時必誅其造險膚者此蓋王氏借此言簧鼓以惑天下欲快意於一時老成之人言新法之不便者皆欲指爲造險膚之人而悉誅也不仁之禍至六經而止王氏乃借六經之言欲以肆其不仁之禍是可歎也言汝不能如先王之臣不匿厥指罔有逸言而乃聒聒然起信險膚我反求之不知汝所說則是非我一人自荒廢兹德不能如先王之圖任舊人共政也乃是汝之羣臣恃我有寛容之德含其恩惠故不畏懼我一人而肆爲險膚之言也汝既不畏懼我一人而肆爲浮言我不於其始萌之時而遏絶其勢今乃至於無所忌憚以簧惑流俗之聽舉國之人皆相與咨嗟而不適有居是我之於汝譬若觀火不於熒熒之時而撲滅之遂至延蔓而不可救是我之拙謀成汝之過此蓋自責盤庚既以不加刑罰撲滅於熒熒之初以成其浮言之過爲拙謀則冝以刑威日脅之而使從者其謀爲不拙矣然終不肯去彼而取此者蓋無欲速無見小利者王者之政也欲速則不達見小利則大事不成雖脅民而從之無益也若網在綱有條而不紊若農服田力穡乃亦有秋王氏曰若網在綱有條而不紊者言下從上小從大則治此申前無傲之戒若農服田力穡乃亦有秋此申前無從康之戒蓋綱者網之索也舉其索則網之目皆有條而不亂服田力穡謂盡力於播穡之事則享有秋之利此蓋能近取譬以喻其意也彼羣臣之所以扇爲浮言而不肯遷者惟其傲上故偃然自肆而不畏懼於天子之命令惟其從康故偷安朝夕而憚於勞苦之事故設爲此譬以喻之使知下之於上若網在綱則固將無傲矣如欲享其利者必若農之服田力穡則固無從康矣此蓋優游饜飲使之曉然知利害之實而者無絲毫強之者此其所以爲王者之政也汝克黜乃心施實德于民利害之實既如網之在綱農之力穡其理灼然可見汝當能黜去汝傲上從康之心以施其實德于民蓋羣臣所以肆爲浮言簧鼓流俗使之不肯遷者其言必以謂遷則害于民不遷則無害也觀其言若有德于民非實德也曽子有疾童子請易簀曽元曰夫子之病革矣不可以變幸而至于旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息蓋不以德愛之而徒以姑息愛之是細人之愛人也羣臣之不肯震動萬民以遷是愛人以姑息也盤庚之意是愛人以德也故云黜其私心以施實德于民亦欲其以德愛人不出于姑息也至于㛰友丕乃敢大言汝有積德言民被實德則汝之㛰姻僚友亦皆被實德矣彼其所以媒利自營者徒以爲㛰姻僚友之計而不能爲民深謀逺慮故其德之及於㛰姻僚友而已苟能黜其私心施實德于民則民受其賜而汝之㛰友亦皆受其賜矣能如是我乃敢大言汝有積德蓋汝有積德之實我云不爲溢羙矣必曰積德者蓋指世臣也此篇言古我先王亦惟圖任舊人共政下文言曰古先哲王暨乃祖乃父胥及逸勤則是所誥者大抵是世臣巨室故以積德爲言蓋謂如是則無忝於先王之德也乃不畏戎毒于逺邇惰農自安不昬作勞不服田畝越其罔有黍稷戎大也言苟無所畏慎肆其傲上從康之志大流毒于逺邇如怠惰之農肆其自安不黽勉以作勞苦之事不服於田畝則不獲有秋之利而罔有黍稷矣盤庚之斆于民欲使在位羣臣黜其傲上從康之心而其譬喻必以農爲言既曰若農服田力穡乃亦有秋而又曰惰農自安不昬作勞不服田畝越其罔有黍稷其論農之勤惰如是之詳者蓋耿之地沃饒而近利斯民習於奢侈之日久人亦有言曰自儉而奢易由奢而儉難盤庚將欲率其奢侈玩習之人而使之居於亳殷之地負山阻險非勤非儉則不能享其生生之樂不如耿之近利也昔公父文伯之母曰昔聖人之處民也擇瘠土而處之勞其民而用之故能長有天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民多不節淫也瘠土之民莫不嚮慕義也盤庚之遷意在此然將使民去奢而即儉去逸而即勞故在位扇其浮言而民皆有怨咨之意是以言其勤則有所獲而惰則無所獲矣蓋民生在勤勤則不匱苟爲不勤而有所獲是所謂不稼不穡胡取禾三百㕓兮此不祥之大者也張平子西都賦云盤庚作誥率民以苦此言眞得盤庚之意孔子曰不敎而殺謂之虐不戒視成謂之暴夫所謂暴者非至紂之炮烙秦之參夷然後有此名也苟臣民之有頑怠傲狠不順其上政令者不加教戒使知利害安危之所在而遽爾刑之則是暴虐矣盤庚之遷不忍暴虐其臣民故雖其世臣巨室傲上從康以鼓惑流俗之聽而閭閻小民惑於流言方相與咨怨而不適有居此誠中才庸主有所不堪而盤庚且諄復􅈤到先曉之以禍福安危之理不啻若父兄之敎子弟此非故爲是優游不斷之政不能赫然奮其乾剛之斷也蓋以爲脅以刑罰使臣民強勉以從已固不若敎之戒之化之使之憤然知遷都之爲利而不遷之爲害中心恱而誠服也與之共享其安逸而無一旦卒然不可測之患矣是以自此而下其言莊重峻訐責之也深而慮之也至其要務欲使知夫長惡不悛者典刑之所不赦然後黜其傲上從康之心而樂事赴功無強勉不得已之意此誠忠厚之至也汝不和吉言于百姓惟汝自生毒乃敗禍姦究以自災于厥身白博士曰詩云辭之輯矣民之洽矣辭之懌矣民之瘼矣辭輯則所謂和言也辭懌則所謂吉言也此說是也言汝之羣臣不能平其心定其氣和順恱懌其言以曉百姓之未悟者而徒肆其浮言以惑之欲其沮遷都之議然此遷都之計乃上合天心下從人欲必非羣臣之所能沮也汝徒自生毒惡至于敗禍姦宄以自遺災于汝身而已謂自災于厥身者蓋頑嚚終不率教則刑罰及之非我一人忍於用刑也是汝之敗禍姦宄而自取之也乃既先惡于民乃奉其恫汝悔身何及此言我之所以望爾羣臣者蓋以謂民之愚有未知遷都之利害者必資爾以訓廸而開道之今乃先肆惡而不肯廸民亦從而胥怨是先惡于民也爲臣而先惡于民使天下騷終而不寧苟長此惡而不悛則將自成其疾痛䧟於罪戾雖悔之而身何所及也相時憸民猶胥顧于箴言其𤼵有逸口矧予制乃短長之命相觀也與相在爾室之相同蘇氏曰憸民小人也視此小人猶相顧于箴規之言恐其言之𤼵也或有口過以取禍彼小人于箴規之言猶畏之如此況我以萬乗之威勢生殺之權在予掌握制汝短長之命而汝乃傲上從康曽不之畏是小人之不若也汝曷弗告朕而胥動以浮言恐沈于衆夫爲臣之義有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之德則民情愛戴而不忘古者忠臣之事君莫不能然而盤庚之羣臣反是故其責之以謂汝苟心知遷都之未爲利又何不入告于我而乃相摇動浮言恐動沈溺此下民也王氏曰恐謂恐動之以禍患沈謂沈溺之於罪戾此言是也白博士曰實德者浮言之反也言浮則無實實則不浮此說亦是惟當時羣臣惟務以無實之浮言恐沈于衆故盤庚之所以告之者惟欲其施實德于民如良醫之治病有此病則有此藥也盤庚之臣内則不以遷都利害入告于后惟動以浮言恐沈于衆則是失夫爲臣之義而刑戮之冝加也若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非予有咎言縱使汝之勢燄若火之焚燎于原野不可廹近而我之威權猶可撲滅譬汝雖強惑終不免於撲滅則是汝羣臣自有謀不善故陷于刑戮非我有過也此篇文勢大抵反覆辯論以盡其意故其言終始亦相顧成文既曰若農服田力穡乃亦有秋又曰惰農自安不昬作勞不服田畝越其罔有黍稷既曰予若觀火予亦拙謀作乃逸又曰若火之燎于原不可嚮邇其猶可撲滅文雖渙散而意實相貫以是知盤庚之言雖詰曲聱牙而不可遽曉然反覆而求之於人情則近也遲任有言曰人惟求舊器非求舊惟新遲任在籍無所攷見鄭氏曰古之賢史也義或然也案論語周任有言曰馬緫以謂周之良史蓋古之史必賢而有文者爲之故多立言以爲法於世史佚曰無始禍無怙亂蓋立言者史之職鄭氏以遲任爲賢史料必有據而云耳盤庚所告者大抵皆世臣巨室故舉古賢史遲任之言曰人惟求舊器非求舊惟新言器舊則敝器至於舊則必易新者而人則不厭其舊也人不厭於舊故我於爾羣臣自乃祖乃父以來用之於位以至於爾子孫而不廢也此雖有器非求舊惟新之言而盤庚舉此者但以證人惟求舊耳攷下文則繼之以古我先王曁乃祖乃父胥及逸勤以至於不敢動用非德文勢首尾實相類者無取於器非求舊以爲新邑之喻如蘇氏曰人舊則習器舊則敝當使舊人用新器我今所以從老成之言而遷新邑也王氏曰以人惟求舊故於舊有位之臣告戒丁寧不忍遽爲殄滅之事以器非求舊惟新故不常厥邑至於今五遷也此皆求之之過也古我先王曁乃祖乃父胥及逸勤予敢動用非罰世選爾勞予不掩爾善兹予大享于先王爾祖其從與享之作福作災予亦不敢動用非德予告汝于難若射之有志古我先王曁汝羣臣之祖父相與同其勞逸以成我商家之基業是皆有大造于商家社稷冝其子子孫孫世享福禄與商家社稷同爲無窮則我於爾羣臣豈敢動用非罰以加於汝非罰謂罰非罪也惟我以爾祖爾父與先王胥及逸勤故加惠于爾子孫而不敢以非罰加汝於是世世選用爾勞于國者不掩蔽爾善而使之居于列位以無忘乃祖乃父之德則是我能盡求舊之意而所以待爾者之厚汝苟不能忠於國家而肆其傲上從康之志以沮敗朝廷之大事獲戾于先王則我雖私汝而不誅亦有不敢也故繼之曰兹予大享于先王爾祖其從與享之作福作災予亦不敢動用非德予告汝于難若射之有志周禮司勲云凡有功者銘書於王之太常祭於大烝司勲詔之蓋古者有大勲勞於王室皆得配享於廟觀盤庚此言泛告在位之羣臣而曰兹予大享于先王爾祖其從與享之則是古者配食凡有功者皆得與焉而司勲之所掌亦無定數也此又古今之禮異不可不論也大享謂大烝之類言我之祭享于先王之廟爾之祖亦從於廟而與享彼鬼神之情聦明正直福善禍淫若影響之應形聲無有差忒者既先王與乃祖臨之在上質之在旁善則作福不善則作災不容私於其間則爾之至於傲上從康先惡于民敗禍姦宄以自災于厥身予其敢動用非德而赦汝乎言罰之與德皆簡在先王與乃祖之心而非我之所敢私也惟其賞罰生殺之權必視我先王與乃祖之所予奪苟有毫髪之私不合乎先王與乃祖之心則我無所逃其責矣故予告汝以用賞罰之難若射之有志志正鵠也射必中夫正鵠者差於此者有毫釐之間則失於彼者在尋丈之外我所用賞罰之難亦若是也賞必當功無功而賞賞則爲僭罰必當罪無罪而罰罰則爲濫其間亦不可有毫釐之差也故爾之無罪則我不可動用非罰苟爾之有罪則我亦不可動用非徳罰與德皆爾自取而我之用刑賞者惟欲適其當而無容私於其間則汝當知所趨避而無陷於刑辟故敎之所加如下之所言者也汝無侮老成人無弱孤有幼盤庚之遷避害而就利則當時之能深思逺慮者亦必有以遷爲利以不遷爲害而爲當時羣臣扇以浮言使其說不得伸其老成人則以爲昬耄無知而侮之其小者則以爲孤幼而弱之侮其老而弱其少則彼雖欲逹其箴言於上而無由盤庚而告之以無侮老成人無弱孤有幼蘇氏曰有又通猶言孤與㓜也此說是也各長于厥居勉出乃力聽予一人之作猷無有逺邇用罪伐厥死用德彰厥善汝既無以老成之人而侮之無以孤與幼而弱之則冝各思長久于所居而勉出乃力以聽我一人之謀而從我遷也能從我以遷則是與我胥及逸勤此賞之所冝加不從以遷則是傲上從康此罰之所不赦我亦何容心哉無有逺邇待之如一爾有可死之罪我用可罰之刑以伐汝有可彰之善則我用命德之賞而旌汝賞之與刑無非爾之所自取也邦之臧惟汝衆邦之不臧惟予一人有佚罰凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔邦之臧是汝衆能黜其傲上從康之心而從我以遷也邦之不臧是我一人之威令不行於臣下失其政刑而不誅爾浮言之人也佚失也酒誥曰羣飲汝勿佚盡執拘以歸于周予其殺則佚罰云者蓋行姑息小惠從有罪而不誅之謂也盤庚之意謂我一人既不敢有佚罰則爾衆當戒懼恐謹無陷於罪辜至於陷罪則我必不佚汝也故遂繼之曰凡爾衆其惟致告爾羣臣以至於庶民各相告語自今以往至于後日各恭敬爾所治之事整齊爾所居之位度乃口而無肆爲浮言蓋所謂非先王之法言不敢道苟不能盡是三者則罰及爾之身雖欲悔之亦弗及矣孔子曰予無樂乎爲君惟其言莫予違也蓋人主天下之利勢生殺予奪之權在於掌握言出於口則羣臣百姓憚其威畏其命而無敢有違之者此誠人君之所樂也而盤庚之遷其羣臣以傲上從康而肆爲浮言以逆上之令其百姓相與咨怨而不適有居命之而不聽率之而不從固已異乎言而莫予違也使盤庚以夫人主之利勢而與之較驅之以刑罰而使之遷則亦誰敢違之者今其言乃反覆勸諭若將有所甚畏者既告之以其祖父所以事先王者如此又告之以先王與乃祖父胥及逸勤予不敢動用非罰其言蓋若不忍加刑罰於臣民而曲折其辭以冀其從已夫貴爲天子富有四海一有所欲爲而爲臣下之所沮抑也如此又不敢以其勢力而與之較則亦何樂於爲君哉蓋得天下有道在得其民得其民有道在得其心得其心有道所欲與之聚所惡勿施爾盤庚之所欲遷者惟欲聚民所欲而去民所惡者耳欲聚民之所欲去民之所惡而先以勢力與臣民較以失民之心則雖能強之使遷而天下亦自此危矣故寧爲是優游不忍之辭以開諭其心而使之知吾所以聚民所欲去民所惡之意故不失乎民之心而亦不害其所以爲遷者此盤庚所以大過人也尚書全解卷十八
