body:
  text: 尚書全解卷十宋林之竒撰禹貢夏書導岍及岐至于荆山逾于河序言禹别九州隨山濬川任土作貢蓋此書之大槩一篇而三致意焉自冀州既載壺口至西戎即敘皆以名山大川奠九州之疆界史官因敘九州之疆界遂及其治水曲折與夫田賦貢篚通於帝都之道各隸於逐州之末此序所謂别九州也自導岍及岐以至于敷淺原所謂隨山也自導弱水以下至于又東北入于河所謂濬川也夫禹之治水本導川澤之流而歸之於海乃先之以隨山者蓋洪水之為害蕩蕩懷山襄陵浩浩滔天凡故川舊瀆皆為水之所浸滅不復可見將欲施功無所措也故必先順因其勢以決九川髙山巨鎮不為水之所墊沒者以為表識自西決之使歸於東以少殺其滔天之勢水既順流而下漸入于海則川瀆之故迹稍稍可求於是始可以決九川而距四海蓋先隨山而後濬川此禹治水之序也先儒論此多矣如馬融王肅皆以為三條導岍為北條西傾為中條嶓冢為南條鄭元以為四列謂導岍為正隂列西傾為次隂列嶓冢為次陽列岍山為正陽列其首尾延連相及則孔氏之意亦必與馬鄭同案輿地圖此衆山相距逺者千餘里近者亦數百里既有平地川澤之隔於其間則其勢豈可以相屬邪經文言曰導曰至曰逾曰入皆是指懷襄之水而為言也而先儒則謂指山而言夫山者靜而不動之物安得逾于河入于海過九江乎此一段文義甚明白以先儒有三條四列之説必欲以衆山首尾相屬故其説多牽強而不通夫觀書者必視其書之所由作然後其義易曉禹貢之書本為治水而作其言所導之山蓋主於決懷襄之水而為言也何取於山之條列哉或人問楊子雲曰天地簡易何五經之支離楊子曰己簡巳易焉支焉離此言可以為治經之法蓋經本簡易人自為支離爾地理志云吳嶽在扶風岍縣西古文以岍山岐山在美陽西北荆山在懷德縣三山皆在雍州蓋禹之隨山先導岍岐山旁之積水使下流於荆山之旁然後自荆山而逾于河謂掠河之故地而過也此所謂逾于河其後為龍門河蓋自河之西越之而東矣唐孔氏云逾于河謂山逾之也此處山勢相望越河而東夫謂山勢相望於河之兩岸固為無害若謂山能越河而東則無此理既以逾于河為越河而東矣而又謂此處山不絶從此而渡河則是逾于河之一句遂有兩説其自相矛盾也如此蘇氏曰隨山者隨其地脈而究其終始何謂地脈地之有山猶人之有脈也有近而不相連者有逺而相屬者雖江河不能絶也自秦蒙恬始言地脈而班固馬融王肅治尚書皆有三條之説古之逹者蓋巳知此矣北條之山首起岍岐而逾于河以至大嶽東盡碣石以入于海是河不能絶也南條之山首嶓冢恆山至于衡山過九江至于敷淺原是江不能絶也非地脈而何夫蘇氏謂地之有山猶人之有脈此論是也古之人蓋有論地脈之詳者如唐一行謂天下山河之詳存乎兩戒北戒自三危積石負終南地絡之隂東及太華逾河並雷首析城王屋太行北抵常山之右乃東循塞垣至濊貊朝鮮是謂北紀南戒自岷山嶓冢負地絡之陽東及太華連商山熊耳外方桐柏自陪尾南逾江漢抵武當荆山至于衡山乃東循嶺徼逹東甌閩中是謂南紀以一行之言觀之是知地脈之説不無有也先儒三條四列之説意亦以地脈為言然禹貢之書本載治水本末而一行之言則將以山河兩戒分屬周天分野之星其所以言者不同則亦不可一槩論也故論此篇者但當觀其決懷襄之水以殺滔天之勢而不應以地脈言也蘇氏之説今所不取壺口雷首至于太嶽底柱析城至于王屋地理志云壺口在河東北屈縣東南雷首在河東蒲坂縣南太嶽漢孔氏曰在上黨西地理志云在河東彘縣東蓋彘縣近於上黨故云在上黨西也底柱顔師古曰在陜縣東北山在河中形若柱也曾氏曰底柱前志皆曰今陜之三門是也鄭氏曰案地説河水東流貫底柱觸閼流今世之所謂底柱者蓋乃閼流也底柱當在西河余嘗詳考地説言河水東流貫底柱而經言東至于底柱當在南河明矣鄭氏以為當在西河誤也曽氏之説與顔氏同唐孔氏以底柱在太陽關中案地理志太陽關與陜相近當亦是指陜之三門而言也地理志析城在河東濩澤縣西王屋在河東垣縣北此六者其形勢相望為近禹既導岍及岐逾于河矣遂迤邐經歷此六山也太行恆山至于碣石入于海太行山在河內山陽縣西北恆山在常山上曲陽縣西北碣石在北平驪城縣西南此三山者其相距皆千餘里蓋水之東北流以注于海東北之山惟此三山為最大故其相距雖甚逺而其文相屬也唐孔氏曰太行去恆山太逺恆山去碣石又逺故漢孔氏則以此二山連延東北接而入滄海言山傍之水皆入海山不入海又云百川經此衆山禹皆治之川多不可勝名故以山言之謂漳潞汾涑在壺口雷首太行經底柱析城濟出王屋淇近太行恆衛滹沱滱易近恆山碣石之等也據二孔之意蓋以謂此衆山既相去各有千餘里其勢不能相屬又山不可以入海故為此説王氏又謂導山者導山之澗谷而納之川也意亦與二孔同是皆支離之説也西傾朱圉鳥鼠至于太華熊耳外方桐柏至于陪尾鄭氏四列之説以導岍為正隂列西傾為次隂列嶓冢為次陽列岷山為正陽列其分隂陽正次之列本非經意然而以此文分為四假則為可信蓋禹之隨山有此四節也自導岍及岐至入于海一也自西傾至于陪尾二也自嶓冢至于大别三也自岷山至于敷淺原四也此四者皆是自其水發源之處導其逐山之旁積水注於下流之地然後隨其山澤而施功焉然此四者或言導或不言導曽氏曰嶓冢與岷山皆梁州之界岷山不言導者其文上蒙於導嶓冢也岍與西傾皆雍州之界西傾不言導者其文上蒙於導岍也岍與嶓冢皆别言導者以其冀州故文不相因也此説是也西傾山在隴西臨洮縣西南朱圉在天水冀縣南鳥鼠在隴西首陽縣西南渭水之所出此三山皆雍州之南山也太華在京兆華隂縣南禹既導岍之積水迤邐而入于海矣遂自西傾朱圉鳥鼠導其積水以至于太華蓋逾梁州之東境也熊耳山在洪農盧氏縣東伊水之所出嵩髙山在潁川嵩髙縣古文以為外方山水經亦云外方山嵩髙是也桐柏山在髙陽平氏縣東南淮水之所出橫尾山在江夏安陸縣東北古文以為陪尾山者四山皆在豫州之界也此蓋言水自西傾朱圉鳥鼠由太華而東經熊耳外方桐柏三山然後至于陪尾也漢孔氏曰熊耳外方桐柏陪尾四山相連而於鳥鼠至于太華則相首尾而東蓋熊耳等四山其勢相近故以相連言之至于鳥鼠太華相距甚逺則云首尾夫山之與水其勢既相遼絶矣安能相首尾乎水之萬折必東固理之常然謂山能相首尾而來尤為無義導嶓冢至于荆山內方至于大别此文不與至于陪尾相連蓋又自為一段也嶓冢在隴西西縣漢水所自出也至于荆山蓋漢水未得由地中而行故其自嶓冢而導之也則注于荆山之旁此荆山即南郡臨沮縣之荆山也與導岍及岐至于荆山之荆異也地理志云章山在江夏竟陵縣東北古文以為內方山也左傳曰吳既與楚夾漢楚乃濟漢而陳自小别至于大别則大别者近漢之山也水經自巴水出雩樓縣之下靈山即大别山也決水亦出此山世謂之分水山鄭元云大别在廬江安豐縣地理志云六安國安豐縣有大别山據安豐雩樓皆在廬江郡此數説皆同然而若以大别在廬江則去漢甚逺而左氏傳云濟漢而陳自小别至于大别不知其謂何漢志六安國有大別如唐孔氏乃謂地理志無大别此亦不可曉岷山之陽至于衡山過九江至于敷淺原此亦别為一段不與至于大别相連岷山在蜀郡湔氐道西岷山之陽岷山之南也衡山在長沙湘南縣東南九江即荆州所謂九江孔殷是也地理志豫章歷陵縣南有博陽山古文以為敷淺原禹既導嶓冢荆山之積水至于大别矣於是又自西鑿導岷山之水至于衡山迤邐掠九江而過以至于豫章之敷淺原也隨山之功於此畢矣孟子曰禹之治水水之道也惟其治水欲順水之道而當其浩浩滔天懷山襄陵則水之道不可得而見矣禹於是隨此衆山治其山旁之積水決之于下流以殺其滔天之勢然後水之道可得而求故自此而下言及夫濬川之事也然而於導岍及岐之末則言至于碣石入于海而其餘三者則或曰至于陪尾或曰至于大別或曰至于敷淺原而皆距海尚逺者蓋岍岐所導江水乃合河濟之流最為奔走突悍當其隨山之初自西而決之東自東而決之於東北則已逹于海矣彼西傾嶓冢岷山所導之水則未能徑逹于海必且注于下流之地及濬川之功既施乃得入海下文所載方是衆水入海之道也凡此皆是行其所無事不拂其水性以求近功也惟夫決懷襄之水導之於下流之地然後自下流而導之以入于海故此所載皆以冀雍梁豫州之山揚州惟一敷淺原而已其下流之地如青徐兖之山皆所不載蓋隨山之功自髙而下自東而西故不及夫下流之山也導弱水至于合黎餘波入于流沙前所言皆隨山之事也此方及濬川也孟子曰當堯之時水逆行泛濫於中國蛇龍居之民無所定上者為巢下者為營窟書曰洚水警豫洚水者洪水也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也夫禹之治水所以能成功者惟使水由地中行而已將使水由地中行苟不決懷襄之積水以殺滔天之勢則故川舊瀆皆巳浸滅將欲施功無所措也必先決山陵之積水使皆有所歸矣然後濬川之功可得而施也蓋導岍及岐至于荆山逾于河壺口雷首至于太嶽底柱析城至于王屋太行恆山至于碣石入于海則河濟之功可得而施也西傾朱圉鳥鼠至于太華熊耳外方桐柏至于陪尾則淮渭之功可得而施也導嶓冢至于荆山內方至于大别則漢水之功可得而施也岷山之陽至于衡山過九江至于敷淺原則江水之功又得而施也惟其濬川之功自隨山而始故經文所載水之先後如此惟其治水不失乎先後之序此其所以能使水由地中行則遂以定懷襄之難而使斯民免為巢之厄此其所謂行其所無事也鯀惟不知乎此故為隄防之障水於地上懷襄之流不使之有所歸而乃湮之以土以與水爭勢於衆山之間此所以九載績用弗成也是以鯀之治水謂之湮湮者拒而湮之也禹之治水謂之導導者順而導之也是以行其所無事也故經之所載隨山濬川皆以導為言蓋本其所以治水之意也自弱水至于洛水凡有九川故太史公於夏本紀以導九川三字冠於導弱水之上蓋太史公之意以下文有九川滌源之語而此所載通有九水遂以導九川為言而於上文導岍及岐之上亦以為導九山然書所導之山凡二十有七太史以為九山者蓋謂山之自某而至某者凡有九矣然而自某至於某者蓋有十不得以為九矣使山之言至者果有九亦非經之本意也况不止九乎夫下所謂九山刋旅九川滌源者蓋泛指九州之山川也司馬子長配合附會而為此説不可信也上文所導之山如河濟淮渭江漢大略巳可見矣下文所導之水則申結上意以足其義蓋終始相因之辭也前有導岍及岐而下則此所導之川遂及於河濟前有西傾朱圉鳥鼠而下則此所導之川遂及於淮渭前有導嶓冢而下則此文遂及於導漢水前有岷山之陽而下則此文遂及於導江皆相因之辭也惟弱水黑水之文前無所屬後無所結而經文序此二水既屬于導山之次而貫於衆水之上蓋此二水皆在塞外也當夫洪水未平之初則亦漂悍遂流入於中國則與滔天之勢合而為一不可復辨禹之施功如導岍及岐以至西傾嶓冢岷山皆從西導之以歸於東中國之水既巳折而東之則弱水黑水逆流入於塞內始可得而辨於是順因其勢而别之一則歸于南海一則歸于流沙然後河濟淮渭江漢各受其所出一源之水與夫所合之流以歸于海故經文所載先言弱水黑水然後及其餘也弱水源出張掖刪丹縣亦謂之張掖河桑欽以謂導弱水自張掖刪丹西南至酒泉合黎在酒泉會水縣東北蓋弱水之流自張掖刪丹縣導之以至於酒泉郡今合黎郡是也合黎孔氏以為水名鄭氏以為山名顔氏曰此水出於合黎因山為名據經云至于合黎餘波入于流沙則流沙是合黎水鍾之地故得溢其餘波以被于流沙猶導菏澤被孟豬也以是知孔氏以合黎為水名是也漢志曰居延澤在張掖郡居延縣東北古文以為流沙水經亦云居延澤在居延縣故城東其形如月生五日然唐孔氏嘗疑其此言以謂酒泉郡在張掖西居延屬張掖合黎在酒泉則流沙在合黎之東據經文合黎當在流沙之東不得在其西也孔氏此説依按經傳言有所據然顔師古曰流沙在燉煌西此説合於經文當以顔氏之説為正益稷曰豫決九川距四海此篇終言東漸于海西被于流沙朔南暨聲教訖于四海下文言訖于四海其上言西被于流沙則此流沙者蓋是西海之水也然不言西海而言流沙者蓋水入居延澤中遂不可見不可以正名其為西海也西漢末蒙良願獻鮮水海允谷鹽池王莽奏言今巳有東海北海郡獨未有西海請受良願獻地置西海郡由是觀之則夫西海之名起西漢之末自漢巳前未嘗正名其為西海也雖未嘗正名其為西海然以其水之所歸而言之則亦可以言訖于四海也導黑水至于三危入于南海黑水顔師古曰出張掖雞山南流至燉煌過三危之山又南流至南海蓋三危在燉煌之南也然而張掖燉煌皆在河北黑水果出張掖過燉煌則豈得越積石之河以入于南海哉唐孔氏曰河自積石以西皆多伏流故黑水得越而南也據黑水從西北歷數千里以流入于南海其流當甚大豈有河流伏於其下黑水得越其上之理唐孔氏蓋順經文配合地理家而為之説不足信也張掖果是黑水所出三危果在燉煌則其南流以入于海也當與河流相礙蓋張掖燉煌皆在河北故也此説難以折𠂻姑闕之以俟博學之君子三危距南海凡數千里禹之導黑水也至三危即得黑水之故道遂從此以逹南海蓋其間數千里不加人功修治故經載此水至于三危即曰入于南海蓋惟自其施功者言之其實三危距南海甚逺也漢武元封二年始開滇王國為益州郡郡內有滇池縣有黑水祠是黑水南流當歷西南夷數國之地然後能如經之所載黑水西河惟雍州華陽黑水惟梁州西黑水起張掖入南海是此水發中國之西北入於中國之西南亦猶河流發於西北而其入海在於東北蓋水之綿亘未有如此二者之逺也且弱水黑水雖其浩蕩瀰漫為中國害然而既決之於塞外則是注於蠻夷之地自常情觀之則可以勿恤矣而禹之心方且通華夷之民無此疆彼界之殊雖塞外之水亦必為之順而導之其一注于流沙其一注于東海蓋蠻夷之民亦免昏墊之患此禹之德所以同夫天地之無不覆載也白圭曰丹之治水也愈於禹孟子曰子過矣禹以四海為壑今吾子以鄰國為壑水逆行謂之洚水洚水者洪水也夫白圭欲使其國之民免於昏墊而遂決之於他國是以此之洚水移而為彼之洚水其不仁孰甚焉漢武帝時齊人延年言河出昆崘逾中國注渤海是其地勢西北髙而東南下可案地圖開大河上嶺出之湖中如此則關中長無水災北邉不憂胸奴延年之言與白圭之見無異夫弱水黑水本是塞外之水禹既決之於塞外猶必為之順而導之以歸于流沙南海然後其心安焉河流本為中國之患豈可以中國之患而決之於夷狄哉本國景德澶淵之役北虜請和既巳退師議者請進兵襲擊之真宗皇帝曰契丹幽薊皆吾民也何以多殺為大哉聖人之言與禹之心若合符契矣導河積石朝補之曰洪範五行一曰水其浸海其發注為江河淮濟實惟四瀆而河為四瀆宗三王之祭川所以先河而後海為務本故也岷山導江導淮自桐柏導沇水東流為濟其道里近而導河積石其道里逺又其源壯而流激故禹治四瀆施功於河為多朝氏此説甚善惟其施功於河為多故於載弱水黑水之下即序導河之詳也河源去中國逺甚爾雅山海經穆天子傳淮南子桑欽酈道元諸書皆以謂河出昆崘墟案漢西域傳張騫所窮河源云河有兩源一出蔥嶺一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海一名鹽澤去玉門關三百餘里廣袤三四百里其水停居冬夏不增不減皆以謂潛行地下南出于積石為中國河夫騫雖窮河源而實不見積石而上河流相接之處所見者惟蔥嶺于闐耳徒見此二河注蒲昌海則一為復流南出此但以意度之非誠然也夫騫親至西域且以窮源為名而其所見止於如是以是知諸書所言河源皆未足信太史公曰禹本紀言河出昆崘昆崘髙二千五百餘里日月所相隱避為光明也自張騫使大夏之後窮河源惡覩所謂昆崘者乎故言九州山川尚書近之矣班孟堅之説亦然蓋積石而西河流之詳不可得而考據經言導河積石至于龍門則論河流者惟當斷自積石為始積石以西闕而勿論可也顔師古曰積石在河關西羌中水經云河水重源發於西塞外出於積石之山山海經云積石山下有石門河水冒以東北流出在西羌中僥當所居漢延喜中西羌僥當犯塞紀明討之追出塞至積石而還是知積石山蓋在塞外禹之施功治河始於積石然後導之入中國迤邐至龍門也河自積石山始西南流又東流入塞過燉煌酒泉張掖郡南又東過隴西河關縣北與洮水合又東過舍城允吾縣北與灃水合又東流經石城天水又東北流過安定又北過北地郡又北過朔方郡水東轉歷渠搜縣故城北又南流過五原郡南又東過雲中郡又南過定襄郡又南過西河郡東又南過上郡河東郡西然後至于龍門自積石至龍門蓋三千餘里其間所歷之地甚衆經皆不載者蓋此篇本謂治水而作惟其所施功之處則載之非其所施功之處則不必載也禹導河自積石即得河之故道遂逹之至龍門然後加人功疏鑿之故即以龍門繼於積石之下亦猶三危距南海甚逺而禹施功惟於三危經之所載但云導黑水至于三危入于南海蓋其所載者惟欲見其治水之迹而已非如地理志必欲盡載其源委之詳也漢孔氏曰施功發於積石或鑿山或穿地或通流此説不然使自積石而下龍門而上果有鑿山穿地之迹則經無緣略而不載也至于龍門水經曰龍門在河東皮氏縣西淮南子曰龍門未闢吕梁未鑿河出孟門之上大溢逆流無有邱陵髙阜滅之名曰洪水大禹疏通謂之孟門穆天子傳曰西出龍門九州之蹬孟門即龍門之上口也蓋河至于龍門夾於兩山之間其流最為湍悍故禹鑿而通之所謂鑿者蓋是河流所經之山而就其狹處鑿而大之廣袤足以容此水而已非是山橫於前禹從中而鑿之使河流出於其間也西漢賈讓曰禹治水山陵當道者毁之故鑿龍門闢伊闕析底柱破碣石隳斷天地之性皆過論也孟子曰禹之治水水之道也又曰禹之治水行其所無事也使其隳斷天地之性毁山陵之當路者當大興功役弊士民之力以與水爭勢於衆山之間則非水之道也豈所謂行其所無事哉故謂之鑿龍門則可謂之鑿斷天地之性則不可也南至于華隂河自積石東北流至龍門則折而南流至于華隂則折而東流龍門之南華隂之南北即所謂龍門西河是也華隂者華山之北此山跨梁豫二州之間其北抵西河南則曰華隂也而説者乃謂河之折而東流其兩河之旁有二華故張平子西京賦曰綴以二華巨靈屭贔髙掌逺跖以流河曲厥迹猶存其意蓋謂河流至于此華山橫其前巨靈擘石分為二華使河流出於其間此蓋好事者為之也據經但言南至于華隂則是河之所經惟在華山之北而已安得出於二華之間乎巨靈之説怪妄甚矣孔子之所不語者謂此也夫東至于底柱河自西華隂遂折而東流以至于底柱漢孔氏曰底柱山名河水分流包山而過山見水中若柱然故謂之底柱酈道元曰禹之治水山陵當道者毁之故破山以通河河水分流包山而過山見水中若柱故謂之底柱三川既決水流疏分指狀表目亦謂之三門山其山在虢城東南大陽城北案酈道元之説謂底柱是禹之所鑿其説是也至謂破山以通河此則過論也河之至底柱蓋舊有可通之道禹嫌其狹於是疏而廣之故有三門非是先鑿底柱山以為三門然後導河而過之也漢鴻嘉中楊焉上言從河上下患底柱狹隘可鐫廣之成帝使鐫沒水中不能去而今水益湍怒害甚前日夫禹之治水未嘗不為萬世之慮使底柱尚有可鐫之理則禹鐫之矣禹所不能鐫而楊焉欲鐫之何其不思之甚也蓋河自龍門至于華隂東折以及底柱夾於兩山之間其勢最為狹隘故古語云龍門之下河流駛於竹箭惟其為髙山所束其勢不得盤還則其漂悍湍激覆溺舟船是乃萬世之患也豈人力之所能勝哉酈道元曰其山雖鑿尚更湍合有一十九灘水流峻急勢同三峽破壞舟船自古所患此説是也頃歲建劔大興役功鑿治衆灘其費不資某嘗詢於舟人云灘患不減於昔日以是知天地山川之險蓋有出於勢之自然者未易以人力爭也底柱舟船之患雖禹無如之何而况於楊焉輩乎又東至于孟津東過洛汭至于大伾河自底柱東迤邐至于孟津孟津都道所湊也孟津説者不同孔氏曰孟是地名津是渡處在孟地置津故謂之孟津論衡曰武王伐紂八百諸侯同為此盟故曰盟津地理志作盟津顔師古曰盟讀曰孟在洛陽之北都道所湊故號孟津孟長大也此諸説不同然論衡之説尤無理禹時巳有孟津此孟字蓋通用也安可以為盟誓哉顔師古以盟為長大其説亦甚牽強不若唐孔氏以為地名案左傳隱十一年桓王與鄭人蘇忿生之田向盟州杜氏曰盟今孟津也孟之為地名也審矣蓋自黃河泛舟而過皆曰津此在孟地故謂之孟津河流自華隂至于底柱夾兩山之間其流皆湍悍至于孟津然後其勢稍緩故可以橫舟而渡也武王伐殷實渡師於此後世因謂之武濟蓋此水也既河流至孟津矣於是又自孟津東行及河南鞏縣之東而洛水自西南來入于河洛之入河實在此地而河則過之故曰東過洛汭汭水之北也洛自西南入河則是河流東過洛水之北也自洛汭而東流又至于大伾爾雅曰再成曰英一成曰伾李巡曰山再重曰英一重曰伾而漢孔氏則以為山再重曰伾其説與爾雅異唐孔氏謂所見異也今當以漢孔氏之説為正凡再重者皆可謂之伾此言大伾必是有所指而言之亦猶廣平曰陸冀州言大陸既作髙平曰原下濕曰隰冀州言既修太原雍州言原隰底績此皆指定其地非泛指原隰與陸大伾鄭氏以為在修武武德之界張楫云成臯縣山唐孔氏據漢書音義有臣瓉者以修武武德今無此山成臯縣山又不一成今黎陽縣山臨河豈不是大伾乎瓉言當然朝補之鄭漁仲又皆以大伾為在汜即成臯也未知孰是北過降水至于大陸河自華隂以至大伾皆東流自大伾然後折而北流大伾之西則南河也其折而北流始謂之東河降水漢書地理志水經皆從糸與絳縣之絳同字漢孔氏但以為水名不著所在唐孔氏以為在信都鄭氏謂洚讀為降下江反聲轉為共河內共縣淇水出焉蓋以此為絳水也而酈道元破其説曰鄭氏注書引地説去大河東北流過絳水千里至于大陸為地腹如志之言大陸在巨鹿地理志曰水在安平信都巨鹿與信都相去不容此數也水名變易世失其處見降水則以為絳水今河內共山淇水共水出焉東至魏郡黎陽入河近所謂降水也降讀如郕降于齊師之降周時國於此者惡言降改為共又今河所從去大陸逺矣館陶北屯氏河其故道與案元據書有北過降水至于大陸推次言之則以淇水為降水共城為降城所未詳也案共縣本共和故國是有共名非惡降而更稱禹著山經淇水出沮洳淇澳衛詩列目又逺當非改綘革為今號但是水道源共出故以淇水為絳水如元引地説黎陽巨鹿非千里之遙直信都大陸者也惟屯氏北出館陶事近之矣案地理志降水發源屯流下亂章津是乃與章得通稱故水流間關所在著目信都復見絳名而東入于海尋其川殊無他瀆而衡漳舊道遂與屯相亂乃書有過絳之説河過絳當應此矣下至大陸不異經説自寧迄於巨鹿出於東北皆為大陸語之纒絡厥勢眇矣酈氏此言較諸説差為可信今姑從之蓋絳水至于信都入于河是河過于絳水也此所謂過與東過洛汭同蓋洛水降水皆入于河以小水入大河則謂之過不謂之會也大陸在巨鹿既過降水則北流至于巨鹿也太史公河渠書曰導河自積石歷龍門南到華隂東下底柱自盟津洛汭至于大伾於是禹以河所從來者髙水湍悍難以行平地數為敗乃釃二渠引其河北載之髙地過降水至于大陸此説不然據經但言東過洛汭至于大伾北過降水至于大陸初未嘗有二渠之説况禹之治水欲使水由地中行自髙而決之於下流者也今乃謂載之髙無此理也據經之所載既無二渠之説則太史公何據而為此言太史公嘗曰九州山川尚書近之矣至其言河流則不知取正於書而自為此説何也意者太史公未嘗得真孔氏古文書其所傳本或有異矣今當以孔氏本為正又北播為九河河自西戎入塞經秦隴陜洛夾山而行雖其勢狹隘湍悍破害舟船然而兩山相距其力足以捍河流之衝使不至於奔突故其治之也惟於河之兩旁為之疏鑿使其廣袤足以殺其駛奔之勢而已至于自大陸折而北流則其地皆平田虛壤易以決壞故禹之施功於此其規模最逺其慮患最詳蓋水之行於平地將欲無泛濫潰敗則必為之分殺其勢苟不為之分殺其勢而徒以一河受之彼河之本流自積石來者巳為多矣况又合受渭瀍澗衆水是豈一河之所能任哉故禹自大陸以北分河為九河則水勢有所宣泄不至於漂悍衝潰而安順其道以入于海此禹之知所以獨出乎萬世之上也然兖州又曰九河既道則是河之北行亦巳有此九派之舊迹禹之分而為九者亦因其舊迹而疏導之也是又所謂行其所無事也播布也河之至此是布而分之為九也其九河則徒駭之類是也同為逆河入于海孔氏云同合為一大河名逆河而入于海鄭氏王子雍皆同此説惟王介甫以謂逆河者逆流之河非並時分流也故謂之逆河據王氏之意以同為逆河之一句蓋所以解釋上文播為九河之義然而據經所載導水之例凡言為者皆是從此而為彼也如導漢云嶓冡導漾東流為漢又東為滄浪之水東匯澤為彭蠡東為北江入于海導江云東别為沱又東至于澧東北會為匯東為中江入于海導沇水云東流為濟入于河溢為滎則凡言為者皆是自此而為彼之辭也此説所謂同為逆河入于海是九河合為一大河以入海也明矣謂之逆河者此一大河之名也禹貢之書凡所載地名多矣豈皆有其義耶王氏以逆河為逆流之河其説鑿矣自禹而後歷三代數千年間河流未嘗有所決溢者以九河之迹無所廢壞故也鄭康成云周時齊桓公塞其八但為一支今河南弓髙以北往往有其遺迹班孟堅序傳亦云自兹及漢亡其八支蓋春秋緯寶乾圖云移河為界在齊吕填閼八流以自廣班氏鄭氏之説蓋取諸此此説雖出於緯書然以理觀之誠有可行者自周以前數千年間未嘗有河患至戰國嬴秦以來乃稍稍有之及漢而河患極矣當時尋九河之故道蓋不知其處以是觀之諸儒以河之八支為齊桓公所塞差為可行漢關並言河決率當在平原東郡左右其地形下而土疏惡聞禹時本空此地以為水猥盛則放溢少稍自索夫漢之河決所以常在平原東郡左右者以其地乃九河之故道也惟河決每在九河之故道以是知禹所疏之九河苟其八支不為齊桓公所塞則當漢之世自無所患矣漢元帝時青河都尉馮逡奏言郡承河下流土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流故也今屯氏河塞惟一川兼受數河之任雖髙增隄防終不能泄屯氏河新絶未久又其口所居髙於以分流殺水力道里便宜可復浚屯氏河以助大河泄暴水屯氏河北塞宣房河北決所為東北經魏郡信都渤海入海蓋追禹故道夫河與屯氏但分為二巳足以殺其下流之勢使無大害以是言之使禹之九河不為齊桓公所塞分支别派以入于海則雖萬世亦無水患豈止漢之一世哉故韓收許商平當在漢時論治河皆欲尋九河之故道可謂得其本矣河之入海處漢孔氏謂入渤海太史公河渠書亦云同為逆河入于渤海而溝洫志臣瓉注云禹貢云夾右碣石入于河河之入海當在碣石漢武帝元光三年河決東都更注渤海禹時不注渤海此説是也太史公并孔氏蓋是據其所見河流以為禹迹矣而唐孔氏又以謂渤海之郡當以此海為名計渤海北距碣石五百餘里河入海處逺在碣石南禹行碣石不得入于河也蓋逺行通水之處北盡冀州之境然後南回入河而逆上也此蓋順經傳之文而為之説未可全信嶓冢導漾東流為漢嶓冢山在隴西郡西縣漢水之所自出也漢中記曰嶓冢以東水皆東流嶓冢以西水皆西流即其地勢源流所歸故世俗以嶓冢為分水嶺惟水自嶓冢以西皆西流則是漢水之源自嶓冡而始也故經之於導漢則正名其源流之所自出而曰嶓冢導漾東流為漢也漢水而謂之導漾者漢孔氏曰泉始出山為漾水東南流為沔水至漢中東行為漢水曽氏曰流者對止辭止者為漾流者為漢如濟水止者為沇流者為濟此其説皆是也然自漢以來言漢水者皆以為有二源班孟堅地理志隴西郡西縣嶓冢山西漢水所出也至氐道縣云禹貢漾水所出至武都縣為漢水而於武都則曰東漢水受氐道水常璩亦云漢水有兩源東出氐道縣漾山為漾水西出隴西嶓冢山而司馬彪袁嵩郡國志亦皆謂東出氐道西出嶓冢據此數説則是以嶓冢所出者為西漢水而以漾水為東漢水據經但云嶓冢導漾東流為漢則是漾與嶓冢不可分為二處故漢孔氏以謂泉始出山為漾水東南流為沔水至漢中東行為漢水不以為東西兩川之異也然桑欽水經又以謂漾水出隴西嶓冢山東至武都沮縣為漢水審如此説則是嶓冢一山跨於氐道與西兩縣之間東西二源漢水皆出於此山分源於上而合流於下是以酈道元曰東西兩川俱出嶓冢山同為漢水雖津流别支渠勢懸然原始要終源流或一故俱受漢漾之名此説近之然東西兩川之説不見於經未敢為然又東為滄浪之水漾水既流至武都為漢矣於是又東則為滄浪之水謂之為者蓋水流至於此隨地得名非是他水自外來入之也漢孔氏云别流在荆州據孔氏之意則是以滄浪别為一水而他説亦以謂漢水出荆山東南流為滄浪之水是近楚都故孺子之歌則曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足而酈道元以為不然曰禹貢嶓冢導漾東流為漢又東為滄浪之水不言過而言為者明非他水也蓋漢水自下有滄浪通稱耳纒絡鄢郢地連紀徐皆楚都矣漁父歌之不違水地考據諸傳宜以書為正酈道元此説善張平子南都賦曰流滄浪而為隍廓方城而為墉李善注引屈原所謂漢水以為池方城以為城則是滄浪即漢水也蓋漢水至于楚地則其名為滄浪之水也過三澨至于大别三澨水名也水經則以為在江陵卭縣之北顔師古則以為江夏竟陵縣未知孰是云過者三澨之水分流别派至是而始合於漢水也左氏傳曰吳與楚夾漢楚乃濟漢而陳自小别至于大别則是大别者近漢傍之山也京相璠春秋土地名曰大别漢東山名在安豐縣南而杜元凱釋地云二别近漢之名無緣入在安豐南也酈道元曰案地説漢水東行觸大别之陂而入于江則與尚書杜預之説相符但今不知其所在矣蓋漢水既東流為滄浪之水矣於是過三澨水所入之處於是觸大别山以與江合也南入于江東匯澤為彭蠡東為北江入于海漢水東流至大别於是觸大别之山南回以入于江蓋江在漢之南也漢水將與江合必折而南既南而復東以匯于彭蠡之澤也匯者回也江漢之水相合於此而其流浸大於是東流於彭蠡大澤水既鍾於彭蠡則有所回旋曲折不至於泛溢漂悍以衝突下流之勢故東為北江以入于海也蓋先為之匯而後為之歸也江漢之匯于彭蠡亦猶河流分而為九也蓋禹之治水至於下流之地則未遽決之以入于海必先殺其迅疾漂悍之勢使其水有所遊蕩宛轉然後安流順道以赴其所歸故河流分為九然後同為逆河江漢匯為彭蠡然後分為三江或先分之後合之或先合之後分之其用意則一也岷山導江東别為沱岷山在蜀郡湔氐道西一名瀆山一名汶阜山在徼外江水所出益州記云大江泉源發於羊膊嶺下緣崖散漫小大百數殆未濫觴矣東南下百餘里至白馬嶺而歷天彭關自此以上微弱所謂發源濫觴者也自天彭關而歷氐道縣北其流始大蓋江水濫觴自蜀即岷山而此所以言岷山導江也江水出為沱沱乃江之别流者水經云小隱水源自潁水出而酈道元曰爾雅潁為河郭璞曰皆大水溢出别為小水之名亦猶江别為沱也漢地理志云南郡支江縣江沱在西此荆州之沱也蜀郡郫縣江沱在西此梁州之沱也蓋自江水溢出别為支派者皆名為沱故梁荆二州皆有沱也此言東别為沱接於岷山導江之下則是江水始出而别流者也意其指梁州之沱也又東至于澧過九江至于東陵江水别而為沱其經流則東至于澧也漢孔氏云澧水名案水經云澧水出武陵充縣西至長沙下雋縣西北入于江楚詞曰濯余珮兮澧浦顔師古亦謂澧水在荆州則以澧為水名非無所據也然鄭氏謂此經自導弱水以下言過言會者皆是水名言至于者或山或澤皆非水名今長沙郡有澧陵縣其以陵名縣乎鄭氏此言似亦有理故曽氏曰澧鄭氏以為澧陵今江水不至澧陵故先儒疑焉皆以為澧水夫春秋之豫章在江南漢淮之間漢之潯陽江夏在江北後世皆在江南焉知禹之時澧陵非江水所至之地乎以曽氏此説觀之則知鄭氏以為陵名有合於經文然經文曰導弱水至于合黎餘波入于流沙則是合黎必有受水之處而鄭氏以其曰至于遂以合黎為山名苟以合黎為山名則安能受弱水所入之勢而溢其餘波于流沙乎此又可疑當闕之九江即荆州所謂九江孔殷是也此九江發源山澤分支别派以入于江而江則過之也至于東陵水經曰東陵在廬江金菌縣西北蓋廬江郡有東陵鄉故也江水既過九江又至于東陵也夫江自岷山而出歷蜀漢巴峽數州然後至于澧今經之所序惟曰岷山導江東别為沱遂繼之以東至于澧過九江至于東陵者蓋此篇所記惟及夫治水施功之處亦猶導黑水至于三危則曰至于南海導河積石則曰至于龍門初不計其地之逺近也東迆北會為匯東為中江入于海迆者斜出之辭也江漢二水皆自西來至其合處則其勢迆靡而相屬故漢水自發源嶓冢皆東流至其將與江合也其稍折而南江水自發源岷山皆東流至其將與漢合也則稍折而北蓋江在漢南漢在江北漢稍南江稍北則其勢相屬故會于彭蠡而復東也匯者彭蠡之澤也不言會于彭蠡者蓋蒙上東匯澤為彭蠡之文且見其與漢水共注此澤也漢孔氏以東迆為一句以北字屬於下謂北會于匯故其説以謂迆溢也東溢分流都共北會為彭蠡鄭氏又以東迆者為南江夫既以迆為溢而又以東溢為分流展轉相訓乃成義其文勢不相屬非經意也據經文言北江中江者是自彭蠡而東方分為二江鄭氏以東迆為南江則是自東陵而下已分為三矣此説猶不合漢江二水既合于彭蠡矣然後由彭蠡分出為北江中江入于海此言東為中江入于海而上文導漾東為北江入于海有北江中江則是必有南江矣即揚州所謂三江既入是也漢孔氏云自彭蠡分江為三入震澤遂為北江而入海蓋揚州云三江既入震澤砥定先儒意以謂三江入于震澤然後由震澤而入海故為此説據此篇於九州之下載其逐州治水之曲折而於導山導水之次則更序其源委首尾之所相互見未嘗不相顧而成文也如雍州之涇屬渭汭漆沮既從灃水攸同而於導渭則曰東會于灃又東會于涇又東過漆沮入于河其文未嘗不相顧也使江自彭蠡果分為三以入于震澤復自震澤分為三以入海則經之所載必與震澤砥定之文相接而列砥定于江水之次今經之所載殊不及震澤則是震澤非江水之所入也明矣此當從蘇氏之説二孔妄合經傳無所考據不可從也唐孔氏之論三江則據漢志以謂南江從會稽吳縣南東入于海中江從丹陽蕪湖縣西東至會稽陽羡縣東入海北江從會稽毗陵縣北東入海然水之下流轉徙不常故川勢不足以考信班孟堅所載乃漢時三江如此未知禹時三江果如是否其是非蓋不可知也今之江水自彭蠡而東無有别派由秣陵京口以入于海不復有三江矣此蓋後代變更移易隨世不同不可以執為一定之論也而蘇氏乃以古之彭蠡而東合為一江者指以為今之三江至其數之不合則又從而為味别之説此蓋不知時變膠柱調瑟之論也導沇水東流為濟入于河溢為滎曽氏曰止者為漾流者為漢止者為沇流者為濟自其水之所出而言之則曰漾曰沇故其導之也則必指其水之所自出而言之故係之以其川瀆之通稱以此二水流自漾沇而出及其既流而出則曰漢曰濟以至於入江入河入海皆受漢濟之名而漾與沇但可以名其始出之水而已沇水者山海經謂之聮水郭景純謂即沇水也漢志作從水充字顔師古音曰弋臠反則是亦指沇水也水經曰俗謂之衍即此沇水也沇水所出説者不同漢志曰沇水出河東垣曲縣王屋山孔氏曰泉源為沇流去為濟水在溫縣西北者為濟水又或然也沇水自溫縣東南流經墳城西南又當鞏縣南北入于河濟與河合其流寖大遂至滎陽縣北溢為滎澤在敖倉東南雖溢為滎澤而滎澤不足以容之遂決而東行也東出于陶丘北又東至于菏又東北會于汶又北東入于海爾雅曰山再成曰陶邱陶邱雖是山之再成者然而必有指定而言非泛指凡山之再成者為陶邱也水經曰在濟隂定陶也既出于陶邱北矣又東至于菏菏即菏澤也説文以為在山陽胡陵縣水經以為在濟隂定陶縣此二説不同然山陽濟隂其郡相逺意者此澤跨於兩縣之間也自菏澤又東北折至東平夀張縣與汶水合然後北折而東以入于海汶水有二淮南子曰出朱虛弗其山者所謂東汶也此汶水蓋在泰山萊蕪縣至東平夀張縣西南安民亭入濟者是也濟之流既與河合行十餘里混而為一矣而乃能自别以溢為滎至于陶邱北諸儒疑焉唐孔氏則以謂濟水既入于河與河相亂而知截河過者以河濁濟清南出還清故可知也而蘇氏則以為江漢合而為彭蠡之澤以東為北江中江者合為一説其説以謂江漢之水會于彭蠡自秣陵京口以入于海不復三矣而禹貢猶有三江之名曰北曰中者以味别也蓋此三水性不相入江雖合而水味異故至于今猶有三沴之説古今傳唐陸羽知水味三沴相雜而不能欺不可誣也余以禹貢之書考之若合符契禹之序漢水曰嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海漢水既合于江且東匯為彭蠡矣安能自别為北江入于海乎知其以味别也禹之序江水曰岷山導江東别為沱又東至于澧過九江至于東陵東迆北會為匯東為中江入于海漢水既與江合且匯于彭蠡矣安能自别為中江以入于海乎知其以味别也濟水入于河溢為滎禹不以味别安知滎之為濟乎曽氏之説亦然此二説者一則以謂辨其清濁一則以謂别其水味皆未為確論夫濟清而河濁濟少而河多以清之少者會濁之多者不數步間則清者皆巳化而為濁矣既合流數千里安能自别其清者以溢為滎乎古之人蓋有知水味者矣如曰淄澠之合易牙知之又所謂唐陸羽知水味三沴相雜而不能欺此所謂知水味者惟知其合之味而已淄水之味也如此澠水之味也如彼淄澠合則其味也又如此三沴亦然彼其所知者徒知其為淄澠之合而已苟使淄澠之水既合而為一器苟使之就此器之中别其半以為淄别其半以為澠則雖易牙陸羽亦有所不能爾安能以味自别而出乎分水既合則其味合安能復以其味别而復出哉以是知此二説雖有清濁味别之不同其失一也故鄭漁仲曰山過山則分水過水則合天地之間豈有山過山水過水之理此説是也然漁仲之論又以經之所載為脫誤其説以謂導漢水至于大别南入于江經文止於此而已東匯澤為彭蠡東為北江入于海皆脫文也導沇水東流為濟入于河經文亦止於此而已與河北之沇水亦名為濟與河南之濟相亂故知溢為滎以上當有導沇水一二句後世傳者失之夫儒者之於經遇其有難曉處則闕之可也以先儒講解之未盡遂以已意增損經文以就其説此其與穿鑿之學亦何以異以某所見此文本甚明白諸儒之説皆求之過也禹貢之書為治水而作則其所載者惟及夫當時治水之實迹而已非可以地理書所載水道之曲折而比之也漢之末入于江本無北江之道禹既導漢以入于江江與漢合其流寖大匯于彭澤則江之故道不足以受此水也故為之導為北江以入于海也滎陽以東本無河濟之道禹既導濟以入河河濟相合其流亦寖大使皆決於河之故道則必有泛濫之患禹於是為之自滎澤決而東出于陶邱北以入于海是亦所以分殺其勢而濟之溢為滎也河濟雜矣非復濟水也惟此書為治水而作故其所載者如此使此書為地理而作則北江之水當屬於江不當屬於漢矣滎陽以東當屬於河不當屬於濟矣後世滎澤枯竭水不復灌注於此耳而水自滎陽出注於巨野澤世俗相傳以為濟水其實與河流雜矣非復出於沇之合流也導淮自桐柏東會于泗沂東入于海淮水出於南陽平氏縣東南胎簪山東北過桐柏山胎簪蓋桐柏之傍小山也淮雖出於胎簪而禹之導淮實自桐柏而始故云導淮自桐柏自桐柏而東則與泗沂會既與泗沂會然後入于海沂水出太山蓋縣南至下邳入泗泗水出濟隂乘氏縣至臨淮睢陵縣入淮蓋沂入于泗然後泗入于淮而經乃兼言會于泗沂者唐孔氏云以沂水入泗處去淮巳近故連言之淮入泗蓋在廣陵淮浦縣也導渭自鳥鼠同穴東會于灃又東會于涇又東過漆沮入于河渭水出隴西首陽縣渭首亭南谷然後過鳥鼠山鳥鼠山亦在隴西首陽縣爾雅曰其鳥為鵌其鼠為鼵共處一穴故山以為名渭水雖出于南谷而禹之導渭也惟自鳥鼠山而始故曰導渭自鳥鼠同穴而東則灃水會焉即上文所謂灃水攸同是也又東則涇水會焉即上文所謂漆沮既從是也既過漆沮然後入于河入河處蓋在京兆北船司空縣也導洛自熊耳東北會于澗瀍又東會于伊又東北入于河漢志曰洛水出冢嶺山山海經謂出上洛山水經曰出歡舉山三説不同然而經所不載未知孰是要之皆是水源出於他山自熊耳而過也禹之治洛水惟自熊耳而始故曰導洛自熊耳既自熊耳而過遂東北會于澗瀍又東會于伊蓋此三水合熊耳然後入于河則豫州所謂伊洛瀍澗既入于河是也三水所出諸説者皆不同經所不載難以考信而其入洛之處漢孔氏曰澗瀍會于河南城南蓋此二水既會于此然後入于洛也伊水入洛在於洛陽城南水經曰伊水出南陽縣西荀渠山東過郭洛山又東北過陸渾南又過新城南又東北歷伊闕中乃自洛陽入于河伊闕大禹疏以通水兩山相對望之若闕今水歷其間北流入于河陸機曰洛有四闕斯其意焉蓋歷代地理書之論禹迹者凡水行於兩山之間則皆以謂水流於此山橫其前禹鑿而通之故謂鑿龍門闢伊闕析城底柱破碣石凡若此説者皆已甚之論也夫禹之治水實用九州之民苟山橫其前鑿而通之則其為功役也大矣豈九州之民力所能堪哉既非民力之所能堪而禹驅之使前則其虐甚矣説者亦知其不通故有巨靈擘石之説此乃世俗之所見以為禹之神知必有超世俗之技而不可以常理論也殊不知聖人亦人耳所為之事莫不本於人情苟非出於人情則聖人必不為也故闢伊闕謂禹闢而大之則可謂其隳斷天地之性則不可也伊瀍澗三水入于洛然後洛水入于河其入洛處蓋在鞏縣東也禹貢既於九州之下各言其逐州治水之曲折而於導山導水之次又言其源委首尾之詳者鄭漁仲曰禹貢之書知山之盤倨與水之出入或不止一州一邑故序九州矣然後别出山川總序於後班固以來作史者無法遂將山水與故迹並隸州縣下且小山短水不出一州一縣者即與州縣之下言之固無害若乃大山所跨大水所經何啻一州一邑班固於州縣下列之可謂無法漁仲此言善矣嘗考漢地理志其序漢水則曰嶓冢山西漢水所出南入廣漢白水又東南至江州入江過郡四行二千七百六十里其序江水則曰岷山江水所出東南至江都入海過郡七行二千六百六十里此其所載徒知漢水過郡四江水過郡七而已安知其所過者何郡耶又安知其所過之郡孰先孰後耶知此則知禹貢既敘治水曲折於九州之下而於導山導水之次又敘其源委之詳其所記載實為萬代地理家之成憲也非特此也其他所載山川之列亦皆有法於其間曽氏曰嶓者漾之源也岷者江之源也有是山而後是水出焉故先言山河出昆崘墟而後至于積石淮出胎簪山而後至于桐柏渭水出南谷而後至鳥鼠洛水出冢嶺山而後至于熊耳積石桐柏熊耳皆其源也蓋先有是水而後至于是山故先言山河之過洛汭過降水漢過三澨江過九江渭過漆沮皆以大水受小水故謂之過江會于匯濟會于汝淮會于泗沂渭會于灃會于涇洛會于澗瀍會于伊蓋二水勢均焉故未嘗言會濟淮洛於水為小九川之合者勢皆可均故未嘗言過觀曽氏此説則知禹貢序山川地理之曲折蓋曲盡其理矣尚書全解卷十
